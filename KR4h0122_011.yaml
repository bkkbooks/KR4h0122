body:
  text: 東漢文紀卷十一明梅鼎祚編張禹字伯達趙國襄國人歷拜太尉上言鄧太后殤帝延平元年禹遷太傅録尚書事太后以帝初育禹以重臣居禁內上言從之方諒暗密靜之時不宜依常有事於苑囿其廣成上林空地宜且以假貧民上言新野君表鄧太后母新野君病太后車駕幸其第禹時為太尉與司徒夏勤司空張敏俱上表比三上固爭乃還宫新野君不安車駕連日宿止臣等誠竊惶懼臣聞王者動設先置止則交㦸清道而後行清室而後御離宫不宿所以重宿衛也陛下體蒸蒸之至孝親省方藥恩情發中久處單外百官露止議者所不安宜且還宫上為宗廟社稷下為萬國子民奏事前漢有安昌侯張禹今按後漢百官志云世祖中興務存簡約并官省職丞相司直以建武十八年省則於此奏事合臣聞天有三光以成其化方今三公之官不僃丞相獨領天下萬事最衆多明不盡獨見誠非一人之所作也案令丞相奏事司直持案長史將簿中二千石奏事皆與其丞合緣以臣下各得盡心竭誠而事明公太平御覽分載今合鄧騭字昭伯禹長子為虎賁中郎將封上蔡侯上鄧太后辭封疏殤帝崩太后與騭等定策立安帝永初元年封騭上蔡侯及弟悝等並封侯食邑各萬户騭等辭讓逃避間關詣闕上疏自陳至于五六乃許之臣兄弟汙穢無分可採過以外戚遭值明時託日月之末光被雲雨之渥澤並統列位光昭當世不能宣贊風美補助清化誠慙誠懼無以處心陛下躬天然之姿體仁聖之德遭國不造仍離大憂開日月之明運獨斷之慮援立皇統奉承太宗聖策定於神心休烈垂于不朽本非臣等所能萬一而猥推嘉美並享大封伏聞詔書驚惶慙怖追觀前世傾覆之誡退自惟念不寒而栗臣等雖無逮及逺見之慮猶有庶幾戒懼之情常母子兄弟內相敕厲冀以端慤畏慎一心奉戴上全天恩下完性命刻骨定分有死無二終不敢橫受爵土以增罪纍惶窘怔營昧死陳乞法雄字文强扶風郿人終於南邵太守移書屬縣雄為南郡太守濱帶江沔有雲夢藪澤永初中多虎狼患賞募張捕反為所害雄移書屬縣是後虎患稍息人獲以安凡虎狼之在山林猶人之居城市古者至化之世猛獸不擾皆由恩信寬澤仁及飛走太守雖不德敢忘斯義記到其毁壞檻穽不得妄捕山林樊準字幼陵鯈族孫歷尚書令光祿勳論興儒學疏鄧太后臨朝儒學陵替凖上書太后納其言是後屢舉方正敦朴仁賢之士臣聞賈誼有言人君不可以無學故雖大舜聖德孳孳為善成王賢主崇明師傅及光武皇帝受命中興羣雄崩擾旌旗亂野東西誅戰不遑啓處猶然投戈講藝息馬論道至孝明皇帝兼天地之姿用日月之明庶政萬幾無不簡心而垂情古典遊意經藝每饗射禮畢正坐自講諸儒並聽四方欣欣雖闕里之化矍相之事誠不足言又多徵名儒以充禮官如沛國趙孝琅邪承宫等或安居結駟告歸鄉里或豐衣博帶從見宗廟其餘以經術見優者布在廊廟故朝多皤皤之良華首之老每宴㑹則論難衎衎共求政化詳覽羣言響如振玉朝者進而思政罷者退而偹問小大隨化雍雍可嘉期門羽林介胄之士悉通孝經博士議郎一人開門徒衆百數化自聖躬流及蠻荒胸奴遣伊秩訾王大車且渠來入就學八方肅清上下無事是以議者每稱盛時咸言永平今學者蓋少逺方尤甚博士倚席不講儒者競論浮麗忘謇謇之忠習諓諓之辭文吏則去法律而學詆欺鋭錐刀之鋒斷刑辟之重德陋俗薄以致苛刻昔孝文竇后性好黃老而清靜之化流景武之間臣愚以為宜下明詔博求幽隱發揚巖穴寵進儒雅有如孝宫者徵詣公車以俟聖上講習之期公卿各舉明經及舊儒子孫進其爵位使纘其業復召郡國書佐使讀律令如此則延頸者日有所見傾耳者月有所聞伏願陛下推述先帝進業之道東觀漢記準疏云光武受命中興之初羣雄擾于冀州旌旗亂于大澤然猶投戈講學息馬論道孝明皇帝尤垂意于經學即位刪定乖疑稽合圖䜟封師太常桓榮為關內侯親自制作五行章句每享射禮正坐自講諸儒並聽四方欣欣是時學者尤甚冠帶縉紳逰辟雍觀化者以億萬計論災異疏凖再遷御史中丞永平初連年水旱災異郡國飢困凖上疏太后從之悉以公田賦與貧人臣聞傳曰饑而不損兹曰太厥災水春秋穀梁傳曰五穀不登謂之大侵大侵之禮百官偹而不製羣神禱而不祠由是言之調和陰陽實在儉節朝廷雖勞心元元事從省約而在職之吏尚未奉承夫建化致理由近及逺故詩曰京師翼翼四方是則今可先令太官尚方考功上林池籞諸官實減無事之物五府調省中都官吏京師作者如此則化及四方人勞省息伏見被災之郡百姓凋殘恐非賑給所能勝贍雖有其名終無其實可依征和元年故事遣使持節慰安尤困乏者徙置荆揚孰郡既省轉運之費且令百姓各安其所今雖有西屯之役宜先東州之急如遣使者與二千石隨事消息悉留富人守其舊土轉尤貧者過所衣食誠父母之計也願以臣言下公卿平議薦龎參疏參初拜左校令坐法輸作若盧及凉州先零羌反凖為御史中丞上疏薦之鄧太后納其言即于徒中召拜謁者使西督三輔諸軍屯臣聞鷙鳥纍百不如一鶚昔孝文皇帝悟馮唐之言而赦魏尚之罪使為邉守胸奴不敢南向夫以一人之身折方面之難者選用得也臣伏見故左校令河南龎參勇謀不測卓爾奇偉髙才武略有魏尚之風前坐微法輸作經時今羌戎為患大軍西屯臣以為如參之人宜在行伍惟明詔採前世之舉觀魏尚之功免赦參刑以為軍鋒必有成效宣助國威龎參字仲達河南緱氏人歷太尉徒中上羌事書參為左校令坐法輸作永和元年凉州先零羌反遣車騎將軍騭討之參于徒中使子俊上書鄧太后即召拜謁者而召騭還四年羌冦轉盛兵費日廣且連年不登榖石萬餘參奏記于騭騭欲從參議衆多不同乃止方今西州流民擾動而徵發不絶水潦不休地力不復重之以大軍疲之以逺戍農功消於轉運資財竭於徵發田疇不得墾闢禾稼不得收入摶手困窮無望來秋百姓力屈不復堪命臣愚以為萬里運糧逺就羌戎不若總兵養衆以待其疲車騎將軍騭宜且振旅留征西校尉任尚使督凉州士民轉居三輔休徭役以助其時正煩賦以益其財令男得耕種女得織絍然後畜精鋭乘懈沮出其不意攻其不僃則邉人之仇報奔北之恥雪矣奏記車騎將軍鄧騭比年羌寇特因隴右供徭賦役為損日滋官負人責數十億萬今復募發百姓調取穀帛衒賣什物以應吏求外傷羌虜內困徵賦遂乃千里轉糧逺給武都西郡塗路傾阻難勞百端疾行則鈔暴為害遲進則穀食稍損運糧散于曠野牛馬死於山澤縣官不足輒貸于民民巳窮矣將從誰求名救金城而實困三輔三輔既困還復為金城之禍矣參前數言宜棄西域乃為西州士太夫之所笑今茍貪不毛之地營恤不使之民暴軍伊吾之野以慮三族之外果破凉州禍亂至今夫拓境不寧無益於彊多田不耕何救飢敝故善為國者務懷其內不求外利務富其民不貪廣土三輔山原曠逺民庶稀疏故縣邱城可居者多今宜徙邉郡不能自存者入居諸陵田戍故縣孤城絶郡以權徙之轉運逺費聚而近之徭役煩數休而息之此善之善者也後漢書張俊謝鄧太后書俊蜀郡人有才能元初中為尚書郎郎朱濟丁盛不修行欲舉奏之因共私求俊短得與司空袁敞子書封上之下獄當死敞坐交通自殺俊臨刑鄧太后馳騎減死論俊假名上書謝當時皆哀其文臣孤恩負義自陷重刑情斷意訖無所復望廷尉鞠遣厥刀在前棺絮在後魂魄飛揚形容巳枯陛下聖澤以臣嘗在近密識臣貌狀傷臣眼目留心曲慮特加遍覆喪車復還白骨更肉披棺發槨起見白日天地父母能生臣俊不能使臣俊當死復生陛下德過天地恩重父母誠非臣俊破碎骸骨舉宗腐爛所報萬一臣俊徒也不得上書不勝去死就生驚喜踊躍觸冒拜章劉毅北海敬王子上安帝請注鄧太后德政書安帝初鄧太后臨朝多德政平望侯劉毅欲令早有注紀上書從之臣聞易載羲農而皇德著書述唐虞而帝道崇故雖聖明必書功於竹帛流音於管絃伏惟皇太后膺大聖之姿體乾坤之德齊蹤虞妃比跡任姒孝弟慈仁允恭節約杜絶奢盈之源防抑逸欲之兆正位內朝流化四海及元興延平之際國無儲副仰觀乾象參之人譽援立陛下為天下主永安漢室綏靜四海又遭水潦東州饑荒垂恩元元冠蓋交路菲薄衣食躬率羣下損膳解驂以贍黎苖惻隱之恩猶視赤子克巳引愆顯揚仄陋崇晏晏之政敷在寬之教興滅國繼絶世録功臣復宗室追還徙人蠲除禁錮政非惠和不圗於心制非舊典不訪於朝𢎞澤洋溢充塞宇宙洪澤豐沛漫衍八方華夏樂化戎狄混并丕功著於大漢碩惠加於生人巍巍之業可聞而不可及蕩蕩之勳可誦而不可名古之帝王左右置史漢之舊典世有注紀夫道有夷崇治有進退若善政不述細異輒書是為堯湯負洪水大旱之責而無咸熙假天之美髙宗成王有雉雊迅風之變而無中興康寧之功也上考詩書有虞二妃周室三母修行佐德思不踰閾未有內遭家難外遇災害覽總大麓經營天物功德巍巍若兹者也宜令史官著長樂宫注聖德頌以敷宣景耀勒勳金石懸之日月攄之罔極以崇陛下蒸蒸之孝陳忠字伯始寵子歷拜尚書令豫通帝意疏安帝始親朝事時連有災異詔舉有道公卿各上封事忠為尚書慮言事者必有激切乃上疏豫通帝意納之臣聞仁君廣山藪之大納切直之謀忠臣盡謇諤之節不畏逆耳之害是以髙祖舍周昌桀紂之譬孝文嘉爰盎人豕之譏武帝納東方朔宣室之正元帝容薛廣德自刎之切昔晉平公問於叔向曰國家之患孰為大對曰大臣重祿不極諌小臣畏罪不敢言下情不上通此患之大者公曰善於是下令曰吾欲進善有謁而不通罪至死今明詔崇髙宗之德推宋景之誠引咎克躬咨訪羣吏言事者見杜根成翊世等新蒙表録顯列二臺必承風響應爭為切直若嘉謀異策宜輒納用如其管穴妄有譏刺雖苦口逆耳不得事實且優遊寬容以示聖明無諱之美若有道之士對問髙者宜垂省覽特遷一等以廣直言之路論郡縣盜賊疏安帝即位以後頻遭元二之厄盜賊並起郡縣莫肯糾發忠獨以為憂上疏臣聞輕者重之端小者大之源故隄潰蟻穴氣泄針芒是以明者慎微智者識幾書曰小不可不殺詩云無縱詭隨以謹無良蓋所以崇本絶末鉤深之慮也臣竊見元年以來盜賊連發攻亭劫掠多所傷殺夫穿窬不禁則致強盜強盜不斷則為攻盜攻盜成羣必生大姦故逃亡之科憲令所急至於通行飲食罪致大辟而頃者以來莫以為憂州郡督録怠慢長吏防禦不肅皆欲採獲虛名諱以盜賊為負雖有發覺不務清澄至有逞威濫怒無辜僵仆或有局蹐比伍轉相賦斂或隨吏追赴周章道路是以盜發之家不敢申告鄰舍比里共相壓迮或出私財以償所亡其大章著不可掩者乃肯發露陵遲之漸遂且成俗冦攘誅咎皆由於此前年渤海張伯路可為至戒覆車之軌其迹不逺蓋失之末流求之本源宜糾增舊科以防來事自今強盜為上官若他郡縣所糾覺一發部吏皆正法尉貶秩一等令長三月奉贖罪二發尉免官令長貶秩一等三發以上令長免官便可撰立科條處為詔文切敕刺史嚴加糾罰冀以猛濟寬驚懼姦慝頃季夏大暑而消息不協寒氣錯時水涌為變天之降異必有其故所舉有道之士可䇿問國典所務王事過差令處暖氣不效之意庶有讜言以承天誡議喪服疏元初三年有詔大臣得行三年喪忠因此上言孝宣皇帝舊令人從軍屯及給事縣官者大父母死未滿三月皆勿徭令得葬送請依此制太后從之至建元中尚書令祝諷尚書孟布等奏以為孝文皇帝定約禮之制光武皇帝絶告寧之興貽則萬世誠不可改宜復建武故事忠上疏宦豎不便竟寢忠奏臣聞之孝經始於愛親終於哀戚自天子下至庶人尊卑貴賤其義一也夫父母於子同氣異息一體而分三年乃免於懷抱先聖緣人情而著其節制服二十五月是以春秋臣有大喪君三年不呼其門閔子雖要絰服事以赴公難退而致位以究私恩故稱君使之非也臣行之禮也周室陵遲禮制不序蓼莪之人作詩自傷曰瓶之罄矣惟罍之恥言巳不得終竟子道者亦上之恥也髙祖受命蕭何創制大臣有寧告之科合於致憂之義建武之初新承大亂凡諸國政多趣簡易大臣既不得告寧而羣司營祿念私鮮循三年之喪以報顧復之恩者禮義之方實為雕損大漢之興雖承衰敝而先王之制稍以施行故籍田之耕起於孝文孝廉之貢發於孝武郊祀之禮定於元成三雍之序偹於顯宗大臣終喪成乎陛下聖功美業靡以尚兹孟子有言老吾老以及人之老幼吾幼以及人之幼天下可運於掌臣願陛下登髙北望以甘陵之思揆度臣于之心則海內咸得其所論妖變疏忠轉為僕射時帝數遣黃門常侍及帝乳母王聖女中侍伯榮往來甘陵而伯榮負寵驕蹇所經郡國迎為禮謁又霖雨積時河水涌溢忠上疏臣聞位非其人則庶事不叙庶事不叙則政有得失政有得失則感動陰陽妖變為應陛下每引灾自厚不責臣司臣司狃恩莫以為負故天心未得隔并屢臻青冀之域淫雨漏河徐岱之濱海水盆溢兗豫蝗蝝滋生荆揚稻收儉薄并凉二州羌戎叛戾加以百姓不足府帑虛匱自西徂東杼柚將空臣聞洪範五事一曰貌貌以恭恭作肅貌傷則狂而致常雨春秋大水皆為君上威儀不穆臨蒞不嚴臣下輕慢貴幸擅權陰氣盛強陽不能禁故為淫雨陛下以不得親奉孝德皇園廟比遣中使致敬甘陵朱軒軿馬相望道路可謂孝至矣然臣竊聞使者所過威權翕赫震動郡縣王侯二千石至為伯榮獨拜車下儀體上僣侔於人主長吏惶怖譴責或邪諂自媚發人修道繕理亭傳多設儲跱徵役無度老弱相隨動有萬計賂遺僕從人數百匹頓踣呼嗟莫不叩心河間託叔父之屬清河有陵廟之尊及剖符大臣皆猥為伯榮屈節車下陛下不問必以陛下欲其然也伯榮之威重於陛下陛下之柄在於臣妾水灾之發必起於此昔韓嫣託副車之乘受馳視之使江都誤為一拜而嫣受歐刀之誅臣願明主嚴天元之尊正乾綱之位職事巨細皆任賢能不宜復令女使干錯萬機重察左右得無石顯泄漏之姦尚書納言得無趙昌譛崇之詐公卿大臣得無朱博阿傅之援外屬近戚得無王鳳害商之謀若國政一由帝命王事每决於巳則下不得逼上臣不得干君常雨大水必當霽止四方衆異不能為害論三府任輕疏時三府任輕機事専委尚書而灾眚變咎輒切免公台忠以為非體疏諌忠意常在褒崇大臣待下以禮臣聞君使臣以禮臣事君以忠故三公稱曰冡宰王者待以殊敬在輿為下御坐為起入則參對而議政事出則監察而董是非漢典舊事丞相所請靡有不聽今之三公雖當其名而無其實選舉誅賞一由尚書尚書見任重於三公陵遲以來其漸久矣臣忠心常獨不安是故臨事戰懼不敢穴見有所興造又不敢希意同僚以謬平典而謗讟日聞罪足萬死近以地震䇿免司空陳褒今者灾異復欲切讓三公昔孝成皇帝以妖星守心移咎丞相使賁麗納說方進方進自引卒不蒙上天之福徒乖宋景之誠故知是非之分較然有歸矣又尚書决事多違故典罪法無例詆欺為先文慘言醜有乖章憲宜責求其意割而勿聽上順國典下防威福置方員於規矩審輕重於衡石誠國家之典萬世之法也尚書郎奏御覽引俊漢書尚書為王喉舌而諸郎多文俗鮮有雅才每為詔文宣示內外轉相求請也薦劉愷疏安帝始親政事朝廷多稱司空劉愷㑹太尉馬英策罷忠時為尚書薦愷詔拜愷太尉臣聞三公上則台階下象山嶽股肱元首鼎足居職協和陰陽調訓五品考功量才以序庶僚遭烈風不迷遇迅雨不惑位莫重焉而今上司缺職未議其人臣竊差次諸卿考合衆議咸稱太常朱倀少府荀遷臣父寵前忝司空倀遷並為掾屬具知其能倀能說其經書而用心褊狹遷嚴毅剛直而薄於藝文伏見前司徒劉愷沈重淵懿道德博偹克讓爵土致祚弱弟躬浮雲之志兼浩然之氣頻歷二司舉動得禮以疾致仕側身里巷處約思純進退有度百僚景式海內歸懷往者孔光師丹近世鄧彪張酺皆去宰相復序上司誠宜簡練卓異以厭衆望劾陳禪奏永寧元年西南夷撣國王獻樂及幻人明年元㑹作之于庭安帝與羣臣共觀大奇之禪為諫議大夫獨言帝王之庭不宜設夷狄之技尚書陳忠劾奏禪左轉為障尉古者合歡之樂舞於堂四夷之樂陳於門故詩云以雅以南韎任朱離今撣國越流沙踰縣度萬里貢獻非鄭衛之聲佞人之比而禪庭訕朝政請劾禪下獄薦周興疏興為尚書令周榮子以榮忠節除興為郎中少有名譽永寧中尚書陳忠疏薦興為尚書郎臣伏惟古者帝王有所號令言必𢎞雅辭必溫麗垂于後世列於典經故仲尼嘉唐虞之文章從周室之郁郁臣竊見光祿郎周興孝友之行著於閨門清厲之志聞於州里藴匱古今博物多聞三墳之篇五典之策無所不覽屬文著辭有可觀採尚書出納帝命為王喉舌臣等既愚暗而諸郎多又俗吏鮮有雅才每為詔文宣示內外轉相求請或以不能而專巳自由辭多鄙固興抱奇懷能隨輩棲遲誠可歎惜太官宜著兩梁冠奏荀綽晉百官表注云建光中尚書陳忠奏令史質堪上言太官宜著兩梁尚書孟希奏太官職在鼎俎不列陛位堪欲令比大夫兩梁冠不宜許臣伏惟太官今職在典掌王饔統六清之飲列八珍之饌正百品之羞納四方之貢所奉尤重用思又勤明詔慎口實之御防有敗之姦增崇其選侍御史主捕案太醫令奉方藥供養符節令掌幡信金虎故位從大夫車有韜沂冠有兩梁所以殊親疏别內外也太官令以供養言之為最親近以執事言之為最煩多令又髙選又執法比太醫令科同服等而冠二人殊名實不副又博士秩卑以其傳先王之訓故尊而異之令服大夫之冕猶此言之兩梁冠非必列於陛位也建中初太官令兩梁冠春秋之義大於復古如堪言合典可施行克厭帝心即聽用之議厯奏安帝延光二年中謁者亶誦言當用甲寅元河南梁豐言當復用太初尚書郎張衡周興以為九道法最密詔書下公卿詳議太尉愷等上侍中施延等議太初過天日一度弦望失正月以晦見西方食不與天相應元和改從四分雖密于太初復不正皆不可用甲寅元與天相應合圗䜟可施行博士黃廣大行令任僉議如九道河南尹祉太子舍人季𢎞等四十人議即用甲寅元當除元命苞天地開闢獲麟中百一十四嵗推閏月六直其日或朔晦弦望二十四氣宿度不相應者非一用九道為朔月有比三大二小皆疏逺元和變厯以應保乾圖三百嵗斗厯改憲之文四分厯本起圖䜟最得其正不宜易愷等八十四人議宜從太初尚書令忠上奏上納其言遂改厯事諸從太初者皆無他效驗徒以世宗攘夷廓境享國久長為辭或云孝章改四分灾異率甚未有善應臣伏惟聖王興起各異正朔以通三統漢祖受命因秦之紀十月為年首閏常在嵗後不稽先代違於帝典太宗遵修三階以平黃龍以至刑犴以錯五者以備哀平之際同承太初而妖孽纍仍痾禍非一議者不以成數相參考真求實而泛采妄說歸福太初致咎四分太初厯衆賢所立是非巳定永平不審復革其弦望四分有謬不可施行元和鳳鳥不當應厯而翔集逺嘉前造則喪其休近譏後改則隱其福漏見曲論未可為是臣輒復重難衡興以為五紀論推步行度當時比諸術為近然猶未稽於古及向子歆欲以合春秋橫斷年數損夏益周考之表紀差謬數百兩厯相課六千一百五十六嵗而太初多一日冬至日直斗而云在牽牛迃濶不可復用昭然如此史官所共見非獨衡興前以為九道密近今議者以為有闕及甲寅元復多違失皆未可取正昔仲尼假順馬之名以崇君之義况天之厯數不可任疑從虛以非易是張璫陳制虜三策北虜連與車師入寇河西議者因欲閉玉門陽關以絶其患延光二年燉煌太守張璫上書陳三策尚書陳忠疏奏和帝乃以班勇為西域長史破平車師北虜呼衍王常展轉蒲類秦海之間專制西域共為冦鈔今以酒泉屬國吏士二千餘人集昆侖塞先擊呼衍王絶其根本因發鄯善兵五千人脅車師後部此上計也若不能出兵可置軍司馬將士五百人四郡供其犂牛穀食出據栁中此中計也如又不能則宜棄交河城收鄯善等悉使入塞此下計也陳忠請置燉煌校尉疏臣聞八蠻之寇莫甚北虜漢興髙祖窘平城之圍太宗屈供奉之恥故孝武憤怒深惟久長之計命遣虎臣浮河絶漢窮破虜庭當斯之役黔首隕於狼望之北財幣縻于盧山之壑府庫單竭杼柚空虛算至舟車資及六畜夫豈不懷慮久故也遂開河西四郡以隔絶南羌收三十六國斷胸奴右臂是以單于孤特鼠竄逺藏至干宣元之世遂偹蕃臣關徼不閉羽檄不行由此察之戎狄可以威服難以化狎西域內附日久區區東望扣關者數矣此其不樂胸奴慕漢之效也今北虜巳破車師藝必南攻鄯善棄而不救則諸國從矣若然則虜財賄益增膽藝益殖威臨南羌與之交連如此河西四郡危矣河西既危不得不救則百倍之役興不資之費發矣議者但念西域絶逺恤之煩費不見先世苦心勤勞之意也方今邉境守禦之具不精內郡武衛之偹不修敦煌孤危逺來告急復不輔助內無以慰勞吏民外無以威示百蠻蹙國減土經有明誡臣以為敦煌宜置校尉案舊增四郡屯兵以西撫諸國庶足以折衝萬國震怖胸奴劉愷字伯豫居巢侯劉般子以讓弟爵徴拜議郎歷位太尉長吏行服議愷元初二年為司徒舊制公卿二千石刺史不得行三年喪由是喪禮並廢元初中鄧太后詔長吏以下不為親行服者不得典城選舉時有上言牧守宜同此制議者以為不便愷獨議上從之詔書所以為制服之科者蓋崇化厲俗以𢎞孝道也今刺史一州之表二千石千里之師職在辨章百姓宣美風俗尤宜尊重典禮以身先之而議者不尋其端至于牧守則云不宜是猶濁其源而望流清曲其形而欲景直不可得也臧吏减罪議安帝初清河相叔孫光坐臧抵罪增錮二世永寧時居延都尉范邠復犯贓罪詔下三公廷尉議司徒楊震等議依光比愷獨議上有詔太尉議是春秋之義善善及子孫惡惡止其身所以進人於善也尚書曰上刑挾輕下刑挾重如令使臧吏禁錮子孫以輕從重懼及善人非先王詳刑之意也班勇字宜僚超少子有父風為西域長史以攻焉耆兵後期下獄免置西域副校尉議永初初勇為軍司馬出敦煌迎都護還罷都護俊西域絶無漢吏元初六年敦煌太守曺宗遣長史索班屯伊吾車師前王及鄯善王皆來降後數月北單于與車師後部攻沒班擊走前王略有北道鄯善王急求救宗請出兵擊胸奴因復取西域鄧本后詔勇詣朝堂㑹議公卿多以為宜閉玉門關遂棄西域勇上議尚書等又難勇勇對于是從勇議復敦煌郡營兵置西域副校尉昔孝武皇帝患胸奴彊盛兼總百蠻以逼障塞於是開通西域離其黨與論者以為奪胸奴府藏斷其右臂遭王莽篡盜徵求無厭胡夷忿毒遂以背叛光武中興未遑外事故胸奴負強驅率諸國及至永平再攻敦煌河西諸郡城門晝閉孝明皇帝深惟廟策乃命虎臣出征西域故胸奴逺遁邉境得安及至永元莫不內屬㑹間者羌亂西域復絶北虜逐譴責諸國備其逋租髙其價直嚴以期㑹鄯善車師皆懷憤怨思樂事漢其路無從前所以時有叛者皆由牧養失宜還為其害故也今曺宗徒恥於前負欲報雪胸奴而不尋出兵故事未度當時之宜也夫要功荒外萬無一成若兵連禍結悔無及巳况今府藏未充師無後繼是示弱於逺夷暴短於海內臣愚以為不可許也舊敦煌郡有營兵三百人今宜復之復置護西域副校尉居於敦煌如永元故事又宜遣西域長史將五百人屯樓蘭西當焉耆龜兹徑路南彊鄯善于填心膽北扞胸奴東近敦煌如此誠便朝議置西域副校尉難對尚書問勇曰今立副校尉何以為便又置長史屯樓蘭利害云何勇對曰昔永平之末始通西域初遣中郎將居敦煌後置副校尉於車師既為胡虜節度又禁漢人不得有所侵擾故外夷歸心胸奴畏威今鄯善王尤還漢之外孫若胸奴得志則尤還必死此等雖同鳥獸亦知避害若出屯樓蘭足以招撫其心愚以為便長樂衛尉鐔顯廷尉綦母參司𨽻校尉崔據難曰朝廷前所以棄西域者以其無益於中國而費難供也今車師巳屬胸奴鄯善不可保信一旦反覆班將能保北胡不為邉害乎勇對曰今中國置州牧者以禁郡縣姦猾盜賊也若州牧能保盜賊不起者臣亦願以要斬保胸奴之不為邉害也今通西域則虜藝必弱胸奴必弱則為患微矣孰與歸其府藏續其斷臂哉今置校尉以扞撫西域設長吏以招懷諸國若棄而不立則西域望絶望絶之後屈就北虜緣邉之郡將受困害恐河西城門必復有晝閉之警矣今不廓開朝廷之德而抱屯戍之費若北虜遂熾豈安邉久長之策哉太尉屬毛軫難曰今若置校尉則西域絡繹遣使求索無厭與之則費難供不與則失其心一旦為胸奴所迫當復求救則為役大矣勇對曰今設以西域歸胸奴而使其恩德大漢不為鈔盜則可矣如其不然則因西域租入之饒兵馬之衆以擾動緣邉是為富仇讎之財增暴夷之藝也置校尉者宣威布德以繫諸國內向之心以疑胸奴覬覦之情而無財費耗國之慮也且西域之人無他求索其來入者不過禀食而巳今若拒絶藝歸北屬夷虜并力以冦并凉則中國之費不止千億置之誠便李郃字孟節漢中南鄭人舉孝廉五遷尚書令歷司空復為司徒上安帝復祀六宗奏李氏家書云郃通五經善河圖風星為司空侍祠南郊不見六宗祠上奏帝從之元初六年更立六宗祠於雒陽西北案尚書肆類于上帝禋于六宗六宗者上不及天下不及地傍不及四方在六合之中助陰陽化成萬物漢初甘泉汾陰天地亦禋六宗孝成之時匡衡奏立南北郊祀復祀六宗及王莽謂六宗易六子也建武都雒陽制祀不道祭六宗由是廢不血食今宜復舊制度日蝕上書元初六年十二月戊午朔日有蝕之司空郃上書帝深納其言後二嵗鄧太后崩上收考中人趙任等在中宫有廢立謀陛下祗畏天威懼天變克己責躬博訪羣下咎皆在臣力小任重招致咎徵去年二月京師地震今月戊午日蝕夫至尊莫過乎天天之變莫大乎日蝕地之戒莫重乎震動今一嵗之中大異兩見日蝕之變既為尤深地動之戒搖宫最醜日者陽精君之象也戊者土主任在中宫午者火德漢之所承地道安靜法當由陽今乃専恣搖動宫闕禍在蕭墻之內臣恐宫中必有陰謀其陽下圖其上造為逆也灾變終不虛生推原二異日辰行度甚為較明譬猶指掌宜察宫闕之內如有所疑急摧破其謀無令得成修政恐懼以答天意十月辛卯日有蝕之周家所忌乃為亡徵是時妃后用事七子朝令戊午之灾近相似類宜貶退諸后兄弟羣從內外之寵求賢良徵逸士下德令施恩惠澤及山海李氏家書上天變疏古今注曰永建元年二月甲午客星入太微五月甲子月入斗李氏家書曰時天有變氣李郃上書陳臣聞天不言縣象以示吉凶挺灾變異以為譴戒昔齊桓公遭虹貫斗牛之變納管仲之謀令齊去婦無近妃宫桓公聽用齊以大安趙有尹史見月生齒齕畢大星占有兵變趙君曰天下共一畢知為何國也下史於獄其後公子牙謀弒君血書端門如史所言乃月十三日有客星氣象彗孛入天市梗河招搖槍棓十六日入紫宫迫北辰十七日復過文昌泰陵至天船積水間稍微不見客星一占曰魯星歷天市者為穀貴梗河三星備非常泰陵入星為凶喪紫宫北辰為至尊如占恐宫廬之內有兵喪之變千里之外有非常暴逆之憂魯星不得過度尊宿行度從疾應非一端恐復有如王阿母母子賤妾之欲居帝旁耗亂政事者誠令有之宜當抑逺饒足以財王者權柄及爵祿人天所重慎誠非阿妾所宜干豫天故挺變明以示人如不承慎禍至變成悔之靡及也朱寵追訟鄧騭書建光元年鄧太后崩安帝復封騭為上蔡侯位特進帝多不德而乳母王聖見太后久不歸政慮有廢置及崩宫人因誣告悝等先從尚書鄧訪取廢帝故事遂廢悝等諸子侯為庶人逼迫皆自殺騭遣就國與子並不食而死大司農末寵痛騭無罪乃肉袒輿櫬上疏追訟之寵免官帝亦頗悟祠騭中牢伏惟和熹皇后聖善之德為漢文母兄弟忠孝同心憂國宗廟有主王室是賴功成身退讓國遜位歷世外戚無與為比當享積善履謙之祐而橫為宫人單辭所陷利口傾險反亂國家罪無申證獄不訊鞠遂令騭等罹此酷濫一門七人並不以命尸骸流離怨魂不反逆天感人率土喪氣宜收還冡次寵樹遺孤奉承血祀以謝亡靈周磐字堅伯汝南安成人三遷重合令皆有惠政思母棄官令二子磐母歿公府三辟並不應建光元年嵗朝集諸生講論因令二子月望忽終吾日者夢見先師東里先生與我講於陰堂之奧既而長歎豈吾齒之盡乎若命終之日桐棺足以周身外椁足以周棺斂形懸封濯衣幅巾編二尺四寸簡寫堯典一篇并刀筆各一以置棺前示不忘聖道楊震字伯起𢎞農華陰人年五十始仕州郡歷太尉以直諌忤諸幸臣被搆收印綬自殺諌安帝內寵書震永寧元年為司徒明年鄧太后崩內寵始橫乳母王聖子女伯榮出入宫掖傳通姦賄震疏諌帝以示阿母等而伯榮尤驕淫與故朝陽侯劉護從兄瓌通瓌遂以為妻得襲護爵位侍中震深疾之復詣闕疏奏不省臣聞政以得賢為本理以去穢為務是以唐虞俊乂在官四凶流放天下咸服以致雍熙方今九德未事嬖幸充庭阿母王聖出自賤微得遭千載奉養聖躬雖有推燥居濕之勤前後賞惠過報勞苦而無厭之心不知紀極外交屬託擾亂天下損辱清朝塵㸃日月書誡牝雞牡鳴詩刺哲婦喪國昔鄭嚴公從母氏之欲恣驕弟之情幾至危國然後加討春秋貶之以為失教夫女子小人近之喜逺之怨實為難養易曰無攸遂在中饋言婦人不得與於政事也宜速出阿母令居外舍斷絶伯榮莫使往來令恩德兩隆上下俱美惟陛下絶婉孌之私割不忍之心留神萬幾誡慎拜爵減省獻御損節徵發令野無鶴鳴之嘆朝無小明之悔大東不興於今勞止不怨於下擬跡往古比德哲王豈不休哉復論劉瓌襲封疏臣聞髙祖與羣臣約非功臣不得封侯故經制父死子繼兄亡弟及以防篡也伏見詔書封故朝陽侯劉護再從兄瓌襲護爵為侯護同産弟威今猶見在臣聞天子專封封有功諸侯專爵爵有德今瓌無他功行但以配阿母女一時之間既位侍中又至封侯不稽舊制不合經義行人喧譁百姓不安陛下宜覽鏡既往順帝之則諌論阿母起第及樊豐等書震延光二年為太尉時詔遣使者大為阿母修第中常侍樊豐侍中周廣謝惲等更相扇動傾搖朝廷震疏諌不從豐等遂詐作詔書調發司農錢穀大匠材木各起家舍役費無數震因地震復上疏臣聞古者九年耕必有三年之儲故堯遭洪水人無萊色臣伏念方今灾害發起彌彌滋甚百姓空虛不能自贍重以螟蝗羌夷抄掠三邉震擾戰鬬之役至今未息兵甲軍糧不能復給大司農帑藏匱乏殆非社稷安寧之時伏見詔書為阿母興起津城門內第舍合兩為一連里竟街雕修繕飾窮極巧技今盛夏土王而攻山採石其大匠左校别部將作合數十處轉相追促為費巨億周廣謝惲兄弟與國無肺腑枝葉之屬依倚近幸姦佞之人與樊豐王永等分威共權屬託州郡傾動大臣宰司辟召承望㫖意招來海內貪汙之人受其貨賂至有臧錮棄世之徒復得顯用白黑溷淆清濁同源天下歡譁咸曰財貨上流為朝結譏臣聞師言上之所取財盡則怨力盡則叛怨叛之人不可復使故曰百姓不足君誰與足惟陛下度之地震復論周豐等疏臣蒙恩僃台輔不能奉宣政化調和陰陽去年十一月四日京師地動臣聞師言地者陰精當安靜承陽而今動搖者陰道盛也其日戊辰三者皆土位在中宫此中臣近官盛於持權用事之象也臣伏惟陛下以邉境未寧躬自菲薄宫殿垣屋傾倚枝柱而巳無所興造欲令逺近咸知政化之清流商邑之翼翼也而親近幸臣未崇斷金驕溢踰法多請徒士盛修第舍賣弄威福道路歡譁衆所聞見地動之變近在城郭殆為此發又冬無宿雪春節未雨百僚燋心而繕修不止誠致旱之徵也書曰僭恆晹若臣無作威作福玊食唯陛下奮乾剛之德棄驕奢之臣以掩訞言之口奉承皇天之戒無令威福久移於下救趙騰疏河間男子趙騰詣闕上書指陳得失順帝怒收考詔獄結以罔上不道震疏救之不省騰竟伏誅臣聞堯舜之世諌鼓謗木立之於朝殷周哲王小人怨詈則還自敬德所以達聰明開不諱博採負薪盡極下情也今趙騰所坐激訐謗語為罪與手刃犯法有差乞為虧除全騰之命以誘芻蕘輿人之言來歷字伯珍中郎將歙曽孫嗣歙爵歷太僕免永建初拜車騎將軍復為大鴻臚廢太子議歷延光二年遷太僕明年皇太子驚病避安帝乳母王聖舍太子乳母王男㕑監邴吉等以為聖舍新繕造犯土禁不可久御與聖及女永等互相是非聖永譛男吉幽死因搆讒太子帝怒召公卿㑹議廢立歷與太常桓焉廷尉張皓議皓退而上疏並不省廢太子為濟陰王歷復固爭免官削國租經說年未滿十五過惡不在其身且男吉之謀皇太子容有不知宜選忠良保傅輔以禮義廢置事重此誠聖恩所宜宿留張皓字叔明犍為武陽人歷司空復為廷尉諌安帝廢太子疏事詳來歷昔賊臣江充造構讒逆至令戾園興兵終及禍難後壺關三老一言上乃覺悟雖追前失悔之何逮今皇太子春秋方始十嵗未見保傅九德之義宜簡賢輔就成聖質諌順帝繫考趙騰書永建初皓為司空時清河趙騰上言災異收騰繫考所引黨輩當伏重法皓疏諌帝乃悟减罪一等臣聞堯舜立敢諌之鼓三王樹誹謗之木春秋採善書惡聖王不罪芻蕘騰等雖干上犯法所言本欲盡忠正諌如當誅戮天下杜口塞諌爭之源非所以昭德示後也翟酺字子超廣漢雒人歷將作大匠坐誣逮得釋諌安帝寵幸外戚書酺拜尚書時安帝追感祖母宋貴人悉封其家又元舅耿寶及皇后兄弟閻顯等並用威權酺上疏諫不省臣聞微子佯狂而去殷叔孫通背秦而歸漢彼非自疏其君時不可也臣荷殊絶之恩蒙值不諱之政豈敢雷同受寵而以戴天履地伏惟陛下應天履祚歷值中興當建太平之功而未聞致化之道蓋逺者難明請以近事徵之昔竇鄧之寵傾動四方兼官重紱盈金積貨至使議弄神器改更社稷豈不以藝尊威廣以致斯患乎及其破壞頭顙墮地願為孤豚豈可得哉夫致貴無漸失必暴受爵非道殃必及今外戚寵幸功均造化漢元以來未有等比陛下誠仁恩周洽以親九族然祿去公室政移私門覆車重尋寧無摧折而朝臣在位莫肯正議翕翕訿訿更相佐附臣恐威權外假歸之良難虎翼一奮卒不可制故孔子曰吐珠於澤誰能不含老子稱國之利器不可以示人此最安危之極戒社稷之深計也夫儉德之恭政存約節故文帝愛百金于露臺飾帷帳於皂囊或有譏其儉者上曰朕為天下守財耳豈得妄用之哉至倉穀腐而不可食錢貫朽而不可校今自初政以來日月未久費用賞賜巳不可算斂天下之財積無功之家帑藏單盡民物雕傷卒有不虞復當重賦百姓怨叛既生危亂可待也昔成王之政周公在前召公在後畢公在左史佚在右四子挾而維之目見正容耳聞正言一日即位天下曠然言其法度素定也今陛下有成王之尊而無數子之佐雖欲崇雍熙致太平其可得乎自去年巳來灾譴頻數地坼天崩髙岸為谷修身恐懼則轉禍為福輕慢天戒則其害彌深願陛下親自勞恤研精致思勉求忠貞之臣誅逺佞諂之黨損玉堂之盛尊天爵之重割情欲之歡罷宴私之好帝王圖籍陳列左右心存亡國所以失之鑒觀興王所以得之庶災害可息豐年可招矣上順帝興學奏酺為將作大匠上言及免後遂起太學開拓房室孝文皇帝始置一經博士武帝大合天下之書而孝宣論六經于石渠學者滋盛弟子萬數光武初興愍其荒廢起太學博士舍內外講堂諸生橫卷為海內所集明帝時辟雍始成欲毁太學太尉趙熹以為太學辟雍皆宜兼存故並陳至今而頃者頽廢至為園採芻牧之處宜更修繕誘進後學陳圖書之意奏益都耆舊傳曰時詔問酺陰陽失序水旱隔并其設銷復興濟之本酺上奏陳圖書之意帝從之漢四百年將有弱主閉門聽難之禍數在三百年之間宜升歷改憲行先王至德要道奉率時禁抑損奢侈宣明質朴以延四百年之難劉光等光字仲遼太尉矩之弟歷位太尉條案即位禮儀奏順帝以安帝永寧元年立為皇太子母李氏為閻皇后所害安帝乳母王聖與宦者江京樊豐等譖廢太子為濟陰王及安帝崩閻與兄車騎將軍顯立北鄉侯數月薨中黃門孫程等迎立濟陰王尚書令劉光奏制曰可孝安皇帝聖德明茂早棄天下陛下正統當奉宗廟而姦臣交構遂令陛下龍潛藩國羣僚逺近莫不失望天命有常北鄉不永漢德盛明福祚孔章近臣建策左右扶翼內外同心稽合神明陛下踐阼奉遵鴻緒為郊廟主承續祖宗無窮之烈上當天心下厭民望而即位倉卒典章多缺請條案禮儀分别具奏東漢文紀卷十一
