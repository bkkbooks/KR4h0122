國秦漢子孫流分來居荆土氏國立姓焉傳云聖賢之後必有逹者先生應焉其少也孝友而悦學其長也寛舒如好施是㕥宗親歸懷鄉䣊高尚直已而行年五十有二遇疾而終有四男三女咸高賢姣孋富貴顯榮可謂子孫繁者已其季女明文頴川之夫人也感惟􅊲妣克昌之德登山采石致亐墓道邑人縉紳刻石作歌昭示來嗣其辭曰寔惟先生虢仲之裔盛德遺祀休矣亦世孝友貞信仁恕好惠直已自求不欲榮勢綽綽令人獲道之篤生七子鍾天之祉堂堂四俊碩大婉敏娥娥三妃行追大姒葉葉昆嗣福禄茂止克昌厥後身去烈􅏅鐫石作歌昭示萬祀敏音未在音止祀音以𨽻釋云碑無歲月時代歐陽以為漢碑趙以為魏晉字書今碑有兩昭字晉人所諱疑此是魏刻故相府小史夏堪碑隸額刋本闕三字曹小史夏堪字德帝禹之精苗刋闕之遺刋本闕四字零陵太守之根嗣也易世承系休祚仍垂印紼刋本闕三字豔罔託堪繼令縱受氣蹈眞􅏅洗刋闕奉親恭順刋闕二字束脩撡􅖅苛獲縣選初涉府朝典職首曹刋闕施布天殱良善卒瘮痾霣命叐摧國貞𦙍收傳寵􅂒官臨慈恩感踴族姻追傷會謝氏并靈合柩古命有之仲泥何㤞嗚呼哀哉其辭曰嗟德舍勲質珪玉性馥芬視闕撡􅛽騏顔悓龍階望浮雲􅀈尺水津未疆春萌遭雹霜壽􅄇究魄蜚揚情悲切著篇章刋石銘傳萬􅏵紼為紋遼為寮􅀈為􅘆廣漢屬國候夫人碑無額廣漢屬國候李翊碑在熹平二年廣漢屬國候夫人節行絜静德古之聖母早失匹匹字壽耉衣憤然􅫖稱列厥辭曰昔衞姃輔齊桓文母脩道周室獲蕃􅋋虧夫人臧侯苗焉自彼適斯蹈禮伉言恭順承舅孝行布宣述嬪慈惠逹䠂樊繼姑入室勤養􅀈􅀈育理家道羣宗為軒求福衣囘撡無遺愆字約身紡績殖賄圃園敬姜誨子叔敖隂恩男三女二廱穆閨門女則哲禮男則與權節踰古訓􅀢衣煩九族和親若葉附根歲􅏅大淵精魂奄昏飛神天庭收荆𤣥都莫衣歏息涕零烏呼明智有德咸曰何辜害仁良顛闕叐俎􅫖咸路人泣霑泥塗逝而衣返子孫呱呱歎曰隂陽分兮鍾律滋星月列兮有四時神㝔䚺兮萬姓熹壽十二兮九九期五三未末字兮襄在姃秋發兮春殆周公九兮成稱灾靡黄兮蓋夭胎世有皇兮氣所裁赴鴻淵兮逝􅄇來鳯延頸兮泣交頙鵷悲兮涕隕零寐耿耿兮慛傷情彼倉天兮愬神靈􅚸切剥兮年􅄇榮蘭亡兮喪兮英誰不忉兮作偯聲疇匹號兮鳴􅀢􅀢杞之兮感動城陟四極兮升天庭曰司命兮政􅄇平飛螽兮害仁良魂魄孤兮獨焭焭陳礿祠兮返所生幽􅄇見兮孝厥荆嗟曰遐兮適窅二𨽻釋云於戲夫人臧苗焉蓋夫人之姓臧也其後歎辭九九十二之數殊未易曉中有重文數句惟其末􅀢􅀢三處字不再出其間假借字㕥鵷作鵷雛螽作螽䘍它碑所無􅀈即拳字焭即㷀字窅即㝠字即眉字漢故富春丞張君碑篆額君諱闕字闕龍闕君之第三子闕君之叔弟下闕承父兄下闕悔遊居出闕孝友宣聞忠信瀾下闕涉貫多闕通朝立節正言卓下闕如松歲寒而不凋闕十六字州從事臨疑吐下闕深下闕其操闕智闕君闕之尤可稱下闕有秩除吳郡下闕約清間教下闕丞道遘闕疾三年癸亥景命不禄君闕嚴平李德上感下闕新市富春各復早世既隕慈恕續嗣不茂哀心摧剥靡下闕碑古今之常乃登山采石刋照厥勛其辭曰峨峨富春膺姿清烈孝擬㕘騫人無間伐與友必信乆而闕密闕三字敬州閭稱實佐政流化歌吳域位細德禮讓雝穆曷寤旻穹此此英喆哀矣永徂命不可追周􅀈至仁弗能扞違銘勛示後㠯章厥輝𨽻釋云張君之名髣髴如泳永貢字士人以為張湛亦非也碑字磨滅多不成章而銘詩可讀其間云三年癸亥景命不禄考東都歴年凡三癸亥永平與光和之六年延光之二年是也郎中郭君碑𨽻額漢郎中郭下闕君業闕安命書所闕五字肅闕六字其下闕主簿督郵闕帥下闕守闕二字思闕二字以齊其民闕二字氏其殆庶幾闕其有之是以似之以孝廉闕三字郡闕功闕二字樹闕室與闕二字如闕二字臨闕如闕二字祠烝嘗惠兄仲犀奉繆鄉闕終闕舉闕臺閣以尹王室遭闕旬醫莁闕䆒闕三字剥切天子使羣后咸怨㧨人違殂絶闕寒之性既納嬪闕二字頌周南之闕遭闕二字之誼為人後者為之子州郡闕俊艾叙聖踰哲君之功烈闕銘天府乃共刋石樹碑式旌下闕闕矣郭君柔嘉惟則𤣥静闕重猗闕令色闕德惟闕威儀是力従善懲惡讒慝斯闕功舊千里闕二字咸闕孰不呼天懷忠傷絶元兄繼世貞闕守節壺闕三字載典籍矣追顔驂冉通神明矣後人闕二字永不闕矣魯相謁孔廟殘碑原無名上闕許闕帝命英授俾相亐魯吉月令辰欽謁下闕闕藏寶覽鴻基之曠蕩觀林木之窈下闕揚美風而動物和隂􅘯以興雨假爾収仰下闕訪之儒􅐋稽之典謨聖德設章先民有下闕在貭檏春秋烝嘗幾以獲福昔􅏅周人下闕成共立碑石因而銘之咸自紀藉天下闕上闕史字叔德東海况基人下闕儒字仲睢東海郯闕𨽻釋云碑以況基為祝其乃春秋夾谷之地又假爾為遐邇貭即質漢無終山陽雍伯天祚玉田之碑玉田縣西北有陽公壇社即陽公之故居也陽公名雍伯雒陽人是周景王之孫食采陽樊春秋之末爰宅無終至性篤孝父母終没葬之于無終山山高八十里而上無水雍伯置飲焉有人就飲與石一斗令鍾之玉生其田北平徐氏有女雍伯求之要以白璧一雙媒氏致命雍伯至玉田求五雙徐氏妻之遂嫁焉性不好寶玉田自去今猶謂之為玉田漢上谷長史侯相碑自此至闕林山文並見水經注侯氏出自倉頡之侯踰殷歴周各以氏分或著楚魏或顯齊秦晉卿士為斯其裔也食于華陽汲縣太公廟碑太公望君河内汲人也縣民故會稽太守杜宣白令崔瑗曰太公甫生于汲舊居猶存君與高國同宗太公載在經傳令臨此國宜正其位以明尊祖之義于是國老王喜廷掾鄭篤功曹邵勤等咸曰宜之遂立壇祀為之位主漳河神壇碑河内修武縣張導字景明以建和三年為鉅鹿太守漳津汎濫土不稼穡導披按地圖與丞彭參掾馬道嵩等原其逆順揆其表裏脩防排通正水路功績有成民用嘉賴洛陽建春橋石柱銘陽嘉四年乙酉壬申詔書以成下漕渠東通河濟南引江淮方貢委輸所由而至使中謁者魏郡清淵馬憲監作石橋梁柱敦敕工匠盡要妙之巧攒立重石累高周距橋工路博流通萬里云云河南尹邳崇㠕承渤海重合雙福水曹掾中牟任防史王䕃史趙興將作吏睢陽申翔道橋掾成睪卑國洛陽令江雙丞平陽降監掾王騰之主石作左北平山仲三月起作八月畢成豫州從事皇毓碑殞身州牧隂君之罪時年二十五臨睢長平與李君二千石承輪氏夏文則高其行而悼其殞州國咨嗟旌閭表墓昭叙令德式示後人冠蓋里碑銘水經注云宜城縣有太山山下有廟漢末名士居其中刺史二千石卿長數十人朱軒華蓋同會廟下荆州刺史行部雅嘆其盛號為冠蓋里而刻石銘之蛾娥南嶽烈烈離明寔敷􅖡乂君子以生惟此君子作漢之英德為龍光聲化鶴鳴筑陽縣闕林山文君國者不躋高堙下先時或斷山岡以通平道民多病守長冠軍張仲瑜乃與邦人築斷故山道作此銘漢祝長嚴訢碑和平元年金石録云政和中下邳縣民耕地得之碑云惟漢中興卯金休烈和平元年歲治東宫星屬角房月建朱烏中吕之均萬物慈射華澤青葱蚑行蠕動咸守厥常人物同授獨遭灾霜顛霣徂落壽不寛𢎞經設三命君獲其央年六十九又云伊歎嚴君諱訢字少通兆自楚族祖考相承招命道術治嚴氏春秋馮君章句又云㓜為郡掾史會稽諸暨尉烏程毗陵餘暨章安山隂長以病去官後為丹陽陵陽丞守春穀長舉孝廉遷東牟侯相下邳祝長典牧十城所在若神其後有銘銘為五言頗殘闕難讀云漢丹陽太守郭旻碑君諱昊字巨公有周之裔也又云治律小杜㓜仕州郡察孝廉除郎中謁者遷敬陵園令廷尉左平治書侍御史獄刑無頗憲臺如砥以父憂去官選拜郎中侍御史遭母憂服除復拜郎中治書侍御史遷冀州刺史徵拜尚書是時淮夷蠢逆帝疇咨綏䇿書褒􅝏俾守丹陽為政四年以公事去官年過耳順寢疾􅯠頹延熹元年十月戊戌卒其十二月丙申葬微言絶矣諸子曷仰三載禮闋廼羣相與刻石勒銘最後云昔君即世雖立碑頌裁足載字加有瑕缺君之弟故太尉薨歸葬舊陵于是從子立五原太守鴻議郎某及𦙍孫某缺懐祖之德乃更刻石不改舊文蓋用昭明祖勲也漢故廷尉仲君之碑金石録碑在濮州雷澤君諱定聖漢龍興家于成陽父張掖廣漢太守以父勲拜琅邪太守南陽隂府君察孝不行南郡胡公除濟隂復舉孝廉拜尚書左丞除郎中遷彭城吕長徵試博士太傅下邳趙公舉君高行遷豫州刺史將軍從事符節令豫章太守徵議郎拜大尚書遜位復徵拜將軍長史遷城門校尉執金吾拜大中大夫遷廷尉卿託病乞歸脩堯靈臺黄屋卅餘上聽拜太中大夫臺成事訖上以君先帝舊臣筴請令州郡以禮特遣熹平元年孟秋上旬君遘疾不瘳于是門生養徒故吏鄉黨刋石勒銘樹碑表道焉趙明誠云兩漢遷拜次第史不能詳石刻類皆摩滅此碑獨悉故著之胡公者廣也趙公者峻也按定漢史無傳惟風俗通元和姓纂具載黄香墓碑蘇州志宋乾道初梅里蘇忠翊直卜葬得古冡乃黄香墓碑刻𨽻書延陵慈父葬子嬴博孟光貞婦窆夫於吳碑隂乃會稽東部都尉張紘誄又有薛綜修祠日月題刻可辯者八字子瓊孫琬位登三事漢名臣奏白帖後漢志有東平國無鹽縣伏門東平國無鹽縣山中有大石無故一夕自起立臣愚以為石者隂類殆有微人當紹起者漢興來與今再見其一正以昭帝無繼嗣見今又以陛下無繼嗣復見漢名臣奏天隂雨人之病為之先動是隂相應而起也天將隂雨又使人睡卧者隂氣也漢名臣奏白帖漢得隂山匈奴長老遇之未嘗不哭公卿薦摯恂高士傳恂字季直高士峻十二世孫永和中和帝博求名儒公卿薦恂公車徴及大將軍竇憲舉賢良並不就恂行侔曾閔學擬仲舒文㕘長卿才同賈誼誠瑚璉器也宜在宗廟為國楨輔諸儒鍾皓頌皓字季明頴川長社人以篤行稱徵為廷尉正博士林慮長皆不就及終諸儒為之頌林慮懿德非禮不處悦此詩書弦琴樂古五就州招九膺台輔逡巡王命卒歲容與後漢書孔仲山讃孔嵩字仲山宛人與山陽范式為友家貧賃為阿里街卒及式為太守遣迎嵩式識之下車把臂曰子懷道卒伍不亦痛乎嵩曰侯嬴賤役城門卑位古人不耻何痛之有故其讃云按此讃不詳孰撰以嵩後漢附仲山通逹巻舒無方屈身厮役挺秀含芳漢資中古碑伏羲賛見史子堅𨽻格伏羲蒼精初造工業畫卦結繩以理海内内音越漢陽太守銘敦方足以正衆邪肅清足以濟殊俗不吐剛而謟上不茹柔而黷下雙魚洗銘政和元年饒州得雙魚洗六其二曰元味二年有隱起篆字富貴昌宜侯王窆石銘宋元祐二年永城下得石如豐碑其上刻銘蓋窆石也下棺之器窆方驗切沛國臨濉時窆石室永建六年五月十五日太歲在未所遭作大吉利窆石室候來歸我有之亚宋董逌廣川書跋平原國衛士狐呪青州平原國和帝以封子懷王勝風俗吏奸倍于民給衛士吏賦狐肉從假錢積歲餘吏無償意衞士恚恨取狐肉沃以酒呪之狐肉狐肉尾斯尾斯身軀雖小錢多私之闞駰十三州志漢十二辰鑑銘宣和博古圖鑑説云所藏特漢唐之器鑑背銘有作國史語而為四字有效栢梁而為七言如言尚方玉堂者用于奉御也如言宐官宐矦王者用之百執也如言宐子孫者用以藏家也若千秋萬歲之語美頌也十六符篆辟邪也因以意分乾象水浮詩辭善頌諸門又摘銘中數字為名實無定議漢有丹陽外其稱漢者亦以辭近古質爾今悉録之而語同者以類從不必原次鍊冶銅錫去其滓辟除不祥宐古木長葆二親利孫子辟如衆樂典祀壽金石西王母飛來言之始自有紀古詩類苑載十二辰鑑銘云名言之始自有紀鍊冶銅錫去其滓辟除不祥宜吉水長保二親利孫子辟如仙衆樂典祀壽比金石方西王母按博古圖前文為是類苑多改削原文以取成章非也又漢十二辰鑑銘宜官佚葆刋闕子龍之里保鏡始左青龍右白虎前朱雀後𤣥武頴川頓氏鏡銘云前朱雀後𤣥武左青龍右白虎宜官佚保子孫漢三神鑑銘吾作明鏡幽鍊三商配像萬疆競從序道敬奉賢良周刻册祀百身長樂衆事主陽福禄正明富貴安樂子孫蕃昌賢者高顯士至公卿與師命長士一作位神像鑑銘吾作明鏡幽錬三商位至三公神人三獸鑑銘吾作明鏡幽錬三商頌以長芳四神鑑銘吾作明鏡幽鍊三商周刻典祀漢册禮鑑銘吾作明鏡幽鍊三商周刻典祀配像萬疆自身康樂萬福攸同百清並友福禄宐祥富貴安寧子孫蕃昌增年益壽與師命長徐氏金石文云古之冶鏡取金氣盛而鍊以三歲或三月以周乾坤五五之數故曰三商宜官鑑銘吾作明鏡幽鍊三銅用祈典祀配服萬畺四衆天六治殷殆典方賁天子孫千層代代承承典豐尚方鑑銘一類苑作六花水浮鑑銘誤尚方作鏡母大傷左龍右虎掌四旁朱鳯𤣥武和隂陽子孫備具居中央長保二親樂富昌兮宐矦王兮尚方鑑銘二尚方作鏡眞大好上有仙人不知老渴飲玉泉饑食浮游天下敖四海壽比金石之國保類苑末三字云佳且好無浮游句尚方鑑銘三博古圖名仙人不老鑑今統作尚方尚方作鏡眞大好上有仙人不知老渴飲玉泉饑食壽如介石下闕尚方鑑銘四博古尚方子孫銘尚方作鏡四夷服多賀國家人民息胡虜殄滅天下復風雨時節五穀熟長保二親子孫力傳吉後世樂母極兮漢青蓋鑑銘與前語大同青蓋作鏡四夷服多賀國家人民安胡虜殄滅天下陽風雨時節五穀熟長孫孫朔陽天漢尚方鑑銘博古作神人鑑上即尚也上方作鏡神人食英玉飲渴泉駕文龍乘浮昇漢長生鑑銘調刻冶鏡日月清明刋闕五得商羽聲天地和合子孫成常保夫婦樂長生徐氏金石文云此言得商羽聲蓋金精成鍊與律相和以合夫婦之道殆奩中物也漢九子鑑銘九子作巧而工兮吉利兮漢清明鑑銘首有當是吉字漢有善銅出丹陽和以銀錫清且明左龍右虎尚三光朱雀𤣥武順隂陽且一作如東坡云如即而字若左傳星隕如雨之例按圖原文又清明鏡銘仇池筆記云元豐中東城自齊安過黄州獲一鏡其背銘字若粟大篆欵甚精妙白陽疑白水之陽其銅黑色如漆照人微小古鏡然此道家聚形之法也漢有善銅出自白陽取鑄為鏡清明而光左龍右虎輔之兩傍又清明鑑銘漢有善錫出丹陽取之為鏡清且明右並博古圖他若服𦍑有頌始青清白諸鑑不成文者不録飛精鏡銘水銀隂精百錬成鏡龍城録云三代物也後有八字近籕篆龍城偽書潁川頓氏鏡銘明白鳯凰雙瓊瑤裝隂陽合為配日月常相對鐵印銘王子年拾遺記安帝永初時令吏民入錢為官有琅邪王溥即中尉王吉之後家貧不得仕乃于洛陽市傭書美形貌又多文詞以是致富先嘗穿井得鐵印有銘後以一億錢輸官得中壘校尉三田一土壘字也中壘校尉掌北軍壘門故曰軍門主簿傭力得富錢至億庾一土三田軍門主簿東漢文紀卷三十二
