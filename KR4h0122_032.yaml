body:
  text: 東漢文紀卷三十二明梅鼎祚編仙人唐君碑篆額并隂君字公成固人蓋帝堯之闕四字之故能舉家闕字去上陟皇燿統御隂陽騰清躡浮命壽無疆雖王公之尊四海之富曾闕五字毛天地之性斯其貴者也耆老相傳㕥為居二君為郡吏闕四字土域啖𤓰㫄有眞人左右莫察而君獨進美𤓰又従而敬禮之眞人者遂與闕期聟谷口山上乃與君神藥曰服藥以後當移意萬里知鳥獸言語是時府在西成去家七百餘里休謁􅀈猍轉景即闔郡驚焉白之府君従為御史䡊車被具君乃畫地為召誅之視其腹中果有被具府君闕賓燕欲従學道公頃無所進府君怒勑尉部吏公妻子公乃先歸􅋋谷口呼其師告㕥戹急其師與之歸㕥藥飲公妻子曰可去矣妻子孿家􅄇忍去又曰豈欲得家俱去乎妻子曰固所也􅋋是乃以藥塗屋柱飲牛馬六畜須㬰有大風𤣥雲來迎公妻子屋宅六畜翛然與之俱去昔高松崔白皆一身得道而公舉家俱盛矣傳曰賢者所􅔅澤流百世故使鄉春夏母蚊蜹秋冬鮮繁霜􅂒蠱遐去其螟百穀收入天下莫知斯德祐之效也道羣仙德潤故鄉知德者鮮歷世莫紀漢中太守南陽郭君諱芝字公載脩北辰之政馳周邵之風歆樂唐君神靈之美以為道重者名邵德厚者廟尊乃發嘉教躬捐奉錢倡率羣羲繕廣斯廟闕和祈福布之兆民刻石昭音揚君靈譽其辭曰闕遂享神藥超浮雲兮下闕碑隂故江陽守長成固楊晏字平仲東部督􅗯成固左分字元術故江陽守長南鄭楊字伯愼處南鄭祝龜字元司徒掾南鄭祝楊字孔逹處南鄭祝岱字子故益州從事南鄭祝忱字子文處南鄭祝字德靈處南鄭祝崇字季太守史南鄭祝榮字文太守史南鄭趙英字􅐋才處南鄭劉通字海闕故裦中守尉南鄭趙忠字元楚闕二字南鄭楊鳯字孔鸞𨽻釋云博物志城固縣壻鄉有唐公得道升仙水經注云智水川有唐公房祠公房升仙之曰壻行未還不獲同階雲路約以此川為居言無繁霜蛟虎之患因號壻鄉後漢志褒中有唐公防祠或作防或作昉皆誤即莽字即壻字即鼠字攣即戀字酸棗令劉熊碑篆額并隂君諱熊字闕廣陵海西人也厥祖天皇大帝垂精接感篤生聖明闕仍其則子孫享之分源而流枝葉扶疏出王别𦙍受爵列土封矦載德相繼顯闕五字光武闕皇帝之𤣥廣陵王之孫俞卿矦之季子也誕生照明岐㠜踰絶長闕四字柴守約履勤體聖心敦五經之瑋圖兼古業覈其妙行修言道五字宜亰夏莫􅄇師卬六籍五典如源如􅰦既練州郡卷舒委䢫忠貞闕效官闕三字出省楊土流化南城政猶北辰衆星所從三祝有成來臻我邦循東闕之惠柳闕禮官賞進頑約之㕥禮博之㕥文政敎始初愼徽五典勤民闕心顧下闕二字仁恩如冬日威猛烈炎夏貪究革情清修勸慕德惠潛流鬯芳旁布尤愍縣闕濟濟之儀孜孜之踰帥後學致之㢕泮草上之風莫􅄇嚮應悦誨日新䂡闕二字素七業勃然而興咸居今而好古雖未盡道善必有所由處民之秉寔我劉父其人魯無君子斯焉取旃允我劉父言善誘人講禮習聆匪徒豐學屢獲有年闕載克成神民協欣兩􅄇相傷故德友歸焉自古在昔先民有佗洪勲則甄盛德闕刻表諸來世垂之極裦賢表善揚幽抜式序在位􅀢能授宜官無曠事闕二字為正㕥􅌰為更愍念烝民勞苦􅄇均為佗正彈造設門更富者􅄇獨逸樂貧者闕順四時積和感畼歲為豐穰賦稅􅄇煩寔我劉父吏民愛若慈父畏若神明悔闕令德清越孤竹德牟産竒誠宜裦顯照其憲則乃相闕咨度諏詢采摭謠言刋闕詩三章其辭曰清和穆鑠寔惟乾惟嶽降靈篤生我君服骨聖允鍾厥醇誕生岐㠜言協闕墳德震燿孝行通神動履􅒑䋲文彰繽成是正服㕥道德民闕有父子然後有君臣理財正辭束帛戔戔闕夢刻像鶴鳴一震天臨保漢寔生闕勲明試賦授夷夏已親嘉賜來撫潛化如神其神伊何靈傷人闕猗歟明秉道之樞養闕之福惟德之偶淵乎其長渙乎成功闕暇民豫新我闕通用行則逹㕥誘我邦賴兹劉父用説其篆澤零豐黔首歌頌𨽻釋云碑叙力役之事猶詳以卒為更之上有為正二字而闕其餘董仲舒云月為更卒巳復為正小民安得不困注云更卒謂給郡縣一月而更者正卒謂給中都官者西京更有三品後雖改易官不得人則害常自若也水經云酸棗城有縣令劉孟陽碑今碑損其一字歐陽公不知碑在酸棗無以名其官遂謂之俞鄉矦季子碑趙氏云光武子廣陵王荆以譴死李利涉編古命氏云荆生俞鄉矦平平生彪襲封㨿此熊當為彪之弟然則于光武乃其曾孫而曰𤣥孫碑之誤也唐王建題此碑詩云蒼苔滿字土龜風雨消磨絶妙辭不向圖經中舊見無人知是蔡邕碑碑以亨為享殷為隱究為穴踰為諭偶為隅鶴在鳴上省文作寉劉熊碑隂故徵試博士下闕故華長蘇眞下闕華長戴燿下闕故上計掾下闕故郎中討弘叔寵三百故州従事仇審季闕三百故闕事君仇方孟三百故外黄守令尹松大德五百故雍守令李保世德三百故雍守令闕穆元憲三百故外黄守令李卓卓異三百故守東昬長蘇勝德陽二百故五百掾王暹宜孟三百故雍守令王習叔河三百故督郵左位宣高二百故督郵李景德二百故督郵李徵景臺二百故督郵蘇翔山甫二百故督郵楊茂季曾二百故督郵顔亮光祖二百故郡曹史李豫妙高二百故郡曹史顔詩惠祖二百故郡曹史楊丗二百故郡曹史王仁公直二百故郡曹史王貢叔䑓二百故郡曹史蘇闕二百故郡曹史仇惟􅐋成二百故郡列掾李表憲䑓二百故郡文學李義子仁二百故儀守丞李璜伯瓌二百故闕二字守丞仇邵景傳二百故陳􅕂守尉樊殖仲舉二百故河隄従事闕萬世闕三字故河隄従事李􅐋闕三字故州書佐尹雒􅐋眞五百故雍守尉李謙子山二百故外黄守尉誠咸升卓二百故功曹尹愼元節二百故功曹邴磐世高二百故功曹蘇