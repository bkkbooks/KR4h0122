body:
  text: 東漢文紀巻五明梅鼎祚編李淑諫更始書更始立所授官爵皆羣小賈豎或有膳夫庖人軍師將軍豫章李淑上書諫更始繫淑詔獄自是四方怨叛方今賊寇始誅王化未行百官有司宜慎其任夫三公上應台宿九卿下括河海故天工人其代之陛下定業雖因下江平林之埶斯皆臨時濟用不可施之既安宜釐改制度更延英俊因才授爵以匡王國今公卿大位莫非戎陳尚書顯官皆出庸伍資亭長賊捕之用而當輔佐綱維之任唯名與器聖人所重今以所重加非其人望其毗益萬分興化致理譬猶緣木求魚升山採珠海内望此有以闚度漢祚臣非有憎疾以求進也但為陛下惜此舉厝敗材傷錦所宜至慮惟割既往謬妄之失思隆周文濟濟之美劉盆子太山式人城陽王章之後赤眉賊樊崇等立為帝降光武為趙王郎中下書赤眉攻更始敗之下書更始降封長沙王為謝祿所殺聖公降者封長沙王王郎一名昌趙國邯鄲人自稱成帝子子輿遂僭稱帝為光武所滅移州郡檄郎既僭立分遣將帥狥下幽薊移檄州郡於是趙國以北遼東以西皆從風而靡制詔部刺史郡太守曰朕孝成皇帝子子輿者也昔遭趙氏之禍因以王莽簒殺賴知命者將護朕躬解形河濵削迹趙魏王莽竊位獲罪于天天命佑漢故使東郡太守翟義嚴鄉侯劉信擁兵征討出入蕃漢普天率土知朕隱在人間南嶽諸劉為其先驅朕仰觀天文乃興于斯以今月壬辰即位趙宫休氣熏蒸應時獲雨盖聞為國子之襲父古今不易劉聖公未知朕故且持帝號諸興義兵咸以助朕皆當裂土享祚子孫已詔聖公及翟太守亟與功臣詣行在所疑刺史二千石皆聖公所置未覩朕之沈滯或不識去就强者負力弱者惶惑今元元創痍已過半矣朕甚悼焉故遣使者班下詔書盧芳字君期安定三水人詐稱武帝曽孫謝光武疏王莽末芳詐稱武帝曽孫劉文伯與三水屬國羌胡起兵和親匈奴立為漢帝建武十六年使使請降光武乃立為代王芳上書謝後復叛入匈奴臣芳過託先帝遺體棄在邉陲社稷遭王莽廢絶以是子孫之憂所宜共誅故遂西連羌戎北懐匈奴單于不忘舊徳權立救助是時兵革並起往往而在臣非敢有所貪覬期於奉承宗廟興立社稷是以久僭號位十有餘年罪宜萬死陛下聖徳髙明躬率衆賢海内賔服恵及殊俗以胏附之故赦臣芳罪加以仁恩封為代王使備北藩無以報塞重責冀必欲和輯匈奴不敢遺餘力負恩貸謹奉天子玉璽思望闕庭隗嚻字季孟天水成紀人少仕州郡王莽簒自稱西州上將軍使通光武後復叛為漢兵討敗憤死盟文更始立嚻季父崔等起兵應漢推嚻為上將軍立漢廟與衆割牲而盟薶血加書一如古禮移檄郡國狥隴西諸郡皆下之凡我同盟三十一將十有六姓允承天道興輔劉宗如懐姦慮明神殛之髙祖文皇武皇禆墜厥命厥宗受兵族類滅亡移郡國檄漢復元年七月己酉朔己巳上將軍隗嚻白虎將軍隗崔左將軍隗義右將軍楊廣明威將軍王遵雲旗將軍周宗等告州牧部監郡卒正連率大尹尹尉隊大夫屬正屬令故新都侯王莽慢侮天地悖道逆理鴆殺孝平皇帝簒奪其位矯託天命偽作符書欺惑衆庶震怒上帝反戾飾文以為祥瑞戲弄神祇歌頌禍殃楚越之竹不足以書其惡天下昭然所共聞見今略舉大端以喻吏民盖天為父地為母禍福之應各以事降莽眀知之而冥昧觸冒不顧大忌詭亂天術援引史傳昔秦始皇毁壊諡法以一二數欲至萬世而莽下三萬六千嵗之厯言身當盡此度循亡秦之軌推無窮之數是其逆天之大罪也分裂郡國斷截地絡田為王田賣買不得規錮山澤奪民本業造起九廟窮極土作發冢河東攻刼丘壟此其逆地之大罪也尊任殘賊信用姦佞誅戮忠正覆按口語赤車奔馳法冠晨夜寃繫無辜妄族衆庶行炮烙之刑除順時之法灌以醇醯裂以五毒政令日變官名月易貨幣嵗改吏民昬亂不知所從商旅窮窘號泣市道設為六管増重賦斂刻剝百姓厚自奉養苞苴流行財入公輔上下貪賄莫相檢考民坐挟銅炭没入鍾官徒隸殷積數十萬人工匠飢死長安皆臭既亂諸夏狂心益悖北攻强胡南擾勁越西侵羌戎東摘濊貊使四境之外並入為害緣邉之郡江海之瀕滌地無類故攻戰之所敗苛法之所陷飢饉之所夭疾疫之所及以萬萬計其死者則露屍不掩生者則奔亡流散幼孤婦女流離係虜此其逆人之大罪也是故上帝哀矜降罰於莽妻子顛殞還自誅刈大臣反據亡形已成大司馬董忠國師劉歆衛將軍王涉皆結謀内潰司命孔仁納言嚴尤秩宗陳茂舉衆外降今山東之兵二百餘萬已平齊楚下蜀漢定宛洛據敖倉守函谷威命四布宣風中岳興滅繼絶封定萬國遵髙祖之舊制修孝文之遺徳有不從命武軍平之馳使四夷復其爵號然後還師振旅櫜弓卧鼓申命百姓各安其所庶無負子之責杜伯山令杜林字伯山客河西嚻以為持書平因疾告去辭還禄食嚻以林有志節且優容之乃出令林後歸光武杜伯山天子所不能臣諸侯所不能友盖伯夷叔齊恥食周粟今且從師友之位須道開通使順所志謝光武疏嚻受鄧禹署西州大將軍數出兵擊公孫述然心持兩端帝叵欲討之先遣諭㫖將從隴道伐蜀嚻疑懼勒兵侵三輔馮異祭遵等擊破之嚻上書謝有司以嚻言慢請誅其質子恂帝不忍復賜嚻書嚻遂稱臣於述封朔寧王吏人聞大兵卒至驚恐自救臣嚻不能禁止兵有大利不敢廢臣子之節親自追還昔虞舜事父大杖則走小杖則受臣雖不敏敢忘斯義今臣之事在於本朝賜死則死加刑則刑如遂蒙恩更得洗心死骨不朽光武賜嚻書昔柴將軍與韓信書云陛下寛仁諸侯雖有亡叛而後歸輒復位號不誅也以嚻文吏曉義理故復賜書深言則似不遜略言則事不決今若束手復遣恂弟歸闕庭者則爵祿獲全有浩大之福矣吾年垂四十在兵中十嵗厭浮語虚辭即不欲勿報後漢書袁宏漢紀云吾巳三十餘按光武本紀建武六年為年三十五魏文帝與吳質書光武言年已三十在軍十年方望楊用修云望見㡬亂邦托跡方外飄然行遁邈焉莫追賢于范増逺矣豈未考其終邪辭謝隗嚻書嚻既立為上將軍聘扶風平陵人方望為軍師更始遣使徴嚻望以更始未可知固止之不聽望與書辭去立前孺子劉嬰為天子更始遣丞相李和擊斬之足下將建伊吕之業𢎞不世之功而大事草創英雄未集以望異域之人疵瑕未露欲先崇郭隗想望樂毅故欽承大㫖順風不讓將軍以至徳尊賢廣其謀慮動有功發中權基業已定大勲方緝今俊乂並㑹羽翮比肩望無耆耉之徳而猥託賔客之上誠自愧也雖懐介然之節欲潔去就之分誠終不背其本貳其志也何則范蠡收責勾踐乗偏舟於五湖咎犯謝罪文公亦逡巡於河上夫以二子之賢勒名兩國猶削跡歸愆請命乞身望之無勞盖其宜也望聞烏氏有龍池之山微徑南通與漢相屬其傍時有竒人聊及閒暇廣求其真願將軍勉之後漢書同前漢紀足下將建伊吕之業任存亡之權大事草創雄傑未集以望異域之人疵瑕未曝於衆可且依託亦有所宗望知大指順風不讓幸賴將軍尊賢廣謀動有功發中權基業已定英傑雲集思為羽翮比肩是也望久以羈旅抱空資託賔客之上誠自愧也假望懐介然之節潔去就之分又不二其志矣何則范蠡收績於姑蘇狐犯謝罪於始入夫以二子之勤從君二十餘年蠡包七術之機犯為舅氏之親然至際㑹猶釋罪削迹請命乞身盖亦宜也望聞烏氏有龍池之山微徑南通與漢相連其旁有竒人聊及閒暇廣求其真願將軍勉之而已王遵字于春霸陵人與隗嚻將牛邯書邯字孺卿秋道人遵初從嚻舉兵常有歸漢意既詣京師拜太中大夫封向義侯建武八年光武率諸將西征數道上隴當屯長安遵知嚻必敗滅而與其將牛邯有舊以書喻之邯得書乃謝士衆歸命雒陽拜太中大夫遵與隗王歃盟為漢自經厯虎口踐履死地已十數矣于時周洛以西無所統壹故為王䇿欲東收關中北取上郡進以奉天人之用退以懲外夷之亂數年之間冀聖漢復存當挈河隴奉舊都以歸本朝生民以来臣人之埶未有便於此時者也而王之將吏羣居穴處之徒人人抵掌欲為不善之計遵與孺卿日夜所爭害㡬及身者豈一事哉前計抑絶後䇿不從所以吟嘯㧖腕垂涕登車幸蒙封拜得延論議每及西州之事未嘗敢忘孺卿之言今車駕大衆已在道路吳耿驍將雲集四境而孺卿以奔離之卒拒要㧖當軍衝視其形埶何如哉夫智者覩危思變賢者泥而不滓是以功名終申䇿畫復得故夷吾束縛而相齊黥布杖劍以歸漢去愚就義功名並著今孺卿當成敗之際遇嚴兵之鋒可為怖慄宜斷之心胷參之有識後漢書辛臣與田戎書汝南人田戎起兵南郡謀將歸漢乃順江入沔降岑彭使妻兄辛臣與長史留守臣盜戎珍寳及善馬從陸道詣彭曰謹説戎降因從彭營與戎書戎既以疑之又長吏檄至知臣盜寳物善焉由是益猜復反彭擊戎破之降公孫述封翼江王為漢將馮駿殺于江州岑將軍已奏我封五千户侯虚心相待願急来無拘前圖漢紀馮異字公孫潁川文城人封陽夏侯拜征虜將軍行天水太守事遺李軼書初軼與光武兄弟首謀結約及更始立心忌之軼日與大司馬朱鮪譖伯升見誅尋更始遣軼與鮪將兵守洛陽光武拜異孟津將軍與寇恂令拒鮪等異遺軼書軼雖知長安已危欲降又不自安報異書後不復與爭鋒異具以聞光武故宣露軼書鮪知之使刺殺軼愚聞眀鏡所以照形往事所以知今昔微子去殷而入周項伯畔楚而歸漢周勃迎代王而黜少帝霍光尊孝宣而廢昌邑彼皆畏天知命觀存亡之符見廢興之事故能成功於一時垂業於萬世也苟令長安尚可扶助延期歳月疏不間親遠不踰近季文豈能居一隅哉今長安壊亂赤眉臨郊王侯搆難大臣乖離綱紀已絶四方分崩異姓並起是故蕭王跋涉霜雪經營河北方今英俊雲集百姓風靡雖邠岐慕周不足以喻季文誠能覺悟成敗亟定大計論功古人轉禍為福在此時矣如猛將長驅嚴兵圍城雖有悔恨亦無及已後漢書同前漢紀馬武字子張更始時與尚書令謝躬等共攻王郎及謝躬誅歸光武愚聞眀鏡所以照形往事所以知今也昔微子去殷而入周項伯叛楚而歸漢周勃迎代王而黜少帝霍光尊孝宣而廢昌邑彼皆畏天知命重祖宗而憂萬民覩存亡之符效見廢興之必然故能成功於一時垂業於萬世今長安壊亂赤眉在郊王侯搆難大臣分離朝無紀綱而四方分崩異姓並起此劉氏之憂也故蕭王跋涉霜雪躬當矢石經營河北英俊雲集百姓歸往豳岐見慕不足為喻今馬子張皆復親幸爵位如此謝躬違戾伏辜如彼又明效也季文誠能覺悟亟斷大計論功古人轉禍為福在此時矣如猛將長驅嚴兵圍城雖有悔恨亦無及已矣李軼報馮異書字季文南陽宛人更始封為武隂王軼本與蕭王首謀造漢結死生之約同榮枯之計今軼守雒陽將軍鎮孟津俱據機軸千載一會思成斷金惟深達蕭王願進愚䇿以佐國安人後漢書結死生二句漢紀作約結死生邂逅中道别離惟下有有字願進作冀得光武報馮異書附季文多詐人不能得其要領今移其書告守尉當警備者漢紀東觀漢記曰軼多詐不信謝光武書異代鄧禹討三輔盜及蜀兵屢破之自以久在外不安願歸闕庭不許後人有章言異専制關中威權至重百姓歸心號為咸陽王帝以章示異異惶懼上書謝罪帝詔報之臣本諸生遭遇受命之㑹充備行伍過蒙恩私位大將爵通侯受任方面以立微功皆自國家謀慮愚臣無所能及臣伏自思惟以詔敕戰攻每輒如意時以私心斷决未嘗不有悔國家獨見之眀久而益逺乃知性與天道不可得而聞也當兵革始起擾攘之時豪傑競逐迷惑千數臣以遭遇託身聖明在傾危溷殽之中尚不敢過差而况天下平定上尊下卑而臣爵位所蒙巍巍不測乎誠冀以謹敕遂自終始見所示臣章戰慄怖懼伏念眀主知臣愚性固敢因緣自陳光武詔報馮異將軍之於國家義為君臣恩猶父子何嫌何疑而有懼意吳漢字子顔南陽宛人初仕更始安樂令歸光武厯拜大司馬封廣陵侯劾朱祐奏祐為建義大將軍討秦豐于黎陽帝使璽書招豐豐出惡言祐盡力攻豐窮困乃降大司馬呉漢劾奏祐違詔帝不加罪秦豐狡猾連年固守陛下親踰山川遠至黎丘開日月之信而豐悖逆天下所聞當伏誅滅以謝百姓祐不即斬截以示四方而廢詔命聽受豐降無將帥之任大不敬盖延字巨卿漁陽要陽人仕幽州從事與吳漢歸光武厯虎牙將軍封安平侯上光武疏臣幸得受干戈誅逆虜奉職未稱久留天誅常恐汙辱名號不及等論天下平定已後曽無尺寸可數不得預竹帛之編明詔深閔儆戒備具每事奉循詔命必不敢為國之憂也耿弇字伯昭扶風茂陵人為建威大將軍封好畤侯請還洛陽書帝詔弇進攻漁陽弇以父况據上谷本與彭寵同功又兄弟無在京師者自疑不敢獨進上書求詣洛陽詔報之大兵未會臣不能獨進且臣家屬皆在上谷京師無骨肉之親願得還洛陽光武報耿弇詔將軍出身舉宗為國所向陷敵功效猶著何嫌何疑而欲求徴且與王常共屯涿郡勉思方略並後漢書臧宫馬武宫字君翁潁川郏人為輔威將軍封期思侯武字子張南陽湖陽人更始時為振威將軍歸光武拜為捕虜將軍封陽虚侯請擊匈奴書匈奴饑疫自相分爭宫願得五千騎以立功未許乃與武上書欲命將臨塞厚縣購賞喻告髙句驪烏桓鮮卑攻其左發河西四郡天水隴西羌人擊其右以滅北虜帝詔報之自是諸將莫敢復言兵事匈奴貪利無有禮信窮則稽首安則侵盜緣邊被其毒痛内國憂其抵突虜今人畜疫死旱蝗赤地疫困之力不當中國一郡萬里死命懸在陛下福不再来時或易失豈宜固守文徳而墮武事乎今命將臨塞厚懸購賞喻告髙句驪烏桓鮮卑攻其左發河西四郡天水隴西羌胡擊其右如此北虜之滅不過數年臣恐陛下仁恩不忍謀臣狐疑令萬世刻石之功不立於聖世光武報詔黄石公記曰柔能制剛弱能制强柔者徳也剛者賊也弱者仁之助也强者怨之歸也故曰有徳之君以所樂樂人無徳之君以所樂樂身樂人者其樂長樂身者不久而亡舍近謀逺者勞而無功舍逺謀近者逸而有終逸政多忠臣勞政多亂人故曰務廣地者荒務廣徳者强有其有者安貪人有者殘殘滅之政雖成必敗今國無善政災變不息百姓驚惶人不自保而復欲逺事邉外乎孔子曰吾恐季孫之憂不在顓臾且北狄尚强而屯田警備傳聞之事恒多失實誠能舉天下之半以滅大寇豈非至願茍非其人不如息人後漢書任光字伯卿南陽宛人為左大將軍封阿陵侯擊王郎檄更始以光為信都太守王郎起兵邯鄲郡國皆降時光武為大司馬馳至信都光兵少乃多作檄文遣布鉅鹿界中旬日衆盛遂破邯鄲大司馬劉公將城頭子路刁子都兵百萬衆從東方来擊諸反虜東平爰曽字子路起兵廬城頭故號之刁子都東海人起兵鈔擊徐兖界邳彤字偉君信都人為後大將軍封靈夀侯厯左曹侍中報家屬書彤為世祖將兵信都復反為王郎所置信都王捕繫彤父弟及妻子使為手書呼彤曰降者封爵不降者族滅彤涕泣報書會更始所遣將攻拔信都彤家屬俱得免事君者不得顧家彤親屬所以至今得安於信都者劉公之恩也公方爭國事彤不得復念私也後漢書耿純字伯山鉅鹿宋子人拜前將軍封東光侯出為東郡太守報真定王劉揚書揚造作䜟記欲以惑衆建武二年遣純持節行赦令於幽冀勞慰王侯密敕曰劉揚若見因而收之純至真定傳舍揚以純真定宗室之出稱疾不肯来與純書欲令純往純報之揚出見純接以禮因延其兄弟皆入閉閣誅之奉使見王侯牧守不得先詣如欲面㑹宜出傳舍後漢書漢紀云不先往宜自强来來歙字君叔南陽新野人位中郎將贈征羌侯請擊公孫述書歙為中郎將將兵攻隗嚻破略陽詔使留屯長安監護諸將歙因上書復詔歙率馮異等擊破述乗勝遂進蜀人大懼使刺客刺歙未殊歙自書表抽刃而絶公孫述以隴西天水為藩蔽故得延命假息今二郡平蕩則述智計窮矣宜益選兵馬儲積資糧昔趙之將帥多賈人髙帝重之以懸賞今西州新破兵人疲饉若招以財穀則其衆可集臣知國家所給非一用度不足然有不得已也臨終上表臣夜人定後為何人所賊傷中臣要害臣不敢自惜誠恨奉職不稱以為朝廷羞夫理國以得賢為本太中大夫段襄骨鯁可任願陛下裁察又臣兄弟不肖終恐被罪陛下哀憐數賜教督竇融字周公扶風平陵人王莽時拜波水將軍歸漢封安豐侯涼州牧厯大司空責讓隗嚻書融受涼州牧遣弟友詣闕㑹嚻反叛道絶馳還復遣司馬席封間行通書光武賜融友書所以慰籍之甚備融既深知帝意乃與隗嚻書嚻不納融砥礪兵馬疏請師期帝深嘉美之乃賜融以外戚圖及太史公五宗外戚世家魏其侯列傳詔報之融被詔即與將兵入金城嚻子恂字伯春時為質於漢伏惟將軍國富政脩士兵懐附親遇阸會之際國家不利之時守節不囘承事本朝後遣伯春委身於國無疑之誠於斯有效融等所以欣服髙義願從役於將軍者良為此也而忿悁之間改節易圖君臣分爭上下接兵委成功造難就去從義為横謀百年累之一朝毁之豈不惜乎殆執事者貪功建謀以至於此融竊痛之當令西州地埶局廹人兵離散易以輔人難以自建計若失路不反聞道猶迷不南合子陽則北入文伯耳夫負虚交而易强禦恃逺救而輕近敵未見其利也融聞智者不危衆以舉事仁者不違義以要功今以小敵大於衆何如棄子徼功於義何如且初事本朝稽首北面忠臣節也及遣伯春垂涕相送慈父恩也俄而背之謂吏士何忍而棄之謂留子何自起兵以来轉相攻擊城郭皆為丘墟生人轉於溝壑今其存者非鋒刃之餘則流亡之孤迄今傷痍之恥未愈哭泣之聲尚聞幸賴天運少還而大將軍重復於難是使積痾不得遂瘳㓜孤將復流離其為悲痛尤足愍傷言之可為酸鼻庸人且猶不忍况仁者乎融聞為忠甚易得宜實難憂人太過以徳取怨知且以言獲罪也區區所獻惟將軍省焉後漢書公孫述字子陽盧芳字文伯詐稱武帝曽孫稱帝於安定同前漢紀將軍當厄㑹之際乗不利之時承事本朝委身於國忠孝冠周霍徳讓配吳札融等所以服髙義願為役者也忿悁之間改節易圖百年累之一朝毁之豈不惜乎殆執事者貪功建謀以至於此融竊痛之融聞智者不危衆以舉事仁者不違義以要利初事本朝稽首北面忠臣節也及遣伯春垂涕相送慈父恩也俄而背之謂吏士何忍而出之謂留子何自起兵以来轉相攻擊城郭皆為丘墟生民轉於溝壑今其存者非鋒刃之餘則流亡之孤今傷痍之體未愈哭泣之聲未絶幸賴天運少還而大將軍復重其難是使瘡痍不得遂瘳㓜孤復見流離庸人且為流涕况仁者乎願將軍省察之光武報竇融書每追念外屬孝景皇帝出自竇氏定王景帝之子朕之所祖昔魏其一言繼統以正長君少君尊奉師傅脩成淑徳施及子孫此皇太后神靈上天祐漢也從天水来者寫將軍所讓隗嚻書痛入骨髓畔臣見之當股慄慙愧忠臣則酸鼻流涕義士則曠若發矇非忠孝誠慤孰能如此豈其徳薄者所能克堪嚻自知失河西之助族禍將及欲設間離之説亂惑真心轉相解構以成其姦又京師百僚不曉國家及將軍本意多能採取虚偽誇誕妄談令忠孝失望傳言乖實毁譽之来皆不徒然不可不思今闗中盜賊已定大兵今當悉西將軍其抗厲威武以應期㑹魏其侯竇嬰竇太后從兄子長君太后兄少君竇廣徳太后弟封章武侯融七世祖請討隗嚻書帝將西征嚻先戒融期㑹遇雨道斷乃止融至姑臧被詔罷歸融恐大兵遂久不出乃上書帝深美之隗嚻聞車駕當西臣融東下士衆騷動計且不戰嚻將髙峻之屬皆欲逢迎大軍後聞兵罷峻等復疑嚻揚言東方有變西州豪傑遂復附從嚻又引公孫述將令守突門臣融孤弱介在其間雖承威靈宜速救助國家當其前臣融促其後緩急迭用首尾相資嚻埶排迮不得進退此必破也若兵不早進久生持疑則外長寇讎内示困弱復令讒邪得有因緣臣竊憂之惟陛下哀憐讓爵位疏融奏事京師恩寵在功臣之右遷大司空久不自安疏讓爵位光武不許臣融年五十三有子年十五質性頑鈍臣融朝夕教導以經藝不得令觀天文見讖記誠欲令恭肅畏事恂恂循道不願其有才能何况乃當傳以連城廣土享故諸侯王國哉議封皇子奏初巴蜀既平大司馬吳漢上書請封皇子不許十五年三月乃詔羣臣議大司空融固始侯通膠東侯復髙密侯禹太常登等奏議制可古者封建諸侯以藩屏京師周封八百同姓諸姬並為建國夹輔王室尊事天子享國永長為後世法故詩云大啟爾宇為周室輔髙祖聖徳光有天下亦務親親封立兄弟諸子不違舊章陛下徳横天地興復宗統褒徳賞勲親睦九族功臣宗室咸蒙封爵多受廣地或連屬縣今皇子賴天能勝衣趨拜陛下恭謙克讓抑而未議羣臣百姓莫不失望宜因盛夏吉時定號位以廣藩輔眀親親尊宗廟重社稷應古合舊厭塞衆心臣請大司空上輿地圖太常擇吉日具禮儀馬援字文淵扶風茂陵人為伏波將軍封新息侯上光武陳討隗嚻疏初援留西州嚻以援為綏徳將軍建武四年嚻使援奉書光武還盛稱帝於嚻遣子恂隨援入質會嚻意狐疑援以書數責之嚻怨援遂發兵拒漢援上疏帝乃召援計事臣援自念歸身聖朝奉事陛下本無公輔一言之薦左右為容之助臣不自陳陛下何因聞之夫居前不能令人輊居後不能令人軒與人怨不能為人患臣所恥也故敢觸冒罪忌昧死陳誠臣與隗嚻本實交友初嚻遣臣東謂臣曰本欲為漢願足下往觀之於汝意可即専心矣及臣還反報以赤心實欲導之於善非敢譎以非義而嚻自挟姦心盜憎主人怨毒之情遂歸於臣臣欲不言則無以上聞願聽詣行在所極陳滅嚻之術得空匈腹申愚䇿退就隴畝死無所恨上言塗城事援拜隴西太守時以金城破羌之西塗逺多寇議欲弃之援上書帝然其計破羌以西城多完牢易可依固其田土肥壤灌溉流通如令羌在湟中則為害不休不可棄也上正印文奏薦曉古文字者事下大司空正郡國印章奏可臣所假伏波將軍印書伏字犬外嚮成臯令印臯字為白下羊丞印四下羊尉印白下人人下羊即一縣長吏印文不同恐天下不正者多符印所以為信也所宜齊同上銅馬式表援好騎善别名馬於交趾得駱越銅鼓乃鑄為馬式表上之詔置宣徳殿下以為名馬式焉夫行天莫如龍行地莫如馬馬者甲兵之本國之大用安寧則以别尊卑之序有變則以濟逺近之難昔有騏驥一日千里伯樂見之昭然不惑近世有西河子輿亦明相法子輿傳西河儀長孺長孺傳茂陵丁君都君都傳成紀楊子阿臣援嘗師事子阿受相馬骨法考之於行事輒有驗效臣愚以為傳聞不如親見視景不如察形今欲形之於生馬則骨法難備具又不可傳之於後孝武皇帝時善相馬者東門京鑄作銅馬法獻之有詔立馬於魯班門外則更名魯班門曰金馬門臣謹依儀氏䩭中帛氏口齒謝氏脣鬐丁氏身中備此數家骨相以為法銅馬相法水火欲分眀水火在鼻兩孔間也上脣欲急而方口中欲紅而有光此馬千里頷下欲深下脣欲緩牙欲前向牙欲去齒一寸則四百里牙劒鋒則千里目欲滿而澤腹欲充膁欲小季肋欲長縣薄欲厚而緩縣薄股也腹下欲平滿汗溝欲深長而膝本欲起肘腋欲開膝欲方蹄欲厚三寸堅如石鬃欲戴中骨髙三寸頬欲開而膺下欲廣一尺以上能久走鞅欲方胷欲直而出鳬間欲開望之如雙鳬征尋陽山賊上書上大悦出示尚書數日黄門取頭蝨章持入東觀漢記除其竹林譬如嬰兒頭多蟣蝨而剃之請置封溪望海二縣奏西于縣户有三萬二千逺界去庭千餘里請為封溪望海二縣後漢書平交趾劾太守蘇定奏定果下獄東觀漢記太守蘇定張眼視錢䁋目討賊怯於戰功宜加切敕鑄錢書東觀漢記建武十六年援在隴西上書從之富民之本在於食貨宜如舊鑄五銖錢與隗嚻將楊廣書廣字春卿廣漢新都人蜀平自殺王元游翁来歙君叔初嚻與来歙馬援相善光武數使往来復遣歙説嚻子恂入朝而嚻將王元等不願内事及嚻拒漢帝使援將突騎游説嚻將下及羌虜以離嚻友黨援書與廣使曉勸於嚻不荅春卿無恙前别冀南寂無音驛援間還長安因留上林竊見四海己定兆民同情而季孟閉拒背畔為天下表的常懼海内切齒思相屠裂故遺書戀戀以致惻隱之計乃聞季孟歸罪于援而納王游翁諂邪之説自謂函谷以西舉足可定以今而觀竟何如邪援間至河内過存伯春見其奴吉從西方還説伯春小弟仲舒望見吉欲問伯春無他否竟不能言曉夕號泣宛轉塵中又説其家悲愁之狀不可言也夫怨仇可刺不可毁援聞之不自知泣下也援素知季孟孝友曽閔不過夫孝於其親豈不慈於其子可有于抱三木而跳梁妄作自同分羮之事乎季孟生平自言所以擁兵衆者欲以保全父母之國而完墳墓也又言茍厚士大夫而己而今所欲全者將破亡之所欲完者將毁傷之所欲厚者將反薄之季孟將折愧子陽而不受其爵今更共陸陸欲往赴之將難為顔乎若復責以重質當安從得子主給是哉往時子陽獨欲以王相待而春卿拒之今者歸老更欲低頭與小兒曹共槽櫪而食併肩側身於怨家之朝乎男兒溺死何傷而拘游哉今國家待春卿意深宜使牛孺卿與諸耆老大人共説季孟若計畫不從真可引領去矣前披輿地圖見天下郡國百有六所奈何欲以區區二邦以當諸夏百有四乎春卿事季孟外有君臣之義内有朋友之道言君臣邪固當諫爭語朋友邪應有切磋豈有知其無成而但萎腇咋舌义手從族乎及今成計殊尚善也過是欲少味矣且来君叔天下信士朝廷重之其意依依當獨為西州言援商朝廷尤欲立信於此必不負約援不得久留願急賜報後漢書又車丞相髙祖園寢郎一日九遷為丞相者知武帝恨誅衛太子上書訟之東觀漢記李善選注引載注云然日當為月字之誤也戒兄子書初援兄于嚴敦並喜譏議而通輕侠客援在交阯還書戒之本傳杜季良名保京兆人時為越騎司馬保仇人上書訟保為行浮薄伏波將軍萬里還書以戒兄子而梁松竇固以之交結將扇其輕偽敗亂諸夏帝召責松固以訟書及援戒書示之詔免保官龍伯髙名述亦京兆人為山都長由此擢拜零陵太守吾欲汝曹聞人過失如聞父母之名耳可得聞口不可得言也好議論人長短妄是非正法此吾所大惡也寧死不願聞子孫有此行也汝曹知吾惡之甚矣所以復言者施衿結褵申父母之戒欲使汝曹不忘之耳龍伯髙敦厚周慎口無擇言謙約節儉㢘公有威吾愛之重之願汝曹效之杜季良豪侠好義憂人之憂樂人之樂清濁無所失父喪致客數郡畢至吾愛之重之不願汝曹效也效伯髙不得猶為謹敕之士所謂刻鵠不成尚類鶩者也效季良不得陷為天下輕薄子所謂畫虎不成反類狗者也訖今季良尚未可知郡將下車輒切齒州郡以為言吾常為寒心是以不願子孫效也後漢書好論議人長短妄是非正法漢紀作如議論人長短是非效伯髙不得猶為謹敕之士作效龍伯髙之正不就效季良不得作效杜季良而不成耿舒弇第二弟初為復胡將軍封牟平侯與兄好畤侯弇論馬援書舒隨馬援擊武谿蠻蠻有二道一曰壺頭二曰充中舒上言先擊充中援以為延日廢糧遂攻壺頭賊乗髙守隘㑹夏暑吏士疫死援亦病困舒與弇書奏聞上遣梁松責問未至而援已死松毁援於上收將軍侯印綬前舒上書當先擊充糧雖難運而兵馬得用軍人數萬爭欲先奮今壺頭竟不得進大軍怫鬱行死誠可痛惜前到臨鄉賊無故自致若夜擊之賊可殄滅伏波類西域賈胡到一處輒止以是失利今皆如舒言後漢書難運漢紀作難致先奮作奮擊得進作得上朱勃字叔陽試守渭城宰終雲陽令訟馬援書援征武陵蠻失利病卒梁松帝壻也宿忿援因譖之帝遣收援新息侯印綬初援在交阯還嘗載薏苡實一車時以為南土珍怪至是松復密上書帝聞益怒援妻孥哀請乃得還葬前雲陽令同郡朱勃詣闕上書奏報得歸田里章帝時追賜勃子穀二千斛臣聞王徳聖政不忘人之功採其一美不求備於衆故髙祖赦蒯通而以王禮𦵏田横大臣曠然咸不自疑夫大將在外讒言在内微過輒記大功不計誠為國之所慎也故章邯畏口而奔楚燕將據聊而不下豈其甘心末規哉悼巧言之傷類也竊見故伏波將軍新息侯馬援拔自西州欽慕聖義間闗險難觸冒萬死孤立羣貴之間傍無一言之佐馳深淵入虎口豈顧計哉寧自知當要七郡之使徼封侯之福耶八年車駕西討隗嚻國計狐疑衆營未集援建宜進之䇿卒破西州及吳漢下隴冀路斷隔唯獨狄道為國堅守士民飢困寄命漏刻援奉詔西使鎮慰邉衆乃招集豪傑曉誘羌戎謀如湧泉埶如轉規遂救倒懸之急存㡬亡之城兵全師進因糧敵人隴冀略平而獨守空郡兵動有功師進輒克誅鋤先零緣入山谷猛怒力戰飛矢貫脛又出征交阯土多瘴氣援與妻子生訣無悔吝之心遂斬滅徴側克平一州間復南討立陷臨鄉師已有業未竟而死吏士雖疫援不獨存夫戰或以久而立功或以速而致敗深入未必為得不進未必為非人情豈樂久屯絶地不生歸哉惟援得事朝廷二十二年北出塞漠南渡江海觸冒害氣僵死軍事名滅爵絶國土不傳海内不知其過衆庶未聞其毁卒遇三夫之言横被誣罔之讒家屬杜門葬不歸墓怨隙並興宗親怖慄死者不能自列生者莫為之訟臣竊傷之夫明主醲於用賞約於用刑髙祖嘗與陳平金四萬斤以間楚軍不問出入所為豈復疑以錢穀間哉夫操孔父之忠而不能自免於讒此鄒陽之所悲也詩云取彼讒人投畀豺虎豺虎不食投畀有北有北不受投彼有昊此言欲令上天而平其惡唯陛下留思豎儒之言無使功臣懐恨黄泉臣聞春秋之義罪以功除聖王之祀臣有五義若援所謂以死勤事者也願下公卿平援功罪宜絶宜續以厭海内之望臣年已六十常伏田里竊感欒布哭彭越之義冒陳悲憤戰慄闕庭救狄道䇿東觀漢記隗嚻叛亂殺戮官吏唯狄道為國固守然民饑饉啖弩煮履宜救倒懸之急隗嚻叛亂一作西羌寇叛饉啖一作餓噉東漢文紀巻五
