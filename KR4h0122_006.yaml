body:
  text: 東漢文紀卷六明梅鼎祚編馮衍字敬通京兆杜陵人仕曲陽令司𨽻從事著賦誄銘說問交德誥慎情書記說自序官録說䇿五十篇說廉丹王莽時天下兵起遣更始將軍廉丹伐山東丹辟衍為掾至定陶莽詔責丹丹惶恐夜以書示之衍因說丹從入睢陽復說丹並不聽進與赤眉戰死按此范史雖不言書然其詞體實自書屬衍著有集衍聞順而成者道之所大也逆而功者權之所貴也是故期于有成不問所由論於大體不守小節昔者逢丑父伏軾而使其君取飲稱於諸侯鄭祭仲立突而出忽終得復位美於春秋蓋以死易生以存易亡君子之道也詭於衆意寧國存身賢智之慮也故易曰窮則變變則通通則久是以自天祐之吉無不利若夫知其不可而必行之破軍殘衆無補於主身死之日負義於時智者不為勇者不行且衍聞之得時無怠張良以五世相韓椎秦始皇博浪之中勇冠乎賁育名髙乎泰山將軍之先為漢信臣新室之興英俊不附今海內潰亂人懷漢德甚於詩人思召公也愛其甘棠而况子孫乎人所歌舞天必從之方今為將軍計莫若屯據大郡鎮撫吏士砥礪其節百里之內牛酒日賜納雄桀之士詢忠智之謀要將來之心待縱橫之變興社稷之利除萬人之害則福祿流於無窮功烈著於不滅何與軍覆於中原身膏於草野功敗名喪恥及先祖哉聖人轉禍而為福智士因敗而為功願眀公深計而無與俗同後漢紀海內潰亂下有百姓塗炭一句復說廉丹蓋聞明者見於無形智者慮於未萌況其昭晳者乎凡患生於所忽禍發於細微敗不可悔時不可失公孫鞅曰有髙人之行負非于世有獨見之慮見贅于人故信庸庸之論破金石之䇿襲當世之操失髙明之德夫決者智之君也疑者事之役也時不重至公勿再計後漢紀贅作疑與田邑書更始以鮑永為尚書僕射將兵安集河東永以馮衍為立漢將軍與上黨太守田邑扞衛并土光武即位遣劉延攻邑天井關與邑連戰延不得進邑迎母弟妻子為延所獲更始敗乃詣洛陽降即拜邑上黨太守因遣使招永與衍衍等疑不肯降而忿邑畔前約乃遺邑書邑報之衍不從永遣弟及壻張舒誘降涅城舒家在上黨邑悉繫之又以書勸永降永不答後知更始已殁乃共罷兵降于河內帝怨衍等不時至永以立功得贖遂任用之衍獨見黜蓋聞晉文出奔而子犯宣其忠趙武逢難而程嬰眀其賢二子之義當矣今三王背畔赤眉危國天下蟻動社稷顛隕是忠臣立功之日志士馳馬之秋也伯玉擢選剖符専宰大郡夫上黨之地有四塞之固東帶三關西為國蔽奈何舉之以資强敵開天下之胸假仇讎之刃豈不哀哉衍聞之委質為臣無有二心挈瓶之智守不假器是以晏嬰臨盟擬以曲㦸不易其辭謝息守郕脅以晉魯不喪其邑由是言之內無鉤頸之禍外無桃萊之利而被畔人之聲蒙降城之恥竊為左右羞之且邾庶其竊邑畔君以要大利曰賤而必書莒牟夷以土地求食而名不滅是以大丈夫動則思禮行則思義未有背此而身名能全者也為伯玉深計莫若與鮑尚書同情戮力顯忠貞之節立超世之功如以尊親係纍之故能捐位投命歸之尚書大義既全敵人紓怨上不損剖符之責下足救老幼之命申眉髙談無愧天下若乃貪上黨之權惜全邦之實衍恐伯玉必懷周趙之憂上黨復有前年之禍昔晏平仲納延陵之誨終免欒髙之難孫林父違穆子之戒故陷終身之惡以為伯玉聞此至言必若刺心自非嬰城而堅守則䇿馬而不顧也聖人轉禍而為福智士因敗以成勝願自强于時無與俗同同前今以一節之任建三軍之威豈能寵其八尺之竹氂牛之尾也太平御覽田邑報馮衍書邑字伯玉馮翊人厯漁陽太守僕雖駑怯亦欲為人者也豈茍貪生而畏死哉曲㦸在頸不易其心誠僕志也間者老母諸弟見執于軍而邑安然不顧者豈非重其節乎若使人居天地夀如金石要長生而避死地可也今百齡之期未有能至老壯之間相去幾何誠使故朝尚在忠義可立雖老親受戮妻兒橫分邑之願也間者上黨黠賊大衆圍城義兵兩輩入據井陘邑親潰敵圍拒擊宗正自試智勇非不能當誠知故朝為兵所害新帝司徒已定三輔隴西北地從風響應其事昭昭日月經天河海帶地不足以比死生有命富貴在天天下存亡誠云命也邑雖沒身能如命何人道之本有恩有義義有所宜恩有所施君臣大義母子至恩今故主已亡義其誰為老母拘執恩所當留而厲以貪權誘以䇿馬抑其利心必其不顧何其愚乎邑年三十厯位卿士性少嗜欲情厭事為况今位尊身危財多命殆鄙人知之何疑君子君長敬通揭節垂組自相署立蓋仲由使門人為臣孔子議其欺天君長據位兩州加以一郡而河東畔國兵不入彘上黨見圍不窺大谷宗正臨境莫之能援兵威屈辱國權日損三王背畔赤眉害主未見兼行倍道之赴昔墨翟纍繭救宋申包胥重胝存楚衛女馳歸唁兄之志主亡一嵗莫知定所虛冀妄言茍肆鄙塞未能事生安能事死未知為臣焉知為主豈厭為臣子思為君父乎欲搖太山而蕩北海事敗身危要思邑言後漢書宗正劉延司徒鄧禹與鮑永書永字君長上黨屯留人為更始大將軍歸光武厯司𨽻校尉兗州牧愚聞大丈夫不釋故而改圖哲士不徼幸而出危今君長故主敗不能死新帝立不肯降擁衆而據壁欲聚六國之從與邑同事一朝內為刎頸之盟興兵背畔攻取涅城破君長之國壞父母之鄉首難結怨輕弄凶器人心難知何意君長當為此計昔者韓信將兵無敵天下功不世出略不再見威執項羽名出髙帝不知天時就烹于漢智伯分國既有三晉欲大無已身死地分頭為飲器君長銜命出征擁帶徒士上黨厄不能救河東畔不能取朝有顛沛之憂國有分崩之禍上無仇牧之節下無不占之志天之所壞人不能支君長將兵不與韓信同日而論威行得衆不及智伯萬分之半不見天時不知厭足欲眀人臣之義當先知故主之未然欲貪天下之利宜及新主之未為故主已敗新主既成四海為羅網天下為敵人舉足遇害動搖觸患履深淵之薄氷不為啼涉千鈞之發機不為懼何如其智也絶鮑氏之姓廢子都之業誦堯之言服桀之行悲夫命也張舒內行邪孽外遵孝友疏其父族外附妻黨已收三族將行其法能逃不自詣者舒也能夷舒宗者豫也東觀漢記奏記鄧禹衍更始時為偏將軍與鮑永相善更始既敗固守不以時下建武初為揚化大將軍掾辟鄧禹府數奏記於禹陳政言事按此出東觀漢記者范曄後漢書馮衍傳更始二年遣尚書僕射鮑永行大將軍事安集北方衍因以計說永曰衍聞明君云云永既素重衍且受使得自置偏禆乃以衍為立漢將軍領狼孟長屯太原與上黨太守田邑等繕甲養士扞衛并土唐章懷太子李賢引東觀記注云自明君以下皆是諫鄧禹之詞非勸鮑永之說不知何據有此乖違然曄敘事頗與存撫并州之文相應鄧禹建武元年自箕關入定河東承制鎮撫又渡汾隂河入陽夏亦并土也書云長驅武關者莽末下江兵攻武關破莽九虎將軍等則更始時事且建武元年衍未辟禹府是後又不聞禹事并州俱屬可疑衍聞明君不惡切慤之言以測幽冥之論忠臣不顧爭引之患以達萬機之變是故君臣兩興功名兼立銘勒金石令問不忘今衍幸逢寬明之日將值危言之時豈敢拱默避罪而不竭其誠哉伏念天下離王莽之害久矣始自東郡之師繼以西海之役巴蜀沒於南夷緣邉破於北狄逺征萬里暴兵纍年禍拿未解兵連不息刑法彌深賦斂愈重衆彊之黨橫擊於外百僚之臣貪殘於內元元無聊飢寒並臻父子流亡夫婦離散廬落丘墟田疇蕪穢疾疫大興灾異蜂起於是江湖之上海岱之濵風騰波湧更相駘藉四垂之人肝腦塗地死亡之數不啻大半殃咎之毒痛入骨髓匹夫僮婦咸懷怨怒皇帝以聖德靈威龍興鳯舉率宛葉之衆將散亂之兵喢血昆陽長驅武關破百萬之陳摧九虎之軍靁震四海席捲天下攘除禍亂誅滅無道一朞之間海內大定繼髙祖之休烈修文武之絶業社稷復存炎精更輝德冠往初功無與二天下自以去亡新就聖漢當蒙其福而賴其願樹恩布德易以周洽其猶順驚風而蜚鴻毛也然而諸將虜掠逆倫絶理殺人父子妻人婦女燔其室屋略其財産飢者毛食寒者踝跣結寃失望無所歸命今大將軍以明淑之德秉大使之權統三軍之政存撫并州之人惠愛之誠加乎百姓髙世之聲聞乎羣士故其延頸企踵而望者非特一人也且大將軍之事豈特圭璧其行束修其心而已哉將定國家之大業成天地之元功也昔周宣中興之主齊桓霸彊之君耳猶有申伯召虎夷吾吉甫攘其蝥賊安其疆宇况乎萬里之漢明帝復興而大將軍為之梁棟此誠不可以忽也且衍聞之兵久則力屈人愁則變生今邯鄲之賊未滅真定之際復擾而大將軍所部不過百里守城不休戰軍不息兵革雲翔百姓震駭奈何自怠不為深憂夫并州之地東帶名關北逼彊胡年穀既孰人庶多資斯四戰之地攻守之場也如其不虞何以待之故曰德不素積人不為用備不豫具難以應卒今生人之命縣於將軍將軍所仗必須良才宜改易非任更選賢能夫十室之邑必有忠信審得其人以承大將軍之明則雖山澤之人無不感德思樂為用矣然後簡精鋭之卒發屯守之士三軍既整甲兵已具相其土地之饒觀其水泉之利制屯田之術習戰射之教則威風逺暢人安其業矣若鎮太原撫上黨收百姓之歡心樹名賢之良佐天下無變則足以顯聲譽一朝有事則可以建大功惟大將軍開日月之明發深淵之慮監六經之論觀孫吳之䇿省羣議之是非詳衆士之白墨以超周南之迹垂甘棠之風令夫功烈施于千載富貴傳于無窮伊望之䇿何以加兹東觀漢記今邯鄲之賊未滅真定之際復擾注云邯鄲謂王郎真定謂劉揚鼎按即以更始二年誅滅真定王劉揚與弟臨邑侯讓謀反耿純誅之事在光武建武二年兩不同時若如後漢書為更始二年衍說永亦不得言真定為揚也說鄧禹書衍聞昔者先王學大道以觀於政夫為君而不明於道上無所承天下無以化民為臣而不明於道進無以事君退無以修身聖朝天然之資將軍純茂之德誠少游神乎經書之林馳情乎𤣥妙之中明照於日月而智溢於四海聖朝享堯舜之榮將軍荷稷契之烈自然理也藝文類聚與鄧禹箋今日裘與簑孰急見雨則裘不用上堂則簑不御此更為適者也今敬通逢堂簑之不御也馮衍集與鄧禹書衍以為寫神輸意則聊城之說碧雞之辨不足難也選注選注又引衍說禹書云左平山東右匡社稷又書夫虎豹愛大林蛟龍愛大水太平御覽與隂就書就南陽新野人光烈皇后弟封新陽侯位特進坐子事自殺就等以外戚貴顯深敬重衍衍與就書尋為司𨽻從事帝懲西京外戚賔客故皆以法繩之衍由此得罪自詣獄赦不問時衍又與就書西歸故郡不敢復與親故通衍聞神龍驤首幽雲景蒸明聖修德志士思名是以意同情合聲比相應也伏見君侯忠孝之性慈仁殷勤論議周密思慮深逺顧以微賤數蒙聖恩被侯大惠衍年老被病恐一旦無祿命先犬馬懷抱不報齎恨入冥思剖肝膽有以塞責方今天下安定四海咸服蒙恩更生之臣無以效其死力側聞東平山陽王壯當之國擇除官屬衍不自量願侯白以衍備門衛鄙語曰水不激不能破舟矢不激不能飲羽不念舊惡名賢所髙負責之臣欲言不敢惟侯哀憐深留聖心則闔棺之日魂復何恨東平王蒼山陽王荆出獄後與隂就書衍材素愚駑行義蕪穢外無鄉里之譽內無汗馬之勞猥䝉明府天覆之德華寵重疊間者掾史疑衍之罪衆喣飄山當為灰土賴蒙明察揆其素行復保首領倍知厚德篤於慈父浸淫肌膚滲漉骨髓德重山嶽澤深河海前送妻子還淄縣遭雨逢暑以七月還至陽武聞詔捕諸王賔客惶怖詣闕冀先事自歸十一日到十二日書報歸田里即日束手詣洛陽詔獄十五日夜詔書勿問得出遭雨又疾大困冀髙世之德施以田子老馬之惠贈以秦穆駿馬之恩使長有依歸以效忠心與婦弟任武達書衍妻北地女任氏悍忌不得畜媵妾兒女常自操井臼衍與婦弟武達書後竟逐之天地之性人有喜怒夫婦之道義有離合先聖之禮士有妻妾雖宗之眇微尚欲踰制年衰嵗暮恨入黃泉遭遇嫉妒家道崩壞五子之母足尚在門五年已來日甚嵗劇以白為黑以非為是造作端末妄生首尾無罪無辜讒口嗷嗷亂匪降天生自婦人青蠅之心不重破國嫉妬之情不憚喪身牝雞之晨維家之索古之大患今始於衍醉飽過差輒為桀紂房中調戲布散海外張目抵掌以有為無痛徹蒼天毒流五臟愁令人不賴生忿令人不顧禍入門著牀繼嗣不育紡績織紝了無女工家貧無僮賤為匹夫故舊見之莫不悽愴曽無憫惜之恩惟一婢武達所見頭無叉珥面無脂澤形骸不蔽手足抱土不原其窮不揆其情跳梁大叫呼若入冥販糖之妾不忍其態計婦當去久矣念兒曹小家無宅使哀憐姜豹常為奴婢惻惻焦心事事腐腸訩訩籍籍不可聽聞暴虐此婢不死如髮半年之間膿血橫流婢病之後姜竟舂炊豹又觸冒泥塗心為愴然縑榖放散冬衣不補端坐化亂一縷不貫既無婦道又無母儀忿見侵犯恨見狼藉依倚鄭令如居天上持質相劫詞語百車劒㦸在門何暇有讓百弩環舍何可彊復舉宗達人解說詞如循環口如布穀縣幡竟天擊鼓動地心不為惡身不為搖耳宜詳居錯且自為計無以上書告訴相恐狗吠不驚自信其情不去此婦則家不寧不去此婦則家不清不去此婦則福不生不去此婦則身不榮不去此婦則事不成吾數竒命薄端相逢遭自恨以華盛時不早自定至於垂白家貧身賤之日養癰長疽自生禍殃衍以室家紛然之故損棄衣冠側身山野絶交游之路杜仕宦之門闔門不出心専耕耘以求衣食何敢有功名之路哉豹衍子姜衍女頭無叉珥面無脂澤一作頭無叉澤面無脂粉後漢書注無不去此婦則身不榮二句選注有衍答任武達書云敢不露陳宿昔之意與宣孟書衍子豹字仲文年十二母為父所出後母欲行毒害豹逃得免此書所言是其後母觀其書意似此妻又見出居室之義人之大倫思厚歡和之節樂定金石之固又自傷前遭不良此有去兩婦之名事誠不得不然豈中心之所好哉並馮衍集上光武自陳疏衍為司𨽻從事坐交結外戚隂氏得罪赦出獄西歸故郡建武末上書自陳書奏猶以前過不用臣伏念髙祖之略而陳平之謀毁之則疏譽之則親以文帝之明而魏尚之忠繩之以法則為罪施之以德則為功逮至晚世董仲舒言道德見妒於公孫𢎞李廣奮節於胸奴見排于衛青此忠臣之常所為流涕也臣衍自惟微賤之臣上無無知之薦下無馮唐之說乏董生之才寡李廣之勢而欲免讒口濟怨嫌豈不難哉臣衍之先祖以忠貞之故成私門之禍而臣衍復遭擾攘之時值兵革之際不敢回行求時之利事君無傾邪之謀將帥無虜掠之心衛尉隂興敬慎周密內自修敕外逺嫌疑故敢與交通興知臣之貧數欲本業之臣自惟無三益之才不欲處三損之地固讓而不受之昔在更始太原執貨財之柄居倉卒之間據位食祿二十餘年而財産嵗狹居處日貧家無布帛之積出無輿馬之飾於今遭清明之時飭躬力行之秋而怨讎叢興譏議橫世蓋富貴易為善貧賤難為功也疏遠壠畝之臣無望髙闕之下惶恐自陳以救罪尤顯志賦序論衍既見廢不得志退而作賦自論曰馮子以為大人之德不碌碌如玉落落如石風興雲蒸一龍一蛇與道翺翔與時變化夫豈守一節哉用之則行舍之則藏進退無主屈伸無常故曰有法無法因時為業有度無度與物趣舍常務道德之實而不求當世之名闊略杪小之禮蕩佚人間之事正身直行恬然肆志顧常好俶儻之䇿時莫能聽用其謀喟然長歎自傷不遭久棲遲於小官不得舒其所懷抑心折節意悽情悲夫伐氷之家不利雞豚之息委積之臣不操市井之利况厯位食祿二十餘年而財産益狹居處益貧惟夫君子之仕行其道也慮時務者不能興其德為身求者不能成其功去而歸家復羇旅於州郡身愈據職家彌窮困卒離飢寒之灾有喪元子之禍先將軍葬渭陵哀帝之崩也營之以為園於是以新豐之東鴻門之上夀安之中地藝髙敞四通廣大南望酈山北屬涇渭東瞰河華龍門之陽三晉之路西顧豐鄗周秦之丘宫觀之墟通視千里覽見舊都遂定塋焉退而幽居蓋忠臣過故墟而歔欷孝子入舊室而哀歎每念祖考著盛德于前垂鴻烈于後遭時之禍墳墓蕪穢春秋蒸嘗昭穆無列年衰嵗暮悼無成功將西田牧肥饒之野殖生産修孝道營宗廟廣祭祀然後闔門講習道德觀覽乎孔老之論庶幾乎松喬之福上隴阪陟髙岡游精宇宙流目八紘厯觀九州山川之體追覽上古得失之風愍道陵遲傷德分崩夫覩其終必原其始故存其人而詠其道疆理九野經營五山眇然有思陵雲之意乃作賦自厲命其篇曰顯志顯志者言光明風化之情昭章𤣥妙之思也杖銘杖莫如信行莫如仁惠而無實怨及爾身趙武之珍子罕之寶二子之迹蓋近於道車銘乘車必護輪治國必愛民車無輪安處國無民誰與杯銘樂則思舊燕則思歡民之失德乾餱以愆玉海載衍爵銘富如江海夀配列真刀陽銘修爾甲兵用戒不虞見危致命臨事而懼文不可匿武不可黷文武孔純荷天子祿刀隂銘溫溫穆穆配天之威苗裔無疆福報永綏元正銘初學記元正上日百福孔靈班彪字叔皮扶風安陵人仕徐令後察司徒廉為望都長所著賦論書記奏事各九篇王命論更始敗光武即位冀州時隗嚻擁衆天水彪避亂從之嚻問彪曰往者周亡戰國並爭意者從橫之事復起於今乎將承運迭興在于一人也彪對以周與漢異今雄桀帶州域者皆無七國世業之資而百姓謳吟思漢既疾嚻言又傷時方艱乃著王命論欲以感之而嚻終不寤遂往依竇融為從事隨融還京師昔在帝堯之禪曰咨爾舜天之厯數在爾躬舜亦以命禹暨于稷契咸佐唐虞光濟四海奕世載德至於湯武而有天下雖其遭遇異時禪代不同至於應天順人其揆一也是故劉氏承堯之祚氏族之世著于春秋唐據火德而漢紹之始起沛澤則神母夜號以彰赤帝之符由是言之帝王之祚必有明聖顯懿之德豐功厚利積纍之業然後精誠通於神明流澤加於生民故能為鬼神所福饗天下所歸往未見運世無本功德不紀而得崛起在此位者也世俗見髙祖興於布衣不達其故以為適遭暴亂得奮其劒游說之士至比天下於逐鹿幸捷而得之不知神器有命不可以智力求悲夫此世之所以多亂臣賊子者也若然者豈徒暗於天道哉又不覩之於人事矣夫餓饉流𨽻飢寒道路思有裋褐之襲儋石之蓄所願不過一金終於轉死溝壑何則貧窮亦有命也况乎天子之貴四海之富神明之祚可得而妄處哉故雖遭罹厄會竊其權柄勇如信布彊如梁籍成如王莽然卒潤鑊伏鑕烹醢分裂又况么䯢不及數子而欲暗奸天位者乎是故駑蹇之乘不騁千里之塗燕雀之疇不奮六翮之用楶棁之材不荷棟梁之任斗筲之子不秉帝王之重易曰鼎折足覆公餗不勝其任也當秦之末豪桀並起共推陳嬰而王之嬰母止之曰自吾為子家婦而世貧賤今卒富貴不祥不如以兵屬人事成少受其利不成禍有所歸嬰從其言而陳氏以寧王陵之母亦見項氏之必亡而劉氏之將興也是時陵為漢將而母獲於楚有漢使來陵母見之謂曰願告吾子漢王長者必得天下子謹事之無有二心遂對漢使伏劒而死以固勉陵其後果定於漢陵為漢宰相封侯夫以匹婦之明猶能推事理之致探禍福之機而全宗祀於無窮垂䇿書於春秋而况大丈夫之事乎是故窮達有命吉凶由人嬰母知廢陵母知興審此二者帝王之分決矣蓋在髙祖其興也有五一曰帝堯之苗裔二曰體貌多竒異三曰神武有徴應四曰寬眀而仁恕五曰知人善任使加之以信誠好謀達於聽受見善如不及用人如由己從諫如順流趣時如響起當食吐哺納子房之䇿拔足揮洗揖酈生之說悟戍卒之言斷懷土之情髙四皓之名割肌膚之愛舉韓信於行陳收陳平於亡命英雄陳力羣䇿畢舉此髙祖之大略所以成帝業也若乃靈瑞符應又可略聞矣初劉媪妊髙祖而夢與神遇震電晦冥有龍蛇之怪及其長而多靈有異於衆是以王武感物而折契吕公覩形而進女秦皇東遊以厭其氣吕后望雲而知所處始受命則白蛇分西入關則五星聚故淮隂留侯謂之天授非人力也厯古今之得失驗行事之成敗稽帝王之世運考五者之所謂取舍不厭斯位符瑞不同斯度而茍昧於權利越次妄據外不量力內不知命則必喪保家之主失天年之夀遇折足之凶伏斧鉞之誅英雄誠知覺悟畏若禍戒超然逺覽淵然深識收陵嬰之明分絶信布之覬覦距逐鹿之瞽說審神器之有授貪不可冀無為二母之所笑則福祚流於子孫天祿其永終矣前史得失論彪既才髙而好述作以史記自太初以後闕而不録乃繼採遺事傍貫異聞作後傳數十篇因斟酌前史譏正得失其略論曰唐虞三代詩書所及世有史官以司典籍暨於諸侯國自有史故孟子曰楚之檮杌晉之乘魯之春秋其事一也定哀之間魯君子左丘明論集其文作左氏傳三十篇又撰異同號曰國語二十篇由是乘檮杌之事遂暗而左氏國語獨章又有記録黃帝以來至春秋時帝王公侯卿大夫號曰世本一十五篇春秋之後七國並爭秦併諸侯則有戰國䇿三十三篇漢興定天下太中大夫陸賈記録時功作楚漢春秋九篇孝武之世太史令司馬遷採左氏國語删世本戰國䇿據楚漢列國時事上自黃帝下訖獲麟作本紀世家列傳書表凡百三十篇而十篇缺焉遷之所記從漢元至武則以紀其功也至於採經托傳分散百家之事甚多疏略不知其本務欲以多聞廣載為功論議淺而不篤其論術學則崇黃老而薄五經序貨殖則輕仁義而羞貧窮道游俠則賤守節而貴俗功此其大敝傷道所以遇極刑之咎也然善述序事理辨而不華質而不野文質相稱蓋良史之才也誠令遷依五經之法言同聖人之是非意亦庶幾矣夫百家之書猶可法也若左氏國語世本戰國䇿楚漢春秋太史公書今之所以知古後之所由觀前聖人之耳目也司馬遷序帝王則曰本紀公侯傳國則曰世家卿士特起則曰列傳又進項羽陳涉而黜淮南衡山細意委曲條例不經若遷之著述採獲古今貫穿經傳至廣博也一人之精文重思煩故其書刋落不盡尚有盈辭多不齊一若序司馬相如舉郡縣著其字至蕭曹陳平之屬及董仲舒並時之人不記其字或縣而不郡者蓋不暇也今此後篇慎核其事整齊其文不為世家唯紀傳而已傳曰殺史見極平易正直春秋之義也請置太子諸王官屬書建武中彪辟司徒玉况府時東宫初建王國並開而官屬未備師保多闕彪書奏光武納之孔子稱性相近習相遠也賈誼以為習與善人居不能無為善猶生長於齊不能無齊言也習與惡人居不能無惡猶生長於楚不能無楚言也是以聖人審所與居而戒慎所習昔成王之為孺子出則周公召公太史佚入則太顛閎夭南宫括散宜生左右前後禮無違者故成王一日即位天下曠然太平是以春秋愛子教以義方不納于邪驕奢淫佚所自邪也詩云貽厥孫謀以宴翼子言武王之謀遺子孫也漢興太宗使鼂錯導太子以法術賈誼教梁王以詩書及至中宗亦令劉向王褒蕭望之周堪之徒以文章儒學保訓東宫以下莫不崇簡其人就成德器今皇太子諸王雖結髮學問修習禮樂而傅相未置賢才官屬多闕舊典宜博選名儒有威重明通政事者以為太子太傅東宫及諸王國備置官屬又舊制太子食湯沐十縣設周衛交㦸五日一朝因坐東廂省視膳食其非朝日使僕中允旦旦請問而已明不媟黷廣其敬也北堂書鈔班彪便宜表云宜選師傅將相子孫好學有行者備絳衣舍人上言凉州降羌更始赤眉之際滇良羌寇金城隴西隗嚻因發其衆以拒漢嚻死司徒掾班彪上言光武以牛邯為護羌校尉今凉州部皆有降羌羌胡被髮左衽而與漢人雜處習俗既異言語不通數為小吏黠人所見侵奪窮恚無聊故致反叛夫蠻夷寇亂皆為此也舊制益州部置蠻夷騎都尉幽州部置領烏桓校尉凉州部置護羌校尉皆持節領護理其怨結嵗時循行問所疾苦又數遣使譯通動靜使塞外羌夷為吏耳目州郡因此可得警備今宜復如舊以明威防上言置烏桓校尉建武末烏桓大人郝旦等皆居塞內緣邉諸郡為漢偵候助擊胸奴鮮卑彪上言帝復置校尉於上谷寧城烏桓天性輕黠好為寇賊若久放縱而無總領者必復侵掠居人但委主降掾史恐非所能制臣愚以為宜復置烏桓校尉誠有益於附集省國家之邊慮奏答北胸奴書薁鞬左賢王初為南部所獲逃歸北立為北單于建武末見南單于來附遣使詣闕貢馬更乞和親并請音樂又求率西域諸國胡客與俱獻見詔下三府議彪為司徒掾奏言今既未獲助南則亦不宜絶北羈縻之路報答之辭令必有適立草并上光武因悉從之臣聞孝宣皇帝敕邊守尉曰胸奴大國多變詐交接得其情則却敵折衝應對入其數則反為輕欺今北胸奴見南單于來附懼謀其國故數乞和親又遠驅牛馬與漢合市重遣名王多所貢獻斯皆外示富强以相欺誕也臣見其獻益重知其國益虛歸親愈數為懼愈多然今既未獲助南則亦不宜絶北羈縻之義禮無不答謂可頗加賞賜略與所獻相當明加曉告以前世呼韓邪郅支行事報答之辭令必有適今立藳草并上曰單于不忘漢恩追念先祖舊約欲修和親以輔身安國計議甚髙為單于嘉之往者胸奴數有乖亂呼韓邪郅支自相讎隙並蒙孝宣皇帝垂恩救護故各遣侍子稱藩保塞其後郅支忿戾自絶皇澤而呼韓附親忠孝彌著及漢滅郅支遂保國傳嗣子孫相繼今南單于携衆向南欵塞歸命自以呼韓嫡長次第當立而侵奪失職猜疑相背數請兵將歸掃北庭䇿謀紛紜無所不至惟念斯言不可獨聽又以北單于比年貢獻欲修和親故拒而未許將以成單于忠孝之義漢秉威信總率萬國日月所照皆為臣妾殊俗百蠻義無親疏服順者褒賞畔逆者誅罰善惡之效呼韓郅支是也今單于欲修和親欵誠已達何嫌而欲率西域諸國俱來獻見西域國屬胸奴與屬漢何異單于數連兵亂國內虛耗貢物裁以通禮何必獻馬裘今齎雜繒五百匹弓鞬韥丸一矢四發遣遺單于又賜獻馬左骨都侯右谷蠡王雜繒各四百匹斬馬劒各一單于前言先帝時所賜呼韓邪竽瑟空篌皆敗願復裁賜念單于國尚未安方厲武節以戰攻為務竽瑟之用不如良弓利劒故未以齎朕不愛小物於單于便宜所欲遣驛以聞後漢書太學奏藝文臣聞師曰大學明堂辟雍者禮樂之府詩書之林也與京兆丞郭季通書劉龔字孟公善論議扶風馬援班彪並器重之劉孟公藏器於身用心篤固實瑚璉之器宗廟之寶也三輔决録注與金昭卿書遠在東垂吏道迫促李善文選注張華詩吏道何其迫窘然坐自拘啓事官吏二千石布襦羊裘以白木杯飲食飾虛詐欲以求名干譽太平御覽申屠剛字巨卿扶風茂陵人平帝時避地河西歸漢拜尚書令終大中大夫賢良䇿剛仕郡功曹平帝時王莽専政隔絶帝外家馮衛二族不得交官剛常疾之及舉賢良方正因對䇿莽令太后下詔臣聞王事失則神祇怨怒姦邪亂正故隂陽謬錯此天所以譴告王者欲令失道之君曠然覺悟懷邪之臣懼然自刻者也今朝廷不考功校德而虛納毁譽數下詔書張設重法抑斷誹謗禁割論議罪之重者乃至腰斬傷忠臣之情挫直士之鋭殆乖建進善之旌縣敢諫之鼓闢四門之路眀四目之義也臣聞成王幼少周公攝政聽言下賢均權布寵無舊無新唯仁是親動順天地舉措不失近則召公不悅逺則四國流言夫子母之性天道至親今聖主幼小始免繦褓即位以來至親分離外戚杜隔恩不得通且漢家之制雖任英賢猶援姻戚親疏相錯杜塞間隙誠所以安宗廟重社稷也今馮衛無罪久廢不録或處窮僻不若民庶誠非慈愛忠孝承上之意夫為人後者自有正義至尊至卑其藝不嫌是以人無賢愚莫不為怨姦臣賊子以之為便不諱之變誠難其慮今之保傅非古之周公周公至聖猶尚有纍何况事失其衷不合天心者哉昔周公先遣伯禽守封於魯以義割恩寵不加後故配天郊祀三十餘世霍光秉政輔翼少主修善進士名為忠直而尊崇其宗黨摧抑外戚結貴據權至堅至固終沒之後受禍滅門方今師傳皆以伊周之位據賢保之任以此思化則功何不至不思其危則禍何不到損益之際孔父攸歎持滿之戒老氏所慎蓋功冠天下者不安威振人主者不全今承衰亂之後繼重敝之世公家屈竭賦斂重數苛吏奪其時貪夫侵其財百姓困乏疾疫夭命盜賊羣輩且以萬數軍行衆止竊號自立攻犯亰師燔燒縣邑至乃訛言積弩入宫宿衛驚懼自漢興以來誠未有也國家微弱姦謀不禁六極之效危於纍卵王者承天順地典爵主刑不敢以天官私其宗不敢以天罰輕其親陛下宜遂聖明之德昭然覺悟逺述帝王之迹近遵孝文之業差五品之屬納至親之序亟遣使者徴中山太后置之别宫令時朝見又召馮衛二族裁與冗職使得執㦸親奉宿衛以防未然之符以抑患禍之端上安社稷下全保傅內和親戚外絶邪謀王太后詔剛所言僻經妄說違背大義其罷歸田里說隗嚻王莽篡剛避地河西及隗嚻據隴右欲背漢而附公孫述剛說嚻不納愚聞人所歸者天所與人所畔者天所去也伏念本朝躬聖德舉義兵龔行天罰所當必摧誠天之所福非人力也將軍本無尺土孤立一隅宜推誠奉順與朝并力上應天心下酬人望為國立功可以永年嫌疑之事聖人所絶以將軍之威重逺在千里動作舉措可不慎與今璽書數到委國歸信欲與將軍共同吉凶布衣相與尚有沒身不負然諾之信况於萬乘者哉今何畏何利久疑如是卒有非常之變上負忠孝下愧當世夫未至豫言固常為虛及其已至又無所及是以忠言至諫希得為用誠願反覆愚老之言與隗嚻書建武七年詔徴剛將歸與嚻書嚻不納愚聞専已者孤拒諫者塞孤塞之政亡國之風也雖有聖明之姿猶屈己從衆故慮無遺䇿舉無過事夫聖人不以獨見為眀而以萬物為心順人者昌逆人者亡此古今之所共也將軍以布衣為鄉里所推廊廟之計既不豫定動軍發衆又不深料今東方政教日睦百姓平安而西州發兵人人懷憂騷動惶懼莫敢正言羣衆疑惑人懷顧望非徒無精鋭之心其患無所不至夫物窮則變生事急則計易其藝然也夫離道德逆人情而能有國有家者古今未有也將軍素以忠孝顯聞是以士大夫不逺千里慕樂德義今茍欲決意徼幸此何如哉夫天所祐者順人所助者信如未蒙祐助令小人受塗地之禍毁壞終身之德敗亂君臣之節汚傷父子之恩衆賢破膽可不慎哉後漢書郅惲字君章汝南西平人厯長沙太守左轉芒長請王莽歸漢神器書莽篡位惲仰占𤣥象謂漢必再受命左隊大夫逯並署為吏不受至長安上書莽收繫會赦得出臣聞天地重其人惜其物故運機衡垂日月含元包一甄陶品類顯表紀世圖録預設漢厯久長孔為赤制不使愚惑殘人亂時智者順以成德愚者逆以取害神器有命不可虛獲上天垂戒欲悟陛下令􅈬臣位轉禍為福劉氏享天永命陛下順節盛衰取之以天還之以天可謂知命矣若不早圖是不免於竊位也且堯舜不以天顯自與故禪天下陛下何貪非天顯以自纍也天為陛下嚴父臣為陛下孝子父教不可廢子諫不可拒惟陛下留神上光武諫獵書惲為上東城門候帝出獵夜還惲拒關不開從東中門入明日惲上書賜布百匹貶東中門候昔文王不敢槃于游田以萬人為憂而陛下逺獵山林夜以繼晝其如社稷宗廟何暴虎馮河未至之戒誠小臣所竊憂也未至之戒漢紀作可為至戒諫廢郭皇后惲言於帝帝曰惲善恕已量主臣聞夫婦之好父不能得之於子况臣能得之於君乎是臣所不敢言雖然願陛下念其可否之計無令天下有議社稷而已蘇竟字伯况扶風平陵人建武初拜侍中與劉龔書龔字孟公長安人後漢書注按前書及三輔决録並云龔為向曽孫延岑字叔牙南陽人初據漢中起兵自稱武安王岑護軍鄧仲况擁兵南陽隂縣為寇國師劉歆兄子龔為其謀主竟善圖緯能通百家之言與書曉之又與仲况書仲况與龔遂降竟終不伐其功卒于家岑歸公孫述封汝寧王述亡降漢吳漢族滅之君執事無恙走昔以摩研編削之才與國師公從事出入校定祕書竊自依依未由自遠蓋聞君子愍同類而傷不遇人無智愚莫不先避害然後求利先定志然後求名昔智果見智伯窮兵必亡故變名逺逝陳平知項王為天所弃故歸心髙祖皆智之至也聞君前權時屈節北面延牙乃後覺悟棲遲養德先世數子又何以加君處隂中土多賢士若以須臾之間研考異同揆之圖書測之人事則得失利害可陳於目何自負畔亂之困不移守惡之名乎與君子之道何其反也世之俗儒末學醒醉不分而稽論當世疑誤視聽或謂天下迭興未知誰是稱兵據土可圖非冀或曰聖王未啓宜觀時變倚彊附大顧望自守二者之論豈其然乎夫孔邱祕經為漢赤制𤣥包幽室文隱事明且火德承堯雖昧必亮承積世之祚握無窮之符王氏雖乘間偷篡而終嬰大戮支分體解宗氏屠滅非其效歟皇天所以眷顧踟蹰優漢子孫者也論者若不本之於天參之於聖猥以師曠雜事輕自眩惑說士作書亂夫大道焉可信哉諸儒或曰今五星失晷天時謬錯辰星久而不效太白出入過度熒惑進退見態鎮星繞帶天街嵗星不舍氐房以為諸如此占歸之國家蓋灾不徒設皆應之分野各有所主夫房心即宋之分東海是也尾為燕分漁陽是也東海董憲迷惑未降漁陽彭寵逆亂擁兵王赫斯怒命將並征故熒惑應此憲寵受殃大白辰星自亡新之末失行算度以至于今或守東井或沒羽林或裴徊藩屏或躑躅帝宫或經天反明或潛藏久沈或衰微暗昧或煌煌北南或盈縮成鉤或偃蹇不禁皆大運蕩除之祥聖帝應符之兆也賊臣亂子往往錯互指麾妄說傳相壞誤由此論之天文安得遵度哉乃者五月甲申天有白虹自子加午廣可十丈長可萬丈正臨倚彌倚彌即黎丘秦豐之都也是時月入于畢畢為天網主網羅無道之君故武王將伐紂上祭于畢求助天也夫仲夏甲申為八魁八魁上帝開塞之將也主退惡攘逆流星狀似蚩尤旗或曰營頭或曰天槍出奎而西北行至延牙營上散為數百而滅奎為毒螫主庫兵此二變郡中及延牙士衆所共見也是故延牙遂之武當託言發兵實避其殃今年比卦部嵗坤主立冬坎主冬至水性滅火南方之兵受嵗禍也德在中宫刑在木木勝土刑制德今年兵事畢已中國安寧之效也五七之家三十五姓彭秦延氏不得豫焉如何怪惑依而恃之葛纍之詩求福不回其若是乎圖讖之占衆變之驗皆君所明善惡之分去就之決不可不察無忽鄙言夫周公之善康叔以不從管蔡之亂也景帝之悅濟北以不從吳濞之畔也自更始以來孤恩背逆歸義向善臧否燦然可不察歟良醫不能救無命彊梁不能與天爭故天之所壞人不得支宜密與太守劉君共謀降議仲尼栖栖墨子皇皇憂人之甚也屠羊救楚非要爵祿茅焦平秦豈求報利盡忠博愛之誠憤悶不能已耳後漢書尺牘采前兩語依藝文所載也絶無意義國師公作與國右史公又云與劉歆大誤東漢文紀卷六
