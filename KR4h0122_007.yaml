body:
  text: 東漢文紀巻七明梅鼎祚編伏湛字恵公琅邪東武人更始時為平原太守光武知湛名儒舊臣徴拜尚書典定舊制封陽都侯厯大司徒移書屬縣湛更始時為平原太守時尚兵亂郡中驚擾湛移書屬縣於是吏民信嚮遠近獨完屬縣不得相侵凌天生蒸民必為立君非久亂也且養老育幼以待真主後漢紀諫光武親征漁陽疏湛建武三年為大司徒時彭寵反於漁陽帝欲自征之湛疏諫乃止臣聞文王受命而征伐五國必先詢之同姓然後謀於羣臣加占蓍龜以定行事故謀則成卜則吉戰則勝其詩曰帝謂文王詢爾仇方同爾兄弟以爾鉤援與爾臨衝以伐崇墉崇國城守先退後伐所以重人命俟時而動故參分天下而有其二陛下承大亂之極受命而帝興明祖宗出入四年而滅檀鄉制五校降銅馬破赤眉誅鄧奉之屬不為無功今京師空匱資用不足未能服近而先事邉外且漁陽之地逼接北狄黠虜困廹必求其助又今所過縣邑尤為困乏種麥之家多在城郭聞官兵將至當已收之矣大軍遠涉二千餘里士馬罷勞轉糧艱阻今兗豫青冀中國之都寇賊縱横未及從化漁陽以東本備邉塞地接外虜貢税微薄安平之時尚資内郡况今荒耗豈足先圖而陛下捨近務逺棄易求難四方疑怪百姓恐懼誠臣之所惑也伏願逺覽文王重兵博謀近思征伐前後之宜顧問有司使極愚誠采其所長擇之聖慮以中土為憂念東觀漢記臣聞文王享國五十伐崇七年而三分天下有二至武王四海乃賓伏隆字伯文湛子厯光祿大夫死於張步移告青徐二州檄時張步兄弟據有齊地拜隆為太中大夫使青徐二州招降郡國隆移檄告羣盜皆降步遣使隨隆詣闕復拜隆光祿大夫復使於步拜步為東莱太守㑹劉永亦立步為齊王步遂執隆受永封隆遣間使上書帝示其父湛曰隆可謂有蘇武之節步竟殺之乃者猾臣王莽殺帝盜位宗室興兵除亂誅莽故羣下推立聖公以主宗廟而任用賊臣殺戮賢良三王作亂盜賊從横忤逆天心卒為赤眉所害皇天祐漢聖哲應期陛下神武奮發以少制衆故尋邑以百萬之軍潰散於昆陽王郎以全趙之師土崩於邯鄲大肜髙胡望旗消靡鐵脛五校莫不摧破梁王劉永幸以宗室屬籍爵為侯王不知厭足自求禍棄遂封爵牧守造為詐逆今虎牙大將軍屯營十萬已拔睢陽劉永奔迸家已族矣此諸君所聞也不先自圖雖悔何及再使上書臣隆奉使無狀受執㓙逆雖在困阸授命不顧又吏人知步反畔心不附之願以時進兵無以臣隆為念臣隆得生到闕庭受誅有司此其大願若令没身寇手以父母昆弟長累陛下陛下與皇后太子永享萬國與天無極侯霸字君房河南密人王莽敗為淮平大尹保全一郡建武初徴拜尚書令明習故典遷大司徒李通辭職議光武之興也宛人李通布衣倡義助成大業封固始侯拜大司農通上書稱病下公卿羣臣議大司徒侯霸等議上詔通勉致醫藥以時視事王莽簒漢傾亂天下通懐伊吕蕭曹之謀建造大䇿扶助神靈輔成聖徳破家為國忘身奉主有扶危存亡之義功徳最髙海内所聞通以天下平定謙讓辭位夫安不忘危宜令通居職療疾欲就諸侯不可聽劾朱浮奏浮任幽州牧與彭寵構怨為寵所攻敗城降於寵霸為尚書令奏浮帝以浮為執金吾浮敗亂幽州構成寵罪徒勞軍師不能死節罪當伏誅鮑永字君常上黨屯留人劾趙王良奏東觀記建武十一年永為司𨽻校尉趙王良帝叔父也時從送中郎將来歙喪還入夏城中與五官將軍相􅑮道廹良怒召門候岑尊叩頭馬前永劾奏良今月二十七日車駕臨故中郎將来歙喪還車駕過須臾趙王良從後到與右中郎將張邯相逢城門中道迫狭叱邯旋車又詔候岑尊詰責使前走數十步按良諸侯藩臣蒙恩入侍知尊帝城門候吏六百石而肆意加怒令叩頭都道奔走馬頭前無藩臣之禮大不敬也梁統字仲寧安定烏氏人初與竇融起河西為武威太守歸漢封成義侯終九江太守定封陵鄉上光武論宜重刑書綂建武十二年與竇融以列侯奉朝請數陳便宜以為法令既輕下姦不勝宜重刑罰以遵舊典乃上疏事下三公廷尉議以隆刑峻法非明王急務今所定不宜開可統復上疏遂寢不報臣竊見元哀二帝輕殊死之刑以一百二十三事手殺人者減死一等自是以後著為常準故人輕犯法吏易殺人臣聞立君之道仁義為主仁者愛人義者政理愛人以除殘為務政理以去亂為心刑罰在衷無取於輕是以五帝有流殛放殺之誅三王有大辟刻肌之法故孔子稱仁者必有勇又曰理財正辭禁民為非曰義髙帝受命誅暴平蕩天下約令定律誠得其宜文帝寛恵柔克遭世康平唯除省肉刑相坐之法它皆率由無革舊章武帝值中國隆盛財力有餘征伐逺方軍役數興豪傑犯禁姦吏弄法故重首匿之科著知從之律以破朋黨以懲隱匿宣帝聰明正直摠御海内臣下奉憲無所失墜因循先典天下稱理至哀平繼體而即位日淺聽斷尚寡丞相王嘉輕為穿鑿虧除先帝舊約成律數年之間百有餘事或不便於理或不厭民心謹表其尤害於體者傅奏於左伏惟陛下包元履徳權時撥亂功踰文武徳侔髙皇誠不宜因循季末衰微之軌囘神明察考量得失宣詔有司詳擇其善定不易之典施無窮之法天下幸甚復上疏有司以臣今所言不可施行尋臣之所奏非曰嚴刑竊謂髙帝以後至乎孝宣其所施行多合經傳宜比方今事驗之往古聿遵前典事無難改不勝至願願得召見若對尚書近臣口陳其要對尚書狀帝令尚書問狀統對聞聖帝明王制立刑罰故雖堯舜之盛猶誅四㓙經曰天討有罪五刑五庸哉又曰爰制百姓于刑之衷孔子曰刑罰不中則民無所措手足中之為言不輕不重之謂也春秋之誅不避親戚所以防患救亂坐安衆庶豈無仁愛之恩貴絶殘賊之路也自髙祖之興至於孝宣君明臣忠謀謨深博猶因循舊章不輕改革海内稱理斷獄益少至初元建平所減刑罰百有餘條盜賊浸多嵗以萬數間者三輔從横羣輩並起至燔燒茂陵火見未央其後隴西北地西河之賊越州度郡萬里交結攻取庫兵劫略吏人詔書討捕連年不獲是時以天下無難百姓安平而狂狡之埶猶至於此皆刑罰不衷愚人易犯之所致也由此觀之則刑輕之作反生大患恵加姦軌而害及良善也故臣綂願陛下采擇賢臣孔光師丹等議對尚書狀東觀記即前疏語元夀二年三輔盜賊羣輩並起至燔燒茂陵都邑煙火見未央宫前代未嘗所有其後隴西新興北地任横任崖西河曹况越州度郡萬里交結或從逺方四面會合遂攻取庫兵劫略吏人國家開封侯之科以軍法追捕僅能破散也桓譚字君山沛國相人王莽時為掌樂大夫更始立拜太中大夫建武中終郡丞著新論及賦誄書奏凡三十六篇上光武陳時政所宜疏世祖即位徴譚待詔上書不用大司空宋𢎞薦拜議郎給事中因上疏陳時政所宜不省臣聞國之廢興在於政事政事得失由乎輔佐輔佐賢明則俊士充朝而理合世務輔佐不眀則論失時宜而舉多過事夫有國之君俱欲興化建善然而政道未理者其所謂賢者異也昔楚莊王問孫叔敖曰寡人未得所以為國是也叔敖曰國之有是衆所惡也恐王不能定也王曰不定獨在君亦在臣乎對曰君驕士曰士非我無從富貴士驕君曰君非士無從安存人君或至失國而不悟士或至飢寒而不進君臣不合則國是無從定矣莊王曰善願相國與諸大夫共定國是也盖善政者視俗而施教察失而立防威徳更興文武迭用然後政調於時而躁人可定昔董仲舒言理國譬若琴瑟其不調者則改而更張夫更張難行而拂衆者亡是故賈誼以才逐而鼂錯以智死世雖有殊能而終莫敢談者懼于前事也且設法禁者非能盡塞天下之姦皆合衆人之所欲也大抵取便國利事多者則可矣夫張官置吏以理萬人縣賞設罰以别善惡惡人誅傷則善人蒙福矣今人相殺傷雖已伏法而私結怨讎子孫相報後忿深前至於滅户殄業而俗稱豪健故雖有怯弱猶勉而行之此為聽人自理而無復法禁者也今宜申明舊令若已伏官誅而私相傷殺者雖一身逃亡皆徙家屬於邉其相傷者加常二等不得雇山贖罪如此則仇怨自解盜賊息矣夫理國之道舉本業而抑末利是以先帝禁人二業錮商賈不得宦為吏此所以抑并兼長㢘恥也今富商大賈多放田貨中家子弟為之保役趨走與臣僕等勤收税與封君比入是以衆人慕效不耕而食至乃多通侈靡以淫耳目今可令諸商賈自相糾告若非身力所得皆以臧畀告者如此則専役一已不敢以貨與人事寡力弱必歸功田畝田畝脩則穀入多而地力盡矣又見法令決事輕重不齊或一事殊法同罪異論姦吏得因緣為市所欲活則出生議所欲陷則與死比是為刑開二門也今可令通義理眀習法律者校定科比一其法度班下郡國蠲除故條如此天下知方而獄無怨濫矣東觀載譚記曰賈人多通侈靡之物羅紈綺繡雜綵玩好以淫人耳目而竭盡其財是為下樹奢媒而置貧本也求人之儉約富足何可得乎夫俗難卒變而人闕不可暴化宜抑其路使之稍自衰焉論信讖酧賞疏是時帝方信讖多以決定嫌疑又酧賞少薄天下不時安定譚復上疏帝省奏愈不悦出為六安郡丞臣前獻瞽言未蒙詔報不勝憤懣冒死復陳愚夫䇿謀有益於政道者以合人心而得事理也凡人情忽於見事而貴於異聞觀先王之所記述咸以仁義正道為本非有竒怪虚誕之事盖天道性命聖人所難言也自子貢以下不得而聞况後世淺儒能通之乎今諸巧慧小才伎數之人増益圖書矯稱讖記以欺惑貪邪詿誤人主焉可不抑逺之哉臣譚伏聞陛下窮折方士黄白之術甚為明矣而乃欲聽納讖記又何誤也其事雖有時合譬猶卜數隻偶之類陛下宜垂明聽發聖意屏羣小之曲説述五經之正義略雷同之俗語詳通人之雅謀又臣聞安平則尊道術之士有難則貴介胄之臣今聖朝興復祖統為人臣主而四方盜賊未盡歸伏者此權謀未得也臣譚伏觀陛下用兵諸所降下既無重賞以相恩誘或至虜掠奪其財物是以兵長渠率各生狐疑黨輩連結歳月不解古人有言曰天下皆知取之為取莫知與之為取陛下誠能輕爵重賞與士共之則何招而不至何説而不釋何向而不開何征而不剋如此則能以狭為廣以遲為速亡者復存失者復得矣僊賦序余少峕為中郎從孝成帝出祠甘泉河東見郊先置華隂集靈宫宫在華山下武帝所造欲以褱集僊者王喬赤松子故名殿為存僊端門南向山署曰望僊門竊有樂髙妙之志即書壁為小賦以頌美蔡茂字子禮河内懐人厯司徒請禁制貴戚疏茂遷廣漢太守糾案隂氏賔客因董宣劾湖陽公主上書光武納之臣聞興化致教必由進善康國寧人莫大理惡陛下聖徳重興再隆大命即位以来四海晏然誠宜夙興夜寐雖休勿休然頃者貴戚椒房之家數因恩埶干犯吏禁殺人不死傷人不論臣恐繩墨棄而不用斧斤廢而不舉近湖陽公主奴殺人西市而與主共輿出入宫省逋罪積日寃魂不報洛陽令董宣直道不顧干主討姦陛下不先澄審召欲加箠當宣受怒之初京師側耳及其蒙宥天下拭目今者貴戚憍逸賔客放濫宜敕有司案理姦罪使執平之吏永申其用以厭逺近不緝之情歐陽歙字王思樂安千乗人更始立為原武令厯大司徒賜繇延教歙建武初為汝南太守舊俗十月享會縣齎牛酒到府讌飲歙臨享下教主簿讀書將引延受賜時郅惲為郡功曹以延貪邪舉非其人奉觥罰歙歙敬受之西部督郵繇延天資忠貞稟性公方典部折衝摧破姦雄不嚴而治書曰安民則恵黎民懐之盖舉善以教則不能者勸今與諸儒共論延功顯之于朝太守敢嘉厥休牛酒養徳風俗通後漢書未全見後漢紀雄書作㓙治作理敢一作敬禮震求代歐陽歙死書歙自歐陽生傳伏生尚書至歙八世為汝南教授數百人徴為大司徒坐汝南臧罪千餘萬下獄平原禮震年十七聞獄當斷馳之京師至獲嘉自繫上書而歙已死伏見臣師大司徒歐陽歙學為儒宗八世博士而以臧咎當伏重辜歙門單子㓜未能傳學身死之後永為廢絶上令陛下獲殺賢之譏下使學者喪師資之益乞殺身以代歙命杜詩字公君河内汲人厯汝南都尉南陽太守上光武辭郡疏詩為南陽太守政治清平自以久居大郡求避功臣疏不許陛下亮成天工克濟大業偃兵脩文羣帥反旅海内合和萬世蒙福天下幸甚唯匈奴未譬聖徳威侮二垂陵虐中國邉民虚耗不能自守臣恐武猛之將雖勤亦未得解甲櫜弓也夫勤而不息亦怨勞而不休亦怨怨恨之師難復責功臣伏覩將帥之情功臣之望冀一休足於内郡然後即戎出命不敢有恨臣愚以為師克在和不在衆陛下雖垂念北邉亦當頗泄用之昔湯武善御衆故無忿鷙之師陛下起兵十有三年將帥和睦士卒鳬藻今若使公卿郡守出於軍壘則將帥自厲士卒之復比於宿衛則戎士自百何者天下已安各重性命大臣以下咸懐樂土不讎其功而厲其用無以勸也陛下誠宜虚缺數郡以俟振旅之臣重復厚賞加于久役之士如此緣邉屯戍之師競而忘死乗城拒塞之吏不辭其勞則烽火精眀守戰堅固聖王之政必因人心今猥用愚薄塞功臣之望誠非其宜臣詩伏自惟忖本以史吏一介之才遭陛下創制大業賢俊在外空乏之間超受大恩收養不稱奉職無效久竊祿位今功臣懐愠誠惶誠恐八年上書乞避功徳陛下殊恩未許放退臣詩蒙恩尤深義不敢茍冒虚請誠不勝至願願退大郡受小職及臣齒壯力能經營劇事如使臣詩必有補益復受大位雖折珪授爵所不辭也惟陛下哀矜請立虎符疏建武初但以璽書發兵未有虎符之信詩上疏請立從之臣聞兵者國之㓙器聖人所慎舊制發兵皆以虎符其餘徴調竹使而已符䇿合會取為大信所以眀著國命斂持威重也間者發兵但用璽書或以詔令如有姦人詐偽無由知覺以為軍旅尚興賊虜未殄徴兵郡國宜有重慎可立虎符以絶姦端昔魏之公子威傾隣國猶假兵符以解趙圍若無如姬之仇則其功不顯事有煩而不可省費而不得已盖謂此也薦伏湛疏湛以大司徒坐事䇿免詩時為南陽太守疏薦徴還未拜卒臣聞唐虞以股肱康文王以多士寧是故詩稱濟濟書曰良哉臣詩竊見故大司徒陽都侯伏湛自行束脩訖無毁玷篤信好學守死善道經為人師行為儀表前在河内朝歌及居平原吏人畏愛則而象之遭時反覆不離兵㓙秉節持重有不可奪之志陛下深知其能顯以宰相之重衆賢百姓仰望徳義微過斥退久不復用有識所惜儒士痛心臣竊傷之湛容貌堂堂國之光暉智略謀慮朝之淵藪髫髮厲志白首不衰實足以先後王室名足以光示逺人古者選擢諸侯以為公卿所以砥礪藩屏勸進忠良是故四方囘首仰望京師柱石之臣宜居輔弼出入禁門補缺拾遺臣詩愚戇不足以知宰相之才竊懐區區敢不自竭臣前為侍御史上封事言湛公㢘愛下好惡分眀累世儒學素持名信經眀行脩通達國政尤宜近侍納言左右舊制九州五尚書今一郡二人可以湛代頗為執事所非但臣詩蒙恩深渥所言誠有益於國雖死無恨故復越職觸冒以聞後漢書杜林字伯山扶風茂陵人涼州刺史鄴之子少博洽稱通儒初為郡吏兵亂依隗嚻東歸仕厯光祿勲大司空遣子奉馬援書林與援同鄉里素相親厚援從南方還時林馬適死援今子持馬一匹遺林曰朋友有車馬之饋可且以備乏林受之遣子奉書援謂子曰人當以此為法是杜伯山所以勝我也將軍内施九族外有賔客望恩者多林父子兩人食列卿祿常有盈今送錢五萬東觀漢記常有盈一作祿出常有餘送作奉上光武議郊祭疏東觀漢記建武二年初制郊兆於洛陽城南七年五月詔三公曰漢當郊堯其與卿大夫博士議林為侍御史獨以為漢不緣堯與殷周異宜疏奏定從林議臣聞營河雒以為民刻肌膚以為刑封疆畫界以建諸侯井田什一以供國用三代所同及至漢興因時宜趨世務省煩苛取實事不茍貪髙亢之論是以去中土之京師就闗内之逺郡除肉刑之重律用髠鉗之輕法郡縣不置世祿之家農人三十而取一政卑易行禮簡易從民無愚智思仰漢徳樂承漢祀基業特起不因緣堯堯逺於漢民不曉信言提其耳終不悦諭后稷近於周民户知之世據以興基由其祚本於漢異郊祀髙帝誠從民望得萬國之歡心天下福應莫大於此民奉種祀且猶世主不失先俗羣臣僉薦鯀考績不成九載乃殛宗廟至重衆心難違不可卒改詩云不愆不忘率由舊章明當尊用祖宗之故文章也宜如舊制以解天下之惑合于易之所謂先天而天弗違後天而奉天時之義方軍旅在外祭可且如元年郊祭故事上光武論水災疏東觀書曰建武八年間郡國比大水湧泉盈溢杜林以為倉卒時兵擅權作威張氏雖皆降散猶少有遺脱長吏制御無術令得復熾元元侵陵之所致也上疏從之臣聞先王無二道明聖用而治同也見惡如農夫之務去草焉芟夷藴崇之絶其本根勿使能殖畏其易也古今通道傳其法於有根狼子野心奔馬善驚成王深知其終卒之患故以殷氏六族分伯禽七族分康叔懐姓九宗分唐叔檢押其姦宄又遷其餘於成周舊地雜俗旦夕拘錄所以挫其强御之力詘其驕恣之節也及漢初興上稽舊章合符重規徙齊諸田楚昭屈景燕趙韓魏之後以稍弱六國强宗邑里無營利之家野澤無兼併之民萬里一統海内賴安後輒因喪祖之痛脅以送終之義故遂相率而陪園陵無反顧之心追觀往法政皆神道設教强幹弱枝本支百世之要也是以皆永享康寧之福無怵惕之憂繼嗣承業恭已而治盖此助也其被灾害民輕薄無累重者兩府遣吏護送饒穀之郡或懼死亡卒為傭賃亦所以消散其口救贍全其性命昔魯隱有賢行將致國於桓公乃留連貪位不能早退况草創兵長卒無徳能直以擾亂乗時擅權作威玉食狃猱之意徼幸之望曼延無足張步之計是也小民負縣官不過身死負兵家滅門殄世陛下昭然獨見成敗之端或屬諸侯官府元元少得舉首仰視而尚遺脱二千石失制御之道令得復昌熾縱横比年大雨水潦暴長涌泉盈溢灾壊城郭官寺吏民廬舍潰徙離處漬成坑坎臣聞水隂類也易卦地上有水比言性不相害故曰樂也而猥相毁墊淪失常敗百姓安居殆隂下相為蠧賊有小大勝負不齊均不得其所侵陵之象也詩云畏天之威于時保之唯陛下留神明察往来懼思天下幸甚薦鄭興奏林先與興同寓隴右及興東歸乃薦之徴為太中大夫竊見河南鄭興執義堅固敦悦詩書好古博物見疑不惑有公孫僑觀射父之徳宜侍帷幄典職機密昔張仲在周燕翼宣王而詩人悦喜惟陛下留聽少察以助萬分論刑法奏建武十四年林時為光祿勲羣臣上言古者肉刑嚴重則人畏法令今憲律輕薄故姦軌不勝宜増科禁以防其源詔下公卿林奏從之夫人情挫辱則義節之風損法防繁多則茍免之行興孔子曰導之以政齊之以刑民免而無恥導之以徳齊之以禮有恥且格古之明王深識逺慮動居其厚不務多辟周之五刑不過三千大漢初興詳覽失得故破矩為圓斲彫為樸蠲除苛政更立疏網海内歡忻人懐寛徳及至其後漸以滋章吹毛索疵詆欺無限果桃菜茹之饋集以成臧小事無妨於義以為大戮故國無㢘士家無完行至於法不能禁令不能止上下相遁為敝彌深臣愚以為宜如舊制不合翻移後漢紀動居其厚下云故湯去三面之網易著三驅之義所以徳刑參用而示民有恥漢徳寛厚民無二心軍士左袒樂為劉氏多恩之所致也至其後世不能以徳而勤於法故有吹毛求疵云云衛宏字敬仲東海人光武時為議郎嘗作漢舊儀及賦頌誄七首古文尚書序宏從大司空杜林授古文尚書作訓㫖秦既焚書恐天下不從所改更法而諸生到者拜為郎前後七百人乃密種𤓰於驪山陵谷中温處𤓰實成詔博士諸生説之人言不同乃令就視為伏機諸生賢儒皆至焉方相難不決因發機從上填之以土皆壓終乃無聲也伏生徴之老不能行遣太常掌故鼂錯往讀之年九十餘不能正言言不可曉使其女傳言教錯齊人語多與潁川異錯所不知者凡十二三略以其意屬讀而已也並史記正義張純字伯仁京兆杜陵人富平侯安世孫厯位大司空論宗廟奏純明習朝典正定禮儀是時宗廟未備昭穆失序純兼虎賁中郎將與太僕朱浮共奏詔下公卿議以宣元皇帝尊為祖父可親奉祠成帝以下有司行事别為南頓君立皇考廟從之陛下興於匹庶蕩滌天下誅鉏暴亂興繼祖宗竊以經義所紀人事衆心雖實同創革而名為中興宜奉先帝恭承祭祀者也元帝以来宗廟奉祠髙皇帝為受命祖孝文皇帝為太宗孝武皇帝為世宗皆如舊制又立親廟四世推南頓君以上盡於舂陵節侯禮為人後者則為之子既事太宗則降其私親今禘祫髙廟陳序昭穆而舂陵四世君臣並列以卑厠尊不合禮意設不遭王莽而國嗣無寄推求宗室以陛下繼綂者安得復顧私親違禮制乎昔髙祖以自受命不由太上宣帝以孫後祖不敢私親故為父立廟獨羣臣侍祠臣愚謂宜除今親廟以則二帝舊典願下有司博采其議祭祀志載奏議云禮為人子事大宗降其私親禮之設施不授之與自得之異意當除今親廟四孝宣皇帝以孫後祖為父立廟於奉明曰皇考廟獨羣臣侍祠願下有司議先帝四廟當代親廟者及皇考廟事下公卿博士議郎大司徒渉等議宜奉所代立平帝哀帝成帝元帝廟代今親廟兄弟以下使有司祠宜為南頓君立皇考廟祭上至舂陵節侯羣臣奉祠時議有異不上著可渉等議下詔光武詔以宗廟處所未定且祫祭髙廟其成哀平且祠祭長安故髙廟其南陽舂陵嵗時各且因故園廟祭祀園廟去太守治所逺者在所令長行太守事侍祠惟孝宣帝有功徳其上尊號曰中宗光武詔禘祫之祭不行已久矣三年不為禮禮必壊三年不為樂樂必崩宜據經典詳為其制論禘祫奏建武二十六年詔詳禘祫之禮純上奏自是禘祫遂定禮三年一祫五年一禘春秋傳曰大祫者何合祭也毁廟及未毁廟之主皆登合食乎太祖五年而再毁漢舊制三年一祫毁廟主合食髙廟存廟主未嘗合祭元始五年諸王公列侯廟㑹始為禘祭又前十八年親幸長安亦行此禮禮説三年一閏天氣小備五年再閏天氣大備故三年一祫五年一禘禘之為言諦諦定昭穆尊卑之義也禘祭以夏四月夏者陽氣在上隂氣在下故正尊卑之義也祫祭以冬十月冬者五穀成熟物備禮成故合聚飲食也斯典之廢於兹八年謂可如禮施行以時定議請封禪奏建武三十年甲寅純上請封禪中元元年光武乃東巡岱宗以純侍御史大夫從自古受命而帝治世之隆必有封禪以告成功焉樂動聲儀曰以雅治人風成於頌有周之盛成康之間郊配封禪皆可見也書曰嵗二月東巡狩至於岱宗柴則封禪之義也臣伏見陛下受中興之命平海内之亂脩復祖宗撫存萬姓天下曠然咸蒙更生恩徳雲行恵澤雨施黎元安寧夷狄慕義詩曰受天之祜四方来賀今攝提之嵗蒼龍甲寅徳在東宫宜及嘉時遵唐帝之典繼孝武之業以二月東巡狩封於岱宗明中興勒功勲復祖綂報天神禪梁父祀地祇傳祚子孫萬世之基也登封泰山刻石文建武三十二年二月上至奉髙遣侍御史與蘭臺令史將工先上山刻文于石晨燎祭天於泰山下用樂如南郊維建武三十有二年二月皇帝東巡狩至於岱宗柴望秩於山川班於羣神遂覲東后從臣太尉憙行司徒事特進髙密侯禹等漢賔二王之後在位孔子之後褒成侯序在東后藩王十二咸来助祭河圖赤伏符曰劉秀發兵捕不道四夷雲集龍鬬野四七之際火為主河圖㑹昌符曰赤帝九世巡省得中治平則封誠合帝道孔矩則天文靈出地祇瑞興帝劉之九會命岱宗誠善用之姦偽不萌赤漢徳興九世會昌巡岱皆當天地扶九崇經之常漢大興之道在九世之王封於泰山刻石著紀禪于梁父退省考五河圖合古篇曰帝劉之秀九名之世帝行徳封刻政河圖提劉子曰九世之帝方明聖持衡拒九州平天下子雒書甄曜度曰赤三徳昌九世會脩符合帝際勉刻封孝經鉤命決曰予誰行赤劉用帝三建孝九㑹脩専兹竭行封岱青河雒命后經讖所傳昔在帝堯聰明密微讓與舜庶後裔握機王莽以舅后之家三司鼎足冢宰之權勢依託周公霍光輔㓜歸政之義遂以簒叛僭號自立宗廟隳壊社稷喪亡不得血食十有八年揚徐青三州首亂兵革横行延及荆州豪傑并兼百里屯聚往往僭號北夷作寇千里無烟無雞鳴犬吠之聲皇天睠顧皇帝以匹庶受命中興年二十八載興兵起是以中次誅討十有餘年罪人則斯得黎庶得居爾田安爾宅書同文車同軌人同倫舟輿所通人迹所至靡不貢職建明堂立辟雍起靈臺設庠序同律度量衡脩五禮五玉三帛二牲一死贄吏各脩職復于舊典在位三十有二年年六十二乾乾日昃不敢荒寧涉危厯險親巡黎元恭肅神祇恵恤耆老理庶遵古聰允明恕皇帝唯慎河圖雒書正文是月辛夘柴登封泰山甲午禪於梁隂以承靈瑞以為兆民永兹一宇垂於後昆百僚從臣郡守師尹咸蒙祉福永永無極秦相李斯燔詩書樂崩禮壊建武元年已前文書散亡舊典不具不能明經文以章句細微相况八十一巻明者為驗又其十巻皆不昭晰子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮後有聖人正失誤刻石記趙憙字伯陽南陽宛人厯位太尉章帝時為太傅薨東觀記名熹後漢書作憙據字疑熹是請封禪奏東觀漢記建武三十年太尉趙熹等上言封禪詔不許至三十二年始行自古帝王每世之隆未嘗不封禪陛下聖徳洋溢順天行誅撥亂中興作民父母脩復宗廟救萬姓命黎庶賴福海内清平功成治定羣司禮官咸以為宜登封告成為民報徳百王所同當仁不讓宜登封岱宗正三雍之禮以明靈契望秩羣神以承天心也光武詔報即位三十年百姓怨氣滿腹吾誰欺欺天乎曽謂泰山不如林放何汙七十二代之編錄桓公欲封管仲非之若郡縣遠遣吏上夀盛稱虚美必髠兼令屯田後漢紀載張純請封禪詔曰是何言也當今日月薄蝕災異並臻吏失其職百姓怨讟吾誰欺欺天乎同前典略災異連仍日月薄蝕百姓怨歎而有事太山汚七十二代編錄以羊皮雜貂裘何强顔耶梁松字伯孫純之子尚光武舞隂長公主再遷虎賁中郎將坐懸書誹謗下獄死祭配林議建武三十年三月上幸魯過泰山告太守以上過故承詔祭山梁松等議記曰齊將有事泰山先有事配林盖諸侯之禮也河嶽視公侯王者祭焉宜無即事之漸不祭配林列漢九世封禪奏三十二年正月上齋夜讀河雒㑹昌符曰赤劉之九會命岱宗不慎克用何益于承誠善用之姦偽不萌乃詔松等復案索河雒讖文言九世封禪事松等列奏凡三十六事乃許登封告成為民報徳百王所同陛下輒拒絶不許臣下不敢頌功述徳案河雒讖書赤漢九世當巡封泰山凡三十六事傅奏左帷陛下遂以仲月令辰遵岱嶽之正禮奉圖雒之明文以和靈瑞以為兆民議封禪特立石檢疏詔議封禪所施用有司奏當用玉檢蔵方石再累置壇中上以功難詔松因元封時故封石空檢加封而已松上疏爭之乃更刻石成禮焉登封之禮告功皇天垂後無窮以為萬民也承天之敬尤宜章明奉圖書之瑞尤宜顯著今因舊封竄寄玉牒故石下恐非重命之義受命中興宜當特異以明天意論馬防等奏東觀漢記司𨽻校尉梁松奏鼎按范曄後漢書松尚光武女以馬援不答拜積不平援南征松代監軍因事陷之章帝初援子防以特進就第有司奏防兄弟奢侈踰僭濁亂聖化悉免就國又按梁松傳松明帝永平四年坐誹謗下獄死安得及防就第時亦未為司𨽻此必自一梁松也特進防光廖廖子豫兄弟父子并受爵土榮顯冠世多買京師膏腴美田作大廬舍近帶城郭妨困小民博士充等封禪議上至泰山有司復奏河雒圖記九世宜封禪事尤著明博士充等議奏上詔報殷統未絶黎庶繼命髙宗久勞猶為中興武王因父受命之列據三代郊天因孔子甚美其功後世謂之聖王漢統中絶王莽盜位一民莫非其人尺土靡不其有宗廟不祀十有八年陛下無十室之資奮振於匹夫除殘去賊興復祖宗集就天下海内治平夷狄慕義功徳盛於髙宗宣王宜封禪為百姓祈福請親定刻石紀號文太常奏儀制光武詔報許昔小白欲封夷吾難之季氏欲旅仲尼非焉蓋齊諸侯季氏大夫皆無事於泰山今予末小子巡祭封禪徳薄而任重一則以喜一則以懼喜於得承鴻業帝堯善及子孫之餘賞盖應圖籙當得是當懼於過差執事不𢎞信道不篤為議者所誘進後世知吾罪深矣馬第伯封禪儀記車駕正月二十八日發雒陽宫二月九日到魯遣守謁者郭堅伯將徒五百人治泰山道十日魯遣宗室諸劉及孔氏瑕丘丁氏上夀受賜皆詣孔氏宅賜酒肉十一日發十二日宿奉髙是日遣虎賁郎將先上山三案行還益治道徒千人十五日始齋國家居太守府舍諸王居府中諸侯在縣庭中齋諸卿校尉將軍大夫黄門郎百官及宋公衛公褒成侯東方諸侯雒中小侯齋城外汶水上太尉太常齋山虞馬第伯自云某等七十人先之山虞觀祭山壇及故明堂宫郎官等郊肆處入其幕府觀治石石二枚狀博平圓九尺此壇上石也其一石武帝時石也時用五車不能上也因置山下為屋號五車石四維距石長丈二廣二尺厚尺半所四枚檢石長三尺廣六寸狀如封箧長檢十枚一紀號石髙丈二廣三尺厚二寸名曰立石一枚刻文字紀功徳是朝上山騎行往往道峻峭不騎步牽馬乍步乍騎且相半至中觀留馬去平地三十里南向極望無不覩仰望天闗如從谷底仰觀抗峰其為髙也如視浮雲其峻也石壁窅窱如無道徑遥望其人端如行朽兀或為白石或雪久之白者移過樹乃知是人也殊不可上四布僵卧石上有頃復蘇亦賴齎酒脯處處有泉水目輒為之明復勉强相將行到天闗自以已至也問道中人言尚十餘里其道旁山脅大者廣八九尺狭者五六尺仰視巖石松樹欝欝蒼蒼若在雲中俛視谿谷碌碌不可見丈尺遂至天門之下仰視天門窔遼如從穴中視天直上七里賴其羊腸逶迤名曰環道往往有絙索可得而登也兩從者扶挟前人相牽後人見前人履底前人見後人頂如畫重累人矣所謂磨胸揑石捫天之難也初上此道行十餘步一休稍疲咽脣焦五六步一休牒牒據頓地不避濕暗前有燥地目視而兩脚不隨早食上晡後到天門郭使者得銅物銅物形狀如鍾又方柄有孔莫能識疑封禪具也得之者汝南召陵人姓楊名通東上一里餘得木甲木甲者武帝時神也東北百餘步得封所始皇立石及闕在南方漢武在其北二十餘步得北垂圓臺髙九尺方圓三丈所有兩陛人不得從上從東陛上臺上有壇方一丈二尺所上有方石四維有距石四面有闕鄉壇再拜謁人多置錢物壇上亦不掃除國家上見之則詔書所謂酢梨酸棗狼籍散錢處數百幣帛具道是武帝封禪至泰山下未及上百官為先上跪拜置梨棗錢于道以求福即此也東山名曰日觀日觀者雞一鳴時見日始欲出長三丈所秦觀者望見長安吳觀者望見會稽周觀者望見齊西北有石室壇以南有玉盤中有玉龜山南脅神泉飲之極清美利人日入下去行數環日暮時頗雨不見其道一人居其前先知蹈有人乃舉足隨之比至天門下夜人定矣補訂馬第伯建武封禪儀記明少保孫鑛補訂建武三十二年車駕正月二十八日發雒陽宫二月九日到魯遣守謁者郭堅伯將徒五百人治泰山道十日魯遣宗室諸劉及孔氏瑕丘丁氏上夀受賜皆詣孔氏宅賜酒肉十一日發十二日宿奉髙是日遣虎賁郎將先上山一一案行還益治道徒千人十五日始齋國家居太守府舍諸王居府中諸侯在縣庭中齋諸卿校尉將軍大夫黄門郎百官及宋公衛公褒成侯東方諸侯雒中小侯齋城外汶水上太尉太常齋山虞馬第伯自云某等七十人先之山虞觀祭山壇及故明堂宫郎官等郊祀處入其幕府觀治石石二枚狀博平圓九尺此壇上石也其一石武帝時石也時用五車不能上也因置山下為屋號五車石四維距石長丈二廣二尺厚尺半所四枚檢石長三尺廣六寸狀如封箧長檢十枚一紀號石髙丈二尺廣三尺厚尺二寸名曰立石一枚刻文字紀功徳是朝上山騎行往往道峻峭不騎步牽馬乍步乍騎且相半至中觀留馬去平地二十里南向極望無不覩仰望天闗如從谷底仰觀抗峰其為髙也如視浮雲其峻也石壁窅窱如道無徑遥望其人端端如行朽兀或為白石或如雪久之白者移過樹乃知是人也殊不可上四布僵卧石上有頃復蘇亦賴齎酒脯處處有泉水目輒為之明復勉强相將行將天闗自以已至也問道中人言尚十餘里其道旁山脇大者廣八九尺狭者廣五六尺仰視巖石松樹欝欝蒼蒼若在雲中俛視谿谷碌碌不可見丈尺遂至天門之下仰視天門窔遼如從穴中視天直上七里賴其羊腸逶迤名曰環道往往有絙索可得而登也兩從者扶挟前人相牽後人見前人履底前人見後人頂如畫重累人矣所謂磨胸揑石捫天之難也初上此道行十餘步一休稍疲咽脣燋五六步一休牒牒據頓地不避濕暗前有燥地目視而兩脚不隨早食上晡後到天門郭使者得銅物銅物形狀如鍾又方柄有孔莫能識也疑封禪具也得之者汝南召陵人姓楊名通東上一里餘得木甲木甲者武帝時神也東北百餘步得封所始皇立石及闕在南方漢武在其北二十餘步得北垂圓臺髙九尺方圓三丈所有兩陛人不得從上從東陛上臺上有壇方一丈二尺所上有方石四維有距石四面有闕鄉壇再拜謁人多致錢物壇上亦不得掃除國家上見之則詔書所謂酢梨酸棗狼籍散錢處數百幣帛具道是武帝封禪至泰山下未及上百官為先上跪拜置梨棗錢于道以求福即此也東山名曰日觀日觀者雞一鳴時見日始欲出長三丈所秦觀者望見長安吳觀者望見會稽周觀者望見齊西北有石室壇以南有玉盤中有玉龜山南脇神泉飲之極清美利人日入下去行數環日暮時頗雨不見其道一人居其前先知蹈有人乃舉足隨之比至天門下夜人定矣車駕十九日之山虞國家居亭百官布野比日山上雲氣成宫闕百官並見之二十一日夕牲時白氣廣一丈東南極望致濃厚時天清和無雲瑞命篇岱嶽之瑞以日為應也二十二日晨燎祭天於泰山晨祭也日髙三丈所燔燎燔燎煙正上也百官各以次上郡儲輦三百為貴臣諸公王侯卿大夫百官皆步上少用輦食時國家御首輦人輓升山至中觀休須臾復上日中後到山上更衣須臾羣臣畢就位早晡時即位于壇國家臺上北面虎賁陛㦸臺下尚書令奉玉牒檢國家以寸二分璽親封之訖騶騎三千餘人發壇上方石尚書令蔵玉牒已復石覆訖尚書令以五寸印封石檢以金為繩以石三檢東方西方各三檢檢中石泥及壇土色赤白黒各如其方色國家再拜羣臣稱萬嵗音動山谷有氣屬天遥望不見山巔山巔人在氣中不知也封畢有頃詔百官以次下國家隨後數百人維持行相逢推百官連延二十餘里道多迫小深谿髙岸數百丈步從匍匐邪上起近炬火止亦駱驛步從觸擊大石石聲正讙但讙石見相應和者腸不能已口不能默夜半後到百官明日乃訖其中老者氣劣不能行卧巖石下明日早大醫令復遵問起居國家云昨上下山欲行迫前欲休則後人所蹈道峻危險恐不能度國家不勞百官以下露卧水飲無一人蹉跌無一人疾病豈非天邪泰山率多暴雨如今上直下柴祭封登清晏温和明日上夀賜百官省事事畢發暮宿奉髙三十里明日發至梁甫九十里夕牲二十五日禪祭地於梁隂功效如彼天應如此羣臣上夀國家不聽四月己夘大赦天下以建武三十二年為建武中元元年鄭興字少贛河南開封人初仕更始為涼州刺史歸隗嚻建武初徴為太中大夫左轉蓮勺令論日食疏興明左氏周官長於厯數建武七年三月晦日食興為太中大夫上疏多有所納春秋以天反時為災地反物為妖人反徳為亂亂則妖災生往年以来讁咎連見意者執事頗有闕焉按春秋昭公十七年夏六月甲戍朔日有食之傳曰日過分而未至三辰有災於是百官降物君不舉避移時樂用鼓祝用幣史用辭今孟夏純乾用事隂氣未作其災尤重夫國無善政則讁見日月變咎之来不可不慎其要在因人之心擇人處位也堯知鯀不可用而用之者屈已之明因人之心也齊桓反政而相管仲晉文歸國而任郄縠者是不私其私擇人處位也今公卿大夫多舉漁陽太守郭伋可大司空者而不以時定道路流言咸曰朝廷欲用功臣功臣用則人位謬矣願陛下上師唐虞下覽齊晉以成屈已從衆之徳以濟羣臣讓善之功夫日月交㑹數應在朔而頃年日食每多在晦先時而合皆月行疾也日君象而月臣象君亢急則臣下促迫故行疾也今年正月繁霜自爾已来率多寒日此亦急咎之罰天於賢聖之君猶慈父之於孝子也丁寧申戒欲其反政故災變仍見此乃國之福也今陛下髙明而羣臣惶促宜留思柔克之政垂意洪範之法博采廣謀納羣下之䇿范升字辯卿代郡人歸漢為博士永平中為聊城令奏記王邑邑前大將軍商子邑為王莽大司空辟升為議曹吏時莽頻發兵役徴賦繁興升乃奏記於邑邑雖然其言而竟不用令乗傳使上黨與漢兵㑹因留不還升聞子以人不間於其父母為孝臣以下不非其君上為忠今衆人咸稱朝聖皆曰公明盖明者無不見聖者無不聞今天下之事昭昭於日月震震於雷霆而朝云不見公云不聞則元元焉所呼天公以為是而不言則過小矣知而從令則過大矣二者於公無可以免宜乎天下歸怨於公矣朝以逺者不服為至念升以近者不悦為重憂今動與時戾事與道反馳騖覆車之轍探湯敗事之後後出益可怪晚發愈可懼耳方春嵗首而動發逺役藜藿不充田荒不耕穀價騰躍斛至數千吏人陷於湯火之中非國家之人也如此則胡貊守闗青徐之寇在於帷帳矣升有一言可以解天下倒懸免元元之急不可書傳願蒙引見極陳所懐後漢書上光武讓博士書建武二年徴升拜議郎遷博士疏讓不許由是重之云臣與博士梁恭山陽太守吕羌俱脩梁丘易二臣年並耆艾經學深明而臣不以時退與恭並立深知羌學又不能達慙負二老無顔於世誦而不行知而不言不可開口以為人師願推博士以避恭羌駮立費氏易左氏春秋書尚書令韓歆疏欲為費氏易左氏春秋立博士升上奏難者以太史公多引左氏升又上太史公違戾五經謬孔子言及左氏春秋不可錄三十一事臣聞主不稽古無以承天臣不述舊無以奉君陛下愍學微缺勞心經蓺情存博聞故異端競進近有司請置京氏易博士羣下執事莫能據正京氏既立費氏怨望左氏春秋復以比類亦希置立京費已行次復髙氏春秋之家又有騶夹如令左氏費氏得置博士髙氏騶夹五經竒異並復求立各有所執乖戾分爭從之則失道不從則失人將恐陛下必有厭倦之聽孔子曰博學約之弗叛矣夫夫學而不約必叛道也顔淵曰博我以文約我以禮孔子可謂知教顔淵可謂善學矣老子曰學道日損損猶約也又曰絶學無憂絶末學也今費左二學無有本師而多反異先帝前世有疑于此故京氏雖立輒復見廢疑道不可由疑事不可行詩書之作其来已久孔子尚周流游觀至於知命自衛反魯乃正雅頌今陛下草創天下紀綱未定雖設學官無有弟子詩書不講禮樂不脩奏立左費非政急務孔子曰攻乎異端斯害也已傳曰聞疑傳疑聞信傳信而堯舜之道存願陛下疑先帝之所疑信先帝之所信以示反本明不専已天下之事所以異者以不一本也易曰天下之動貞夫一也又曰正其本萬事理五經之本自孔子始謹奏左氏之失凡十四事追稱祭遵疏遵建武九年卒帝下升章諡曰成侯臣聞先王崇政尊美屏惡昔髙祖大聖深見逺慮班爵割地與下分功著錄勲臣頌其徳美生則寵以殊禮奏事不名入門不趨死則疇其爵邑世無絶嗣丹書鐵劵傳於無窮斯誠大漢厚下安人長久之徳所以累世十餘厯載數百廢而復興絶而復續者也陛下以至徳受命先明漢道褒序輔佐封賞功臣同符祖宗征虜將軍潁陽侯遵不幸早薨陛下仁恩為之感傷逺迎河南惻怛之慟形於聖躬喪事用度仰給縣官重賜妻子不可勝數送死有以加生厚亡有以過存矯俗厲化卓如日月古者臣疾君視臣卒君弔徳之厚者也陵遲已来久矣及至陛下復興斯禮羣下感動莫不自勵臣竊見遵脩行積善竭忠於國北平漁陽西拒隴蜀先登坻上深取略陽衆兵既退獨守衝難制御士心不越法度所在吏人不知有軍清名聞於海内㢘白著於當世所得賞賜輒盡與吏士身無竒衣家無私財同産兄午以遵無子娶妾送之遵乃使人逆而不受自以身任於國不敢圖生慮繼嗣之計臨死遺誡牛車載喪薄𦵏洛陽問以家事終無所言任重道逺死而後已遵為將軍取士皆用儒術對酒設樂必雅歌投壺又建為孔子立後奏置五經大夫雖在軍旅不忘俎豆可謂好禮悦樂守死善道者也禮生有爵死有諡爵以殊尊卑諡以明善惡臣愚以為宜因遵薨論敘衆功詳案諡法以禮成之顯章國家篤古之制為後嗣法毁周黨奏黨建武中徴為議郎去職復被徴光武引見伏而不謁升奏論上以奏示公御下詔賜帛臣聞堯不須許由巢父而建號天下周不待伯夷叔齊而王道以成伏見太原周黨東海王良山陽王成等蒙受厚恩使者三聘乃肯就車及陛見帝廷黨不以禮屈伏而不謁偃蹇驕悍同時俱逝黨等文不能演義武不能死君釣采華名庶㡬三公之位臣願與坐雲臺之下考試圖國之道不如臣言伏虚妄之罪而敢私竊虚名誇上求髙皆大不敬漢紀王道以成下云巍巍蕩蕩至今不絶光武詔曄書此詔在升奏後漢紀前後各一詔自古明王聖主必有不賔之士伯夷叔齊不食周粟太原周黨不受朕禄亦各有志焉其賜帛四十匹同前漢紀云黨見上自陳願守所志上聽之下詔博士范升奏毁黨又詔許由不仕有唐帝徳不衰夷齊不食周粟王道不虧不忍使黨久逡巡于汙君之朝其賜帛四十匹遣歸田里又詔自古堯有許由巢父周有伯夷叔齊自朕髙祖有南山四皓自古聖王皆有異士非獨今也伯夷叔齊不食周粟太原周黨不食朕祿亦各有志焉陳元字長孫蒼梧廣信人建武初與桓譚杜林鄭興俱為學者所宗辟司空司徒府奏駁范升論左氏疏元傳父欽左氏業為之訓詁以升奏左氏不宜立詣闕上疏下其議升與元相辯難凡十餘上帝卒立左氏學置博士陛下撥亂反正文武並用深愍經蓺謬雜真偽錯亂每臨朝日輒延羣臣講論聖道知丘明至賢親受孔子而公羊穀梁傳聞於後世故詔立左氏博詢可否示不専已盡之羣下也今論者沈溺所習翫守舊聞固執虚言傳受之辭以非親見實事之道左氏孤學少與遂為異家之所覆冒夫至音不合衆聽故伯牙絶弦至寳不同衆好故卞和泣血仲尼聖徳而不容於世况於竹帛餘文其為雷同者所排固其宜也非陛下至明孰能察之臣元竊見博士范升等所議奏左氏春秋不可立及太史公違戾凡四十五事案升等所言前後相違皆斷截小文媟黷微辭以年數小差掇為巨謬遺脱纖微指為大尤抉瑕擿釁掩其𢎞美所謂小辯破言小言破道者也升等又曰先帝不以左氏為經故不置博士後生所宜因襲臣愚以為若先帝所行而後主必行者則盤庚不當遷於殷周公不當營洛邑陛下不當都山東也往者孝武皇帝好公羊衛太子好穀梁有詔太子受公羊不得受穀梁孝宣皇帝在人間時聞衛太子好穀梁於是獨學之及即位為石渠論而穀梁氏興至今與公羊並存此先帝後帝各有所立不必其相因也孔子曰純儉吾從衆至於拜下則違之夫明者獨見不惑於朱紫聽者獨聞不謬於清濁故離朱不為巧眩移目師曠不為新聲易耳方今干戈少弭戎事略戢留思聖蓺眷顧儒雅採孔子下拜之義卒淵聖獨見之㫖分明黒白建立左氏解釋先聖之積結洮汰學者之累惑使基業垂於萬世後進無復狐疑則天下幸甚臣元愚鄙嘗傳師言如得以褐衣召見俯伏庭下誦孔氏之正道理丘明之宿寃若辭不合經事不稽古退就重誅雖死之日生之年也諫督察三公疏元辟司空李通府大司農江馮言宜令司隸校尉督察三公事下三府元上疏帝從之宣下其議臣聞師臣者帝賔臣者霸故武王以太公為師齊桓以夷吾為仲父孔子曰百官總已聽於冢宰近則髙帝優相國之禮太宗假宰輔之權及亡新王莽遭漢中衰専操國柄以偷天下况已自喻不信羣臣奪公輔之任損宰相之威以刺舉為明徼訐為直至若陪僕告其君長子弟變其父兄網密法峻大臣無所措手足然不能禁董忠之謀身為世戮故人君患在自驕不患驕臣失在自任不在任人是以文王有日昃之勞周公執吐握之恭不聞其崇刺舉務督察也方今四海尚擾天下未一百姓觀聽咸張耳目陛下宜修文武之聖典襲祖宗之遺徳勞心下士屈節待賢誠不宜使有司察公輔之名尹敏字㓜季南陽堵陽人與班彪善厯諫議大夫上光武論六沴疏續漢書敏為諸生有經學建武二年上疏陳洪範消灾之術時帝方草創未遑其事命待詔公車拜郎中六沴作見若是供御帝用不差神則大喜五福乃降用章於下若不供御六罰既侵六極其下明供御則天報之福不供御則禍災至欲尊六事之體則貌言視聽思心之用治六事之揆以致乎太平而消除轗軻孽害也孫福上言劉茂茂字子衛太原晉陽人為太守孫福門下掾建武三年詔求天下義士福上言徴拜議郎厯侍中臣前為赤眉所攻吏民壊亂奔走趣山臣為賊所圍命如絲髮賴茂負臣踰城出保盂縣茂與弟觸冒兵刄緣山負食臣及妻子得度死命節義尤髙宜蒙表擢以厲義士後漢書方儲對䇿建武五年夏旱方儲對䇿見後漢書注百姓苦士卒煩碎責租税失中暴師外營經厯三代内有怨女外有曠夫王者熟推其詳揆合於天圖之事情旱災可除夫旱者過日天王無意於百姓恩徳不行萬民煩擾故天應以無澤張汜上言脩河初平帝時河汴決壊未及得脩建武十年陽武令張汜上言光武為發卒營河功而浚儀令樂俊復上言乃止河決積久日月侵毁濟渠所漂數十計縣脩理之費其功不難宜改脩隄防以安百姓樂俊上言昔元光之間人庶熾盛緣隄墾殖而瓠子河決尚二十餘年不即壅塞今居家稀少田地饒廣雖未脩理其患猶可且新被兵革方興力役勞怨既多民不堪命宜須平靜更議其事杜篤字季雅京兆杜陵人延年𤣥孫為車騎將軍馬防從事中郎戰殁所著賦誄弔書讃七言女誡雜文十八篇明世論十五篇上論都賦奏篤以關中表裏山河先帝舊京不宜改營洛邑乃上表奏論都賦臣聞知而復知是為重知臣所欲言陛下己知故略其梗概不敢具陳昔盤庚去奢行儉於亳成周之隆乃即中洛遭時制都不常厥邑賢聖之慮盖有優劣霸王之姿明知相絶守國之埶同歸異術或弃去阻阸務處平易或據山帶河并吞六國或富貴思歸不顧見襲或掩空擊虚自蜀漢出即日車駕䇿由一卒或知而不從久都墝埆臣不敢有所據竊見司馬相如揚子雲作辭賦以諷主上臣誠慕之伏作書一篇名曰論都謹并封奏如左論都賦序皇帝以建武十八年二月甲辰升輿洛邑巡於西嶽推天時順斗極排閶闔入函谷觀阨於崤黽圖險於隴蜀其三月丁酉行至長安經營宫室傷愍舊京即詔京兆乃命扶風齊肅致敬告覲園陵悽然有懐祖之思喟乎以思諸夏之隆遂天旋雲遊造舟於渭北斻涇流千乗方轂萬騎駢羅衍陳於岐梁東横乎大河瘞后土禮邠郊其嵗四月反於洛都明年有詔復函谷闗作大駕宫六王邸髙車廐於長安修理東都城門橋涇渭往往繕離觀東臨灞滻西望昆明北登長平規龍首撫未央傾平樂儀建章是時山東翕然狐疑意聖朝之西都懼闗門之反拒也客有為篤言彼埳井之潢汙固不容乎吞舟且洛邑之渟瀯曷足以居乎萬乗哉咸陽守國利器不可久虚以示姦萌篤未甚然其言也故因為述大漢之崇世據雍州之利而今國家未暇之故以喻客意衆瑞賦序北堂書鈔夫千金之裘非一狐之白雅頌之聲非一家之作也邊論北堂書鈔匈奴請降毾㲪罽褥帳幔氊裘積如丘山大司馬吳漢誄篤初忤美陽令被收會漢薨光武詔諸儒誄之篤于獄中為誄辭最髙賜帛免刑篤以為堯隆稷契舜嘉臯陶伊尹佐殷吕尚翼周若此五臣功無與疇今漢吳公追而六之乃作誄曰朝失鯁臣國喪爪牙天子愍悼中宫咨嗟四方殘暴公不兹征征兹海内公其攸平泯泯羣黎賴公以寧勲業既崇持盈守虚功成即退挹而損諸死而不朽名勒丹書功著金石與日月俱桓榮字春卿沛國龍亢人厯太常上謝皇太子疏明帝為皇太子光武選求明經拜榮為議郎使授太子後為少傅榮以太子經學成畢上疏謝歸太子報書臣幸得侍帷幄執經連年而智學淺短無以補益萬分今皇太子以聰叡之姿通明經義觀覽古今儲君副主莫能専精博學若此者也斯誠國家福祐天下幸甚臣師道已盡皆在太子謹使掾臣汜再拜歸道歸猶謝也皇太子報桓榮書莊以童蒙學道九載而典訓不明無所曉識夫五經廣大聖言幽逺非天下之至精豈能與於此况以不才敢承誨命昔之先師謝弟子者有矣上則通達經㫖分明章句下則去家慕鄉求謝師門今蒙下列不敢有辭願君慎疾加餐重愛玉體並後漢書朱浮字叔元沛國蕭人為司𨽻校尉厯大司空徙封新息侯顯宗時坐告賜死與彭寵書浮為幽州牧辟召州士引置幕府多發倉穀贍其妻子漁陽太守寵不從其令浮密奏寵帝徴之寵妻勸無應徴乂與所親信計議吏皆怨浮勸寵止不應遂舉兵攻浮浮以書質責寵寵得書愈怒攻浮轉急浮糧盡遁走城降于寵尚書令侯霸奏浮當誅帝不忍以為執金吾後寵為其蒼頭所殺盖聞智者順時而謀愚者逆理而動常竊悲京城大叔以不知足而無賢輔卒自棄于鄭也伯通以名字典郡有佐命之功臨民親職愛惜倉庫而浮秉征伐之任欲權時救急二者皆為國耳即浮疑相譖何不詣闕自陳而為族滅之計乎朝廷之於伯通恩亦厚矣委以大郡任以威武事有柱石之寄情同子孫之親匹夫媵母尚能致命一餐豈有身帶三綬職典大郡而不顧恩義生心外叛者乎伯通與吏人語何以為顔行步拜起何以為容坐卧念之何以為心引鏡窺影何以施眉目舉措建功何以為人惜乎棄休令之嘉名造梟䲭之逆謀捐傳世之慶祚招破敗之重災髙論堯舜之道不忍桀紂之性生為世笑死為愚鬼不亦哀乎伯通與耿侠遊俱起佐命同被國恩侠游謙讓屢有降挹之言而伯通自伐以為功髙天下往時遼東有豕生子白頭異而獻之行至河東見羣豕皆白懐慚而還若以子之功論於朝廷則為遼東豕也今乃愚妄自比六國六國之時其勢各盛廓土數千里勝兵將百萬故能據國相持多厯年世今天下㡬里列郡㡬城柰何以區區漁陽而結怨天子此猶河濵之人捧土以塞孟津多見其不知量也方今天下適定海内願安士無賢不肖皆樂立名於世而伯通獨中風狂走自損盛時内聽嬌婦之失計外信讒邪之諛言長為羣后惡法永為功臣鑒戒豈不誤哉定海内者無私讎勿以前事自誤願留意顧老母少弟凡舉事無為親厚者所痛而為見讎者所快後漢書侠游耿况字年世一作年所自誤一作自疑選注引或本云永為羣后惡志令撿范曄後漢書有此一句東觀漢記亦載此書大意雖同辭㫖全别盖錄事者取舍詳畧矣上光武請救二郡書時彭寵攻浮急涿州太守張豐亦反二郡畔戾北州憂恐上但遣游擊將軍鄧隆隂助浮浮懼帝怠於救乃上疏詔報浮後寵豐果並自敗昔楚宋列國俱為諸侯莊王以宋執其使遂有投袂之師魏公子顧朋友之要觸冒强秦之鋒夫楚魏非有分職匡正之大義也莊王但為爭强而發忿公子以一言而立信耳今彭寵反叛張豐逆節以為陛下必棄捐它事以時滅之既厯時月寂漠無音從圍城而不救放逆虜而不討臣誠惑之昔髙祖聖武天下既定猶身自征伐未嘗寧居陛下雖興大業海内未集而獨逸豫不顧北垂百姓遑遑無所繫心三河冀州曷足以傳後哉今秋稼已熟復為漁陽所掠張豐狂悖姦黨日増連年拒守吏士疲勞甲胄生蟣蝨弓弩不得弛上下燋心相望救䕶仰希陛下生活之恩光武詔報朱浮往年赤眉跋扈長安吾䇿其無穀必東果来歸降今度此反虜勢無久全其中必有内相斬者今軍資未充故須候麥耳論牧守易代疏帝以二千石長吏多不勝任時有微過必見斥罷交易紛擾會有日食之異浮為執金吾上疏自後牧守易代頗簡臣聞日者衆陽之所宗君上之位也凡居官治民據郡典縣皆為陽為上為尊為長若陽上不明尊長不足則干動三光垂示王者五典紀國家之政鴻範别災異之文皆宣明天道以徴来事者也陛下哀愍海内新罹禍毒保宥生人使得蘇息而今牧人之吏多未稱職小違理實輒見斥罷豈不粲然黒白分明哉然以堯舜之盛猶加三考大漢之興亦累功效吏皆積久養老於官至名子孫因為氏姓當時吏職何能悉理論議之徒豈不諠譁盖以為天地之功不可倉卒艱難之業當累日也而間者守宰數見換易迎新相代疲勞道路尋其視事日淺未足昭見其職既加嚴切人不自保各相顧望無自安之心有司或因睚眦以騁私怨茍求長短求媚上意二千石及長吏迫於舉劾懼於刺譏故爭飾詐偽以希虚譽斯皆羣陽騷動日月失行之應夫物暴長者必夭折功卒成者必亟壊如摧長久之業而造速成之功非陛下之福也天下非一時之用也海内非一旦之功也願陛下遊意于經年之外望化于一世之後天下幸甚論牧守易代疏舊制州牧奏二千石長吏不任位者皆先下三公案驗帝時用明察不復委任三府權歸刺舉之吏浮復上疏陛下清明履約率禮無違自宗室諸王外家后親皆奉遵繩墨無黨埶之名至或乗牛車齊於編人斯固法令整齊下無作威者也求之於事宜以和平而災異猶見者而豈徒然天道信誠不可不察竊見陛下疾往者上威不行下専國命即位以来不用舊典信刺舉之官黜鼎輔之任至於有所劾奏便加免退覆案不闗三府罪譴不蒙澄察陛下以使者為腹心而使者以從事為耳目是為尚書之平決於百石之吏故羣下苛刻各自為能兼以私情容長憎愛在職皆競張空虚以要時利故有罪者心不厭服無咎者坐被空文不可經盛衰貽後王也夫事積久則吏自重吏安則人自靜傳曰五年再閏天道乃備夫以天地之靈猶五載以成其化况人道哉臣浮愚戇不勝惓惓願陛下留心千里之任省察偏言之奏請廣太學博士書浮時轉太僕以國學既興宜廣博士之選夫太學者禮義之宫教化所由興也陛下尊敬先聖垂意古典宫室未飾干戈未休而先建太學造立横舍比日車駕親臨觀饗將以𢎞時雍之化顯勉進之功也尋博士之官為天下宗師使孔聖之言傳而不絶舊事䇿試博士必廣求詳選爰自畿夏延及四方是以博舉眀經唯賢是登學者精勵逺近同慕伏聞詔書更試五人唯取見在洛陽城者臣恐自今以往將有所失求之密邇容或未盡而四方之學無所勸樂凡䇿試之本貴得其真非有期會不及逺方也又諸所徴試皆私自發遣非有傷費煩擾於事也語曰中國失禮求之於野臣浮幸得與講圖懴故敢越職乗輿綬奏漢名臣奏車府丞宏受詔作乗輿綬五采何多黄也可更用赤絲為地百官綬奏博物志百官皆帶王莽時綬又不齊因前袁安故綬工李涉等六家所織綬不能具丙丁文能如組狀募能為丙丁文謹圖畫一綬丙丁制度賜縑五十疋今王莽時六安都尉留應募能為丙丁文謹處武庫給食留晝夜思念諷誦狂癡三十日病愈今又以成請賜縑五十疋彭寵字伯通南陽宛人封建忠侯告城門將軍記寵與朱浮相攻詔徴寵不行光武遣寵從弟子后蘭卿諭之寵留子后蘭卿遂發兵反自立為燕王齋獨在便室蒼頭子密等因寵卧縳著牀呼其妻解寵手使作記并斬頭置囊中持記馳出城詣闕封子密等三人為不義侯今遣子密等至子后蘭卿所速開門出勿稽留之後漢書寵死共立子午子后蘭卿為將午為其下所殺降祭遵董宣字少平陳留圉人仕終洛陽令移賊夏喜等書江夏有劇賊夏喜等寇亂郡境以宣為江夏太守到界移書喜等聞懼即時降散朝廷以太守能禽姦賊故辱斯任今勒兵界首檄到幸思自安之宜後漢書宋均字叔庠南陽安衆人仕至尚書令移記屬縣均建武末為九江太守郡多虎暴常募設檻穽均到下記屬縣其後傳言虎相與渡江夫虎豹在山黿鼉在水各有所託今江淮之有猛獸猶北土之有雞豚也今為民害咎在殘吏而勞勤張捕非憂恤之本也其務退姦貪思進忠善可一去檻穽除削課制後漢書均記宣書原屬教令以其名近附之與前薛宣等書相類同前風俗通辨虎渡為非實載均記夫虎豹在山黿鼉在淵物性之所託故江淮之間有猛獸猶江北之有雞豚今數為民害者咎在貪殘居職使然而反逐捕非政之本也壊檻穽勿復課錄退貪殘進忠良下山娶書均為九江太守浚遒縣有唐后二山人共祠之衆巫遂取百姓男女以為公嫗嵗嵗改易既而不敢嫁娶均下書乃絶自今以後為山娶者娶巫家勿擾良民嚴光字子陵本姓莊一名遵會稽餘姚人少與光武同游學及即位遣使聘之三反而後至除諫議大夫不屈隱富春山漢明帝名莊史諱為嚴報侯霸書霸字君房河南密人厯大司徒封關内侯霸與光素舊霸為大司徒遣使奉書使人因謂光曰公聞先生至區區欲即詣造廹於典司是以不獲願因日暮自屈語言光不荅乃投札與之口授云云霸得書封奏之光武笑曰狂奴故態也君房足下位至鼎足甚善懐仁輔義天下悦阿諛順㫖要領絶後漢書皇甫謐髙士傳云霸與光素有舊使西曹屬侯子道奉書光不起於牀上箕踞抱膝發書讀訖問子道曰君房素癡今為三公寧小差否子道曰位已鼎足不癡也光曰遣卿来何言子道傳霸言光曰卿言不癡是非癡語乎天子徴我三乃来人主尚不見當見人臣乎子道求報光曰我手不能書乃口授之使者嫌少可更足光曰買菜乎求益也陳留吏牘上書東觀漢記建武時天下墾田多不實詔覆檢覈百姓嗟怨光武見陳留吏牘上有書時明帝為東海公在幄後言曰河南帝城多近臣南陽帝鄉多近親田宅踰制不可為准也帝詰吏首服因遣謁者考知奸狀潁川𢎞農可問河南南陽不可問東漢文紀巻七
