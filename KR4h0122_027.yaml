body:
  text: 東漢文紀卷二十七明梅鼎祚編楊子欽廣漢長王君治石路碑無額表惟右部官國之􅎇寶衝路危險俠石磐岩闕道人馬闕行為民隆害厯世彌久靡有留心長廣漢王君建和二􅏵冬任掾楊闕攻􅀈治字破壤又從塗口繇平闕三字井間道至别盬得􅀢危􅈬安功夫九百餘日成􅈬通達永傳億嵗無窮記弟子楊子欽奉為作闕㝎逺闕六字造鄭郴張公神碑惟和平元􅏵正月闕二字朝歌長鄭郴造闕張公建闕良闕之山運置綦陽刋鑿涿摩立左右闕表神道闕豎碑廟堂之前到五月闕二字乃成長闕二字之銘勒神懿光祕後昆其辭曰於穆張公舍和泰清受苻皇極乾剛川靈何天之休元享利貞無闕二字貴神耀洞闕二字度闕泉殷商北坰􅛬朝綦􅘯􅍏圡敞平芝草茂木潚潚滋榮羣萌勳炃激川通闕三字懷闕八字廟克儉損盈詺命有司祭以中牲嵗聿再慶公其饗零興來億載厯數萬君闕七字太闕顯猶昭拂英勳闕錫介福惠此吏民國無災寇屢獲豐􅏵皇帝眉夀干祿于天牧守皆升握台輔辰長與丞尉超遷相因休闕烈烈無闕三字監犂􅘯營謁者李君畏敬公靈好鄭長文徹奉佐工悃愊殷勤闕吏闕三字熹且惶作歌九章達李君闕頌公德芳其辭曰綦水湯湯揚清波東疏闕折闕于河闕五字朝歌縣以潔靜無穢瑕公闕守相駕蜚魚往來悠忽遂熹娛祐此兆民寧厥居刋闕出自綦闕四字松柏鬱茂蘭公闕二字神往來乘浮雲種德收福惠斯民家饒户富無闕貧疆界􅜝靜和睦闕二字朝歌蕩隂及犂􅘯三女所處各殊方三門鼎列推其鄉時攜甥幼歸候公夫人闕三字容闕五字饗闕觴穆風屑兮起壇旁樂吏民兮永未央刋闕鹿呦呦兮闕二字庭文樂樂兮闕三字飲清泉兮闕三字見闕伏兮不駭驚惟公德兮之所寧上陵廟兮助三牲天時和兮甘露泠日畨闕兮無虧傾闕二字蜚兮朱鳥棲闕二字榮兮鳴喈喈鳶鵠勦兮乳俳佪給御卯兮獻于西惟公德兮之所懷刋闕池水闕兮釣臺粲四角樓兮臨深澗魚岌岌兮踊躍見振鱗尾兮遊旰旰時釣取兮給享獻惟公德兮之所衍刋闕栗蕭廾兮藂鋪陳新美萌兮香苾芬蕙草生兮滿園田競苔茗兮給萬錢惟公德兮之所闕二字門堂鬱兮文耀光公神赫兮坐東方眀暴視兮儼刋闕卬夫人闕女兮列在旁陳君處北兮從官闕車騎駱驛兮交錯重乘輗軺兮駕蜚龍驂白鹿兮從仙偅遊北􅛬兮與天通刋闕玄碑既立雙闕建兮闕四字大路畔兮亭長閽闕二字扞難兮列種槐梓方茂爤兮天下逺近闕不見兮公神日著聲洞遍兮闕二字乾川傳億萬兮監犂􅘯營謁者豫章南昌李朝伯丞左馮翊夏􅘯趙寵德雅朝歌長穎川􅘯城鄭郴伯林左尉亰兆下闕水闕二字􅘯里郭虞子下闕扶風安都闕二字邵公處士巍郡闕封闕仲舉處士巍郡犂􅘯闕四字𨽻釋云朝歌長鄭郴為張公建闕作碑銘勒神懿監黎陽營謁者李君好鄭之文既徹俸佐工又作歌九章刻之遒雅可觀中再稱其夫人不知張公何神也碑以綦為淇涿摩為琢磨勦為巢偅為僮遍為遍盁為盈即薦字􅜝即􅓦字從水之字皆作篆文案集古録張公廟碑文字殘滅僅成文者惟和平元年正月丙寅國無災寇屢復豐年作歌九章頌公德芳其辭云公與守相云云洪氏去歐陽嵗頗久乃此碑亦成文者尚多也漢德漢德為字亡其名析里橋郙閣頌天下碑録云仇子長書名紼惟斯析里處漢之右溪源漂􅍚橫柱于道涉秋霖漉盆溢闕漏濤波滴沛激揚絶道漢水􅊇讓稽滯商旅路當二州經用䘢沮沮縣士民或給州府休謁往還恆失日晷行理咨嗟郡縣所苦斯溪既然郙閣尤甚緣崖鑿石處隱定柱臨深長淵三百餘丈接木相連號為萬柱適者栗栗載棄為闕常車迎布嵗數千兩遭遇隤納人物俱修沈沒洪淵酷烈為禍自古迄今莫􅄇創楚於是大守漢陽阿陽李君諱翕字伯都以建寧三􅏵二月辛巳到官思惟惠利有以綏濟聞此為難其日久矣嘉念髙帝之開石門元功不朽乃俾衡官掾下拜仇審改解危殆即便求隱析里大槗於今乃造校致致堅闕二字工巧雖昔魯斑亦莫擬象又醳𣪚關之嶄漯從朝陽之平慘減西闕二字髙閣就安寧之石道禹導江河以靖四海經記厥續殳康萬里臣闕三字勒石示後乃作頌曰闕四字降兹惠君克明俊德允武允文躬儉尚約化流若神氓如闕三字平均精通皓穹三納苻銀所厯垂勳香風有鄰仍致瑞應豐稔闕五字樂行人夷欣慕君靡已乃詠新詩闕四字兮川兊之間髙山崔㠕兮水流蕩蕩地既確兮與寇為鄰闕六字以析分或失緒業兮至亐困貧危危纍卵兮聖朝閔憐􅀈殳究闕兮幼闕五字救傾兮全育闕遺劬勞日稷兮惟惠勤勤黃邵朱龔兮蓋不闕四字充贏兮百姓歡欣僉曰大平兮文翁復序建寧五闕二字月十八日癸下闕時衡官闕三字仇審字孔信從史位闕四字字漢德為此頌故吏下辨闕三字子長書此頌時石􅘄南闕四字威明𨽻釋云歐公謂遭遇隤納及醳散關之嶄漯徙朝陽之平慘刻畫完而莫詳其義或是用字假借案碑言閣道危殆車乘往還人物俱墮則隤納謂墜淵也慘即燥字醳與釋同太史公書皆然楊著碑醳榮投黻景君碑農夫醳耒之類是也其云劬勞日稷蓋用榖梁子日下稷之文靈臺費鳳碑亦有之碑以橫柱為橫注盆溢為湓溢行理為行李厥續為厥績崔㠕為崔嵬禍即禍字董逌廣川書跋云案顯古文顯字漯川漢作顯讀謂川在卑濕書學古文至今同古文字濕作又作濕故漢人濕又作纍然則漯當作濕燥古文作慘蓋噪與叄同體其言醳則與易同卜用醳亦易也至謂遭遇隤納則以傾隤地壞自納于淵漢文用字本古也鼎按楊用修云􅢉漯謂潮濕言去濕就燥也至云漯本濟漯之漯借作濕字恐未然據跋則漯字當從漯寫即濕矣首誤寫田耳隸釋注嶄漯云歐作􅢉誤余謂嶄言險漯即濕觀下對平燥可知蓋醳險濕而徙平燥也從嶄為是萇照廣野君廟碑水經注延熹六年十二月雍丘令董生仰餘徽于千載遵茂美于絶代命縣人萇照為文用章不朽之德其略云輟洗分餐咨謀帝猷陳鄭有涿鹿之功海岱無牧野之戰大康華夏綏靜黎物生民以來功盛莫崇魯睿漢故司𨽻校尉忠惠父魯君碑并陰鄭樵金石略碑録並作蔡雍書君諱峻字仲嚴山陽昌邑人其先周文公之碩胄闕二字伯禽之緒以載亐祖考之銘也君則監營謁者之孫修武令之子體純和之德秉仁之操治魯詩兼通顔氏春秋博覽羣書辨物不刊學為儒宗行為士表漢闕始住佐職牧守敬愘恭儉州里歸稱舉孝亷除中謁者河內太守丞喪父如禮辟司徒府舉髙苐侍御史東郡頊丘今視事四乖比縱豹産化行如流遷九江大守闕殘酷之刑行循吏之道統政闕載穆若清風有黃霸召信臣􅏅頴南之歌以公事去官休神家弄未能一期為司空王畼所舉徴拜議郎太尉長史御史中丞延熹七􅏵二月丁卯拜司隸校尉蕫督亰輦掌察羣寮蠲􅀈舉大𣙜然疏發􅄇為小威􅎧濟其仁􅀈中獨斷􅎧效其莭案奏闕公彈絀五卿􅒧夏􅀈肅佞穢者逺遭母憂自乞拜議郎服竟還拜屯騎校尉􅎧病遜位守疏廣止足之計樂於陵灌園之潔閉門靜居珽書自娛􅏵六十一熹平元􅏵闕月癸酉卒明年四月庚子葬於是門生汝南干闕沛國丁直􅠔郡馬萌勃海吕圖任城吳盛陳􅕂誠屯東郡夏侯弘等三百草人追惟􅏅昔遊夏之徒作諡宣尼君事帝則忠臨民則惠乃昭告神明諡君白忠惠父息睿􅄇丈弱冠而孤承堂弗構斨薪弗何悲蓼義之􅄇報痛昊天之靡嘉俯企有紀能􅄇號薝刋石敘哀其銘曰巗巗山嶽礧落彰較棠棠忠惠令德孔㜰命闕時生雅度弘綽允文允武􅍏姿烈逴內懷溫潤外撮強扆督司亰帥穆然清邈當闕緄職為國之𣙜匪究南山遐邇忉凡百君子欽諡嘉樂永傳啻齡㬇吳的的隸釋云水經亦載此碑但誤名恭歐陽公云峻遭母憂自乞拜議郎又最後為屯騎而碑首題以司𨽻二者莫曉豫嘗考漢代風俗相承雖丁私囏亦多以日易月鮮有執喪三年者故元初詔書始聽大臣二千石行三年喪肅宗時越騎校尉桓郁以母憂乞身詔公卿議皆以郁身為名儒學者之宗可許之詔聽以侍中行服漢人所書碑志或以所重之官揭之司𨽻權尊而秩清非列校可比亦猶馮緄舍廷尉而用車騎也周官注云義儀二字古皆音俄詩以實惟我儀協在彼中河樂且有儀協在彼中阿太元亦以各遵其儀協不偏不頗左傳音蛾亦作儀徐廣音檥船作俄漢文凡蓼莪皆作蓼儀此碑又作翏義銘詩煥矣灼灼俱易火以日令德孔鑠又復從女若堂堂作棠棠則它碑亦有之碑以刊為看縱為蹤斨為析緄為衮啻為億偄即儒字􅀈即細字潔即潔字珽即琴字薝即嗟字扆即虐字魯峻碑陰故吏河內闕一字官闕一字幼流闕三字故吏九江壽春陳龔伯闕一字五百故吏九江夀春任闕一字孝長五百故吏東郡領兵許踰伯通五百門生沛國丁良闕一字榮千門生勃海闕二字呂闕一字世階千門生東郡汝陽敢敦登髙千門生汝南召陵千商明公五百門生南陽新野闕一字皓文闕一字五百門生平原闕一字路龍顯公五百門生任闕一字樊兒闕一字太平五百門生平原樂陵路福世輔三百門生魏郡闕一字丘李牧君伯三百門生魏郡繁陽王輔子助三百門生河東郡闕一字陽闕二字文智三百門生汝南汝陽郡立闕三字三百門生東郡闕一字邑闕三字松二百門生東郡闕一字平闕四字二百門生東郡樂平闕一字顯闕二字二百門生東郡樂平闕四字二百門生魏郡內黃闕四字二百門生東郡闕一字陽王闕一字少闕一字二百門生汝南濦強尹稜闕二字二百門生汝南濦強尹皓闕二字二百門生勃海南皮劉扶節闕一字二百門生勃海南皮劉盛興闕二字二百門生河間阜成東鄉晨子闕一字二百門生河間阜成東鄉恭公二百門生平原西平昌劉本景闕一字二百門生平原張謙伯讓二百門生陳留尉氏夏統子思二百門生濟陰陳氏許仁伯德二百門生濟陰闕字一狐周維元興二百義士梁國寧陵及強強良二百都穆金薤琳琅魯峻碑陰歐陽公趙明誠皆失收録至洪丞相隸釋於漢碑搜羅殆盡而亦復遺焉豫家此碑不特人間少有且文字粗完可讀惜不令三公見之郭蒼字伯起曲紅人荆州從事歐陽集古録引韶州圖經周府君廟在樂昌縣西武溪上碑在廟中郭蒼文神漢桂陽太守周府君功勳之紀銘隸額并陰桂陽大守周府君者徐州下邳人也諱憬字君光體性敦仁天姿篤序行興閨門名闕州里舉孝廉拜尚書侍郎遷汝南固始相遂拜桂陽乃宣魯衛之政敷二南之澤政以德綏化猶風騰撫集蒸細闕綏有方進則貞直退則錯枉崇舉濟濟吉土士字充朝招訓闕蒙開誘六蔽君子道長小人道消信感神祗靈瑞苻闕嘉穀生於豎竒草像萐莆異根之樹超然連理於此闕時􅀢域惟寧郡又與字南海接比商旅所臻自瀑亭至乎曲紅一由此水其水源也出於王􅀢之山山蓋隆闕三字亐天泉肇沸踊發射其顛分㳅離散為十二川彌陵阻丘阜錯連隅陬雍藹末由騁焉爾乃貫山鑽石經闕四字揚爭怒浮沈潛伏蛇龍蛣屈澧隆鬱浥千渠萬澮合聚溪澗下迄安􅀢六瀧作難湍瀨􅀈􅀈泫沄潺湲雖詩稱百川沸騰髙岸為谷深谷為陵蓋莫若斯天軌所經惡得已改其下注也若奔車失轡狂牛無縻闕勿㐬忽臚􅀈不相知及其上也則羣輩相隨檀柁提闕唱號慷慨沈深不前其成敗也非徒喪寶玩隕􅎇竒替珠貝㳅象犀也往古來今變甚終矣於是府君乃思夏后之遺訓闕應龍之畫傷行旅之悲窮哀向人困厄感蜀守冰殄絶犂魋嘉夫昧淵用永夷易乃命良史炙壯夫排穨磐石投之􅀢闕二字髙填下鑿截回曲􅀈水之邪􅒏順導其經脈斷硍溢之電波弱陽侯之洶涌由是小徯乃平直大道允通利抱布貿絲交易而至升涉周旋功萬於前除昔闕二字樹墓於兹雖非龍門之鴻鴻字績亦人君之德宗故船船字人嘆於水渚行旅語於塗陸孔子曰禹不決江踈河吾其魚矣於是熹平三季歲􅏅攝提仲冬之月曲紅長零陵重安區祉字景賢遵承典宣揚德訓帥禮不越欽仰髙山乃與邑子故吏龔臺郭蒼龔雒等命工擊石建碑亐瀧上勒銘公功傳之萬壵垂示無窮其辭曰乾川剖兮建兩儀剛柔分兮有險夷咨中􅛬兮穆崔嵬嘆衡林兮獨傾虧增峻峭兮甚嶇崎鮌莫涉兮禹不規仰王禽兮又崜峗俯瀧淵兮怛以悲岸參天兮無路徯石縱橫兮㳅洄洄波隆隆兮聲若雷或抱偵兮以從利或追恩兮有赴義汜自楫兮有不避闕躬軀兮於玄池委􅒏命兮於芒􅀈憯寒栗兮不皇計忽隨㳅兮殆忘歸懿賢后兮發聖字莢閈不通兮治斯溪蹶臣石兮以湮填開切兮導曲機摧六瀧兮弱闕兮𣪚其波威恕定兮混灡灡息聊啾兮逝闕兮蛟龍臧􅀈老唱兮臚人歌名壵兮闕超踰倫今稱闕兮耀㳅沙功斐斐兮鏡海裔君乎君夀不訾𨽻釋云樂史寰宇記云瀧上有太守周昕廟今碑在韶州張九齡廟中其名尚隱隱可辨蓋憬字也碑以壅藹為壅遏犂魋為犂堆小徯路徯皆為蹊周憬碑陰故曲紅長零陵重安區祉字景賢故舍洭長南郡邔蒼陸字闕夏故湞陽守長南平丞長沙漢昌寋秪字宣莭故行事耒陽夏字漢威故荆州從事曲紅龔臺字少謙故荆州從事曲紅郭蒼字伯起故荆州從事郴王鼎字季尼故南部曲紅龔雒字闕然故吏曲紅鄧音字孝直故吏曲紅朱騭字義德故吏曲紅張源字子才故吏曲紅龔達字叔通故吏曲紅黃部字壵尼故吏曲紅周蓋字伯嘗故吏曲紅黃晏字子齊故吏曲紅馬圭字元序故吏曲紅潭承字寧升故吏曲紅劉鵠字季産故吏曲紅黃祺字叔仁故吏曲紅周習字仲鸞故吏曲紅劉字子省故吏郴褚禧字闕讓故吏耒陽蔡闕字已眀故湞陽左尉零陵􅰦陵闕三字故吏湞陽劉明字仲闕故吏湞陽左勝字仲升故吏湞陽左和字妙舉故吏湞陽宋碩字子張故吏舍洭堯禹字公制故吏舍洭張邵字寧威故吏舍洭黃詳字伯莭工􅘄南陽宛王遷字子強隸釋云曲紅兩漢書皆作曲江唯水經云縣昔號曲紅山之名也卜胤漢故堂邑令費君之碑篆額惟熹平六􅏵嵗􅛕亐大㐬無射之月堂邑令費君寢疾卒烏呼哀哉於是夫人元弟故闕三字守卜胤追而誄之其辭曰君體履朵和溫其如玉情孝友乎閨閾藝忠謇於王室立迹州郡仕更右職舉直措枉強衛闕㒃貢孝三署勛譽有則出宰近甸民懷厥德色斯輕翔翻然髙潔王人述職分闕班爵台闕二字招助鼎調物退已進弟􅄇􅀢榮祿栖遲厯稔項領滯畜彰土􅄇庭黔民作卣命君闕二字政化闕行從善遷恩三暮期字致道有眺且􅛕收旌功轉左堂邑垂拱􅄇言而民帥伏三時之間卒以闕洽旻天􅄇弔命也早春秋六十六梨儀瘁傷泣涕連漉豈愛我躬命􅄇可贖臨終迷闕三字內彂祖業良田畝直一金推子弟息辭位讓則行義髙邵卓􅄇可及名實相副有始有卒闕二字人善􅫖兮切惻故吏故鄣施業字世堅義民堂邑忠忠􅏵十有一慈考早隕喪以僃於禮制蓬首而闕三字壤而消辟地闕三字行母氏以闕四字而悼傷服闕菲五五縗杖其未除廣陵之郡守東海闕二字聞寢疾而終卒凡百普悲闕四字舜化比屋之餘慶隨闕棺柩車哀以而􅊇之祖載已畢訖還返其故鄉君闕其莭操悲其有闕二字每以闕五字其􅀢親忠闕君德念君之仁恩聞君之隕隧剝斷而􅏵酸復截縗麻杖闕君之柩棺扶號而竭闕泣涕其闕八字甫􅋋岐山闕二字其從之迷君而官上書而慶厲字君盡禽息之闕三字君之闕三字君闕三闕七字􅋋山闕列種嘉奇樹特為之潤鮮忠業與闕二字猶君恩使然雖君有大化孰能爾者難子喪之終闕三字思其顔而闕死可贖不愛闕三字人今君闕􅋋彼卓譎而超倫吏民慕高蹤來者其如雨偉名建磐石垂示􅋋闕二字門下功曹徐侃字元莭主簿呂嘉字元闕主史陳信字聖舉主記史闕忠字建臺門下遊激闕二字字叔騰門下賊曹闕二字字聖臺門下史曹助字仲臺闕吏吕常字孝讓從掾位徐超字元貴隸釋云梨儀瘁傷孔宙碑亦云乃綏三縣黎儀以康黎則黎老之稱儀則讀如旄倪之倪也誄之後載施業戚忠二人竭力送終之事其辭皆五言石磨滅文不相屬菲五五者居喪菲食二十五月也岐山者其地名其後有門下功曹題名者九人碑以藝為執格于大荒有恥且格皆不從木石勛費鳳别碑君家中孫陵石勛字子丈載馳載驅來奔亐喪庭肝崔意悲感切傷心瞻彼碑誄懷之好音司馬墓藺相南復白􅀈仰之以彌高鑽之而彌堅􅄇堪哀且思敘詩之一篇庶􅂒昔子夏起夫子之所言其辭曰君諱鳳字伯蕭梁相之元子九江太守之長兄也丗德襲爵銀相亞遐祖之鴻軌拓前代之休蹤邈逸而難繼非羣愚之所頌仁義本􅋋心慈孝著􅋋性言􅄇失典術行􅄇矩度清潔曒爾􅀢而􅄇滓恤憂矜厄施而􅄇記由近及逺靡􅄇載故能闡令名而雲騰揚盛聲而風布踐郡右職三貢獻計辟州式部忠以衛上漢安二年吳郡太守東海郭君以君有逶蛇之莭自公之操年丗一舉孝廉拜郎中除陳國新平長神化風靡惠以流下靜而為治匪煩匪擾乾乾日矜此黔首功成事就色斯髙舉宰司委職位思賢以自輔玄懿守謙虗白駒以􅀢丹陽有寇闕四字命君討理之試守故鄣長蓋危亂有􅄇讓又畏此之罔闕二字而闕牧爰止其師旅鴧若飛鷹錿若夫虓虎強者綏以德弱者以仁撫蕳􅏅上帝心功訓而特紀轓輿宰棠邑期月而致道視闕四字遂據亐卿尹中表之恩情兄弟與甥樢與女蘿性樂松之茂好聞君顯令名舉宗為歡喜􅄇恰奄忽終藏形而匿景耕夫釋耒耜乘婦投鉤莒道阻而且長望逺淚如雨莢馬循大路搴裳而涉洧歌􅎟離思黃鳥集亐楚之臨內送君􅋋土嗟嗟悲且傷每食闕􅄇絶夫人篤舊好􅄇以存亡改文平感渭陽悽愴益以甚諸姑咸璧踊爰及君伯姊孝孫字元宰生􅄇識考妣追惟厥祖恩蓬首斬纕杖世所􅄇能為流稱於鄉黨見吾若君􅔅剝裂而不已一别會無期相去三千里絶翰永慷慨泣下不可止隸釋云勛詩先敘世系厯官繼以韻語六十句其三句六言餘皆五言石君蓋鳳之中表也費氏父子三碑不知者指此為碑陰其中而不滓蓋用涅而不緇鴧若飛鷹錿若夫虓虎蓋用鴧彼飛隼闞如虓虎其字有不同若非假借則是傳授異也碑以崔為摧以􅂒為幾以逶蛇為委蛇以為逐以基為期以璧為叶樊毅字仲德射陽侯丹之後掾臣條屬臣準書佐臣謀𢎞農太守上祠西嶽乞差一縣賦發復華下十里以內民租田口算狀光和二年十二月庚午朔十三日王𢎞農大守臣毅頓首死罪上尚書臣毅頓首頓首死罪死罪謹案文書臣以去元年十一月到官其十二月奉祠西嶽華山省視廟舍及齋衣祭器率皆久逺有垢故魯不修大室春秋作譏臣以神嶽至尊冝加恭肅輒遣行事荀斑與華陰令先讜以漸繕治成就之後仍雨甘雪瀐潤宿麥惠滋菞庶臣即日以詔書齋祠雪未消澤時日清和神歡民喜誠聖朝勞神日􅉴廣被四表覆育之德神人被施遐邇大小莫不羍甚臣毅頓首頓首死罪死罪讜又書言縣當孔道加奉尊嶽一歲四祠養牲百日常當充肥用穀稿三千餘或有請雨齋禱役費兼倍每被詔書調發無差山髙聽下恐近廟小民不堪役賦有飢寒之窘違宗神之敬乞差諸賦復華下十里以內民租田口算以寵神靈廣祈多福隆中興之祚臣輒聽行盡力奉宣詔書思惟惠利增異復上臣毅誠惶誠恐頓首頓首死罪死罪上尚書此碑菞為黎瀐為漸前漢志注云三輔黃圖漸臺亦作瀐李夀長上瞻察長吏奏夀長為青州刺史其所經厯它州縣瞻察守牧長吏治政優劣上言臣以為政一流雖非所部夫東家有犬不忍見西家之有鼠臣之所見敢不以聞謝承後漢書范延夀上言延夀為廷尉燕趙間有三男共一妻生四子後爭訟延夀上言奏免太尉切責三老無師道男子貴信婦人貴貞今三男一女比之禽獸生子逐母宜以四子還母尸三男子於市傅子杜真奏舉孝廉事北堂書鈔今諸國舉孝廉即古之貢士也三年考德道藝之士于王再拜受之李固與弟圄風俗記曰華陽黑水惟梁州漢元朔二年改梁曰益州以新啓犍為牂牱越嶲州之疆壤益廣故稱益云初治廣漢之雒縣後乃徙此故固與弟圄書固今年五十有七鬢髮已白所謂容身而遊滿腹而去周觀天下獨未見益州耳昔嚴夫子嘗言經有五涉其四州有九遊其八欲類此子乎水經注王云此非李太尉也太尉益州人年五十四鼎按獻帝起居注帝遣中郎將李固持節拜李傕為大司馬則又一李固矣未詳此復為何劉廣世七興子康子有疾王先生往焉曰騣凶鬯匕壯之馬慉不征路其荷衡也躍似驚禽其即行也翬若遊鷹飇駭風逝電發波騰影不及形塵不暇興趙一非草書余郡士有梁孔達薑孟頴者皆當世之彥哲也然慕張生之草書過于希顔孔焉孔達寫書以示孟頴皆口誦其文手揩其篇無怠倦焉於是後學之徒競慕二賢守令作篇人撰一卷以為祕玩余懼其背經而趨俗此非所以𢎞道興世也又想羅趙之所見嗤沮故為説草書本末以慰羅趙息梁薑焉竊覽有道張君所與朱使君書稱正氣可以消邪人無其舋妖不自作誠可謂信道抱真知命樂天者也若夫褒杜崔沮羅趙欣欣有自臧之意者無乃近於矜伎賤彼貴我哉夫草書之興也其於近古乎上非天象所垂下非河洛所吐中非聖人所造蓋末之末刑峻網密官書煩冗戰攻並作軍書交馳羽檄分飛故為𨽻草趣急速耳示簡易之指非聖人之業也但貴刪難省煩損復為單務取易為易知非常儀也故其讚曰臨事從宜而今之學草書者不思其簡易之旨直以為杜崔之法龜龍所見也其􅀈扶柱桎詰屈叐乙不可失也齓齒以上茍任涉學皆廢倉頡史籕競以杜崔為楷私書相與庶獨就書云適迫遽故不及草草本易而速今反難而遲失指多矣凡人各殊氣血異筋骨心有踈密手有巧拙書之好醜在心與手可強為哉若人顔有美惡豈可學以相若耶昔西施心疹捧胸而顰衆愚效之秪增其醜趙女善舞行步媚蠱學者弗獲失節匍匐夫杜崔張子皆有超俗絶世之才博學餘暇遊手于斯後世慕焉專用為務鑽堅仰髙忘其罷勞夕惕不息仄不暇食十日一筆月數丸墨領袖如皂唇齒常黑雖處衆坐不違談戲展指畫地以草劌壁臂穿皮刮指爪摧折見䚡出血猶不休輟然其為字無益于工拙亦如效顰者之增醜學步者之失節也且草書之人蓋伎藝之細者耳鄉邑不以此較能朝廷不以此科吏博士不以此講試四科不以此求備徵聘不問此意考績不課此字徒善字既不達于政而拙草無損于治推斯言之豈不細哉夫務內者必闕外志小者必忽大俯而捫虱不暇見地仰而觀蟣不暇見天天地至大而不見者方鋭精于蟣虱乃不暇焉第以此篇研思鋭精豈若用之於彼七經稽厯協律推步期程探賾鉤深幽贊神明鑒天地之心推聖人之情析疑論之中理俗儒之諍依正道於邪説儕雅樂於鄭聲興至德之和睦𢎞大倫之玄清窮可以守身遺名達可以尊主致平以兹命世永鑒後生不以淵乎趙爽字君卿宋鮑浣之序云崇文總目及李籍周髀音義皆云趙君卿不詳何代人孝序文渾天有靈憲之文靈憲乃張衡所作則君卿其亦魏晉間人乎今本作漢周髀算經序夫髙而大者莫大於天厚而廣者莫大於地體恢𢎞而廓落形修廣而幽清可以玄象課其進退然而宏達不可指掌也可以晷儀驗其長短然其巨闊不可度量也雖窮神知化不能極其妙探賾索隱不能盡其微是以詭異之説出而兩端之理生遂有渾天蓋天兼而並之故能彌綸天地之道有以見天地之賾則渾天有靈憲之文蓋天有周髀之法纍代存之官司是掌所以欽若昊天恭授民時爽以暗蔽才學淺昧鄰髙山之仰止慕景行之軌轍負薪餘日聊觀周髀其指約而逺其言曲而中將恐廢替濡滯不通使談天者無所取則輒依經為圖誠冀頽毁重仞之墻披露堂室之奧庶博物君子時迥思焉楊孚後漢時議郎著交州異物志異物志見隋書鮫魚贊異魚圖贊引交州異物志舊贊鼎按物産之紀若後漢楊孚交州異物志吳萬震南州異物志隋沈瑩臨海水土異物志諸書敘述多韻語楊用修異魚圖贊及丹鋁録紀物産率裁以為贊實非其倫也注云舊贊亦無的據今聊附之鮫之為魚其子既育驚必歸母還入其腹小則如之大則不復蝦魚贊異魚圖贊引異物志舊贊案隋志楊孚别有異物志而太平御覽載此云異物記亦不言贊蝦實四足而有魚名頭尾類鯷岐岐而行長生山澗出入沉浮云是懶婦怨懟自投梁夫人嫕上和帝訟梁貴人書嫕梁竦之長女南陽樊調之妻孝和皇帝之姨恭懷皇后之同産姊也初竦有三男三女肅宗納二女為貴人小貴人生和帝竇皇后養以為子諸竇恐梁氏得志遂譛殺二貴人而陷竦等以惡逆竦考死獄中家屬徙九真及和帝立永元九年竇后崩諸竇以罪誅放竦兄子扈遣從兄禪奏記三輔以為梁貴人親育聖躬不蒙尊號求得申議嫕從民間上書自訟帝乃引見留止宫中嫕素有行操加號梁夫人擢樊調為羽林左監尊貴人恭懷皇后封竦為褒親愍侯並封其三子妾同産女弟貴人前充後宫蒙先帝厚恩得見寵幸皇天授命誕生聖明而為竇憲兄弟所見譛訴使妾父竦寃死牢獄骸骨不掩老母孤弟逺徙萬里獨妾遺脫逸伏草野常恐沒命無由自達今遭值陛下神聖之運親統萬機羣物得所憲兄弟姦惡既伏辜誅海內曠然各獲其宜妾得蘇息拭目更視乃敢昧死自陳所天妾聞太宗即位薄氏蒙榮宣帝繼統史族復興妾門雖有薄史之親獨無外戚餘恩誠自悼傷妾父既寃不可復生母氏年殊七十及弟棠等逺在絶域不知死生願乞收竦朽骨使母弟得歸本郡則施過天地存歿幸賴曹大家班昭字惠班一名姬扶風曹世叔妻司空掾班彪之女博學髙才世叔早卒有節行法度和帝詔續兄固漢書八表及天文志召入宫令皇后諸貴人師事焉號曰大家所著賦頌銘誄問注哀辭書論疏令十六篇上和帝請徵兄超還書超在西域三十餘嵗上疏乞歸昭亦書請超和帝乃徵超還妾同産兄西域都護定逺侯超幸得以微功得蒙重賞爵列通侯位二千石天恩殊絶誠非小臣所當被蒙超之始出志捐軀命冀立微功以自陳效會陳睦之變道路隔絶超以一身轉側絶域曉譬諸國因其兵衆每有攻戰輒為先登身被金夷不避死亡賴蒙陛下神靈且得延命沙漠至今積三十年骨肉生離不復相識所與相隨時人士衆皆已物故超年最長今且七十衰老被病頭髮無黑兩手不仁耳目不聰明扶杖乃能行雖欲竭盡其力以塞報天恩迫于嵗暮犬馬齒索蠻夷之性悖逆侮老而超旦暮入地久不見代恐開姦宄之源生逆亂之心而卿大夫咸懷一切莫肯逺慮如有卒暴超之氣力不能從心便為上損國家纍世之功下棄忠臣竭力之用誠為可痛也故超萬里歸誠自陳苦急延頸踰望三年于今未蒙省録妾竊聞古者十五受兵十六還之亦有休息不任職也緣陛下以至孝理天下得萬國之歡心不忘小國之臣况超得備侯伯之位故敢觸死為超求哀丐超餘年一得生還復見闕庭使國永無勞逺之慮西域無倉卒之憂超得長蒙文王葬骨之恩子方哀老之惠詩云民亦勞止迄可小康惠此中國以綏四方超有書與妾生訣恐不得相見妾誠傷超以壯年竭忠孝於沙漠疲老則便捐死於曠野誠可哀憐如不蒙救護超後有一旦之變冀幸超家得蒙趙母衛姬先請之貸妾愚戇不知大義觸犯忌諱上鄧太后論鄧騭乞身疏永初中太后兄大將軍鄧騭以母憂上書乞身太后不欲許以問昭昭因上疏太后從而許之於是騭等各還里第焉伏惟皇太后陛下躬盛德之美隆唐虞之政闢四門而開四聰采狂夫之瞽言納芻蕘之謀慮妾昭得以愚朽身當盛明敢不披露肝膽以效萬一妾聞謙讓之風德莫大焉故典墳述美神祗降福昔夷齊去國天下服其廉髙太伯違邠孔子稱為三讓所以光昭令德揚名於後者也論語曰能以禮讓為國於從政乎何有由是言之推讓之誠其致逺矣今四舅深執忠孝引身自退而以方垂未靜拒而不許如後有毫毛加於今日誠恐推讓之名不可再得緣見逮及故敢昧死竭其愚情自知言不足采以示蟲蟻之赤心四舅謂騭悝𢎞閶女誡七篇昭作女誡七篇有助內訓馬融善之令妻女習焉女妹曹豐生亦有才惠為書難之辭有可觀文心雕龍云班昭家誡足為女師鄙人愚暗受性不敏蒙先君之餘寵賴母師之典訓年十有四執箕帚於曹氏於今四十餘載矣戰戰兢兢常懼黜辱以增父母之羞以益中外之纍夙夜劬心勤不告勞而今而後乃知免爾吾性疏頑教導無素恆恐子穀負辱清朝聖恩橫加猥賜金紫實非鄙人庶幾所望也男能自謀矣吾不復以為憂也但傷諸女方當適人而不漸訓誨不聞婦禮懼失容它門取恥宗族吾今疾在沉滯性命無常念汝曹如此每用惆悵間作女誡七章願諸女各寫一通庶有補益禆助汝身去矣其勗勉之卑弱第一古者生女三日卧之床下弄之瓦磚而齋告焉卧之床下明其卑弱主下人也弄之瓦磚明其習勞主執勤也齊告先君明當主繼祭祀也三者蓋女人之常道禮法之典教矣謙讓恭敬先人後已有善莫名有惡莫辭忍辱含垢常若畏懼是謂卑弱下人也晚寢早作勿憚夙夜執務私事不辭劇易所作必成手迹整理是謂執勤也正已端操以事夫主清靜自守無好戲笑潔齊酒食以供祖宗是謂繼祭祀也三者茍備而患名稱之不聞黜辱之在身未之見也三者苟失之何名稱之可聞黜辱之可逺哉是謂卑弱後漢書無是謂二字夫婦第二夫婦之道參配陰陽通達神明信天地之𢎞義人倫之大節也是以禮貴男女之際詩著關雎之義由斯言之不可不重也夫不賢則無以御婦婦不賢則無以事夫夫不御婦則威儀廢缺婦不事夫則義理墯闕方斯二事其用一也察今之君子徒知夫婦之不可不御威儀之不可不整故訓其男檢以書傳殊不知夫主之不可不事禮儀之不可不存也但教男而不教女不亦蔽于彼此之數乎禮八嵗始教之書十五而至于學矣獨不可依此以為則哉禮義一作義理敬順第三陰陽殊性男女異行陽以剛為德陰以柔為用男以強為貴女以弱為美故鄙諺有云生男如狼猶恐其尫生女如鼠猶恐其虎然則修身莫如敬避強莫如順故曰敬順之道婦之大禮也夫敬非他持久之謂也夫順非它寬裕之謂也持久者知止足也寬裕者尚恭下也夫婦之好終身不離房室周旋遂生媟黷媟黷既生語言過矣語言既過縱恣必作縱恣既作則侮夫之心生矣此由於不知止足者也夫事有曲直言有是非直者不能不爭曲者不能不訟訟爭既施則有忿怒之事矣此由不尚恭下者也侮夫不節譴呵從之忿怒不止楚撻從之夫為夫婦者義以和親恩以好合楚撻既行何義之存譴呵既宣何恩之有恩義既廢夫婦離矣存一作有離矣書作離行婦行第四女有四行一曰婦德二曰婦言三曰婦容四曰婦功夫云婦德不必才明絶異也婦言不必辨口利辭也婦容不必顔色美麗也婦功不必功巧過人也清間貞靜守節整齊行已有恥動靜有法是謂婦德擇辭而説不道惡語時然後言不厭于人是謂婦言盥浣塵穢服飾鮮潔沐浴以時身不垢辱是謂婦容專心紡績不好戲笑潔齋酒食以奉賔客是謂婦功此四者女人之大德而不可乏者也然為之甚易唯在存心耳古人有言仁逺乎哉我欲仁而仁斯至矣此之謂也功巧一作工巧浣一作洗酒食一作酒肉專心第五禮夫有再娶之義婦無二適之文故曰夫者天也天固不可逃夫固不可離也行違神祇天則罰之禮義有愆夫則薄之故女憲曰得意一人是謂永畢失意一人是謂永訖由斯言之夫不可不求其心然所求者亦非謂佞媚苟親也固莫若專心正色禮義居潔耳無塗聽目無邪視出無冶容入無廢飾無聚會羣輩無看視門户此則謂專心正色矣若夫動靜輕脫視聽陜輸入則亂髮壞形出則窈窕作態説所不當道觀所不當視此謂不能專心正色矣曲從第六夫得意一人是謂永畢失意一人是謂永訖欲人定志專心之言也舅姑之心豈當可失哉物有以恩自離者亦有以義自破者也夫雖云愛舅姑云非此所謂以義自破者也然則舅姑之心奈何固莫尚於曲從矣姑云不爾而是固宜從令姑云爾而非猶宜順命勿得違戾是非爭分曲直此則所謂曲從矣故女憲曰婦如影響焉不可賞猶宜一作猶當和叔妹第七婦人之得意於夫主由舅姑之愛已也舅姑之愛已由叔妹之譽已也由此言之我臧否譽毁一由叔妹叔妹之心復不可失也皆莫知叔妹之不可失而不能和之以求親其蔽也哉自非聖人鮮能無過故顔子貴於能改仲尼嘉其不二而况婦人者也雖以賢女之行聰哲之性其能備乎是故室人和則謗掩外內離則惡揚此必然之藝也易曰二人同心其利斷金同心之言其臭如蘭此之謂也夫嫂妹者體敵而尊恩疏而義親若淑媛謙順之人則能依義以篤好崇恩以結援使徽美顯章而瑕過隱塞舅姑矜善而夫主嘉美聲譽曜于邑鄰休光延於父母若夫蠢愚之人於嫂則托名以自髙於妹則因寵以驕盈驕盈既施何和之有恩義既乖何譽之臻是以美隱而過宣姑忿而夫慍毁訾布於中外恥辱集於厥身進增父母之羞退益君子之纍斯乃榮辱之本而顯否之基也可不慎哉然則求叔妹之心固莫尚於謙順矣謙則德之柄順則婦之行凡斯二者足以和矣詩云在彼無惡在此無射其斯之謂也賢女一作婦人秦嘉字士會隴西人與妻徐淑書隴西秦嘉雋秀之士婦徐淑亦以才美流譽桓帝時嘉為上郡掾其妻寢疾還家不獲面别嘉以書遣迎淑答之不能養志當給郡使隨俗順時僶俯當去知所苦故爾未有瘳損想念悒悒勞心無已當涉逺路趨走風塵非志所慕慘慘少樂又計往還將彌時節念發同怨意有遲遲欲暫相見有所屬託今遣車往想必自力藝文類聚未有瘳損姚寬西溪叢語作尚未有瘳風塵作飛塵徐淑劉子玄史通云東漢賢明婦人如徐氏動合禮儀言成規矩毁形不嫁哀慟傷生此才德兼美者也董祀妻文詞有餘節概不足蔚宗傳標列女徐淑不齒而蔡琰見書欲使彤管所載將安凖的答夫秦嘉書知屈圭璋應奉嵗使策名王府觀國之光雖失髙素皓然之業亦是仲尼執鞭之操也自初承問心願東還迫疾未宜抱歎而已日月已盡行有伴􅍌想嚴裝已辦發邁在近誰謂宋逺企子望之室邇人遐我勞何如深谷逶迤而君是涉髙山巖巖而君是越斯亦難矣長路悠悠而君是踐氷雪慘烈而君是履身非形影何得動而輒俱體非比目何得同而不離於是詠萱草之喻以消兩家之思割今者之恨以待將來之歡今適樂土優遊京邑觀王都之壯麗察天下之珍妙得無目玩意移往而不能出耶未移叢語作惟亟詠萱草之喻作誦萱草之詠伴列舊作伴例誤嘉重報妻書車還空反甚失所望兼敘逺別恨恨之情顧有悵然間得此鏡既明且好形觀文彩世所希有意甚愛之故以相與并寶叉一雙好香四種素琴一張常所自彈也明鏡可以鑑形寶叉可以耀首芳香可以馥身素琴可以娛耳一云今致好香四種各一斤可以除穢又云今致寶叉一雙價值千金可以耀首又云今奉麝香一斤可以辟惡氣顧有叢語作顧尤且好作妍媸形作及好香作妙香間書鈔作頃文彩作文藻世所希有作為世所希妻又報嘉書既惠令音兼賜諸物厚顧殷勤出于非望鏡有文彩之麗叉有殊異之觀芳香既珍素琴益好惠異物於鄙陋割所珍以相賜非豐恩之厚孰肯若斯覽鏡執叉情想髣佛操琴詠詩思心成結敕以芳香馥身喻以明鏡鑒形此言過矣未獲我心也昔詩人有飛蓬之感班婕妤有誰榮之歎素琴之作當須君歸明鏡之鑑當待君還未奉光儀則寶叉不列也未侍帷帳則芳香不發也並藝文類聚太平御覽云今君征未旋鏡將何施明鏡鑒形當待君至又今奉金錯碗一枚可以盛書水琉璃碗一枚可以服藥酒藝文類聚太平御覽又云今奉旄牛尾拂一枚可拂塵垢又奉今往龍虎組織履一緉又云今奉細布襪二量又云今奉嚴器中物幾具又云今奉越布手巾二枚竇玄妻玄字叔髙平陵人別夫書玄狀貌絶異天子使出其妻妻以公主妻悲怨寄書及歌與玄時人憐而傳之名古怨歌亦名豔歌摰虞三輔決録注云叔髙以明經為郡上計吏朝會數百人叔髙儀狀絶衆天子異其貌以公主妻之叔髙時自有妻不敢以聞方欲迎妻與決未發而詔叔髙就第王儉褚淵碑漢結叔髙晉姻武子方斯蔑如也棄妻斥女敬白竇生卑賤鄙陋不如貴人妾日以逺彼日以親何所控訴仰呼蒼旻悲哉竇生衣不厭新人不厭故悲不可忍怨不可去彼獨何人而居斯處藝文類聚古怨歌云煢煢白兔東走西顧衣不如新人不如故華陽國志漢中士女云杜泰姬南鄭人趙宣妻也生七男七女若元圭稚圭有望五人皆令德其教男也曰中人情性可上下也在其檢耳若放而不檢則入惡也昔西門豹佩韋以自寬宓子賤帶弦以自急故能改身之恆為天下名士戒諸女及婦曰吾之委身在乎正順及其生也恩存于撫愛其長之也威儀以先後之體貌以先後之恭敬以監臨之勤恪以勸之孝順以內之忠信以發之是以皆成而無不善汝曹庶幾勿忘吾法也按此本非書尺牘刪取教男之語為寄子元圭季圭蔡琰字文姬雍女博學有才辨嫁衛仲道夫亡漢末亂為南胸奴左賢王所獲曹操贖嫁董祀蔡雍石室神授筆勢雍字伯喈東漢陳留圉人官至右中郎將初入嵩山學書於石室中得素書八角垂芒寫史籒李斯用筆勢讀誦三年遂通其理嘗居一室不寐恍然一客厥狀甚異授以九勢言訖而沒蔡琰曰琰雍之女臣父造八分時神授筆法曰書肇於自然自然既立陰陽生焉陰陽既生形氣立矣藏頭護尾力在字中下筆用力獻酬之麗故曰勢來不可止勢去不可遏書有二法一曰疾二曰澀得疾澀二法書妙盡矣夫書稟乎人性疾者不可使之令徐徐者不可使之令疾筆惟軟則奇怪生焉九勢列後自然無師授而合於先聖陰陽者結字點畫上皆覆下下以承上遞相映帶無使反背轉筆左施右顧無使筋節孤露藏鋒點畫出入之路左先右至回右亦爾此處脫去藏頭勢後求而補之護尾點畫勢盡用力收之疾勢出于啄磔之中又在竪䟐之腹掠筆左出攢鋒峻躍用之澀勢悉在緊馭戰行之法橫鱗竪勒之規蔡字傳神授永字八法集論法書苑云蔡氏神授凡十二訣永字第五先賢神授不形紙筆八法集論未詳所出廬陵蕭氏書譜題曰神人八法潞陽李氏書法題曰永字八法蕭詳於李今從之南單于屯屠何上竇太后請討北庭奏屯屠何章和二年立時北虜大亂加以飢蝗南單于將并北庭會章帝崩竇太后臨朝單于上言太后以示耿秉上言因自陳效用永元元年以秉為征西將軍與車騎將軍竇憲出朔方擊北虜大破之臣纍世蒙恩不可勝數孝章皇帝聖思逺慮遂欲見成就故令烏桓鮮卑討北虜斬單于首級破壞其國今所新降虛渠等詣臣自言去嵗三月終發虜庭北單于創刈南兵又畏丁令鮮卑遁逃逺去依安侯河西今年正月骨都侯等復共立單于異母兄右賢王為單于其人以兄弟爭立並各離散臣與諸王骨都侯及新渠帥雜議方略皆曰宜及北虜分爭出兵討伐破北戍南并為一國令漢家長無北念又今月八日新降右須日逐鮮堂輕從虜庭逺來詣臣言北虜諸部多欲內顧但恥自發遣故未有至者若出兵奔擊必有響應今年不往恐復并一臣伏念先父歸漢以來被蒙覆載嚴塞明候大兵擁護積四十年臣等生長漢地開口仰食嵗時賞賜動輒億萬雖垂拱安枕慙無報效之地願發國中及諸部故胡新降精兵遣左谷蠡王師子左呼衍日逐王須訾將萬騎出朔方左賢王安國右大且渠王交勒蘇將萬騎出居延期十二月同會虜地臣將餘兵萬人屯五原朔方塞以為拒守臣素愚淺又兵衆單少不足以防內外願遣執金吾耿秉度遼將軍鄧鴻及西河雲中五原朔方上郡太守并力而北令北地安定太守各屯要害冀因聖帝威神一舉平定臣國成敗要在今年已敕諸部嚴兵馬訖九月龍祠悉集河上唯陛下裁哀省察耿秉上言北虜事附昔武帝單極天下欲臣虜胸奴未遇天時事遂無成宣帝之世會呼韓來降故邊人獲安中外為一生人休息六十餘年及王莽篡位變更其號耗擾不止單于乃畔光武受命復懷納之緣邊壞郡得以還復烏桓鮮卑咸脅歸義威震四夷其效如此今幸遭天授北虜分爭以夷伐夷國家之利宜可聽許黃巾賊移曹操書操領兖州牧擊黃巾賊賊稍折退乃移書操操設奇會戰戰輒禽獲昔在濟南毁壞神壇其道乃與中黃太一同似若知道今更迷惑漢行已盡黃家當立天之大運非君才力所能存也魏志宋書天文志云黃巾賊起云蒼天已死黃天當立此魏氏依劉向自云土德之符也鮮于冀鬼自理表水經注建武二年西河鮮于冀為西河太守作公廨未就而亡後守趙髙計功用二百萬五官黃秉功曹劉適言四百萬錢冀乃鬼見白日導從入府與髙及秉等對共計校定為適秉割匿冀乃書表自理其略言付髙上之車馬皆滅不復見秉等伏地物故髙以狀聞詔下還冀西河田宅兼為差代以弭幽中之訟髙貴不尚節畝壟之夫而箕踞遺類研密失機婢妾其性媚世求顯偷竊銀艾鄙辱天官易譏負乘誠髙之謂臣不勝鬼言謹因千里驛聞劉伯文鬼冥中與兒他書建安四年武陵女子李娥病死埋城外已十四日比舍蔡仲聞塜中有聲發出遂活自言為司命誤召到得遣出過西門適見外兄劉伯文相勞問以書一封與其兒他娥乃致伯文書他識其紙是父亡時送箱中也書不可曉詣費長房讀之到期於城南待之果至聞有呼聲曰他來汝得我所寄李娥書不邪因與藥一丸辟來年妖厲告他當從府君出案行當以八月八日日中時武陵城南溝中畔頓汝是時必往干寶搜神記東漢文紀卷二十七
