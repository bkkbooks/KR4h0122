body:
  text: 東漢文紀總集類提要臣等謹案東漢文紀三十二卷明梅鼎祚編鼎祚西漢文紀根據史漢故多為典確是編雖亦以正史為宗而雜書之作始盛于東漢即劉珍張璠諸記著録正史者亦逾八家沿及六代小說繁興其時去雒京最近故依託附㑹尤較西漢為多至于集古金石諸録博古考古諸圖以逮𨽻釋𨽻續而下搜括舊刻爭奇炫博者彌不一家而西漢自五鳳磚數事以外寥寥無多其碑碣文詞器物銘識亦往往惟稱東漢鼎祚搜羅既富義取全收其間真贋互陳異同蜂起而訂訛正舛亦不及西漢文紀之詳固其所也至如曹全一碑近代始出乃復捃托不遺其采輯亦云勤矣若夫永和裴岑破呼衍王碑逺在西域自我皇上天威耆定儒者始獲睹其文鼎祚生明季衰微之時嘉峪關外即為絶域其佚而不載固未可以為疏漏焉乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:f9c194bf166e7e2efb70d311b21f2e1927c45c6343ea121c8d396d854dae0b91
