body:
  text: 東漢文紀巻二十八明梅鼎祚編無名氏此下並無撰人名氏而有年代可考者梅鼎祚曰東漢之際碑碣盛行後魏酈道元水經注宋鄭樵金石畧僅存其目歐陽修集古趙明誠金石二録頗證其事至乾道中洪适始為𨽻釋全文具矣然什九多桓靈時其文亦多謇澀詭僻盖衰氏之徵也近代都太常穆楊大史慎徐令獻忠各有紀述一二為前賢所未睹記者今並采輯其漫滅不成句讀者省蜀郡大守何君閣道碑無額光武中元二年蜀郡太守平陵何君遣掾臨邛舒鮪將徒治道造尊楗閣袤五十五丈用功千一百九十八日建武中元二年六月就道史任雲陳春主隸釋云蜀人以為尊楗閣碑棧路謂之閣道非樓閣之閣也卭僰九折坂盖其地范書光武之紀年二曰建武曰中元祭祀志云以建武三十二年為建武中元元年宋莒公紀年通譜云紀志俱出范氏而所載不同梁武帝大同大通俱有中字亦憲章於此宋時韓玉汝得一銅枓其銘云新始建國天鳯上戊六年又金州得一鉦其銘云新始建國地皇上戊二年案王莽始建國之後改天鳯又改地皇二器與碑特相類殆莽漢之際習俗相尚以即位初元冠於新厯之上故此碑有建武中元之文爾嘉州夾江縣磨崖碑𨽻釋云磨崖四百餘字盖和帝永元八年也崖石增長字體失真附羊竇道注止四十四字平鄉眀亭大道北與茂陽西與青衣越嶲通界回曲危險扶風王君為君興利除害遣掾何章脩治故書崖以頌之青衣尉趙孟羊竇道碑羊竇道舊故南上髙山下八入字深谷危駿囘百妵患苦永初六年青衣尉南安趙孟更易由此道濱江平澤無盜賊差近廿里騎馬儋水弱得過除去危難行人萬姓莫􅄇恩傳于無究乎維世青衣尉趙君故治所書佐郡督􅗯隨牒除到官六日郡召守蜀鐡官長積四月治狀刅眀徙守成都今後還歸尉官羊竇故道髙危君虔穿字崖易道盜賊徴止弱徃來無患時典典字主通道者積谿故吏梁捕盜賊王㽞百姓過者皆㤙君夀萬年書此盛巨永元十一月九日造隸釋云碑以徴為懲駿即峻字即更字儋即襜字即過字故謁者景君墓表隸額碑隂年安帝元初元惟元初元年五月丁夘故謁者任城景君卒嗚呼闕二字國喪淑臣朝失貞良同闕四字吏無闕四字瞻學者靡闕六字紀徳闕二字生有爵號殁闕其功闕二字追闕二字即辭云惟君束脩仁知闕興門闕發政闕然闕三字爾闕五字風兼體闕二字明哲幽通言信行䔍謙㢘允躳闕一字不闕二字不㦥人闕勇匪石外和内公疾遁曲闕詭隨闕十字通闕二字義命栗肅以闕理政治孝親忠君闕嘉命挽闕敬應闕八字股肱耳目闕四字彈闕刋枉茹剛吐五官功􅔟骨骾之臣闕二字嚴闕二字祖之貞史任之直公闕浩清辟從事闕邦之雄喧動萬里郡位升察舉孝㢘百國之宗能文繡闕􅋋闕心闕四字光闕帝庭闕五字問股肱龍升鳯翔進退闕便闕二字公劉姿闕六字益闕昌闕四字逝闕二字降年百失氣京師鄂驚皇帝賻闕五字大闕三字其福闕五字興闕軌闕端剖苻北海闕二字所闕六字寇攘闕二字而有闕二字闕兮闕曰闕一字孔闕曰闕二字兮曰闕四字無兮異色闕艾知命亡兮不闕百闕四字兮闕七字兮更去闕二字是其闕兮闕動後昆芳闕将兮闕五字永昌兮紀此銘隸釋云東都自路都尉始見墓闕盖表阡銘壙之濫觴也有文而傳于今則自景君始齊葬穆妃議立石誌王儉以為非禮經所出元嘉中顔延之輩為之遂相祖述爾梁任昉作文章緣起又云墓碑自晉始子考酈氏水經所載漢刻已不少今漢人墓刻猶存數十百碑其云始於晉宋非也碑以刋枉為糾枉鄂驚為愕景君碑隂諸生服義者義士北海劇張敏字公輔弟子濟北茬平寗尊字伯尊弟子山陽南平陽方亰字平弟子濟北平吳良字威賢弟子齊國臨宋成字子賔弟子齊國臨劉封字漢輔弟子魯國下呂昌字永興弟子樂安髙宛牟龍字文卋弟子清河靈劉翼字仲禹弟子清河靈訢字輔公弟子清河靈福字叔道弟子巍郡􅚌田朗字季持弟子巍郡内黄景茂字元愷弟子山陽湖尹倉字升進弟子山陽湖董舊字元夜郯令景君闕銘元初五年惟元初四年三月丙戌郯令景君卒以五季二月闕四字序君存時恬然無欲樂道安貧信而好古非法不言治歐陽尚書傳祖父河南尹父步兵校尉門徒上録三千餘人明眀側陋逺近照聞闕司聘請㳅化下邳未極􅊲績續毋之子無隨沒俯就禮畢故府復請司空大常愽士竝舉髙經君為其元假涂郯闕姦耶洒心澄激清靜荚書裦嘆闕黄耉終始無被病喪身歸于幽祖載之日游魂象生𤣥路皆闕朱艸闕二字達巷方軌涕泣霣闕諸生服義百有餘人迺剜片石紀闕行闕見闕懐徳聞自嘆吟千秋萬世闕二字為闕二字􅊲積徳闕二字堂壇羅闕闕闕㙒魂而有靈闕無闕山陽麟鳯碑隸釋云二物共一石像下有贊碑隂有記無額順帝永建元年鳳凰像贊天有奇鳥名曰鳳皇時下有徳民冨國昌黄龍嘉禾皆不隠藏漢徳巍巍分布宣揚麒麟像贊天有竒獸名曰麒麟時下有徳安國冨民忠臣竭節義以脩身闕愆采善明眀我君碑隂記隸釋云最後有銘辭皆篆文而不載永建元年山陽太守河内孫君新刻瑞像漢故益州太守北海相景君碑篆額漢安二年順帝惟漢安二年仲秋闕二字故北海相任城景府君卒歍哀㢤國闕二字寳英夫疇列宿虧精晩學後時于何穹倉布命授期有生有死天寔為之豈夫人据彼勊􅄇道􅋋是故吏諸生相與論曰上卋羣后莫􅄇流光闕􅋋無窮垂芬燿􅋋書篇身殁而行眀體亡而名􅔅或著形像􅋋列圖或頌􅋋菅弦字後來詠其烈竹帛叙其勲乃作誄曰伏惟明府受貭自天孝弟淵㦤帥禮蹈仁根道核藝抱淑守真皛白清方勊已治身寔渘寔剛乃武乃文遵􅊲孝謁假階司農流惪元城興利恵民強衙㱼莭微弱䝉㤙威立澤宣化行如神帝嘉厥功授㠯苻命守郡益州路遐率親躬作遜讓夙宵朝廷建英忠讜辨秩東衍璽追嘉錫據北海相部城十九鄰字歸向分眀好先㠯敬讓殘偽易心輕黠踰竟鴞梟􅄇鳴分子還養元二蒙祐㠯寜蓄道惪闕祉㠯榮紛紛令儀眀府體之仁義道術眀府膺之黄朱邰父眀府三之台輔之任眀府冝之㠯病被徴委任致仕民闕思慕逺近掻首農夫醳耒商人空市隨轝飲淚奈何朝廷我慈父去官未旬病乃困危珪璧之貭臨卒􅄇回歔闕霣絶奄忽􅄇闕孝子憉􅀈顛倒剥摧遂闕勊寤永潛長歸州里鄊黨隕涕哀故吏忉怛歔欷佪四海冠盖驚􅚸傷褢大命闕期寔惟天闕眀主設位眀府􅄇就臣子欱養眀府弗㽞歍歔哀㦲曰􅊲積幽穸闕三字兮闕四字翔議郎兮再命乕將綏元二兮􅒑荚榘謨主忠信兮羽衞潘屏撫萬民兮闕四字恩闕二字兮冝㕘􅀈闕榦兮􅄇永麋壽臣子兮仁敦海外著甘棠兮闕石勒銘闕􅄇亡兮隸釋云濟州任城有景氏三碑皆不著其名字其前已有誄曰其後有曰者亂省其乚也其文曰冝㕘鼎􅀈字書無􅀈字當是借作拂取輔拂之義趙氏云碑隂載故吏自都昌台丘暹而下十九人皆作脩行漢隸循脩二字頗相近恐是借用爾碑以倉為蒼以渘為柔以衙為禦以醳為釋以􅚸為慟以麋為眉貭即質字即戀字㤟即惡字即奔字褢即懐字即棄字故敦煌長史武君之碑𨽻額建和元年桓帝建和元年太歳在丁亥二月辛已朔廿三日癸夘長史同下闕敦煌長史武君諱斑字宣張昔殷王武丁乆伐鬼方元功章炳勲臧王府官族分析囙㕥為氏焉武氏盖其後也商周徦􅀢厯丗壙逺不隕其美漢興以來爵位相踵闕朝忠臣君幼闕顔閔之楙質長敷斿夏之文學慈惠寛闕孝友𤣥妙苞羅術蓺貫洞聖闕慱兼闕二字耽綜典籍闕三字純求福不回清聲美行闡形逺近州郡貪其髙賢闕二字請以闕二字歲舉闕翼紫宫闕二字詔除光􅢃玉室有闕於國帝庸嘉之掌司古闕領校祕􅪿斫闕幽微追昔劉向辯賈之徒比闕萬矣時戎闕二字匡正一闕二字朝廷惟憂闕二字有司闕二字舉君斑到官之日闕癘吏士哮乕之怒薄伐闕九字並百姓賴之邦域既寜乆勞于外當還本朝以叙左右以永嘉元年闕月闕日遭疾不闕哀闕於是金鄉長河間髙陽史恢等追惟昔日同歳郎署感闕為自古在昔先聖與仁闕二字興替闕二字人存生榮死哀是闕萬年伊君遺徳闕孔之珍故闕石銘碑以旌眀徳焉其辭曰於惟武君允徳允恭受天休命積祉所鍾其在孩提岐嶷發蹤謙闕守約唯誼是從孝深凱風志絜羔羊樂是闕二字恬此闕光孳孳臨川闚見闕廧仰萁首微妙𤣥通闕然清邈闕六字升闕為帝股肱扶助大和萬民􅓉蒙顯宗闕二字史官書功昊天上帝降兹鞠凶晻忽徂逝闕四字不享闕耇大命闕二字百遼惟闕后帝感傷學夫䘮􅘄士女悽愴闕表金門令問不忘垂闕後昆萬載歎誦尚書丞沛國蕭曹芝闕宣成武令中山安憙曹种闕二字豐令下邳良成徐崇闕二字故陳㽞府丞魯國魯闕四字防東長齊國臨闕紀伯允書此碑嚴祺字伯曽隸釋云斑為從事梁之猶子吳郡府丞開眀之元子執金吾丞榮之兄也以冲帝永嘉元年卒碑者後三年同舎郎史恢曹芝六人所立從事武梁碑官夀殘失威宗建和之元年開眀為其兄立闕刻其闕成行攄騁技巧委虵有章垂示後嗣萬卋不亡其辭曰㦤徳𤣥通幽㠯眀兮隠居靖處休曜章兮樂道忽榮垂蘭芳兮身殁名􅔅闕四字𨽻釋云從事武君碑在濟之任城武君名梁以威宗元嘉元年卒孝子仲章等立此碑輿服志古者有冠無幘秦後稍稍作顔題漢文乃崇其中為屋衣冠童子幘無屋者亦未成人也此碑及武榮碑皆有闕幘傳講之文盖謂其未冠之年已能傳道講學也武君屢辭辟召不闚權門踰七望八爵秩不躋故銘無可鋪叙而其後云孝子孝孫躬脩子道竭家所有選擇名石南山之陽擢取妙好色無班黄前設壇墠後建祠堂良匠衛改雕文刻畫羅列成行攄騁技巧委虵有章若曰松萩窀穸之事不應辭費如此此碑長不半尋廣纔尺許既無雕畫技巧亦非羅列成行其辭决不為碑設也詳味之似是指石室畫像爾碑中㒃即貳字遭即遭字䃪即壇字􅀈即墠字鼎按此釋乃碑原文今本首有官夀殘失四字必洪後并失前文一段校刻者冩此四字於首抄傳者誤混大字耳刻其下有闕文而孝子孝孫至羅列一段則在成行之上也武梁祠堂畫像無額伏戯倉精初造工業畫卦結䋲以理海内祝誦氏無所造為未有者欲􅍮罰未施神農氏知宜教田辟土種榖㕥振萬民黄帝多所改作迼兵闕二字裳立宫宅帝顓頊髙陽者黄帝之孫而昌闕二字子帝俈髙辛者黄帝之曾孫也帝堯放勲其仁如天其知如神就之如日望之如雲帝舜名重華夏禹長於地理闕一字泉闕二字隂随闕二字退爲肉􅍮夏桀自伏戯至夏桀是一段菅仲齊桓公曺子桓魯莊公闕二字郎中闕一字専諸炙魚刾吴王吴王荆軻樊於其頭秦武陽秦王自菅仲至秦王是一段闕二人名豫讓身㕥報知己闕一人名齊王無鹽媿女鍾離春自豫讓至無鹽是一段梁髙行奉金者使者闕一人名胡妻秋胡義姑姉姑姉兒衛將軍自梁髙行至衛將軍是一段闕一人名使者長婦兒梁節姑姉捄者姑姉其室失火取兄子徃輙得其子赴火如亡示其誠也闕二人名後母子前母子齊繼母亰師莭女怨家攻者自使者至怨家攻者是一叚藺相如趙臣也奉壁於秦秦王范且闕二人名自藺相如至范且是一段曽子孝㠯通神明貫感闕一字祇著乎朱方後丗凱式闕二字無綱子騫後母弟子騫父閔子騫闕一字母居喪闕一字移子騫闕一字寒御闕一字失闕一字老萊子楚人也事親至孝衣服斑連嬰兒之態令親有驩君子嘉之孝道大焉莱子母莱子父丁蘭二親終後立木為父鄰人假物乃借與自曾子至丁蘭是㐲戲下一段處士縣功曹是豫讓下一段闕一人名榆母渠父邢渠哺父永父蕫永千乗人也章孝母朱明宋眀弟朱眀妻李氏遺孤忠孝李善休屠像騎都尉自榆母至騎都尉是梁髙行下一段闕一人名義羊公乞者湯父巍湯闕一字孝闕一字𦵏闕一字者孝子孝孫闕一字父自羊公至孝孫父是梁節姑下一段金石録云武氏石室畫像武氏有數墓在濟之任城墓前有石室四壁刻古聖賢像𨽻釋引任城武梁碑辭云雕文刻畫羅列成行攄逞技巧委虵有章因以武梁祠堂畫像名之故司𨽻校尉楗為楊君頌𨽻額二年建和惟巛靈㝎位川澤股躬澤有所注川有所通余之川其澤南隆八方所逹益域為充髙祖受命興於漢中道由子出𣪚入秦建㝎帝位㕥漢詆焉字後㕥子􅀢路歮難更隨圍復通堂光凡此四道垓鬲尤字艱至於永平其有四年詺書開余鑿通石門中遭元二西夷虐殘橋梁􅍘絶子復脩上則縣屈曲流下則人入字䆩冥字寫輸淵平阿泥常蔭鮮晏木石相距利磨确臨危槍碭履尾心寒空輿輕騎遰㝵弗前􅀈狩虵蛭毒未秋截霜稼苗夭字殘終年􅄇登匱餧之患卑者䠂尊者弗安愁苦之難可具言於是眀知故司𨽻校尉楗為武陽楊君厥字孟文深執忠伉數上奏請有司議駮君遂執争百遼咸従帝用是聴廢子由斯得其度經功飭爾要敝而晏平清涼調和烝烝寧至建和二􅏵仲冬上旬漢中太守楗為武陽王升字稚紀渉厯山道推序本原嘉君眀知美其仁賢勒石頌徳㕥眀厥勲其辭曰君徳明二焫煥彌光刾過拾遺厲清八荒奉魁承杓綏億衙彊春宣聖日秋貶若霜無偏蕩二真睢㕥方寜静烝庶政與乾通輔主匡君脩禮有常咸曉地理知世紀綱言必忠義匪石厥章弘大莭讜而益明揆徃卓今謀合朝情醳艱即安有勲有榮禹鑿龍門君其繼蹤上順斗字極下荅川皇自南自北四海攸通君子安樂庶土士字悅㢕商人咸農夫永同春秋記異今而紀功垂億載世二嘆誦序曰明㢤仁知豫識難易原度天道安危所歸勤二竭誠榮名休麗五官掾南鄭趙􅰞字季南属裦中鼂漢彊字産伯書佐西戌王字文寳主王府君閔道闕難分置六部道撟特遣行丞亊西戌輔服字顯公都督掾南鄭巍整字伯玉後遣趙誦字公梁案察中曹卓行造作石積萬世之基或解髙格下􅈬平易行者欣然焉伯玉即日従署行丞事守安陽長𨽻釋云水經及歐趙皆謂之楊厥碑蜀中晚出楊淮碑云司𨽻校尉楊君厥諱淮守伯邳大司隸孟文之元孫也始知兩碑皆以厥為語助此乃後政頌其勲徳故尊而字之不稱其名順帝紀延光四年詔益州刺史罷子午道通裦斜路盖從其所請也鄧騭傳元二之災注云元二即元元也古書字當再讀者即于上字之下為小二字後人不曉遂讀為元二或同之陽九或附之百六良由不悟致兹乖舛岐州石鼔銘凡重言者皆為二字明驗也趙氏云此碑有曰中遭元二西夷虐殘橋梁斷絶若讀為元元則為不成文理疑當時自有此語予按孔耽碑云遭元二轗軻人民相食若作元元則下文不應乂言人民漢注之非明矣王充論衡云今上嗣位元二之間嘉徳布流三年零陵生芝草五本四年甘露降五縣則所云元二者盖謂即位之元年二年也碑以余谷為斜谷充為衝詆為抵歮為澁䕃為隂遼為僚狩為斃獸衙為禦縱為蹤為喜積為積西成為西城鬲即鬲字􅀢即塗字斷即斷字􅀈即磐字遰即滯字㝵即礙字悪即惡字彊即彊字即字醳即釋字繼即繼字漢故平都侯相蔣君之碑君諱闕字闕二字其先出自闕二字后稷之闕至於成王先有天下錫地闕畿俾侯于蒋囙而闕九字秦闕二字諸夏闕三字恥捐闕二字土闕三字叔曰闕遐阻闕居来南適彼荆闕四字漢君之祖考闕四字為交州刾史従父交阯太守闕䏻輸力王室以䔍臣莭功列天府令問不已君纉厥緒載徳不闕三字山之闕八字秉闕二字之芳刑膺顔夏之殊行孝犮著於閨門弟順稱于郷黨敦書說禮闕二字好仁闕四字事闕三字學優則仕厯郡五官掾功曺正色立於朝有孔父闕三字前後牧以禮辟命委質承闕九字行成於内名播于外再為計掾光光撟撟與闕二字乃時亰師百郡覲㑹莫不闕十字中昭闕五字之則夙惟寅闕三字翼天闕二字禮朝遷明徳出宰豫章平闕十字季文之清約闕二字約之政布愷悌之化經國以禮闕二字以義異郡黔首繦負歸闕九字君文不犯順武不違敵賞善罰否寬猛恊中闕濟清瑛遵五迸四仁慈春夏威若闕九字臧囹圄空虚路靡怨闕四字睦宇宙稱平三載考績功業􅢃眀當㩀苻闕受福無疆闕天不弔降灾賢良闕六十有五元嘉二年三月甲午卒遭疾不豫闕卒于官國喪惠君朝失楨幹百闕悲恨若鄭亡産遐邇闕三字女増歎闕曹忉怛闕二字罔極闕二字愛敬終以哀慼禮畢祥除餘悲憑億瞻望墳塋循墓俳佪松柏闕䆩涕泣愴悽感慕詩人蓼蓼者儀追頌遺訓刋之𤣥珪其辭曰於穆林烝寔乾所生闕二字挺出闕性純清文為儒宗武則干城顒顒昻昻臨朝有光宿衛紫微虔恪在勤典國治民其化若闕三字州郡闕二字龜銀皇矣上帝賦命不均喪漢良輔社稷之鎮㳤人君子胡不萬年改世不朽闕㳅後昆隸釋云學記蛾子時術左傳蛾析皆讀蛾為蟻史記索隠讀淳化鳥獸蟲蛾亦作蟻漢碑書蓼莪皆作蓼儀亦有作蓼義者詩人以儀與河阿叶韻則是讀儀為俄也此以蓼蓼者儀叶涕泣愴悽刋之元珪則又讀如本字大學云迸諸四夷釋迸為屏後漢傳有遵五迸四之文此碑亦然盖漢人傳魯論有如此者碑以芳刑為芳形撟撟為矯矯憑億為憑臆清瑛為清英孔廟置守廟百石卒使孔龢碑無額元年永興司徒臣雄司空臣稽首言魯前相瑛書言詺書崇聖道勉闕蓺孔子作春秋制孝經闕二字五經演易繫辤經緯天地幽讃神明故特立廟襃成侯四時來祠事已即去廟有禮器無常人掌領請置百石卒史一人典主守廟春秋饗禮財出王家錢給大酒直湏報謹問大常祠曺掾馮牟史郭𤣥辤對故事辟􅂒禮未行祠先聖師侍祠者孔子子孫大宰大祝令各一人皆備爵大常丞祠河南尹給牛羊彖雞闕二字各一大司農給米祠臣愚以為如瑛言孔子大聖則象乾為􅩑制作先世所尊祠用衆牲長吏備闕二字欲加寵子孫敬恭朙祀傳于罔極可許臣請魯相為孔子廟置百石卒史一人掌領禮器出王家錢給大酒直他如故事臣䧺臣戒愚戇誠惶誠恐頓首頓首死罪死罪臣稽首㕥聞制曰可元嘉三年三月廿十七字日王壬字寅奏雒陽宮司徒公河南原武吴闕字季髙司空公蜀郡成都趙字意伯元嘉三年三月丙子朔廿十日壬寅司徒䧺司空下魯相承書從事下當用者選其年卌㕥上經通一蓺雜試通利能奉弘先聖之禮為宗所歸者如詺書書到言永興元年六月甲辰朔十八日辛酉魯相平行長史事卞守長擅叩頭死罪敢言之司徒司空府壬寅詺書為孔子廟置百石卒史一人掌主禮器選年卌㕥上經通一蓻雜試能奉弘先聖之禮為宗所歸者平叩頭叩頭死罪死罪謹案文書守文學掾魯孔龢師孔憲戸曹史孔覽䓁雜試龢脩春秋嚴氏經通髙第事親至孝能奉先聖之禮為宗所歸除龢補名狀如牒平惶恐叩頭死罪死罪上司空府讃曰􅠔魏大聖㚘㚘彌章相乙瑛字少卿平原髙唐人令鮑曡字文公上黨屯􅕂人政教稽古若重規矩乚君察舉守宅除吏孔子十九世孫麟㢘請置百石卒史一人鮑君造作百石吏舎功垂旡竆於是始闕隸釋云石刻可以見漢代文書之式者有史晨祠孔廟碑樊毅復華租碑太常耽無極山碑與此而四此一碑之中凡有三式三公奏于天子一也朝廷下郡國二也郡國上朝廷三也兖州圖經以為鍾繇書非繇魏太和四年卒去永興七十八年碑字彖即豕㚘即赫金石録云趙戒字志伯碑云意伯疑避桓帝諱改百石闕里志並作百户孔謙碣無額二年永興孔謙字徳讓者宣公廿世孫􅚾尉君之子也幼體蘭石自然之姿長膺清妙孝友之行䙋述􅀢脩秋經升堂講誦深究聖指弱冠而仕厯郡諸曹史秊廿四永興二秊七月遭疾不隷釋云都尉君者太山都尉宙也孔融别傳云宙有七子融之次第六載於譜録者惟有謙襃融三人襃之名見史晨碑益州太守無名碑無額永壽元年桓帝永壽元年三月十有九日益州太守闕君卒嗚呼􅥒㦲闕四字如何我君遭命隕墜國喪䧺幹世也罔則吏民闕二字立石紀迹其辭曰上闕五字君其祖後闕五字為漢表磨位闕術闕九字名闕二字􅀈􅀈獫稟堅良闕三字大郡闕有闕二字澄内清外以身帥下誅豪討處闕二字口闕二字消慝述闕以寧貪饕改操革濁為淸犂兆安土人歌太平􅂒前守之治迹闕沒世而無闕當闕五字何闕二字命不豫闕疾徂靈逺近傷切痛于倉乾闕於舊闕長決闕二字折而不朽名勒丹書嗚呼􅥒㢤亂曰仲尼去魯兮君子失路喪賢君兮與誰愬失眀哲兮入川户名不滅兮功􅕂後闕三字兮祐孫子隷釋云碑之左有功曹掾故吏題名四十八人屬邑建伶牧靡梇楝滇池穀昌俞元之人也僅有王李數姓可辨又有牧靡故吏三人題名在跌之石漢故中常侍長樂太僕吉成侯州君之銘無額永夀二年闕二字輔字闕二字世闕五字于炎闕八字君闕五字卿衛特以眀敏達拜小黄門遝事和熹后孝安帝安思皇后時為大宫令孝順皇帝踐胙之闕復􅀈拜小黄門遷臧府令當拜中常侍讓與同郡錡任後以病孫位起家復拜謁者令中尚方闕遷中常侍遭順帝棄天下扶佐孝沖孝質帝兼領黄門令順烈皇后攝政以君舊闕拜長樂大闕遭孝質無嗣乃定冊帷幕愋立聖主有妄社稷之勲建和二年七月已巳詺冊曰蓋聞春秋之闕采毫毛之善大漢典制有恩澤之封輔厯世守省恪恭位著建立之際䖏乎左右常伯之職同闕協意以亮天功徃者鄭衆蔡倫行事科比其封輔為葉吉成侯和平中君復轉拜大長秋兼以闕侍之位括統前後明先帝法令曉舊章之事周宻㳤慎奉已守度在寵弗盁能自挹損爵闕日隆持之益懼每所典領威禁不犯逺惡辟害不離艱難所謂摩而不粼涅而不繬者闕朝廷禮之以君耇老有机杖之賜年六十有二永壽二年十二月丙子薨中外咨悼賻贈䓁昔菅蘇之尹楚以直見死記其闕張卿之在漢闕季布之闕以安髙后論徳比隆君寔闕於是郷人姻族乃相與刋石樹碑昭宣令問其辤曰盛徳之休實生君侯天授厥美忠貞以闕退翼軒闕逹闕華樞六帝四后是咨是諏錫以寵衣紫艾兼紆幹國棟家以光以舒後闕二字禮闕四字人誰闕泥㘽責不濡闕君守固終始不渝旌之萬祀顯燿永譽遝即逮字涅即涅字繬即緇字即越字葉吉成者葉縣之吉成亭也此碑詳贍有史法與漢他碑不同州輔碑隂漢陽太守闕故亰兆尹延䔍叔堅故東平相溫貢顯宗故益州太守駱肅文恵故交阯太守冠軍橋術伯道故上黨太守州郡當丗司徒長史宛任闕伯陽故光禄丞宛趙堅叔貞故臨湘令扶闕仲闕故密令馬浮元顯廣平令王璋伯玉故犧令章陵錢訢禮公車騎將軍司馬宛闕二字守矩小侯新㙒鄧辰伯臺故細陽侯相州寳季珍故河陽長州宗伯興尚書侍郎北陽張超伯載故海昬侯相謝杲闕朝郎中州博起世光禄丞州永孟元公車令州忠叔玉故建成長何柜世舉故建昌長唐超㬌遼故鄱陽長王福仲昭故南武陽侯相張和仲異故便長督匡仲英故襄陽長辟敏叔公故郎長州湯伯徳郎中王恭季公郎中陳充廣世郎中州超巨堅故隋守長州歆宣睢故荆州從事州穆宣豫故荆州從事州憙伯平故河隄從事張睢伯宗故􅀈長胡肅伯於處土趙訢公甫處土李闕文徳故督郵蘇闕羲山故督郵杜合巨孫故督郵魯陽袁苞㬌伯故闕守令州稱子眀故府掾杜瑗次髙故府掾何進定安故府掾王萇伯闕故府掾汪直元孝處土州龍宣興處土王闕公闕處土傳稠公下闕魯相韓勑造孔廟禮器碑無額碑隂陳仁子永壽二年續文選作魯相顔午乞復顔氏开官氏繇發碑闕里志題云魯相韓勑復聖母顔氏聖配开官氏族屬繇發脩飭宅廟制禮樂器碑惟永壽二年青龍􅏅涒歎霜月之靈皇極之日魯相河南亰韓君追惟大古華胥生皇惟顔誕育至寳俱制元道百王􅄇改孔子近聖為漢定道自天王㕥下至于初學莫􅚮思嘆卬師鏡顔氏聖舅家居魯親里开官聖妃在安樂里聖族之親禮所冝異復顔氏开官氏邑中繇發㕥尊孔心念聖厯世禮樂陵遅秦項作亂􅄇尊圖書倍道畔德離敗聖輿食粮亡于沙㐀君於是造立禮器樂之音苻鐘磬瑟皷雷洗觴觚爵鹿柤梪遵柉禁脩飾宅廟更作二輿朝車威熹宣杼𤣥汙㕥注水㳅法舊􅄇煩備而􅄇奢上合紫臺稽之中和下合聖制事得禮儀是四方土士字仁聞君風燿敬咏其徳尊琦大人之意卓之思乃共立表石紀傳億載其文曰皇統華胥承天畫卦顔育空桒孔制元孝俱祖紫宫太一所授前門九頭㕥什言後制百王獲麟来吐制􅄇空作承天之語乾元㕥来三九之載八皇三代至孔乃備聖人􅄇世期五百載三陽吐圖二隂出䜟制作之義㕥俟知奠􅋋穆韓君獨見天意復聖二族逴絶思脩迼禮樂胡輦器用􅔅古舊宇慇懃宅廟朝車威熹出誠迼闕深􅄇水解工􅄇争賈深除𤣥汙水通流注禮器升堂天雨降澍百姓訢和舉國蒙慶神靈祐誠竭敬之報天與厥福永享年壽上極華紫旁伎皇代刋石表銘與乾運燿長期蕩蕩於盛復授赫赫罔窮聲垂億載韓明府名勑字叔莭頴川長社王𤣥君真二百河東大陽西門儉元莭二百故涿郡太守魯麃次公五千故㑹稽大守魯傳世起千故樂安相魯麃季公千故従事魯張嵩𦕈髙五百相主簿魯薛陶元方三百相史魯周乾伯徳三百隸釋云其文雜用讖緯不經涒歎者以歎為灘也聖妃者以妃為配也雷洗觴觚爵鹿柤梪籩柉禁者以雷為罍以柤為俎也古爵三足而兩柱前若噣後若尾有爵之象趙曰青州近獲一器全為鹿形此所謂鹿豈非肖其形因以名之乎說文木豆謂之梪柉者凡木名也皮可為索禮器曰大夫士棜禁注云禁如今之方案儀禮鄊飲酒禮户間斯禁設篚於禁南注禁切地無足者與上下文符觚輿汙協韻當是壷字也胡輦者瑚璉也又以伎為曁􅚮音驥遵即籩字即漆字韓勑碑歐陽公謂書傳無以勑命名者董逌廣州書跋云古者以勞賚為勑勑為賚者具文為探別體南齊時有劉勑為始興内史韓勑碑隂故涿郡太守魯麃次公五千故從事魯張嵩眇髙五百潁川長社王𤣥真二百故㑹稽太守魯傳世闕一字千相主簿魯薛陶元方三百河東大陽西門儉元節二百故樂安相魯麃季闕一字千闕一字相史魯周乾伯徳三百曲成矦王暠二百遼西陽樂張普仲堅二百潁川長社王季孟三百故督郵魯趙煇彦臺二百河南成臯蘇漢明二百其人䖏士汝南宋公國陳漢方二百郎中魯充宙季將千河南雒陽种亮奉高五百故山陽南平陽陳漢甫二百御史魯孔翊元世千故兖州從事任城呂育季華三千任城畨君舉二百太尉掾魯孔凱仲弟千故下邳令東平陸王裒文愽千任城王子松二百魯孔曜仲曜二百魯孔儀甫闕一字百故潁陽令文陽鮑宫元威千任城謝伯威二百䖏士魯孔方廣率千河南雒陽李甲伯百任城髙百世二百魯孔廵伯陽二百文陽蔣元道二百趙國邯鄲宋鎮元世二百相主簿薛曹闕一字濟興三百魯孔憲闕一字則闕文陽闕二字文豫二百彭城廣闕一字姜尋孔長二百相中賊史薛紹興公二百尚書侍郎魯孔彪元上三千平原樂陵朱恭敬公二百薛闕一字髙闕三字魯孔闕一字漢光二百南陽宛張光仲孝二百平原隰隂馬元冀二百相史卞吕松逺百守廟百石魯孔恢聖文千彭城龔治世平二百韋仲卿二百裒成侯魯孔建壽千河南雒陽王敬子慎二百泰山鮑丹漢公二百處士魯劉靜子著千故從事魯孔樹君德千京兆劉安初二百故薛令河内温朱熊伯珍五百故從事魯王陵少初二百魯孔朝升髙二百魯石子重二百下邳周宣光二百故豫州從事蕃加進子髙千故督魯开煇景髙二百故平陵令魯麃候元世五百行義掾魯弓如叔都二百河間東州齊伯宣二百魯曹性初孫二百魯劉仲臣二百北海劇袁隆展世百陳國苦虞崇伯宗二百魯闕一字元達二百魯夏侯廬頭百魯周房伯臺百東海傅河東臨汾敬謙字季松千闕尉闕五字安季興五百相守史諱在芳世祖二百魯孔建壽一百時令漢中南鄭趙寡學子闕魯巢壽文闕相闕六字賜公闕一字煇世平百故丞魏令河南亰丁􅀈叔舉五百河浦退師度闕澤賢闕二字魯傅闕子豫二百俟我交父治真百東郡武陽桓仲豫二百左尉北海闕趙福字仁直五百南陽平氏闕四字二百魯闕二字三百魯孔昭叔祖百元廬城子二百山陽瑕丘九百元臺三百魯齊伯賢二百河東臨汾敬闕一字子直千泰山鎮平韋仲元二百闕二字狼子二百國廣張達平二百其闕一字䖏士魯劉聖長二百河南雒陽左叔虞二百泰山費淳于陵季遺二百上黨長子楊萬子三百河南偃師骨闕一字通國闕二字東郡武陽董氏闕二百故闕二字侯相彭城劉闕一字伯存五百處士魯孔徴子闕一字二百河南平隂樊文高二百都穆金薤琳瑯云韓勑碑隂𨽻釋所載凡六十有二人較予家舊搨本闕三十有八人隷釋始曲成侯王暠終洛陽王敬予家本則始涿郡太守魯麃次公終河南樊文髙又有大不同者豈隷釋得之傳録故有此誤要當以榻本為是抑此及史晨後碑歐陽公最好博古皆未之見唯趙氏金石録有之與此畧同云隷釋云韓勑碑隂六十有二人不稱字者一人不稱名者二十一人漢人題名必書名字否則各有說也楊震碑隂孫定博諸人不名者非其門生也逢盛碑隂崔孟祖數人不名者乃其父黨也題名于韓勑碑左凡八人魯之二麃一傅不名者别守相之尊也張納碑隂主簿白文已下不稱字者示其卑于從事季元也史晨後碑五官掾孔暢六人不稱字者亦示其卑於長史李謙也孔族凡十四人建夀爵齒俱尊而在子姓之間宜其不名曲成侯王暠不稱字豈爵雖襲而年尚穉乎韓勑脩孔廟後碑皇漢帝元永壽三年青龍建酉秋之旬升布天徳帝拜大臣曽曽𤣥𤣥魯相河南亰韓君追惟孔聖素王受象乾从生亐周衝匡政天文徳叅燿闕作星神稽易制孝升出大人徵苻洞論要道根赤書黄字蜚于倉天北落復下大帝闓門龍闕三字精㦄星官雷動𤣥紫聲隠闕震春秋既成效以獲麟功道立封禪闕三字𤣥闕二字魯天地䆩精皇炳辟河雒摘靈散六制二百生師經元徳浸潭孝道滋榮為􅩑制作萬世闕功誦受命以授煌煌帝闕二字載天意流通弟闕四字生徒三年素王以至亐兆生聞名傾瓦視若見形天挺三五三九之闕徳闕二字子度終獲麟天為移柜曰闕七字賢俊以傳君以順顯臣以無韓君於氏慉之思惟古之嘆念闕啚闕為世寳具受符相魯敷舒闕十字謁廟拜墓感有曽𤣥脩飭舊宅俟神廟堂月闕廧域庫窒中郎立先王禮樂器闕十字二輿朝車威熹歴日乆長承法而制以遵古常崇聖帷坐席十重改畫聖象如古啚闕十五字章規柜𤣥汙唯深且方宅廟悉脩敬滫藂房闕五字道路闕二字闕周衞行闕十五字恭肅春秋烝嘗欣樂之情和見於顔惟墓以闕三字歴秦闕髙闕業文闕十二字君於闕五字龍闕二字𤣥禮有制度國疑少磚壇法不即闕五字磚闕二字造石壇闕十六字遣上公名卿奉表窂祠来闕四字作大开闕二字方闕二字之用闕二字韓君闕九字政以弘闕二字四方土梁異人同心共術韓君徳政闕八字鈐約闕四字曰其安闕九字以臨東海功闕伊望洮歌欽烈蘭芳青雲自闕二字郡闕十字菞民闕魯之日闕二字盛隆㤙及孤弱恵閔闕窮民失闕魯飢寒得充業以土屋闕小懽康存舊闕徳夫闕所行闕四字足用英徐闕楊闕望者成行碩彼豫闕獨専景闕且立表石勒銘之功君輔􅩑室聖帝闕躬子子孫孫封闕三字石表基垂名八皇府君諱勑字叔莭闕郎闕二字字仲則弟闕字子臺東海闕敬謙字季松河東臨汾人闕四字字子睢􅩑中南鄭人長史李亮字威眀河南人故少府卿任城樊府君諱豹字伯尹丞駱㬌字子雲河南熒陽人道人穎川長闕三字君直五百左尉趙福字闕二字北海劇人右尉闕二字子興九江浚遒人隷釋云碑以於氏為於是窒為室郎為廊術為述菞為黎啚為圖字為薦字漢故郎中鄭君之碑篆額延熹元年桓帝君諱固字伯堅著君元子也含中和之貭履上仁闕三字孝友著乎閨門至行立乎郷黨初受業於歐陽遂竆究亐典籍膺游夏之文學襄冉季之政事弱冠士郡吏諸曹掾史主簿督􅟷五官掾功曹入則腹心出則爪牙忠㠯衛上清㠯自脩犯顔謇造􅀈佹辭加㠯好成方類推賢達善逡遁退讓當卋㠯此服之后􅎇瑋㠯為儲舉先屈計掾奉闕貢淸眇冠乎羣能蕳乎聖心延熹元年二月十九日詺拜郎中非其好也㠯疾錮辭未滿期限從其本􅒑乃遘凶愍年卌二其四月廿四日遭命隕身痛如之何先是君大男孟子有楊烏之才善性形於岐嶷闕二字見於垂年七嵗而叐大君夫人所共哀也故建闕共墳配食斯壇㠯慰考妣之心琦瑤延㠯為至不紀則鍾鼎奚銘昔姃闕二字武弟述其兄綜闕四字行於蔑陋獨敢忘乃刋石㠯旌遺芳其辭曰於惟郎中寔天生頥親誨弟虔恭竭力教義方導礼則傳宣孔業作卋幙式從政事上忠㠯自貢計王庭華夏歸服帝用嘉之顯拜殊特将従睢意色斯自得乃遭災隕命顛沛家失所怙國闕忠直俯哭誰訴印􅀈焉告嗟嗟孟子苗而弗毓奉我元兄脩孝罔極魂而有靈亦歆斯勒隸釋云秦紀引賈生云九國之師逡巡遁逃而不敢進陳涉世家則删逡廵二字班史又作遁廵故顔師古讀遁為逡而詆潘岳用遁逃為非㳺俠傳逡逡有退讓君子之風此云逡遁退讓盖用史記語歐讀遁為循趙又惑於顔注予謂皆當讀如本字碑以為諤以佹為詭以錮為固以幙為模貭為質字獨即獨字即曷字音慉議郎元賔碑無額二年延熹上闕字元賔魯相之孫成徳闕四字東安平令北海相下闕守之弟子中年令兄子也君生也即有殊摻脩孝行下闕鄊黨乾乾積善念於濟人故朋疇宗親受爵位者皆下闕也加有聦明叡据之愽五經之滋味覽羣書之要下闕圖藉翰著作時人莫能豫其思辯論闕二字文章爤下闕孝㢘亢弘名於三署揚淸厲於海内除倉龍司馬詺下闕試經第一衛尉察尢異遷吳令憲春陽以加恵則隂下闕擊有喬宰鄭見思之歌視事二稔民用寧康以不媚下闕雲之髙翻􅀢色斯辟州從事雖進闕退不枉尺直撏下闕聖朝勲公車徴拜議郎當豐闕姻媾光國興家下闕毓殱㘽良人年卌八延熹二年二月闕二字卒夫子閔下闕咨嗟使者臨弔賻賵特加於是族門人莫不傷瘁下闕立銘以詠君徳其辭曰上闕三字􅀢無倫揚休聲為三臣播忠冊列帝庭名􅢃章光四下闕建靈石垂鴻勲昭来据示後昆隷釋云有喬宰鄭即國僑也翻􅀢色斯則以􅀢為翥枉尺直撏則以撏為尋也摻即操字爤即爛字楚相孫君之碑隷額并隂延熹三年䠂相孫君諱饒字叔敖本是縣人也六國時期思属䠂䠂都南郢南郢即南郡郡陵縣也君受純靈之精懐絶世之才有大賢次聖之貭少見技首虵對其母泣吾將死母問其故曰吾聞見技首虵者死今日見之母曰若奈之何吾行數十歩念獨吾死可空復令他人見之死為囙埋掩其􅍮母曰若無憂焉其隂徳𤣥善遂為父母九族所異及其爲相布政以道考文象之度敬授民時藏於山殖物於藪宣𨗳川谷波障源湶溉灌坺澤堤防湖浦以為池沼鍾天地之美收九睪之利以慇潤國家家冨人喜優樂業拭序在朝野無豊年蕃庶人有曽閔貞孝之行四民羙好從中莭高棞改幣一朝而化其憂國忘私乗馬三年不别牝牡繼高陽重蔾五舉子文之統其忠信㢘勇禮樂文章軌儀同制其國充民眀天時盡地力霆堅禹稯不能踰也専國權寵而不榮一旦可得百金至於殁齒而無分銖之蓄破玉玦不以寳財遺子孫終始若去不善如絕􅀈辟患害於無刑莭高義敦良竒兮自曹臧孤竹吴朼子罕之倫不能驂也生於季末仕於靈王立溷濁而淸幽㬆而照朙其遺武餘不與皇帝代同世世為列姃國在朝廷其意常墨墨若冠章甫而洤炭也病甚臨卒将無棺郭令其子曰優孟曽許千金貸吾孟䠂之樂長與相君相善雖言千金實不負也卒後數􅏵㽵王置酒以爲樂優孟乃言孫君相䠂之功即慨商歌曲曰貪吏而可爲而不可為㢘吏而可爲而不可為貪吏而不可爲者當時有汙名而可爲者子孫以家成㢘吏而可爲者當時有淸名而不可爲者子孫困窮披而賣薪貪吏常苦富㢘吏常苦貧獨不見䠂相孫敖㢘絜不受錢涕泣數行若闕首王王心感動覺悟問孟孟具列對即求其子而加封焉子辭父有命如䠂不忘亡臣社稯闕而𣣔有賞必於潘國濕墝埆人所不貪遂封潘鄉潘即固始也三九無嗣國絶祀廢固始令段君夢見孫君則􅔅其後􅈬其故祠爲架廟屋立石銘碑春秋烝嘗朙神報祚即嵗遷長掖太守及期思縣宰叚君諱光字世賢巍郡鄴人庶慕先賢軆徳允恭䔍古尊舊奉履憲章欽翼天道五興通文藉祭祀祗肅神朙臨縣一載志在恵康㘸枯粟乏愛育蔾蒸討掃醜類鰥寡是矜杜僞養善是忠表仁感想孫君廼發嘉訓興祀立壇勤勤愛敬念意自然刻石銘碑千載表績萬古標記福祐期思縣興士熾孫氏蒙恩漢延熹三年五月廿八日立隸釋云左氏傳載蒍敖蒍艾獵杜預皆以為叔敖它書但云孫叔敖此碑獨言其名饒未知何據髙梱改弊乃孫叔革故易俗之事左傳所云君子小人物有服章亦是類也虵有二首謂之枳首枳讀如技亦曰岐首此云技首盖是借用鼂錯倪寛史家亦用朝與兒字此以伍舉作五舉以庭堅作霆堅豈古亦通用乎以刑為形以波為陂以栻為式以㒃為以蔾為黎以驂為參以墨為黙以郭為椁以長掖為張掖泉添水而為湶澤去水而為睪又貭聚嗂㙒蠙淦即質聚游野螟處塗遷鰥字孫叔敖碑隂延熹三年歳在闕二字中夏之節政􅏅封表期恩長光視事一紀訪闕國中耆年舊齒素聞孫君䠂時良輔本起垂闕於後博求遺苖胃孫子考吉辰五月辛夘宜闕􅔅廢可立碑祀招請諸孫都㑹國右郭西道北所顯好興上宰祭倡優皷儛式序其胄授之端首光㕥不肖貪追賢烈㕥自榮寵時丞左馮翊姓如諱武尉京兆周陵詳集共造戸曹掾裒騰令史許柗相君有三嗣長子即封食邑固始少子在江陵中子居三闕襲闕業績材二宗則其苖胄也相君卒後十有餘世有渤海太守字武伯武伯有二子長子字伯尉少子字仲尉仕郡為掾史伯尉有一子字世伯舉江夏孝㢘城門仲尉有二子長子字孝伯荊州従事弟世信仕闕二字掾功曹㑹哀之間宗黨爲賊冦所世伯孝伯世信闕各遺一子財八九歳微弱不能仕學世伯子字子仲治於有六男一女大子字長都次子蘭卿次弟字仲陽次弟字叔通次弟字衛公次弟字劉卿宗六父也孝伯子字文闕亦􅄇仕學治於材亦有六男一女大子字患朙次弟字次卿次弟字聖公次弟字稚卿次弟字卿次弟字少都比材宗六父也世信一子相承季陵文卿孝公闕一父别其髙祖與材髙祖父親兄弟孫氏宗族别闕諩記也即繚字即殺字諩即譜字中常侍樊安碑無額三年延熹漢故中常侍騎都尉樊君之碑君諱安字子仲南陽湖陽人也厥祖曰仲山父翼佐周宣出納命為之􅎧中興食采亐樊子孫氏焉亦世載徳守業􅄇愆在漢中葉䔍生据媛作合南頓實産世祖征討􅊇畔復漢郊廟而樊氏􅎧帝元舅顯受苐土封寵五國壽張侯􅎧公德加位特進其次竝􅎧髙聲處卿校侍中尚書據州典郡􅄇可載為天下著姓君幼􅎧妤學治韓詩論語孝經兼通記傳古今異義甘貧樂約意􅄇回天姿淑稟性有直秉撡􅄇移􅄇􅎧覬貴世政邑宰識賢役徳被􅎧勞事然後慷慨礉宦亐室歴中黄門尤従假史拜小黄門小黄門右史遷臧府令中常侍其事上也貞固密􅀈􅀈戰戰作主肱助國視聽外軄􅄇誣内言􅄇泄為近臣楷模是􅎧兄弟竝盛雙據二郡宗親賴榮年五十有六􅎧永壽四秊二月甲辰卒朝思其忠追拜騎都尉寵􅎧印紱荚書裦歎賻贈有加嗣子遷寔㠯幼弱夙叙而丧所天禮備復位􅎧延熹三年冬十有一月自上烝祭乃尋惟烈考恭脩之勒之碑石俾􅄇失隧其辭曰肅肅我君帝躬是翼事多難我君是力秉此小心㠯亮皇軄惟帝念功庸㠯輿服大命傾霄魂神僊伏艾追遷用光其徳藹藹遺稱作呈作式勒銘慈石示罔極勲名􅄇剟永昭千億制詺中常侍樊安宿衛歷年恭恪淑慎嬰被疾病􅄇奎蚤終今使湖陽邑長劉慘追號安為騎都尉贈印綬魂而有嘉其寵榮烏呼哀㦲延熹元年八月廿四日丁酉下𨽻釋云安字子仲厯中黄門冗從假史小黄門小黄門右史藏府令中常侍漢志有中黄門冗從僕射而無假史有小黄門而無右史盖闕文也安以威宗永夀四年卒其子以延熹三年仲冬始刻此碑趙氏遂以碑為元年所立而歐公云字子祐者皆誤也漢故冀州刺史王君之碑篆額四年延熹君諱純字伯敦魏郡太守之子其先出自闕五字後也􅍏祖儒宗闕二字春秋君天資才敏行不啓而達學不勞而能遵父業術闕二字始仕事君立朝正色闕二字恂智宣慈惠和㕥裵州從事永和二年察孝亷除郎謁者執法撡牘舊茟憲臺直發無任見徒掌録遣之㦯有罪過㣲刑輕㴱君闕二字坐行惡蠲疑閔其粥凍餒之患勑大司農徹易衣􅂒隠闕至恩加窮民其三年有九夷之難出將征西君請詔豫督趣軍糧其所過歷彈正闕三字赫馨烈宣于方國拜守宫令㕥父司還謁者官遷左都喪父服除復拜郎敬北闕三字失妺寧歸遂釋印紱司空辟舉髙第選侍御史岀使揚州聖朝嘉君旋拜徐州㳅化甘棠闕過宥罪政尚寛弘視事二載換在兾州西征東怨紀歌遺風㕥公事去官窮則樂善逹則闕人進則延賓分禄退則却掃閉門年五十九延熹四年八月廿八日甲寅􅄇闕隕徂五年十一月十八日丙申𦵏􅔅有令跡亡述􅔅勲銘載金石永丗􅄇刋其頌曰奐矣王君有虞之胄封陳興齊枝葉繁茂君綜典謨無道不究從政履規在公竭謀登翼闕臺文武兼備發政舉刑親恤闕二字將西征闕二字命使闕善􅄇聖朝嘉異牧徐宰兾惠闕三字邊則闕二字澹闕􅄇闕四字朽􅄇永年夀縉紳凡百孰􅄇哀思趙氏金石録云碑隂有東平馮定伯凡百餘人可識其題義士云各發聖心共出義錢隸釋未見即兗字􅂒即装字蜀郡屬國辛通達李仲曾二君造橋碑無額七年延熹惟延熹龍甲辰三月甲子民集扶㩦闕二字憂造橋闕之闕基改奢􅈬儉莫不安之以五月甲午竟領道楊闕荷杜仁領道楊瑗闕二字叙惪勒石文不能嘆一以裒賢君其辭曰闕二字邦川垂極闕二字土埶闕汜反側位角精崖崖山􅛬水闕汶江漂闕濁道闕㐀阜棧格陵陵地則居闕新闕二字竟闕官闕夷羌虜賊頃年畔厲有道則服有闕二字隘吏民闕栗􅀈皇辟矜哀下民命喉舌拜明君惟君至惪應甫及申闕恩褱貧其知如闕漢闕三字謀謨若神小閤明府恊同斷金西征鄙國撫育犂元除煩省苛公劉之仁單甫牧英不忍戰民恤彼闕二字戯險登陵橋壊求正歳歳闕二字津闕滿首闕七字呵􅊇㳅沈深往往覆沒傷害行人四縣衝衝老弱所湛耿耿寔勞闕二字慇慇闕三字日稯閔比之艱記吉領道杜沂楊瑗作莋橋梁帥爾徒待事楊闕二字守古荷賊曹掾杜仁至孝殷懃雖不闕四字出神祇祐助橋遂考闕萌兆頼祉子子孫孫百穀豐穰内外靖安必闕三字君髙遷取公闕侯福㳅後昆萬壽旡彊干禄億年亂曰闕二字君明且闕兮徕儀于國闕三字兮吏民河潤受靈福兮莫不慕化心如結兮闕十字鼎足期不逝兮領道闕八字漢嘉楊瑗字闕二字領南部道橋掾軍功卒史漢嘉杜沂字祖長漢嘉盟掾闕二字荷吏代誦從吏杜閏荷吏闕省義工王文宰義工喬闕二字義工王漢期義工闕三字義徒漢嘉闕杜闕隸釋云掾史及義工義徒數人皆題其名於後惟二人稱荷吏而杜仁稱荷賊曹掾所不可解蜀人謂此為神水閣碑考其文則謀謨若神是絶句下文二字其水似小其閣似閤特未能判即逹字即舟字裒即字犂即黎字漢泰山都尉孔君之碑篆額門生故吏名延熹七年有漢泰山都尉孔君之銘君諱宙字季將孔子十九丗之孫也天姿醇嘏齊聖逹少習家訓治嚴氏春秋絹熈之業既􅈬而閨閾之行允恭徳音孔㫥舉孝亷除郎中都昌長祗傳五敎尊賢養老躬忠恕􅀈及人兼禹湯之已故能興朴闕二字彫幣濟𢎞功於易蕳三載考績元城令是東􅛬黔猾􅄇闕三字祠兵遺畔未寧乃擢君無戎字􅀈彣脩之旬月之間莫􅄇解甲服罪闕二字田喜于農圃商旅交乎險路㑹鹿鳴於樂崩復長幼於酬酢闕三字稔㑹䔍病告困致休得從所好秊六十一延熹六秊正月乙未闕三字疾貴速朽之反真幕寧儉之遺􅋿夕􅄇華明器􅄇設凡百高闕三字述於是故吏門人乃共􅕾名山采嘉石勒銘示後俾有彞式其辭曰於顯君徳惟光紹聖作儒身立名彰貢登閽闕是虔夙夜闕二字在公眀朙乃綏二縣儀􅀈康於无時兹岱方帥彼凶人覆俾闕二字南􅀈孔饁山有夷行秊多􅎟稱彼觥帝頼其勲民斯是皇疾闕三字乃委其榮忠告慇勤屢省乃聴儉自􅀢簋􅄇敶生播髙令名永矢字􅄇刋載揚聲延熹七秊七月戊闕造隷釋云宙有七子曰謙曰褒皆見於碑誌凡漢刋其首行即入詞無額者或題其前如張納樊安之比亦甚少已篆其上復標其端惟此碑爾碑以幣為弊槈為耨意為億􅋿􅀢敶即以夏則黍兕簠簋陳字門生故吏名門生鉅鹿癭陶張雲字子平門生鉅鹿癭陶趙政字元正門生鉅鹿廣宗捕字升臺門生東平寧陽韋勲字幼昌門生魏郡館陶張上字仲舉門生魏郡館陶王時字子表門生魏郡隂安張典字少髙門生魏郡魏孟忠字待政門生魏郡魏李鎮字世君門生魏郡館陶吳讓字子敬門生魏郡館陶彣儉字元莭門生魏郡館陶瑱字仲睢門生魏郡鄴暴香字伯子門生東郡東武陽梁㳤字元祖門生東郡衛公國趙恭字和平門生東郡東武陽張表字公方門生東郡東武陽滕穆字奉徳門生東郡樂平演字仲厚門生東郡樂平靳京字君賢門生東郡樂平梁布字叔光門生東郡樂平顯字伯異門生陳􅕂平司馬􅒑字伯昌門生安平下博張祺字松門生安平下博張朝字公房門生安平下博蘇觀字伯臺門生安平堂陽張琦字子異門生北海安齊納字滎謀門生北海都昌吕升字山甫門生北海劇秦麟字伯麟門生北海如廬浮字遺伯門生北海薛字輔門生北海高􅖅字季超門生濟南梁趙震字政門生濟南梁徐璜字幼門生濟南東平陵吳進字升門生甘陵廣川李􅚾字元章門生甘陵貝並賀曜字升進門生魏郡清淵許祺字升朙門生魏郡館陶史崇字少賢門生魏郡館陶孫忠字府彣門生東郡樂平盧精字子莭門生任城任闕二字字景漢門童安平下博張忠字公直故吏北海􅚾昌逢祈字伯熹故吏北海都昌章字彣理故吏北海􅚾昌魏稱字文長故吏北海􅚾昌吕􅒑字元􅒑故吏泰山費魚淵字漢長故吏泰山蕐母樓覬字世光故吏泰山南城禹􅒑字世舉故吏泰山南武陽蕭誨字伯謀故民泰山費淳亐黨字李闕弟子北海陸暹字輔弟子陳􅕂邑樂禹字宣舉弟子下下朱班字宣闕弟子東平寧陽周順字承闕弟子沛國小沛周升字仲甫弟子魯國彣陽陳裦字聖博弟子汝南平輿謝字子弟子山陽暇丁瑤字實堅弟子魯國戴璋字元珪弟子魯國卞王政字漢方隷釋云漢碑多有隂然稀有額獨此碑有五大篆表其上漢儒開門受徒著録有盈萬人者其親受業則曰弟子以久次相傳授則曰門生未冠則曰門童摠而稱之亦曰門生舊所治官府其掾屬則曰故吏占籍者則曰故民非吏非民則曰處士素非所蒞則曰義士義民亦有稱議民賤民者逢盛碑有姓者二人趙氏謂氏族書無姓此碑有都昌章則古來自有此姓但譜者考之不詳爾漢人雖姓氏亦借用字如伍為五歐陽為歐羊之類或是借為解亦不可知也麟即麟字即襄字即邳字漢故山陽太守祝君之碑額七年延熹君諱睦字元徳濟隂已氏人也其先盖髙年氏之少正㕥能淳曜天地曰祝融遂豐阜之胙煇裔昌遠大乃侯伯分仕諸夏鄭有祝𣆀者君其胤也君膺懿量在淵澹潜心耽學該洞七探窮神無物不辯闕二字州郡㕥孝貢察賔于庭除北海長史頴川郾令𨗳濟㕥禮三載之後而民知讓有恥且恪君惟氏名遂身􅊶斯翻翔紆精衡門闕三字道闕事諮度辟司空府北軍中拜大尚書尚書僕射喉舌納言翼皇正樞遷常山相山陽太守齊和五品崇化㕥寛昭徳塞違訓其仁抽㧞隠伏闕賢式禮闕二字攸堪九功㕥著當䌓禄為帝幹楨年六十有八延熹七年八月丁巳困紆纊遺令素櫬菨蔞席賻賵非禮得犯存無玩飾亾𨗳㕥儉所謂守終純固者已盖銘功紀勛所徍示来於是迺共登山鐫石刋勒鴻伐其辭曰君國之光履忠順闡道常升紫微平機衡統闕二字律章撫二郡踰召黄㳟儉已民用康􅀈頌興詠遺闕􅄇稱垂令芳生見樂殁不忘名儷日億載揚隷釋云導濟以禮有恥且恪與魯論不同殆亦借用與賾同菨與翣同即恢字皆典字即丕字􅀈即紀字漢故山陽太守祝君碑頌篆額十年延熹故吏王堂等竊聞下有述上之功臣有叙君之徳自昔在前列莫不紀名於闕六字者故孔子曰民人登祝上天歆焉用永其世而豐其年属欽孰􅄇咨賢伐作頌曰伊余祝君兆自蔾幸祝融苗胄承獲禎慶光裔熾􅀢分仕六國張雄諸夏鄭有祝𥅆者君其胤也昔祖仕湯湯治於梁洮覬自朔家于濟隂君入學脩韓詩嚴氏春秋七並立闕綜百家文豔彬彧淵然深識怕然執守躬潔氷雪然清皓漸心於道通神逹明無物􅄇覧鄉黨逡逡朝廷便便踐䟭州郡階究右坐㕥孝察舉讃拜王庭除北海長史頴川郾令化行如風民應如草三載考績名登明堂色斯舉身衡門童冠翔集耽經樂術潜神黙記與俗殊好辟司空府北軍軍中候擢拜尚書尚書僕射七政佐輔什樞功冠帝庭懿徳逴優遷常山相山陽太守恊齊行律恢崇三樂追惟九思導闡泮宫附庸收同温化以禮帥由舊章摘隱取伏詶承賢良國無珠藏悉浴蘭湯林巨蔑七子在乗蕢遠遜竟界尼康休釐充闕功馨升揚當享紫祚為漢棟梁年六十八寝疾􅄇瘳延熹七年八月丁己卒臨絶絖竢垂誨素棺幣㕥贈禭賵醊非禮之常壹不得當糓無􅎇玩殁就以約所謂守忠啟予其去也善葢彰功表勲所㕥煥徃煇來􅋋是三年禮闋乃相與刋勒金石其辭曰穆我君邦之陽資五就闓道綱陟泰㣲准樞衡稽列宿覧四方徳合乹翼應皇領二郡曜重光化流洽掍豳昌性天約元用長頌聲作謠令香功烈著遺椒芳存覿榮淪弗忘稱彌煇𤣥為常隸釋云郷黨逡逡與論語今文不同又以尞為寮以怕為泊即齒字即介字䟭即阼字錧鎋即管轄字升即斗字絖即纊字西嶽華山廟碑篆額八年延熹周禮職方氏河南山鎮曰謂之西嶽春秋傳曰山嶽則配天乾巛定位山澤通氣雲行雨施既成萬物易之義也祀典曰日月星辰所㫥卬也地理山川所生殖也功加於民祀㕥報之禮記曰天子祭天地及山川歳徧爲自三五迭興其奉山川或在天子或在諸矦是以唐虞疇咨四嶽五歳廵狩皆以四時之中月各省其方親至其山柴祭燔燎夏商則未聞所損益周鑒于二代十有二歳王廵狩殷國亦有事於方嶽祀㕥圭壁樂奏六歌高祖初興改秦滛祀大宗承循各詺有司其山川在諸矦者㕥時祀之孝武皇帝脩封禪之禮思登假之道廵省五嶽禋祀豐備故立宫其下宫曰集靈宫壂曰存僊壂門曰望僊門仲宗之世重使使者持節祀爲歳一禱而三祀後􅄇承前至於亡新寖用今垣址營兆猶存建武之元事舉其中禮從其省但使二千石以歳時徃祠其有風旱禱請祈求靡􅄇報應自是㕥來百有餘年有事西廵輒過享祭然其所立碑石刻紀時事文字摩滅莫能存識延熹四年七月甲子𢎞農大守安國亭侯汝南袁逢掌華嶽之主位應古制脩癈起頓閔其若兹深逹和民事神之義精通誠至礿祭之福乃案經傳所載原本所由銘勒斯石垂之于後其辭曰巖巖西嶽峻極穹蒼奄有河朔遂陽觸石興雲雨我農資糧品物亦相瑤光崇冠二州古曰梁馮于豳文克昌天子展義廵狩省方玉帛之贄禮與岱亢六樂之變舞以致康在漢中葉建設宇堂山嶽之守是秩是望侯惟安國兼命斯章尊脩靈基肅共壇場眀徳惟馨神歆其芳遏穰凶斂吉祥嵗其有年民說無彊袁府君肅恭眀神易碑􅀈闕㑹遷亰兆尹孫府君到欽若嘉業遵而成之延熹八年四月廿九日甲子􅈬袁府君諱逢字周陽汝南女陽人孫府君諱字山陵安平信都人時令朱頡字宣得甘陵鄃人丞張昘字少游河南亰人左尉唐佑字君惠河南密人主者掾隂王萇字徳長亰兆尹勑監都水掾霸陵杜遷市石遣書佐新豐郭察書刻者穎川邯鄲公脩蘇張工闕君闕隷釋云東漢循王莽之禁人無二名郭香察書者察涖宅人之書爾小歐陽以為郭香察所書非也碑云四時中月省方柴祭不讀中為仲其義亦通至於宣帝為仲宗則是借仲為中說者謂漢世字少故多假借或曰漢人簡質字字相近者輙用之予以為不然亦好竒之過耳帝云昭卬禮記作瞻仰亢即抗字昘即昉字即香字邯即邯字又以癈為廢女陽為汝陽金石録云歐陽公謂集靈他書不見惟見此碑案班固漢書地理志華隂有集靈宫水經敷水北徑集靈宫則不始見此碑矣而存僊望僊諸書不載濟隂太守孟郁脩堯廟碑無額永康元年桓帝漢永康元年闕月闕二字惟昔帝堯聖徳慶苞弘號赫赫蕩蕩垂基赤精之胄為漢始别陵氣炎煴上交倉𤣥魏魏之盛乾川見徴敬脩宗壂長吏奉祠三牲粢饌獻珍于時俵着􅀈銘宣颺􅍏休乃招禎萬闕是来名遂顯傳于千秋濟隂太守河南匽􅘄孟府君諱郁字敬逹治尚書經博覽衆彣天姿偉度軆性温仁闚極道之要妙游觀六之原㨿機之政務在濟民歷典六郡威敎若神遺訓垂歌淵懿允功績煥炳㤙如浩倉咨招嚴内股肱賢良廣祈多福虔虔夙興聞帝堯陵在城陽遣戸曺掾史具中窂祠常以甲子日與西宫樂生俱詣大聖陳上古之禮舞先王之樂鞀磬柷圉五音闕四字之儀莫不盡備列技以榮大聖延熹十年仲春二月陽氣浸隂始闕来享祀羣神仰雲漢孟府君奉宣詔書行縣到成陽将辭帝堯行禮未周則景雲四集翔風膏雨即時大降嘉澍優沾利茂萬物隂陽和協百姓賴福是時闕二字欣然闕恱諸産䌓殖倉充塞孟府君深惟效之經典知聖堯精靈與天通神脩治闕壂地墦􅀈石闟二闕昭配帝圖象􅒑柜五闕二字畫上下相承無所遺失􅘄工旌宻有斑道之巧使府内百石闕城吴諱升字三君守衞園陵興置屋闕詔書大祠升與縣令丞恭奉肅敬齊絜炊熾莫不列種栢樹吏卒養護南通靈臺東注城域委曲帀墠然闕望圖紀萬世功驗永著時令河南河南吕君諱亮字元山宰政宣化慈惠博䨱為蔾元来福奉事大聖司司不解垂拱無爲如始其允君也丞河州王諱萇字伯盛左尉穎川穎陽闕諱字丗高皆闗綜洞運度詢于上下僉然同謀孟府君飾􅀈大壂自率掾史闕二字駐駕便南北闕望表相副赫如屋赭蘭然成就孟府君必受大聖嘉福公侯傳子孫濟隂吏士歌功稱萬世常存成陽丞民蒙其榮賜闕訓發聲吕君諸璧干禄亐天令裕衍永㳅旡窮惟序仲氏祖統所出本繼於姃周之遺天生仲山甫翼佐中興宣平功遂受封於齊周道衰微失爵亡後嗣乖𣪚各相土譯居帝堯萌兆生長塟陵在於成陽聖化常存慕􅠔􅠔之盛樂風之美遂安基業属都鄉高相里囙氏仲焉以傳亐今子孫承緒履仁好躭樂道教授經業徒帶滋滋汲汲誨人不倦海稱之曰之宗天監孔眀祚善闕紼相承銀不絶稟性乾元丗丗㢘約故能高如不危滿如不溢府君繕餝壂立百石舍仲氏宗家共作大壂前石􅀈階陛貧富相扶㑹計欣懽不謀同辭錢時即具招工募石􅀈然俱至各進琦巧不日成之詔書九月三徃大祠諸所造作煥然成仲氏家家並受福賜復刋碑勒昭示来丗俵著府君羙勛於陽􅀈紀祖所出闕四字官位䆠學皆不可測子子孫孫必蒙大聖休烈之福以勸後進昌熾無極隷釋云地致墦􅀈石闟二座圖象䂓矩工巧精密以為神物之靈商君傳持矛而操㦸闟音㯓字書㯓與榻同此皆借闟為㯓借墦為璠瑚言其石之似玉也此碑假借字如旋機為琁機祝圄為柷敔之類又俵為表浩倉為昊蒼柜為矩旌為精為周蔾為黎蘭為爛歌術為歌述壁為辟滋滋為孳孳屋赭為渥赭瀉為濡紼為紱􅀈即煇字欗即欄楯字即禰字又广之類多从疒其中乾與穎川字相類雖家語有乾川猶天淵也然隷書未嘗有坤字此乃乾坤爾其曰無為如治高如不危者用春秋星隕如雨之法它皆類此漢故荆州刺史杜侯之碑篆額元年永康君諱尚字愽平其先出自顓頊與楚同妵熊嚴之後闕亦丗掌位統國法度秦兼天下闕和之純貭秉黄中之匹性淵仁隆春煖義高秋雲行絜冰霜慨壯厲下闕休譽固己著矣及其􅞱牧必招振賢才抽抜幽逸選召所任極當世之秀士養民有下闕令聞彌崇暉光日新可謂盛徳者已初奉歳計拜郎中除上長化洞百姓下闕數縣恩信並宣令行禁止以從父憂去官更舉孝㢘為右校令是時南蠻蠢動擢拜下闕醜殊俗竇服逺人用綏封右鄉遷遼東太守旬月之間貉寧輯㑹楊賊畔於下闕拜中郎將制勝威謀合神持重瀀於營平深入則輕冠軍附士渥於李廣衆下闕同滋味必逹井辨幕然後飲舎惠以厚下說㕥犯難是故所征輙勉師徒無頓下闕寇殪干戈載戢馬㕥糞貪厥重復拜荆州刾史㕥故秩居書尉薦因賜下闕之荊域號慕雖周人之恖召伯弗此踰也􅋋是故吏感清廟之頌歎斯父之詩乃下闕曰􅋋惟我侯允懿允眀文武是該有忠有貞𥘉發藻在彼上虞邁種厥徳下闕矣匪是榮無言不讎帝揚厥聲俾作配闕撫于荊撫荊惟何南是下闕邦家截字彼海外莫匪嘉天生侯實為民望心乎其愛四方其卬如何不永下闕而不芳烈遺兮永康元秊歳在鶉尾龍集丁未時惟闕歳下闕𨽻釋云此碑殘闕事有遺失封侯之後碑云守遼東傳作桂陽不同碑以憂為優憂即智料克禄夏績字漢故車騎將軍馮公之碑篆額元年永康君諱緄字皇卿幽州君之元子也少耽學問習父業闕大杜弱冠詺除郎還更仕闕官掾功曹舉孝㢘除右郎闕以徳綏撫政化㳅行到官載功稱顯著郡察㢘吏州舉異遷楗為武陽令誅􅍚疆豪㕥公去官部廣漢别駕治中從事辟司空府侍史御史中丞督使徐楊二州討賊范朱生徐鳯馬勉張嬰䓁迫州郡進兵正法復辟司徒府廷尉左正治書侍御史廣漢属國都尉隴西大守問吏旬􅄇分去官以羌駭動為府所家拜隴西太守上同産弟徴議郎復治書侍御史尚書遼東大守廷尉太常車騎將軍南征五溪蠻夷黄加少高相法氏趙伯潘鴻䓁斬首萬級溺以千降者十萬人收逋布卅萬匹字􅄇費官財㧼旋還師臨當受封㕥謠言河内大守中常侍左悺弟遜位拜将作大匠河南尹復拜廷尉荊州刾史李隗南陽大守成晉太原太守劉􅀈􅄇宜㕥重論正法作左校後詺書特貰拜騎校尉廷尉奏中臣子弟不宜無牧州郡獲過左右遜位永康元年十二月一要金紫十二七墨綬将軍軆清守約既来歸遺令墳取藏刑而已􅄇造祠堂可謂履真者矣恐後人􅄇能紀知官所更歷故判石表績㕥毖来世孝桓皇帝㕥命将軍討彊夷有桓桓烈烈之姿因為桓𨽻釋云碑字皇卿而本傳作鴻卿傳云舉亷七遷為都尉中丞持莭督討楊賊守隴西遼東為京兆司𨽻廷尉太常車騎以長沙賊復作䇿免起為将作匠河南尹廷尉坐考殺單遷謫左校再為屯騎廷尉卒官其遷絀及物故先後與碑甚矛盾威宗以命将武功定謚緄亦虎臣之一云亡適當其時故作文者以帝諡書左方趙氏以為緄有此諡而史不載誤也碑以疆為彊刑為形即表塋諡字漢史成晉劉瓆作成瑨劉質東漢文紀巻二十八
