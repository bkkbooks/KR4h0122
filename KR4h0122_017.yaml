body:
  text: 東漢文紀卷十七明梅鼎祚編陳蕃字仲舉汝南平輿人與竇武謀誅宦官事泄曹節等矯詔誅死上桓帝駁討賊舉孝廉茂才疏蕃遷拜尚書時零陵桂陽山賊為害公卿議遣討之又詔下州郡一切皆得舉孝廉茂才蕃疏駁以此忤左右出為豫章太守昔高祖創業萬邦息肩撫養百姓同之赤子今二郡之民亦陛下之赤子也致令赤子為害豈非所在貪虐使其然乎宜嚴敕三府隱核牧守令長其有在政失和侵暴百姓者即便舉奏更選清賢奉公之人能班宣法令情在愛惠者可不勞王師而羣賊弭息矣又三署郎吏二千餘人三府掾屬過限未除但當擇善而授之簡惡而去之豈煩一切之詔以長請屬之路乎薦徐稚等疏延熹二年蕃為尚書令與僕射胡廣等上疏桓帝備禮徵之不至臣聞善人天地之紀政之所由也詩云思皇多士生此王國天挺俊乂為陛下出當輔弼明時左右大業者也伏見處士豫章徐稚彭城薑肱汝南袁閎京兆韋著潁川李曇德行純備著于人聽若使擢登三事協亮天工必能翼宣盛美增光日月矣光續漢書作輝救李雲書李雲所言雖不識禁忌干上逆旨其意歸於忠國而巳昔高祖忍周昌不諱之諫成帝赦朱雲腰領之誅今日殺雲臣恐剖心之譏復議於世矣故敢觸龍鱗冒昧以請諫封賞踰制內寵猥盛疏蕃時遷為光祿勳上疏為出宫女五百餘人但賜俊爵關內侯萬世南鄉侯臣聞有事社稷者社稷是為有事人君者容悅是為今臣蒙恩聖朝備位九列見非不諫則容悅也夫諸侯上象四七垂耀在天下應分土藩屏上國高祖之約非功臣不侯而聞追録河南尹鄧萬世父遵之微功更爵尚書令黃俊先人之絶封近習以非義授邑左右以無功傳賞授位不料其任裂土莫紀其功至乃一門之內侯者數人故緯象失度隂陽謬序稼用不成民用不康臣知封事巳行言之無及誠欲陛下從是而止又比年收斂十傷五六萬人飢寒不聊生活而采女數千食肉衣綺脂油粉黛不可訾計鄙諺云盜不過五女門以女貧家也今後宫之女豈不貧國乎是以傾宫嫁而天下化楚女悲而西宫災且聚而不御必生憂悲之感以致兵革水旱之困夫獄以禁止姦違官以稱才理物若法虧於平官失其人則王道有缺而令天下之論皆謂獄由怨起爵以賄成夫不有臭穢則蒼蠅不飛陛下宜採求失得擇從忠善尺一選舉委尚書三公使褒責誅賞各有所歸豈不幸甚諫校獵疏延熹六年車駕幸廣城校獵蕃疏諫不納臣聞人君有事於苑囿唯仲秋西郊順時講武殺禽助祭以敦孝敬如或違此則為肆縱故臯陶戒舜無教逸遊周公戒成王無槃于遊田虞舜成王猶有此戒况德不及二主者乎夫安平之時尚宜有節况當今之世有三空之厄哉田野空朝廷空倉庫空是謂三空加兵戎未戢四方離散是陛下焦心毁顔坐以待且之時也豈宜揚旗耀武騁心輿馬之觀乎又前秋多雨民始種麥今失其勸種之時而令給驅禽除路之役非賢聖恤民之意也齊景公欲觀於海放乎琅邪晏子為陳百姓惡聞旌旗輿馬之音舉首嚬眉之感景公為之不行周穆王欲肆車轍馬迹祭公謀父為誦祈招之詩以止其心誠惡逸遊之害人也讓太尉疏延熹八年為太尉疏讓不納不愆不忘率由舊章臣不如太常胡廣齊七政訓五典臣不如議郎王暢聰明亮達文武兼資臣不如弛刑徒李膺火災疏後漢紀云延熹八年連月有火災諸宫寺或一日三四發又夜有訛言擊鼓相驚蕃與劉茂皆上書不省古之火皆君弱臣強極隂之變也前始春而獄刑慘故火不炎上前入春節連寒水氷暴風折樹又八九州郡並言隕霜殺菽春秋晉執季孫行父水為之氷夫氣𢎞則景星見化錯則五星開日月蝕災為巳然異為方來恐卒有變必於三朝唯政可以巳之願察臣前言不棄愚忠則元元幸甚諫請劉瓆等疏蕃與司徒劉矩司空劉茂共諫帝不説有司奏劾蕃獨上疏不納宦官由此怨蕃彌甚臣聞齊桓公修霸務為內政春秋於魯小惡必書宜先自整飭後以及人今寇賊在外四支之疾內政不理心腹之患臣寢不能寐食不能飽實憂左右日親忠言以疏內患漸漬外難方深陛下超從列侯繼承天位小家畜産百萬之資子孫尚恥愧失其先業况乃産兼天下受之先帝而欲懈怠以自輕忽乎誠不愛巳不當念先帝得之勤苦耶前梁氏五侯毒遍海內天啓聖意收而戮之天下之議冀當小平明鑒未逺覆車如昨而近習之權復相扇結小黃門趙津大猾張汜等肆行貪虐姦媚左右前太原太守劉瓆南陽太守成瑨糾而戮之雖言赦後不當誅殺原其誠心在乎去惡至於陛下有何悁悁而小人道長營惑聖聽遂使天威為之發怒如加刑誕巳為過甚况乃重罰令伏歐刃乎又前山陽太守翟超東海相黃浮奉公不撓疾惡如讎超沒侯覽財物浮誅徐宣之罪並蒙刑坐不逢赦恕覽之從橫沒財巳幸宣犯釁過死有餘辜昔丞相申屠嘉召責鄧通洛陽令董宣折辱公主而文帝從而請之光武加以重賞未聞二臣有專命之誅而今左右羣豎惡傷黨類妄相交搆致此刑譴聞臣是言當復啼訴陛下深宜割塞近習豫政之源引納尚書朝省之事公卿大官五日一朝簡練清髙斥黜佞邪如是天和於上地洽於下休禎符瑞豈逺乎哉陛下雖厭毒臣言凡人主有自勉強敢以死陳極諫黨事疏延熹九年李膺等以黨事下獄考實蕃疏極諫帝託以辟召非人策免蕃臣聞賢明之君委心輔佐亡國之主諱聞直辭故湯武雖聖而興於伊吕桀紂迷惑亡在失人由此言之君為元首臣為股肱同體相須共成美惡者也伏見前司𨽻校尉李膺太僕杜密太尉掾范滂等正身無玷死心社稷以忠忤旨橫加考案或禁錮閉隔或死徙非所杜塞天下之口聾盲一世之人與秦焚書坑儒何以為異昔武王克殷表閭封墓今陛下臨政先誅忠賢遇善何薄待惡何優夫讒人似實巧言如簧使聽之者惑視之者昏夫吉凶之效存乎識善成敗之機在於察言人君者攝天地之政秉四海之維舉動不可以違聖法進退不可以離道規謬言出口則亂及八方何况髠無罪於獄殺無辜於市乎昔禹巡狩蒼梧見市殺人下車而哭之曰萬方有罪在豫一人故其興也勃焉又青徐炎旱五穀損傷民物流遷茹菽不足而宫女積於房掖國用盡於羅紈外戚私門貪財受賂所謂祿去公室政在大夫昔春秋之末周德衰微數十年間無復災眚者天所棄也天之於漢悢悢無巳故殷勤示變以悟陛下除妖去孽實在修德臣位列台司憂責深重不敢尸祿惜生坐觀成敗如蒙採録使身首分裂異門而出所不恨也讓封疏靈帝即位竇太后優詔封太傅蕃為髙陽侯蕃疏讓章前後十上竟不受使者即臣廬授髙陽鄉侯印綬臣誠悼心不知所裁臣聞讓身之文德之昭也然不敢盜以為名竊惟割地之封功德是為臣熟自思省前後厯職無它異能合亦食祿不合亦食祿臣雖無素潔之行竊慕君子不以其道得之不居也若受爵不讓掩面就之使皇天震怒災流下民於臣之身亦何所寄顧惟陛下哀臣朽老戒之在得論誅宦官疏蕃初爭立竇太后及靈帝時與后父竇武謀誅中官乃先上疏太后不納謀敗與武并見害臣聞言不直而行不正則為欺乎天而負乎人危言極意則羣凶側目禍不旋踵鈞此二者臣寧得禍不敢欺天也今京師嚻嚻道路喧譁言侯覽曹節公乘昕王甫鄭颯等與趙夫人諸女尚書並亂天下附從者升進忤逆者中傷方今一朝羣臣如河中木耳泛泛東西耽祿畏害陛下前始攝位順天行誅蘇康管霸並伏其辜是時天地清明人鬼歡喜奈何數月復縱左右元惡大姦莫此之甚今不急誅必生變亂傾危社稷其禍難量願出臣章宣示左右并令天下諸姦知臣疾之上書汝南先賢傳昔明帝時公主為子求郎不許賜錢千萬左右問之帝曰郎天官也以當敘德何可妄與人耶今陛下以郎比一把菜臣以為反側也責諸尚書書桓帝崩竇后臨朝以蕃為太傅録尚書事時新遭大喪國嗣未立諸尚書畏懼權宦託病不朝蕃以書責之諸尚書惶怖皆起視事古人立節事亡如存今帝祚未立政事日蹙諸君奈何委荼蓼之苦息偃在牀於義不足焉得仁乎後漢書竇武字遊平融玄孫拜大將軍女為皇太后封聞喜侯為宦官所害諫桓帝黨議疏武永康初為司𨽻校尉時內官專寵李膺杜密等為黨事考逮武疏諫因以病上還侯印綬詔原膺等諸獄輕者皆出之臣聞明主不諱譏刺之言以探幽暗之實忠臣不恤諫爭之患以暢萬端之事是以君臣並熙名奮百世臣幸得遭盛明之世逢文武之化豈敢懷祿逃罪不竭其誠陛下初從藩國爰登聖祚天下逸豫謂當中興自即位以來未聞善政梁孫寇鄧雖或誅滅而常侍黃門續為禍虐欺罔陛下競行譎詐自造制度妄爵非人朝政日衰姦臣日強伏尋西京放恣王氏佞臣執政終喪天下今不慮前事之失復循覆車之軌臣恐二世之難必將復及趙高之變不朝則夕近者姦臣牢修造設黨議遂收前司𨽻校尉李膺太僕杜密御史中丞陳翔太尉掾范滂等逮考連及數百人曠年拘録事無效驗臣惟膺等建忠抗節志經王室此誠陛下稷卨伊吕之佐而虛為姦臣賊子之所誣枉天下寒心海內失望惟陛下留神澄省時見理出以厭人鬼喁喁之心臣聞古之明君必須賢佐以成政道今臺閣近臣尚書令陳蕃僕射胡廣尚書朱宇荀緄劉祐魏朗劉矩尹勳等皆國之貞士朝之良佐尚書郎張陵媯皓苑康楊喬邊韶戴恢等父質彬彬明達國典內外之職羣才並列而陛下委任近習專樹叨餮外典州郡內幹心膐宜以次貶黜案罪糾罰抑奪宦官欺國之封案其無狀誣罔之罪信任忠良平決臧否使邪正毁譽各得其所寶愛天官唯善是授如此咎徵可消天應可待間者有嘉禾芝草黃龍之見夫瑞生必於嘉士福至實由善人在德為瑞無德為災陛下初行不合天意不宜稱慶後漢書論常侍封爵表時諸黃門無功而侯武上表陛下即位以來梁孫鄧亳貴戚專勢侵逼公卿略驅吏民惡熟罪深或誅滅相續以常侍黃門竊弄王命欺罔競行謗讟爭入忠臣李固杜喬在朝必竭忠奉之節覺其姦萌因造妖言陷之禍門陛下不察加以大戮寃感皇天痛入后土賢愚悲悼小大傷摧固等既沒宦黨受封快凶慝之心張豺狼之口天下咸言直如弦死道邊曲如鉤封公侯謠言之作正為於此陛下違漢舊典謂必可行自造制度妄爵非人今朝廷日衰姦臣專政臣恐有胡亥之難在於不久趙高之變不朝則夕臣實懷愚不憚瞽言使身死名著碎體糞土薦肉狐鼠猶生之年雖尊官厚祿不以易之也謹冒死陳得失之要凡七十餘條伏惟陛下深思臣言束骸候誅後漢紀大寒表謝承後漢書今冬大寒過節毒害鳥獸爰及池魚城傍松竹皆為傷絶松竹書鈔作竹柏傷絶作傷死張儉字元節山陽高平人厯衛尉劾侯覽奏儉為車部督郵覽家防東為中常侍儉劾覽覽後陷儉為黨人中常侍侯覽起第十六區皆高樓四周連閣洞門綺井蓮花壁柱綵畫魚肉臺苑擬諸宫闕張璠漢紀張升字彥真陳留尉氏人為外黃令黨錮去官竟誅死白鳩頌序陳留郡有白鳩出于郡界太守命門下曹吏張升作白鳩頌與任彥堅書今將老弱處於窮澤漸漬汀濘當何聊賴選注選注又與彥堅書綢繆惠好庶躡高蹤此一引作張堅與任彥升書則梁任昉也互異劉瑜字季節廣陵人拜議郎竇武欲大誅宦官引為侍中武敗瑜被誅上桓帝陳事疏延熹八年太尉楊秉舉瑜賢良方正上書陳事拜為議郎臣瑜自念東國鄙陋得以豐沛枝胤被蒙復除不給卒伍故太尉楊秉知臣竊窺典籍猥見顯舉誠冀臣愚直有補萬一而秉忠謨不遂命先朝露臣在下土聽聞歌謠驕臣虐政之事逺近呼嗟之音竊為辛楚泣血漣如幸得引録備答聖問泄寫至情不敢庸回誠願陛下且以須臾之慮覽今往之事人何為咨嗟天曷為動變蓋諸侯之位上法四七垂文炳耀關之盛衰者也今中官邪孽比肩裂土皆競立胤嗣繼體傳爵或乞子疏屬或賣兒市道殆乖開國承家之義古者天子一娶九女娣姪有序河圖授嗣正在九房今女嬖令色充積閨帷皆常盛其玩飾冗室空宫勞散精神生長六疾此國之費也生之傷也且天地之性隂陽正紀隔絶其道則水旱為并詩云五日為期六日不詹怨曠作歌仲尼所録况從幼至長幽藏歿身又常侍黃門亦廣妻娶怨毒之氣結成妖眚行路之言官發略人女取而復置轉相驚懼孰不悉然無緣空生此謗鄒衍匹夫杞氏匹婦尚有城崩霜隕之異况乃此輩咨怨能無感乎昔秦作阿房國多刑人今第舍增多窮極竒巧掘山攻石不避時令促以嚴刑威以正法民無罪而覆入之民有田而覆奪之州郡官府各自考事姦情賕賂皆為吏餌民愁鬱結起入賊黨官輒興兵誅討其罪貧困之民或有賣其首級以要酬賞父兄相代殘身妻孥相視分裂窮之如彼伐之如此豈不痛哉又陛下以北辰之尊神器之寶而微行近習之家私幸宦官之舍賔客市買熏灼道路因此暴縱無所不容今三公在位皆博達道藝而各正諸己莫或匡益者非不智也畏死罰也願陛下設置七臣以廣諫道及開東序金縢史官之書從堯舜禹湯文武致興之道逺佞邪之人放鄭衛之聲則政致和平德感祥風矣臣悾悾推情言不足採懼以觸忤征營懾悸上皇太后備內書大將軍竇武與太傅陳蕃謀誅宦官曹節等太后沈豫未決瑜素善天官時太白出西上書太后事敗武蕃並見害太后遷雲臺瑜亦及難太白犯房左驂上將星入太微其占宫門當閉將相不利姦人在主傍願急防與陳蕃竇武書星辰錯亂不利大臣前所謀者事宜速斷之漢紀劉陶字子竒一名偉潁川潁隂人濟北貞王勃之後舉孝廉厯侍御史拜諫議大夫著書數十萬言上桓帝陳時事疏陶遊太學時大將軍梁冀專朝桓帝無子連歲荒災乃上疏陳事不省臣聞人非天地無以為生天地非人無以為靈是故帝非人不立人非帝不寧夫天之與帝帝之與人猶頭之與足相須而行也伏惟陛下年隆德茂中天稱號襲常存之慶循不易之制目不視鳴條之事耳不聞檀車之聲天災不有痛於肌膚震食不即損於聖體故蔑三光之繆輕上天之怒伏念高祖之起始自布衣拾暴秦之敝追亡周之鹿合散扶傷克成帝業功既顯矣勤亦至矣流福遺祚至於陛下陛下既不能增明烈考之軌而忽高祖之勤妄假利器委授國柄使羣醜刑𨽻芟刈小民雕敝諸夏虐流逺近故天降衆異以戒陛下陛下不悟而競令虎豹窟於麑場豺狼乳於春囿斯豈唐咨禹稷益典朕虞議物賦土蒸民之意哉又令牧守長吏上下交競封豕長蛇蠶食天下貨殖者為窮寃之魂貧餒者作飢寒之鬼高門獲東觀之辜豐室羅妖叛之罪死者悲於窀穸生者戚於朝野是愚臣所為咨嗟長懷歎息者也且秦之將亡正諫者誅諛進者賞嘉言結於忠舌國命出於讒口擅閻樂於咸陽授趙高於車府權去已而不知威離身而不顧古今一揆成敗同藝願陛下逺覽強秦之傾近察哀平之變得失昭然禍福可見臣又聞危非仁不扶亂非智不救故武丁得傳説以消鼎雉之災周宣用申甫以濟夷厲之荒竊見故冀州刺史南陽朱穆前烏桓校尉臣同郡李膺皆履正清平貞高絶俗穆前在冀州奉憲操平摧破姦黨掃清萬里膺厯典牧守正身率下及掌戎馬威揚朔北斯實中興之良佐國家之柱臣也宜還本朝挾輔王室上齊七躍下鎮萬國臣敢吐不時之義於諱言之朝猶氷霜見日必至消滅臣始悲天下之可悲今天下亦悲臣之愚惑也鑄錢議奏時有人言以貨輕錢薄故致貧困宜改鑄大錢事下四府及太學能言之士陶上議乃止聖王承天制物與人行止建功則衆悅其事興戎而師樂其旅是故靈臺有子來之人武旅有鳬藻之士皆舉合時宜動順人道也臣伏讀鑄錢之詔平輕重之義訪覃幽微不遺窮賤是以藿食之人謬延逮及蓋以為當今之憂不在於貨在乎民飢夫生養之道先食後民是以先王觀象育物敬授民時使男不逋畝女不下機故君臣之道行王路之教通由是言之食者乃有國之所寶生民之至貴也竊見比年巳來良苗盡於蝗螟之口杼柚空於公私之求所急朝夕之餐所患靡盬之事豈謂錢貨之厚薄銖兩之輕重哉就使當今沙礫化為南金瓦石變為和玉使百姓渴無所飲飢無所食雖皇義之純德唐虞之文明猶不能以保蕭牆之內也蓋民可百年無貨不可一朝有飢故食為至急也議者不達農殖之本多言鑄冶之便或欲因緣行詐以賈國利國利將盡取者爭競造鑄之端於是乎生蓋萬人鑄之一人奪之猶不能給况今一人鑄之則萬人奪之乎雖以隂陽為炭萬物為銅役不食之民使不飢之士猶不能足無厭之求也夫欲民殷財阜要在止役禁奪則百姓不勞而足陛下聖德愍海內之憂戚傷天下之艱難欲鑄錢齊貨以救其敝此猶養魚沸鼎之中棲鳥烈火之上水木本魚鳥之所生也用之不時必至燋爛願陛下寬鍥薄之禁後冶鑄之議聽民庶之謠吟問路叟之所憂瞰三光之文耀視山河之分流天下之心國家大事粲然皆見無有遺惑者矣臣嘗誦詩至于鴻鴈于野之勞哀勤百堵之事每喟爾長懷中篇而歎近聽征夫飢勞之聲甚於斯歌是以追悟匹婦吟魯之憂始於此乎見白駒之意屏營倣徨不能監寐伏念當今地廣而不得耕民衆而無所食羣小競起進秉國之位膺揚天下鳥鈔求飽吞肌及骨並噬無厭誠恐卒有役夫窮匠起於板築之間投斤攘臂登高逺呼使愁怨之民嚮應雲合八方分崩中夏魚潰雖方尺之錢何能有救其危猶舉函牛之鼎絓纎枯之末詩人所以眷然顧之潸焉出涕者也臣東野狂暗不逹大義緣廣及之時對過所問知必以身脂鼎鑊為天下笑訟朱穆書永興中穆為冀州刺史忤宦官徴還輸作左校太學諸生劉陶等數千人上書訟穆乃赦之伏見弛刑徒朱穆處公憂國拜州之日志清姦惡誠以常侍貴寵父子兄弟布在州郡競為虎狼噬食小人故穆張理天綱補綴漏目羅取殘禍以塞天意由是內官咸共恚疾謗讟煩興讒隙仍作極其刑謫輸作左校天下有識皆以穆同勤禹稷而被共鯀之戾若死者有知則唐帝怒於崇山重華忿於蒼莫矣當今中官近習竊持國柄手握王爵口含天憲運賞則使餓𨽻富於季孫呼吸則今伊顔化為桀跖而穆獨亢然不顧身害非惡榮而好辱惡生而好死也徒感王綱之不攝懼天網之久失故竭心懷憂為上深計臣願黥首繫趾代穆校作上靈帝論張角疏陶拜侍御史巨鹿張角偽託大道妖惑小民陶與奉車都尉樂松議郎袁貢連名上疏聖王以天下耳目為視聽故能無不聞見今張角支黨不可勝計前司徒楊賜奏下詔書切敕州郡護送流民會賜去位不復補録雖會赦令而謀不解散四方私言云角等竊入京師覘視朝政鳥聲獸心私共嗚呼州郡忌諱不欲聞之但更相告語莫肯公文宜下明詔重募角等賞以國土有敢回避與之同罪論寇賊疏時寇賊方熾陶憂致崩亂復上疏陳當今要急八事八事言天下大亂皆由宦官為所譖收下黃門北寺獄掠按死臣聞事之急者不能安言心之痛者不能緩聲竊見天下前遇張角之亂後遭邊章之寇每聞羽書告急之聲心灼內熱四體驚竦今西羌逆類私署將帥皆多段熲時吏曉習戰陳識知山川變詐萬端臣常懼其輕出河東馮翊鈔西軍之後東之函谷據厄高望今果巳攻河東恐遂轉更豕突上京如是則南道斷絶車騎之軍孤立關東破膽四方動搖威之不來叫之不應雖有田單陳平之策計無所用臣前驛馬上便宜急絶諸郡賦調冀尚可安事付主者留連至今莫肯求問今三郡之民皆以奔亡南出武關北徙壺谷氷駭風散唯恐在後今其存者尚十三四軍吏士民悲愁相守民有百走退死之心而無一前鬬生之計西寇浸前去營咫尺胡騎分布巳至諸陵將軍張溫天性精勇而主者旦夕迫促軍無後殿假令失利其敗不救臣自知言數見厭而言不自裁者以為國安則臣蒙其慶國危則臣亦先亡也謹復陳當今要急八事乞須臾之間深垂納省段熲字紀明武威姑臧人厯太尉被奏詣廷尉飲鴆死上桓帝詔問羌事奏熲為并州刺史破定西羌而東羌先零等數寇三輔度遼將軍皇甫規中郎將張奐招降又叛桓帝詔問熲熲上言聽如所上桓帝詔先零東羌造惡反逆而皇甫規張奐各擁強衆不時輯定欲熲移兵東討未識其宜可參思術略臣伏見先零東羌雖數叛逆而降於皇甫規者巳二萬許落善惡既分餘寇無幾今張奐躊躇久不進者當慮外離內合兵往必驚且自冬踐春屯結不散人畜疲羸自亡之藝徒更招降坐制強敵耳臣以為狼子野心難以恩納藝窮雖服兵去復動惟當長矛挾脅白刃加頸耳計東種所餘三萬餘落居近塞內路無險折非有燕齊秦趙從橫之藝而久亂并涼纍侵三輔西河上郡已各內徙安定北地復至單危自雲中五原西至漢陽二千餘里胸奴種羌並擅其地是為癰疽伏疾留滯脅下如不加誅轉就滋大今若以騎五千步萬人車三千兩三冬二夏足以破定無慮用費為錢五十四億如此則可令羣羌破盡胸奴長服內徙郡縣得反本土伏計永初中諸羌反叛十有四年用二百四十億永和之末復經七年用八十餘億費耗若此猶不誅盡餘孽復起于兹作害今不暫疲人則永寧無期臣庶竭駑劣伏待節度上靈帝言東羌奏建寧初張奐上言東羌雖破餘種難盡熲性輕果慮負敗難常宜且以恩降可無後悔詔下熲熲復上言臣本知東羌雖衆而軟弱易制所以比陳愚慮思為永寧之算而中郎將張奐説虜強難破宜用招降聖朝明監信納瞽言故臣謀得行奐計不用事藝相反遂懷猜恨信叛羌之欣飾潤辭意云臣兵纍見折衄又言羌一氣所生不可誅盡山谷廣大不可空靜血流汚野傷和致災臣伏念周秦之際戎狄為害中興以來羌寇最盛誅之不盡雖降復叛今先零雜種纍以反覆攻沒縣邑剽略人物發冢露尸禍及生死上天震怒假手行誅昔邢為無道衛國伐之師興而雨臣動兵涉夏連獲甘澍歲時豐稔人無疵疫上占天心不為災傷下察人事衆和師克自橋門以西洛川以東故宫縣邑更相通屬非為深險絶域之地車騎安行無應折衄案奐為漢吏身當武職駐軍二年不能平寇虛欲修文戢戈招降獷敵誕辭空説僣而無徵何以言之昔先零作寇趙充國徙令居內煎當亂邉馬援遷之三輔始服終叛至今為鯁故逺識之士以為深憂今傍郡戶口單少數為羌所創毒而欲令降徒與之雜居是猶種枳棘於良田養虺蛇於室內也故臣奉大漢之威建長久之策欲絶其本根不使能殖本規三歲之費用五十四億今適期年所耗未半而餘寇殘燼將向殄滅臣每奉詔書軍不內御願卒斯言一以任臣臨時量宜不失權便並後漢書北堂書鈔引東觀記熲上書又掠得羌侯君長金印四十三銅印三十一錫印一枚及紫綬三十八黃綬二枚尉印五枚皆簿入張敞奏記王暢暢字叔茂龔子厯位司空暢為南陽太守疾南陽帝鄉貴戚多不法因奮厲威猛豪黨釁穢莫不糾發受贓不自首實者盡八財物使吏發屋伐樹堙井夷竈功曹張敞奏記諫之暢更從寬政教化遂行五教在寬著之經典湯去三面八方歸仁武王入殷先去炮烙之刑高祖鑒秦惟定三章之法孝文皇帝感緹縈蠲除肉刑卓茂文翁召父之徒皆疾惡嚴刻務崇溫厚仁賢之政流聞後世夫明哲之君網漏吞舟之魚然後三光明於上人物悅於下言之若迂其效甚近發屋伐樹將為嚴烈雖欲懲惡難以聞逺以明府上智之才日月之曜敷仁惠之政則海內改觀實有析枝之易而無挾山之難郡為舊都侯甸之國園廟出於章陵三后生自新野士女沾教化黔首仰風流自中興以來功臣將相繼世而隆愚以為懇懇用刑不如行恩孳孳求姦未若禮賢舜舉臯陶不仁者逺隨會為政晉盜奔秦虞芮入境讓心自生化人在德不在用刑後漢書崔實字子真一名台字元始駰之孫厯五原太守拜尚書數月免所著有碑論針銘答七詞文表記書凡十五篇政論實除為郎明于政體吏才有餘論當世便事數十條名曰政論指切時要言辨而確當世稱之仲長統曰凡為人主當寫一通置之座右自堯舜之帝湯武之王皆賴明哲之佐博物之臣故臯陶陳謨而唐虞以興伊箕作訓而殷周用隆及繼體之君欲立中興之功者曷嘗不賴賢哲之謀乎凡天下所不理者常由人主承平日久俗漸敝而不悟政寢衰而不改習亂安危怢不自覩或荒耽嗜欲不恤萬機或耳蔽針誨厭偽忽真或猶豫岐路莫適所從或見信之佐括囊守祿或疏逺之臣言以賤廢是以王綱縱弛於上智士鬱伊於下悲夫自漢興以來三百五十餘歲矣政令垢玩上下怠懈風俗雕敝人庶巧偽百姓囂然咸復思中興之效矣且濟時拯世之術豈必體堯蹈舜然後乃理哉期於補綻決壞支柱邪傾隨影裁割要措斯世於安寧之域而巳故聖人執權遭時定制步驟之差各有云設不強人以不能背急切而慕所聞也蓋孔子對葉公以來逺哀公以臨人景公以節禮非其不同所急異務也是以受命之君每輒創制中興之主亦匡時失昔盤庚愍殷遷都易民周穆有闕甫侯正刑俗人拘文牽古不達權制竒偉所聞簡忽所見烏可與論國家之大事哉故言事者雖合聖德輒見掎奪何者其頑士暗於時權安習所見不知樂成况可慮始茍云率由舊章而巳其達者或矜名妬能恥策非巳舞筆奮辭以破其義寡不勝衆遂見擯棄雖稷契復存猶將困焉斯賈生之所以排於絳灌屈子之所以攄其憂憤者也夫以文帝之明賈生之賢絳灌之忠而有此患况其餘哉故宜量力度德春秋之義今既不能純法八世故宜參以霸政霸政則宜重賞深罰以御之明著法術以檢之自非上德嚴之則理寬之則亂何以明其然也近孝宣皇帝明於君人之道審於為政之理故嚴刑峻法破姦軌之膽海內清肅天下密如薦勳祖廟享號中宗算計見效優於孝文及元帝即位多行寬政卒以墮損威權始奪遂為漢室基禍之主政道得失於斯可監昔孔子作春秋褒齊桓懿晉文歎管仲之功夫豈不美文武之道哉誠達權救敝之理也故聖人能與世推移而俗士苦不知變以為結繩之約可復理亂秦之緒干戚之舞足以解平城之圍夫熊經鳥伸雖延厯之術非傷寒之理呼吸吐納雖度紀之道非續骨之膏蓋為國之法有似理身平則致養疾則攻焉夫刑罰者治亂之藥石也德教者興平之粱肉也夫以德教除殘是以粱肉理疾也以刑罰理平是以藥石供養也方今承百王之敝值厄運之會自數世以來政多恩貸馴委其轡馬駘其銜四牡橫奔皇路險傾方將拑勒鞬輈以救之豈暇鳴和鑾清節奏哉昔高祖令蕭何作九章之律有夷三族之令黥劓斬趾斷舌梟首故謂之具五刑文帝雖除肉刑當劓者笞三百當斬左趾者笞五百當斬右趾者棄市右趾者既殞其命笞撻者往往至死雖有輕刑之名其實殺也當此之時民皆思復肉刑至景帝元年乃下詔曰加笞與重罪無異幸而不死不可為民乃定律減笞輕捶自是之後笞者得全以此言之文帝乃重刑非輕之也以嚴致平非以寬致平也必欲行若言當大定其本使人主師五帝而式三王蕩亡秦之俗遵先聖之風棄茍全之政蹈稽古之蹤復五等之爵立井田之制然後選稷契為佐伊吕為輔樂作而鳳凰儀擊石而百獸舞若不然則多為纍而巳政論太平御覽按此乃前論中語君以審令為明臣以奉令為忠故背制而行賞謂之作福背令而行罪謂之作威作威則人畏之作福則人歸之夫威福者人主之神器也譬之操莫邪執其柄則人莫敢抗失其柄則還見害也政論昔者聖王立井田之制分口耦地各相副適使人飢飽不偏勞逸齊均富者不足僭差貧者無所企慕政論僕前為五原太守土地不知緝績冬積草伏卧其中若見吏以草纒身令人酸鼻吾乃賣儲峙得二十餘萬詣鴈門廣武迎織師使巧手作機乃紡以教民織諫議大夫針於昭上帝迪兹既哲匪于水鑒惟人是察處有誦訓出有旅賁木鐸之求爰納遒人各有攸訊政以不紛昔日大禹拜承昌言癸辛暴戾虐及于天逢于周厲慢德不蠲喣喣胥讒人謗乃作不顧厥愆是討是格庶類不堪流之彘宅防人之口譬諸防川豈不速止潰乃潺湲闕二字尚塞言擁為賊默默之然用顛厥國諫臣司議敢告執翼太醫令針太平御覽動不肆勤靜不實逸有疾歸太醫無能恤晉平好內四時是一非鬼非食惑以自失雖以秦和焉所施術太上闕二字防疾萌芽媵理不觸骨髓奈何大赦賦序惟漢之十一年四月大赦滌惡棄穢與海內為始亹亹乎恩隆平之進也實就而賦焉答譏客有譏夫人之享天爵而應睿哲也必將振民育德弭難濟時故或階媵以納説或桎梏而不辭或擊角以自衒或養老以待期及其規合策從勳績克章撥亂夷險九合一匡聖人大寶唯斯為光令子遊精太清潛思九玄厲節縹霄抗志浮雲口願甘而恆苦身樂逸而長勤志求貴而永卑情好富而困貧慕容名而失厚思慮勞乎形神答曰子徒休彼繡衣不知嘉遁之獨肥也且麟隱於遐荒不紆機穽之路鳳皇翔於寥廓故節高而可慕李斯奮激果失其度胥種遂功身乃無處觀夫人之進趨也不揣已而干祿不揆時而要會或遭否而不遇或智小而謀大纎芒毫末禍亟無外榮速激電辱必彌世故曰愛餌銜鈎悔在鸞刀披文食豢乃啓其毛若夫守恬履靜淡爾無求沉緡濬壑棲息高邱雖無炎炎之樂亦無灼灼之憂余竊嘉兹庶遵厥猷藝文類聚何休字邵公任城樊人精研六經世儒無及詔拜郎中病辭太尉陳蕃辟之蕃敗坐廢後拜議郎遷諫議大夫春秋公羊經傳解詁序休既廢錮乃作公羊解詁覃思不窺門十有七年經緯典謨不與守文同説又作公羊墨守及辟司徒羣公表休道術深明宜侍帷幄昔者孔子有云吾志在春秋行在孝經此二學者聖人之極致治世之要務也傳春秋者非一本據亂而作其中多非常異義可怪之論説者疑惑至有倍經任意反傳違戾者其勢雖問不得不廣是以講誦師言至於百萬猶有不解時加釀嘲辭援引他經失其句讀以無為有甚可閔笑者不可勝記也是以治古學貴文章者謂之俗儒至使賈逵緣隙奮筆以為公羊可奪左氏可興恨先師觀聽不決多隨二創此世之餘事斯豈非守文持論敗績失據之過哉余竊悲之久矣往者略依胡毋生條列多得其正故遂隱括使就繩墨焉郭泰字林宗太原介休人辟太常舉有道不應蘇不韋復讎議不韋父金城太守謙為大司農李皓前枉害不韋年十八潛伏芻廥鑿寺北垣地達皓寢殺其妾并及小兒復掘皓父冢斷頭祭父墓皓捕求不得憤恚死何休以方伍員泰聞而論之議者於是貴焉子胥雖云逃命而見用強吳慿闔廬之威因輕悍之衆怨雪舊郢曾不終朝而但鞭墓戮尸以舒其憤竟無手刃後主之報豈如蘇子單特孑立靡因靡資強讎豪援據位九卿城闕天阻宫府幽絶埃塵所不能過霧露所不能沾不韋毁身憔慮出於百死冒觸嚴禁陷禍門雖不獲逞為報巳深况復分骸斷首以毒生者使皓懷忿結不得其命猶假手神靈以斃之也力唯匹夫功隆千乘比之於員不以優乎袁山松後漢書泰與陳留盛仲明書云足下諸人為時棟梁徐稚字孺子豫章南昌人家貧常自躬耕恭儉義讓非禮不言誡郭林宗書稚時宦豎專權漢室侵亂林宗周旋京師誨誘不息稚以書誡之林宗感悟曰謹拜斯言以為師表後漢書稚與茅容訣謂容曰為我謝郭林宗云云大木將顛非一繩所維何為棲棲不遑寧處漢紀申屠蟠字子龍陳留外黃人辟召不行隱居精學奏記外黃令梁配蟠同縣大女侯玉為父報讎殺夫之從母兄姑怒執玉送吏時縣令梁配將斷其獄蟠年十五自精舍詣縣奏記具以狀聞減死一等伏聞大女侯玉為父報仇獄鞠以法不勝感悼巳情敢陳所聞昔太原周黨感春秋之義辭師復讎當時論者猶高其節况玉女弱內無同生之謀外無交遊之助直推父子之情手刃莫大之讐當時聞之人無勇怯莫不張膽增氣輕身重義攘臂高談稱羡其美今聞玉幽執牢檻罪名巳定皆心低意阻惆悵悲歎蟠以玉之節義厯代未有足以感無恥之孫激忍辱之子若其在昔尚當旌廬表墓以顯後嗣况事在清聽不加以義漢紀同前杜預女記云大女緱玉者陳留緱氏女也夫從母兄弟殺其父玉乃為父報仇其殺主至親縛玉付吏獄竟當行刑有名士申屠子龍者嘉其義勇奏記於縣後漢書從緱伏聞大女緱玉為父報讎獄鞠巳決不勝感悼之情敢陳所聞昔太原周黨感春秋之義辭師復讎當時論者猶高其節况玉女弱耳無所聞心無所激內無同生之謀外無交遊之助直推父子之情奮發忿怒之心手刀刺讎僵尸流血當時聞之人無勇怯莫不強膽增氣輕身殉義攘袂高談稱羡其美今聞玉幽執穽檻罪名巳定心低意沮悵恨長歎蟠雖愚昧以為玉之節義厯代未有定足以感無恥之孤激忍辱之子假玉不值明時尚望追旌閭墓顯異後嗣况事在清聽不加八議哀矜之貸誠為朝廷痛之黃忠陳留郡人與申屠蟠書蟠初隱芒碭之間免於黨禍為何進所辟逾年不至進欲脅以威刑使忠與蟠書蟠不答大將軍幕府初開徵辟海內並延英俊雖有高名盛德不獲異遇至如先生特加殊禮優而不名設几杖之坐引領東望日夜以冀彌秋厯冬經邁二載深拒以疾無惠然之顧重令爰中郎昭暢殷勤至于再三而先生抗志彌高所執益固將軍於是憮然失望而有愧色自以德薄深用咎悔僕竊論之先生高則有餘智則不足當今西戎作亂師旅在外國軍異容動有刑憲今潁川荀爽輿病在道北郡鄭玄北面受署彼豈樂羈牽者哉知時不可佚豫也且昔人之隱雖遭其時猶放聲絶迹巢棲茹薇其不遇也則裸身大笑被髮狂歌今先生處平壤遊人間吟典籍襲衣裳行與昔人謬而欲蹈其迹擬其事不亦難乎僕願先生優遊俯仰貴處可否之間孔氏可師何必首陽備託臭味庶同休戚是假飛書以喻左右漢紀同前後漢書前幕府初開至如先生特加殊禮優而不名申以手筆設几杖之坐經過二載而先生抗志彌高所尚益固竊謂高節有餘於時則未今潁川荀爽載疾在道北海鄭玄北面受署彼豈樂羈牽哉知時不可逸豫也昔人之德遭時則放聲滅迹巢棲茹薇其不遇也則裸身大笑被髮狂歌今先生處平壤遊人間吟典籍襲衣裳事異昔人而欲速蹈其迹不亦難乎孔氏可師何必首陽東漢文紀卷十七
