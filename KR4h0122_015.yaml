body:
  text: 東漢文紀卷十五明梅鼎祚編李固字子堅漢中南鄭人歷太尉為梁冀搆死對䇿固舉孝廉辟司空掾皆不就陽嘉二年有地動山崩火災之異公卿舉固對䇿詔又特問當世之敝為政所宜固對上順帝覽其對即出阿母還舍諸常侍謝罪朝廷肅然以固為議郎臣聞王者父天母地寶有山川王道得則隂陽和穆政化乖則崩震為災斯皆關之天心效於成事者也夫化以職成官由能理古之進者有德有命今之進者唯財與力伏聞詔書務求寬博疾惡嚴暴而今長吏多殺伐致聲名者必加遷賞其存寬和無黨援者輒見斥逐是以淳厚之風不宣雕薄之俗未革雖繁刑重禁何能有益前孝安皇帝變亂舊典封爵阿母固造妖孽使樊豐之徒乘權放恣侵奪主威改亂嫡嗣至令聖躬狼狽親遇其艱既拔自困殆龍興即位天下喁喁屬望風政積敝之後易致中興誠當沛然思惟善道而論者猶云方今之事復同於前臣伏從山草痛心傷臆實以漢興以來三百餘年賢聖相繼十有八主豈無阿乳之恩豈忘爵賞之寵然上畏天威俯案經典知義不可故不封也今宋阿母雖有大功勤謹之德但加賞賜足以酬其勞苦至於裂土開國實乖舊典聞阿母體性謙虛必有遜讓陛下宜許其辭國之髙使成萬安之福夫妃后之家所以少完全者豈天性當然但以爵位尊顯專總權柄天道惡盈不知自損故至顛仆先帝寵遇閻氏位號太疾故其受禍曾不旋時老子曰其進鋭其退速也今梁氏戚為椒房禮所不臣尊以髙爵尚可然也而子弟羣從榮顯兼加永平建初故事殆不如此宜令步兵校尉冀及諸侍中還居黃門之官使權去外戚政歸國家豈不休乎又詔書所以禁侍中尚書中臣子弟不得為吏察孝廉者以其秉威權容請託故也而中常侍在日月之側聲藝振天下子弟祿仕曾無限極雖外託謙默不干州郡而諂偽之徒望風進舉今可為設常禁同之中臣昔館陶公主為子求郎明帝不許賜錢千萬所以輕厚賜重薄位者為官人失才害及百姓也竊聞長水司馬武宣開陽城門候羊迪等無他功德初拜便真此雖小失而漸壞舊章先聖法度所宜堅守政教一跌百年不復詩云上帝板板下民卒疸刺周王變祖法度故使下民將盡病也今陛下之有尚書猶天之有北斗也斗為天喉舌尚書亦為陛下喉舌斗斟酌元氣運平四時尚書出納王命賦政四海權尊藝重責之所歸若不平心災眚必至誠宜審擇其人以毗聖政今與陛下共理天下者外則公卿尚書內則常侍黃門譬猶一門之內一家之事安則共其福慶危則通其禍敗刺史二千石外統職事內受法則夫表曲者景必邪源清者流必潔猶叩樹本百枝皆動也周頌曰薄言振之莫不震疊此言動之於內而應於外者也由此言之本朝號令豈可蹉跌間隙一開則邪人動心利競暫啓則仁義道塞刑罰不能復禁化導以之寖壞此天下之紀綱當今之急務陛下宜開石室陳圗書招會羣儒引問得失指擲變象以求天意其言有中理即時施行顯拔其人以表能者則聖聽日有所聞忠臣盡其所知又宜罷退宦官去其權重裁置常侍二人方直有德者省事左右小黃門五人才智間雅者給事殿中如此則論者厭塞升平可致也臣所以敢陳愚瞽冒昧自聞者儻或皇天欲令微臣覺悟陛下陛下宜熟察臣言憐赦臣死後漢志固對䇿京房易傳曰君將無道害將及人去之深山全身厥災狼食人陛下覺悟比求隱滯故狼災息遷將作大匠陳事疏又薦陳留楊倫河南尹存東平王惲陳國何臨清河房植等是日有詔徵用倫厚等而遷瓊舉等以固為大司農臣聞氣之清者為神人之清者為賢養身者以練神為寶安國者以積賢為道昔秦欲謀楚王孫圉設壇西門陳列名臣秦使戄然遂為寢兵魏文侯師卜子夏友田子方軾段干木故羣俊競至名過齊桓秦人不敢窺兵於西河斯蓋積賢人之符也陛下撥亂龍飛初登大位聘南陽樊英江夏黃瓊廣漢楊厚會稽賀純䇿書嗟歎待以大夫之位是以巖穴幽人智術之士彈冠振衣樂欲為用四海欣然歸服聖德厚等在職雖無竒卓然夕惕孳孳志在憂國臣前在荆州聞厚純等以病免歸誠以悵然為時惜之一日朝會見諸侍中並皆年少無一宿儒大人可顧問者誠可歎息宜徵還厚等以副羣望瓊久處議郎已且十年衆人皆怪始隆崇今更滯也光祿大夫周舉才謨髙正宜在常伯訪以言議侍中杜喬學深行直當世良臣久託疾病可敕令起救种皓等疏皓為益州刺史時永昌太守鑄黃金為文蛇獻梁冀皓糾發逮捕會討巴郡賊不克冀因此陷皓與太守應承並徵下獄固時為太尉疏救之梁太后乃赦罪免官臣伏聞討捕所傷本非皓承之意實由縣吏懼法畏罪迫逐深苦致此不祥比盜賊羣起處處未絶皓承以首舉大姦而相隨免罪臣恐沮傷州縣糾發之意更共飾匿莫復盡心救日南議永和二年日南象林徼外蠻夷區憐等反攻郡縣順帝召公卿百官會議遣大將發荆揚兖豫四萬人赴之固為大將軍從事中郎駁議四府悉從若荆楊無事發之可也今二州盜賊盤結不散武陵南郡蠻夷未輯長沙桂陽數被徵發如復擾動必更生患其不可一也又兖豫之人卒被徵發逺赴萬里無有還期詔書迫促必致叛亡其不可二也南州水土溫暑加有瘴氣致死亡者十有四五其不可三也逺涉萬里士卒疲勞比至嶺南不復堪鬬其不可四也軍行三十里為程而去日南九千餘里三百日乃到計人廩五升用米六十萬斛不計將吏騾馬之食但負甲自致費便若此其不可五也設軍到所在死亡必衆既不足禦敵當復更發此為刻割心腹以補四支其不可六也九真日南相去千里發其吏民猶尚不堪何況乃苦四州之卒以赴萬里之艱哉其不可七也前中郎將尹就討益州叛羌益州諺曰虜來尚可尹來殺我後就徵還以兵付刺史張喬喬因其將吏旬月之間破殄寇虜此發將無益之效州郡可任之驗也宜更選有勇略仁惠任將帥者以為刺史太守悉使共住交址今日南兵單無穀守既不足戰又不能可一切徙其吏民北依交址事靜之後乃命歸本還募蠻夷使自相攻轉輸金帛以為其資有能反間致頭首者許以封侯列土之賞故并州刺史長沙祝良性多勇決又南陽張喬前在益州有破虜之功皆可任用昔太宗就加魏尚為雲中守哀帝即拜龔舍為太山太守宜即拜良等便道之官沖帝山陵議今處處寇賊軍興用費加倍新創憲陵賦發非一帝尚幼小可起陵於憲陵塋內依康陵制度其於役費三分減一薦楊淮益部耆舊傳固為太尉薦特拜尚書楊淮纍世服事臺閣既間練舊典且有幹用宜在機密奏記梁商順帝時商請固為從事中郎固以商后父輔政而柔和自守不能有所整裁災異數見下權日重固欲其先正風化退辭高滿乃奏記商商不能用春秋褒儀父以開義路貶無駭以閉利門夫義路閉則利門開利門開則義路閉也前孝安皇帝內任伯榮樊豐之屬外委周廣謝惲之徒開門受賂署用非次天下紛然怨聲滿道朝廷初立頗存清靜未能數年稍復墮損左右黨進者日有遷拜守死善道者滯涸窮路而未有改敝立德之方又即位以來十有餘年聖嗣未立羣下繼望可令中宫博簡嬪媵兼採微賤宜子之人進御至尊順助天意若有皇子母自乳養無委保妾醫巫以致飛燕之禍明將軍望尊位顯當以天下為憂崇尚謙省垂則萬方而新營祠堂費功億計非以昭明令德崇示清儉自數年以來災怪屢見比無雨潤而沈隂鬱泱宫省之內容有隂謀孔子曰智者見變思刑愚者覩怪諱名天道無親可為祗畏加近者月食既於端門之側月者大臣之體也夫窮髙則危大滿則溢月盈則缺日中則移凡此四者自然之數也天地之心福謙忌盛是以賢達功遂身退全名養夀無有怵迫之憂誠令王綱一整道行忠立明公踵伯成之髙全不朽之譽豈與此外戚凡輩耽榮好位者同日而論哉固狂夫下愚不達大體竊感古人一飯之報況受顧遇而容不盡乎後漢書同前漢紀今四海雲擾背義趨利父勸其子兄勉其弟皆先論價而後定位夫致一賢則國賴其功招一惡則天下被其害數年以來妖怪屢起宫省之中必有隂謀將軍位尊勢重誠令王綱一整必享不朽之福又永和元年王龔為太尉深疾宦官專權志在匡正乃上書極言其狀請加放斥諸黃門各使賔客誣奏龔罪順帝命龔亟自實固奏記商言之於帝事乃得釋龔字伯宗山陽人今旦聞下太尉王公敕令自實審其事深淺如何王公束修厲節敦樂藝文不求茍得不為茍行但以堅貞之操違俗失衆橫為讒佞所構毁衆人聞知莫不歎栗夫三公尊重承天象極未有詣理訴寃之義纎微感槩輒引分決是以舊典不有大罪不至重問王公沈靜內明不可加以非理卒有他變則朝廷獲害賢之名羣臣無救護之節矣昔絳侯得罪袁盎解其過魏尚獲戾馮唐訴其寃時君善之列在書傳今將軍內倚至尊外典國柄言重信著指撝無違宜加表救濟王公之艱難語曰善人在患飢不及餐斯其時也後漢書漢紀作固説由飢作飯奏記太平御覽湯問伊尹公卿大夫其相何如伊尹對曰三公智通大道應變不窮者也其言足以調隂陽正四時節風雨非大罪不遜位與梁冀書冀字伯車商之子襲父封為大將軍坐罪自殺冀忌質帝謀鴆之帝崩固伏尸號哭推舉侍醫因議立嗣固引司徒胡廣司空趙成先與冀書冀乃召公卿大議所立皆以為宜立清河王蒜冀忌其嚴明立蠡吾侯志是為桓帝天下不幸仍遭大憂皇太后聖德當朝攝統萬機明將軍體履忠孝憂存社稷而頻年之間國祚三絶今當立帝天下重器誠知太后垂心將軍勞慮詳擇其人務存聖明然愚情眷眷竊獨有懷逺尋先世廢立舊儀近見國家踐祚前事未嘗不詢訪公卿廣求羣議令上應天心下合衆望且永初以來政事多謬地震宫廟彗星竟天誠是將軍用情之日傳曰以天下與人易為天下得人難昔昌邑之立昏亂日滋霍光憂愧發憤悔之折骨自非博陸忠勇延年奮發大漢之祀幾將傾矣至憂至重可不熟慮悠悠萬事惟此為大國之興衰在此一舉後漢書范曄論曰順桓之間國統三絶太后稱制賊臣虎視李固據位持重以爭大義確乎而不可奪豈不知守節之觸禍耻夫覆折之傷任也觀其發正辭及所遺梁冀書雖機失乖謀猶戀戀而不能已至矣哉社稷之心乎其顧視胡廣趙戒猶糞土也與黃瓊書瓊字世英江夏安陸人歷司空瓊以父香任太子舍人不就永建中公卿多薦瓊者詔下縣以禮慰遣先是徵聘處士多不稱望固素慕於瓊乃以書逆遺之瓊至即拜議郎稍遷尚書僕射居職達練朝議莫抗聞已度伊洛近在萬歲亭豈即事有漸將順王命乎蓋君子謂伯夷隘柳下惠不恭故傳曰不夷不惠可否之間蓋聖賢居身之所珍也誠遂欲枕山棲谷擬迹巢由斯則可矣若當輔政濟民今其時也自生民以來善政少而亂俗多必待堯舜之君此為志士終無時矣常聞語曰嶢嶢者易缺皎皎者易汙陽春之曲和者必寡盛名之下其實難副近魯陽樊君被徵初至朝廷設壇席猶待神明雖無大異而言行所守亦無所缺而毁謗布流應時折減者豈非觀聽望深聲名太盛乎自頃徵聘之士胡元安薛孟嘗朱仲昭顧季鴻等其功業皆無所採是故俗論皆言處士純盜虛聲願先生𢎞此逺謨令衆人歎服一雪此言耳後漢書樊君樊英也英字季齊南陽魯陽人順帝時徵至為設壇席賜几杖待以師傅之禮及應對無竒謨深䇿談者以為失望善政續漢書作平代志士資治通鑑作士行其志臨終與胡廣趙戒書廣字伯始南郡華容人戒字志伯蜀郡成都人桓帝立嵗餘甘陵劉文魏郡劉鮪各謀立清河王為天子冀因此誣固與杜喬通謀固下獄太后乃赦焉冀畏固名德終為已害乃更據奏前事誅之固臨終與廣戒書冀乃封廣戒而露固尸於四衢固受國厚恩是以竭其股肱不顧死亡志欲扶持王室比隆文宣何圖一朝梁氏迷謬公等曲從以吉為凶成事為敗乎漢家衰微從此始矣公等受主厚祿顛而不扶傾覆大事後之良史豈有所私固身已矣於義得矣夫復何言後漢書漢紀載書云吾欲扶持漢室使之比隆文宣何圖梁將軍迷謬諸子曲從以吉物為凶成事為敗漢家衰微從是始矣將軍亦有不利吾雖死上不慙於天下不愧於人求義得義死復何恨辟文學書長沙耆舊傳太尉李公時為荆州刺史本傳永和中固為荆州欲採名珠求之於蚌欲得名士求之文學或割百蚌不得一珠不可捨蚌求之於魚或百文學不出竒士不可捨文學求之於斗筲也由是言之蚌乃珠之所藏文學亦士之場矣助展允婚教太平御覽告文學師議曹史展允篤學貧苦慈孝推讓年將知命妃匹未定聞之愴然其閔哀之夫冠娶仕進非所以已親允兄弟無意亦朋友不好事之罪也前遣師傳為允娶云談處士等各欲佐助迄今未定出錢千率先上大夫府內史守助佐幹及談掾等其欲議朋友少徵條名目允貧士也禮宜從約二三萬錢足以成婚李燮字德公固子固誅姊文姬撫之仕歷河南尹求加禮种岱疏岱字公祖皓之子好學養志與燮同徵議郎病卒燮上書求加禮不從臣聞仁義興則道德昌道德昌則政化明而萬姓寧伏見故處士种岱淳和達理耽悅詩書富貴不能回其慮萬物不能擾其心稟命不永奄然殂殞若不槃桓難進等輩皆已公卿矣昔先賢既沒有加贈之典周禮盛德有銘誄之文而岱生無印綬之榮卒無官諡之號雖未建忠效用而為聖恩所拔遐邇具瞻宜有異賞論安平王續奏燮靈帝時拜安平相先是安平王續為張角賊所略贖還議復其國燮上奏以毁宗室輸作左校王後坐不道被誅乃拜燮議郎續在國無政為妖賊所虜守藩不稱損辱聖朝不宜復國書甄邵背帛潁川甄邵附梁冀為鄴令有同歲生得罪冀亡奔邵邵偽納隂告冀捕殺之邵當遷郡守會母亡埋尸馬屋先受封然後發喪燮遇之途投車溝中笞捶亂下大書帛於其背乃表邵廢錮諂貴賣友貪官埋母史官上書華陽國志延熙二年梁冀誅後月經陽道暈五車史官上書於是下書救固子燮附燮昔有大星升漢而西捲舌揚芒迫月熒惑犯帝坐則有大臣枉誅星在西方太尉固應之今暈如之宜有赦命録其遺嗣以除此異杜喬字叔榮河內林慮人歷位太尉忤梁冀與李固同時見害上桓帝論封爵書喬遷大司農時梁冀子弟五人及中常侍等以無功並封喬上書諫不省陛下越從藩臣龍飛即位天人屬心萬邦攸賴不急忠賢之禮而先左右之封傷善害德興長佞諛臣聞古之明君褒罰必以功過末世暗主誅賞各緣其私今梁氏一門宦者微孽並帶無功之紱裂勞臣之土其為乖濫胡可勝言夫有功不賞為善失其望姦回不詰為惡肆其凶故陳資斧而人靡畏班爵位而物無勸茍遂斯道豈伊傷政為亂而巳喪身亡國可不慎哉周舉字宣光汝南汝陽人歷光祿勳拜光祿大夫旱災對䇿舉為冀州刺史陽嘉三年徴拜尚書是歲河南三輔大旱詔書以舉才學優深特下䇿問舉對因召見問以得失後因免司徒劉﨑順帝䇿問朕以不德仰承三統夙興夜寐思協大中頃年以來旱災屢應稼穡焦枯民食困乏五品不訓王澤未流羣司素餐據非其位審所貶黜變復之徵厥效何由分别具對勿有所諱對䇿臣聞易稱天尊地卑乾坤定矣二儀交構乃生萬物萬物之中以人為貴故聖人養之以君成之以化順四時之宜適隂陽之和使男女婚娶不過其時包之以仁恩導之以德教示之以災異訓之以嘉祥此先聖承乾養物之始也夫隂陽閉隔則二氣否塞二氣否塞則人物不昌人物不昌則風雨不時風雨不時則水旱成災陛下處唐虞之位未行堯舜之政近廢文帝光武之法而循亡秦奢侈之欲內積怨女外有曠夫今皇嗣不興東宫未立傷和逆理斷絶人倫之所致也非但陛下行此而已豎宦之人亦復虛以形藝威侮良家取女閉之至有白首歿無配偶逆於天心昔武王入殷出傾宫之女成湯遭災以六事尅巳魯僖遇旱而自責祈雨皆以精誠轉禍為福自枯旱以來彌歷年歲未聞陛下改過之效徒勞至尊暴露風塵誠無益也又下州郡祈神致請昔齊有大旱景公欲祀河伯晏子諫曰不可夫河伯以水為城國魚鱉為民庶水盡魚枯豈不欲雨自是不能致也陛下所行但務其華不尋其實猶緣木求魚却行求前誠宜推信革政崇道變惑出後宫不御之女理天下寃枉之獄除大官重膳之費夫五品不訓責在司徒有非其位宜急黜斥臣自藩外擢典納言學薄智淺不足以對易傳曰陽感天不旋日惟陛下留神裁察北鄉侯尊諡對永和元年災異數見召公卿以下詣顯親殿問議者多謂宜如詔旨舉獨對不宜稱諡於是司徒黃尚等七十人同舉議從之順帝詔問言事者多云昔周公攝天子事及薨成王欲以公禮葬之天為動變及更葬以天子之禮即有反風之應北鄉侯親為天子而葬以王禮故數有災異宜加尊諡列於昭穆對昔周公有請命之應隆太平之功故皇天動威以章聖德北鄉侯本非正統姦臣所立立不踰歲年號未改皇天不祐大命夭昏春秋王子猛不稱崩魯子野不書葬今北鄉侯無他功德以王禮葬之於事已崇不宜稱諡災眚之來弗由此也永和六年災異對舉拜諫議大夫時連有災異召舉於顯親殿問以變眚舉對其後江淮賊起如舉所言陛下初立遵修舊典興化致政逺近肅然頃年以來稍違於前朝多寵幸祿不序德觀天察人凖今方古誠可危懼書曰僣恆晹若夫僣差無度則言不從而下不正陽無以制則上擾下竭宜密嚴敕州郡察強宗大姦以時禽討殤帝廟次議梁太后臨朝以殤帝幼崩廟次宜在順帝下諫議大夫吕勃以為應依昭穆之序舉議從之春秋魯閔公無子庶兄僖公代立其子文公遂躋僖於閔上孔子譏之書曰有事於太廟躋僖公傳曰逆祀也及定公正其序經曰從祀先公為萬世法也今殤帝在先於秩為父順帝在後於親為子先後之義不可改昭穆之序不可亂吕勃議是也為朱倀論熒惑變異書司徒九江朱倀年老為司𨽻虞詡所奏甚憤東閣祭酒周舉以熒惑比有變異勸倀當密上聞因為創草上嘉其忠謨蒙慰勞臣聞易曰天垂象見吉凶觀乎天文以察時變臣竊見九月庚辰今月丙辰過熒惑於東井辟金光輝合并移時乃出經術淺末不曉天官見其非常昭昭再見誠切怪之誠悶憤夫月者太隂熒惑火星不宜相干臣聞盛德之主不能無異但當變改有以供御孔子曰雖明天子熒惑必謀禍福之徵慎察用之孝宣皇帝地節元年月蝕熒惑明年有霍氏亂孔子曰火上不可握熒惑班變不可息志帝應其修無極此言熒惑火精尤史家所宜察也楚莊曰災異不見寡人其亡今變異屢臻此天以祐助漢室覺悟國家也臣誠懼史官畏忌不敢極言惟陛下深留聖思按圖書之文鑒古今之戒召見方直極言而靡諱親賢納忠推誠應人猶影響也宋景公有善言熒惑徙舍延年益夀況乎至尊感不旋日書曰天威棐諶言天德輔誠也周公將沒戒成王以左右常伯常任準人綴衣虎賁言此五官存亡之機不可不謹也臣願陛下思周旦之言詳左右清禁之內謹供養之官嚴宿衛之身申敕屢省務知戒慎以退未萌以此無疆謹匍匐自力手書密上風俗通移書介子推廟汝南先賢傳舉遷并州刺史郡俗以介子推焚骸有龍忌之禁至其亡月輒一月寒食莫敢煙㸑及移書子推廟以宣示愚民衆惑稍解春中去火寒食一月老小不堪殘損民命非賢者之意今則三日而已黃瓊字世英香之子公車徴拜議郎歷太尉復為司空上順帝論災異疏瓊徵拜議郎稍遷尚書僕射習見故事達練官曹時連有災異瓊上疏詔徵錯等間者以來封位錯謬寒燠相干蒙氣數興日暗月散原之天意殆不虛然陛下宜開石室案河洛外命史官悉條上永建以前至漢初災異與永建以後訖於今日孰為多少又使近臣儒者參考政事數見公卿察問得失諸無功德者宜皆斥黜臣前頗陳災眚并薦光祿大夫樊英大中大夫薛包及會稽賀純廣漢楊厚未蒙御省伏見處士巴郡黃錯漢陽任棠年皆耆耋有作者七人之志宜更見引致助崇大化永建二年大旱疏書奏引見德陽殿屬主者施行昔魯僖遇旱以六事自讓躬節儉閉女謁放讒佞者十三人誅稅民受貨者九人退舍南郊天立大雨今亦宜顧省政事有所損闕務存質儉以易民聽尚方御府息除煩費明勑近臣使遵法度如有不移示以好惡數見公卿引納儒士訪以政化使陳得失又囚徒尚積多致死亡亦足以感傷和氣招降災旱若改敝從善擇用嘉謀則災消福至矣請行籍田禮奏順帝從之自古聖帝哲王莫不敬恭明祀增致福祥故必躬郊廟之禮親籍田之勤以先羣萌率勸農功昔周宣王不籍千畝虢文公以為大譏卒有薑戎之難終損中興之名竊見陛下遵稽古之鴻業體虔肅以應天順時奉元懷柔百神朝夕觸塵埃於道路晝暮聆庶政以恤人雖詩詠成湯之不怠遑書美文王之不暇食誠不能加今廟祀適闋而祈穀潔齋之事近在明日臣恐左右之心不欲屢動聖躬以為親耕之禮可得而廢臣聞先王制典籍田有日司徒咸戒司空除壇先時五日有協風之應王即齋宫饗醴載耒誠重之也自癸巳以來仍西北風甘澤不集寒涼尚結迎春東郊既不躬親先農之禮所宜自勉以逆和氣以致時風易曰君子自強不息斯其道也褒崇大將軍梁冀議質帝崩冀迎立桓帝元嘉元年帝欲褒崇冀使議其禮特進胡廣等咸稱冀勳德宜比周公錫之山川土田瓊獨建議朝廷從之冀以為恨冀前以親迎之勞增邑三千又其子胤亦加封賞昔周公輔相成王制禮作樂化致太平是以大啓土宇開地七百今諸侯以户邑為制不以里數為限蕭何識髙祖於泗水霍光定傾危以興國皆益户增封以顯其功冀可比鄧禹合食四縣賞賜之差同於霍光使天下知賞必當功爵不越德疾篤上桓帝極諫疏瓊延熙四年復為司空以地震免七年疾篤上疏諫臣聞天者務剛其氣君者務強其政是以王者處高自持不可不安履危任力不可不據夫自持不安則顛任力不據則危故聖人升髙據上則以德義為首涉危蹈傾則以賢者為力唐堯以德化為冠冕以稷契為筋力高而益崇動而愈據此先聖所以長守萬國保其社稷者也昔髙皇帝應天順民奮劒而王掃除秦項革命創制降德流祚至於哀平而帝道不綱秕政日亂遂使姦佞擅朝外戚專恣所冠不以仁義為冕所蹈不以賢佐為力終至顛蹶滅絶漢祚天維陵弛民鬼慘愴賴皇乾眷命炎德復輝光武以聖武天挺繼統興業創基􅖅泮之上立足枳棘之林擢賢於衆愚之中畫功於無形之世崇禮義于交爭循道化於亂離是自歷髙而不傾任力危而不跌興復洪祚開建中興光被八極垂名無窮至於中葉盛業漸衰陛下初從藩國爰升帝位天下拭目謂見太平而即位以來未有勝政諸梁秉權豎宦充朝重封纍職傾動朝廷卿校牧守之選皆出其門羽毛齒革明珠南金之寶殷滿其室富擬王府藝回天地言之者必族附之者必榮忠臣懼死而杜口萬夫怖禍而木舌塞陛下耳目之明更為聾瞽之主故太尉李固杜喬忠以直言德以輔政念國忘身殞歿為報而坐陳國議遂見殘滅賢愚切痛海內傷懼又前白馬令李雲指言宦官罪穢宜誅皆因衆人之心以救積薪之敝𢎞農杜衆知雲所言宜行懼雲以忠獲罪故上書陳理之乞同日而死所以感悟國家庶雲獲免而雲既不辜衆又并坐天下尤痛益以怨結故朝野之人以忠為諱昔趙殺鳴犢孔子臨河而反夫覆巢破卵則鳳凰不翔刳牲夭胎則麒麟不臻誠物類相感理使其然尚書周永昔為沛令素事梁冀幸其威藝坐事當罪越拜令職見冀將衰乃陽毁示忠遂因姦計亦取封侯又黃門協邪羣輩相黨自冀興盛腹背相親朝夕圖謀共構姦軌臨冀當誅無可設巧復記其惡以要爵賞陛下不加清徵審别真偽復與忠臣並時顯封使朱紫共色粉墨雜蹂所謂抵金玉於沙礫碎圭璧於泥塗四方聞之莫不憤歎昔曾子大孝慈母投杼伯竒至賢終於流放夫讒諛所舉無髙而不可升相抑無深而不可淪可不察歟臣至頑駑世荷國恩身輕位重勤不補過然懼於永歿負釁益深敢以垂絶之日陳不諱之言庶有萬分無恨三泉皇甫規字威明安定朝那人為度遼將軍𢎞農太守封夀成亭侯上順帝求自效疏規初上書言征西將軍馬賢擊羌必敗賢果戰歿郡將舉規上計掾其後羌衆大攻隴西規上疏求自效不用臣比年以來數陳便宜羌戎未動䇿其將反馬賢始出頗知必敗誤中之言在可考校臣每惟賢等擁衆四年未有成功懸師之費且百億計出於平人回入姦吏故江湖之人羣為盜賊青徐荒飢襁負流散夫羌戎潰叛不由承平皆由邉將失於綏御乘常守安則加侵暴茍競小利則致大害微勝則虛張首級軍敗則隱匿不言軍士勞怨困於猾吏進不得快戰以徼功退不得溫飽以全命餓死溝渠暴骨中原徒見王師之出不聞振旅之聲酋豪泣血驚懼生變是以安不能久敗則經年臣所以摶手叩心而增歎者也願假臣兩營二郡屯列坐食之兵五千出其不意與護羌校尉趙沖共相首尾土地山谷臣所曉習兵藝巧便臣已更之可不煩方寸之印尺帛之賜髙可以滌患下可以納降若謂臣年少官輕不足用者凡諸敗將非官爵之不髙年齒之不邁臣不勝至誠沒死自陳上桓帝論羌事求自效疏規徵拜太山太守寇虜悉平延熹四年秋叛羌零吾等與先零别種冦鈔關中護羌校尉段熲坐徵規素悉羌事志自奮效乃上疏以規為中郎將持節討零吾等破之先零諸種並降自臣受任志竭愚鈍實賴兖州刺史牽皓之清猛中郎將宗資之信義得承節度幸無咎譽今猾賊就滅太山略平復聞羣羌並皆反逆臣生長邠岐年五十有九昔為郡吏再更叛羌預籌其事有誤中之言臣素有固疾恐犬馬齒窮不報大恩願乞冗官備單車一介之使勞來三輔宣國威澤以所習地形兵藝佐助諸軍臣窮居孤危之中坐觀郡將已數十年矣自鳥鼠至於東岱其病一也力求猛敵不如清平勤明吳孫未若奉法前變未逺臣誠戚之是以越職盡其區區自訟疏規持節數年還督鄉里多所舉奏又惡絶宦官遂共誣規貨賂羣羌天子璽書誚讓相屬規上疏自訟竟為中常侍徐璜所陷論輸左校四年之秋戎醜蠢戾爰自西州侵及涇陽舊都懼駭朝廷西顧明詔不以臣愚駑急使軍就道幸蒙威靈遂振國命羌戎諸種大小稽首輒移書營郡以訪誅納所省之費一億以上以為忠臣之義不敢告勞故耻以片言自及微效然比方先事庶免罪悔前踐州界先奏郡守孫雋次及屬國都尉李翕督軍御史張稟旋師南征又上涼州刺史郭閎漢陽太守趙熹陳其過惡執據大辟凡此五臣支黨半國其餘墨綬下至小吏所連及者復有百餘吏託報將之怨子思復父之耻載贄馳車懷糧步走交構豪門競流謗讟云臣私報諸羌謝其錢貨若臣以私財則家無擔石如物出於官則文簿易考就臣愚惑信如言者前世尚遺胸奴以宫姬鎮烏孫以公主今臣但費千萬以懷叛羌則良臣之才略兵家之所貴將有何罪負義違理乎自永初以來將出不少覆軍有五動資巨億有旋車完封寫之權門而名成功立厚加爵封今臣還督本土糾舉諸郡絶交離親戮辱舊故衆謗隂害固其宜也臣雖汚穢廉潔無聞今見覆沒耻痛實深傳稱鹿死不擇音謹冒昧略上薦中郎將張奐自代疏規赦歸徵拜度遼將軍數月薦奐自代從之以規為使丐奴中郎將臣聞人無常俗而政有治亂兵無強弱而將有能否伏見中郎將張奐才略兼優宜正元帥以從衆望若猶謂愚臣宜充軍事者願乞冗官以為奐副請坐黨人奏黨事起天下名賢多見染逮規自以西州豪傑耻不得豫乃先自上言朝廷不問臣前薦故大司農張奐是附黨也又臣昔論輸左校時太學生張鳳等上書訟臣是為黨人所附也臣宜坐之對䇿沖質之間梁太后臨朝規舉賢良方正對䇿梁冀忿其刺巳以為下第拜郎中託疾免歸伏惟孝順皇帝初勤王政紀綱四方幾以獲安後遭姦偽威分近習畜貨聚馬戲謔是聞又因緣嬖幸受賂賣爵輕使賔客交錯其間天下擾擾從亂如辭故每有征戰鮮不挫傷官民並竭上下窮虛臣在關西竊聽風聲未聞國家有所先後而威福之來咸歸權幸陛下體兼乾坤聰哲純茂攝政之初拔用忠貞其餘維綱多所改正逺近翕然望見太平而地震之後霧氣白濁日月不光旱魃為虐大賊從橫流血川野庶品不安譴誡纍至殆以姦臣權重之所致也其常侍尤無狀者亟便黜遣披掃凶黨收入財賄以塞痛怨以答天誡今大將軍梁冀河南尹不疑處周邵之任為社稷之鎮加與王室世為姻族今日立號雖尊可也實宜增修謙節輔以儒術省去遊娛不急之務割減廬第無益之飾夫君者舟也人者水也羣臣乘舟者也將軍兄弟操楫者也若能平志畢力以度元元所謂福也如其怠弛將淪波濤可不慎乎夫德不稱祿猶鑿墉之趾以益其髙豈量力審功安固之道哉凡諸宿猾酒徒戲客皆耳納邪聲口出諂言甘心逸遊唱造不義亦宜貶斥以懲不軌今冀等深思得賢之福失人之纍又在位素餐尚書怠職有司依違莫肯糾察故使陛下專受諂諛之言不聞户牖之外臣誠知阿諛有福深言近禍豈敢隱心以避誅責乎臣生長邊逺希涉紫庭怖懾失守言不盡心永康元年對策規徵為尚書其夏日食詔舉賢良公正下問規對不省天之於王者如君之於臣父之於子也誡以災妖使從福祥陛下八年之中三斷大獄一除內嬖再誅外臣而災異猶見人情未安者殆賢愚進退威刑所加有非其理也前太尉陳蕃劉矩忠謀髙世廢在里巷劉祐馮緄趙典尹勳正直多怨流放家門李膺王暢孔翊潔身守禮終無宰相之階至於鉤黨之釁事起無端虐賢傷善哀及無辜今興改善政易於覆手而羣臣杜口鑒畏前害互相瞻顧莫肯正言伏願陛下暫留聖明容受謇直則前責可弭後福必降並後漢書女師針觀象制教肇經乾坤家有王義室有嚴君各有定位隂陽是分昔在軒轅陶化正刑刑於壼闈以臨百官煌煌后妃玄紞是間穆穆夫人爰採潔蘩師禮莫違而神罔時怨關雎首化萬國承流實有淑女允作好逑唐媛典媯文武盛周德音不回𢎞濟大繇咨爾庶妃鑾路斯邁戰戰競競厲省鞶帶漸進不缺變起無外行難著而易喪事易失而難退動若順流應如發機奉上唯敬撫下唯慈怨豈在明患生不思與劉司空箋明公至德佐國憂世蒙贈兩梁冠及鮐魚一雙服厚尊貺榮施其𢎞藝文類聚與馬融書謹遣掾尚許奉書裁上絮被一雙襪一量以通微意北堂書鈔意作心一作忱與趙一書一上計西還過𢎞農候太守皇甫規門者不即通一遂遁去規聞大驚追書謝過一報之遂去不顧惟李善注稽康幽憤詩引趙一報羊陟書云君明睿平其夙心未審何據蹉跌不面企德懷風虛心委質為日久矣側聞仁者愍其區區冀承清誨以釋遙悚今旦外白有一尉兩計吏不道屈尊門下更啓乃知已去如印綬可投夜豈待旦惟君明睿平其夙心寧當慢慠加於所天事在悖惑不足具責儻可原察追修前好則何福如之謹遣主簿奉書下筆氣結汗流竟趾後漢書趙一報皇甫規書即答前書君學成師範縉紳歸慕仰髙希驥歷年滋多旅轅兼道渴於言侍沐浴晨興昧旦守門實望仁兄昭其懸遲以貴下賤握髮垂接髙可敷玩墳典起發聖意下則抗論當世消弭時災豈悟君子自生怠倦失恂恂善誘之德同亡國驕惰之志蓋見機而作不俟終日是以夙退自引畏使君勞昔人或歷説而不遇或思仕而無從皆歸之於天不尤於物今一自譴而已豈敢有猜仁君忽一匹夫於德何損而逺辱手筆追路相尋誠足愧也一之區區曷云量巳其嗟可去謝也可食誠則頑簿實識其趣但關節疢動膝灸壞潰請俟他日乃奉其情輒誦來貺永以自慰謝友人書本傳此書在前一恃才倨傲屢抵罪幾至死友人救免乃貽書謝恩昔原大夫贖桑下絶氣傳稱其人秦越人還虢太子結脈世著其神設曩之二人不遭仁神則結絶之氣竭矣然而糒脯出乎車軨針石運乎手爪今所賴者非直車軨之糒脯手爪之針石也乃收之於斗極還之於司命使乾皮復含血枯骨復被肉允所謂遭仁遇神真所宜傳而著之余畏禁不敢班班顯言竊為窮鳥賦一篇後漢書東漢文紀卷十五
