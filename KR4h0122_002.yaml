body:
  text: 東漢文紀卷二明梅鼎祚編章帝諱炟明帝第五子母賈貴人立為皇太子在位十三年廟曰肅宗即位詔永平十八年八月朕以眇躬託於王侯之上統理萬機懼失厥中兢兢業業未知所濟深惟守文之主必建師傅之官詩不云乎不愆不忘率由舊章行太尉事節鄉侯喜三世在位為國元老司空融典職六年勤勞不怠其以熹為太傅融為太尉並録尚書事三事大夫莫肯夙夜小雅之所傷也子違汝弼汝無面從股肱之正義也羣后百僚勉思厥職各貢忠誠以輔不逮申敕四方稱朕意焉日蝕詔十八年十一月甲辰晦日有蝕之天子避正殿不聽事朕以眇年奉承宗祖不能聿修洪業以致災眚思惟厥咎在豫一人又羣司百僚其勉修所職各言其封事靡有所諱後漢紀春作詔建初元年正月詔三州郡國方春東作恐人稍受廩往來煩劇或妨耕農其各實核尤貧者計所貸并與之流人欲歸本者郡縣其實稟令足還到聽過止官亭無雇舍宿長吏親躬無使貧弱遺脫小吏豪右得容姦妄詔書既下勿得稽留刺史明加督察尤無狀者又詔比年牛多疾疫墾田減少榖價頗貴人以流亡方春東作宜及時務二千石勉勸農桑𢎞致勞來羣公庶尹各推精誠專急人事罪非殊死須立秋案驗有司明慎選舉進柔良退貪猾順時令理寃獄五教在寬帝典所美愷悌君子大雅所歎布告天下使明知朕意地震詔元年三月山陽東平地震朕以無德奉承大業夙夜栗栗不敢荒寧而災異仍見與政相應朕既不明涉道日寡又選舉乖實俗吏傷人官職耗亂刑罰不中可不憂與昔仲弓季氏之家臣子遊武城之小宰孔子猶誨以賢才問以得人明政無大小以得人為本夫鄉舉里選必纍功勞今刺史守相不明真偽茂才孝亷歲以百數既非能顯而當授之政事甚無謂也每尋前世舉人貢士或起甽畝不繫閥閲敷奏以言則文章可採明試以功則政有異迹文質彬彬朕甚嘉之其令太傅三公中二千石二千石郡國守相舉賢良方正能直言極諫之士各一人東觀漢記云公卿巳下其舉直言極諫能指朕之過失者各一人遣詣公車將親延問焉其以巖穴為先勿取浮華舉察非法詔二年三月比年隂陽不調飢饉屢臻深惟先帝憂人之本詔書曰不傷財不害人誠欲元元去末歸本而今貴戚近親奢縱無度嫁娶送終尤為僣侈有司廢典莫肯舉察春秋之義以貴理賤今自三公並宜明糾非法宣振威風朕在弱冠未知稼穡之艱難區區管窺豈能照一隅哉其科條制度所宜施行在事者備為之禁先京師而後諸夏講議五經詔四年十一月下詔於是會白虎觀講議五經同異帝親稱制臨決蓋三代導人教學為本漢承暴秦褒顯儒術建立五經為置博士其後學者精進雖曰承師亦别名家孝宣皇帝以為去聖久遠學不厭博故遂立大小夏侯尚書後又立京氏易至建武中復置顔氏嚴氏春秋大小戴禮博士此皆所以扶進微學尊廣道藝也中元元年詔書五經章句煩多議欲減省至永平元年長水校尉倏奏言先帝大業當以時施行欲使諸儒共正經義頗令學者得以自助孔子曰學之不講是吾憂也又曰博學而篤志切問而近思仁在其中矣於戲其勉之哉日食求直諫詔五年二月庚辰朔日有食之朕新離供養愆咎衆著上天降異大變隨之詩不云乎亦孔之醜又久旱傷麥憂心慘切公卿巳下其舉直言極諫能指朕過失者各一人遣詣公車將親覽問焉其以巖穴為先勿取浮華又詔春秋書無麥苖重之也去秋雨澤不適今時復旱如炎如焚凶年無時而為備未至朕之不德上纍三光震慓忉忉痛心疾首前代聖君博思咨諏雖降災咎輒有開匱反風之應今豫小子徒慘慘而已其令二千石理寃獄録輕繫禱五嶽四瀆及名山能興雲致雨者冀蒙不崇朝遍雨天下之報務加肅敬焉省刑詔五年三月孔子曰刑罰不中則人無所措手足今吏多不良擅行喜怒或案不以罪迫脅無辜致令自殺者一歲且多於斷獄甚非為人父母之意也有司其議糾舉之補官詔五年五月朕思遲直士側席異聞其先至者各以發憤吐悶略聞子大夫之志矣皆欲置於左右顧問省納建武詔書又曰堯試臣以職不直以言語筆札今外官多曠並可以補任禘祭賜錢詔七年八月書曰祖考來格明哲之祀豫末小子質又菲薄仰惟先帝蒸蒸之情前修禘祭以盡孝敬朕得識昭穆之序寄遠祖之思今年大禮復舉加以先帝之坐悲傷感懷樂以迎來哀以送往雖祭亡如在而空虛不知所裁庶或饗之豈亡克慎肅雍之臣辟公之相皆助朕之依依今賜公錢四十萬卿半之及百官執事各有差巡幸詔七年九月幸偃師東涉卷津進幸鄴車駕行秋稼觀收穫因涉郡界皆精騎輕行無它輜重不得輒修橋道遠離城郭遣吏逢迎刺探起居出入前後以為煩擾動務省約但患不能脫粟瓢飲耳所過欲令貧弱有利無違詔書興經學詔八年十一月五經剖判去聖彌遠章句遺辭乖疑難正恐先師微言將遂廢絶非所以重稽古求道真也其令羣儒選髙才生受學左氏榖梁春秋古文尚書毛詩以扶微學廣異義焉四科選舉詔八年十二月漢官儀云世祖中興甲寅詔書按此至章帝時申詔也方今選舉賢佞朱紫錯用丞相故事四科取士一曰德行髙妙志節清白二曰學通行修經中博士三曰明達法令足以決疑能案章覆問文任御史四曰剛毅多略遭事不惑明足照姦勇足決斷才任三輔令皆有孝悌亷公之行自今以後審四科辟召及刺史二千石察茂才尤異孝亷之吏務盡實核選擇英俊賢行亷潔平端於縣邑受試以職有非其人臨計過署不便習官事書疏不端正不如詔書有司奏罪名并正舉者募人就田詔元和元年二月此實建初九年八月始改元王者八政以食為本故古者急耕稼之業致耒耜之勤節用儲蓄以備凶災是以歲雖不登而人無飢色自牛疫以來榖食連少良由吏教未至刺史二千石不以為負其令郡國募人無田欲徙他界就肥饒者恣聽之到在所賜給公田為雇耕傭賃種餉貰與田器勿收租五歲除算三年其後欲還本鄉者勿禁理獄詔元年七月律云掠者唯得榜笞立又令丙捶長短有數自往者大獄巳來掠考多酷鉆鑽之屬慘苦無極念其痛毒怵然動心書曰鞭作官刑豈宜若此宜及秋冬理獄明為其禁改元元和詔朕道化不德吏政失和元元未喻抵罪於下寇賊爭心不息邊野邑屋不修永惟庶事思稽厥衷與凡百君子共𢎞斯道中心悠悠將何以寄其改建初九年為元和元年郡國中都官繫囚減死一等勿笞詣邊縣妻子自隨占著在所其犯殊死一切募下蠶室其女子宫繫囚鬼薪白粲以上皆減本罪一等輸司寇作亡命者贖各有差除妖言三屬禁錮詔元年十二月書云父不慈子不祗兄不友弟不恭不相及也往者妖言大獄所及廣遠一人犯罪禁至三屬莫得垂纓士宦王朝如有賢才而沒齒無用朕甚憐之非所謂與之更始也諸以前妖惡禁錮者一皆蠲除之以明棄咎之路但不得在宿衛而巳賜胎養榖詔二年正月令云人有産子者復無算三歲今諸懷􅗖者賜胎養榖人三斛復其夫勿算一歲著以為令又詔三公方春生養萬物莩甲宜助萌陽以育時物其令有司罪非殊死且勿案驗及吏人條書相告不得聽受冀以息事寧人敬奉天氣立秋如故夫俗吏矯飾外貌似是而非揆之人事則恱耳論之隂陽則傷化朕甚饜之甚苦之安靜之吏悃愊無華日計不足月計有餘如襄城令劉方吏人同聲謂之不煩雖未有他異斯亦殆近之矣間敕二千石各尚寬明而今富姦行賂於下貪吏枉法於上使有罪不論而無過被刑甚大逆也夫以苛為察以刻為明以輕為德以重為威四者或興則下有怨心吾詔書數下冠蓋接道而吏不加理人或失職其咎安在勉思舊令稱朕意焉增修羣祀詔二年二月今山川鬼神應典禮者尚未咸秩其議增修羣祀以祈豐年耕定陶賜帛詔二年二月東巡狩耕於定陶三老尊年也孝悌淑行也力田勤勞也國家甚休之其賜帛人一匹勉率農功巡狩大赦詔二年二月朕巡狩岱宗柴望山川告祠明堂以章先勳其二王之後先聖之胤東后蕃衛伯父伯兄仲叔季弟幼子童孫百僚從臣宗室衆子要荒四裔沙漠之北蔥嶺之西冒耐之類跋涉懸度陵踐阻絶駿奔郊畤咸來助祭祖宗功德延及朕躬豫一人空虛多疚纂承尊明盥洗享薦慙愧祗栗詩不云乎君子如祉亂庶遄巳厯數既從靈耀著明亦欲與士大夫同心自新其大赦天下諸犯罪不當得赦者皆除之復博奉髙嬴無出今年田租芻稿嘉瑞班恩詔二年五月乃者鳯凰黃龍鸞鳥比集七郡或一郡再見及白烏神雀甘露屢臻祖宗舊事或班恩施其賜天下吏爵人三級髙年鰥寡孤獨帛人一匹經曰無侮鰥寡惠此煢獨加賜河南女子百户牛酒令天下大酺五日賜公卿以下錢帛各有差及洛陽人當酺者布户一匹城外三户共一匹賜博士員弟子見在太學者布人三匹令郡國上明經者口十萬以上五人不滿十萬三人定報囚詔二年七月春秋於春每月書王者重三正慎三微也律十二月立春不以報囚月令冬至之後有順陽助生之文而無鞠獄斷刑之政朕咨訪儒雅稽之典籍以為王者生殺宜順時氣其定律無以十一月十二月報囚又班恩詔二年九月鳯凰黃龍所見亭部無出二年租賦加賜男子爵人二級先見者帛二十匹近者三匹太守三十匹令長十五匹丞尉半之詩云雖無德與汝式歌且舞他如賜爵故事稟給嬰兒詔三年正月蓋君人者視民如父母有慘怛之憂有忠和之教匍匐之救其嬰兒無父母親屬及有子不能養食者稟給如律告常山魏郡清河巨鹿平原東平郡太守相三年二月朕惟巡狩之制以宣聲教考同遐邇解釋怨結也今四國無政不用其良駕言出遊欲親知其劇易前祠園陵遂望祀華霍東柴岱宗為人祈福今將禮常山遂徂北土厯魏郡經平原升踐隄防詢訪耆老咸曰往者汴門未作深者成淵淺則泥塗追惟先帝勤人之德底績遠圖復禹𢎞業聖迹滂流至於海表不克堂構朕甚慚焉月令孟春善相丘陵土地所宜今肥田尚多未有墾闢其悉以賦貧民給與糧種務盡地力勿令遊手所過縣邑聽半入今年田租以勸農夫之勞敕侍御史司空方春所過無得有所伐殺車可以引避引避之騑馬可輟解輟解之詩云敦彼行葦牛羊勿踐履禮人君伐一草木不時謂之不孝俗知順人莫知順天其明稱朕意改元章和詔三年七月改元朕聞明君之德啓迪鴻化緝熙康乂光照六幽訖惟人面罔不率俾仁風翔於海表威霆行乎鬼區然後敬恭明祀膺五福之慶獲來儀之貺朕以不德受祖宗𢎞烈乃者鳯凰仍集麒麟並臻甘露宵降嘉榖滋生芝草之類歲月不絶朕夙夜祗畏上天無以彰於先功今改元和四年為章和元年秋令是月養衰老授几杖行麋粥飲食其賜髙年二人共布帛各一匹以為醴酪死罪囚犯法在丙子赦前而後捕繫者皆減死勿笞詣金城戍增修羣祀詔東觀書年元和二經稱秩元祀咸秩無文祭法功施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之以日月星辰民所瞻仰也山林川谷丘陵民所取財用也非此族也不在祀典傳曰聖王先成民而後致力於神又曰山川之神則水旱厲疫之災於是乎禜之日月星辰之神則雪霜風雨之不時於是乎禜之孝文十二年令曰比年五榖不登欲有以增諸神之祀王制曰山川神祗有不舉者為不敬今恐山川百神應典祀者尚未盡秩其議增修羣祀宜享祀者以祈豐年以致嘉福以蕃兆民詩不云乎懷柔百神及河喬嶽有年報功不私幸望豈嫌同辭其義一焉議厯詔元和二年章帝以太初厯謬錯召治厯編欣李梵等綜校其狀二月下詔於是四分施行而永元中賈逵為之論集朕聞古先聖王先天而天不違後天而奉天時河圖曰赤九會昌十世以光十一以興又曰九名之世帝行德封刻政朕以不德奉承大業夙夜祗畏不敢荒寧豫末小子託在於數終曷以續興崇𢎞祖宗拯濟元元尚書璇璣鈐曰述堯世放唐文帝命驗曰順堯考德題期立象且三五步驟優劣殊軌况乎頑陋無以克堪雖欲從之末由也巳每見圖書中心恧焉間者以來政治不得隂陽不和災異不息癘疫之氣流傷於牛農本不播夫庶徵休咎五事之應咸在朕躬信有闕矣將何以補之書曰惟先假王正厥事又曰歲二月東巡狩至岱宗柴望秩于山川遂覲東后叶時月正日祖堯岱宗同律度量考在璣衡以正厯象庶乎有益春秋保乾圖曰三百年斗厯改憲史官用太初鄧平術有餘分一在三百年之域行度轉差浸以謬錯璇璣不正文象不稽冬至之日日在斗二十二度而律以為牽牛中星先立春一日則四分數之立春日也以折獄斷大刑於氣巳忤用望平和厯時之義蓋亦遠矣今改行四分以遵於堯以順孔聖奉天之文冀百君子越有民同心敬授獲咸喜以明豫祖之遺功制定禮樂詔元和二年下詔博士曹褒乃上疏勸帝興作章下太常以為非褒所定不可許帝謂宜時刋立明帝復下詔河圖稱赤九會昌十世以光十一以興尚書璇璣鈐曰述堯理世平制禮樂放唐之文豫末小子託於數終曷以纘興崇𢎞祖宗仁濟元元帝命驗曰順堯考德題期立象且三五步驟優劣殊軌况豫頑陋無以克堪雖欲從之末由也巳每見圖書中心恧焉復詔朕以不德膺祖宗𢎞烈乃者鸞鳯仍集麟龍並臻甘露宵降嘉榖滋生赤草之類紀於史官朕夙夜祗畏上無以彰於先功下無以克稱靈物漢遭秦餘禮壞樂崩且因循故事未可觀省有知其説者各盡所能賜賈貴人詔貴人南陽人明德馬后姊子生章帝馬后母而養之建初四年太后崩下詔賈貴人者奉侍先帝劬勞帷幄建初之後以至親供養長樂宫昏定晨省夙夜匪懈今賜貴人赤綬安車一駟永巷宫人二百御府雜帛二萬匹大司農黃金千斤錢二萬朕既早離皇太后幸復承子道中心依依昊天罔極後漢紀廢太子慶立皇子肇詔章帝宋貴人生子慶為皇太子梁貴人生子肇竇皇后養為巳子遂譛貴人以祝詛罪飲藥死建初七年下詔廢慶而立肇是為和帝皇太子有失惑無常之性爰自孩乳至今益章恐襲其母凶惡之風不可以奉宗廟為天下主大義滅親况降退乎今廢慶為清河王皇子肇保育皇后承訓懷袵導達善性將成其器蓋庶子慈母尚有終身之恩豈若嫡后事正義明哉今以肇為太子賜東平王蒼書明帝臨終遺詔無起寢廟藏主於世祖廟更衣章帝即位太尉喜等奏明帝功德茂盛宜上尊號曰顯宗四時祫食世祖廟如文帝在髙廟之禮奏武德文始五行之舞帝賜王書朕夙夜伏思念先帝躬履九德對於八政勞謙克巳終始之度比於三宗誠有其美今迫遺詔誡不起寢廟臣子悲結僉以為雖於更衣猶宜有所宗之號以克配功德宗廟至重朕幼無知寤寐憂懼先帝每有著述典義之事未嘗不延問王以定厥中願王悉明處乃敢安之公卿議駁今皆并送及有可以持危扶顛宜勿隱思有所承太尉趙喜等奏禮祖有功宗有德孝明皇帝功德茂盛宜上尊號曰顯宗四時祫食於世祖廟如孝文皇帝在髙廟之禮奏武德文始五行之舞東平王蒼上奏昔者孝文廟樂曰昭德之舞孝武廟樂曰盛德之舞今皆祫食於髙廟昭德盛德之舞不進與髙廟同樂今孝明皇帝主在世祖廟當同樂盛德之樂無所施如自立廟當作舞樂者不當與世祖廟盛德之舞同名即不改作舞樂當進武德之舞臣愚戇鄙陋廟堂之論誠非所當聞所宜言陛下體純德之妙奮至謙之意猥歸美於載列之臣故不敢隱蔽愚請披露腹心誠知愚鄙之言不可以仰四門賔于之議伏惟陛下以至德當成康之隆天下乂安刑措之時也百姓盛歌元首之德股肱貞良庶事寧康臣欽仰聖化嘉美盛德危顛之備非所宜稱復報東平王蒼書蒼上言明帝主在世宗廟即不改作舞樂當進武德之舞復報之有司奏上尊號曰顯宗藏主更衣不敢違詔祫食世祖廟樂皆如王議以正月十八日始祠仰見榱桷俯視几筵眇眇小子哀懼戰悚無所奉承愛而勞之所望於王也並東觀漢記報東平王蒼書建初元年地震蒼上便宜其事留中帝報書丙寅所上便宜三事朕親自覽讀反覆數周心開目明曠然發矇間吏人奏事亦有此言但明智淺短或謂儻是復慮為非何者災異之降緣政而見今改元之後年飢人流此朕之不德感應所致又冬春旱甚所被尤廣雖內用克責而不知所定得王深䇿快然意解詩不云乎未見君子憂心忡忡既見君子我心則降思惟嘉謀以次奉行冀蒙福應彰報至德特賜王錢五百萬賜東平王蒼及琅邪王京書蒼與京明帝同母弟並隂皇后生建初三年帝享衛士於南宫因從皇太后周行掖庭池閣乃閟隂太后舊時器服愴然動容乃命留五時衣各一襲及常所御衣合五十篋餘悉分布各王主及子孫在京者特賜蒼及京書東觀漢記云永平三年則明帝也恐誤中大夫奉使親聞動靜嘉之何巳歲月騖過山陵浸遠孤心淒愴如何如何間享衛士於南宫因閲視舊時衣服聞於師曰其物存其人亡不言哀而哀自至信矣惟王孝友之德亦豈不然今送光烈皇后假紒帛巾各一及衣一篋可時奉瞻以慰凱風寒泉之思又欲令後生子孫得見先后衣服之製今魯國孔氏尚有仲尼車輿冠履明德盛者光靈遠也其光武皇帝器服中元二年巳賦諸國故不復送并遺宛馬一匹血從前髆上小孔中出嘗聞武帝歌天馬霑赤汗今親見其然也頃反虜尚屯將帥在外憂念遑遑未有間寧願王寶精神加供養苦言至戒望之如渴騖過漢紀作驚邁亦豈不然作豈不能哉奉作禮光靈遠也下云京都子孫亦各得一篋奉初學記作視東平四王勿名詔建初六年蒼上疏求朝帝許之特賜裝錢及器物充備下詔勿名禮云伯父歸寧乃國詩云叔父建爾元子敬之至也昔蕭相國加以不名優忠賢也况兼親尊者乎其沛濟南東平中山四王讚皆勿名賜東平王蒼手詔建初六年冬蒼上疏求朝明年正月帝許之三月大鴻臚奏遣諸王歸國帝特留蒼至八月飲酎畢復奏遣蒼帝許之乃賜蒼手詔車駕祖送流涕而訣復賜乘輿服御珍寶輿馬錢帛以億萬計骨肉天性誠不以遠近為親疏然數見顔色情重昔時念王久勞思得還休欲署大鴻臚奏不忍下筆顧授小黃門中心戀戀惻然不能言漢紀云久勞厯時東平王蒼哀䇿維建初八年三月巳卯皇帝曰咨王丕顯勤勞王室親受䇿命昭於前世出作蕃輔克慎明德率禮不越傳聞在下昊天不弔不報上仁俾屛余一人夙夜煢煢靡有所終今詔有司加賜鸞輅乘馬龍旗九旒虎賁百人奉送王行匪我憲王其孰離之魂而有靈保茲寵榮嗚呼哀哉貶阜陵王延詔延光武子初封淮陽王性驕奢坐作圖讖祭祀祝詛徙封阜陵建初中與子男魴造逆謀有司奏徵詣廷尉章帝下詔王前犯大逆罪惡尤深有同周之管蔡漢之淮南經有正義律有明刑先帝不忍親親之恩枉屈大法為王受愆羣下莫不惑焉今王曾莫悔悟悖心不移逆謀內潰自子魴發誠非本朝之所樂聞朕惻然傷心不忍致王於理今貶爵為阜陵侯食一縣獲斯辜者侯自取焉嗚呼誡哉復阜陵王延封爵詔延建初中貶侯章和元年行幸九江賜延書與車駕會壽春帝見延及妻子愍然傷之乃下詔以阜陵下濕徙都夀春昔周之爵封千有八百而姬姓居半者所以楨幹王室也朕南巡望淮海意在阜陵遂與侯相見侯志意衰落形體非故瞻省懷感以喜以悲今復侯為阜陵王增封四縣并前為五縣貶齊王晃利侯剛詔晃為光武兄伯升曾孫嗣封及弟剛與母太姬宗更相誣告章和元年有司奏免為庶人徙丹陽帝不忍下詔朕聞人君正屏有所不聽宗尊為小君宫衛周備出有輜軿之飾入有牖户之固殆不至如譛者之言晃剛愆乎至行濁乎大倫甫刑三千莫大不孝朕不忍置之於理其貶晃為蕪湖侯削剛户三千於戲小子不朂大道控於法理以墮宗緒其遣謁者收晃及太姬璽綬留舅許陽侯馬光詔明德太后弟馬防封潁陽侯光許陽侯太后崩建初八年有司奏防兄弟奢侈踰僣濁亂聖化悉免就國臨上路下詔舅氏一門俱就國封四時陵廟無助祭先后者朕甚傷之其令許侯思愆田廬有司勿復請以慰朕渭陽之情與舅馬光詔光字叔山瑗子封許陽侯位特進太僕坐與竇憲厚善被誣自殺朝廷鹿脯寧用飯也東觀漢記牟融録尚書事詔漢官儀司空牟融典職六年勤勞不怠其以融為太尉録尚書事趙喜進太傅詔東觀漢記章帝即位進喜太傅録尚書事行太尉事趙喜三葉在位為國元老其以喜為太傅封賈復隂興子孫詔建初元年後漢紀蓋褒德賞功興亡繼絶所以昭孝事親以旌善人故仁不遺德義不忘勞先王之令典也故特進膠東侯復佐命河北列在元功衛尉隂興忠貞愛國先帝休之今興子博復孫敏頑凶失道自陷刑以喪爵土朕甚憐之其封復子邯為膠東侯興子員為隱強侯追賜朱勃子榖詔勃詳後東觀漢記告平陵令丞縣人故雲陽令朱勃建武中以伏波將軍爵土不傳上書陳狀不顧罪戾懷旌善之志有烈士之風詩云無言不讎無德不報其賜以地見榖二千斛勃子若孫勿令遠詣闕謝賜鄭均詔均字仲虞東平任城人厯遷尚書數納忠言以病乞骸骨拜議郎元和元年詔告廬江太守東平相前在機密以病致仕守善貞固黃髮不怠又前安邑令毛義躬履遜讓比徵辭病淳潔之風東州稱仁書不云乎章厥有常吉哉其賜均義榖各千斛常以八月長吏存問賜羊酒顯茲異行褒江革詔革齊國臨淄人以巨孝稱拜諫議大夫謝病歸元和中天子思革至行制詔齊相諫議大夫江革前以病歸今起居何如夫孝百行之冠衆善之始也國家每惟志士未嘗不及革也縣以見榖千斛賜巨孝常以八月長吏存問致羊酒以終厥身如有不幸祠以中牢志士漢紀作忠孝之士羊一頭酒二斛終身以顯異行報朱暉詔暉字文季南陽宛人厯尚書令尺牘作明帝報郅惲並誤暉拜尚書僕射歲中遷太山太守上疏乞留中詔許之因上便宜陳密事深見嘉納詔報補公家之闕不纍清白之素斯善美之士也俗吏茍合阿意面從進無謇謇之志卻無退思之念患之甚久惟今所言適我願也生其勉之還北虜生口詔元和二年武威太守孟雲上言北虜以前既和親而南部復往鈔掠北單于謂漢欺之謀欲犯塞謂宜還南所掠生口以慰安其意章帝從太僕袁安議乃下詔昔玁狁獯粥之敵中國其所由來尚矣往者雖有和親之名終無絲髮之效墝埆之人屢嬰塗炭父戰於前子死於後弱女乘於亭障孤兒號於道路老母寡妻設虛祭飲泣淚想望歸魂於沙漠之表豈不哀哉傳曰江海所以能長百川者以其下之也少加屈下尚何足病况今與丐奴君臣分定辭順約明貢獻纍至豈宜違信自受其曲其敇度遼及領中郎將龎奮倍雇南部所得生口以還北虜其南部斬首獲生計功受賞如常科有司上章帝廟號樂舞奏制曰可孝章皇帝崇𢎞鴻業德化普洽垂意黎民留念稼穡文加殊俗武暢方表界惟人面無思不服巍巍蕩蕩莫與比隆周頌曰於穆清廟肅雍顯相請上尊號曰肅宗共進武德之舞並後漢書和帝諱肇章帝第四子梁貴人竇后養之立為皇太子在位十七年廟曰穆宗罷禁鹽鐵詔章和二年四月是年二月即位昔孝武皇帝致誅吳越故權收鹽鐵之利以奉師旅之費自中興以來胸奴未賔永平末年復修征伐先帝即位務休力役然猶深思遠慮安不忘危探觀舊典復收鹽鐵欲以防備不虞寧安邊境而吏多不良動失其便以違上意先帝恨之故遺戒郡國罷鹽鐵之禁縱民煮鑄入稅縣官如故事其申敇刺史二千石奉順聖旨勉𢎞德化布告天下使明知朕意薦功詔永元元年六月車騎將軍竇憲出塞討北胸奴大破之閏七月詔胸奴背叛為害久遠賴祖宗之靈師克有捷醜虜破碎遂掃厥庭役不再籍萬里清蕩非朕小子眇身所能克堪有司其案舊典告類薦功以章休烈行幸長安詔三年十月北狄破滅名王仍降西域諸國納質內附豈非祖宗迪哲重光之鴻烈歟寤寐歎息想望舊京其賜行所過二千石長吏以下及三老官屬錢帛各有差鰥寡孤獨篤癃貧不能存者粟人三斛紹封蕭曹詔三年十一月祠髙廟髙祖功臣蕭曹為首有傳世不絶之義曹相國後容城侯無嗣朕望長陵東門見二臣之壠循其遠節每有感焉忠義獲寵古今所同可遣使者以中牢祠大鴻臚求近親宜為嗣者須景風紹封以章厥功旱蝗免租詔四年十二月今年郡國秋稼為旱蝗所傷其什四以上勿收田租芻稿有不滿者以實除之又詔五年二月去年秋麥入少恐民食不足其上尤貧不能自給者户口人數往者郡國上貧民以衣履釡鬵為資而豪右得其饒利詔書實核欲有以益之而長吏不能躬親反更徵召會聚令失農作愁擾百姓若復有犯者二千石先坐舉吏詔五年三月選舉良才為政之本科别行能必由鄉曲而郡國舉吏不加簡擇故先帝明敕在所令試之以職乃得充選又德行尤異不須經職者别署狀上而宣布以來出入九年二千石曾不承奉恣心從好司𨽻刺史訖無糾察今新蒙赦令且復申敇後有犯者顯明其罰在位不以選舉為憂督察不以發覺為負非獨州郡也是以庶官多非其人下民被姦邪之傷由法不行故也舉賢良方正詔六年三月帝親臨䇿問選補郎吏朕以眇末奉承鴻烈隂陽不和水旱違度濟河之域凶饉流亡而未獲忠言至謀所以匡救之䇿寤寐永歎用思孔疚惟官人不得於上黎民不安於下有司不念寬和而競為苛刻覆案不急以妨民事甚非所以上當天心下濟元元也思得忠良之士以輔朕之不逮其令三公中二千石二千石內郡守相舉賢良方正能直言極諫之士各一人昭巖穴披幽隱遣詣公車朕將悉聽焉悉聽一作親覽選郎官詔七年四月辛亥日有蝕之所選郎出補長相元首不明化流無良政失於民謫見於天深惟庶事五教在寬是以舊典因孝亷之舉以求其人有司詳選郎官寬博有謀才任典城者三十人京師蝗詔八年九月蝗蟲之異殆不虛生萬方有罪在豫一人而言事者專咎自下非助我者也朕寤寐恫矜思弭憂釁昔楚嚴無災而懼成王出郊而反風將何以匡朕不逮以塞災變百僚師尹勉修厥職刺史二千石詳刑辟理寃虐恤鰥寡矜孤獨思惟致災興蝗之咎又詔九年六月今年秋稼為蝗蟲所傷皆勿收租更芻稿若有所損失以實除之餘當收租者亦半入其山林饒利陂池漁採以贍元元勿收假稅疏導溝瀆詔十年三月隄防溝渠所以順助地理通利壅塞今廢慢懈弛不以為負刺史二千石其隨宜疏導勿因緣妄發以為煩擾將顯行其罰禁厚葬詔十一年七月吏民踰僣厚死傷生是以舊令節之制度頃者貴戚近親百僚師尹莫肯率從有司不舉怠放日甚又商賈小民或忘法禁竒巧靡貨流積公行其在位犯者當先舉正市道小民但且申明憲綱勿因科令加虐羸弱歲災賜賑詔十二年三月比年不登百姓虛匱京師去冬無宿雪今春無澍雨黎民流離困於道路朕痛心疾首靡知所濟瞻仰昊天何辜今人三公朕之腹心而未獲承天安民之䇿數詔有司務擇良吏今猶不改競為苛暴侵愁小民以求虛名委任下吏假藝行邪是以令下而姦生禁至而詐起巧法祈律飾文增辭貨行於言罪成乎手朕甚病焉公卿不思助明好惡將何以救其咎罰咎罰既至復令災及小民若上下同心庶或有瘳其賜天下男子爵人二級三老孝弟力田三級民無名數及流民欲占者人一級鰥寡孤獨篤癃貧不能自存者粟人三斛又詔十三年八月荆州雨水九月詔荆州比歲不節今茲淫水為害餘雖頗登而多不均浹深惟四民農食之本慘然懷矜其令天下半入今年田租芻稿有宜以實除者如故事貧民假種食皆勿收責邊郡舉孝亷詔十三年十月幽并涼州户口率少邊役衆劇束修良吏進仕路狹撫接夷狄以人為本其令緣邊郡户口十萬以上歲舉孝亷一人不滿十萬二歲舉一人五萬以下三歲舉一人秋旱詔十六年七月旱今秋稼方穗而旱雲雨不霑疑吏行慘刻不宣恩澤妄拘無罪幽閉良善所致其一切囚徒於法疑者勿決以奉秋令方察煩苛之吏顯明其罰詔賜彭城王恭恭明帝子下邳王衍就國後病慌忽而太子卬有罪廢諸姬爭欲立子為嗣上書相告帝使恭正其嫡庶立子成為太子皇帝問彭城王始夏無恙蓋聞堯親九族萬邦協和書典之所美也下邳王被病沉滯之疾昏亂不明家用不寧姬妾適庶諸子分爭紛紛至今前太子卬頑凶失道陷於大辟是後諸子更相誣告迄今嫡嗣未知所定朕甚傷之惟王與下邳王恩義至親正此國嗣非王而誰禮重嫡庶之序春秋之義大居正孔子曰惟仁者能好人能惡人貴仁者所好惡得其中也太子國之儲嗣可不慎歟王其差次下邳諸子可為太子者上名將及景風拜授印綬焉東觀漢記留諸王詔永元十五年有司以日食隂盛奏遣諸王侯就國詔曰甲子之異責由一人諸王幼稚早離顧復弱冠相育常有蓼莪凱風之哀選懦之恩知非國典且復須留賜大鴻臚韋彪喪事詔彪永元元年卒詔尚書故大鴻臚韋彪在位無愆方欲録用奄忽而卒其賜錢二十萬布百匹榖三千斛封竇憲詔永元二年大將軍憲前歲出征克滅北狄朝加封賞固讓不受舅氏舊典並蒙爵土其封憲冠軍侯邑二萬户篤郾侯景汝陽侯瓌夏陽侯各六千户報太尉張酺永元九年皇太后竇氏崩和帝母梁貴人先被竇后譛死至是貴人姊嬺書陳其狀酺等共上依吕太后故事貶竇太后尊號勿葬敬陵上手報酺禮臣子無貶親之義今皇太后家雖不遵法度然常欲自減損奉事十年恩不忍虧案前世上官太后子奉終義從其勿復議漢紀同前後漢書手詔竇氏雖不遵法度而太后常自減損朕奉祀十年深惟大義禮臣子無貶尊上之文恩不忍離義不忍虧案前世上官太后亦無降黜其勿復議詔張酺酺疏乞骸骨上使中黃門問疾加以珍羞詔曰云云時酺子蕃以郎侍講上復詔蕃酺詣闕謝思起視事元首不明黎民困窮朕與君同其憂責豈可引退邪其勿復言漢紀敕張蕃此似面語隂陽不和萬人失所朝廷望公思帷得失與國同心而託病自潔求去重任誰當與吾同憂責者非有望於斷金也司徒固疾司空年老公其傴僂勿露所敕後漢書司徒劉方司空張奮同前漢紀隂陽不調朝廷望公以為憂託病自退潔己而巳誰當與朕同心者非所望於公也詔報張禹禹字伯達襄國人為太傅以定䇿功封安鄉侯終太尉禹永和中為太尉兼衛尉留守聞車駕當進幸江陵以為不宜冒險遠驛馬上諫詔報之祠謁既訖當南禮大江會得君奏臨漢回輿而旋封班超定遠侯詔超自永平十六年至永元三年以軍司馬平西域五十六國悉皆內屬下詔封之往者胸奴獨擅西域寇盜河西永平之末城門晝閉先帝深愍邊氓嬰罹冦害乃命將帥擊右地破白山臨蒲類取車師城郭諸國震懾響應遂開西域置都護而焉耆王舜舜子忠獨謀悖逆恃其險隘覆沒都護並及吏士先帝重元元之命憚兵役之興故使軍司馬班超安集于闐以西超遂踰蔥嶺迄縣度出入二十二年莫不賔從改立其王而綏其人不動中國不煩戎士得遠夷之和同異俗之心而致天誅蠲宿耻以報將士之讎司馬法曰賞不踰月欲人速覩為善之利也其封超為定遠侯邑千户東觀記曰其以漢中郡南鄭之西鄉户千封超為定遠侯鄧彪録尚書事詔應劭漢官儀一作册故太尉鄧彪元公之族三讓彌髙海內歸仁為羣賢首其以彪為太尉録尚書事百官總巳以聽制詔三公大鴻臚和帝追尊母梁貴人以恭懷皇后制詔封諡后父竦夫孝莫大於尊尊親親其義一也詩云父兮生我母兮鞠我撫我畜我長我育我顧我復我出入腹我欲報之德昊天罔極朕不敢興事覽於前世太宗中宗實有舊典追命外祖以篤親親其追封諡皇太后父竦為褒親愍侯比靈文順成侯魂而有靈嘉斯寵榮好爵顯服以慰母心並後漢書殤帝名隆和帝少子誕甫百餘日鄧太后臨朝在位一年雨水減服膳詔延平元年六月郡國三十七雨水自夏以來隂雨過節暖氣不效將有厥咎寤寐憂惶未知所由昔夏后惡衣服菲飲食孔子曰吾無間然今新遭大憂且歲節未和徹膳減衣庶有補焉其減太官導官尚方內署諸服御珍膳靡麗難成之物敕司𨽻校尉部刺史夫天降災戾應政而至間者郡國或有水災妨害秋稼朝廷惟咎憂惶悼懼而郡國欲獲豐穰虛飾之譽遂覆蔽災害多張墾田不揣流亡競增户口掩匿盜賊令姦惡無懲署用非次選舉乖宜貪苛慘毒延及平民刺史垂頭塞耳阿私下比不畏于天不愧于人假貸之恩不可數恃自今以後將糾其罰二千石長吏其各實核其所傷害為除田租芻稿張禹為太傅䇿應劭漢官儀張禹三世在位黃髮罔愆忠孝彌篤其以禹為太傅録尚書事徐防為太尉䇿應劭漢官儀司徒徐防以臺閣機密施政牧守其以防為太尉録尚書事百官總巳以聽東漢文紀卷二
