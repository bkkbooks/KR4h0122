body:
  text: 東漢文紀巻十二明梅鼎祚編梁商字伯夏安定烏氏人少以外戚拜郎中襲父封乘氏侯女為順帝后為執金吾拜大将軍辭國土疏商長女次姬選入掖庭為順帝貴人拜商侍中屯騎校尉陽嘉元年有司依舊奏加商位特進増國土商讓不受書十餘上帝敦諭之商又上書讓校尉乃許以特進就第祿命過厚受祖考多福又託日月末光以斗筲之材乗君子之器懼有負乗之累不守歴世之榮誠不如舊制與左賢同科議屯騎校尉書臣託椒房蒙被榮寵兼官二職非材可堪受寵戰慄驚懼惶戚不遑寜處披露赤誠敢遂狂狷謹上屯騎校尉印綬辭子不疑為步兵校尉書永建四年以商次子不疑為步兵校尉商上書上許之以為侍中奉車騎都尉不疑童孺猥處成人之位是以寝不安席食不甘味昔者晏平仲辭鄁殿以守其富公儀休不愛魚食以定其位臣雖不才亦願固福祿於盛世故敢布腹心觸罪歸誠並後漢紀上順帝寛獄疏商以后父為大将軍寵任謙柔虚巳而宦者反忌商永和四年中常侍張逵等共譛商及中常侍曺騰孟賁云圖議廢立帝不聽收逵等伏誅辭多連及商懼多侵枉乃上疏罪止坐者春秋之義功在元帥罪止首惡故賞不僭溢刑不淫濫五帝三王所以同致康乂也竊聞考中常侍張逵等辭語多所牽及大獄一起無辜者衆死囚久繫纎微成大非所以順迎和氣平政成化也宜早訖竟以止逮捕之煩論招降羌胡表永和五年南匈奴左部句龍王吾斯車鈕等背叛寇河西圍美稷度遼将軍馬續擊破之遂更屯聚中郎将陳龜以單于不能制下偪迫自殺商以羌胡新反黨衆初合難以兵服宜令續以恩信招降順帝從之商移續等書于是右賢王部抑鞮等詣續降匈奴寇畔自知罪極窮鳥困獸皆知救死况種類繁熾不可單盡今轉運日增三軍疲苦虚内給外非中國之利竊見度遼将軍馬續素有謀謨且典邉日久深曉兵要毎得續書與臣策合宜令續深溝髙壁以恩信招降宣示購賞明其期約如此則醜類可服國家無事矣移馬續等書中國安寜忘戰日久良騎野合交鋒接矢决勝當時戎狄之所長而中國之所短也彊弩乘城堅營固守以待其衰中國之所長而夷狄之所短也宜務先所長以觀其變設購開賞宣示反悔勿貪小功以亂大謀後漢書梁冀步兵校尉讓書東觀漢記列校之職上應天工下厭羣望實非愚臣所宜霍諝字叔智魏郡鄴人歴少府廷尉奏記梁商有誣諝舅宋光於大将軍商以為妄刋詔書坐繫洛陽獄掠考困極諝時年十五奏記商商髙諝才智即為奏原光罪将軍天覆厚恩愍舅光寃結前者温教許為平議雖未下吏斷决其事巳蒙神明顧省之聽皇天后土實聞徳音竊獨踴躍私自慶幸諝聞春秋之義原情定過赦事誅意故許止雖弑君而不罪趙盾以縱賊而見書此仲尼所以垂王法漢世所宜遵前脩也傳曰人心不同譬若其面斯盖謂大小窳隆醜美之形至於鼻目衆竅毛髪之狀未有不然者也情之異者剛柔舒急倨敬之間至於趨利避害畏死樂生亦復均也諝與光骨肉義有相隠言其寃濫未必可諒且以人情平論其理光衣冠子孫徑路平易位極州郡日望徵辟亦無瑕穢纎芥之累無故刋定詔書欲以何名就有所疑當求其便安豈有觸冐死禍以解細微譬猶療飢於附子止渴於鴆毒未入腸胃巳絶咽喉豈可為哉昔東海孝婦見枉不辜幽靈感格天應枯旱光之所坐情既可原守闕連年而終不見理吁嗟紫宫之門泣血兩觀之下傷和致灾為害滋甚凡事更赦令不應復案夫以罪刑明白尚蒙天恩豈有寃謗無徵反不得理是為刑宥正罪戮加誣侵也不偏不黨其若是乎明将軍徳盛位尊人臣無二言行動天地舉措移陰陽誠能留神沛然曉察必有于公髙門之福和氣立應天下幸甚同前漢紀諝聞春秋之義原情定罪傳曰人心不同其若面焉斯盖謂其天下窳隆廣狹髙卑之形耳至於鼻從目横眉在眼上未有不然者人心異者剛柔舒急倨敬之間至於趨利避害畏死樂生亦復同也諝與光骨肉之親義有相隠言光寃結未有可信請以人情平之光衣冠子孫徑路平易位極州郡日望徵辟亦無瑕穢纎芥之累無故刋定詔書欲何救解就有所疑當以道理求便安能觸冐死禍以解微細譬諸附子療飢酖毒止渇未入腹胃咽喉巳絶豈可為哉光不定制書情既可原臺閣執事知而不治吁嗟紫宫之門泣血兩觀之下傷和致灾為害滋甚明将軍徳盛位尊人臣無二言行動天地舉措移陰陽誠肯留神省察沛然信理必有于公髙門之福和氣立應天下幸甚虞詡字升卿陳國武平人為朝歌長武都太守破冦羌著名歴尚書令上順帝自訟書詡永建元年為司𨽻校尉數月間多所論劾百官側目三公奏詡盛夏拘繫無辜為吏人患詡上書自訟帝為免司空陶敦法禁者俗之隄防刑罰者人之銜轡今州曰任郡郡曰任縣更相委逺百姓怨窮以茍容為賢盡節為愚臣所發舉臧罪非一二府恐為臣所奏遂加誣罪臣将從史魚死即以尸諌耳劾中常侍張防奏防特用權勢毎請託受取詡輒案之屢寝不報詡自繫廷尉上奏坐輸左校以宦者孫程等申救赦出防徙邉昔孝安皇帝任用樊豐遂交亂嫡統幾亡社稷今者張防復弄威柄國家之禍将重至矣臣不忍與防同朝謹自繫以聞無令臣襲楊震之跡諌止義錢疏詡徵拜議郎遷尚書僕射是時長史二千石聽百姓譴發輸贖號義錢託為貧人儲因以聚歛詡上疏自此而止元年以來貧百姓章言長吏受取百萬以上者匈匈不絶譴發吏人至數千萬而三公刺史少所舉奏尋永平章和中州郡以走卒錢給貸貧人司空劾案州及郡縣皆坐免黜今宜遵前典蠲除權制上言臺郎臺郎顯職仕之通階今或一郡七八或一州無人宜令均平以厭天下之望薦左雄疏雄永建初徵拜議郎數言事詡以雄有忠公節疏薦雄為尚書臣見方今公卿以下類多拱默以樹恩為賢盡節為愚至相戒曰白璧不可為容容多後福伏見議郎左雄數上封事至引陛下身遭難戹以為警戒實有王臣蹇蹇之節周公謨成王之風宜擢在喉舌之官必有匡弼之益請復隴西三郡疏建寜元年隴西種羌反校尉馬賢擊破之種人皆降至四年凉州無事詡上疏請復置三郡從之令徙者還縣臣聞子孫以奉祖為孝君上以安民為明此髙宗周宣所以上配湯武也禹貢雍州之域厥田惟上且沃野千里榖稼殷積又有龜兹鹽池以為民利水草豐美土宜産牧牛馬銜尾羣羊塞道北阻山河乗阸據險因渠以溉水舂河漕用功省少而軍糧饒足故孝武皇帝及光武築朔方開西河置上郡皆為此也而遭元元無妄之災衆羌内潰郡縣兵荒二十餘年夫棄沃壤之饒損自然之財不可謂利離河山之阻守無險之處難以為固今三郡未復園陵單外而公卿選懦容頭過身張解設難但計所費不圗其安宜開聖徳考行所長諫增賦南蠻奏永和元年武陵太守上書以蠻夷率服可比漢人增其租賦詡時為尚書令奏諌不從其冬澧中漊中蠻果爭貢布反自古聖王不臣異俗非徳不能及威不能加知其獸心貪婪難率以禮是故羈縻而綏撫之附則受而不逆叛則棄而不追先帝舊典貢税多少所繇來久矣今猥增之必有怨叛計其所得不償所費必有後悔寜陽主簿訴縣令書簿詣闕訴其縣令之枉積六七嵗不省乃上書順帝大怒持章示尚書劾以大逆詡駁之帝納詡言笞之而巳臣為陛下子陛下為臣父臣章百上終不見省臣豈可北詣單于以告怨乎虞詡駁尚書劾寜陽主簿主簿所訟乃君父之怨百上不達是有司之過愚憃之人不足多誅左雄字伯豪南陽湼陽人拜議郎歴尚書令章表奏議多所匡肅上順帝陳吏事疏雄再遷尚書令上䟽陳事帝感其言申下有司考其真偽詳所施行臣聞柔逺和邇莫大寜人寜人之務莫重用賢用賢之道必存考黜是以臯陶對禹貴在知人安人則恵黎民懷之分伯建侯代位親民民用和穆禮樂以興故詩云有渰淒淒興雨祁祁雨我公田遂及我私及幽厲昏亂不自為政褒豔用權七子黨進賢愚錯緒深谷為陵故其詩曰四國無政不用其良又曰哀今之人胡為虺蜴言人畏吏如虺蜴也宗周既滅六國并秦坑儒冺典剗革五等更立郡縣縣設令長郡置守尉什伍相司封豕其民大漢受命雖未復古然克慎庶官蠲苛救敝悦以濟難撫而循之至於文景天下康乂誠由𤣥靖寛柔克慎官人故也降及宣帝興於仄陋綜覈名實知時所病刺史守相輙親引見考察言行信賞必罰帝乃歎曰民所以安而無怨者政平吏良也與我共此者其惟良二千石乎以為吏數變易則下不安業久於其事則民服教化其有政理者輒以璽書勉勵增秩賜金或爵至闗内侯公卿缺則以次用之是以吏稱其職人安其業漢氏良吏于兹為盛故能降來儀之瑞建中興之功漢初至今三百餘載俗浸彫敝巧偽滋萌下飭其詐上肆其殘典城百里轉動無常各懷一切莫慮長久謂殺害不辜為威風聚歛整辦為賢能以理已安民為劣弱以奉法循理為不化髠鉗之戮生於睚眦覆尸之禍成于喜怒視民如冦讎税之如豺虎監司項背相望與同疾疢見非不舉聞惡不除觀政於亭傳責成於期月言善不稱徳論功不據實虚誕者獲譽拘檢者離毁或因罪而引髙或色斯以求名州宰不覆競共辟召踊躍升騰超等踰匹或考奏捕案而亡不受罪㑹赦行賂復見洗滌朱紫同色清濁不分故使姦猾枉濫輕忽去就拜除如流缺動百數鄉官部吏職卑祿薄車馬衣服一出于民㢘者取足貪者充家特選横調紛紛不絶送迎煩費損政傷民和氣未洽灾𤯝不消咎皆在此今之墨綬猶古之諸侯拜爵王庭輿服有庸而齊于匹䜿叛命避負非所以崇憲明理恵育元元也臣愚以為守相長吏恵和有顯效者可就増秩勿使移徙非父母喪不得去官其不從法禁不式王命錮之終身雖㑹赦令不得齒列若被劾奏亡不就法者徙家邉郡以懲其後鄉部親民之吏皆用儒生清白任從政者寛其負筭増其秩祿吏職滿嵗宰府州郡乃得辟舉如此威福之路塞虚偽之端絶送迎之役損賦歛之源息循理之吏得成其化率土之民各寜其所追配文宣中興之軌流光垂祚永世不刋論冦賊疏永建時青冀揚州盗賊並起海内擾亂雄與僕射郭䖍共上疏不省冦賊連年死亡大半一人犯法舉宗羣亡宜及其尚微開令改悔若告黨與者聴除其罪能誅斬者明加其賞上言孝㢘限年自是牧守莫敢輕舉迄于永熹選舉得人郡國孝㢘古之貢士出則宰民宣協風教若其面墻則無所施用孔子曰四十而不惑禮稱強仕請自今孝㢘年不滿四十不得察舉皆先詣公府諸生試家法文吏課牋奏副之端門練其虚實以觀異能以美風俗有不承科令者正其罪法若有茂才異行自可不拘年齒諌封爵封事順帝初廢為濟陰王乳母宋娥與黄門孫程等共議立帝遂封娥為山陽君又封大将軍梁商子冀襄邑侯雄上疏不聽復諌奏㑹復有地震緱氏山崩之異雄復疏諌帝竟封娥以交遘後失爵夫裂土封侯王制所重髙皇帝約非劉氏不王非有功不侯孝安皇帝封江京王聖等遂致地震之異永建二年封陰謀之功又有日食之變數術之士咸歸咎于封爵今青州饑虚盗賊未息民有乏絶上求禀貸陛下乾乾勞思以濟民為務宜循古法寜静無為以求天意以消灾異誠不宜追録小恩虧失大典復諌臣聞人君莫不好忠正而惡讒䛕然而歴世之患莫不以忠正得罪讒䛕蒙倖者盖聽忠難從諛易也夫刑罪人情之所甚惡貴寵人情之所甚欲是以時俗為忠者少而習諛者多故令人主數聞其美稀知其過迷而不悟至于危亡臣伏見詔書顧念阿母舊徳宿恩欲特加顯賞案尚書故事無乳母爵邑之制唯先帝時阿母王聖為野王君聖造生讒賊廢立之禍生為天下所咀嚼死為海内所歡快桀紂貴為天子而庸僕羞與為比者以其無義也夷齊賤為匹夫而王侯爭與為伍者以其有徳也今阿母躬蹈約儉以身率下羣僚蒸庶莫不向風而與王聖並同爵號懼違本操失其常願臣愚以為凡人之心理不相逺其所不安古今一也百姓深懲王聖傾覆之禍民萌之命危於累卵常懼時世復有此類怵惕之念未離於心恐懼之言未絶於口乞如前議歳以千萬給奉阿母内足以盡恩愛之歡外可不為吏民所怪梁冀之封事非機急宜過災戹之運然後平議可否又疏諌先帝封野王君漢陽地震今封山陽君而京城復震專政在陰其災尤大臣前後瞽言封爵至重王者可私人以財不可以官宜還阿母之封以塞災異今冀巳髙讓山陽君亦宜崇其本節上言撲罰九卿是時大司農劉據以職事被譴召詣尚書傳呼促迫加以捶撲雄上言帝從改之九卿位亞三事班在大臣行有佩玉之節動有庠序之儀孝明皇帝始有撲罰皆非古典段恭理龎參疏參永建時為太尉錄尚書事以忠直忤㫖為司𨽻所按稱疾不得㑹茂才孝㢘上計掾廣陵段恭因㑹上疏詔遣視參疾伏見道路行人農夫織婦皆曰太尉龎參竭忠盡節徒以直道不能曲心孤立羣邪之間自處中傷之地臣猶冀在陛下之世當蒙安全而復以讒佞傷毁忠正此天地之大禁人主之至誡昔白起賜死諸侯酌酒相賀季子來歸魯人喜其紓難夫國以賢化君以忠安今天下咸欣陛下有此忠賢願卒寵任以安社稷張綱字文紀晧子為御史忤梁氏出為廣陵太守賊皆散降上順帝諌寵宦官書帝委縱宦官時綱辟髙第為御史常感激退而土書不省詩曰不愆不忘率由舊章尋大漢初隆及中興之世文明二帝徳化尤盛觀其理為易循易見但恭儉守節約身尚徳而巳中官常侍不過兩人近倖賞賜裁滿數金惜費重人故家給人足夷狄聞中國優冨任信道徳所以姦謀自消而和氣感應而頃者以來不遵舊典無功小人皆有官爵冨之驕之而復害之非愛人重器承天順道者也伏願陛下少留聖思割損左右以奉天心劾梁氏奏漢安元帝綱以八使狥行風俗埋車輪於洛陽都亭曰豺狼當道安問狐狸遂奏劾冀等時冀妹梁后方有寵言不用大将軍冀河南尹不疑蒙外戚之援荷國厚恩以芻蕘之資居阿衡之任不能敷揚五教翼讃日月而專為封豕長蛇肆其貪叨甘心好貨縱恣無底多樹諂諛以害忠良誠天威所不赦大辟所宜加也謹條其無君之心十五事斯皆臣子所切齒者也胡廣字伯始南郡華容人舉孝廉為尚書郎歴遷太尉拜太傅著百官箴詩賦銘頌箴弔諸解詁二十二篇上順帝諌立后疏帝欲立后而貴人有寵者四人議欲探籌以神定選廣為尚書僕射與尚書郭䖍史敞疏諌從之以梁貴人良家子立為后竊見詔書以立后事大謙不自專欲假之籌策决疑靈神篇籍所記祖宗典故未嘗有也恃神任筮既不必當賢就值其人猶非徳選夫岐嶷形於自然俔天必有異表宜參良家簡求有徳徳同以年年鈞以貎稽之典經斷之聖慮政令猶汗往而不反詔文一下形之四方臣職在拾遺憂深責重是以焦心冐昧陳聞駁尚書令左雄察舉限年書雄議改察舉之制限年四十以上儒者試經學文吏試章奏廣復與敞䖍上書駁之不從臣聞君以兼覽博照為徳臣以獻可替否為忠書載稽疑謀及卿士詩美先人詢於芻蕘國有大政必議之於前訓諮之於故老是以慮無失策舉無過事竊見尚書令左雄議郡舉孝廉皆限年四十以上詣生試章句文吏試牋奏明詔既許復令臣等得與相參竊惟王命之重載在篇典當令縣於日月固於金石遺則百王施之萬世詩云天難諶斯不易惟王可不慎與盖選舉因才無拘定制六奇之策不出經學鄭阿之政非必章奏甘奇顯用年乖強仕終賈揚聲亦在弱冠漢承周秦兼覽殷夏祖徳師經參雜覇軌聖主賢臣世以致理貢舉之制莫或囘革今以一臣之言剗戾舊章便利未明衆心不厭矯枉變常政之所重而不訪台司不謀卿士若事下之後議者剝異異之則朝失其便同之則王言巳行臣愚以為可宣下百官參其同異然後覽擇勝否詳採厥衷敢以瞽言冐干天禁惟陛下納焉百官箴叙太平御覽箴諌之興所由尚矣聖君求之於下忠臣納之於上故虞書曰予違汝弼汝無面從退有後言墨子著書稱夏箴之辭古文苑載百官箴序云初揚雄依虞箴作十二州二十五官箴其九箴亡闕後涿郡崔駰及子瑗又臨邑侯劉騊駼増補十六篇廣復繼作四篇文甚典美乃悉撰次首目為之解釋名曰百官箴凡四十八篇鼎按此范曄後漢書胡廣傳言廣所著箴之意非序也又有冠此于揚雄諸箴題之曰百官箴亦非侍中箴白帖皇矣聖上神居天處勤求俊良是弼是輔匪懈於位庶工以序昔在周文創徳西隣朂聞上帝賴兹四臣辛尹是訪八虞是詢濟濟多士乂用有勲文公欽若越興周道亦惟先正克慎左右常伯常任寔為政首降及厲王不祗不恪䁥彼宗夷用肆其虐惟敗天命冦戎並作圯墜宗緒寝廟靡託無曰我賢不選至親無曰我仁安用嬖人籍閎飾顔穢我神武鄧通擅鑄不終厥後中書竊命石𢎞作旤髙安㫁袂哀用無主侍中司中敢告規矩邉都尉箴太平御覽巍巍上聖光被八垠矧惟内面㒺不來賓季末陵遲王澤壅隔戎狄作難鬼方騷逖桓桓猛将是攘是闢殷宗周宣用顯其績大漢龍興念存治平蕩蕩率土來同門屛守撫其民尉典其戎五才竝用文武程功陵令箴太平御覽昔在黄帝葬野衣薪禮極哀闕不樹不封瓦棺暨周聚夏咸謂壞不毁膚賄不害生是謂皇極百王此經故厚不可使王薄不可王孫乃眷西顧爰短孝文陵臣司墓敢告守之印衣銘白帖明明上皇旌以命服紆朱懷金為光為飾邁種其澤撫寜四國宣慈恵和柔嘉維則克厭帝心膺兹多福登位歴夀子孫千億笥銘休矣斯笥凡器為式受相君子承此印紱帝命所賚用褒令徳佩以自修服以自敕忠肅恭懿鮮不為則靡悔靡吝神人致福古文苑徵士法髙卿碑蓺文類聚言滿天下發成篇章行充宇宙動為儀表四海英儒履義君子企望來臻者不可勝紀也翻然鳳舉匿燿逺遯名不可得而聞身難可得而覩為堯舜所知不飲洗耳之水超越青雲之上徳踰巢許之右所謂逃名而名我隨避聲而聲我追者巳揆君分量輕寵傲俗乃百世之師也其辭曰邈𤣥徳膺懿資𢎞聖典研道機彪童蒙作世師辭皇命確不移亞洪崖超由夷垂英聲揚景暉弔夷齊文蓺文類聚遭亡辛之昏虐時繽紛以蕪穢恥降志於汙君溷雷同於榮勢抗浮雲之妙志遂蟬蜕以偕逝徼六軍於河渚叩王馬而慮計雖忠情而指尤匪天命之所謂賴尚父之戒慎鎮左右而不害王隆小學漢官篇注序後漢書注前安帝時越騎校尉劉千秋校書東觀好事者樊長孫與書曰漢家禮儀叔孫通等所草創皆隨律令在理官藏于几閣無紀録者久令二代之業闇而不彰誠宜撰次依擬周禮定位分職各有條序令人無愚智入朝不惑君以公族元老正丁其任焉可以已劉君甚然其言與邑子通人郎中張平子參議未定而劉君遷為宗正衛尉平子為尚書郎太史令各務其職未暇恤也至順帝時平子為侍中典校書方作周官解説乃欲以漢次述漢事㑹復遷河間相遂莫能立也述作之功獨不易矣既感斯言顧見故新汲令王文山小學為漢官篇略道公卿外内之職旁及四夷博物條暢多所發明足以知舊制儀品盖法有成易而道有因革是以聊集所宜為作詁解各隨其下綴續後事令世施行庶明厥㫖廣前後憤盈之念増助來哲多聞之覽焉史敞等薦胡廣為陳留郡書時陳留郡闕職尚書史敞等薦廣臣聞徳以旌賢爵以建事明試以功典謨所美五服五章天秩所作是以臣竭其忠君豐其寵舉不失徳下忘其死竊見尚書僕射胡廣體真履規謙虚温雅博物洽聞探賾窮理六經典奥舊章憲式無所不覽柔而不犯文而有禮忠貞之性憂公如家不矜其能不伐其勞翼翼周慎行靡玷漏密勿夙夜十有餘年心不外顧志不茍進臣等竊以為廣在尚書劬勞日久後母年老既蒙簡照宜試職千里匡寜方國陳留近郡今太守任缺廣才略深茂堪能撥煩願以參選紀綱頽俗使束脩守善有所勸仰郎顗字雅光北海安丘人州郡辟召舉有道方正及後公車徵並不行為同縣凶人孫禮所殺上順帝論災異章顗少傳父京氏易晝妍精義夜占象度順帝時災異屢見陽嘉二年公車徵顗乃詣闕拜章書奏帝復使對尚書臣聞天垂妖象地見災符所以譴告人主責躬脩徳使正機平衡流化興政也易内傳曰凡災異所生各以其政變之則除消之亦除伏惟陛下躬日昃之聽温三省之勤思過念咎務消祗悔方今時俗奢佚淺恩薄義夫救奢必於儉約極薄無若敦厚安上理人莫善於禮脩禮遵約盖惟上興革文變薄事不在下故周南之徳闗睢政本本立道生風行草從澄其源者流清溷其本者末濁天地之道其猶鼔籥以虚為徳自近及逺者也伏見往年以來園陵數災炎光熾猛驚動神靈易天人應曰君子不思遵利兹謂無澤厥灾孽火燒其宫又曰君髙臺府犯陰侵陽厥灾火又曰上不儉下不節炎火並作燒君室自頃繕理西苑修復太學宫殿官府多所搆飾昔盤庚遷殷去奢即儉夏后卑室盡力致美又魯人為長府閔子騫曰仍舊貫何必改作臣愚以為諸所繕脩事可省減禀䘏貧人賑贍孤寡此天之意也人之慶也仁之本也儉之要也焉有應天養人為仁為儉而不降福者哉土者地祗陰性澄静宜以施化之時敬而勿擾竊見正月以來陰闇連日易内傳曰久陰不雨亂氣也蒙之比也蒙者君臣上下相冐亂也又曰賢徳不用厥異常陰夫賢者化之本雲者雨之具也得賢而不用猶久陰而不雨也又頃前數日寒過其節氷既解釋還復凝合夫寒往則暑來暑往則寒來此言日月相推寒暑相避以成物也今立春之後火卦用事當温而寒違反時節由功賞不至而刑罰必加也宜須立秋順氣行罰臣伏案飛候參察衆政以為立夏之後當有震裂涌水之害又比熒惑失度盈縮往來渉歴輿鬼環繞軒轅火精南方夏之政也政有失禮不從夏令則熒惑失行正月三日至乎九日三公卦也三公上應台階下同元首政失其道則寒陰反節節彼南山詠自周詩股肱良哉著於虞典而今之在位競託髙虚納累鍾之奉忘天下之憂棲遲偃仰寝疾自逸被策文得賜錢即復起矣何疾之易而愈之速以此消伏灾𤯝興致升平其可得乎今選舉牧守委任三府長吏不良既咎州郡州郡有失豈得不歸責舉者而陛下崇之彌優自下慢事愈甚所謂大綱疎小綱數三公非臣之仇臣非狂夫之作所謂發憤忘食懇懇不巳者誠念朝廷欲致興平非不能面譽也臣生長草野不曉禁忌披露肝膽書不擇言伏鑕鼎鑊死不敢恨謹詣闕奉章伏待重誅對尚書七事臣聞明王聖主好聞其過忠臣孝子言無隠情臣僃生人倫視聽之類而禀性愚戇不識忌諱故出死忘命懇懇重言誠欲陛下修乾坤之徳開日月之明披圖籍按經典覽帝王之務識先後之政如有闕遺退而自改本文武之業擬堯舜之道禳灾延慶號令天下此誠臣顗區區之願夙夜夢寐盡心所計謹條序前章暢其㫖趣條便宜七事具如狀對一事陵園至重聖神攸馮而灾火炎赫迫近寝殿魂而有靈猶将驚動尋宫殿官府近始永平嵗時未積便更修造又西苑之設禽畜是處離房别觀本不常居而皆務精土木營建無巳消功單賄巨億為計易内傳曰人君奢侈多飾宫室其時旱其灾火是故魯僖遭旱修政自敕下鐘鼓之縣休繕治之官雖則不寜而時雨自降由此言之天之應人敏於影響今月十七日戊午徵日也日加申風從寅來丑時而止丑寅申皆徵也不有火灾必當為旱願陛下較計繕修之費永念百姓之勞罷将作之官減彫文之飾捐庖厨之饌退宴私之樂易中孚傳曰陽感天不旋日如是則景雲降集𤯝沴息矣二事去年以來兑卦用事類多不效易傳曰有貎無實佞人也有實無貎道人也寒温為實清濁為貎今三公皆令色足恭外厲内荏以虚事上無佐國之實故清濁效而寒温不效也是以隂寒侵犯消息占曰日乗則有妖風日蒙則有地裂如是三年則致日食陰侵其陽漸積所致立春前後温氣應節者詔令寛也其後復寒者無寛之實也夫十室之邑必有忠信率土之人豈無貞賢未聞朝廷有所賞拔非所以求善贊務𢎞濟元元宜採納良臣以助聖化三事臣聞天道不逺三五復反今年少陽之嵗法當乗起恐後年以往将遂驚動涉歴天門灾成戊巳今春當旱夏必有水臣以六日七分候之可知夫灾𤯝之來緣類而應行有玷缺則氣逆於天精感變出以戒人君王者之義時有不登則損滋徹膳數年以來榖收稍减家貧户饉嵗不如昔百姓不足君誰與足水旱之灾雖尚未至然君子逺覽防微慮萌老子曰人之饑也以其上食税之多也故孝文皇帝綈袍革舄木器無文約身薄賦時致升平今陛下聖徳中興宜遵前典惟節惟約天下幸甚易曰天道無親常與善人是故髙宗以享福宋景以延年四事臣竊見皇子未立儲宫無主仰觀天文太子不明熒惑以去年春分後十六日在婁五度推步三統熒惑今當在翼九度今反在栁三度則不及五十餘度去年八月二十四日戊辰熒惑歴輿鬼東入軒轅出后星北東去四度北旋復還軒轅者後宫也熒惑者至陽之精也天之使也而出入軒轅繞還往來易曰天垂象見吉凶其意昭然可見矣禮天子一娶九女嫡媵畢具今宫人侍御動以千計或生而幽隔人道不通欝積之氣上感皇天故遣熒惑入軒轅理人倫垂象見異以悟主上昔武王下車出傾宫之女表商容之閭以理人倫以表賢徳故天授以聖子成王是也今陛下多積宫人以違天意故皇𦙍多夭嗣體莫寄詩云敬天之怒不敢戲豫方今之福莫若廣嗣廣嗣之術可不深思宜簡出宫女恣其姻嫁則天自降福子孫千億惟陛下丁寜再三留神於此左右貴倖亦宜惟臣之言以悟陛下盖善言古者合於今善言天者合於人願訪問百僚有違臣言者臣當受茍言之罪五事臣竊見去年閏十月十七日巳丑夜有白氣從西方天苑趨左足入玉井數月乃滅春秋曰有星孛于大辰大辰者何大火也大火為大辰罰又為大辰北極亦為大辰所以孛一宿而連三宿者言北辰王者之宫也凡中宫無節政教亂逆威武衰微則此三星以應之也罰者白虎其宿主兵其國趙魏變見西方亦應三輔凡金氣為變發在秋節臣恐立秋以後趙魏闗西将有羌冦畔戾之患宜豫宣告諸郡使敬授人時輕徭役薄賦斂勿妄繕起堅倉獄僃守衛囘選賢能以鎮撫之金精之變責歸上司宜以五月丙午遣太尉服干戚建井旟書玉版之策引白氣之異於西郊責躬求愆謝咎皇天消滅妖氣盖以火勝金轉禍為福也謝承後漢書金精之變太尉所掌宜責以菑異六事臣竊見今月十四日乙卯巳時白虹貫日凡日傍氣色白而純者名為虹貫日中者侵太陽也見於春者政變常也方今中官外司各各考事其所考者或非急務又恭陵火灾主名未立多所收捕僃經考毒尋火為天戒以悟人君可順而不可違可敬而不可慢陛下宜恭己内省以備後灾凡諸考案并須立秋又易傳曰公能其事序賢進士後必有喜反之則白虹貫日以甲乙見者則譴在中台自司徒居位陰陽多謬久無虚己進賢之策天下興議異人同咨且立春以來金氣再見金能勝木必有兵氣宜黜司徒以應天意陛下不早攘之将負臣言遺患百姓七事臣伏惟漢興以來三百三十九嵗於詩三基髙祖起亥仲二年今在戌仲十年詩汜歴樞曰卯酉為革政午亥為革命神在天門出入候聽言神在戌亥司候帝王興衰得失厥善則昌厥惡則亡於易雄雌秘歴今值困乏凡九二困者衆小人欲共困害君子也經曰困而不失其所其唯君子乎唯獨賢聖之君遭困遇險能致命遂志不去其道陛下乃者潛龍養徳幽隠屈戹即位之元紫宫驚動歴運之㑹時氣已應然猶恐妖祥未盡君子思患而豫防之臣以為戌仲已竟來年入季文帝改法除肉刑之罪至今適三百載宜因斯際大蠲法令官名稱號輿服器械事有所更變大為小去奢就儉機衡之政除煩為簡改元更始招求幽隠舉方正徵有道博採異謀開不諱之路臣陳引際㑹恐犯忌諱書不盡言未敢究暢臺詰郎顗對云白虹貫日政變常也朝廷率由舊章何所變易而言變常又言當大蠲法令革易官號或云變常以致灾或改舊以除異何也又陽嘉初建復欲改元據何經典其以實對對臺詰方春東作布徳之元陽氣開發養導萬物王者因天視聽奉順時氣宜務崇温柔遵其行令而今立春之後考事不息秋冬之政行乎春夏故白虹春見掩蔽日曜凡邪氣乗陽則虹蜺在日斯皆臣下執事刻急所致殆非朝廷優寛之本此其變常之咎也又今選舉皆歸三司非有周召之才而當則哲之重毎有選用輒參之掾屬公府門巷賔客填集送去迎來財貨無已其當遷者競相薦謁各遣子弟充塞道路開長姦門興致浮偽非所謂率由舊章也尚書職在機衡宫禁嚴密私曲之意差不得通偏黨之私或無所用選舉之任不如還在機密臣誠愚戇不知折中斯固逺近之論當今之宜又孔子曰漢三百載計歴改憲三百四嵗為一徳五徳千五百二十嵗五行更用王者隨天譬猶自春徂夏改靑服絳者也自文帝省刑適三百年而輕微之禁漸以殷積王者之法譬猶江河當使易避而難犯也故易曰易則易知簡則易從易簡而天下之理得矣今去奢即儉以先天下改易名號隨事稱謂易曰君子之道或出或處同歸殊塗一致百慮是知變常而善可以除灾變常而惡必致於異今年中竟來年入季仲終季始歴運變改故可改元所以順天道也臣顗愚蔽不足以答聖問薦黄瓊李固并陳消灾之術四事書書奏特詔拜郎中辭病不行至四月京師地陷夏大旱秋鮮卑入馬邑城破代郡兵明年西羌冦隴右皆畧如顗言臣前對七事要政急務宜於今者所當施用誠知愚淺不合聖聽人賤言廢當受誅罰怔營惶怖靡知厝身臣聞刳舟剡楫将欲濟江海也聘賢選佐将以安天下也昔唐堯在上羣龍為用文武創徳周召作輔是以能建天地之功増日月之耀者也詩云赫赫王命仲山甫将之邦國若否仲山甫明之宣王是賴以致雍熙陛下踐祚以來勤心衆政而三九之位未見其人是以灾害屢臻四國未寜臣考之國典驗之聞見莫不以得賢為功失士為敗且賢者出處翔而後集爵以徳進則其情不茍然後使君子恥貧賤而樂富貴矣若有徳不報有言不醻來無所樂進無所趨則皆懷歸藪澤修其故志矣夫求賢者上以承天下以為人不用之則逆天統違人望逆天統則灾𤯝降違人望則化不行災𤯝降則下呼嗟化不行則君道虧四始之缺五際之戹其咎如此豈可不剛健篤實矜矜慄慄以守天功盛徳大業乎臣伏見光祿大夫江夏黄瓊耽道樂術清亮自然被褐懷寶含味經籍又果於從政明達變復朝廷前加優寵賓於上位瓊入朝日淺謀謨未就因以喪病致命遂志老子曰大音聲希大器晩成善人為國三年乃立天下莫不嘉朝廷有此良人而復怪其不時還任陛下宜嘉隆崇之恩極養賢之禮徵反京師以慰天下又處士漢中李固年四十通游夏之藝履顔閔之仁潔白之節情同皦日忠貞之操好是正直卓冠古人當世莫及元精所生王之佐臣天之生固必為聖漢宜蒙特徵以示四方夫有出倫之才不應限以官次昔顔子十八天下歸仁子奇穉齒化阿有聲若還瓊徵固任以時政伊尹傅説不足為比則可垂景光致休祥矣臣顗明不知人伏聽衆言百姓所歸臧否共歎願汎問百僚覈其名行有一不合則臣為欺國惟留聖神不以人廢言謹復條便宜四事附奏于左一事孔子作春秋書正月者敬嵗之始也王者則天之象因時之序宜開發徳號爵賢命士流寛大之澤垂仁厚之徳順助元氣含養庶類如此則天文昭爛星辰顯列五緯循軌四時和睦不則太陽不光天地溷濁時氣錯逆霾霧蔽日自立春以來累經旬朔未見仁徳有所施布但聞罪罰拷掠之聲夫天之應人疾於影響而自從入嵗常有蒙氣月不舒光日不宣曜日者太陽以象人君政變於下日應於天清濁之占随政抑揚天之見異事無虚作豈獨陛下倦於萬機帷幄之政有所闕歟何天戒之數見也臣願陛下發揚乾剛援引賢能勤求機衡之寄以獲㫁金之利臣之所陳輙以太陽為先者明其不可久闇急當改正其異雖微其事甚重臣言雖約其㫖甚廣惟陛下乃眷臣章深畱明思蒙氣謝承後漢書作霜氣二事孔子曰靁之始發大壯始君弱臣強從解起今月九日至十四日大壯用事消息之卦也於此六日之中雷當發聲發聲則歳氣和王道興也易曰雷出地奮豫先王以作樂崇徳殷薦之上帝雷者所以開發萌牙辟陰除害萬物須雷而解資雨而潤故經曰雷以動之雨以潤之王者崇寛大順春令則雷應節不則發動於冬當震反潛故易傳曰當雷不雷太陽弱也今蒙氣不除日月變色則其效也天網恢恢疎而不失隨時進退應政得失大人者與天地合其徳與日月合其明璇璣動作與天相應雷者號令其徳生養號令殆廢當生而殺則雷反作其時無嵗陛下若欲除灾昭祉順天致和宜察臣下尤酷害者亟加斥黜以安黎元則太皓悦和雷聲乃發三事去年十月二十日癸亥太白與嵗星合於房心太白在北嵗星在南相離數寸光芒交接房心者天帝明堂布政之宫孝經鉤命决曰嵗星守心年榖豐尚書洪範記曰月行中道移節應期徳厚受福重華畱之重華者謂嵗星在心也今太白從之交合明堂金木相賊而反同合此以陰陵陽臣下専權之異也房心東方其國主宋石氏經曰嵗星出左有年出右無年今金木俱東嵗星在南是為出右恐年榖不成宋人饑也陛下宜審詳明堂布政之務然後妖異可消五緯順序矣四事易傳曰陽無徳則旱隂僭陽亦旱陽無徳者人君恩澤不施於人也陰僭陽者祿去公室臣下専權也自冬渉春訖無嘉澤數有西風反逆時節朝廷勞心廣為禱祈薦祭山川暴龍移市臣聞皇天感物不為偽動災變應人要在責己若令雨可請降水可禳止則嵗無隔并太平可待然而灾害不息者患不在此也立春以來未見朝廷賞録有功表顯有徳存問孤寡賑恤貧弱而但見洛陽都官奔車東西收擊纎介牢獄充盈臣聞恭陵火處比有光曜明此天灾非人之咎丁丑大風掩蔽天地風者號令天之威怒皆所以感悟人君忠厚之戒又連月無雨将害粟麥若一粟不登則饑者十三四矣陛下誠宜廣被恩澤貸贍元元昔堯遭九年之水人有十年之蓄者簡税防灾為其方也願陛下早宣徳澤以應天功若臣言不用朝政不改者立夏之後乃有澍雨於今之際未可望也若政變於朝而天不雨則臣為誣上愚不知量分當鼎鑊楊倫字仲理陳畱東昏人前後三徵皆以直諌不合論贓吏任嘉書倫順帝初拜侍中時邵陵令任嘉貪穢遷武威太守有人奏嘉姦贓多引将相大臣倫上書坐結鬼薪以倫數進忠言特原之臣聞春秋誅惡及本本誅則惡消振裘持領領正則毛理今任嘉所坐狼籍未受辜戮猥以垢臭改典大郡自非案坐舉者無以禁絶姦萌往者湖陸令張疊蕭令駟賢徐州刺史劉福等釁穢既章咸伏其誅而豺狼之吏至今不絶者豈非本舉之主不加之罪乎昔齊威之覇殺姦臣五人并及舉者以弭謗讟當㫁不㫁黄石所戒夫聖王所以聽僮夫匹婦之言者猶塵加嵩岱霧集淮海雖未有益不為損也惟陛下留神省察自上書倫為梁商長史不合出補常山王傅敕司𨽻催發倫留朝歌以疾自上帝下詔徵詣廷尉原罪有畱死一尺無比行一寸刎頸不易九裂不恨匹夫所執強於三軍順帝詔倫出幽升髙寵以藩傅稽留王命擅止道路託疾自從茍肆狷志王堂字敬伯廣漢郪人下掾史教堂永建中遷汝南太守捜才禮士乃教掾史自是委誠求當不復妄有辭教古人勞於求賢逸於任使故能化清於上事緝於下其憲章朝右簡覈才職委功曺陳蕃匡政理務拾遺補闕任主簿應嗣庶循名責實察言觀效焉自是委誠求當不復妄有辭教同前鍾抗良吏傳簡覈衆職委功曺拾遺補闕委主簿仰恃明俊古人有言勞於求賢逸於得士太守不敢妄有符教田羽薦法真奏真字髙卿雄之子為闗西大儒同邵田羽薦真前後四徵皆不屈處士法真體兼四業學窮典奥幽居恬泊樂以忘憂将蹈老氏之髙蹤不為𤣥纁屈也臣願聖朝就加衮職必能唱清廟之歌致來儀之鳳矣郭正稱法真論真友人郭正頌真乃共刋石頌之法真名可得聞身難得而見逃名而名我隨避名而名我追可謂百世之師者矣段翳字元章廣漢新都人習易明風角以隠終筒中書有一生來學積年辭歸翳為合膏藥并以簡書封筒中生到葭萌與吏爭度撾破從者頭開筒得書創者用愈到葭萌與吏鬬頭破者以此膏裹之邉韶字孝先陳畱浚儀人文學知名歴尚書令為陳相論厯奏順帝漢安二年尚書侍郎邉韶上言詔下公卿百官雜議太史令虞恭治厯宗訢等議奏可世微於數虧道盛於得常數虧則物衰得常則國昌孝武皇帝攄發聖思因元封七年十一月甲子朔旦冬至乃詔太史令司馬遷治厯鄧平等更建太初改元易朔行夏之正乾鑿度八十分之四十三為日法設清臺之候驗六異課效觕密太初為冣其後劉歆研幾極深驗之春秋參以易道以河圗帝覽嬉洛書乾曜度推廣九道百七十一嵗進退六十三分百四十四嵗一超次與天相應少有闕謬從太初至永平十一年百七十嵗進退餘分六十三治厯者不知處之推得十二度弦望不效挾廢術者得竄其説至永和二年小終之數寖過餘分稍増月不用晦朔而先見孝章皇帝以保乾圖三百年斗厯改憲就用四分以太白復樞甲子為癸亥引天從筭耦之目前更以庚申為元既無明文託之於獲麟之嵗又不與感精符單閼之嵗同史官相代因成習疑少能鉤深致逺案弦望足以知之虞恭宗訴建厯議建厯之本必先立元元正然後定日法法定然後度周天以定分至三者有程則厯可成也四分厯仲紀之元起於孝文皇帝後元三年嵗在庚辰上四十五嵗嵗在乙未則漢興元年也又上二百七十五嵗嵗在庚申則孔子獲麟二百七十六萬嵗尋之上行復得庚申嵗嵗相承從下尋上其執不誤此四分厯元明文圗䜟所著也太初元年嵗在丁丑上極其元當在庚戌而曰丙子言百四十四嵗超一辰凡九百九十三超嵗有空行八十二周有奇乃得丙子案嵗所超於天元十一月甲子朔旦冬至日月俱超日行一度積三百六十五度四分度一而周天一匝名曰嵗嵗從一辰日不得空周天則嵗無由超辰案百七十嵗二蔀一章小餘六十三自然之數也夫數出於杪曶以成毫釐毫釐積累以成分寸兩儀既定日月始離初行生分積分成度日行一度一嵗而周故為術者各生度法或以九百四十或以八十一法有細觕以生兩科其歸一也日法者日之所行分也日垂令明行有常節日法所該通逺無已損益毫釐差以千里自此言之數無縁得有虧棄之意也今欲飾平之失㫁法垂分恐傷大道以步日月行度終數不同闕章更不得朔餘一雖言九道去課進退恐不足以補其闕且課厯之法晦朔變弦以月食天驗昭著莫大焉今以去六十三分之法為厯驗章和元年以來日變二十事月食二十八事與四分厯更失定課相除四分尚得多而又使近孝章皇帝厯度審正圖儀晷漏與天相應不可復尚文曜鉤曰髙辛受命重黎説文唐堯即位羲和立禪夏后制徳昆吾列神成周改號萇𢎞分官運斗樞曰常占有經世史所明洪範五紀論曰民間亦有黄帝諸厯不如史官記之明也自古及今聖帝明王莫不取言於羲和常占之官定精微於晷儀正衆疑祕藏中書改行四分之原及光武皇帝數下詔書草創其端孝明皇帝課校其實孝章皇帝宣行其法君更三聖年歴數十信而徵之舉而行之其元則上統開闢其數則復古四分宜如甲寅詔書故事塞賦序可以代博奕者曰塞其次也試習其術以驚睡救寤免晝寢之譏而巳然而徐核其因通之極乃亦精妙而足美也故書其較略舉其指歸以明博奕無以尚焉漢滎瀆石門碑水經注云碑銘嵗逺字多淪缺惟陽嘉三年二月丁丑使河堤謁者王誨疏達河川述荒庶土云大河衝塞侵齧金堤以竹籠石葺葦土而為遏壞隤無巳功消億萬請以濱河郡徙疏山采石壘以為鄣功業既就徭役用息未詳詔書許誨立功府鄉規基經始詔滎加命遷在沇州乃簡朱軒授使司馬登令纉茂前緒稱遂休功登以伊洛合注夫河南則縁山東過大伾囘流北岸其勢欝懞濤怒湍急激疾一有决溢彌原淹野蟻孔之變害起不測盖自姬氏之所常蹙昔崇鯀所不能治我二宗之所劬勞於是乃跋渉躬親經之營之比率百姓議之於臣伐石三谷水匠致治立激岸側以捍鴻波隨時慶賜説以勸之川無滯越水土通演役未逾年而功程有畢斯乃元勲之嘉課上徳之𢎞表也昔禹修九道書録其功后稷躬稼詩列于雅夫不憚勞謙之勤夙興厥職充國恵民亦缺得湮没而不章焉故遂刋石記功垂示於後其辭缺使河堤謁者山陽東昏司馬登字伯志代東萊典城王誨字孟堅河内太守宋城向豹字伯尹丞汝南鄧方字徳山懷令劉丞字季意河堤掾匠等造陳留浚儀邉韶字孝先頌東漢文紀巻十二
