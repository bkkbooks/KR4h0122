body:
  text: 東漢文紀卷二十三明梅鼎祚編蔡雍五東鼎銘水經注睢陽城北喬𤣥墓碑主記掾李友撰文碑隂有右鼎中鼎左鼎征鉞文不云雍撰維建寧三年秋八月丁丑延公于玉堂前廷乃制詔曰其以大鴻臚橋𤣥為司空再拜稽首以讓帝曰俞往哉三讓然後受命公乃䖍恭夙夜帝采勤施八方旁作穆穆以對揚天子丕顯休命越在先民毗于天子罔不著其股肱畢其思心式率天行式昭德音公亦克紹厥猷鑒于法罔敢不法憲于誡罔敢不誡用總是羣后保乂帝家勳在方册民咸曰休哉惟帝念功越若來二月丁丑遷于司徒中鼎銘維建寧四年三月丁丑延公登于玉堂前廷乃制詔曰其以司空橋𤣥為司徒公拜稽首以讓帝曰俞往哉三讓然後受命公允迪厥德宣力肆勤戰戰兢兢以役帝事率夫百辟媚于天子天子曰都慎厥身修思永同寅協恭以和天衷德則昭之違則塞之回乃不敢不弼枉乃不敢不匡股肱之事既克三事之繇允備災眚作見乃引其責曰凡庶徴不若彛倫不敘是惟臣之職祗以疾告表越十月庚午記此西鼎銘維光和元年冬十二月丁已延公入崇德殿前乃制詔曰其以光祿大夫𤣥為太尉公拜稽首曰臣聞之三讓莫或克從臣不敢辭臣犬馬齒七十可以生可以死其戮力間私悉心在公以盡為臣之節于時侍從陛階與聞公之昌言者莫不惕厲如履薄氷既乃碑表百代黃鉞銘孝桓之季年鮮卑入塞抄盜胸奴左部梁州叛羌逼迫兵誅淫衍東夷髙句麗􅀈子百固逆謀並發三垂騷然為國憂念西府表橋公昔在凉州柔逺能邇不煩軍師而車師克定及在上谷漢陽連在營郡膂力方剛明集御衆徴拜度遼將軍始受旄鉞鉦鼓之任扞禦三垂公以吏士頻年在外勤于奔命人馬疲羸撓鈍請且息州營橫發之役以補困憊朝廷許之于是儲廪豐饒室罄不懸人逸馬同弓徑矢利而經用省息官有餘資執事無放散之尤簿書有進入之嬴治兵示威戎士踊躍旌旗耀日金鼓霆奮守有山嶽之固攻有必克之勢羌戎授首于西疆百固氷散于東鄰鮮卑收迹烽燧不舉視事三年馬不帶鈌弓不受彄是用鏤石作兹征鉞軍鼓陳之東階以昭公文武之勳焉銘曰帝命將軍秉兹黃鉞威靈振耀如火之烈公之在位羣狄斯柔齊斧罔設人士斯休朱公叔鼎銘忠文朱公名穆字公叔有殷之胄微子啓以帝乙元子周武王封諸宋以奉成湯之祀至元子啓生公子朱其孫氏焉後自沛遷于南陽之宛遂大于宋爵位相襲烈祖尚書令肅宗之世守于臨淮考曰實為陳留太守乃及忠文克慎明德以紹服祖襧之遺風悉心臣事用媚天子顯允其勳蹟尋綜六藝契濶馳思所以啓前惑而覺後疑者亹亹焉雖商偃其猶病諸初舉孝亷除郎中尚書侍郎獨念運際存亡之要乃陳五事諫謀深切退處畎畝以察天象驗應著焉孝順晏駕賊發江淮時辟大將軍府實掌其事用拜宛陵令非其好也遂以疾辭復辟大將軍再拜博士髙第作侍御史明司國憲以齊百寮矯枉董直罔肯阿順以黜其位潜于郎中羣公並表乃遷議郎登于東觀纂業前史于時冀州凶荒年饉民匱而貪婪之徒乘之為虐錫命作牧靜其方隅乃攄洪化奮靈武昭令德塞羣違貞良者封植殘戾者芟夷去惡除盜無俾比而作慝用陷于非辜復徴拜議郎病免官徴拜尚書清一以考其素正直以醇其德出納帝命乃無不允雖龍作納言山甫喉舌靡以尚之享年六十有四漢皇二十一世延熹六年夏四月乙巳卒于官天子痛悼詔曰尚書朱穆立節忠亮世篤爾行䖍恪機任守死善道不幸而卒朝廷憫焉今使權謁者中郎楊賁贈穆益州刺史印綬魂而有靈嘉其寵榮嗚呼哀哉肆其孤用作兹寶鼎銘載休功俾後裔永用享祀以知其先之德九疑山銘巖巖九疑峻極于天觸石膚合興播連雲時風嘉雨浸潤下民芒芒南土實賴厥勳逮于虞舜聖德光明克諧頑傲以孝蒸蒸師錫帝世堯乃授徴受終文祖璇璣是承泰階以平人以有終遂葬九疑解體而升登此崔嵬託靈神仙樽銘酒以成禮弗愆以淫德將無醉過則荒沈盈而不沖古人所針尚鑒兹器懋朂厥心朂玉海作勉警枕銘應龍蟠蟄濳德保靈制器象物示有其形哲人降鑒居安慮傾太平御覽衣針今人務在奢嚴志好美飾帛必薄細衣必輕暖或一朝之宴再三易衣私居移坐不因故服盤銘華盤就用以享嘉賔內納其實外若𤣥真祖德頌昔文王始受命武王定禍亂至于成王太平乃洽祥瑞畢降夫豈后德熙隆漸浸之所通也是以易嘉積善有餘慶詩稱子孫保之非特王道然也賢人君子修仁履德者亦其有焉昔我烈祖暨于豫考世載孝友重以明德率禮莫違是以靈祗降之休瑞兔擾馴以昭其仁木連理以象其義斯乃祖禰之遺靈盛德之所貺也豈我童䝉孤稚所克任哉乃為頌曰穆穆我祖世篤其仁其德克明惟懿惟醇宣慈惠和無競伊人巖巖我考蒞之以莊增崇丕顯克構其堂是用祚之休徴惟光厥徴伊何於昭于今園有甘棠别幹同心墳有擾兔宅我柏林神不可誣僞不可加析薪之業畏不克荷矧貪靈貺以為己華惟豫小子豈不是欲干有先功匪榮伊辱胡廣黃瓊頌靈帝熹平六年圖畫太傅胡廣太尉黃瓊于省內詔議郎蔡雍為頌見謝承書巖巖山嶽配天作輔降神有周生申及甫允兹漢室誕育二后曰胡曰黃方軌齊武惟道之淵惟德之藪股肱元首代作心膂天生蒸民有則有類我胡我黃鍾厥純懿巍巍特進仍踐其位赫赫三事七佩其紱奕奕四牡沃若六轡衮職龍章其文有蔚參曜乾台窮寵極貴功加八荒羣生以遂超哉邈乎莫與為二京兆樊惠渠頌洪範八政一曰食周禮九職一曰農有生之本於是乎出貨殖財用于是乎在九土上沃為大田多稔然而地有埆塉川有墊下溉灌之便行趍不至明哲君子創業農事因髙卑之宜驅自行之勢以盡水利而富國饒人自古有焉若夫西門起鄴鄭國行秦李氷在蜀信臣治穰皆此道也陽陵縣東其地衍隩土氣辛螫嘉榖不植草萊焦枯而涇水長流溉灌維首編户齊氓庸力不供牧人之吏謀不假給蓋常興役猶不克成光和五年京兆尹樊君諱陵字德雲勤恤人隱悉心政事苟有可以惠斯人者無聞而不行焉遂咨之郡吏申于政府僉以為因其所利之事者不可已者也乃命方略大吏麴遂令伍瓊揣度計利揆程經用以事上聞副在三府司農遂取財于豪富借力于黎元樹柱纍石委薪積土基跂工堅體勢强壯折湍流欵曠陂㑹之于新渠疏水門通窬瀆灑之于畎畝清流浸潤泥潦浮游昔日鹵田化為甘壤粳黍稼穡之所入不可勝算農民熙怡恱豫相與謳談疆畔斐然成章謂之樊惠渠云其歌曰我有長流莫或遏之我有溝澮莫或逹之田疇斥鹵莫修莫釐饑饉困悴莫恤莫思乃有樊君作人父母立我畎畝黃潦膏凝多稼茂止惠乃無疆如何勿喜我壤既營我疆斯成泯泯我人既富且盈為酒為釀蒸彼祖靈貽福惠君夀考且寧樊陵頌序後漢書注前漢户五萬口有十七萬王莽後十不存一永初元年羌戎作虐至光和領戶不盈四千園陵蕃衛粢盛之供百役出焉民用匱乏不堪其事陳留太守行小黃縣頌藝文類聚集不載大皓為政建時春陽我君勸止戾兹小黃濟濟羣吏攝齊升堂乃訓乃厲示之憲方原罪以心察獄以情欽于刑濫惟務求輕有辜小罪放死從生𤣥化洽矣黔首用寧惟以作頌式昭德聲考城縣頌藝文類聚曖曖𤣥路北至漢城勸兹穡民東作是營農桑之業為國之經我君勤心德音邈成率爾苖民慎不敬聽女執伊筐男執其耕申戒羣僚務在寬平罪人赦宥囹圄用清潁川太守王立頌立義葬流民雍為頌哀此骼胔寬體孤魂遭水為泥逢風成塵殮以時服葬以洛濵北堂書抄五靈頌大梁乘精白虎用生思睿信立繞于垣坰麟頌皇矣大角降生靈獸視明禮修麒麟來孚春秋既書爾來告就庶士子鉏獲諸西狩焦君贊猗歟焦君常比𤣥墨衡門之下栖遲偃息泌之洋洋樂以忘食鶴鳴九臯音亮帝側乃徴乃用將受衮職昊天不弔賢人遘慝不獲一志并此四國如何穹蒼不照西域惜哉朝廷喪兹舊德恨伊學士將何法則太尉陳公贊公在百里有西産之惠賜命方伯分陜餘慶餘慶伊何兆民其觀少者是懷老者是安綱紀文王文王用平東督京輦京輦用清乃登三事三事以寧契稷之佐具于堯庭今則由古於穆誕成藝文類聚竹贊云緑潤碧鮮紺文紫錢濟北相崔君夫人誄維延熹四年故濟北相崔夫人卒嗚呼哀哉世喪母儀宗殞憲師哀哀孝子靡所瞻依凡百赴弔至止增悲投涕歔欷共敘赫姿乃為誄曰清和有鑠時惟哲母令儀令色爰以資始塞淵其心淑慎其止于母斯勤在子斯敏仰覽篇籍俯釐絲枲多才多藝于何不有休譽邈焉允女之英乃及崔君惟德是行其德伊何實粹實明䖍恭事幾契濶中饋敦此婉順疾彼攸遂思齊徽音晨興夜寢穆穆其猷莫之與二天祚明德底之方榖於赫崔君膺兹祉祿夫人有𦙍翼此清淑仁風溫潤義惠優渥推恩中外施浹疏族食不兼膳服不纎縠以儉為榮以奢為辱堂堂其𦙍惟世之良于其令母受兹義方訓以柔和董以嚴剛怒不傷愛喜不亂莊納之軌度終然允臧是用登隮享其寵光雖則崇盛猶匪寧息同其婦子茂師其職服貴無荒尊不舍力密勿不忘惟德之極昔在共姜陪臣之母勞謙紡績仲尼是紀矧兹夫人帝室命婦猶日孜孜復禮克己人亦有言仁者夀長宜登永年黃耉無疆昊天不弔降此殘殃寢疾彌留精爽悴傷慘怛孝子惴惴其惶靡神不舉無藥不將嗚呼哀哉于是孝子長叫氣絶復蘇號呼告哀不知其辜昊天上帝忍弔遺孤尋想逰靈焉識所徂嗚呼哀哉既殯神柩薄言于歸冡宰喪儀循禮無遺切切喪主瘠羸哀哀情兮長慕涕兮無晞行旅揮涕千里于咨乃謀卜筮言考其良建彼兆域于時翳藏𡨕𡨕窀穸無時有陽燈燭既滅馬道納光形影不見定省何望嗟其哀矣不可彌忘日月代序古有如喪由斯夫人榮烈有章配彼哲彥既隆且昌顧景赫奕饋供孔將惟以慰懷庶無永傷嗚呼哀㦲弔屈原文鸋鴦軒翥鸞鳳挫翮啄碎琬琰寶其瓴甋皇車奔而失轄執轡忽而不顧卒壞覆而不振顧抱石其何補藝文類聚北堂書抄雍弔屈原文逈隔世而遙弔託白水而騰文釋誨閒居玩古不交當世感東方客難及揚雄班固崔駰之徒設疑以自通乃斟酌羣言韙其是而矯其非作釋誨以戒厲云爾有務世公子誨于華顚胡老曰蓋聞聖人之大寶曰位故以仁守位以財聚人然則有位斯貴有財斯富行義達道士之司也故伊摯有負鼎之衒仲尼設執鞭之言寧子有清商之歌百里有豢牛之事夫如是則聖哲之通趣古人之明志也夫子生清穆之世禀醇和之靈覃思典籍韞櫝六經安貧樂賤與世無營沉精重淵抗志髙𡨕包括無外綜析無形其己久矣曽不能拔萃出羣揚芳飛文登天庭序彛倫掃六合之穢慝清宇宙之埃塵連光芒于白日屬炎氣于景雲時逝嵗暮默而無聞小子惑焉是以有云方今聖上寬明輔弼賢知崇英逸偉不墜于地德𢎞者建宰相而裂土才羡者荷榮祿而蒙賜盍亦回塗要至俯仰取容輯當世之利定不拔之功榮家宗于此時遺不滅之令蹤夫獨未之思邪何為守彼而不通此胡老慠然而笑曰若公子所謂覩曖昧之利而忘昭晢之害専必成之功而忽蹉跌之敗者已公子謖爾斂袂而興曰胡為其然也胡老曰居吾將釋汝昔自太極君臣始基有羲皇之洪寧唐虞之至時三代之隆亦有緝熙五伯扶微勤而撫之于斯已降天綱縱人紘弛王塗壞太極陀君臣土崩上下瓦解于是智者騁詐辨者馳說武夫奮略戰士講鋭電駭風馳霧散雲披變詐乖詭以合時宜或畫一策而綰萬金或談崇朝而錫瑞圭連衡者六印磊落合縱者駢組陸離隆貴翕習積富無涯據巧蹈機以忘其危夫華離蒂而萎條去幹而枯女冶容而淫士背道而辜人毁其滿神疾其邪利端始萌害漸亦芽速速方轂夭夭是加欲豐其屋乃蔀其家是故天地否閉聖哲潜形石門守晨沮溺耦耕顔歜抱璞蘧瑗保生齊人歸樂孔子斯征壅渠驂乘逝而遺輕夫豈傲主而背國乎道不可以傾也且我聞之日南至則黃鍾應融風動而魚上氷蕤賔統則微隂萌蒹葭蒼而白露凝寒暑相推隂陽代興運極則化理亂相承今大漢紹陶唐之洪烈蕩四海之殘災隆隱天之髙拆絙地之基皇道惟融帝猷顯丕汦汦庶類含甘吮滋檢六合之羣品躋之乎雍熙羣僚恭已于職司聖主垂拱乎兩楹君臣穆穆守之以平濟濟多士端委縉綎鴻漸盈階振鷺充庭譬猶鍾山之玉泗濵之石纍圭璧不為之盈採浮磬不為之索曩者洪源闢而四隩集武功定而干戈戢玁狁攘而吉甫宴城濮捷而晉凱入故當其有事也則蓑笠並載擐甲揚鋒不給于務當其無事也則舒紳緩佩鳴玉以步綽有餘裕夫世臣閥子􅉏御之族天隆其祐主豐其祿抱膺從容爵位自從攝須理髯餘官委貴其進取也順傾轉圜不足以喻其便逡巡放屣不足以况其易夫夫有逸羣之才人人有優贍之智童子不問疑于老成瞳矇不稽謀于先生心恬淡于守髙意無為于持盈燦乎煌煌莫非華榮明哲泊焉不失所寧狂淫振蕩乃亂其情貪夫狥財夸者死權瞻仰此事體躁心煩暗謙盈之效迷損益之數騁駑駘于修路慕騏驥而增驅卑俯乎外戚之門乞助乎近貴之譽榮顯未副從而顚踣下獲熏胥之辜髙受滅家之誅前車已覆襲軌而騖曽不鑒禍以知畏懼豫誰悼哉害其若是天髙地厚局而踳之怨豈在明患生不思戰戰兢兢必慎厥尤且用之則行聖訓也舍之則藏至順也九河盈溢非一凷所防帶甲百萬非一勇所抗今子責匹夫以清宇宙庸可以水旱而纍堯湯乎懼煙炎之燬熸何光芒之敢揚哉且夫地將震而樞星直井無景則日隂食元首寬則望舒朓侯王肅則月側匿是以君子推微達著尋端見緒履霜如氷踐露知暑時行則行時止則止消息盈沖取諸天紀利用遭泰可與處否樂天知命持神任已羣車方奔乎險路安能與之齊軌思危難而自豫故在賤而不耻方將騁馳乎典籍之崇塗休息乎仁義之淵藪盤旋乎周孔之庭宇揖儒墨而與為友舒之足以光四表收之則莫能知其所有若乃丁千載之運應神靈之符闓閶闔乘天衢擁華蓋奉皇樞納𤣥䇿于聖德宣太平于中區計合謀從己之圖也勳績不立豫之辜也龜鳳山翳霧露不除踴躍草菜祗見其愚不我知者將謂之迂修業思真棄此焉如靜以俟命不斁不渝百歲之後歸乎其居幸其獲稱天所誘也罕漫而已非己咎也昔伯翳綜聲於鳥語葛盧辨音于鳴牛董父受氏於豢龍奚仲供德於衡輈倕氏興政于巧工造父登御于驊騮非子享土于善圉狼瞫取右于禽囚弓父畢精于筋角佽飛明勇於赴流夀王創基于格五東方要幸于談優上官效力于執蓋𢎞羊據相于運籌僕不能參跡于若人故抱璞而優游于是公子俯首降階忸怩而避胡老乃揚衡含笑援琴而歌歌曰練豫心兮浸太清滌穢濁兮存正靈和液暢兮神氣寧情志泊兮心亭亭嗜欲息兮無由生踔宇宙而遺俗兮眇翩翩而獨征篆勢唐張懷瓘書斷分載作大篆小篆贊字畫之始因于鳥跡蒼頡循聖作則制文體有六篆巧妙入神或象龜文或比龍鱗紓體放尾長翅短身頡若黍稷之垂潁藴若蟲蛇之棼緼揚波振擊龍躍鳥震延頸脅翼勢欲凌雲或輕舉內投微本濃末若絶若連似水露緣絲凝垂下端從者如懸衡者如編杪者邪趣不方不圓若行若飛岐岐翾翾逺而望之若鴻鵠羣逰絡繹遷延迫而視之湍際不可得見指揮不可勝原研桑不能數其詰屈離婁不能覩其隙間般倕揖讓而辭巧籕誦拱手而韜翰處篇籍之首目粲粲彬彬其可觀摛華豔于紈素為學藝之範間嘉文德之𢎞懿藴作者之莫刋思字體之俯仰舉大略而論旃或象龜文二句書斷小篆贊又作龜文針列櫛比龍鱗為學藝之範間作為六藝之範先𨽻勢鳥跡之變乃惟佐𨽻蠲彼繁文崇此簡易厥用既行體象有度奐若星陳鬱若雲布其大徑尋細不容髮隨事從宜靡有常制或穹窿恢廓或櫛比針列或砥繩平直或蜿蜒繆戾或長邪角趣或規旋矩折修短相副異體同勢奮華輕舉離而不絶纎波濃㸃錯落其間若鍾簴設張庭燎飛烟嶄嵓崔嵯髙下屬連似崇臺重宇層雲冠山逺而望之若飛龍在天近而察之心亂目眩竒姿譎誕不可勝原研桑所不能計宰賜所不能言何草篆之足算而斯文之未宣豈體大之難覩將祕奧之不傳聊佇思而詳觀舉大略而論旃上原陵記謝承後漢書建寧五年正月車駕上原陵蔡雍為司徒掾從公行到陵見其儀愾然謂同坐者曰聞古不墓祭朝廷有上陵之禮始為可損今見威儀察其本意乃知孝明皇帝至孝惻隱不可易舊或曰本意云何昔京師在長安時其禮不可盡得聞也光武即世始葬于此明帝嗣位踰年羣臣朝正感先帝不復聞見此禮乃師公卿百寮就園陵而創焉尚書陛西陛為神坐天子事亡如事存之意苟先帝有瓜葛之屬男女畢會王矦大夫郡國計吏各向神坐而言庶幾先帝神魂聞之今者日月久逺後生非時人但見其禮不知其哀以明帝聖孝之心親服三年久在園陵初興此儀仰察几筵下顧羣臣悲切之心必不可堪雍見太傅胡廣曰國家禮有煩而不可省者不知先帝用心周密之至于此也廣曰然子宜載之以示學者雍退而記焉述行賦序延熹二年秋霖雨逾月是時梁冀新誅而徐璜左悺五侯擅貴于其處又起顯明苑于城西人徒凍餓不得其命者甚衆白馬令李雲以直言死鴻臚陳君以救雲抵罪璜以余能鼓琴白朝廷敕陳留郡守遣余到偃師病不前得歸心憤此事遂託所過述而成賦筆賦序初學記下並集不載昔蒼頡創業翰墨作用書契興焉夫制作上聖立憲者莫先乎筆詳原其所由究察其成功鑠乎煥乎不可尚矣初學記御覽雍傷故栗賦序人有折蔡氏祠前故栗者故作斯賦連珠北堂書抄道為知者設馬為御者良賢為聖者用辨為知者通廣連珠太平書抄臣聞目瞤耳鳴近夫小戒也狐鳴犬嘷家人小妖也猶忌慎動作封鎮書符以防其禍是故天地示異災變橫起則人主恆恐懼而修政又云參絲之絞以絃琴緩張則撓急張則絶九惟此九惟之一人惟困乏憂心殷殷天之生我星宿值貧六極之厄獨遭斯勤居處浮􅞎無以自任冬日栗栗上下同雲無衣無褐何以自溫六月徂暑炎赫來臻無絺無綌何以蔽身無食不飽永離歡欣古文苑女訓太平御覽舅姑若命之鼓琴必正坐操琴而奏曲若問曲名則捨琴興對曰某曲坐若近則琴聲必聞若逺左右必有贊其言者凡鼓小曲五終則止大曲三終則止無數變曲無多少尊者之聽未厭不敢早止若顧望視也則曲終而後止亦無中曲而息也琴必常調尊者之前不更調張私室若近舅姑則不敢鼓獨若絶遠聲音不聞鼓之可也鼓琴之夜有姊妹之宴則可也女誡太平御覽心猶首面也是以甚致飾焉面一旦不修則塵垢穢之心一朝不思善則邪惡入之咸知飾其面不修其心惑矣夫面之不飾愚者謂之醜心之不修賢者謂之惡愚者謂之醜猶可賢者謂之惡將何容焉故覽照拭面則思其心之潔也傅脂則思其心之和也加粉則思其心之鮮也澤髮則思其心之順也用櫛則思其心之理也立髻則思其心之正也攝鬢則思其心之整也禮女始行服纁纁綘也綘正色也紅紫不以為䙝服緗緑不以為上服繒貴厚而色尚深為其堅紉也勸學藝文類聚蚓無瓜牙軟弱不便穿穴洞地食塵飲泉蔡雍畫像頌東國宗敬雍不言名咸稱蔡君兖州陳留並圖畫形象而頌之曰文同三閭孝齊參騫蔡雍别傳東漢文紀卷二十三
