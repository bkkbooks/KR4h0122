body:
  text: 東漢文紀卷十三明梅鼎祚編張衡字平子南陽西鄂人纍遷太史令侍中出為河間相徵為尚書所著有周官訓詁及詩賦銘七言靈憲應間七辨巡誥懸圖凡三十二篇上安帝論疫災疏延光四年京都大疫衡明年上封事臣竊見京師為害兼所及民多病死死有滅戶人人恐懼朝廷燋心以為至憂臣官在於考變禳災思任防救未知所由夙夜征營臣聞國之大事在祀祀莫大於郊天奉祖方今道路流言僉曰孝安皇帝南巡路崩從駕左右行慝之臣欲徵諸國王子故不發喪衣車還宫僞遣大臣並禱請命臣處外官不知其審然尊靈見罔豈能無怨且凡夫私小有不蠲猶為譴謫况以太穢用禮郊廟孔子曰曾謂泰山不如林放乎天地明察降禍見災乃其理也又間者有司正以冬至之後奏開恭陵神道陛下至孝不忍距逆或發冢移尸月令仲冬土事無作慎無發蓋及起大衆以固而閉地氣上泄是謂發天地之房諸蟄則死民必疾疫又隨以喪厲氣未息恐其殆此三年欲使知過改悔五行傳曰六沴作見若時共禦帝用不差神則不怒萬福乃降用章於下臣愚以為可使公卿處議所以陳術改過取媚神祇自求多福也上順帝陳事疏陽嘉中政事漸損權移於下衡上疏陳事又疏禁圖䜟伏惟陛下宣哲免明繼體承天中遭傾覆龍德泥蟠今乘雲高躋磐桓天位誠所謂將隆大位必先倥偬之也親履艱難者知下情備經險易者達物僞故能一貫萬機靡所疑惑百揆允當庶績咸熙宜獲福祉神祇受譽黎庶而隂陽未和災眚屢見神明幽逺冥鑒在兹福仁禍淫景嚮而應因德降休乘失致咎天道雖逺吉凶可見近世鄭蔡江樊周廣王聖皆為效矣故恭儉畏忌必䝉祉祚奢淫諂慢鮮不夷戮前事不忘後事之師也夫情勝其性流遁忘反豈惟不肖中才皆然茍非大賢不能見得思義故積惡成釁罪不可解也向使能瞻前顧後援鏡自戒則何陷於凶患乎貴寵之臣衆所屬仰其有愆尤上下知之褒美譏惡有心皆同故怨讟溢乎四海神明降其禍辟也頃年雨常不足思求所失則洪範所謂僭恆暘若者也懼羣臣奢侈昏踰典式自下逼上用速咎徵又前年京師地震土裂裂者威分震者人擾也君以靜唱臣以動和威自上出不趣於下禮之政也竊懼聖思厭倦制不專已恩不忍割與衆共威威不可分德不可共洪範曰臣有作威作福玉食害于而家凶于而國天鑒孔明雖疏不失災異示人前後數矣而未見所革以復往悔自非聖人不能無過願陛下思惟所以稽古率舊勿令刑德八柄不由天子若恩從上下事依禮制禮制修則奢僭息事合宜則無凶咎然後神望允塞災消不至矣請禁圖䜟疏初光武善䜟中興之後儒者爭學圗緯附以妖言衡以虛妄上疏請禁臣聞聖人明審律歷以定吉凶重之以卜筮雜之以九宫經天驗道本盡於此或觀星辰逆順寒燠所由或察龜䇿之占巫覡之言其所因者非一術也立言於前有徵於後故智者貴焉謂之䜟書䜟書始出蓋知之者寡自漢取秦用兵力戰功成業遂可謂大事當此之時莫或稱䜟若夏侯勝眭孟之徒以道術立名其所述著無䜟一言劉向父子領校祕書閲定九流亦無䜟録成哀之後乃始聞之尚書堯使鯀理洪水九載績用不成鯀則殛死禹乃嗣興而春秋䜟云共工理水凡䜟皆云黃帝伐蚩尤而詩䜟獨以為蚩尤敗然後堯受命春秋元命包中有公輸班與墨翟事見戰國非春秋時也又言别有益州益州之置在於漢世其名三輔諸陵世數可知至於圖中訖於成帝一卷之書互異數事聖人之言藝無若是殆必虛僞之徒以要世取資往者侍中賈逵擲䜟互異三十餘事諸言䜟者皆不能說至於王莽篡位漢世大禍八十篇何為不戒則知圖䜟成於哀平之際也且河洛六藝篇録已定後人皮傅無所容篡永元中清河宋景遂以歷紀推言水災而僞稱洞視玉版或者至於棄家業入山林後皆無效而復采前世成事以為證驗至於永建復統則不能知此皆欺世罔俗以昧執位情僞較然莫之糾禁且律歷卦候九宫風角數有徵效世莫肯學而競稱不占之書譬猶畫工惡圖犬馬而好作鬼魅誠以實事難形而虛僞不窮也宜收藏圖䜟一禁絶之則朱紫無所眩典籍無瑕玷矣論舉孝廉疏汝南謝廉河南趙建年始十二各能通經尚書令左雄並奏拜童子郎自是負書來學雲集京師侍中張衡上疏此順帝時自初舉孝廉到今二百年必先孝行行有餘力乃草文法耳今詔書一以能誦章句結奏案為限雖有至孝不當其科所謂損本而求末者也自改試以來纍有妖星震裂之菑是天意不安於此法故也論貢舉疏古者以賢取士諸侯歲貢孝武之代郡舉孝廉又有賢良文學之選於是名臣皆出文武並興漢之得人數路而已夫書畫辭賦才之小者匡國理政未有能焉陛下即位之初先訪經術聽政餘日觀省篇章聊以游藝當代博奕非以教化取士之本而諸生競利作者鼎沸其高者頗引經訓風喻之言下則連偶俗語有類俳優或竊成文虛冒名氏臣每受詔於盛化門差次録第其未及者亦復隨輩皆見拜擢既加之恩難復收改但守俸祿於義已加不可復使理人及任州郡昔孝宣㑹諸儒於石渠章帝集學士於白虎通經釋義其事優大文武之道所宜從之乃若小能小善雖有可觀孔子以為致逺則泥君子故當致其大者逺者也並杜氏通典水災對策水者五行之首滯而逆流者人君之恩不能下及而教逆也敦煌實録日蝕上表衡為太史令表奏後漢書注云不詳是何年三月今年三月朔方覺日蝕此郡懼有兵患臣愚以為可敕北邉須塞郡縣明烽火逺斥堠深藏固閉無令穀畜外露請專事東觀疏表臣仰幹史職敢徼官守竊貪成訓自忘頑愚願得專於東觀畢力於紀記竭思於補闕俾有漢休烈比久長於天地並光明於日月昭示萬嗣永永不朽也求合正三史表初學記臣伏見陛下思光先緒以典籍為本而史書枝别條異不同一貫建武以來新載未就條上司馬遷班固二史易稱宓戲氏王天下宓戲氏沒神農氏作神農氏沒黃帝堯舜氏作史遷獨載五帝不記三皇今宜并録又一事曰帝系黃帝産青陽昌意周書曰乃命少皥清清即青陽也今宜實定之與崔瑗書衡善機巧尤致思於天文隂陽歷算嘗好𤣥經與瑗書乃者朝賀明日讀太𤣥經知子雲特極隂陽之數也非特傳記之屬心實與五經擬漢家得二百歲卒乎𤣥四百歲其興乎足下纍世窮道極微子孫必命世不絶冝幅寫一通藏之以待能者陸績述𤣥陸績云漢元至今四百年矣其道大顯同前後漢書作衡謂崔瑗而文略異吾觀太𤣥方知子雲妙極道數乃與五經相擬非徒傳記之屬端力精思以揆其義使人難論隂陽之事漢家得天下二百歲之書也復二百歲殆將終乎所以作者之數必顯一世常然之符也漢四百歲𤣥其興矣章懷太子注云並衡與崔瑗書後漢書今本無端力一句漢紀亦云衡謂崔瑗而語前後相互端力作竭已與特進書安帝聞衡善術學徵拜郎中再遷太史令順帝初再轉復為太史令蓬萊太史之祕府道家所貴衡再得當之竊為幸矣北堂書鈔選注衡與特進書以為鉛刀强可一割又云其言之不慙恃惠子之知我又云酸者不能不苦于言東巡誥惟二月初吉帝將狩於岱嶽展義省方觀民設教丙寅朏率羣賔備法駕以祖於東門乙酉觀禮於魯而休齊焉巳丑届於靈宫是日也有鳯雙集於臺壬辰祀上帝於明堂帝曰咨豫不材為天地主懷栗翹翹百僚萬機心之謂矣孰朕之勞上帝有靈不替朕命誕敢不祗承凡庶與祭於壇墠之位者曰懷爾邦為實願先帝載厥太宗以左右朕躬羣臣曰帝道橫被旁行海表一人有韙萬民賴之從巡助祭者兹惟嘉瑞乃歌曰皇皇者鳳通𤣥知時萃於山趾與帝邀期吉事有祥惟漢之祺帝曰朕不敢當亦不敢蔽天之吉命藝文類聚綬笥銘南陽太守鮑德有詔所賜先公綬笥傳世用之德更理笥衡時為德主簿作銘曰懿矣兹笥爰藏寶珍金纓組履文章日信皇用我賜俾作帝臣服其令服鸞封艾緡天祚明德大賚福人垂光厥世子孫克神厥器惟舊中實惟新周公惟事七㳙有鄰古文苑南陽文學儒林書贊北堂書鈔南陽太守上黨鮑君愍文學之㢮廢懷儒林之陵遲乃命匠修而新之崇肅肅之儀揚濟濟之化大司農鮑德誄昔君烈祖平顯奕世敬叔生牙美管交賴至於中葉種德以邁種德伊何去虛適參建旄屯留其茂如林降及我君總角有聲遺䝉萬穀寵祿斯丁守約勤學克勞其形濬哲之資日就月成業業學徒童䝉求我舍厥往著去風即雅濟濟京河實為西魯昔我南都惟帝舊鄉同於郡國殊於表章命親如公辨冕鳴橫若惟允之實耀其光導以仁惠教以義方習射瞿相享老虞庠羌髠作虐艱我西鄰君斯整旅耀武月頻蠢蠢戎虜是懾是震知德者鮮惟君克舉既厭帝心將處台輔命有不永時不我與天實為之孰其能禦股肱或毁何痛如之國喪遺愛如何不思司空陳公誄敬仲初育發繇卜筮鳳飛觀國流光末裔天祚眀德德茂於公入孝出友爰肅爰雍兼學多識窮理知機德音孔昭翻爾灰飛賦政二城還集皇闈公實省之亹亹庶績公實靜之藹藹百僚公實愍之乃陟司空纂禹之跡導揚徽庸致訓京畿協和萬邦萬邦既協殊服來同眇論前績莫與比蹤司徒呂公誄昔呂皇祖帝交之緒伯夷秩唐唐宗允敘四嶽在虞敷土佐禹克厭帝心姓姜氏吕登是南邦以家以處降及於周穆侯作輔寡於九族九族用寧登受八命衮職靡傾黃耳金鉉公餗以盈綽兮其寬皎兮其清既明且哲式保令名斿旍從風駟牡超驤去此寧㝢歸於幽堂𤣥室冥冥修夜彌長七辨無為先生祖述列仙背世絶俗唯誦道篇形虗年衰志猶不遷於是七辨謀焉曰無為先生淹在幽隅藏聲隱景剗跡窮居抑其不韙盍往辨諸乃階而就之虛然子曰樂國之都設為閒館工輸制匠譎詭煥爛重屋百層連閣周漫應門鏘鏘華闕雙建雕蟲彤緑螭虹蜿蜒於是彈比翼落鸝黃加雙鶤經鴛鴦然後櫂雲舫觀中流搴芙蓉集芳洲縱文身搏潛鱗探水玉拔瓊根妝明月之照曜玩赤瑕之璘豳此宫室之麗也子盍歸而處之乎雕華子曰𤣥清白醴蒲陶醲􅳔嘉肴雜醢三臡七菹荔枝黃柑寒梨韓榛沙餳石蜜逺國儲珍於是乃有芻豢腯牲麋麛豹胎飛鳬棲鷩養之以時審其齊和適其辛酸芳以薑椒拂以桂蘭㑹稽之菰冀野之粱珍羞雜遝灼爍芳香此滋味之麗也子盍歸而食之安存子曰淮南清歌燕餘材舞列乎前堂遞奏代敘結鄭衛之遺風揚流哇而脉激楚鼙鼓協吹竽籟應律金石合奏妖冶邀㑹觀者交目衣解忘帶於是樂中日晚移即昏庭美人妖服變曲為清改賦新詞轉歌流聲此音樂之麗也子盍歸而聽諸闕丘子曰西施之徒姿容修嫮弱顔回植姸夸間暇形似削成腰如約素淑性窈窕秀色美豔鬒髮𤣥髻光可以鑒靨輔巧笑清侔流盼皓齒朱唇的皪粲練於是紅華曼理遺芳酷烈侍夕先生同兹宴假明蘭燈指圖觀列蟬綿宜愧夭紹紆折此女色之麗也子盍歸而從之空桐子曰交址緅絺筒中之紵京城阿縞譬之蟬羽製為時服以適寒暑駟秀騏之駮駿載軨獵之輶車建采虹之長旃系雌霓而為旗逸駭飈於青邱超廣漢而永逝此輿服之麗也子盍歸而乘之依衛子曰若夫赤松王喬羡門安期噓吸沆瀣飲醴茹芝駕應龍戴行雲桴弱水越炎氛覽八極度天垠上游紫宫下棲崑崙此神仙之麗也子盍行而求之先生乃興而言曰吁美哉吾子之誨穆如清風啓乃嘉猷實慰我心矯然傾首邪睨𤣥圃軒臂矯翼將飛未舉髣無子曰在我聖皇躬勞至思參天兩地匪怠厥司率由舊章遵彼前謀正邪理謬靡有所疑旁窺八索仰鏡三墳講禮習樂儀則彬彬是以英人底材不賞而勸學而不厭教而不倦於是二八之儔列乎帝庭揆事施教地平天成然後建明堂而班辟雍和邦國而悅逺人化明如日下應如神漢雖舊邦其命維新而先生乃翻然回面曰君子一言於是觀智先民有言談何容易豫雖䝉蔽不敏指趣敬授教命敢不是務應間順帝初衡復為太史令衡不慕當世積年不徙自去史職五載復還乃設客間作應間以見其志有間余者曰蓋聞前哲首務務於下學上達佐國理民有云為也朝有所聞則夕行之立功立事式昭德音是故伊尹思使君為堯舜而民處唐虞彼豈虛言而已哉必旌厥素爾咎單巫咸實守王家申伯樊仲實幹周邦服衮而朝介圭作瑞厥跡不朽垂烈後昆不亦丕歟且學非以要利而富貴萃之貴以行令富以施惠惠施令行故易稱以大業質以文美實由華興器賴雕飾為好人以輿服為榮吾子性德體道篤信安仁約已博藝無堅不鑽以思世路斯何逺矣曩滯日官今又原之雖老氏曲全進道若退然行亦以需必也學非所用術有所仰故臨川將濟而舟楫不存焉徒經思天衢內昭獨智固合理民之式也故嘗見謗於鄙儒深厲淺揭隨時為義曾何貪於支離而習其孤技耶參輪可使自轉木雕猶能獨飛巳垂翅而還故棲盍亦調其機而銛諸昔有文王自求多福人生在勤不索何獲曷若卑體屈已美言以相尅鳴於喬木乃金聲而玉振之用後勳雪前吝婞佷不柔以意誰靳也應之曰是何觀同而見異也君子不患位之不尊而患德之不崇不恥祿之不夥而恥智之不博是故藝可學而行可力也天爵髙懸得之在命或不速而自懷或羡旃而不臻求之無益故智者偭而不思阽身以徼幸固貪夫之所為未得而豫喪也枉尺直尋議者譏之盈欲虧志孰云非羞於心有猜則簋飱饌脯猶不屑餐旌瞀以之意之無疑則兼金盈百而不嫌辭孟軻以之士或解短褐而襲黼黻或委臿築而據文軒者度德拜爵量績受祿也輸力致庸受必有階渾元初基靈軌未紀吉凶分錯人用朣朦黃帝為斯深慘有風后者是焉亮之察三辰於上跡禍福乎下經緯歷數然後天步有常則風后之為也當少昊清陽之末實或亂德人神雜擾不可方物重黎又相顓頊而申理之日月即次則重黎之為也人各有能因藝受任鳥師别名四叔三正官無二業事不並濟晝長則宵短日南則景北天且不堪兼况以人該之夫𤣥龍迎夏則凌雲而奮鱗樂時也涉冬則淈泥而潛蟠避害也公旦道行故制典禮以尹天下懼教誨之不從有人之不理仲尼不遇故論六經以俟來辟恥一物之不知有事之無範所考不齊如何可一夫戰國交爭戎車競驅君若綴旒人無所麗燭武縣縋而秦伯退師魯連係箭而聊城弛柝從往則合橫來則離安危無常要在說夫咸以得人為梟失士為尤故樊噲披帷入見髙祖髙祖踞洗以對酈生當此之㑹乃黿鳴而鱉應也故能同心戮力勤恤人隱奄受區夏遂定帝位皆謀臣之由也故一介之策各有攸建子長諜之爛然有第夫女魃北而應龍翔洪鼎聲而軍容息溽暑至而鶉火棲寒氷沍而黿鼉蟄今也皇澤宣洽海外混同萬方億醜并質共劑若修成之不暇尚何功之可立立事有三言為下列下列且不可庶矣奚冀其二哉於兹縉紳如雲儒士成林及津者風攄失塗者幽僻遭遇難要趨偶為幸世易俗異事勢舛殊不能通其變而一度以揆之斯契船而求劍守株而伺也冒愧逞願必無仁以繼之有道者所不履也越王句踐事此故厥緒不永捷徑邪至我不忍以投步于進苟容我不忍以歙肩雖有犀舟徑楫猶人涉卬否有須者也姑亦奉順敦篤守以忠信得之不休不獲不吝不見是而不惛居下位而不憂允上德之常服焉方將師天老而友地典與之乎髙睨而大談孔甲且不足慕焉稱殷彭及周聃與世殊技固孤是求子憂朱泙曼之無所用吾恨輪扁之無所教也子覩木雕獨飛愍我垂翅故棲吾感去蛙附鴟悲爾先笑而後號也斐豹以斃督燔書禮至以掖國作銘弦髙以牛餼退敵墨翟以縈帶全城貫髙以端辭顯義蘇武以秃節效貞蒲且以飛矰逞巧詹何以沈鉤致精奕秋以棋局取譽王豹以清謳流聲僕進不能參名於二立退又不能羣彼數子愍三墳之既頺惜八索之不理庶前訓之可鑽聊朝隱乎柱史且韞櫝以待價踵顔氏以行止曾不慊夫晉楚敢告誠於知己渾儀後漢書注赤道橫帶渾天之腹去極九十一度十分之五黃道斜帶其腹出赤道表裏各二十四度故夏至去極六十七度而强冬至去極百一十五度亦强也然則黃道斜截赤道者則春分秋分之去極也今此春分去極九十少秋分去極九十一少者就夏厯景去極之法以為率也上頭橫行第一行者黃道進退之數也本當以銅儀日月度之則可知也以儀一歲乃竟而中間又有隂雨難卒成也是以作小渾盡赤道黃道乃各調賦三百六十五度四分之一從冬至所在始起令之相當值也取北極及衡各誠㭬之為軸取薄竹篾穿其兩端令兩穿中間與渾半等以貫之令察之與渾相切摩也乃從減半起以為八十二度八分之五盡衡減之半焉又中分其篾拗去其半令其半之際正直與兩端減半相直令篾半之際從冬至起一度一移之視篾之半際夕多黃赤道幾也其所多少則進退之數也從北極數之則元極之度也各分赤道黃道為二十四氣一氣相去十五度十六分之七每一氣者黃道進退一度焉所以然者黃道直時去南北極近其處地小而橫行與赤道且等故以篾度之於赤道多也設一氣令十六日皆常率四日差少半也令一氣十五日不能半耳故使中道三日之中若少半也三氣一節故四十六日而差今三度也至於差三之時而五日同率者一其實節之間不能四十六日也今殘日居其策故五日同率也其率雖同先之皆强後之皆弱不可勝計取至於三而復有進退者黃道稍斜於橫行不得度故也春分秋分所以退者黃道始起更斜矣於橫行不得度故也亦每一氣一度焉三氣一節亦差三度也至三氣之後稍逺而直故橫行得度而稍進也立春立秋橫行稍退矣而度猶云進者以其所退減其所進猶有盈餘未盡故也立夏立冬橫行稍進矣而度猶退者以其所進增其所退猶有不足未畢故也以此論之日行非有進退而以赤道重廣黃道使之然也本二十八宿相去度數以赤道為强耳故於黃道亦進退也冬至在斗二十一度少半最逺時也而此厯斗二十度俱百一十五强矣冬至宜與之同率焉夏至在井二十一度半强最近時也而此厯井二十三度俱六十七度强矣夏至宜與之同率焉靈憲昔在先王將步天路用之靈軌尋緒本元先準之於渾體是為正儀立度而皇極有逌建也樞運有逌稽也乃建乃稽斯經天常聖人無心因兹以生心故靈憲作興曰太素之前幽清𤣥靜寂漠冥默不可為象厥中惟靈厥外惟無如是者永久焉斯謂溟涬蓋乃道之根也道根既建自無生有太素始萌萌而未兆并氣同色渾沌不分故道志之言云有物渾成先天地生其氣體固未可得而形其遲速固未可得而紀也如是者又永久焉斯謂龎鴻蓋乃道之幹也道幹既育有物成體於是元氣剖判剛柔始分清濁異位天成於外地定於內天體於陽故圓以動地體於隂故平以靜動以行施靜以合化堙鬱構精時育庶類斯謂太元蓋乃道之實也在天成象在地成形天有九位地有九域天有三辰地有三形有象可效有形可度情性萬殊旁通感薄自然相生莫之能紀於是人之精者作聖實始紀綱而經緯之八極之維徑二億三萬二千三百里南北則短減千里東西則廣增千里自地至天半於八極則地之深亦如之通而度之則是渾已將覆其數用重鉤股懸天之景薄地之義皆移千里而差一寸得之過此而往者未之或知也未之或知者宇宙之謂也宇之表無極宙之端無窮天有兩儀以儛道中其可覩樞星是也謂之北極在南者不著故聖人弗之名焉其世之遂九分而減二陽道左回故天運左行有驗於物則人氣左嬴形左繚也天以陽回地以隂淳是故天致其動稟氣舒光地致其靜承施候明天以順動不失其中則四序順至寒暑不減致生有節故品物用生地以靈靜作合承天清化致養四時而後育故品物用成凡至大莫如天至厚莫若地地至質者曰地而已至多莫若水水精為漢漢用於天而無列焉思次質也地有山嶽以宣其氣精種為星星也者體生於地精成於天列居錯跱各有逌屬紫宫為皇極之居太微為五帝之廷明堂之房大角有席天市有坐蒼龍連踡於左白虎猛據於右朱雀奮翼於前靈龜圈首於後黃神軒轅於中六擾既畜而狼黿魚鱉罔有不具在野象物在朝象官在人象事於是備矣懸象著明莫大乎日月其徑當天周七百三十六分之一地廣二百四十二分之一日者陽精之宗積而成鳥象烏而有三趾陽之類其數竒月者隂精之宗積而成獸象隂之類其數耦其後有憑焉者羿請無死之藥於西王母姮娥竊之以奔月將往枚筮之於有黃有黃筮之曰吉翩翩歸妹獨將西行逄天晦芒毋驚毋恐其後大昌姮娥遂託身於月是為蟾蜍夫日譬猶火月譬猶水火則外光水則含景故月光生於日之所照魄生於日之所蔽當日則光盈就日則光盡也衆星被耀因水轉光當日之衝光常不合者蔽於地也是謂暗虛在星星微月過則食日之薄地其明也繇暗視明明無所屈是以望之若火方於中天天地同明繇明瞻暗暗還自奪故望之若水火當夜而揚光在晝則不明也月之於夜與日同而差微星則不然強弱之差也衆星列布其以神著有五列焉是為三十五名一居中央謂之北斗動變挺占實司王命四布於方為二十八宿日月運行歷示吉凶五緯經次用告禍福則天心於是見矣中外之官常明者百有二十四可名者三百二十為星二千五百而海人之占未存焉微星之數蓋萬一千五百二十庶物蠢蠢咸得繫命不然何以總而理諸夫三光同形有似珠玉神守精存麗其職而宣其明及其衰神歇精斁於是乎有隕星然則奔星之所墜至則石文曜麗乎天其動者七日月五星是也周旋右回天道者貴順也近天則遲逺天則速行則屈屈則留回留回則逆逆則遲迫於天也行遲者覿於東覿於東屬陽行速者覿於西覿於西屬隂日與月此配合也攝提熒惑地侯見辰附於日也太白辰星見昏附於月也二隂三陽參天兩地故男女取焉方星巡鎮必因常度茍或盈縮不逾於次故有列司作缺曰老子四星周伯王逄芮各一錯乎五緯之間其見無期其行無度實妖經星之所然後吉凶宣周其祥可盡蔡雍表志曰言天體者有三家一曰周髀二曰宣夜三曰渾天宣夜之學絶無師法周髀數術具存考驗天狀多所違失故史官不用惟渾天者近得其情今史官所用候臺銅儀則其法也立尺圓體之度而具天地之象以正黃道以察發斂以行日月以步五緯精微深妙萬世不易之道也官有其器而無本書前志亦闕而不論臣求其舊文連年不得在東觀以治律未竟未及成書案略求索竊不自量卒欲寢伏儀下思惟精意案度成數扶以文義潤以道術著成篇章罪惡無狀投畀有北灰滅兩絶世路無由宜博問羣臣下及巖穴知渾天之意者使述其義以裨天文志撰建武以來星變彗孛占驗著明者續其後隋書靈應太平御覽崑崙東南有赤縣之州風雨有時寒暑有節苟非此州南則多暑北則多寒東則多陽西則多隂故聖王不處焉馬融字季長援兄子嚴之子校書郎歷南郡太守復拜議郎廣成頌融拜校書郎詣東觀典校祕書是時鄧太后臨朝騭兄弟輔政謂文德可興武功宜廢遂寢搜狩之禮息戰陳之法故猾賊從橫乘此無備融乃感激以為文武之道聖賢不墜五才之用無或可廢元初二年上廣成頌以諷諌頌奏忤鄧氏滯於東觀十年不調臣聞孔子曰奢則不遜儉則固奢儉之中以禮為界是以蟋蟀山樞之人並刺國君諷以太康馳驅之節夫樂而不荒憂而不困先王所以平和府藏頥養精神致之無疆故戛擊鳴球載於虞謨吉日車攻序於周詩聖主賢君以增盛美豈徒為奢淫而已哉伏見元年以來遭值厄運陛下戒懼災異躬自菲薄荒棄禁苑廢弛樂懸勤憂潛思十有餘年以過禮數重以皇太后體唐堯親九族篤睦之德陛下履有虞蒸蒸之孝外舍諸家每有憂疾聖恩普勞遣使交錯稀有曠絶時時寧息又無以自娛樂殆非所以逄迎太和禆助萬福也臣愚以為雖尚頗有蝗蟲今年五月以來雨露時澍祥應將至方涉冬節農事閒隙宜幸廣成覽原隰觀宿麥勸收藏因講武校獵使寮庶百姓復覩羽旄之美聞鐘鼓之音歡欣喜樂鼓舞疆畔以迎和氣招致休慶小臣螻蟻不勝區區職在書籍謹依舊文重述搜狩之義作頌一篇并封上淺陋鄙薄不足觀省臣聞昔命師於鞬櫜偃伯於靈臺或人嘉而稱焉彼固未識夫雷霆之為天常金革之作昏明也自黃炎之前傳道罔記三五以來越可略聞且區區之酆郊猶廓七十里之囿盛春夏之苗詩詠囿草樂奏騶虞是以大漢之初基也宅兹天邑總風雨之㑹交隂陽之和揆厥靈囿營於南郊徒觀其埛場區宇恢胎曠蕩藐敻勿罔寥豁鬱泱騁望千里天與地莽於是周阹環瀆右矕三塗左概嵩嶽面據衡隂箕背王屋浸以波溠夤以滎洛金山石林殷起乎其中峨峨磑磑鏘鏘􅞐􅞐隆穹槃回嵎峗錯崔神泉側出丹水涅池怪石浮磬耀焜於其陂其土毛則榷牧薦草芳茹甘荼茈萁藝蒩昌本深蒲芝荋堇荁蘘荷芋蕖桂荏鳬葵格韭菹于其植物則𤣥林包竹藩陵蔽京珍林嘉樹建木叢生椿梧栝柏櫃柳楓楊豐彤對蔚崟額槮爽翕習春風含津吐榮鋪於布濩蓶扈蘳熒惡可殫形至於陽月隂慝害作百草畢落林衡戒田焚萊柞木然後舉天網頓八絃揫斂九藪之動物繯櫜四野之飛征鳩之乎兹囿之中山敦雲移羣鳴膠膠鄙騃譟歡子野聽聳離朱目眩𨽻首策亂陳子籌昏於時營圍恢廓充斥川谷罦罝羅羉彌綸坑澤臯牢陵山校隊案部前後有屯甲乙相伍戊巳為堅乘輿乃以吉月之陽朔登於疏鏤之金路六驌騻之𤣥龍建雄虹之旌夏揭鳴鳶之修橦曳長庚之飛髾載日月之太常棲招搖與𤣥弋注枉矢於天狼羽毛紛其髟鼬揚金㚇而拖玉瓖屯田車於平原播同徒於髙岡旃旝摻其如林錯五色以摛光清氛埃掃野場誓六師搜雋良司徒勒卒司馬平行車攻馬同教達戒通伐咎鼓撞華鐘獵徒縱赴榛叢徽嫿霍奕别騖分奔騷擾聿皇往來交舛紛紛回回南北東西風行雲轉胸礚隱訇黃塵勃滃暗若霧昏日月為之籠光列宿為之翳昧僄狡課才徑勇程氣狗馬角逐鷹鸇競鷙驍騎旁佐輕車橫厲相與陸梁聿皇於中原絹猑蹄鏦特肩脰完羝撝介鮮散毛族梏羽羣然後飛鋋電激流矢雨墜各指所質不期俱殪竄伏扔輪發作梧轊祋殳狂擊頭陷顱碎獸不得猭禽不得瞥或夷由未殊顛狽頓躓蠕蠕蟫蟫充衢塞隧葩華蓱布不可勝計若夫鷙獸毅蟲倨牙黔口大胸哨後縕巡歐紆負隅依阻莫敢嬰禦乃使鄭叔晉婦之徒暌孤刲刺裸裎袒裼冒􅞢柘搓棘枳窮浚谷底幽嶰暴斥虎搏狂兕獄􅀢熊抾封狶或輕訬趬悍廋疏㟺領犯歷嵩巒陵喬松履修樠踔攳枝杪標端尾蒼蜼掎𤣥猿木産盡寓屬單罕罔合部罾弋同曲類行並驅星布麗屬曹伍相保各有分局矰碆飛流纖羅絡縸遊雉羣驚晨鳬輩作翬然雲起霅爾雹落爾乃􅀢觀髙蹈改乘回轅泝恢方撫馮夷䇿句芒超荒忽出重陽厲雲漢橫天潢導鬼區徑神場詔靈寶召方相驅厲疫走蜮祥捎罔兩拂游光枷天狗緤墳羊然後緩節舒容裴回安步降集波籞川衡澤虞矢魚陳罟兹飛宿沙田開古蠱翬終葵揚關斧刋重氷撥蟄戶測潛鱗踵介旅逆獵湍瀨渀薄汾撓淪滅潭淵左挈夔龍右提蛟鼉春獻王鮪夏薦鱉黿於是流覽遍照殫變極態上下究竟山谷蕭條原野嵺愀上無飛鳥下無走獸虞人植旍獵者效具車弊田罷旋入禁囿棲遲乎昭明之觀休息乎髙光之榭以臨乎宏池鎮以瑶臺純以金堤樹以蒲栁被以緑莎瀇漾沆漭錯紾槃委天地虹洞固無端涯大明生東月朔西陂乃命壺涿驅水蠱逐罔螭滅短狐簎鯨鯢然後方餘皇連舼舟張雲帆施霓幬靡颸風陵迅流發棹歌縱水謳淫魚出蓍蔡浮湘靈下漢女游水禽鴻鵠鴛鴦鷗鷖鶬鴰鸕鷁鷺鴈鸊鷉乃安斯寢戢翮其涯魴鱮鱏鯿鰋鯉鱨鯊樂我純德騰踊相隨雖靈沼之白鳥孟津之躍魚方斯蔑矣然猶詠歌於伶蕭載陳於方䇿豈不哀哉於是宗廟既享庖厨既盈車徒既簡器械既攻然後擺牲班禽淤賜犒功羣師疊伍伯校千重山罍常滿房俎無空酒正案隊膳夫巡行清醪車湊燔炙騎將鼓駭舉爵鐘鳴既觴若乃陽阿衰裴之晉制闡蛙華羽之南音所以洞蕩胸臆發明耳目疏越蘊慉駭恫底伏鍠鍠鎗鎗奏於農郊大路之衢與百姓樂之是以明德耀乎中夏威靈暢乎四荒東鄰浮巨海而入享西旅越蔥嶺而來王南徼因九譯而致貢朔狄屬象胥而來同蓋安不忘危治不忘亂道在乎兹斯固帝王之所以曜神武而折遐衝者也方今大漢收功於道德之林致平於仁義之淵忽搜狩之禮闕槃虞之佃暗昧不覩日月之光聾昏不聞雷霆之震於今十二年為日久矣亦方將刋禁臺之祕藏發天府之官常由質要之故業率典刑之舊章采清原嘉岐陽登俊傑命賢良舉淹滯拔幽荒察淫侈之華譽顧介特之實功聘畎畝之羣雅宗重淵之潛龍乃儲精山藪歷思河澤目矖鼎俎耳聽康衢營傅說於胥靡求伊尹於庖厨索膠鬲於魚鹽聽寧戚於大車俾之昌言而宏議軼越三家馳騁五帝悉覽休祥總括羣瑞遂棲鳳凰於高梧宿麒麟於西園納僬僥之珍羽受王母之白環永逍遙於宇內與二儀乎無疆二造化於后土參神施於昊乾超特達而無儔煥巍巍而無原豐千億之子孫歷萬載而永延禮樂既闋北轅返斾至自新城背伊闕反洛京東巡頌安帝親政召融還郎署復在講部出為河間王廄長時車駕東巡岱宗融上東巡頌帝竒其文召拜郎中允迪在昔紹烈陶唐殷天衷克搖光若時則運瓊衡敷六典經八成肆類乎上帝實柴乎三辰禋祀乎六宗祗燎乎羣神遂發號羣司申戒百工卜筮稱吉蓍龜襲從南征有時馮相告祥清夷道而後行曜四國而揚光展聖義於巡狩喜圻畤而咏八荒指宗嶽以為期固岱神之所望散齊既畢越翼良辰棫槱增搆烈火燔燃暉光四煬炎爛薄天蕭香肆升青烟冒雲圭璋峩峩犧牲潔純鬱鬯宗彝明水𤣥樽空桑孤竹咸池雲門六八匝變神祇並存太平御覽經八成下有變和萬殊總領神明二句上安帝請龎參等書元初中參為護羌校尉擊先零羌為其所敗乃稱病引兵還坐詐徵下獄校書郎中馬融上書請之書奏赦參等伏見西戎反畔寇鈔五州陛下愍百姓之傷痍哀黎元之失業單竭府庫以奉軍師昔周宣獫狁侵鎬及方孝文胸奴亦略上郡而宣王立中興之功文帝建太宗之號非惟兩主有明睿之資抑亦扞城有虓虎之助是以南仲赫赫列在周詩亞夫赳赳載於漢策竊見前護羌校尉龎參文武昭備智略𢎞逺既有義勇果毅之節兼以博雅深謀之姿又度遼將軍梁慬前統西域勤苦數年逺留三輔功效克立間在北邉單于降服今皆幽囚陷於法網昔荀林父敗績於邲晉侯使復其位孟明視喪師於崤秦伯不替其官故晉景并赤狄之土秦穆遂霸西戎宜逺覽二君使參慬得在寬宥之科誠有益於折衝毗佐於聖化上論日蝕疏建光四年三月戊午朔日有蝕之在胃十二度隴西酒泉朔方各以狀上史官不覺是時融為許令上書伏讀詔書陛下深惟禹湯罪已之義歸咎自責寅畏天戒詳延百僚博問公卿知變所自審得厥故修復往術以答天命臣子逺近莫不延頸企踵苟有隙空一介之知事願自效貢納聖聽臣伏見日蝕之占自昔典籍十月之交春秋傳記漢注所載史官占候羣臣密對陛下所觀覽左右所諷誦可謂詳悉備矣雖復廣問陷在前志無以復加乃者茀氣於參臣前得敦朴之人後三年二月對策北宫端門以為參者西方之位其於分野并州是也殆謂西戎北狄其後種羌叛戻烏桓犯上郡并凉動兵驗略效矣今復見大異申誡重譴於此二城海內莫見三月一日合辰在婁婁又西方之宿衆占顯明者羌及烏桓有悔過之辭將吏䇿勳之名臣恐受任典牧者茍脫目前皆粗圖身一時之權不顧為國百世之利論者美近功忽其逺則各相不大疢病伏惟天象不虛老子曰圖難於其易也為大於其細也消災復異宜在於今詩曰日月告凶不用其行四國無政不用其良傳曰國無政不用善則自取謫干日月之災故政不可不慎也務三而已一曰擇人二曰安民三曰從時臣融伏惟方今有道之世漢典設張侯甸采衛司民之吏案繩循墨雖有殿最所差無幾其陷罪辟身自取禍百姓未被其大傷至邉郡牧御失和吉之與凶敗之與成優劣相懸不誡不可審擇其人上以應天變下以安民𨽻竊見列將子孫生長京師食仰租奉不知稼穡之艱又希遭厄困故能果毅輕財施與孤弱以獲死生之用此其所長也不拘法禁奢泰無度功勞足以宣威踰濫足以傷化此其所短也州郡之士出自貧苦長於檢柙難專賞罰不敢越溢此其所長也拘文守法遭遇非常狐疑無斷畏首畏尾威恩纎薄外內離心士卒不附此其所短也必得將兼有二長之才無二短之纍參以吏事任以兵法有此數姿然後能折衝厭難致其功實轉災為福孔子曰十室之邑必有忠信如丘者焉以天下之大四海之衆云無若人臣以為誣矣宜特選詳譽審得其真鎮守二方以應用良擇人之義以塞大異也馬融集漢書注上順帝乞自效疏融陽嘉中大將軍梁商表為從事中郎轉武都太守時西羌反叛征西將軍馬賢與護羌校尉胡疇征之稽久不進融知其將敗上疏乞自效朝廷不能用今雜種諸羌轉相鈔盜宜及其未并亟遣深入破其支黨而馬賢等處處留滯羌胡百里望塵千里聽聲今逃匿避回漏出其後則必侵冦三輔為民大害臣願請賢所不可用關東兵五千裁假部隊之號盡力率厲埋根行首以先吏士三旬之中必克破之臣少習學藝不更武職猥陳此言必受誣罔之辜昔毛遂厮養為衆所蚩終以一言克定從要臣懼賢等專守一城言攻於西而羌出於東且其將士必有髙克潰叛之變為梁冀誣奏太尉李固書質帝初立梁太后委任宰輔固多所匡正冀每相忌疾遂誣奏固時融在座為冀章草冀長史吳祐面責融曰李公之罪成於卿手冀怒起入祐亦竟去書奏太后不聽臣聞君不稽古無以承天臣不述舊無以奉君昔堯殂之後舜仰慕三年坐則見堯於墻食則覩堯於羮斯所謂聿追來孝不失臣子之節者太尉李固因公假私依正行邪離間近戚自隆支黨至於表舉薦達例皆門徒及所辟召靡非先舊或富室財賂子壻婚屬其列在官牒者凡四十九人又廣選賈豎以補令史募求好馬臨窗呈試出入踰侈輜軿曜日大行在殯路人掩涕固獨胡粉飾貌搔頭弄姿槃旋偃仰從容冶步曾無慘怛傷悴之心山陵未成違矯舊制善則歸已過則歸君斥逐近臣不得侍送作威作福莫固之甚臣聞台輔之位實和隂陽璇璣不平冦賊姦軌則責在太尉固受任之後東南跋扈兩州數郡千里蕭條兆人傷損大化陵遲而詆疵先主苟肆狂狷存無廷爭之忠沒有誹謗之說夫子罪莫大於纍父臣惡莫深於毁君固之過釁事合誅辟與謝伯世書頃憒憒愁思猶不解懷思在竹間放狗逐麋晚秋涉冬大蒼出籠黃棘下莵芼以乾葵以送餘日兹樂而已藝文類聚憒憒尺牘作憤憤誤以送一作自送與竇伯向書章字伯向好學有文與馬融崔瑗同好更相推薦融與章書孟陵奴來賜書見手跡歡喜何量次於面也書雖兩紙八行行七字七八五十六字百一十二言耳馬融集後漢志注馬融對䇿曰大中之道在天為北辰在地為人君忠經序忠經者蓋出於孝經也仲尼說孝者所以事君之義則知孝者俟忠而成之所以答君親之恩明臣子之分忠不可廢於國孝不可弛於家孝既有經忠則猶闕故述仲尼之說作忠經焉今皇上含庖軒之姿韞勛華之德弼賢俾能無逺不舉忠之與孝天下攸同臣融巖野之臣性則愚朴沐浴德澤其可默乎作為此經庶少禆補雖則辭理薄陋不足以稱焉忠之所存存於勸善勸善之大何以加於忠孝者哉夫定髙卑以章目引詩書以明綱吾師於古曷敢徒然其或異同者變易之宜也或對之以象其意或遷之以就其類或損之以簡其文或益之以備其事以忠應孝亦著為十有八章所以洪其至公勉其至誠信本為政之大體陳事君之要道始於立德終於成功此忠經之義也謹序高彪字義方吳郡無錫人除郎中校書東觀終內黃令遺馬融書彪為諸生游太學有雅才而訥於言嘗從馬融欲訪大義融疾不獲見乃覆刺遺融書融省書慙追還之彪逝而不顧承服風問從來有年故不待介者而謁大君子之門冀一見龍光以敘腹心之願不圖遭疾幽閉莫啓昔周公旦父文兄武九命作伯以尹華夏猶揮沐吐餐垂接白屋故周道以隆天下歸德公今養痾傲士故其宜也後漢書同前後漢雜事伏聞髙問為日久矣冀一見龍光敘腹心之願以啓其蔽不圖辭之以疾昔周公父文王兄武王九命作相以尹華夏猶握沐吐食以接白屋之士天下歸德歷載邈矣今君不能相見宜哉贈第五永針彪為郎中校書東觀時京兆第五永為督軍御史使督幽州百官祖餞於長樂觀皆賦詩彪作針蔡雍等甚美其文文武將墜乃俾俊臣整我皇綱董此不䖍古之君子即戎忘身昭其果毅尚其桓桓師尚七十氣冠三軍詩人作歌如鷹如鸇天有太乙五將三門地有九變邱陵山川人有計䇿六竒五間總兹三事謀則咨詢無曰巳能務在求賢淮隂之勇廣野是尊周公大聖石碏純臣以威克愛以義滅親勿謂時險不正其身勿謂無人莫識已真忘富遺貴福祿乃存枉道依合復無所觀先公髙節越可永遵佩藏斯戒以厲終身並後漢書吳皇象文武帖明作昭師作吕黃伯思東觀餘論云作史者避晉諱非也范曅宋人寧當避晉或是司馬彪續漢諸書所傳曅未之改耳總兹二句曅書所無越可永遵帖作永越可遵許慎字叔重汝南召陵人少博學經籍馬融常推敬之為郡功曹舉孝廉再遷除洨長卒於家說文解字敘後漢書初慎以五經傳說臧否不同於是撰為五經異議又作說文解字十四篇建光中子沖上於朝至宋雍熙時詔徐鉉等校定為許氏說文解字五音韻譜古者庖犧氏之王天下也仰則觀象於天俯則觀法於地視鳥獸之文與地之宜近取諸身逺取諸物於是始作易八卦以垂憲象及神農氏結繩為治而統其事庶業其繁飾僞萌生黃帝之史倉頡見鳥獸蹄迒之跡知分理之可相别異也初造書契百工以乂萬品以察蓋取諸夬夬揚於王庭言文者宣教明化於王者朝廷君子所以施祿及下居德則忌也倉頡之初作書蓋依類象形故謂之文其後形聲相益即謂之字字者言孳乳而浸多也著於竹帛謂之書書者如也以迄五帝三王之世改易殊體封於泰山者七十有二代靡有同焉周禮八歲入小學保氏教國子先以六書一曰指事指事者視而可識察而可見上下是也二曰象形象形者畫成其物隨體詰詘日月是也三曰形聲形聲者以事為名取譬相成江河是也四曰㑹意會意者比類合誼以見指撝武信是也五曰轉注轉注者建類一首同意相受考老是也六曰假借假借者本無其字依聲託事令長是也及宣王太史籀著大篆十五篇與古文或異至孔子書六經左邱明述春秋傳皆以古文厥意可得而說其後諸侯力政不統於王惡禮樂之害已而皆去其典籍分為七國田疇異畝車涂異軌律令異法衣冠異制言語異聲文字異形秦始皇帝初兼天下丞相李斯乃奏同之罷其不與秦文合者斯作倉頡篇中車府令趙髙作爰歷篇太史令胡母敬作博學篇皆取史籀大篆或頗省改所謂小篆者也是時秦燒滅經書滌除舊典大發𨽻卒興役戍官獄職務繁初有𨽻書以趣約易而古文由此絶矣自爾秦書有八體一曰大篆二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰𨽻書漢興有草書尉律學僮十七以上始試諷籀書九千字乃得為吏又以八體試之郡移太史并課最者以為尚書史書或不正輒舉劾之今雖有尉律不課小學不修莫達其說久矣孝宣時召通倉頡讀者張敞從受之涼州刺史杜業沛人爰禮講學大夫秦近亦能言之孝平時徵禮等百餘人令說文字未央廷中以禮為小學元士黃門侍郎揚雄采以作訓纂篇凡倉頡以下十四篇凡五千三百四十字羣書所載略存之矣及亡新居攝使大司空甄豐等校文書之部自以為應制作頗改定古文時有六書一曰古文孔子壁中書也二曰奇字即古文而異者也三曰篆書即小篆秦始皇帝使下杜人程邈所作也四曰佐書即秦𨽻書五曰繆篆所以摹印也六曰鳥蟲書所以書幡信也壁中書者魯恭王壞孔子宅而得禮記尚書春秋論語孝經又北平侯張蒼獻春秋左氏傳郡國亦往往於山川得鼎彞其銘即前代之古文皆自相似雖叵復見逺流其詳可得略說也而世人大共非訾以為好竒者也故詭更正文鄉壁虛造不可知之書變亂常行以耀於世諸生競說字解經喧稱秦之𨽻書為倉頡時書云父子相傳何得改易乃猥曰馬頭人為長人持十為斗蟲者屈中也廷尉說律至以字斷法苛人受錢苛之字止句也若此者甚衆皆不合孔子古文謬於史籀俗儒鄙夫玩其所習蔽所希聞不見通學未嘗覩字例之條怪舊藝而善野言以其所知為祕妙究洞聖人之微恉又見倉頡篇中幼子承詔因號古帝之所作也其辭有神㒨之術焉其迷誤不諭豈不悖哉書曰豫欲觀古人之象言必遵修舊文而不穿鑿孔子曰吾猶及史之闕文今亡矣夫蓋非其不知而不問人用己私是非無正巧說邪辭使天下學者疑蓋文字者經藝之本王政之始前人所以垂後後人所以識古故曰本立而道生知天下之至頥而不可亂也今敘篆文合以古籀博采通人至於小大信而有證稽撰其說將以理羣類解謬誤曉學者達神恉分别部居不相雜厠萬物咸覩靡不兼載厥誼不昭爰明以諭其稱易孟氏書孔子詩毛氏禮周官春秋左氏論語孝經皆古文也於其所不知蓋闕如也敘曰此十四篇五百四十部九千三百五十三文重一千一百六十三解說凡十三萬三千四百四十一字其建首也立一為專方以類聚物以羣分同條牽屬共理相貫雜而不越據形系聯引而申之以究萬原畢終於亥知化窮冥於時大漢聖德熙明承天稽唐敷崇殷中遐邇被澤渥衍沛滂廣業甄微學士知方探賾索隱厥誼可傳粵在永元困頓之季孟陬之月朔日甲申曾曾小子祖自炎神縉雲相黃共承髙辛太嶽佐夏吕叔作藩俾侯於許世祚遺靈自彼徂召宅此汝瀕竊卬景行敢涉聖門其𢎞如何節彼南山欲罷不能既竭愚才惜道之味聞疑載疑演贊其志次列微辭知此者稀倘昭所尤庶有達者理而董之許冲慎之子進說文解字上安帝書說文本書末云召上書者汝南許冲詣左掖門㑹令并齎所上書十月十九日中黃門饒喜以詔書賜召陵公乘許冲布四十匹即日受詔朱雀掖門敕勿謝召陵萬歲里公乘草莽臣冲稽首再拜上書皇帝陛下臣伏見陛下神明盛德承遵聖業上考度於天下流化於民先天而天不違後天而奉天時萬國咸寧神人以和猶復深惟五經之妙皆為漢制博采幽逺窮理盡性以至於命先帝詔侍中騎都尉賈逵修理舊文殊藝異術王教一專苟有可以加於國者靡不悉集易曰窮神知化德之盛也書曰人之有能有為使羞其行而國其昌臣父故太尉南閣祭酒慎本從逵受古學蓋聖人不空作皆有依據今五經之道昭炳光明而文字者其本所由生自周禮漢律皆當學六書貫通其意恐巧說邪辭使學者疑慎博問通人考之於逵作說文解字六藝羣書之詁皆訓其意而天地鬼神山川草木鳥獸䖵蟲雜物奇怪王制禮儀世間人事莫不畢載凡十五卷十三萬三千四百四十一字慎前以詔書校東觀教小黃門孟生李喜等以文字未定未奏上今慎已病遣臣齎詣闕慎又學孝經孔氏古文說古文孝經者孝昭帝時魯國三老所獻建武時給事中議郎衛宏所校皆口傳官無其說謹撰具一篇并上臣沖誠惶誠恐頓首頓首死罪死罪臣䭬首再拜以聞皇帝陛下建光元年九月己亥朔二十日戊午上劉騊駼復子為郎入東觀撰定漢記諫鑄錢書夫食者乃有國之大寶生民之至貴也見比年已來良田盡於蝗螟之口杼軸空於公私之求野無青草室如懸罄所急朝夕之餐所患靡盬之事豈謂錢之鍥薄銖兩輕重哉就使當今土礫化為黃金瓦鹵變為和玉沙石悉成隋珠犬羊盡作狐白絳繡盈堂文綺縵野使百姓渴無所飲饑無所食雖犧皇之純德大禹之勤勞周文之不暇猶不能以保蕭墻之內郡太守針一作崔瑗有嬴驅除焚典紀舊蕩滅蕃畿置侯置守奏發閭左陳涉奮威楚築乾溪靈王不歸征遐由近可不肅祗守臣司境敢告執機與李子堅書下車負乘劇賊未禽又吏民彊獷比屋為賊並選注與竇季瑋書君嚼茹墳典履公修行北堂書鈔𤣥根頌北堂書鈔騊駼今刻書鈔誤作鞠餘素燕蜿蟺感清羽𤣥鶴回翔應宫徵樊長孫與劉千秋書越騎校尉劉千秋校書東觀好事者樊長孫與書千秋甚然其言與同邑張衡參議未定後漢書劉珍字秋孫一作字祕孫與劉騊駼馬融校書東觀為越騎校尉漢家禮儀叔孫通等所草創皆隨律令在禮官藏於几閣無紀録者久令二代之業暗而不彰誠宜撰次依擬周禮定位分職各有條序令人無愚智入朝不惑君以公族元老正丁其任焉可以巳胡廣注王隆小學漢官篇竇章字伯向融𤣥孫歷任大鴻臚勸葛龔書矯慎少慕松喬道引之術隱遁山谷與馬融蘇章鄉里並時然二人自謂逺不及也龔久病長水校尉竇章移書勸龔龔報之過矯仲彥論升仙之道從蘇博文談超世之髙適馬季常講墳典之妙所謂喬松可與馳騖何細疾之足患耶汝南先賢傳後漢書蘇章字孺文藝文章薦馬融文奕世不刋之文斷金之良佐葛龔字元甫梁國寧陵人和帝時以善文記知名永初中歷拜蕩隂臨汾令皆有稱績答竇章書見斯衆賢足以忘疾釋愁汝南先賢傳與張季景書夜從伯宣舍西垂過龔家無飯噉煼蝦選注引與張略書云頑暗沈沈與梁相書復惠善墨下士所無摧骸骨碎肝膽不足明報初學記北堂書鈔載蔡雍與梁相張府君書復惠良筆下士所無與梁相箋間賜襲印衣繡囊細布皆珍重纎麗北堂書鈔又曹褒寢懷鉛筆行誦文書與梁相張府君箋悠悠夢想願飛無翼又一書云龔以毛羽之身戴邱山之施未審何與並選注薦戴昱昱年七十二兄弟同居二十餘年及為宗老所分昱將妻子逃舊業入虞澤捃穫野豆拾掇螺蚌以自賑給太平御覽未否是書選注載龔喪伯父還傳記曰烏鳥之情誠竊傷痛吳蒼遺矯慎書字仲彥扶風茂陵人慎少學黃老隱遁山谷因穴為室汝南吳蒼甚重之因遺書以觀其志慎不答仲彥足下勤處隱約雖乘雲行泥棲宿不同每有西風何嘗不歎蓋聞黃老之言乘虛入冥藏身逺遁亦有理國養人施於為政至如登山絶跡神不著其證人不覩其驗吾欲先生從其可者於意何如昔伊尹不懷道以待堯舜之君方今明明四海開闢巢許無為箕山夷齊悔入首陽足下審能騎龍弄鳳翔嬉雲間者亦非狐燕雀所敢謀也後漢書皇甫謐髙士傳云邱欣字季春扶風人也少有大材自謂無伍傲世不與俗人為羣郡守召始見曰明府欲臣欣耶友欣耶明府所以尊寵人者極於功曹所以榮祿人者已於孝亷一極一已皆欣所不用也郡守異之遂不敢屈按此明為面見之語非書屬赤牘亦載作與扶風尹王尺牘云漢有右扶風無扶風尹然本傳止言郡守耳原傳載欣在後漢與矯慎相接又載入前漢並誤東漢文紀卷十三
