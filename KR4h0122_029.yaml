當讀與飾同非勞徠之徠也漢循吏故聞憙長韓仁銘篆額不載隸釋熹平四年十一月甲子朔廿二日乙酉司隸闕二字河南尹校尉空闇典統非任素無績勲寧善闕二字仁前在聞憙經國㠯禮刑政中有子産君闕二字尉表上遷槐里令除書未到㐬幸􅠊命喪身闕一字為祀則祀之王制之禮也書到郡遣吏㠯少窂祠闕一字勤異行勛厲淸恵㠯旌其美豎石訖成表言如律闕二字十一月廿二日乙酉河南尹君丞憙謂亰寫闕二字墳道頭訖成表言㑹月丗日如律令元趙秉文䟦云此碑出亰索間滎陽令李輔之行縣發地之字畫類劉寛碑韓仁漢循吏不見于史而見于此正大六年滎陽縣令李天翼再立石今存帝堯碑篆額四年熹平帝堯者盖㫺丗之聖王也其先出自塊翼火之精有神龍首出于常羊闕九字生赤闕十字也名紀見乎河雒爰嗣八九慶都與赤龍交而生伊堯及堯之生也不闕凡䓁闕七字龍顔闕角眉闕八莱謖自侯伯遊􅋋𤣥河之上龍龜負銜投授與然後堯乃受命蜀鹿闕十六字圗書察度九州統理聞名應􅗯緯順晷然後風化大洽普天闕三字􅄇闕十字功成告讓遂禪黄聖漢龍興纉堯之緒祠㕥上犠曁于亡新圮漢之業禮祠闕五字祀闕是故廷尉卿闕二字㕥為大聖親垂隆烈遺歌在民而壇場夷替屏無位非所㕥表神聖闕五字民者闕四字爲闕三字復舊造立靈廟㕥一大窂春秋秩祠是㕥好道之疇自逺方集㦯弦琴闕三字一㦯譚闕二字厯丹田闕三字痾者恭祈福即獲若􅄇愘輒赴瘨故知至徳之宅實真聖之祖也熹平四􅏵冬十二月濟隂太守河南張寵丞穎川李政成陽令陳國鄭真故鉅鹿太守仲訴故廣宗長仲選故吕長仲球闕丞闕十一字百石已氏讓禮䓁咸各有闕一字追慕聖烈乃共立壇墠刋碑紀石已章聖徳闕後闕二字有下闕􅋋赫大聖弈孔禎純性發蘭石生自馥芬琦表射出雙握嘉文排啓闛闔馳步闕十二字順敘五用訓民􅄇作忒化洽百蠻厯運遭七乃禪焉功綿日月名勒菅弦立廟闕休神闕九字釐湘黔民億􅄇祉無沂故濟隂太守劉郃字季承漁陽泉州人也自㕥體别枝􅘉堯之裔胄下車出奉闕萬為祠弱闕七字至于朔旦特復五百稱玄孫㕥叙嘉敬祠屬縣君㕥為奉事神聖禮虔當闕崇濯㕥汁闕三字勑縣闕二字設供曺掾史令養牲犠即堯陵廟神亨靈洞赥已嘉瑞李樹連理生􅋋堯闕圖闕府殿夙早闕拜遷闕中大夫後太守河南張寵㡭擬前緒到官始初出錢二千敬禮祠臨立壇碑特復闕四字羣闕二字為闕始闕六字學徒莫􅄇勸樂咸曰張父敦已徳厲已仁将獲禎應齊風前人鸞皇闕十八字解將悉臻矣密勿匪休将悉至矣熹平四年十二月十日癸卯立時将作吏胡能守堯掾仇伯爰闕十四字掾成闕十四字余隸釋云帝王世紀炎帝一曰魁隗氏此云塊􅀈者猶包犠之為伏羲也春秋緯曰慶都出觀三河有赤龍負圖下有人衣赤面八采兊上豐下足履翼星奄然風雨龍興慶都合而有娠既乳視堯如圖表兹所謂翼火之精也炎帝傳八世故曰爰嗣九堯在位七十載故曰厯運邅七蔡邕集有王子喬碑凡六十字與此同其間云或弦琴以歌太乙或譚恩以厯丹田其有疾痾尫瘵者静躬祈福即獲其祚正此碑之文也碑以菜為采懾為攝奕為亦汁為叶閨為閭沂為垠􅘉即布字㡭即繼字漢尹宙碑熹平六年君諱宙字周南其先出自有殷廼迄于周世作師尹赫赫之盛因以為氏吉甫相周宣勛力有章文則作頌武襄獫狁二子著詩列於風雅及其𤣥孫言多世事景主載在史典秦兼天下侵暴大族支判流遷或居三川或徙趙地漢興以三川為頴川分趙地為鉅鹿故子心騰州楊縣致位執金吾子孫以銀艾相繼在頴川者家于傿陵克纉祖業牧守相亞君東平相之𤣥㑹稽太守之曾富波侯相之孫守長社令之元子也君體温良恭儉之徳篤親于九族恂恂于鄉黨交朋㑹友貞賢是與治公羊春秋經傳通書傳仕郡厯至漢督郵五官掾功曹守昆陽令州辟從事立朝正色進思盡忠舉衡以處事淸身以厲時高位不以為榮卑官不以為恥舎純履軌秉心惟常亰夏歸徳宰司嘉焉年六十有二遭罹寝疾熹平六年四月已夘卒于是論功敘實宜勒金石廼作銘曰於鑠明徳于我尹君寵錫之胄奕世載勛綱紀本朝優劣殊分守攝百里遺愛在民左翼牧伯諸夏肅震當漸鴻羽為漢輔臣位不副徳夀不随仁景命不永早即幽昏名光來世萬祀不泯徐獻忠金石文云右碑是漢靈帝時作前無題後無書撰人名長一丈餘廣四尺許額中一孔徑三四寸孔傍有篆書從銘二字文是隸書如蔡中郎筆近日鄢陵地中得之嘉靖十七年通政鄢陵劉訒以遺許吏部穀董生子元復以貽予者也東漢文紀巻二十九
