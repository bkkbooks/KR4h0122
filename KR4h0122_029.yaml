而切蔍即粗字即糲字即愛字裹即懷字婁夀碑隂故五官掾婁闕伯三百故守長史掾夏光淵二百故從事闕二字張千故府掾闕子闕二百故五官掾陳季高三百故府掾終百衆五百故督􅗯終仲行千故從事終嚮二百故督􅗯終伯康千故督􅗯范仲隱二百故府掾婁伯胤五千故校官祭酒婁伯就五百故府掾陳德賢四百故府掾終興二百下闕一人處夏仲高二百處夏幼高二百處婁元闕三百處終永梁二百處婁元闕三百處張闕百處婁都二百故守葉令終文勝二百故督􅗯陳瑋公二百故督􅗯婁生五百故府掾婁仲絢百故府掾婁敬闕二字百處闕仲順二百處吕和考二百下闕心處豐子能三百處婁宣卿二百處夏伯明四百處陳子讓二百處馮永南三百處鄧敬三百處婁闕臺五百處婁幼碧五百故從事南郡許孔三百故從事闕陽下闕故五官掾闕都尹紂闕五百故督􅗯闕二字仲儀二百故督􅗯闕二字百故督􅗯下闕處鄧超下闕處闕郁下闕處友趙文弘三百處汝南下闕處闕四字百處下闕處闕三字二百處闕三字二百處闕二字君闕百下闕二人處闕二字舉闕百處闕二字明百處闕三字二百諸人所書皆其字漢故繁陽令楊君之碑銘篆額并隂熹平三年上闕二十九字弟富波君之少子也生姿令哲長履忠孝立仁行道實體彌隆卋授尚書為國師輔君述而好古少傳祖業兼苞載籍靡􅄇周覽英儒仰則景附其高應禮州郡仍奉貢覲類假爾服歸稱大駕省方為郡功曹召見専對壓帝心擢拜郎中除右都候間宫衛闈闥肅焉遷繁陽令崇德尚儉以興政化和育威恩以移風俗壄姦回宿􅄇命學吏精橫侍者常百餘人咸訓誨帥𨗳以闕鄰遠歸爰集疆場州郡嘉異並上絶大司農劉佑表􅍌將有命授㑹叔父太尉公薨委榮輕舉投如遺吏民攀轅老弱軔輪追慕跋􅍱蓋二千餘人續􅕂守闕上書厯年運穀萬斛助官振貧以氣還君自非慈愛孰能若茲有司聳昧莫能識察君潔已以􅄇求趨功顯弗有復入亐林處靖衡門童冠如雲故乃名問俞髙休聲益著三府入宰常登茂御復紹祖烈旻穹􅄇惠年五十一熹平三年三月已丑卒國失其良民望永絶亰凡百靡􅄇愍悼故吏臣𨽻叫天訴乎何及哀矣慛蕩感惟既德之隆者莫盛不乃共追厥勳鐫石示後俾延軨翳其辭曰惟􅛬降靈於明君天鍾慶誕德孔醇溫博敏貞皎倫帝嘉忠乃詺寵光㑭候禁宫夙夜是勤命出作宰淸風穆神委蔑成勳赴義長逝民思遺奔告亐頎􅄇審真莫肯慰楊伲樂志縉紳仰從三公並招當為國暉壽闕二字早葉隕林朋徒潺湲士女悲百其身􅄇栽豫銘頌𤣥石下闕隸釋云楊君者太尉震之孫富波相牧之子太尉秉之猶子沛相統之親昆弟高陽令著之從昆弟也碑以徦爾作遐邇犆作特作俞作愈軨作齡即克字速即迹字㛃即潔字即退字墜即地字􅓉即乃字即墜字繁陽令碑隂故功曺吏下闕故功曺史成功豫伯舉故功曺史王月伯師故功曺史闕二字元祐故功曺史俊叔嚴處功曺休季盛處功曺申璆幼厚處功曺公乘儀元表處功曺闕伯尹故民張掖季助故民詳子琦故民張順顯臺故民張商伯瑋故功曺史張睿孔明故功曺史備仲載故功曺史升志賢故功曺史魏􅘉興故功曺史蕫尚叔海故功曺史成功闕二字圭處功曺闕譽顯甫處功曺程琦叔闕處功曺馮闕子圭故功曺史下闕故功曺史巍闕三字故功曺史樊曜子圭故功曺史程闕伯盛故功曺史􅰩伯載故民陵長沮闕子輔故吏成功闕幼故主簿張合元考故功曺史蕫莫大羽元政故功曺史良堅子石故吏杜茂才故吏韓氷君政故功曺史馮億仲載故吏馮㺩敬祖故吏馮烈元軌故吏闕義仲盛故吏宫子行故功曺史劉璜子雲故功曺史樊充國榮故功曺史張琰子瑤故吏勝屠琰季嚴處功曺闕尹仲闕故民馮闕幼闕故民富弘闕祖故吏闕一字叔遂故吏張遂季祐故吏尹貴仲持故吏張立仲德故吏李羕元綱故吏張時子節故吏闕文長故吏馮种元妙故門下史巍昱元夏故吏申貞子明故吏申根叔德故吏申巨妙才故吏勝屠曜子節故吏成功宜元助故吏常曜少賢故吏申微卋政故吏申甫伯舉故吏申弘仲闕故吏申肜叔闕故吏廉仲讓故吏申和仲訓故吏申真仲真故民假肅子故民樊興子上故民吳方季遠至孝涅君威故吏宋連建興故吏張讃幼議故吏張烈仲考故吏張純子淑故民馮嘉叔祉故民侯臨伯𢎞故民進仲進故吏段寅季馮故吏邵騰文光故吏程􅒑叔表故吏嚴伯故吏許貞元表故吏關敏闕安故民周演少平故吏申曾伯德故吏武奐季整故闕三字君闕處逯瓖德瑋處張進子明處范談子亮故民趙表元顯故民㠕副幼豪故民㠕愔子才故民劉影顯方故民張運季方故吏程勑伯嚴故吏裒景博故吏程周仲密故吏段術元藝故吏馬盛盛明故吏成功連建賢處黃子敬故吏鞠像伯嚴故吏段官元顯故民杜忠文政故民李冰元固故民叔子助故民公乘柱漢舉故民闕二字伯觀故民段羕元頴故吏薛誼升舉故吏焦武彣伯故民薛恬仲故民張隗子故吏駱盛進興故吏梁平子衡故民周普子助故吏程瑋伯圭故民李羕元高故民武普伯讓故民僉子嚴故民貞伯亮故民楊方子遠故民祥伯慎故門下史楊直子璜故門下佐公孫夀元壽故門下佐路熾子盛故門下佐杜良伯信故門下佐鄧澄元景故小吏闕子衛故民下闕典作者馬子明隸釋云繁陽令碑隂凡百三十有四人不書郡邑皆繁陽之人也嘗仕于異邦惟一朗陵長亦稱故民者桑梓之敬也帝紀安帝威宗獻帝皆嘗詺公卿郡國舉至孝之士列傳荀爽趙咨崔實皆嘗為九卿本郡所舉此有至孝沮蓋是此科歐公論韓勑云前世見于史傳未有名勑者此碑又有程勑則漢代不獨一韓勑也范史及韓卑所用勑字甚多是時蓋上下通用非若後世有鸞臺鳯閣之拘雖勑本音徠去聲然韓字叔節程字伯嚴詳其義皆當讀與飾同非勞徠之徠也漢循吏故聞喜長韓仁銘篆額不載隸釋熹平四年十一月甲子朔草二日乙酉司隸闕二字河南尹校尉空暗典統非任素無績勳寧善闕二字仁前在聞喜經國以禮刑政中有子産君闕二字尉表上遷槐里令除書未到㐬幸􅠊命喪身闕一字為祀則祀之王制之禮也書到郡遣吏以少窂祠闕一字勤異行勛厲淸惠以旌其美豎石訖成表言如律闕二字十一月草二日乙酉河南尹君丞喜謂亰寫闕二字墳道頭訖成表言㑹月丗日如律令元趙秉文跋云此碑出亰索間滎陽令李輔之行縣發地之字畫類劉寬碑韓仁漢循吏不見于史而見于此正大六年滎陽縣令李天翼再立石今存帝堯碑篆額四年熹平帝堯者蓋㫺丗之聖王也其先出自塊翼火之精有神龍首出于常羊闕九字生赤闕十字也名紀見乎河雒爰嗣八九慶都與赤龍交而生伊堯及堯之生也不闕凡等闕七字龍顔闕角眉闕八萊謖自侯伯遊􅋋𤣥河之上龍龜負銜投授與然後堯乃受命蜀鹿闕十六字圗書察度九州統理聞名應􅗯緯順晷然後風化大洽普天闕三字􅄇闕十字功成告讓遂禪黃聖漢龍興纘堯之緒祠以上犧暨于亡新圮漢之業禮祠闕五字祀闕是故廷尉卿闕二字以為大聖親垂隆烈遺歌在民而壇場夷替屏無位非所以表神聖闕五字民者闕四字為闕三字復舊造立靈廟以一大窂春秋秩祠是以好道之疇自逺方集㦯弦琴闕三字一㦯談闕二字厯丹田闕三字痾者恭祈福即獲若􅄇愘輒赴癲故知至德之宅實真聖之祖也熹平四􅏵冬十二月濟隂太守河南張寵丞穎川李政成陽令陳國鄭真故巨鹿太守仲訴故廣宗長仲選故吕長仲球闕丞闕十一字百石已氏讓禮等咸各有闕一字追慕聖烈乃共立壇墠刋碑紀石已章聖德闕後闕二字有下闕􅋋赫大聖奕孔禎純性發蘭石生自馥芬琦表射出雙握嘉文排啓闛闔馳步闕十二字順敘五用訓民􅄇作忒化洽百蠻厯運遭七乃禪焉功綿日月名勒菅弦立廟闕休神闕九字釐湘黔民億􅄇祉無沂故濟隂太守劉郃字季承漁陽泉州人也自以體别枝􅘉堯之裔胄下車出奉闕萬為祠弱闕七字至于朔旦特復五百稱玄孫以叙嘉敬祠屬縣君以為奉事神聖禮虔當闕崇濯以汁闕三字勑縣闕二字設供曺掾史令養牲犧即堯陵廟神亨靈洞赥已嘉瑞李樹連理生􅋋堯闕圖闕府殿夙早闕拜遷闕中大夫後太守河南張寵㡭擬前緒到官始初出錢二千敬禮祠臨立壇碑特復闕四字羣闕二字為闕始闕六字學徒莫􅄇勸樂咸曰張父敦已德厲已仁將獲禎應齊風前人鸞皇闕十八字解將悉臻矣密勿匪休將悉至矣熹平四年十二月十日癸卯立時將作吏胡能守堯掾仇伯爰闕十四字掾成闕十四字余隸釋云帝王世紀炎帝一曰魁隗氏此云塊􅀈者猶包犧之為伏羲也春秋緯曰慶都出觀三河有赤龍負圖下有人衣赤面八采兊上豐下足履翼星奄然風雨龍興慶都合而有娠既乳視堯如圖表兹所謂翼火之精也炎帝傳八世故曰爰嗣九堯在位七十載故曰厯運邅七蔡雍集有王子喬碑凡六十字與此同其間云或弦琴以歌太乙或談恩以厯丹田其有疾痾尫瘵者靜躬祈福即獲其祚正此碑之文也碑以菜為采懾為攝奕為亦汁為叶閨為閭沂為垠􅘉即布字㡭即繼字漢尹宙碑熹平六年君諱宙字周南其先出自有殷乃迄于周世作師尹赫赫之盛因以為氏吉甫相周宣勛力有章文則作頌武襄獫狁二子著詩列於風雅及其𤣥孫言多世事景主載在史典秦兼天下侵暴大族支判流遷或居三川或徙趙地漢興以三川為頴川分趙地為巨鹿故子心騰州楊縣致位執金吾子孫以銀艾相繼在頴川者家于傿陵克纘祖業牧守相亞君東平相之𤣥㑹稽太守之曾富波侯相之孫守長社令之元子也君體溫良恭儉之德篤親于九族恂恂于鄉黨交朋㑹友貞賢是與治公羊春秋經傳通書傳仕郡厯至漢督郵五官掾功曹守昆陽令州辟從事立朝正色進思盡忠舉衡以處事淸身以厲時高位不以為榮卑官不以為恥舍純履軌秉心惟常亰夏歸德宰司嘉焉年六十有二遭罹寢疾熹平六年四月已卯卒于是論功敘實宜勒金石乃作銘曰於鑠明德于我尹君寵錫之胄奕世載勛綱紀本朝優劣殊分守攝百里遺愛在民左翼牧伯諸夏肅震當漸鴻羽為漢輔臣位不副德夀不隨仁景命不永早即幽昏名光來世萬祀不泯徐獻忠金石文云右碑是漢靈帝時作前無題後無書撰人名長一丈餘廣四尺許額中一孔徑三四寸孔傍有篆書從銘二字文是隸書如蔡中郎筆近日鄢陵地中得之嘉靖十七年通政鄢陵劉訒以遺許吏部穀董生子元復以貽豫者也東漢文紀卷二十九
