  - {type: page-break, offset: 0, content: '', id: KR4h0122_WYG_029-1a, image: WYG1397/WYG1397-0608a.png}
body:
  text: 漢故沛相楊君之碑篆額建寧元年靈帝君諱闕九字富波君之闕子也闕天闕性少有令問敦闕孝以勑內闕名行以修外􅀈闕二字烈隆構厥基既仕州郡會孝順皇帝西巡以掾史召見帝嘉其忠臣之苗器其璵璠之質詺拜郎中遷常山長史換楗為府丞君雖詘而􅈬之以順時政非其好也乃翻然輕舉臯司纍應亐司徒州察茂才遷鮦陽侯相金城太守德以化圻民威以懷殊俗慕義者􅄇肅而成帥者變袵而屬疆易􅄇爭障塞事功顯􅄇伐委而復為真南蠻蠢迪師出征以君彣武備兼廟勝屼戰拜車騎將軍從事軍還􅀢勳復􅎧􅍚辭後􅓉徴拜議郎五官中郎將沛相天吏之治副當神人秩禮之選舉􅄇踰賢故望大和則俟生育嚴霜則畏欣竦栗寬猛必𠂻遭貴専􅄇稱請求考􅄇論徴遠議官牟五十六建寧元年三月癸丑遘而卒廷愍􅀈百僚歎傷闕民假爾莫􅄇隕涕故吏戴條等追在三之分感秦人之哀贖其由庶考斯之頌儀鎸石立碑銘鴻烈光亐載俾永􅄇滅其辭曰明明楊君懿鑠其德其德伊何忠力勤止􅍏身帥闕靡革謨茲䓦猶道以經國班化元既淸旦寧武稜攜二彣懷假𡨕遠人斯服充庭剛得以和以平勳速矣莫與爭光井棠遺愛東征企皇念彼恭人惄永傷立言􅄇先民所臧載名金石貽旡疆隸釋云碑缺不知其名按楊震傳碑云長子牧富波侯相牧子統金城太守沛相則知此為楊統碑也碑以百寮作百遼以遐邇作假爾􅀈即璵字續即績字即願字言即克字即二字速即迹字楊統碑隂故闕二字郎中令闕戴闕字叔故吏闕懷陵圉令相蔣禧字武仲故吏冝祿長蕭劉瑞字仲祐故吏孝亷杼秋劉旭字子明故吏大官曰字丞譙曺臻字建國故辭曺史鄲公孫銀字凶故門下書佐豐韓純字子敬故門下書佐豐畢珮字廣卋故門下書佐鄲孟縱字河雒故決曺書佐鄲公孫畼字元畼故吏贊陳字仲顯故吏蘄夏陽字儀公故吏蘄兒銀字伯玉故吏杼秋劉順豫選故吏沛周儀字帛民隸釋云贊即鄼兒為倪前漢兒寬漢故竹邑侯相張君之碑隸額元年建寧君諱夀字仲吾其先㬜大夫張老盛德之裔丗載闕勳遵帥紀律􅄇㤁厥緒為冠帶理義之宗君孝犮懿明允䔍信敦恱經睢習父東光君業兼綜六藝博物多識略􅍱傳記矯取其用股肱州郡匡國達賢登善濟可斑叙優能正躬帥陪疑獨照確然不撓有甫之風舉孝亷除郎中給事謁者贊衛王臺婁闕忠謇上嘉其莭仍授命英匡其亰輦昭德塞違內平外成舉無遺愆遷竹侯相明德慎罰縣奉采土遭江楊賊上下闕征役賦彌年萌于闕戈杼軸罄殫君下車崇尚儉莭躬自菲薄儲偫非法悉無所􅕂并官相領省倉闕小府御吏朝無姦官無淫教民樹藝三農九穀稼嗇滋殖國無災祥歲聿豐穰皤白之率其子弟以循仁義蛑賊􅄇起厲疾􅄇行視事載黔首樂化戶口增多國寧民殷功刋王府將受轓邦對揚其勛功曺周憐前將放濫君微澄淸憐顧愆悔過督郵周紘承㑹表問君常懷色斯舍無宿儲遂用高逝老弱相攜􅀈援持車千人以上沛相名君駱驛要請君捐祿收名固藝􅄇顧民無所卭國違所賴上下同郡聞知旌弓禮􅀈復為從事􅀈􅀈􅍑視􅄇折其節辟司徒府進退禮舍弘內闕晧爾􅻪天􅄇遘無瘳年八十建寧元年五月辛酉卒嗚呼哀㦲夫積修固者為天人所鍾功假於民者敘左銘典於闕俊闕訪諸儒林刋石樹碑式昭令徽其辭曰亮元德於君膺清茂躰懿純􅂒三署垂令闕甄聲號闕憲臺矯王業紫微彈羣司清公闕緩薄賦牧邦畿梨蒸殿饑感良臣衰其靈朅輕舉闕來征民歎思暨輿人宰府命遂闕名振射闕彌闡垂令紀永􅄇刋兮德㳅後昆牟為蟊海廟碑嘗借侔字漢故衛尉卿衡府君之碑隸額元年建寧府君諱方字興祖肇先蓋堯之苗本姓闕二字則有伊尹在殷之世號稱阿衡因而氏焉闕二字土家于平陸君之烈祖少以術安貧樂道履咏顔原兼季由聞斯行諸仁癘闕四字土階夷愍之貢經常伯之位左馮翊先帝所尊名竹帛考㿖江太守旡門太守闕三字孝長發其祥誕降于君天資純懿昭前之美少以文塞敦允元長以欽明耽詩恱書闕三字秋仕郡辟州舉孝亷除郎中即侯相膠東令遵尹鐸之導保鄣二城國按斑叙闕二字本末化速舉尤異㑹稽東部都尉將繼南仲邵乕之軌飛翼之操闕三字綏來王之蠻㑹喪太夫人感衛人之凱風悼􅖋莪之劬勞暗􅤓仍闕上言倍榮向哀扎服祥除徵拜議郎右北平太守尋李廣之在恢巍絳之和戎戎戢土佚費省巨億懷闕四字靜有績頴川太守修清滌招拔隱逸光大茅茹國外浮諼淡繆動氣泄狂闕五字歸來洙泗用行舍臧徵拜議郎太醫令亰兆尹舊都餘化詩人所詠並有亡新君闕四字隆寬栗鶉火光物隕霜勦姦振滯起舊􅔅亡繼絶恩隆乾威肅剝本朝録功入登衛闕二字翼紫宫夙夜惟寅褘在公有單襄穆䓦謨之風詺選賢良招先逸民君在闕失順其文舉已從政者退就勑巾永康之末君衛孝桓建寧初政朝用舊臣􅕂拜步兵校尉處六􅘄之􅘄維時假階將授緄職受任浹旬庵離寢年六十有三建寧元年二月五日癸丑卒詔遣使闕二字賻禮百臨㑹莫􅄇失聲其年九月十七日辛酉㘸蓋雅頌興而清廟肅中庸起而祖宗闕故仲尼既歿諸子綴論斯于作歌用昭于宣以德銘以勒勳􅋋是海內門生故吏闕三字采嘉石樹靈碑鐫茂伐祕將來其辭曰峨峨君烈孔純高神武歷丗忠孝馮隆軌􅄇㤁前人寬猛􅄇主德義是經韜綜頙闕溫故前呈攬英接踵迹晏平初據百里顯顯令聞濟康下民曜武南㑹邊民是鎮惟闕三字憂及退身議帝室剖苻守藩北靖闕二字有闕有聲旋守中􅛬幽滯以榮邁種舊亰闕四字舍澤戴仁闕二字攸寧尅長尅君􅄇虞􅄇陽維明維允耀聲香能能惠尅亮天功入統闕二字光光法言稽古道而後行競競業業素絲羔羊誾誾侃侃顒顒昻昻蹈􅒑履渠金玉其相謇謇王臣羣公憲章樂旨君子闕二字旡疆銘勒金石闕五字問闕二字萬世是傳隸釋云銘文如鶉火光物隕霜勦姦唐人志墓多用此體履該顔原謂顔子原憲也褘隋即委蛇出韓詩內傳碑以濡為儒倍為背淡為痰緄為衮庵為奄為大字廬江鴈門皆從疒故冀州從事張君之碑篆額元年建寧君諱長字元異系帝高幸爰暨后稷張仲孝友雅藝攸載天挺􅕂侯應期佐治與漢龍興誕發神謀君其𦙍也烈純德繼踵相承于來我君亦邦之雄兼才伯知高令融該覽羣緯靡􅄇究窮初仕郡為督郵鷹霆擊威德日隆糾剔荷忒抵拂頑訩屬城祗肅千里折中入為主簿舍謀吐忠委蛇公門謇謇匪躬將美匡醜對揚休光歷五官掾功􅔟山闕時行貢真絀僞遏漸防萌后臧其勛俾守犂陽身帥下神化闕通方伯術職嘉君義綱旌命􅟨任比國用寧遂播芳譽有馥其馨當陟台階注紀庭矩未合實命􅄇同度時否泰盤桓利貞闕歸斯服舍之則藏復修陶父怡志嶽陽恬靜湛泊匪偟時榮春秋六十四以建寧元年三月癸巳寢疾而終其年十有一月丙寅克葬僉以為洪德宜演述載彌以新功烈􅄇讃紀後來無所聞􅋋是刋石勒銘以示後昆其辭曰􅋋穆君兮煥流芳闡洪軌兮休烈彰令德攸兮宣重光仕郡州兮迪民康臣兮為棟梁旻􅄇㳤兮降淪霜􅀈華兮殱彥良伊闕二字兮夀􅄇將丗雖短兮名悠長位雖少兮功悠揚伐松柏兮搆斯堂鏤金石兮敻􅄇亡萬子孫兮永蒸嘗隸釋云此碑皆作四言其末四句又五言歐陽公謂鷹盧繫是以狗喻人擊上一字石損其半豫初刻此碑失於深考徐而察之乃鷹撮霆擊非盧擊也郭仲竒為司隸從事碑云鷹偫電擊意與此同碑以荷為苛䛌為包融即融字即忒字即退字攸即修字即億字漢故國三老袁君碑篆額靈帝初年貢通志碑録並作袁君諱良字卿陳國扶樂人也厥先䑞苗卋為封君周之興虞􅂒父典陶正嗣滿為陳侯至𤣥孫塗初氏父字立妵曰袁魯僖公四年為大夫哀十一年頗作司徒其未㦯適齊楙而袁生闕獨􅕂陳當秦之亂隱居河洛髙祖破項實從其天下既定還宅扶樂孝武征和三年生曾孫幹斬賊公先勇拜黃門郎封關內侯食遺鄉六百戶後錫金紫仙修城之幹薨子經嗣經薨子山嗣傳國三卋至而􅓟君即山之曽孫纘神明之洪資天德之清􅋿綜易詩而悅禮樂舉孝廉郎中謁者將占大匠丞相令廣陵大守討江賊張路等威震徐方謝病歸家孝順初政咨闕二字白三府舉君徵拜議郎苻莭令時元子光博平令中子騰尚書郎少子璋謁者詺書壁闕二字可父事羣司君父子俱列三臺夫人結上為三老使者闕節安居親闕几杖之尊袒割之養君實饗之後拜梁相帝御九龍殿引君對覿興酒飯賜飲白頃者連遇運害災備至隂陽􅄇和寒暑􅄇節㫺孔子制義承奉􅋿有興盛之福期即來咎之變以妙身襲表繼業二九之今直其際圖記占闕在藩國自先帝至德猶有十七字國之謀蓋治卋者􅄇諱其難追社稯之重恐有交㑹諸國開導以驕滿之漸令姦耶緣生慝相以顯選蕳練內升㫺掌苻竟惠民故連拔授􅄇問次典郡職重親藝經緯隱括在手徍者尊發縱􅋋平陽淸約藩輔其莭衎然忠臣之義有獻去字其加精微切防􅓟疚心以今特賜錢十萬雜繒丗匹壬玉字具劒佩書刀繡文印衣極手巾各一徍悉乃心勉協同便宜數上君子曰優臤之寵於斯盛矣宰縣治郡民􅄇思載八十五以病仕永建六年二月戊辰卒居􅘩室廬殯亐假館㫺行父平仲小國之卿其儉猷稱況漢大夫父子同升而堵􅄇明實録之時使前哲孤名而君獨立􅋋是厥孫衛尉司徒掾𢎞闕刋石作銘其辭曰飛淸邈紛其厲跨高山字鋪雲際􅀈帝父振濊登華龍聎天坐酌􅄇揮凱以邁民被澤畿乂本德曜其碣闕煌煌數萬卋隸釋云良以順帝永建六年卒其孫衛尉滂立此石滂以光和年為相其作九卿當在靈帝之初水經注云扶溝有袁梁碑者誤也趙氏云唐宰相表及元和和姓纂云袁幹封貴鄉矦八世孫良生昌璋昌生安璋生滂按袁安以永平四年薨良之卒猶在其後三十九年又安乃汝南人滂則陳郡人相去歲月甚逺鄉族皆不同乃以為從父兄弟踈繆甚矣諸書皆云幹以討公孫勇功封貴鄉矦而碑作公先勇又云封關內矦食遺鄉六百户皆莫可考然遺鄉事在田廣明傳非貴鄉也碑云仙修城之􅀈蓋其後徙封也袁生班史以為轅生左傳濤塗作轅古字通用漢志載有陽九隂九之厄故此云二九之戒妙身讀為眇身元帝窮極幼眇讀曰要妙碑又以壁為辟以猷為猶即楚字􅓟即絶字即則字即惇字即勛字徍即往字即測字臤即賢字即沙字漢故金鄊守長侯君之碑隸額二年建寧君諱成字伯盛山陽防東人也其先出自周文之後封于鄭鄭共仲賜氏曰侯厥𦙍宣多以功佐國要盟齊魯嘉㑹自邡因以為家焉漢之興也侯公納莢濟大上皇於鴻溝之厄諡曰安國君曾孫酺封明統侯光武中興𤣥孫霸為臨淮太守擁兵從光武平定天下轉拜藝法右刺姦威司命大司徒公封於陵侯枝葉繁茂㦯家河洧或邑山濟君則上黨太守之弟幼履慈孝之德長藝忠謇之撡治春秋經博綜書傳以典籍教授滋滋履真安貧樂道忽於時榮敬上接下溫故知新翹節建志冠于羣倫孝友內著仁義外宣郡請署主簿督􅗯五官掾功曺守鄉長即家假印綬君分心如石􅄇易其志刾史嘉其高名辟部東平泰山治中從事君睿精謙委蛇衡門以禮盤桓名德可尊行顯身隱縣輿養神聖人制命曰仁常􅔅今胡􅄇然喪此國偉君年八十一建寧二年嵗在已酉四月二日癸酉遭􅍚而卒嗚呼哀哉於是􅂒邇土士字仁祁祁來庭集㑹如雲號哭發哀泣涕泛蘭將去白日歸彼𤣥隂同盟必至縞素填街􅔅有顯名終有遺勳魂如有靈嘉斯寵榮於是儒相俊惟想邢景乃樹立銘石以揚㳤美其辭曰於穆君德姿履正平乾皇所挺應符如生耽藝樂術恬忽世榮位禮請分然􅄇傾夀非南山􅄇俟河淸梁木圯頺鴻儀催零昆嗣切剝哀慟感情乃銘乃勒億載永寧夫人以延熹七年嵗在甲辰十一月三日庚午遭疾終隸釋云髙帝紀侯公歸太公封為平國君非諡安國也侯霸傳云五威司命陳崇舉霸德行遷隨宰再選執法刺姦後為淮平太尹淮平即臨淮謂霸在光武時非也霸追封則鄉其子昱徙封於陵謂霸封於陵又非也西漢表平帝封矦輔為明統侯此以輔為酺未知孰是碑以滋滋為孳孳刑為形催為摧孝廉栁君碑無額二年建平故孝廉栁君諱敏字愚卿其先蓋五行星仲草八舍栁宿之精也放像為用縣設為道闕商家而禪闕三字而主或聞生栁惠國大夫而㳅俗稱焉君父以孝廉除郎中闕部府丞君追祖繼體厯職官功曹守宕渠令本初元年太守蜀郡闕君復察舉君闕命失年君淸節儉約厲風子孫固窮守陋􅄇闕二字堂無文麗墓無碑識建寧元年縣長同嵗楗為屬國趙臺公憤然念素帛之義其二年十月甲子為君立碑傳於萬基因勒銘歎之厥辭曰惟斯栁君天􅀈鯁闕襲祖闕風行無遺闕授政股肱諫爭匡弼舊威外梱屬城震栗宰守伯煩垂名所立表貢王庭望極爵位可辜窮蒼官寵􅄇遂豫惟三六庶昔延李建竪斯碑傳于萬世子孫繁昌永不滅嗚呼􅥒㦲辭曰山陵𤣥室闕斯兮先人質尚約淸兮汶飭􅄇雕臧兮季子信樹松兮僑追殁激闕揚兮亡而像􅔅樂嘉靈兮宗子于集喈其鳴兮四祀蒸嘗􅄇廢㐬兮隸釋云敏之先乃栁宿之精不典甚焉碑以星仲為星中萬基為萬朞即漫字㐬即荒字漢北海淳于長夏君碑篆額三年建寧君諱承字東萊府君之孫大尉掾之子右郎將弟也纍葉牧守印紱典據十有餘人皆任其位名其是故寵祿傳亐歷卋著亐室君鍾其受性淵和履仁治詩尚書兼覽羣藝靡􅄇尋畼州郡更請屈已匡君為主簿督官掾功曹上計掾守令冀州從事所執憲彈繩糾枉忠潔清肅進以禮允道䔍愛先人後已克讓有終察孝􅄇行大傳胡公歆其德􅀈俯就芉公四府歸高除淳亐長到官正席流恩裦糾姦示惡旬月化行俗改易轓軒六飛躍臨津􅄇日則月晧天􅄇弔韯此良人年五十有六建寧三年六月苵已淹疾卒官嗚呼痛㦲臣𨽻辟踊悲動左右百姓號咷若喪考妣孤憤泣傷摧銘金石惟以告其辭曰於穆祖天挺應期佐時理物􅀈縱先軌積德勤約燕亐孫子君之羣並時繁祉明明君德令問􅄇已高山景行慕前賢􅍌同如籣意末止遭寃叐􅄇終其紀夙卋霣早喪抱器幽潜永歸蒿里痛矣如之行路感動黨魂有靈後􅄇隸釋云郭仲竒魯峻趙圉令高外黃諸碑及此碑紹縱先軌皆以縱為蹤蕭何傳發縱指示獸處顔師古注云書本皆不為蹤字讀者乃為蹤蹟之蹤非也漢人固多借用顔氏注殆未然碑以薰為勳淹為奄咳為孩戚為戚黨為儻即䇿字即退字戀即轡字魯相史晨祀孔廟奏銘無額三年建寧建寧二年三月癸卯朔七日已酉魯相臣晨長史臣謙頓首死上尚書臣晨䪺首䪺首死死臣䝉恩受任苻守在奎婁周孔舊不能闡弘德政恢崇變夙夜憂纍息屏營臣晨頓首頓首死死臣以建寧元年到官行秋饗飲酒畔宫畢復禮孔子宅拜謁神仰瞻桷俯視几筵靈所馮依肅肅猶􅔅而無公出酒脯之祠臣即自以奉錢修上案食具以敘小節不敢空謁臣伏念孔子乾川所挺西狩獲麟為漢制作故孝經援神挈曰𤣥制命帝卯行又尚書考靈耀曰生倉際觸期稽度為赤制故作春秋以明文命綴紀撰書修定禮儀臣以為素王稽古德亞皇代雖有褒成世享之封四時來祭畢即歸國臣伏見臨壁日祠孔子以大窂長吏備爵所以尊先師重化也夫封土為社立稯而祀皆為百姓興利除害以祈豐穰月令祀百辟卿土士字有蓋於民矧乃孔子𤣥德煥炳光於上下而本國居復禮之日闕而不祀誠朝廷聖恩所特加臣寢息情所思惟臣輒依社稯出王家穀闕秋行禮以共煙祀餘胙賜先生執事臣晨頓首頓首死死臣盡力思惟庶政稱為效增異輒上臣晨誠惶誠恐頓首頓首死死上尚書闕時副言太傅太尉司徒司空大司農府治所部從事昔􅏅仲尼汁光之精大帝所挺顔母育靈承敝遭衰黑不代倉轍環應聘嘆鳯不臻自衛反魯養徒三千獲麟作門見徵血書著紀黃玉􅞗應主為漢制道審可行乃作春秋復演孝經刪定六藝象與天談鉤河擲雒却揆未然蕩蕩與乾比崇隸釋云永興元年孔和碑載吳雄奏用辟雍禮春秋饗孔廟出王家錢給大酒直距此才十有七年史晨復云到官秋饗無公出酒脯之祠至于自用奉錢乞依社稷出王家穀以共禋祀此蓋有司崇奉不䖍旋踵廢格也孔和碑中吳雄奏章則云奏雒陽宫此亦奏牘乃云上尚書者郡國異於朝廷不敢直逹帝所因尚書以聞也樊毅復華下民租奏其式與此同碑以倉為蒼煙為禋汁為叶即怖字即契字􅞗即響字史晨饗孔廟後碑無額相河南史君諱晨字伯時從騎校尉拜建寧元年四月十一日戊子到官乃以令日拜闕孔子望見闕觀式路跽既至升堂屏氣拜手肅屑僾髣佛若􅏅依依舊宅神之所安春秋復禮稽度𤣥而無公出享獻之欽因春饗導物嘉㑹述修壁雍社稯品制即上尚書參以苻驗乃敢承祀餘胙賦賜刋石勒銘并列本奏大漢延期彌厯億萬時長史廬江舒李謙敬讓五官掾魯孔畼功曺史孔淮戶曹掾薛東門榮史文陽馬琮守廟百石孔讃副掾孔剛故尚書孔立元丗河東太守孔元上處士孔裦文禮皆㑹廟堂國縣貟冘吏無大小空府竭寺咸俾來觀并畔宫文學先生藝事諸弟子合九百七人睢歌吹苼考之六律八音克諧蕩耶反奉爵稱夀相樂終日於穆肅上下蒙福長享利貞與天無極史君饗後部史仇誧縣吏劉耽等補完里中道之周左垣決作屋塗色修通大溝西里外南注城池恐縣吏民侵擾百姓自以城池道濡麥給令還所斂民錢財史君念孔瀆顔母井去市遠百姓酤買不能香酒美於昌平亭下立㑹市因彼左右咸所碩樂又勑瀆井復民餝治桐車馬於瀆上東行道南北各種一行校夫子冡顔母井舍及魯公冡守吏凡四人月與佐除隸釋云前碑再奏請之章此碑敘饗禮之盛其補墻垣治瀆井種梓守冢皆在饗廟之後碑以文陽為汶陽濡為壖為薦字冗即冗字即墻字壞即壞字即肉字漢故郎中馬君之碑篆額三年建寧君諱江字元海者濟隂乘氏人闕三字之長孫湯官丞之元子其先帝頊翳嬴之後丗在趙國以功封趙賜號馬服因遂氏焉暨于君身乾靈特挺岐㠜有度𤣥然清妙長有令稱通韓詩經贊業聖典左書右琴明于光上之術顯於君臣之道郡將平原髙君深昭其德以和平元年舉孝亷除郎中謙虛接下冠名三署昊天不闕遭離闕癘􅕊元嘉三年正下闕失貞幹仕喪儀宗於是盟軌遼醜縞素來赴慘痛號咷者􅄇可勝數矣夫人寃句曺氏終溫㳤􅀈咸曰女師年五十五建寧三年十二月卒君中弟字文緒位主薄督􅗯志行闕期落落自有大莭年二早世短折故塋迫兆告斯士先君之庚地闕處還敞闕五字神東看祖禰西眷舊廬皇神仿佛爰闕二字居乃闕碑銘勒􅍏勳其辭曰鑠鴻德舍光闕天爵衛紫闕聲闕著于用闕榱桷􅔅其人亡闕五字藏顧几筵悽襄傷嗟詩云感凱風歎寒泉惟梓闕靈闕期闕四字裔永克昌歿􅄇朽久彌章隸釋云碑中仕喪儀宗仕讀為士遼醜為寮醜仿佛讀為髣佛漢故慎令劉君墓碑隸額四年建寧君諱修字伯麟從事君闕十六字履和而至少罹囏苦身服田畝動乎儉闕七字弟克諧於鄉黨遜遜如也卑謙博愛恕已接人闕六字政事君則安上竭莭􅄇求聲譽故為五福所歸流神明所闕三字時兄弟竝典干城子孫盈門克昌堂構非至德粹孰能與闕斯舉孝廉除郎將事去官辟從事司徒掾典掌邊事遷令行為之政崇淡泊以惠利素苦風到官朞月見臣吏勑兒子人命呼吸􅄇欲煩擾吏民欲生見舊土歸終于家百姓追逐扣馬􅀈輪遂􅄇復還年六十七建寧四年五月甲戌卒二弟龍純孿哀孔懷孤生㒞協郃長號恩慕立此碑銘􅎧表景行辭曰於惟君德忠孝正至行通洞髙明克鬼神富謙受茲福知命􅄇延引輿旋歸忽然輕舉曒拔葵人皆有亡貴終譽兮貴􅄇名著兮隸釋云古之經籍未有雕本學者各習其師故其文不一此碑云鄉黨遜遜如也祝睦碑則云鄉黨逡逡皆與論語異乂有動乎儉中鬼神富謙亦與今之易不類渟即淳字即介字漢故博陵太守孔府君碑篆額并隂建寧四年君諱彪字元上孔子十九世之孫頴川君之元子也君少履天姿自然之師禮衣爽好惡衣愆考衷度衷修身踐言龍德而學衣至􅋋穀浮斿塵埃之外㬭焉泛而衣俗郡將嘉其所履前後聘召蓋不已乃翻爾束帶𢎞論窮理直道事人仁必有勇可以託六授命如毛諾則衣宿美之至也莫不歸服舉孝廉除郎中傳昌長疾病宿闕遷闕亰府丞未出亰師遭大君憂泣踰臯魚喪過乎哀謹畏舊章服竟還署試拜尚書侍郎無偏無黨遵王之素􅏪可黜否出闕二字度日位佇所􅏅肅拜治書御史膺皇陶之廉恕闕二字參之闕五字律祗用既平闕博陵太守郡阻山闕三字以饉斯多草竊罔衣闕賊劉張丙等白日攻家不命君下車之初闕五教以博闕削四凶以勝殘乃闕三字爰尚桓桓拯馬害醜類已殫路衣拾遺斯民以安發號施憲每合天心闕之所惡衣以強人義之所欲衣以闕三字姓樂政而歸于德望如父母順如流水遷下邳相河東太守舉此闕三字君子風也未怒而懼衣令而從雲行雨施闕二字大和海內歸公卿之任矣勞而衣伐有實若固執謙需以病辭官去位闔闕以孝竭闕餘暇􅜃彈琴擊磬闕二字之味而衣改其靜上帝棐諶天秩未究將據師輔之紀闕綱而疾彌流乃隕乃闕二字􅕊九建寧四年七月辛未闕三字哀㦲魂神超邁􅜝兮𡨕𡨕遺孤忉絶于嗟想形闕二字哀遠念衣欲生羣臣號咷靡所復逞夫逝往􅄇可追兮功闕三字識惟君之軌迹兮如列宿之錯置易建八卦揆辭述而衣作彭祖賦詩皆讃所見于時頌闕二字是闕吏崔闕三字王沛等伏信好古敢詠顯闕乃刋斯石欽銘洪基昭示後昆申錫鑒思其辭曰穆穆君大聖之胄惇懿允元其𤣥秀惟􅛬降精誕生忠良奉應郡貢亮彼我闕克明王道辨物居方周闕四字也名朝無秕政直㦲惟淸出統華夏化以䓦成奸猾迸賢倚闕庭帝重乃勛自闕二字征所臨如神闕六字之翰先民自程宜乎三事金鉉利貞而潔白駒俾世當享眉耉莫匪爾極大闕三字邈矣衣意于嗟悲兮闕三字息庶幾復焉所力咨乎衣朽沒而德􅔅伊尹之休格于皇天惟君績表于丹青永永無涯與日月并于嗟闕二字于以慰靈碑隂故吏司徒掾博陵安平崔烈字威考故吏齊闕博陵安平崔恢字行孫故吏氏令博陵安平王沛字公豫故吏司空掾博陵安國劉德字伯桓故吏外黃令博陵安國劉楊字子長故吏白馬尉博陵齊字子周故吏五官掾博陵安平劉麟字幼公故吏五官掾博陵安平王瑤字顯祖故吏五官掾博陵安平孟循字敬節故吏五官掾博陵高陽史應字子聲故吏五官掾博陵南深澤程祺字伯友故吏五官掾博陵南深澤程祚字元祐故吏五官掾博陵安國劉機字闕閣金石録云孔君自博陵遷河東而碑額題博陵莫曉何謂隸釋云漢人題碑固有用前官如馮緄魯峻者俱自有說此碑隂有故吏十三人皆博陵之人也蓋其函甘棠之惠痛夏屋之傾相與刋立碑表故以本郡題其首也此碑作文多用經傳語考衷度衷周調有之可以託六歇後甚矣史漢書宿留讀皆去聲郭林宗齎刺就謁仇覽請其留宿與此疾病留宿同碑以肴為文沂為涯􅏪即薦字􅜝即􅓦字美即美字折即拯字即蠲字即繫字即漫字大奚切􅜃與而切武都太守李翕西狹頌無額四年建寧漢武􅚾太守漢陽阿陽李君諱翕字伯􅚾天姿明敏敦詩恱禮膺祿美厚繼世吏幼而衛弱冠典城有阿鄭之化是以三􅀢苻黃龍嘉禾木連井露之動順經古先之以博愛陳之以德示之以好􅄇肅而成􅄇嚴而治朝中惟靜威儀督部職􅄇出府門政約令行強􅄇知􅄇詐愚屬縣趍教無對㑹之事僥外來庭面縛二千餘人年穀屢登倉庚惟百姓有蓄粟麥五錢郡西狹中道危難阻峻緣崖俾閣兩山壁立隆崇造雲下有􅄇測之厄苲促迫䝫財字車進􅄇能濟息􅄇駐數有覆霣隧之周過者創䠂其栗君踐其險若涉淵水字嘆曰詩所謂如集亐木如臨亐斯其殆㦲困其事則為設備􅄇之為患無已勑衡官有秩李瑾掾仇常繇道徒鐉燒破祈刻確嵬減高􅈬埤平夷正曲柙土石堅固廣大可以夜涉四方雍行人悀民歌德惠穆如清風斯石曰赫赫明后嘉惟則克克君牧守三國三國淸平詠歌懿德降豐稔民以貨稙威恩並隆逺人賔服鐉山瀆路以安直繼禹之迹亦世賴福建寧四年六月十三日王寅造時府丞右扶風陳倉吕國字文寶故府掾闕孟字隸釋云李君治武都橋道前後三處磨崖棧險架橋則郙閣鑿崖治路則西狹天井􅀢為剖苲為窄隧為墜悀為踊植為殖即惡字李翕黽池五瑞碑無額黃龍白鹿木連理嘉禾井露降承露人君昔􅏅黽池修嶔之道德治精通黃龍白鹿之瑞故畫其像隸釋云李君昔治黽池臻此瑞物及西狹磨崖因刻于前非碑隂也漢故北軍中候郭君碑篆額四年建寧君諱闕字仲竒元城君之苐四子其先蓋周之胄緒虞邴建國享土受胙政衰道失晉克其遭項之際髙祖初起運天苻命􅚌秦擲䠂遂定漢基枝葉􅘉列􅋋國郡或頴川馮翊公卿校尉將相州郡令問休貴自東郡衛國家乎河內彼亦世載德以臻于君君惠兄竹邑侯相次尚書侍郎次濟北相順弟臨沂長次徐州刺史次中山相次雒陽令咸以孝廉公府茂選貞亮曒白翼翼瑛配周之八為國楨幹君幼有岐嶷天然之資長有明肅𢎞雅之撡剛毅多略有山甫之縱沈懿篤為萬夫之望闕為郡五官掾功曹司隸中都官從事乕視耽耽鷹電貴肅承莫不畏憚三辟將軍府徵書貞亮直方謇謇衎衎忠信可結義然後諫舉廉比陽長教加仁施􅋋惠康焉于之武以抑􅋋彊改邑移風遺忘聞兄疾病率爾逝將職有闕賴君闕匡復辟司徒拜軍中候當授闕城萬里膺揚念妨弟路遜位榮修黃老之術謙守足之讓祿有􅄇究命有短長闕臨孔明殘隕貞良卒被奄忽徂亡年六十有六建寧四年九月丙子卒五年三闕四字孝孤忉乎悲􅚸剝裂行路泣血辟踊傷絶凡百君子靡􅄇哀惻喪國之鎮朝失模式闕二字奐乎位未副德刋石甄表以昭􅘩極其辭曰鑠明德郭君外忠潔內資親烈桓桓煥有文所臨闕三字風崇和睦以仁斯發威若神動規櫃禮義遵徽縱顯功加民感兄疾電捐官妙闕三字海聞亮矣淸匹倫爵不副命乖分土士字歔增歎孝流涕傷肝魂餝號有勞闕四字永􅔅勒金石示後昆隸釋云碑以縱為蹤掩為奄陸為睦即戚字借作戚􅚸櫃即嬴雲慟矩欷字成陽靈臺碑篆額并隂建寧五年惟帝堯母昔者慶都穹精氏妵曰伊體蘭石之操履􅒑櫃之度則乾川之象通三光之曜游觀河濵感赤龍交始生堯厥後堯來祖統慶都告以河龍堯歷三河有龍授圖躬行聖政以育苗萌火陽之盛先暗後明遂以侯伯踐帝宫慶都仙殁蓋㘸亐茲人莫知名曰靈臺上立黃屋堯所奉祠下營以水神龍所熹靈龜隱刑汾踊波比目魚濯鱗通泉𤣥菟生臺涯貫長厯久崇如闕二字三代改易荒廢不修五運精還漢受期興滅繼絶如堯為之承祠基年魚復生故有嗇夫魚􅘄衛仕驛憲魚服之延夀闕二字之道小衰沮遂遭亡新祠絶矣於是故廷尉仲深惟大漢隆盛德被四表大平未至靈瑞未下四夷數侵軍甲數擾匪皇啓居日禝不案經考典河洛祕漢感赤龍堯之苗胄當修堯祠追遠復舊復􅀈治字黃屋推聖意災生變見天以譴告前後奏上陳敘大義祥塞咎為漢來祚朝廷克省帝納其謀歲以春秋奉大窂祠時廷尉選位連自表奏詺英嘉命遂見聽闕二字為大中大夫歸􅀈黃壂令月吉日立􅒑興業㑹工􅍏夷平上合天意下應闕五字餝五色精上闕通天戶嚮少陽前設大壂俟神之堂地石墠其下淸凉可舞几闕以闕大章時濟隂太守􅠔郡審晃成陽令博陵菅遵各遣大掾輔助仲君經之營之􅄇日成之神靈精氣依怙於人廢之則亡存之則神復羣宗貧富相均共慕市碑著立功訓闕勒石銘中門之表卜擇元日齊革精誠先薦毛血謹慎犧牲祈祠福神享其靈井雨時降百成幽荒服徐方來庭萬國蒙祉犂元賴莫􅄇被德咸歌頌聲其辭曰於赫都德大兮承神精耀統兮爰生堯名蓋世兮上受苻命帝制兮廣被之恩荒外兮厯紀盁字千垂遺愛兮陵廟復崇大祭兮上來多怙降福沛兮萬國禧寧不賴兮光宣美勛永闕兮垂視岡極億萬歲兮濟隂太守魏郡隂安審君諱晃字元讓從公車令來成陽令博陵蠡吾菅君諱遵字君臺從東明門司馬闕丞頴川新汲尹茂字伯舉遷下邳尉尉穎川襄城楊調字君舉仲訴伯海從右中將遷巨鹿太守仲球伯儀從太尉掾遷吕長仲選孟高辟司徒府遷徙不絶皆興茂大聖黃屋之力建寧五年五月造隸釋云淮南子墜形訓載海外三十六國西北方有無繼民魚在其南注云魚如鯉魚有神靈者乘行九野讀如蚌字書蚌或作䰷無字也所謂魚疑即此爾衛士驛憲當讀為衛仕驛獻碑以不夏為不暇刑為形為滅基為朞犂為黎德彼廣彼為被即恢字筵即延字即薦字靈臺碑隂司徒掾仲選孟高出錢二千巨鹿太守仲欣伯海出錢萬吕長仲球伯儀出錢三萬七千五官掾仲著叔孟出錢二千從事仲謨升高出錢二千督􅗯仲伯敬出錢二千督􅗯仲鄷伯逺出錢二千主吏仲浮叔輔出錢二千主吏仲均季逺出錢二千主吏仲闕伯豪出錢二千主吏仲耽伯通出錢二千主吏仲遐季甫出錢二千主吏仲曇仲賀出錢二千主吏仲蓋升高出錢二千主吏仲福叔惠出錢二千主吏仲焭子臺出錢二千主吏仲夀宣德出錢二千