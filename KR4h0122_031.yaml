body:
  text: 東漢文紀卷三十一明梅鼎祚編漢故司𨽻從事郭君碑篆額靈帝中平元年君諱究字長全波人也其先出自郭叔應運挺度寔有懿徳文武諮焉條枝雲疏班闕華夏丗載令問昭前之光咸攄𤣥謨理物佐時君則元城君之孫雒陽君之適南和尚書濟北軍中臨沂徐州中山君之從子也河岳降祚􅏊而有跲孝弟肅與性俱成温慈恵和覩義輕財懐刑􅕥讜舎已從人蹈中庸之路處匹直之節内省􅄇疚兼姿闕問物格能闕臨疑弗惑弱冠踐郡厯主簿督郵官掾功􅔟守令長舍章吐忠或從王事嚴莊字可恐􅀢順可愛進譱替否所舉見則雖趙武之佐晉宋甫之厲色慘薵撰功君其諸辟司隷從事郡部都官眈眈鷹揚所莅㕥齊翕然之論風飛川流本朝察孝貢器帝庭恬榮忽浮委爵禮讓羣公側席書垂置郵􅄇幸􅠊祚命登六辰春秋廿八而􅌰中平元秊嵗在甲子三月而葬悲夫破鏌之刄而􅄇宰元摧晨風之翼而􅄇厲天耆姪士女嗚悒惟慼字孤嗣叫號涕零如雨咸曰闕晨有殁㦄數猶終自古迄兹孰能保􅔅生榮死哀弈貴遺稱敢慕衛悝讃先之義乃伐石興碑㕥􅀈厥魂俾後永有鑑焉其辭曰􅋋我君皇精蕰良昭徳塞違克紀克綱握柜綜闕􅒑歩履方麟清朝委虵自公棟隆千里庶績艾康佐命牧伯扶義遏私闕䋲彈枉属㕥改闕榮名京邑桓知㡬當享爵壽漢輔毘靈祗貪哀逝葉翼喆人其徂萬夫慘慛銘勲石以慰孔褱隷釋云公羊以虞虢為虞郭此碑遂以虢叔為郭叔邢為刑姪為耋􅀈為鑠慛為催都卿正衛彈碑𨽻額二年中平闕四字國闕六字公闕伯子闕吕闕二十四字其闕十六字國闕勞用民闕九字􅋋一闕十字相扶助卒闕曰闕二十五字不彊迄亐中平二年正月闕令闕國寧陵闕君諱脩字闕十四字中闕以府丞董察闕二字撫昆陽承闕亂之餘闕稱聖烈闕有林官凡處闕循闕六字軫既到庶闕亐闕二字愍夫繇役之不闕乃闕闕三字聖之闕二字亐有闕㠯闕二字忠於是乎輕賦闕斂調闕二字富結單言府斑蕫科例收其闕四字之目臨時慕不煩居民時太守東郡丞濟隂華林優䘏民隱欽若是由闕五字郡校劉闕爲民約闕三字乎無窮自是之後黎民用寧吏無荷擾之煩㙒無愁痛之闕二字囙民所利斯所謂惠康之闕景均之闕三字也政之闕二字􅋋是乎成役之艱苦􅋋是闕二字頌曰闕三字命徛歟我君敦詩説禮寧徳亐民底闕輕賦帥約孔均繇役㠯闕二字士不闕六字我好爵聿懷多闕明徳惟馨民㠯􅀢闕二字耕千耦梵梵􅎟稷亐骨闕二字永闕不闕五字中明慧通闕若五大夫服厲闕四字爲闕掌領闕書闕二字單錢復不闕吏闕五字若其闕勸導有功時闕二字范秩字元㫿尉曹掾都闕字漢賔史張芑字子才有秩陵杜則字孝闕七字守字國寳陳闕四字隸釋云水經魯陽縣有南陽都鄉正衛為碑平氏縣有南陽都鄉正衛彈勸碑此則其一也趙氏誤認衛為街遂云莫曉其何碑蓋是紀述守令繇役條教也前書食貨志月為更卒已復為正注云更卒謂給郡縣一月而更者正卒謂給中都官者衛宏漢官舊儀民年二十三為正一嵗為衛士一嵗為材官習射御騎馳戰陣又云民給正衛材官年五十六老衰乃得免為民酸棗今劉熊碑云愍念烝民勞苦不均為作正彈造設門更此云都卿正衛彈者與劉君碑同碑以梨爲黎荷為苛梵梵為芃芁即顧字瓌即瓌字即野字漢故幽州刺史朱君之碑篆額二年中平君諱龜字伯廣陵太守之孫昆陽令之元子也君系祖考之鴻軌履太和之闕三字載德􅄇隕闕二字仁義成於束脩孝弟其本性然而已下士勞謙克闕五字厚載多容察孝亷除郎中侍郎㠯將事去官三府更辟㠯太尉髙第闕五字堂之論建𢎞逺之議磥落煥炳臨疑獨逝故能光明越聞顯于區夏英聲闕五字公族亐時益州蠻夷侵邊鄙陸梁山野為害日甚朝廷㠯君文能闕二字武􅄇闕三字御史中丞討波亂略君統整羣帥方謀並設威神庭電燭亐上下至闕五字郡闕四字授手乞降永昌太守曹鸞上闕解黨㠯􅄇糾擿獲戾晋靡潜亏闕巷羣闕六字辟輙以疾辭鮮卑數犯鄣塞僉復舉君􅕥幽州刾史爾乃邁種闕九字禁㠯糾姦宄時雨之㴻品物除惡如農夫之務去草闕九字其畺土門衛施而無怵惕百姓􅄇復屯其城鄔出塞追闕十字咨歎荣䇿字詺并涼㠯君為式命􅄇少延􅏵六十四㠯光和六􅏵闕十字故吏牟化等僉以為夫有嘉功杞而􅄇輟或銘鍾鼎書闕是述闕九字已乃立碑而頌曰星精壹緼馮儀人我君受之膺其淑真研宗藝實好斯文闕九字徽馨名允升蠢爾夷貉蕩我邊氓銜命督使武氣飊騰董㠯闕八字幽方􅄇天常撫㠯仁徳渙若風翔分命部隊出竟觀兵闕禽逺驅闕七字甲綏我土畺降􅄇永匱民之望烈烈遺勛景炎彌光𨽻釋云磥落爲磊落庭電爲霆電壹緼為絪緼即播字水經注云故吏别駕從事史右北平無中牟化中平二年造碑碑隂故吏姓名悉薊涿及上谷北平人廣川書䟦云歐陽文忠謂龜字跡不見史傳堇見此碑華陽國志靈帝熹平中蠻夷反御史中丞朱龜將并涼勁兵討之故外黄令髙君碑隸額二年中平上闕十四字師求仁無逺闕六字師事闕二字尉汝南許公闕在精横晝闕十字敏義理恢廓天地之道闕二字王公之事令問闕章為斆者宗裒積篇藉萬闕四字明於左氏栢帝時上立博􅀢章文襜施乎斑賈亰碩儒海内儁􅐋靡不擬闕於是郡請州闕二字栢不就亏數四蔑勢利之權庶㡬乎仁義之道闕二字孝亷闕二字徵行闕病闕就闕四字被朱衣闕歩三署恬虛守約五十以斆弘農楊公爲光禄勲乃闕表君闕二字取闕四字觀踔兮闕二字所著斐然邈兮難迨超等出羣遷外黄令聖朝宗䖍特加禮饋闕以闕刀祖錢三萬闕七字詠到官闕古譏今奢煩􅶑不妄濫恩如皓春獄生􅋄邦無怨聲百工闕二字咸列厥所中和之化洞亐亞三單密莫與比縱州郡表政琹稱紀功垂當監典為牧為守人鬼之謀期朝莫君舉將頴川太守南陽文府君徵詣廷尉君感綱紀捐官卦義吏民攀車解銜脱軌遂志確然終不反顧皇行載驅不日係路飢不及飡以生疢光和七季龍在困敦月次􅀈火六日丙申卒邦䘮楨幹家失梁遼黨感慟凡百切傷襯柩旋歸故吏門生奔送相随盈道充涂如雲如闕二字旐翩翩靡不哀慛痛兮隕歿不待耆耋昭徳亐銘其辭曰光光髙君命作蕃流化外黄雚檀當闕州尹闕理隂陽闕二字申甫稽功猗衡篤禮崇義忽於官榮闕二字逝將節行邈然何天助順而不祐焉遘痾不永失鯁臣孤嗣闕絶闕無聲百遼歎傷聖朝愍愴闕二字令徳亡有神魂身歿名紀闡于萬祀惟中平二年龍斿舊若月次皇紀郡守廬江龍舒范府君假公矦之尊來典鄙邦㥀終追逺惟舊思下闕隸釋云范書髙彪傳外黄作内黄誤説書者以阿衡為倚平正義曰古人讀阿倚同音故以阿為倚此銘以猗衡對申甫若取音同則是借猗作伊若以偏旁假借則倚阿皆與猗相近也碑以襜為瞻􅀈為刑縱為蹤遼為寮潜為澘進即達字即夏字獄即犴字即俟字􅀈即鶉字即隨字劉寛後碑中平某年黄伯思東觀餘論云碑在洛陽尉射圃中蔡中郎書上闕四字文饒𢎞農華隂人也􅍏祖出自闕九字臣王矦相繼漢中微失其爵土闕五字世祖仍有顯位光輔王室公之考作司徒亏安闕三字勲績昭乎前朝公以嵩髙之門好謙儉之操􅘉衣糲食􅍱履寒苦周覽五經汜篤尚書闕三字微濳隱講誨世之榮利􅄇滑其守州郡禮招王公並辟皆不詘志大將軍辟舉闕第􅕥闕三字遷梁令䘮舊君去官博士徵三府辟皆又􅄇到司隷校尉察茂材太尉闕三字有道徵闕五字長史侍中延熹八年地震為異聖朝咨問公㠯對嘉黨克猒帝心引􅕥尚書出闕五字謐静雖龍左納言山甫喉㠯尚焉遷東海相南陽太守公之闕性也而能闕五字弘裕凱弟競伊人及其涖官統政推是心也㠯御萬事故闕民見徳義而興行闕五字讓而􅄇争政􅄇肅而威宣敎􅄇舒而徳洽帝將入學選定講闕三字舉公叅誨闕五字􅕥大中大夫勸講亐光之内遷侍中屯騎校尉宗正光禄勲太尉股肱元首宣闕弋字臣工允勑帝載粤熹寢疾遜位復􅕥光禄大夫衛尉太尉闕二字交㑹獨引其咎闕五字拜永樂少府光禄勲先是時妭民張角造為耶孽逆節有萌公闕四字聞罪誅未闕五字用首謀先覩封逯鄉侯食邑六百户春秋六十有六㠯中平闕􅏵闕月丁卯薨闕六字張良錫嘆悼贈㠯車騎將軍印綬位特進賵襚歛闕備闕禮有加遣五闕七字曰昭烈矦詔休命宜宣庸器銘勒若古有訓門生郭異等闕公永慕闕七字紼㠯慰懷洵涕述高廼共石建碑式序鴻烈其辭曰上闕八字􅀈幕祖武允廸道􅍏如何眈此􅥯謨用闕聖主納諸軌度統闕三事闕九字行雨􅘉海隅緝熈羣生賴祚降命融民門悠幕生榮亾哀􅍏聲載路門生頴川段苞亰兆闕二字河内李照等共所興立隸釋云公之考劉琦順帝時為司徒漢蕩隂令張君碑君諱遷字公方陳留已吾人也君之先出自有周周宣王中興有張仲以孝友為行披覽詩雅煥知其祖髙帝龍興有張良善用蕭何在帷幕之内決勝負千里之外析珪於留文景之間有張釋之建忠弼之謨帝遊上林問禽狩所有苑令不對更問嗇夫嗇夫事對於是進嗇夫為令令退為嗇夫釋之議為不可苑令有公卿之才嗇夫喋喋小吏非社稷之重上從言孝武時有張騫廣通風俗開闕畿㝢南苞八蠻西羈六戎北震五狄東勒九夷荒逺旣賔各貢所有張是輔漢世載其徳爰旣且於君蓋其繵縺纉戎鴻緒牧守相係不殞髙問孝弟於家中謇於朝治亰氏易聰麗權略藝於從畋少為郡吏隱練職位常在股肱數為從事聲無細聞徵􅕥闕中除穀城長蟄月之務不閑四門臈正之際休囚歸賀八月􅀢民不煩於鄉隨就虗落存恤髙年路無拾遺黎種宿野黄巾初起燒平闕市斯縣獨全子賤孔蔑闕二字道區别尚書五教君從其寛詩云愷悌君隆其恩東里潤色君垂其仁邵伯分陜君懿于棠晉陽珮􅺲西門帶弦君之體素能䨇其勛流化闕基遷蕩隂令吏民頡䫟隨送如雲周公東征西人怨思奚斯讃魯孝父頌段前喆遺芳有功不書後無述焉於是刋石整表銘勒萬載三代以來雖逺猶近詩云舊國其命惟新闕三字於穆我君旣敦旣純雪白之性孝友之仁紀行來本蘭生有芬克岐有兆綏御有勛利器不覿魚不出淵國之良幹垂愛在民􅀢沛棠樹温温恭人乾道不繆唯淑是親旣多受祉永享南山千禄無疆子子孫孫惟中平三年嵗在攝提二月震節紀日上旬陽色􅍏㭊感思舊君故吏韋萌等僉然同聲賃師孫興刋石立表以示後昆共享天祚億載萬年金薤琳瑯都穆云此碑予官京師時嘗于景太史伯時處見舊榻本不及録近得之友人文徵仲按隷釋云東漢及魏其碑到今不毁者十才一二凡歐趙錄中所無者世不復有子生去宋數百年而此本兩見歐趙録中蓋未嘗載隷釋并隷續亦無其文通志金石略所載碑目雖多然亦未之及乃知昔人之言未必可信而舊物之在天壤間者固不可盡謂之無也趙相劉君碑無額四年中平君諱衡字元宰濟南東平陵人也厥先尚矣聖漢龍興下闕王爰啓冀土遷于岱隂自康侯以來弈世夲承君闕頌之純闕丁炎闕之運時放依下闕相王闕二字其􅀢孚藻發於成就繤周行而彌長不闕二字竝之闕二字蹈闕二字之則不闕師訓之范而踐四教人道所謂義方闕二字所謂言忠信不師而自闕者也是闕雄㑺協服莫不歸稱仕下闕侯下闕于闕勃海王帝之冡弟不遵憲典君以特選為郎中令彈枉闕慝匡弼闕二字以闕兄琅琊相亡即曰輕舉州察茂材闕除蓨令遷張掖屬國都尉以病徵拜議郎闕遼東屬國都尉不闕􅕥趙相在位三下闕左疚闕二字行闕􅕥議郎闕二字連徵不就君之始仕為吏師仍綏亰闕興惠訓下闕陟功西尉渠捜荒服來王後遷於趙叙民種徳威懐闕立闕清闕二字匡闕二字直闕二字俗惡容悦之宻闕承闕靈以闕二字錫闕福三夀佗朋旻穹不弔闕三字疾年五十有三以中平四闕二月戊午其四月已酉葬梁木圯墜閔嗣􅏊孤下闕所自律闕栞勒闕三字詒聲伐于後昆其辭曰於穆我君􅕥家之闕正已帥義求福不回闕言以道逺闕先幾闕二字有疾百侯僉咨舎徳何取將闕名闕如何弗闕三字云亡天方闕靡闕肯降闕歿而名垂善闕令終休烈孔闕永闕二字風爰勒金石千載遺芳隸釋云渤海王帝之家弟不遵憲典君以特選為郎中令渤海王名悝威宗之母弟也靈帝紀熹平元年書渤海王被誣謀反自殺碑以范為範即卒栞即刋字巴郡太守都亭侯張府君功徳敘無額并隂中平五年巴郡太守都亭侯張府君功徳敘君諱納字子郎勃海南皮人也其先闕二字之胄立姓定氏應天文像炎漢龍興􅕂侯維枝裔滋布竝極爵秩君之曾祖曁其先考軌迹相繼俱闕三字州追侔昔人丕顯其光種羙積徳寔乃毓君膺大之㳤姿脩烝烝之孝友綜覽責典靡古不通察孝㢘除郎中尚書侍郎夙宵在公匪􅀢亐軄遷甘陵句令親病去官念闕二字復義章海内辟司空司徒府厲闕二字引股桓弗就復辟大尉舉髙第侍御史廸謨諧宻靖王室揚州㓂賊陸梁佗難五府表君中丞督闕二字武汾沄所向殪日衣移晷收功献捷省息錢穀還充府帑朝以闕四字騷震剖符守任綏慰散闕二字者征克大勛丙子璽書封都亭侯姃公曲阜尚父營周啓􅍏闕五字自君到官也勤思乾乾闕暇菲身約儉􅀈時麗清踰公儀絜如素絲甄秀異抽㧞孤闕五字以内照外貪饕革悔姦闕二字􅂒刑無斧鉞之周犴無拘之人胊忍蠻夷滔夭蠢動乗虚唐闕五字忿闕斯怒爰整干戈闕二字耽摶則有獲羣醜慴怖絶迹幽竄字鎮集乖離俾寧業宇䘏涷餒闕八字賦出梁益頻􅏵闕二字杼柚其空流轉漕輸沮戊申詺書騰前付冀道逈且艱潮闕六字上如舊常章雖得闕二字家衣行哨然愍悼民亦勞止繇是辭疾闔閤委政中閼敦慈養之闕七字之怨故太尉掾王闕三字府丞李元掾史張勤黎景馮經趙中母㑓蒲勝猶潭等庻奚斯闕二字之義共論敘紀著休烈刋闕二字頌其辭曰闕四字篤生我君姿兼申甫豔闕二字帥典稽古正始順元允恭肅恪唯禮是遵乃訓五品􅀈教在闕五字乾其潤如雨其主闕二字旣脩沮梪導我以文且暴建勛四竟謐群庻安闕三字德慕思昔在邵伯今也復闕三字穆矣卓爾超倫亐令問光乎年隷釋云立姓定氏應天文像盖謂二十八􅀢有張宿其不經與桞敏碑同有殘缺不見守巴郡事盖在朐忍蠻夷蠢動之下此碑乃掾属李元等為之碑隂各書曹掾之名而不稱故吏則是張君在郡之日所立也碑以汾沄為紛紜以澹為瞻以哨為悄以沮梪為爼豆以為億責即墳字􅀢即懈字即曩字即寂字張納碑隂益州從事宕渠李元字次公行丞事從掾位江州然存字元夊主簿江州白文主紀掾閬中黄機録事掾江州王上計掾安漢趙瓌曹掾宕渠李思議曹掾朐忍扶古議曹掾江州上官延議曹掾安漢陳阜議曹掾枳楊本文學主事掾任穆從掾位嚴晏從掾位閬中楊虵從掾位宕渠馮譽從掾位宕渠李竝文學掾閬中周尉曹掾安漢闕昕金曹掾宕渠闕林漕曹掾安漢闕業法曹掾江州闕洽集曹掾江州闕𤣥兵曹掾江州闕比曹掾江州闕盛功曹史宕渠闕經事掾宕渠闕訓文學掾江州闕阿事掾充國闕事掾枳貟闕事掾枳張闕事掾宕渠闕敏事掾枳章闕事掾安漢王業文學主事史閬中張榮奏曹史江州董國奏曹史宕渠沈户曹史宕渠李舍户曹史墊江龔祖户曹史充國李戸令史墊江宋亶献曹史宕渠䘚辭曹史江州母龜辭曹史安漢陳戝曹史充國遺賊曹史江州然䧺戝曹史平都張恃戝曹史宕渠曲胤右賤曹史枳牟梁決曹史宕渠王安右金曹史安漢范謀左金曹史宕渠王裦左倉曹史充國楊徐右倉曹史江州尹裴左漕曹史安漢曹已右漕曹史墊江田嵎法曹史江州愠益右集曹史江州張南右兵曹史墊江夏晋比曹史充國何鐔中部督􅗯安漢陳胤南部督􅗯閬中王湯監市掾閬中趙應領校安漢長江州上官旦中部案獄閬中有府後督盗賊枳李街文學史江州鈆遷守属江州丁盛守属江州謁恭守属安漢郭興守属充國誰將守属宕渠李平守属充國王可守属安漢楊連守属安漢邠升中平五年三月上旬書君升台祚承天百福子孫千億隷釋云從事及丞則書其字主簿以下掾使並書名盖一郡之吏也漢故圉令趙君之碑隷額初平元年献帝君諱闕字闕建闕四字繤脩其緒温良恭儉敦詩闕六字積而能𣪚菲薄其身博施闕八字芬芳畼于諸夏郡仍優署五官掾功曹州辟從事司徒楊公辟以兄憂􅄇至其後司徒袁公仍辟闕二字除新闕長遷圉令播徳二城風曜穆清當闕八字㑹被疾去官􅏵六十有八以中平五年冬十一月壬寅卒闕十七字斯詠闕十七字紀伐以毖後昆其辭曰天寔髙唯聖同戱我君羡其縱體弘仁蹈中庸所臨厯有休功追景行亦難雙刋金石示萬邦初平元年十二月廿八日立益州太守髙眹脩周公禮殿記無額初平五年金石略云蔡邕書漢初平五年倉龍甲戌旻天季月脩舊築周公禮壂始自文翁應斯度開建畔宫立堂布觀廟門相鉤司延公辟相承亐甲故府榇潼文君増造吏寺二百餘間四百年之際變異蠭啟旋機􅀈常壬衡失統强桀并兼人襄僥戰兵雷合民失命烈火飛炎一都之舍官民寺同日一朝合為灰炭獨􅕂文翁石廟門之兩觀禮樂崩坥風俗混亂誦讀已絶倚􅀈夫禮興則民壽樂興則國化郡將陳􅕂髙君節苻典境􅂒斯十有三載㑹直優亂曲匡救濟民塗炭閔斯闕三字㓂學者表儀闕四字大小推誠興復第館八音克諧鬼方來觀爲後昌基闕神不闕隷釋云献帝初平五年正月改元興平此碑書初平九月者天下方亂置郵稽晩也梓潼文君建武中益州太守文參也禮殿柱皆削方此刻于東南一柱亦木爾歐陽以為文翁石柱記誤也碑以旋璣為璇機以優為擾以蠭啟作蜂起恐作蔓壬衡即玉衡廣川書䟦云昔人嘗疑朕非臣下可制名魏文帝時夏侯覇父名朕仕于漢漢故領校巴郡太守樊府君碑篆額建安十年献帝君諱敏字升達肇祖戯遺苗后稷爲堯種樹舍潛于岐天亶甫乃萌昌發周室衰微霸伯匡弼爲韓魏魯分爲楊充矅封􅍏土河東漢之際或居于㦯集于梁君纉其緒南西畺濵近聖禹飲汝茹汸角好學治春秋嚴氏經貫穸究字道度無文不睹於是國君備禮招請濯冕顯傑立忠謇有夷史之直卓宻之風鄉黨見歸察孝除郎永昌長史遷宕渠令布化三載遭離母憂五五斷仁大將軍辟光和之中京師擾䧺狐綏綏冠履同嚢投核長驅畢至枕國復重察辭病不就再奉朝娉十辟外䑓常爲治中諸部從事舉直錯枉譚思舊制彈饕糾貪務鉏民穢患苦政俗喜怒佗律案罪殺字人不倡告子属孫散若此者􅄇入墓門州里僉然號曰吏師季􅄇米巫􅓇瘧續蠢青𦍑姦狡並起陷附者衆君執一心賴無恥復辟司徒道隔􅄇徃牧伯劉公二卋欽重表授巴郡後漢中秋老乞字身㕥助義都尉養疾閭里又行裦義校尉君仕􅄇爲人禄􅄇爲已桓大度軆蹈萁㫖常窮台緄松協軌八十有四嵗在汁洽紀驗期臻奄臧形凡百咸痛士女涕泠臣子裦術刋勒銘其辭曰於戲考經徳炳朙勞謙損益耽古儉清立朝正色能無撓廎威恩御下持滿億盈所厯見慕遺歌景形書載㑓义股肱幹楨有物有則模楷後生宜叅鼎鉉稽建皇靈王路阪險鬼方􅄇庭恒戢莭足輕寵賤榮故闕大選而捐陪臣晏嬰弼殿㽞矦距齊非辭福也乃辟禍兮闕辭白演元垂闕岳瀆闕二字兮金精大佐寔生賢兮闕欲救民徳彌大兮遭偶陽九百六㑹兮當闕遐秊今遂逝兮歍􅥒哉魂神闕兮建安十年三月上旬造石土劉盛息懆書隷釋云碑額稱領校巴郡太守者朝無成命也二劉謂焉與璋米巫謂張修與魯五五與費鳳碑菲五五同義謂二十五月也投核㕥核為劾也京師擾攘䧺狐綏綏謂中官用事也助義都尉裦義校尉史䇿未之見劉焉到蜀以張魯督義司馬則皆劉焉創制者嵗在未曰協洽此作汁與協同又以擾爲擾攘朝娉為朝聘譚思為燂思倡為猖獗裦術為裦述題剛為題綱領即顧字禹即禹字即殺字歍呼即鳴呼字漢故益州太守高君之碑隷額十四年建安君諱頙字貫方其先出自帝顓頊之苗裔乎逢伯陵者殷湯受命陵有功食采齊闕樂色世爲正卿氏采建姓至髙闕爲桓公將南陽之師而成魯闕美於春秋訖漢闕有四城闕八字外家闕三字道至君立闕五字親仁樂善㳺心無藉無闕三字翔闕十字仕郡辟州清寋之闕􅄇淪時闕舉孝亷闕九字州表蜀郡北部府丞武闕令闕阿鄭之闕二字賦晏闕之闕性試守廣漢属國都尉猶宓子之在宻配字李牧之鎮代試守益州太守闕三字之闕罰膺求由之政事斑芳聲於國畿理髙滿之危溢當登緄職綏闕時運闕未濟天降闕殃殃字害闕貞良建安十四年八月於官卒臣吏播舉而悲叫棃庶踊泣而忉怛追恩念義縗絰側困佗頌曰穆穆我君帝之胄匡輔齊桓闕無其偶苗裔流衍闕彼梁州惟君立莭卓爾絶殊學闕從政闕無茹􅀢宰城子牧惠澤沾優剖苻典郡威徳闕二字示民敬讓閼斷苞組宜享􅩑輔闕徳將舒乾流闕戾闕見隕徂凡百悽愴痛乎何辜爾後嗣子孫之謨隸釋云銘有閼斷苞組之句下文以舒徂辜模協韻知其以組為苴明矣輔齊侯者謂髙徯也碑亦以緄為衮梨為黎漢故綏民校尉騎都尉桂陽曲紅灌陽長熊君之碑隸額二十一年建安君諱闕字子闕其先盖帝頊髙陽氏之苗裔周有天下成王建國㷱繹封楚慶祚闕三字於闕三字亦世載徳丗餘代君髙祖父籌自汝南吴闕五字子靈王𤣥孫大漢龍興闕舉鄉闕􅕥議郎南廵郡國封龍平闕三字祖父旻舉闕二字大司馬郊隧闕曽祖父􅚘􅀈守長州辟元闕六字君闕四字應上計闕祖父師闕二字上計掾君闕字漢舉更􅀈主簿官闕二字三奏辟頙志皓首衣應就君立唯仁與闕十字祖父闕二字治歐羊尚書六日七分少仕州郡臨朝謇鄂孔甫之撡㕥忠孝稱更諸曹闕二字賊曹主記史督􅀈主簿官功曹州闕八字舉孝亷上計掾興平元年八月二十八日王寅詔書除補桂陽曲紅長旣敦文武爲政果達臨化宣惠所去遺績視事六載荆闕八字奔闕掩迫之周罹災致闕郡漬亂鎮南將軍荆州牧侯山􅘯劉君諱表字景升以君純履正出自帝宇緬榮輕舉厲志疾􅀈邪字牧侯闕闕爲民所安命還􅕥綏民校尉領曲紅長莅政隆上古移歸懐繈負而至吏民誦曰彼熊父兮解我患周安我闕移遭母憂闕二字去官􅘯九應㑹王室威闕君功顯宿著海内諮美拜騎都尉受命立灌陽縣督長六載無為而治稽則先民闕二字附無怨曠聲君春秋七十有一以廿一􅏵三月廿七日丙寅卒官吏民懷慕官属從黄郭闕二字奚湯闕扶還闕哀如彫傷見農夫泣淚路堣皆懹悽愴哀我惠君君同産弟朢季公貭性忼慨史魚之直吏功曹列掾督􅀈都梁長早終君長子爯孝存姿敦良躭志好學博覧􅀈藝闕二字曹列闕三奏辟召於州終昔周文公作頌宋成􅊲父公子斯追羡遺績紀述前勲於是刋碑以示後緄其詞曰熊君遷基闕宇漢興代項廵行南土顯封受遂延祖絫葉休隆君𦙍其緒充明盛徳字牧城社所在有績龜銀之祚河雒挺錄爲國毗輔懿懿其撡穆穆其姿光光其行桓桓其威清虚澹泊後嗣式序冠秩之應實賴􅍏後昊天忽然枕榮終祐喪我良則國失良輔其􅔅也榮其亾也哀銘勒金石没而衣朽靈也有知祐福子孫支于相生吉而無咎咎字詩云嘉樂君子令徳延于無極追叙君兮純精名稱於州里兮樞機發動執忠貞兮溷亂而衣惑衣􅀈身事汙君兮捐土而進退崇禮約行兮舉動而衣趺遭濁而自靖兮泥而衣滓穢嗚呼君兮匪石是爲州闕東漢文紀巻三十一
