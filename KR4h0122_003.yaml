body:
  text: 東漢文紀卷三明梅鼎祚編安帝諱祜章帝孫父清河孝王慶殤帝崩鄧太后定䇿迎立在位十九年廟曰恭宗長吏去職詔永初元年九月自今長吏被考竟未報自非父母喪無故輒去職者劇縣十歲平縣五歲以上乃得次用敕司𨽻校尉冀并二州刺史元年十一月民訛言相驚棄捐舊居老弱相攜窮困道路其各敕所部長吏躬親曉諭若欲歸本郡在所為封長檄不欲勿強變異求言詔二年六月京師及郡國大水風雨雹七月下詔昔在帝王承天理民莫不據璇璣玉衡以齊七政朕以不德遵奉大業而隂陽差越變異並見萬民飢流羌貊叛戻夙夜克己憂心京京間令公卿郡國舉賢良方正遠求博選開不諱之路冀得至謀以鑒不逮而所對皆循尚浮言無卓爾異聞其百僚及郡國吏人有道術明習災異隂陽之度璇璣之數者各使指變以聞二千石長吏明以詔書博衍幽隱朕將親覽待以不次冀獲嘉謀以承天誡外補吏詔二年九月王主官屬墨綬下至郎謁者其經明任博士居鄉里有亷清孝順之稱才任理人者國相歲移名與偕計上尚書公府通調令得外補京師大飢詔三年三月朕以幼沖奉承鴻業不能宣流風化而感逆隂陽至令百姓飢荒更相噉食永懷悼歎若墜淵冰咎在朕躬非羣司之責而過自貶引重朝廷之不德其務思變復以助不逮舉賢良方正詔五年閏三月朕以不德奉郊廟承大業不能興和降善為人祈福災異蜂起寇賊縱橫夷狄猾夏戎事不息百姓匱乏疲於徵發重以蝗蟲滋生害及成麥秋稼方收甚可悼也顛而不扶危而不持則將焉用彼相矣公卿大夫將何以匡救濟斯艱厄承天誡哉蓋為政之本莫若得人褒賢顯善聖制所先濟濟多士文王以寧思得忠良正直之臣以輔不逮其令三公特進侯中二千石二千石郡守諸侯相舉賢良方正有道術達於政化能直言極諫之士各一人及至孝行與衆卓異者并遣詣公車朕將親覽焉紹封功臣詔永初六年夫仁不遺親義不忘勞興滅繼絶善善及子孫古之典也昔我光武受命中興恢𢎞聖緒橫被四表昭假上下光耀萬世祉祚流衍垂於罔極豫末小子夙夜永思追惟勳烈披圖按籍建武元功二十八將佐命虎臣讖記有徵蓋蕭曹紹封傳繼於今况此未遠而或至乏祀朕甚愍之其條二十八將無嗣絶世若犯罪奪國其子孫應當統後者分别署狀上將及景風章敘舊德顯茲遺功焉蝗災詔元初二年五月河南及郡國十九蝗朝廷不明庶事失中災異不息憂心悼懼被蝗以來七年於茲而州郡隱匿裁言頃畝今群飛蔽天為害廣遠所言所見寧相副邪三司之職內外是監既不奏聞又無舉正天災至重欺罔罪大今方盛夏且復假貸以觀厥後其務消救災眚安輯黎元雨水賑恤詔四年七月今年秋稼茂好垂可收獲而連雨未霽懼必淹傷夕惕惟憂思念厥咎夫霖雨者人怨之所致其武吏以威暴下文吏妄行苛刻鄉吏因公生姦為百姓所患苦者有司顯明其罰又月令仲秋養衰老授几杖行麋粥方今案比之時郡縣多不奉行雖有麋粥粳粃相半長吏怠事莫有躬親甚違詔書養老之意其務崇仁恕賑護寡獨稱朕意焉崇節約詔五年七月舊令制度各有科品欲令百姓務崇節約遭永初之際人離荒厄朝廷躬自菲薄去絶奢飾食不兼味衣無二綵比年雖獲豐穰尚乏儲積而小人無慮不圖久長嫁娶送終紛華靡麗至有走卒奴婢被綺榖著珠璣京師尚若斯何以示四遠設張法禁懇惻分明而有司惰任訖不奉行秋節既立鷙鳥將用且復重申以觀後效春賜榖詔六年二月夫政先京師後諸夏月令仲春養幼小存諸孤季春賜貧窮賑乏絶省婦使表貞女所以順陽氣崇生長也其賜民尤貧困孤弱單獨榖人三斛貞婦有節義十斛甄表門閭旌顯厥行舉吏詔延光元年八月詔三公中二千石舉刺史二千石令長相視事一歲巳上至十歲清白愛利能敕身率下防姦理煩有益於人者無拘官簿刺史舉所部郡國太守相舉墨綬隱親悉心勿取浮華詔羣臣皇太子為安帝乳母王聖及太長秋江京等搆讒太子遂議廢立太僕來厯光祿勳祋諷等並證明太子無過帝使中常侍奉詔脅羣臣太子廢為濟隂王父子一體天性自然以義割恩為天下也厯諷等不識大典而與羣小共為歡譁外見忠直而內希後福飾邪違義豈事君之禮朝廷廣開言事之路故且一切假貸若懷迷不反當顯明刑書貶樂成王萇詔萇本濟北王子嗣為樂成王驕淫不道有司舉奏萇罪安帝詔萇有靦其面而放逸其心知陵廟至重承繼有禮不惟致敬之節肅穆之慎乃敢擅損犧牲不偹苾芬慢易大姬不震厥教出入顛覆風淫於家娉取人妻饋遺婢妾驅擊吏人專巳凶暴愆罪莫大甚可恥也朕覽八辟之議不忍致之於理其貶萇爵為臨湖侯朕無則哲之明致簡統失序罔以尉承大姬增懷永歎賜豫州刺史馮煥詔洪適𨽻釋告豫州刺史馮煥今下闕常為效用邊將統御下闕內以威恩撫喻杜下闕去年鮮卑連犯鄣塞下闕過掩卒搗毁無距捍下闕率攝太守以下進退下闕曾不表罪誅多擁下闕麗王宫輕狡猧下闕纎下闕絶宫不自效楚下闕化頃屬樂浪久矣下闕當所詣設訖不定決下闕月左右欲來犯法下闕北顧傷心闕煥有下闕冀煥能竭心盡慮有下闕上如不從化督録部下闕惟前後詔書以前人下關侍御使便宜數上下闕元初六年十二月報髙句驪王遂成降詔遂成父宫屢冦邊及死遂成立朝議欲因其喪發兵擊之安帝從尚書陳忠言宜遣弔問因責前罪遂成詣玄莬降詔曰遂成等桀逆無狀當斬斷葅醢以示百姓幸會赦令乞罪請降鮮卑濊貊連年冦鈔驅略小民動以千數而裁送數十百人非向化之心也自今以後不與縣官戰鬬而自以親附送生口者皆與贖直縑人四十匹小口半之夏勤為司徒䇿文丁孚漢儀通典維元初六年三月甲子制詔以大鴻臚勤為司徒曰朕承天序惟稽古建爾於位為漢輔往率舊職敬敷五教在乎寬允左右朕躬宣力四表保乂皇家於戲實惟秉國之均方祗厥緒時亮天工可不慎歟勤其戒之在乎寬允一作五教在寬免司空張敏䇿永初六年春行大射禮敏陪位頓仆乃䇿免之䇿文載東觀記今君所苦未瘳有司奏君年體衰羸郊廟禮儀仍有曠廢鼎足之任不可以缺重以職事留君其上司空印綬徵郎宗等䇿書謝承後漢書云建光元年公車賜䇿書微樊英及同郡孔喬李昺北海郎宗陳留楊倫東平王輔六人惟宗倫到洛餘並不至郎宗李昺孔喬等前此徵命未肯降意恐主者玩弄禮意不備使難進易退之人龍潛不屈其身各致嘉禮遣詣公車將以補察國政輔朕不逮順帝名保安帝太子坐譛廢帝崩立北鄉侯殤中黃門孫程等復立帝在位十九年廟曰敬宗封中黃門孫程等十九侯詔帝初為太子為江京等所譛廢閻太后及弟顯與焉安帝崩立北鄉侯即殤程等遂合誅京顯復立帝此詔在未改元前夫表功録善古今之通義也故中常侍長樂太僕江京黃門令劉安鉤盾令陳達與故車騎將軍閻顯兄弟謀議惡逆傾亂天下中黃門孫程王康長樂太官丞王國中黃門黃龍彭愷孟叔李建王成張賢史泛馬國王道李元楊他陳子趙封李剛魏猛苖光等懷忠憤發戮力協謀遂掃滅元惡以定王室詩不云乎無言不讐無德不報程為謀首康國協同其封程為浮陽侯食邑萬户康為華容侯國為酈侯各九千户黃龍為湘南侯五千户彭愷為西平昌侯孟叔為中廬侯李建為復陽侯各四千二百户王成為廣宗侯張賢為祝阿侯史泛為臨沮侯馬國為廣平侯王道為范縣侯李元為褒信侯楊他為山都侯陳豫為下雋侯趙封為析縣侯李剛為枝江侯各四千户魏猛為夷陵侯二千户苖光為東阿侯千户舉賢良方正詔延光四年十一月即位十二月詔朕以不德纂承洪緒今隂陽不和疾疫為害思聞忠正以匡不逮其令三公卿士舉賢良方正能直言極諫之士各一人後漢紀改元大赦詔永建元年正月先帝聖德享祚未永早棄鴻烈姦慝緣間人庶怨讟上干和氣疫癘為災朕奉承大業未能寧濟蓋至理之本稽𢎞德惠蕩滌宿惡與人更始其大赦天下賜男子爵人二級為父後三老孝悌力田人三級流民欲自占者一級鰥寡孤獨篤癃貧不能自存者粟人五斛貞婦帛人三匹坐法當徙勿徙亡徙當傳勿傳宗室以罪絶皆復屬籍其與閻顯江京等交通者悉勿考勉修厥職以康我民蠲租詔元年十月朕以不德統承大業虐氣流行厲疾為災重以水潦秋稼漂沒每州郡所出惻然自刻其令當輸今年租者一切勿責後漢紀地震免租詔三年正月京師漢陽地震殺人京師地動漢陽尤甚加以比年民飢饉夙夜祗懍羣公卿士其深思古典有以消災復異救此下民忠信嘉謨靡有所諱其勿收漢陽今年田租後漢紀赦詔四年正月朕託王公之上涉道日寡政失厥中隂陽氣隔寇盜肆暴庶獄彌繁憂悴永歎疢如疾首詩云君子如祉亂庶遄巳三朝之會朔旦立春嘉與海內洗心自新其赦天下從甲寅赦令以來復秩屬籍三年正月巳來還贖其閻顯江京等知識婚姻禁錮一原除之務崇寬和敬順時令遵典去苛以稱朕意封還獻珠詔四年五月海內頗有災異朝廷修政太官減膳珍玩不御而桂陽太守文礱不惟竭忠宣暢本朝而遠獻大珠以求幸媚今封以還之後漢記漢陽都尉獻大珠詔云都尉不宣揚本朝而獻珠求媚免薊部租詔六年十一月連年災潦冀部尤甚比蠲除實傷贍恤窮匱而百姓猶有棄業流亡不絶疑郡縣用心怠惰恩澤不宣易美損上益下書稱安民則惠其令冀部勿收今年田租芻稿祈嶽瀆詔陽嘉元年二月政失厥和隂陽隔并冬鮮宿雪春無澍雨分禱祈請靡神不禜深恐所在慢違如在之義今遣侍中王輔等持節分詣岱山東海滎陽河洛盡心祈焉選刺史二千石詔元年閏十二月間者以來吏政不勤故災咎屢臻盜賊多有退省所由皆以選舉不實官非其人是以天心未得人情多怨書歌股肱詩刺三事今刺史二千石之選歸任三司其簡序先後情核髙下歲月之次文武之宜務存厥衷地震求言詔二年四月京師地震五月下詔朕以不德統奉鴻業無以奉順乾坤協序隂陽災眚屢見咎徵仍臻地動之異發自京師矜矜祗畏不知所裁羣公卿士將何以匡輔不逮奉答戒異異不空設必有所應其各悉心直言厥咎靡有所諱後漢紀其各舉敦朴士一人直言厥咎漢中李固扶風馬融太史張衡皆對策上以固對為第一連旱大赦詔三年五月昔我太宗丕顯之德假於上下儉以恤民政致康乂朕秉事不明政失厥道天地譴怒大變仍見春夏連旱寇賊彌繁元元被害朕甚愍之嘉與海內洗心更始其大赦天下自殊死以下謀反大逆諸犯不當得赦者皆赦除之日變詔永和元年正月朕秉政不明災眚屢臻典籍所忌震食為重今日變方遠地搖京師咎徵不虛必有所應羣公百僚其各上封事指陳得失靡有所諱隴西諸郡地震詔建康元年正月隴西漢陽張掖北地武威武都自去年九月巳來地百八十震山谷坼裂壞敗城寺殺害民庶夷狄叛逆賦役重數內外怨曠惟咎歎息其遣光祿大夫案行宣暢恩澤惠此下民勿為煩擾增封東海王臻兄弟制詔臻嗣為王及弟蒸鄉侯儉有孝行常分租秩賑給諸父昆弟國相以聞順帝美之制詔大將軍三公大鴻臚東海王臻以近蕃之尊少襲王爵膺受多福未知艱難而能克巳率禮孝敬自然事親盡愛送終竭哀降儀從事寢苫三年和睦兄弟恤養孤弱至孝純備仁義謙𢎞朕甚嘉焉夫勸善勵俗為國所先曩者東平孝王敞兄弟行孝喪母如禮有增户之封詩云永世克孝念茲皇祖今增臻封五千户儉五百户光啓土宇以酬厥德贈沛王廣祖母詔廣嗣王有錮疾安帝詔廣祖母周領王家事周正明有禮法漢安中薨順帝下詔沛王祖母太夫人周秉心淑慎導王以仁使光祿大夫贈以妃印綬告南陽太守禮樊英詔英字季齊南陽魯陽人有藝術公車徵至不屈永建四年拜五官中郎將數月稱疾詔以為光祿大夫賜歸令所在致禮五官中郎將樊英委榮辭祿不降其節今以英為光祿大夫賜歸家所在縣給榖千斛常以八月存髙年致牛一頭酒三斛樊英别傳告中山相朱遂詔陽嘉元年望都蒲隂狼殺童兒九十七人中山相朱遂到官不出奉祠北薇詔曰災暴緣類符驗不虛政失厥中狼災為應乃至殘食孩幼朝廷愍悼思惟咎徵博訪其故山嶽尊靈國所望秩而遂比不奉祠怠慢廢典不務懇惻淫刑放濫害加孕婦毒流未生感和致災其詳思改救追復所失有不遵憲舉正以聞東觀漢記封馬賢孫詔東觀漢記永和六年十二月詔故將軍馬賢前伐西夷尅敵深入父子三人同命其以漢中南鄭之武陽亭封賢孫承先為武陽亭侯食租稅拜張綱子續為郎中詔綱為廷尉皓之子以言忤梁冀時廣陵賊張嬰等寇亂徐揚間十餘年冀乃以綱為廣陵太守綱單車説降之卒於郡故廣陵太守張綱大臣之苖剖符統務正身導下班宣德信降集劇賊張嬰萬人息干戈之役濟蒸庶之困未升顯爵不幸早卒嬰等縗杖若喪考妣朕甚愍焉拜綱子續為郎中賜錢百萬告河南尹徵張楷詔楷字公超霸之子隱居𢎞農山中辟舉不就漢安元年順帝特下詔楷復告疾故長陵令張楷行慕原憲操擬夷齊輕貴樂賤竄迹幽藪髙志確然獨拔羣俗前此徵命盤桓未至將主者玩習於常優賢不足使其難進歟郡時以禮發遣追祠太尉楊震詔䇿震以正直忤中常侍樊豐等被譛收印綬自殺時連有災異帝感震之枉乃下詔䇿故太尉震正直是與俾匡時政而青蠅點素同茲在藩上天降威災眚屢作爾卜爾筮惟震之故朕之不德用彰厥咎山崩棟折我其危哉今使太守丞以中牢具祠魂而有靈儻其歆享賜宋漢䇿漢厯東平相度遼將軍以威恩著稱遷大僕上病拜太中大夫卒䇿曰太中大夫宋漢清修雪白正直無邪前在方外仍統軍實懷柔異類莫非嘉績戎車載戢邊人用寧子録乃勳引登九列因病退讓守約彌堅將授三事未克而終朝廷愍悼怛其愴然詩不云乎肇敏戎功用錫爾祉其令將相大夫會葬加賜錢十萬及其在殯以全素絲羔羊之潔焉賜國三老袁良册𨽻釋詳碑册曰頃者連遇運害災縧備至隂陽不和寒暑不節昔孔子制義承奉􅋿有興盛之福期郎致來咎之變朕以眇身襲表繼業二九之戒今直其際圖記占闕􅀈在藩國自先帝至德猶有七國之謀蓋治卋者不諱其難勝追社稯之重恐有交會諸國王侯開導以驕滿之漸令姦邪因緣生慝相以顯選蕳練內升昔掌苻竟惠民故連拔授不問次典郡職重親執絰緯隱括在手往者全尊發縱􅋋平陽青約藩輔其節衎然忠臣之義有獻其加精微切防􅓟􅀈疚心以戒今特賜錢十萬雜繒丗匹壬具劍佩書刀繡文印衣極手巾各一悉乃心勉協同便宜數上壬玉字梁商誄東觀漢記孰云忠侯不聞其音背去國家都茲玄隂幽居𡨕冥靡所且窮太傅三公封郭鎮奏鎮延光中為尚書迎立濟隂王率羽林士擊殺衛尉閻景再遷尚書令三公奏順帝乃封鎮定潁侯鎮冒犯白刃手劍賊臣姦黨殄滅宗廟以寧功比劉章宜顯爵土以勵忠貞有司奏上順帝尊號東觀漢紀孝順皇帝𢎞秉聖哲龍興統業稽前則古欽奉鴻烈寬裕晏晏宣恩以極躬自菲薄以崇玄默遺詔貽約顧念萬國衣無製新玩好不飾塋陵損狹不起寢廟遵履前制敬敕慎終有始有卒孝經曰愛敬盡於事親而德教加於百姓詩云敬慎威儀惟民之則臣請上尊號曰敬宗廟天子世世獻奉藏主夾祭進武德之舞如祖宗故事沖帝名炳順帝太子建康元年八月即位梁太后稱制改元永嘉正月崩年三歲趙峻李固參録尚書事䇿應劭漢官儀太尉趙峻二世掌典機衡有匪石不二之心大司農李固公族之苖忠直不回有史魚之風今以峻為太傅固為太尉與大將軍冀參録尚書事質帝名纘肅宗玄孫渤海王鴻之子沖帝崩梁太后與梁冀定䇿立之在位一年為冀毒殺正祀詔永嘉元年五月明年改元孝殤皇帝雖不永休祚而即位踰年君臣禮成孝安皇帝承襲統業而前世遂令恭陵在康陵之上追覽前代位第之宜先後相踰失其次序非所以奉宗廟之重垂無窮之制昔定公追正順祀春秋善之其令恭陵次康陵憲陵次恭陵以序親秩為萬世法追覽句漢紀補方春寬罰詔本初元年正月昔堯命四子以欽天道鴻範九疇休咎有象夫瑞以和降異因逆感禁微應大前聖所重頃者州郡輕慢憲防競逞殘暴造設科條陷入無罪或以喜怒驅逐長吏恩阿所私罰枉仇隙至令守闕欣訟前後不絶送故迎新人離其害怨氣傷和以致災眚書云明德慎罰方春東作育微敬始其敕有司罪非殊死且勿案驗以崇在寬賑恤二郡詔元年二月九江廣陵二郡數離寇害殘夷最甚生者失其資業死者委尸原野昔之為政一物不得其所若巳為之况我元元嬰此困毒方春戒節賑濟乏厄掩骼埋胔之時其調比郡見榖出稟窮弱收葬枯骸務加埋恤以稱朕意困毒漢紀作飢饉桓帝名志章帝曾孫初封蠡吾侯質帝崩迎立在位二十一年廟曰威宗舉亷吏詔本初元年七月明年改元建和孝亷亷吏皆當典城牧民禁姦舉善興化之本恆必由之詔書連下分明懇惻而所在玩習遂至怠慢選舉乖錯害及元元頃雖頗繩正猶未懲改方今淮夷未殄軍師屢出百姓疲悴困於徵發庶望羣吏惠我勞民蠲滌貪穢以祈休祥其令秩滿百石十歲以上有殊才異行乃得參選贓吏子孫不得察舉杜絶邪偽請託之原令亷白守道者得信其操各明守所司將觀厥後減陵徒刑詔建和元年四月比起陵塋彌厯時歲力役既廣徒𨽻尤勤頃雨澤不沾密雲復散儻或在茲其令徒作陵者減刑各六月日蝕免禁徙詔三年四月丁卯晦日有食之蓋聞天生蒸民不能相理為之立君使司牧之君道得於下則休祥著乎上庶事失其序則咎徵見乎象間者日食毁缺陽光晦暗朕袛懼潛思匪遑啓處傳不云乎日食修德月食修刑昔孝章帝愍前世禁徙故建初之元並蒙恩澤流徙者使還故郡沒入者免為庶民先皇德政可不務乎其自永建元年迄於今歲凡諸妖惡支親從坐及吏民減死徙邊者悉歸本郡唯沒入者不從此令災異詔永興二年二月比者星辰繆越坤靈震動災異之降必不空發敕巳修政庶望有補其與服制度有踰侈長飾者皆宜損省郡縣務存儉約申明舊令如永平故事詔司𨽻校尉部刺史二年六月蝗災為害水變仍至五榖不登人無宿儲其令所傷郡國種蕪菁以助人食日食又詔二年九月日有蝕之朝政失中雲漢作旱川靈涌水蝗蟲孶蔓殘我百榖太陽虧光飢饉薦臻其不被害郡縣當為飢餒者儲天下一家趣不糜爛則為國寶其禁郡國不得賣酒祠祀裁足封單超等為亭侯詔延熹二年八月帝與超等謀詔司𨽻將兵圍梁冀第收大將軍印綬冀自殺梁冀姦暴濁亂王室孝質皇帝聰敏早茂冀心懷忌畏私行殺毒永樂太后親尊莫二冀又遏絶禁還京師使朕離母子之愛隔顧復之恩禍害深大罪釁日滋賴宗廟之靈及中常侍單超徐璜具瑗左悺唐衡尚書令尹勳等激憤建䇿內外協同漏刻之間桀逆梟夷斯誠社稷之祐臣下之力宜班慶賞以酬忠勳其封超等五人為縣侯勳等七人為亭侯減租調詔九年正月比歲不登人多飢窮又有水旱疾疫之困盜賊徵發南州尤甚災異日食譴告纍至政亂在豫仍獲咎徵其令大司農絶今歲調度徵求及前年所調未畢者勿復收責其災旱盜賊之郡勿收租餘郡悉半入尊匽貴人為孝崇皇后詔東觀漢記博園匽貴人覆髙明之懿德容淑美之嘉會於天合靈篤生厥躬欲報之德詩所感歎今以貴人為孝崇皇后光祿大夫周舉喪事詔舉建和三年卒朝廷以舉清公亮直方欲以為宰相深痛惜之乃詔告光祿勳汝南太守昔在前世求賢如渴封墓軾閭以光賢哲故公叔見誄翁歸蒙述所以昭忠厲俗作範後昆故光祿大夫周舉性侔夷魚忠踰隨管前授牧守及還納言出入京輦有欽哉之績在禁闈有密靜之風豫録乃勳用登九列方欲式序百官亮協三事不永夙終用乖遠圖朝廷愍悼良為愴然詩不云乎肇敏戎功用錫爾祉其令將大夫以下到喪發日復會弔加賜錢十萬以旌委蛇素絲之節焉後漢紀詔曰昔在前代封墓軾閭所以激忠厲俗以光後昆故光祿大夫周舉性侔夷齊直同史魚入參讃納出司京輦有密靜之風豫欽乃勳將登三事不幸夙終朕甚惜焉詩不云乎肇敏戎功用錫爾祉其賜錢千萬以旌素節學生補郎舍人詔桓帝建和初詔諸學生課試補官元嘉二年詔因試憲等補郎舍人書生汝南胡憲陳留闕恭闕爽或六十以下常以月朔會辟雍垂白安貧童子潁川王闕通經拜太子舍人封樊重後詔東觀漢記桓帝永夀三年十月上幸雲夢至新野公主夀張敬侯主廟乙丑諡曰敬存善繼絶食藉德貞武騎都尉樊演髙祖父重以光武皇帝元舅扶助中興追封壽張侯諡曰敬祖父茂封冠軍平望鄉侯五國並建其二絶者嗣之封黃瓊邟鄉侯詔延熹元年太尉黃瓊清儉不撓數有忠謇加以典謀深奧有師傅之義連在三司不阿權貴疾風知徑草朕甚嘉焉其封瓊邟鄉侯封張彪鮑吉詔延熹三年汝南太守張彪故河南尹鮑吉與朕有潛龍之舊皆封列侯並後漢紀賜應奉詔謝承後漢書奉為武陵太守免延熹中武陵蠻復寇荆州車騎將軍馮緄以奉有威恩為蠻夷所服上請與俱征拜從事中郎詔奉蠻夷叛逆作難積惡放恣鑊中之魚火熾湯盡當悉燋爛以刷國恥朝廷以奉昔守南土威名播越故復式序重任奉之廢興期在於今賜奉錢十萬駮犀方具劍金錯把刀劍革帶各一奉其勉之刷謝承書作雪報橋玄詔玄為涼州刺史諸郡飢餒玄廩訖乃上聞詔報邊榖不得妄出玄擅出於是玄有汲黯憂民之心後不以為常蔡雍橋玄碑遣還南單于居車兒詔延熹元年南單于諸部復叛張奐為北中郎將討降之奐以單于不能統理國事乃拘之上立左谷蠡都王紺桓帝詔春秋大居正居車兒一心向化何罪而黜其遣還單于漢紀其遣還庭攝部落紀作元康元年詔詔䇿馮緄緄字鴻卿宕渠人仕終廷尉延熹初長沙蠻與零陵武陵諸夷悉反寇掠江陵間荆州刺史劉度南郡太守李肅並沒於是拜緄為車騎將軍將兵討之帝詔䇿緄荆州平定振旅還京師蠻夷猾夏久不討攝各焚都城蹈籍官人州郡將吏死職之日相逐奔竄曾不反顧可愧言也將軍素有威猛是以擢授六師前代陳湯馮傅之徒以寡擊衆郅支夜郎樓蘭之戎頭懸都市衛霍北征功列金石是皆將軍所究覽也今非將軍誰與修復前迹進赴之宜權時之䇿將軍一之出郊之事不復內御巳命有司祖於國門詩不云乎進厥虎臣闞如虓虎鋪敦淮濆仍執醜虜將軍其勉之後漢書封中常侍州輔吉成侯詔册建和二年𨽻釋詳碑蓋聞春秋之闕采毫毛之善大漢典制有恩澤之封輔厯世守省恪恭位著建立之際處乎左右常伯之職同闕協意以亮天功往者鄭衆蔡倫行事科比其封輔為葉吉成侯贈中常侍樊安制詔延熹元年八月𨽻釋詳碑制詔中常侍樊安宿衛厯年恭恪淑慎嬰被疾病不羍蚤終今使湖陽邑長劉追號安為騎都尉贈印綬魂而有嘉其寵榮嗚呼哀哉褒贈中常侍曹騰制騰以定䇿立桓帝功封侯至大長秋操之祖也𨽻釋云木經譙縣有曹騰碑題漢故中常侍長樂太僕特進費亭侯曹君之碑延熹三年立碑隂又刋詔䇿二歐趙不指此為曹騰碑隂失稽考也詔見梁太后碑載在制前制曰闕中常侍費亭侯曹騰騰見克闕先帝能自舊拔於險阻之中不陷乎羣小害巳之譖遂亦闕五字前後英謀闕二字進賢納闕踐之初受爵亐東土厥功章然騰守足退居約身自持遭離母憂孝行純篤闕慎禮紀喪能過哀服祥有不忍遠離之恩情闕感病毁性早薨朕甚閔焉詩曰靡不有初鮮克有終騰能終之春秋之義旌闕采芣以勸為善及其在殯使兼諫議大闕六字特進贈費亭侯印綬魂而有靈嘉其寵榮嗚呼哀哉祠恭懷皇后祝文丁孚漢儀孝曾孫皇帝志使有司臣太常撫夙興夜處小心畏忌不墮其身一不寧敢用潔牲一元大武柔毛剛鬛商祭明視薌箕嘉薦普淖醎鹺豐本明粢醪用薦酎事於恭懷皇后尚享嘏辭賜皇帝福恭懷皇后命工祝承致多福無疆於爾孝曾孫皇帝使爾受祿於天宜稼於田眉壽萬年介爾景福俾守爾民勿替引之靈帝諱宏章帝玄孫河問孝王開之後襲父解瀆亭侯爵桓帝崩無子竇太后迎立在位二十二年陳蕃參録尚書事䇿應劭漢官儀故太尉陳蕃忠亮謇諤有不吐不茹之節司𨽻胡廣惇德允元五世從政今以蕃為太傅與廣參録尚書事同前范曄後漢書桓帝崩竇后臨朝詔進蕃太傅夫民生樹君使司牧之必須良佐以固王業前太尉陳蕃忠清直亮其以蕃為太傅録尚書事封陳蕃詔後漢紀靈帝建寧元年太傅陳蕃輔弼先帝出納惟允謇諤之節宣於本朝朕初踐祚親受䇿命忠篤之性老而彌純其封蕃為髙陽侯同前范曄書靈帝即位竇太后復優詔封蕃固讓不受按二詔紀作靈帝書作桓思竇太后蓋褒功以勸善表義以厲俗無德不報大雅所歎太傅陳蕃輔弼先帝出內纍年忠孝之美德冠本朝謇諤之操華首彌固今封蕃髙陽侯食邑三百户立宋皇后制詔後漢書注維建寧四年七月乙未制詔皇后之尊與帝齊體供奉天地祗承宗廟母臨天下故有華興殷薑任母周二代之隆蓋有內德長秋宫闕中宫曠位宋貴人乘淑媛之懿體山河之儀威容昭曜德冠後庭羣寮所咨人曰宜哉卜之蓍龜卦得承乾有司奏議宜稱紱組以臨兆民今使太尉襲使持節奉璽綬宗正祖為副立貴人為皇后其往踐爾位敬宗禮典肅慎中饋勿替朕命永終天祿消復災異制以郎中張文上疏也下太尉司徒司空夫瑞不虛至災必有緣朕以不德秉統未明以招祅偽將何以昭顯憲法哉三司任政者所當夙夜而各拱默訖未有聞將何以奉答天意救寧我人其各悉心思所崇改務消復之術稱朕意焉追贈司空楊賜䇿故司空臨晉侯賜華嶽所挺九德純備三葉宰相輔國以忠朕昔初載授道帷幄遂階成勳以陟大猷師範之功昭於內外庶官之務勞亦勤止七在卿校殊位特進五登袞職弭難乂寧雖受茅土未答厥勳哲人其萎將誰咨度朕甚懼焉禮設殊等物有服章令使左中郎將郭儀持節追位特進贈司空驃騎將軍印綬諡曰文烈侯漢紀師範之功既昭於內弼亮之勤亦著於外徵荀爽等詔中平五年徴皆不至頃選舉失所多非其人儒法雜揉學道浸微處士荀爽陳紀鄭玄韓融張楷耽道樂古志行髙潔清貧隱約為衆所歸其以爽等各補博士徵薑肱手詔肱彭城廣戚人博通經緯朝聘不就即拜太中大夫羸病行竄靈帝手筆下詔肱抗凌雲之志養浩然之氣以朕德薄未肯降志昔許由不屈王道為化夷齊不撓周德不虧州郡以禮優順勿失其志謝承後漢書少帝名辨靈帝長子何皇后生立六月董卓廢為𢎞農王弒之袁隗為太傅詔光熹元年朕以眇躬君王海內夙夜憂懼靡知所濟夫天地人道其用在三必須輔佐以昭其功後將軍袁隗德量寬重奕世忠恪今以隗為太傅録尚書事朕且諒暗委成羣后各率其職稱朕意焉後漢紀獻帝諱協靈帝中子立為皇太子帝崩何太后立所生子辨徙協為陳留王董卓廢辨立協在位三十一年禪於魏封山陽公追諡獻帝日食詔初平四年正月日有食之未晡八刻太史令王立奏日晷過度無有變色朝臣皆賀帝密候未晡一刻而蝕尚書賈翊奏立司候不明疑誤上下太尉周忠職所典掌請皆治罪詔不從天道幽遠事驗難明且災異應政而至雖探道知微焉能不失而欲歸咎史官重益朕之不德也後漢紀儒生為太子舍人詔初平四年試儒生上第賜位郎中次太子舍人下第者罷之詔曰孔子歎學之不講不講則所識日忘今耆儒年踰六十去離本土營求糧資不得專業結童入學白首空歸長委農野永絶榮望朕甚愍焉其依科罷者聽因次第為太子舍人報奏立長秋宫詔興平元年帝加元服有司奏立長秋宫下詔於是奏追尊帝母王美人為靈懷皇后朕稟受不𢎞遭值禍亂未能紹先以光故典皇母前薨未卜宅兆禮章有闕中心如結三歲之戚蓋不言吉且須其後後漢書漢紀詔云皇妣宅兆未卜三年之戚禮不言吉朕雖不能終身思慕其何忍言後宫之選乎罪李儒詔初董卓廢少帝為𢎞農王使郎中令李儒鴆殺之及卓誅其黨李傕等亂舉儒為侍中獻帝詔傕辭以卓所為不可罰儒儒前為𢎞農王郎中令迫殺我兄誠宜加罪後漢紀原裴茂詔初平四年大雨漂沒人庶帝使御史裴茂諸詔獄原繫者二百餘人有為李傕所枉者傕表茂擅出囚徒請收之詔曰災異屢降隂雨為害使者銜命宣布恩澤原解輕微庶合天心欲釋寃結而復罪之乎一切勿問罪侯汶詔四年飢帝使侍御史侯汶出太倉米豆為飢人作麋賦恤不實尚書奏收汶考賨詔曰未忍致汶於理可杖五十奉例詔獻帝起居注帝在長安詔三輔地不滿千里而軍師用度非一公卿以下不得奏除其若公田以秩石為率賦與令各自收其租稅孫䇿領會稽太守詔建安二年董卓逆亂凶國害民先將軍堅念在平討雅意未遂厥美著聞䇿遵善道求福不回今以䇿為騎都尉襲爵烏程侯領會稽太守又詔敕故左將軍袁術不顧朝恩坐創凶逆造合虛偽欲因兵亂詭詐百姓聞其言以為不然定得使持節平東將軍領徐州牧溫侯布上術所造惑衆妖妄知術鴟梟之性遂其無道修治王宫署置公卿郊天祀地殘民害物為禍深酷布前後上䇿乃心本朝欲還討術為國效節乞加顯異夫懸賞俟功惟勤是與故便寵授承襲前邑重以大郡榮耀兼至是䇿輸力竭命之秋也其亟與布及行吳郡太守安車將軍陳瑀戮力一心同時赴討吳書拜曹操鎮東將軍襲費亭侯詔曹操素履忠貞輔幹王室頃遭凶暴海內離析操執義討截黃巾為國出命夫祿以賞功罰以絀否今以操為鎮東將軍領兖州牧襲父費亭侯嵩爵并印綬符䇿敕曹操敕鎮東將軍領兖州牧費亭侯故特進顯授上將鈇鉞之任復食舊土雙金之寵董統一州委成之重榮曜昭示亦以優崇投節效命自白之秋也並藝文令州郡罷兵詔吳書云曹操父於泰山被殺歸咎於謙欲伐謙而畏其強乃表獻帝詔令州郡罷兵今海內擾攘州郡起兵征夫勞悴寇難未弭或將吏不良因緣討捕侵侮黎民離害者衆風聲流聞震蕩城邑丘牆懼於橫暴貞良化為羣惡此何異乎抱薪救焚扇火止沸哉今四民流移託身他方攜白首於山野棄稚子於溝壑顧故鄉而哀歎向阡陌而流涕飢厄困苦亦曰甚矣雖悔往者之迷謬思奉教於今日然兵連衆結鋒鏑布野恐一朝解散夕見係虜是以阻兵屯據欲止而不敢散也詔書到其各罷遣甲士還親農桑惟留常員吏以供官署慰示遠近咸使聞知令魏公曹操封拜諸侯守相詔孔衍漢魏春秋曰天子以公典任於外臨事之賞或宜速疾乃命公得承制封諸侯守相詔夫軍之大事在茲賞罰勸善懲惡宜不旋時故司馬法曰賞不逾日者欲民速覩為善之利也昔在中興鄧禹入關承制拜軍祭酒李文為河東太守來歙又承制拜髙峻為通路將軍察其本傳皆非先請明臨事刻印也斯則世祖神明權達損益蓋所用速示威懷而著鴻勳也其春秋之義大夫出疆有專命之事茍所以利社稷安國家而巳况君秉任二伯師尹九有實征夷夏軍行藩甸之外失得在於斯須之間停賞俟詔以滯世務固非朕之所圖也自今以後臨事所甄當加寵號者其便刻印章假授咸使忠義得相奬勵勿有疑焉進魏公操為魏王詔自古帝王雖號稱相變爵等不同至乎褒崇元勳建立功德光啓氏姓延於子孫庶姓之與親豈有殊焉昔我聖祖受命創業肇基造我區夏鑒古今之制通爵等之差盡封山川以立藩屛使異姓親戚並列土地據國而王所以保乂天命安固萬嗣厯世承平臣主無事世祖中興而時有難易是以曠年數百無異姓諸侯王之位朕以不德繼序𢎞業遭率土分崩羣凶縱毒自西徂東辛苦卑約當此之際唯恐溺入於難以羞先帝之聖德賴皇天之靈俾君秉義奮身震迅神武捍朕於艱難獲保宗廟華夏遺民含氣之倫莫不蒙焉君勤過稷禹忠侔伊周而掩之以謙讓守之以彌恭是以往者初開魏國錫君土宇懼君之違命慮君之固辭故且懷志屈意封君為上公欲以欽順髙義須俟勳績韓遂宋建南結巴蜀羣逆合從圖危社稷君復命將龍驤虎奮梟其元首屠其窟棲暨至西征陽平之役親擐甲胄深入險阻芟夷蝥賊殄其凶醜蕩定西陲懸旌萬里聲教遠振寧我區夏蓋唐虞之盛三后樹功文武之興旦奭作輔二祖成業英豪佐命夫以聖哲之君事為己任猶錫土班瑞以報功臣豈有如朕寡德仗君以濟而賞典不豐將何以答神祗慰萬民哉今進君爵為魏王使使持節行御史大夫宗正劉艾奉䇿璽玄土之社苴以白茅金虎符第一至第五竹使符第一至第十君其正王位以丞相領冀州牧如故其上魏公璽綬符䇿敬服朕命簡恤爾衆克綏庶績以揚我祖宗之休命手詔魏王上書三辭詔三報不許又手詔大聖以功德為髙美以忠和為典訓故創業垂名使百世可希行道制義使力行可效是以勳烈無窮休光茂著稷契載元首之聰明周召因文武之智用雖經營庶官仰歎俯思其對豈有若君者哉朕惟古人之功美之如彼思君忠勤之績茂之如此是以每將鏤符析瑞陳禮命册寤寐慨然自忘守文之不德焉今君重違朕命固辭懇切非所以稱朕心而訓後世也其抑志撙節勿復固辭曹丕嗣位魏王詔魏太子丕昔皇天授乃顯考以翼我皇家遂攘除羣凶拓定九州𢎞功茂績光於宇宙朕用垂拱負扆二十有餘載天不憖遺一老永保余一人早世潛神哀悼傷切丕奕世宣明宜秉文武紹熙前緒今使使持節御史大夫華歆奉䇿詔授丕丞相印綬魏王璽紱領冀州牧方今外有遺虜遐夷未賔旗鼓猶在邊境干戈不得韜刃斯乃播揚洪烈立功垂名之秋也豈得修諒暗之禮究曾閔之志哉其敬服朕命抑弭憂懷旁祇厥緒時亮庶功以稱朕意於戲可不勉與禪魏詔丕嗣位改建安二十五年為延康元年獻帝以衆望在魏乃詔羣公卿士使持節奉璽綬禪魏王丕朕在位三十有二載遭天下蕩覆幸賴祖宗之靈危而復存然仰瞻天文俯察人心炎精之數既終行運在乎曹氏是以前王既樹神武之績今王又光曜明德以應其期是厯數昭明信可知矣夫大道之行天下為公選賢與能故唐堯不私於厥子而名播於無窮朕羡而慕焉今其追踵堯典禪位於魏王光曜一作光裕禪魏册咨爾魏王昔者帝堯禪位於虞舜舜亦以命禹天命不于常惟歸有德漢道陵遲世失其序降及朕躬大亂茲昏羣凶肆逆宇內顛覆賴武王神武拯茲難於四方惟清區夏以保綏我宗廟豈豫一人獲乂俾九服實受其賜今王欽承前緒光於乃德恢文武之大業昭爾考之𢎞烈皇靈降瑞人神告徵誕惟亮采師錫朕命僉曰爾度克協於虞舜用率我唐典敬遜爾位於戲天之厯數在爾躬允執其中天祿永終君其祗順大禮享茲萬國以肅承天命册詔魏王惟延康元年十月乙卯皇帝曰咨爾魏王夫命運否泰依德升降三代卜年著於春秋是以天命不于常帝王不一姓由來尚矣漢道陵遲為日巳久安順巳降世失其序沖質短祚三世無嗣皇綱肇虧帝典頽沮暨於朕躬天降之災遭無妄厄運之會值炎精幽昧之期變興輦轂禍由閹宦董卓乘釁惡甚澆豷劫遷省御太僕宫廟遂使九州幅裂強敵虎爭華夏鼎沸蝮蛇塞路當斯之時尺土非復漢有一夫豈復朕民幸賴武王德膺符運奮揚神武芟荑凶暴清定區夏保乂皇家今王纘承前緒至德光昭御衡不迷布德優遠聲教被四海仁風扇鬼區是以四方效珍人神響應天之厯數實在爾躬昔虞舜有大功二十而放勛禪以天下大禹有疏導之績而重華禪以帝位漢承堯運有傳聖之義加順靈祗紹天明命釐降二女以嬪於魏使使持節行御史大夫事太常音奉皇帝璽綬王其永君萬國敬御天威允執其中天祿永終敬之哉又皇帝問魏王言遣宗奉庚申書到所稱引聞之朕惟漢家世踰二十年過四百運周數終行祚巳訖天心巳移兆民望絶天之所廢有自來矣今大命有所底止神器當歸聖德違衆不順逆天不祥王其體有虞之盛德應厯數之嘉會是以禎祥告符圖讖表録神人同應受命咸宜朕畏上帝致位於王天不可違衆不可拂且重華不逆堯命大禹不辭舜位若夫由卷匹夫不載聖籍固非皇材帝器所當稱慕今使音奉皇帝璽綬王其陟帝位無逆朕命以祗奉天心焉又天訖漢祚辰象著明朕祗天命致位於王仍陳厯數於詔册喻符運於翰墨神器不可以辭拒皇位不可以謙讓稽於天命致於再三且四海不可以一日曠主萬機不可以斯須無統故建大業者不拘小節知天命者不繫細物是以舜受大業之命而無遜讓之辭聖人達節不亦遠乎今使音奉皇帝璽綬王其欽承以答天下響應之望焉又昔堯以配天之德秉六合之重猶覩厯運之數移於有虞委讓帝位忽如遺迹今天既訖我漢命乃眷北顧皇帝之業實有大魏朕守空名以竊古義顧視前事猶有慙色而王遜位至於三四朕用懼焉夫不辭萬乘之位者知命達節之數也虞夏之君處之不疑故勳烈垂於萬載美名傳於無窮今遣守尚書令侍中顗喻王其速陟帝位以順天人之心副朕之大願廢伏皇后䇿后名夀得以曹操凶殘與父完書令圖操完不敢發建安十九年事露操逼帝廢后假為䇿收后幽殺之皇后壽得由卑賤登顯尊極自處椒房二紀於茲既無任姒徽音之美又乏謹身養巳之福而隂懷妒害包藏禍心弗可以承天命奉祖宗今使御史大夫郗慮持節䇿詔其上皇后璽綬退避中宫遷於他館嗚呼哀哉自壽取之未致於理為幸多焉尹昆拜尚書僕射詔謝承後漢書尹昆字闕淵為御史闕時拜尚書僕射北堂書鈔所引原多訛闕未詳何帝今附再考惟君公曹時以太守之術克奬王室其省録臺事勿令謬誤立春日下寬大書禮儀志制詔三公方春東作敬始慎微動作從之罪非殊死且勿案驗皆須麥秋退貪殘進柔良下當用者如故事漢律布金令丁孚漢儀曰酎金律文帝所加以正月旦作酒八月成名酎酒因合諸侯助祭貢金皇帝齋宿親帥羣臣承祠宗廟羣臣宜分奉請諸侯列侯各以民口數率千口奉金四兩竒不滿千口至五百口亦四兩皆會謝少府受又大鴻臚食邑九真交趾日南者用犀角長九寸以上若玳瑁甲一鬱材用象牙長三尺以上若翡翠各二十凖以當金八能士書版言事文商臣角民徵事羽物各一版臣某言今月若干日甲乙日冬至黃鍾之音調君道得孝道褒侲子逐疫文甲作食􅓇胇胃食虎雄伯食魅騰簡食不祥攬諸食咎伯竒食夢強梁祖門共食磔死寄生委隨食觀錯斷食巨窮竒騰根共食蠱凡使十二神追惡凶赫女軀拉女幹節解女肉抽女肺腸女不急去後者為糧討羌符關右人發地得古甕中多東漢時竹簡獨討羌符文字尚完皆章草書載東觀餘論永初二年六月丁未朔二十日丙寅得車騎將軍幕府文書上郡屬國都中二千石守丞廷義縣令三水十月丁未到府受印綬發夫討叛羌急急如律令按後漢書安帝永初元年夏先零羌叛遣車騎將軍鄧騭討之明年春為羌所敗黃長睿因據是辨安紀歲月之誤督郵保舉博士板狀靈帝時諸博士試甲乙科凡學士督書其板舉主保之生事愛敬喪沒如禮理易尚書孝經論語兼崇載籍窮微闡粵師事某官經明受謝見受門徒尚五十人以上正席謝生三郡三人隱居樂道不求聞達身無金痍痼疾三十六屬不與妖惡交通王侯賞賜行應四科經任博士闕某官某甲保舉杜氏通典東漢文紀卷三
