body:
  text: 東漢文紀卷一明梅鼎祚編光武皇帝名秀字文叔髙祖九世孫景帝子長沙定王發之後南頓令欽之子起兵於宛復興漢室更始時封蕭王即帝位三十三年都雒陽廟曰世祖破聖公與伯然書交鋒之日神星晝見太白精明東觀漢記此北堂書鈔所引載太平御覽載云破聖公與兄伯升書楊用修尺牘云破赤眉與伯升王弇州云破赤眉伯升已被害當是昆陽戰後也陳晦伯天中記亦引東觀漢記云破王尋與朱然書鼎按諸家惟書鈔在前而光武從臣初無名字為伯然朱然者特岑彭字君然而已朱然則孫吳時人後漢書光武紀光武誅王郎更始遣侍御史持節立光武為蕭王令罷兵詣行在所光武辭以河北未平不就徴自是始二於更始及赤眉賊入函谷關攻更始光武乃遣鄧禹率六裨將引兵而西以乘更始時更始使朱鮪李軼屯洛陽光武亦令馮異守孟津以拒之異大破鮪於是諸將上尊號吳漢等十一將軍圍鮪於洛陽是年赤眉入長安更始奔髙陵見殺凡光武與聖公前後事止此所謂破聖公者豈即鄧禹吳漢等之戰耶今姑從書鈔以待再考報隗嚻書嚻字季孟天水成紀人起兵應漢歸天水自稱西州上將軍後為漢兵討敗恚憤死鄧禹西征赤眉承制命囂為西州大將軍建武三年囂上書詣闕光武報以殊禮時陳倉人吕鮪擁衆與公孫述通冦三輔囂復遣兵佐征西大將軍馮異擊之遣使上狀帝報以手書自是恩禮愈篤慕樂德義思相結納昔文王三分猶服事殷但駑馬鉛刀不可強扶數蒙伯樂一顧之價而蒼蠅之飛不過數步即託驥尾得以絶羣隔於盜賊聲問不數將軍操執款款扶傾救危南距公孫之兵北禦羌胡之亂是以馮異西征得以數千百人躑躅三輔微將軍之助則咸陽己為他人禽矣今關東冦賊往往屯聚志務廣逺多所不暇未能觀兵成都與子陽角力如令子陽到漢中三輔願因將軍兵馬鼓旗相當儻肯如言蒙天之福即智士計功割地之秋也管仲曰生我者父母成我者鮑子自今以後手書相聞勿用傍人解構之言范曄後漢書數步東觀漢記作三數步與公孫述書述字子陽扶風茂陵人稱帝於蜀國號成為吳漢等討滅述稱帝妄引讖記以為孔子作春秋為赤制而斷十二公一姓不得再受命又引籙運法曰廢昌帝立公孫括地象曰帝軒轅受命公孫氏握援神契曰西太守乙卯金謂西方太守而乙絶卯金也五德之運黃承赤而白繼黃金據西方為白德而代王氏得其正序又自言手文有竒數移書中國冀以感動衆心光武與述書署曰公孫皇帝述不答圖讖言公孫即宣帝也代漢者當塗髙君豈髙之身邪乃復以掌文為瑞王莽何足效乎君非吾賊臣亂子倉卒時人皆欲為君事耳何足數也君日月已逝妻子弱小當早為定計可以無憂天下神器不可力爭宜留三思後漢書東觀漢記載光武與述書承赤者黃也姓當塗其名髙也報公孫述書此與前似即一書述夢人謂已曰八某子系十二為期遂據蜀稱帝移檄中國引圖緯以惑衆光武報書云西狩獲麟讖曰乙子卯金即乙未嵗授劉氏非西方之守也光廢昌帝立子公孫即霍光廢昌邑王立孝宣帝也黃帝姓公孫自以土德君所知也漢家九百二十嵗以蒙孫亡受以丞相其名當塗髙髙豈君身耶吾自繼祖而興不稱受命求漢之斷莫過王莽近張滿作惡兵圍得之歎曰為天文所誤恐君復誤也華陽國志新城蠻中山賊張滿祭祀天地自言當王及執歎曰讖文誤我乃斬之封更始詔建武元年九月赤眉入長安更始奔髙陵更始破敗棄城逃走妻子裸袒流穴道路朕甚愍之今封更始為淮陽王吏人敢有賊害者罪同大逆封功臣詔二年正月封功臣皆為列侯大國四縣博士丁恭議以四縣地多上不聽乃遣謁者即授印綬䇿封焉人情得足苦於放縱快須臾之欲忘慎罰之義惟諸將業逺功大誠欲傳於無窮宜如臨深淵如履薄冰戰戰栗栗日慎一日其顯效未酬名籍未立者大鴻臚趣上朕將差而録之博士丁恭議古帝王封諸侯不過百里故利以建侯取法於雷強幹弱枝所以為治也今封諸侯四縣不合法制封䇿在上不驕髙而不危制節謹度滿而不溢敬之戒之傳爾子孫長為漢藩省刑法詔二年三月大赦下詔頃獄多寃人用刑深刻朕甚愍之孔子云刑罰不中則民無所措手足其與中二千石諸大夫博士議郎議省刑法續漢書載建武二年詔曰其赦天下惟殘賊用刑戮深刻獄多寃人朕甚愍之自今已後有犯者將正厥辜聽歸嫁賣詔二年五月民有嫁妻賣子欲歸父母者悉聽之敢拘執論如律追封宗室詔二年十二月惟宗室列侯為王莽所廢先靈無所依歸朕甚愍之其並復故國若侯身已殁屬所上其子孫見名尚書封拜受傳國璽詔三年閏正月赤眉君臣降奉髙皇帝璽綬詔祠髙廟受傳國璽羣盜縱橫賊害元元盆子竊尊號亂惑天下朕奮兵討擊應時崩解十餘萬衆束手降服先帝璽綬歸之王府斯皆祖宗之靈士人之力朕曷足以享斯哉其擇吉日祠髙廟賜天下長子當為父後者爵人一級省罪詔三年七月吏不滿六百石下至墨綬長相有罪先請男子八十以上十嵗以下及婦人從坐者自非不道詔所名捕皆不得繫當驗問者即就驗女徒雇山歸家女子犯徒每月出錢雇人於山伐木名曰雇山旱詔五年五月久旱傷麥秋種未下朕甚憂之將殘吏未勝獄多寃結元元愁恨感動天氣乎其令中都官三輔郡國出繫囚罪非犯殊死一切勿案見徒免為庶人務進柔良退貪酷各正厥事焉恤災詔六年正月往嵗水旱蝗蟲為災榖價騰躍人用困乏朕惟百姓無以自贍惻然愍之其命郡國有榖者給稟髙年鰥寡孤獨及篤癃無家屬貧不能自存者如律二千石勉加循撫無令失職赦天水諸郡詔六年五月惟天水隴西安定北地吏人為隗嚻所詿誤者又三輔遭難赤眉有犯法不道者自殊死以下皆赦除之省減吏員詔六年六月於是條奏并省四百餘縣吏職減損十置其一夫張官置吏所以為人也今百姓遭難戶口耗少而縣官吏職所置尚繁其令司𨽻州牧各實所部省減吏員縣國不足置長吏可并合者上大司徒大司空二府日食詔六年九月晦日有食之十月下詔吾德薄不明冦賊為害強弱相陵元元失所詩云日月告凶不用其行永念厥咎內疚於心其敕公卿舉賢良方正各一人百僚並上封事無有隱諱有司修職務遵法度減田租詔六年十二月頃者師旅未解用度不足故行什一之稅今軍士屯田糧儲差積其令郡國收見田租三十稅一如舊制禁厚葬詔七年正月世以厚葬為德薄終為鄙至於富者奢僭貧者單財法令不能禁禮義不能止倉卒乃知其咎其布告天下令知忠臣孝子慈兄悌弟薄葬送終之義罷軍吏詔七年三月今國有衆軍並多精勇宜且罷輕車騎士材官樓船士及軍假吏令還復民伍日食禁上書言聖詔七年三月癸亥晦日有食之吾德薄致災謫見日月戰栗恐懼夫何言哉今方念愆庶消厥咎其令有司各修職任奉遵法度惠兹元元百僚各上封事無有所諱其上書者不得言聖日食大赦詔七年四月比陰陽錯謬日月薄食百姓有過在豫一人大赦天下公卿司𨽻州牧舉賢良方正各一人遣諸公車朕將覽試焉禁殺奴婢詔十一年二月天地之性人為貴其殺奴婢不得減罪又詔十一年八月敢灸灼奴婢者論如律免所灸灼者為庶民禁獻異味詔十三年正月往年已敕郡國異味不得有所獻御今猶未止非徒有豫養導擇之勞至乃煩擾道上疲費過所其令大官勿復受明敕下以逺方口實所以薦宗廟自如舊制同前後漢紀往年敕郡國勿因計吏有所進獻今故未止非徒勞役道途所過未免煩費已敕大官勿復受其逺方食物乘輿口實可以薦宗廟者即如舊制改封長沙王等為侯詔十三年二月長沙王興真定王得河間王邵中山王茂皆襲爵為王不應經義其以興為臨湘侯得為真定侯邵為樂成侯茂為單父侯立東海王陽為皇太子詔十七年廢郭后為中山太后立貴人陰氏為皇后陰氏生子陽而強為郭后子願備藩國十九年六月詔立陽徙封強東海春秋之義立子以貴東海王陽皇后之子宜承大統皇太子強崇執謙退願備藩國父子之情重久違之其以強為東海王立陽為皇太子改名莊地震詔二十二年九月日者地震南陽尤甚夫地者任物至重靜而不動者也而今震裂咎在君上鬼神不順無德災殃將及吏人朕甚懼焉其令南陽勿輸今年田租芻藁遣謁者案行其死罪繫囚在戊辰以前減死罪一等徒皆弛解鉗衣絲絮賜郡中居人壓死者棺錢人三千其口賦逋稅而廬宅尤破壞者勿收責吏人死亡或在壞垣毁屋之下而家羸弱不能收拾者以見錢榖取傭為尋求之增奉詔二十六年正月詔增百官奉自三公下至佐史各有差東觀漢記前以用度不足吏祿薄少今月益其奉營夀陵詔二十六年初作夀陵將作大匠竇融上言園陵廣袤無慮所用帝詔古者帝王之葬皆陶人瓦器木車茅馬使後世之人不知其處太宗識終始之義景帝能述遵孝道遭天下反覆而霸陵獨完受其福豈不美哉令所制地不過二三頃無為山陵陂池裁令流水而已同前東觀漢記建武二十六年四月始營陵地於臨平亭南下詔乃令陶人瓦器臨平望平陰河水洋洋舟船泛泛善矣夫周公孔子猶不得存安得松喬與之而共遊乎文帝曉終始之義景帝遵述所謂孝子也故遭天下反覆霸陵獨完非成法耶令無為山陵陂池裁令流水而己迭興之後亦無邱壟使合古法今日月己逝當豫自作臣子奉承不得有加尊宣帝為中宗詔東觀漢記惟孝宣皇帝有德有功其上尊號曰中宗陰貴人父弟爵諡詔建武九年盜殺貴人母鄧氏及弟欣帝甚傷之詔大司空吾微賤之時娶於陰氏因將兵征伐遂各别離幸得安全俱脫虎口以貴人有母儀之美宜立為后而固辭弗敢當列於媵妾朕嘉其義讓許封諸弟未及爵土而遭患逢禍母子同命愍傷于懷小雅曰將恐將懼惟豫惟汝將安將樂汝轉棄豫風人之戒可不慎乎其追爵諡貴人父陸為宣恩哀侯欣為宣義恭侯以弟就嗣哀侯後及尸柩在堂使太中大夫拜授印綬如在國列侯禮魂而有靈嘉其寵榮廢郭皇后立陰貴人詔建武十七年制詔三公皇后懷執怨懟數違教令不能撫循它子訓長異室宫闈之內若見鷹鸇既無關雎之德而有吕霍之風豈可託以幼孤恭承明祀今遣大司徒涉宗正吉持節其上皇后璽綬陰貴人鄉里良家歸自微賤自我不見于今三年宜奉宗廟為天下母主者詳案舊典時上尊號異常之事非國休福不得上夀稱慶詔告隗囂嚻將牛邯歸義於是囂大將十三人屬縣十六衆十餘萬皆降囂將妻子奔西城從楊廣詔告囂囂終不降於是誅其質子恂若束手自詣父子相見保無他也高皇帝云橫來大者王小者侯若遂欲為黥布者亦自任也後漢書詔喻公孫述述使刺客殺漢將來歙岑彭述弟恢及子壻史興並為大司馬吳漢輔威將軍臧宫所破自是將帥恐懼日夜離叛帝必欲降之乃下詔喻述述終無降意兵敗被創死往來詔書比下開示恩信勿以來歙岑彭受害自疑今以時自詣則家族完全若迷惑不喻委肉虎口痛哉奈何將帥疲倦吏士思歸不樂久相屯守詔書手記不可數得朕不食言贈來歙䇿詳見歙建武十一年中郎將來歙攻戰連年平定羌隴憂國忘家忠孝彰著遭命遇害嗚呼哀哉使太中大夫贈歙中郎將征羌侯印綬諡曰節侯謁者護喪事鄧禹為司徒䇿建武元年後漢紀作璽書制詔前將軍鄧禹深執忠孝與朕謀謨帷幄決勝千里孔子曰自吾有回門人日親斬將破軍平定山西功效尤著百姓不親五品不訓汝作司徒敬敷五教五教在寬今遣奉車都尉授印綬封為酇侯食邑萬户敬之哉下鄧禹敕鄧禹破赤眉赤眉遂入長安禹欲休兵養士以觀其弊於是引軍北至栒邑帝以關中未定而禹久不進兵乃下敕司徒堯也亡賊桀也長安吏人遑遑無所依歸宜以時進討鎮慰西京繫百姓之心並後漢書東觀漢記司徒堯也赤眉桀也今長安飢民孰不延望懲鄧禹還敕積弩將軍馮愔與車騎將軍宗歆爭權愔殺歆與禹相攻帝遣使諭降愔是後禹威稍損又乏食歸附者離散而赤眉還入長安禹戰敗走至髙陵軍士飢餓者皆食棗菜乃徴禹還赤眉無榖自當來東吾折捶笞之非諸將憂也無得復妄進兵後漢書同前漢紀勒兵堅守慎無與窮寇交鋒老賊疲弊必當束手事吾也以飽待飢以逸擊勞折捶而笞之耳勞馮異璽書異見後異拜征西大將軍與鄧禹合兵為赤眉敗禹脫歸宜陽異棄馬步走上回溪阪收其散卒與賊復戰大破於崤底降男女八萬人光武璽書勞異赤眉破平士吏勞苦始雖垂翅回溪終能奮翼黽池可謂失之東隅收之桑榆方論功賞以答大勳詔馮異王郎起光武自薊馳至饒陽無蔞亭時天寒烈衆皆飢疲異上豆粥及至南宫遇大風雨引車入道傍空舍異抱薪鄧禹爇火光武對竈燎衣異復進麥飯菟肩因度呼沱河至信都後異自關中朝京師上謂公卿曰馮將軍是我起兵時主簿也使中黃門賜異珍寶衣服錢帛詔曰倉卒無蔞亭豆粥呼沱河麥飯厚意久不報並後漢書勞馮異璽書隗囂侵三輔乘勝取栒邑異即馳兵潛往閉城乘其不意擊鼓建旗追擊大破之北地諸豪長耿定等悉畔囂降異上書言狀不敢自伐諸將欲分其功乃下璽書制詔大司馬虎牙建威漢中捕虜武威將軍虜兵猥下三輔驚恐栒邑危亡在於旦夕北地營保按兵觀望今偏城獲全虜兵挫折使耿定之屬復念君臣之義征西功若邱山猶自以為不足孟之反奔而殿亦何異哉今遣太中大夫賜征西吏士死傷者醫藥棺殮大司馬己下親弔死問疾以崇謙讓後漢書大司馬吳漢虎牙蓋延建威耿弇漢中王常捕虜馬武武威劉尚同前漢紀栒邑孤危亡在旦夕諸將狐疑莫有先發將軍獨決竒䇿摧敵殄冦功如邱山猶若不足雖孟反後入無以過也今遣太中大夫賫醫藥殯殮之具以賜吏士其死傷者大司馬已下親弔問之以崇謙讓賜馮異璽書隗囂死囂子純猶總兵據冀公孫述遣將趙匡等救純帝令異行天水太守事攻匡等斬之賜異璽書聞吏士精鋭水火不避構賞之賜必不令將軍負丹青失斷金也東觀漢記按此為冀之戰尺牘乃録始雖垂翅回溪四語而以此併為一書謬誤詔祭遵字弟孫潁川潁陽人征虜將軍遵從帝上隴征隗囂令進屯汧及公孫述遣兵救囂吳漢耿弇等悉奔還遵獨不卻帝詔將軍連年距難衆兵即郤復獨按部功勞爛然兵退無宿戒糧食不豫具今乃調度恐力不堪國家知將軍不易亦不遺力今送縑千匹以賜吏士東觀漢記敕岑彭書彭字君然南陽棘陽人為征南大將軍封舞陽侯彭引兵從車駕破天水與吳漢圍隗囂於西城時公孫述將李肓將兵救囂守上邽帝留蓋延耿弇圍之而車駕東歸敇彭書兩城若下便可將兵南擊蜀虜人苦不知足既平隴復望蜀每一發兵頭鬚為白後漢書東觀漢記作頭鬢報岑彭書彭與吳漢及劉隆臧宫劉歆等發南陽武陵南郡兵又發桂陽零陵長沙委輸棹卒凡六萬餘人騎五千匹皆會荆門漢以三郡棹卒多費糧榖欲罷之彭以蜀兵盛不可遣上書言狀帝報彭彭首破荆門長驅武陽蜀地震駭營彭亡為蜀刺客所殺大司馬習用步騎不曉水戰荆門之事一由征南公為重而已後漢書詔吳漢漢字子顔南陽宛人歷拜大司馬廣平侯漢征公孫述入犍為界諸縣多城守詔令漢直到廣都據其心腹諸城自下漢意難之既進兵廣都諸城皆降又詔漢曰云云漢乘勝自將步騎二萬餘人去成都十里隔江北作營遣副將武威將軍劉尚屯江南相去二十餘里帝聞大驚讓漢詔書未到述果使其衆并出攻漢使别將劫劉尚令不得相救漢引還廣都留尚拒述具以狀上帝報之自是漢與述戰於廣都成都之間八戰八克廣都去成都五十里述若來攻待其困弊而攻之勿與爭鋒述若不來轉營逼之彼必堅壁漢紀同前後漢書戒吳漢成都十餘萬衆不可輕也但堅據廣都待其來攻勿與爭鋒若不敢來公轉營迫之須其力疲乃可擊也讓吳漢比敕公千條萬端何意臨事勃亂既輕敵深入又與尚别營事有緩急不復相及賊若出兵綴公與大衆攻尚尚破公即敗矣幸無它者急引兵還廣都後漢書同前漢紀如述兵連綴副營副營破即公營亦破矣恐公不能自還還自天也幸尚無他者急還廣都報吳漢公還廣都甚得其宜述必不敢略尚而擊公也若先攻尚公從廣都五十里悉步騎赴之適當值其危困破之必矣後漢書讓劉尚漢既破述述死乃夷述妻子盡滅公孫氏縱兵大掠焚述宫室帝聞之怒以譴漢又讓尚城降三日吏人從服孩兒老母口以萬數一旦放兵縱火聞之可為酸鼻尚宗室子孫嘗更吏職何忍行此仰視天俯視地觀放麑啜羮二者孰仁良失斬將弔人之義也後漢書同前漢紀作讓吳漢等城中老母嬰兒口以萬數兵火大縱可為酸痛甚違古人弔民之義公等戴天履地何忍行此邪賜陳俊璽書俊字子昭南陽西鄂人為強弩大將軍封祝阿侯俊為太山太守行大將軍事張步畔還琅琊俊追討斬之帝美其功詔得專征青徐賜俊璽書俊撫貧弱表有義百姓歌之將軍元勳大著威震青徐兩州有警得專征之華嶠後漢書漢紀實得征之報陳俊詔俊守太山數上書自請願奮擊隴蜀詔報東州新平大將軍之功也負海猾夏盜賊之處國家以為重憂且勉鎮撫之後漢書勞蓋延詔書延字巨卿漁陽要陽人為虎牙將軍封安平侯龎萌為人婉順上親愛之嘗對諸將曰可以托六尺之孤寄百里之命龎萌是矣使為平狄將軍與蓋延俱定梁楚地爭權遂勒兵反攻延延與戰破之詔書勞延又詔諸將龎萌一夜反畔相去不逺營壁不堅殆令人齒欲相擊而將軍聞之夜告臨淮楚國有不可動之節吾甚美之東觀漢記續漢書云殆令唇齒欲相擊按范曄後漢書蓋延傳云萌攻殺楚郡太守引軍襲敗延僅而獲免與東觀漢記不同資治通鑑從范書詔諸將吾嘗於衆人中言萌可為社稷臣將軍等得無笑吾言老賊當族其勵兵馬會睢陽漢紀報耿純制書純見後純封髙陽侯建武六年令諸侯就國純上書自陳前在東郡案誅涿郡太守朱英親屬今國屬涿純不自安制書報之乃更封為東光侯侯前奉公行法朱英久吏曉知義理何時當以公事相是非然受堯舜之罰者不能愛已也己更擇國土令侯無介然之憂續漢書詔耿況弇兄況建武四年封隃糜侯與弟舒攻彭寵五年寵死帝使光祿大夫樊寵詔況惟況功大不宜監察從事邊郡寒苦不足久居其詣行在所袁嵩後漢書王梁為濟南太守詔梁數戰有功徴入為河南尹穿渠引榖水注洛陽城下東寫鞏川及渠成而水不流有司劾奏梁上書乞骸骨下詔梁前將兵征伐衆人稱賢故擢典京師建議開渠為人興利旅力既愆迄無成功百姓怨讟談者歡譁雖蒙寬宥猶執謙退君子成人之美其以梁為濟南太守賜竇融璽書融見後融為張掖屬國都尉河西翕然歸之衆推融行河西五郡大將軍事融遙聞光武即位以河西隔逺未能自通隗囂使張玄説融當各據土宇與隴蜀合從髙可為六國下不失為尉他融決策東向遣使劉鈞奉書獻馬先是帝欲招融以逼囂述亦發使遺融書遇鈞於道帝見歡甚乃遣令還因授融為涼州牧璽書既至河西咸驚以為天子明見萬里之外網羅張玄之情制詔行河西五郡大將軍事屬國都尉勞鎮守邊五郡兵馬精強倉庫有蓄民庶殷富外則折挫羌胡內則百姓蒙福威德流聞虛心相望道路隔塞邑邑何己長史所奉書獻馬悉至深知厚意今益州有公孫子陽天水有隗將軍方蜀漢相攻權在將軍舉足左右便有輕重以此言之欲相厚豈有量哉諸事具長史所見將軍所知王者迭興千載一會遂欲立桓文輔微國當勉卒功業欲三分鼎足連衡合從亦宜以時定天下未并吾與爾絶域非相吞之國今之議者必有任囂效尉他制七郡之計王者有分土無分民自適已事而己今以黃金二百斤賜將軍便宜輒言封竇融詔建武八年西征隗囂融率五郡太守及羌虜等會帝髙平共進軍囂衆大潰城邑皆降下詔封融東觀漢記載詔行河西五郡大將軍涼州牧張掖屬國都尉竇融執志忠孝扶微救危仇疾反虜隗囂率勵五郡精兵羌胡畢集兵不血刃而虜土崩瓦解功既大矣篤意分明斷之不疑吾甚嘉之其以六安豐陽原蓼安風凡四縣封融為安豐侯詔報竇融融率弟友等攻隗囂大破之帝封融為安豐侯弟友為顯親侯悉遣西還所鎮融以兄弟並受爵位久專方面懼不自安數上書求代詔報之吾與將軍如左右手耳數執謙退何不曉人意勉循士民無擅離部曲無一作莫詔竇融融入朝拜冀州牧遷大司空數辭讓後朝罷逡巡席後帝知欲有讓遂使左右傳出它日會見迎乃詔融融不敢重陳謝日者知公欲讓職還土故命公暑熱且自便今相見宜論他事勿得復言封卓茂詔茂西漢末為密令教化大行光武初即位先訪求茂下詔漢官儀作䇿前密令卓茂束身自修執節淳固誠能為人所不能為夫名冠天下當受天下重賞故武王誅紂封比干之墓表商容之閭今以茂為太傅封褒德侯食邑二千户賜几杖車馬衣一襲絮五百斤東觀記續漢書並作封宣德侯賜侯霸璽書霸字君房河南密人為大司徒封關內侯霸薦前梁令閻揚揚素有譏議帝嘗嫌之既見霸奏疑其有姦大怒賜霸璽書使馮勤奉䇿至司徒府勤還陳霸本意申釋事理帝意稍解崇山幽都何可偶黃鉞一下無處所欲以身試法邪將殺身以成仁邪後漢書封諡侯霸詔霸為大司徒薨上傷惜臨弔詔封霸為則鄉侯諡曰哀惟霸積善之德久而益彰清潔之操白首彌厲漢之舊制丞相拜日封為列侯頃以軍旅暴露功臣未受國邑録忠臣之心不欲先饗其寵故未爵命其追爵諡霸使襲其後後漢紀賜侯將軍卿歸田里曷不令妻子從將軍老矣夜卧誰為搔背癢也除大司空杜林子喬為郎詔建武二十三年公侯子孫必復其始賢者之後宜宰城邑其以喬為丹水長迎拜鮑永詔永出為東海相坐度田事不實被徴詔書迎拜永君晨夜冒犯霜露精神亦己勞矣以君帷幄近臣其以永為兖州牧東觀漢記張况為關長詔况族姊為光武皇考妣遷涿郡太守以老乞身後詔問起居如故復以為常山關長為赤眉所攻戰死家人居不足贍且以一縣自養東觀漢記貰御史罪制詔延陳留東昏人為郡督郵光武東巡從駕到魯城門小不容羽蓋帝怒使撻侍御史延引咎以為罪在督郵有感帝意乃制詔以陳留督郵虞延故貰御史罪賜丁邯詔邯有髙節拜汾陰令遷漢中太守妻弟為公孫述將收妻送南鄭獄免冠徒跣自謝帝詔漢中太守妻乃繫南鄭獄誰當搔其背垢者懸牛頭賣馬脯盜跖行孔子語以邯服罪且邯一妻冠履勿謝三輔決録注賜張堪詔東觀漢記平陽丞李善稱故令范遷於張堪令人面熱汗出其賜堪新繒百匹以表亷吏褒牛牢詔高士傳牢字君直為光武布衣交及帝即位徴牢稱疾不至下詔州郡每就家存問不答朕幼交牛君真清高士也恆有疾州郡之官者常親到家致意焉詔郭伋伋為潁川太守辭官光武詔郡得賢能太守去帝城不逺河潤九里冀京師并蒙其福也報劉興書興為代郡太守將數百騎攻賈覽上狀檄至光武知其必敗報興書書到興已為覽所殺長史以為國家坐知千里也欲復進兵恐失其頭首也東觀漢記報胸奴詔建武二十八年胸奴遣使詣闕貢馬及裘乞和親帝乃報單于國內虛耗貢物裁以通禮何必馬裘今贈繒五百匹斬馬劒一報鄯善王書建武中車師鄯善焉耆等十八國迫於胸奴俱遣子入侍願得都護天子以中國初定北邊未服皆選其侍子而胸奴攻擊益甚鄯善王復上書因報之於是鄯善車師復附胸奴今使者大兵未能得出如諸國力不從心東西南北自在也遺詔中元二年二月帝崩朕無益百姓皆如孝文皇帝制度務從約省刺史二千石長吏皆無離城郭無遣吏及因郵奏建元元年鼎銘小篆書三足髙九尺其文曰定天下萬物伏鼎録即位祝文皇天上帝后土神祇眷顧降命屬秀黎元為人父母秀不敢當羣下百辟不謀同辭咸曰王莽篡位秀發憤興兵破王尋王邑於昆陽誅王郎銅馬於河北平定天下海內蒙恩上當天地之心下為元元所歸讖記曰劉秀發兵捕不道卯金修德為天子秀猶固辭至于再至于三羣下僉曰皇天大命不可稽留敢不敬承祭祀志告天文曰皇天上帝后土神祇眷顧降命屬秀黎元為民父母秀不敢當羣下百僚不謀同辭咸曰王莽篡弒竊位秀發憤興義兵破王邑百萬衆於昆陽誅王郎銅馬赤眉青犢賊平定天下海內蒙恩上當天心下為元元所歸讖記曰劉秀發兵捕不道卯金修德為天子秀猶固辭至于再至于三羣下曰皇天大命不可稽留敢不敬承告祠高廟文中元元年冬十月使司空告祠高皇帝與羣臣約非劉氏不王吕太后賊害三趙專王吕氏賴社稷之靈祿産伏誅天命幾墜危朝更安吕太后不宜配食髙廟同祧至尊薄太后母德慈仁孝文皇帝賢明臨國子孫賴福延祚至今其上薄太后尊號曰髙皇后配食地祇遷吕太后廟主于園四時上祭諸將奏上尊號光武為蕭王北擊尤來諸賊連破之還從薊至中山諸將奏請即尊位不聽行至鄗潁川人強華奉赤伏符曰劉秀發兵捕不道四夷雲集龍鬬野四七之際火為主羣臣因復奏於是即位于鄗漢遭王莽宗廟廢絶豪傑憤怒兆人塗炭王與伯升首舉義兵更始因其資以據帝位而不能奉承大統敗亂綱紀盜賊日多羣生危蹙大王初征昆陽王莽自潰後拔邯鄲北州弭定參分天下而有其二跨州據土帶甲百萬言武力則莫之敢抗論文德則無所與辭臣聞帝王不可以久曠天命不可以謙拒惟大王以社稷為計萬姓為心羣臣復上奏受命之符人應為大萬里合信不議同情周之白魚曷足比焉今上無天子海內淆亂符瑞之應昭然著聞宜答天神以塞羣望羣臣奏言嘉瑞中元元年夏京師醴泉出赤草生郡國頻上甘露羣臣上奉帝自謙無德不納地祇靈應而朱草萌生孝宣帝每有嘉瑞輒以改元神雀五鳯甘露黃龍列為年紀蓋以感致神祇表彰德信是以化致升平稱為中興今天下清寧靈物仍降陛下情存損挹推而不居豈可使祥符顯慶沒而無聞宜令太史撰集以傳來世明帝諱莊初名陽光武第四子封東海王以母陰皇后立為皇太子在位十八年廟曰顯宗即位詔中元二年二月即位四月下詔豫末小子奉承聖業夙夜震畏不敢荒寧先帝受命中興德侔帝王協和萬邦假于上下懷柔百神惠於鰥寡朕承大運繼體守文不知稼穡之艱難懼有廢失聖恩遺戒顧重天下以元元為首公卿百僚將何以輔朕不逮其賜天下男子爵人二級三老孝悌力田人三級爵過公乘得移與子若同産同産子及流人無名數欲自占者人一級鰥寡孤獨篤癃粟人十斛其弛刑及郡國徒在中元元年四月己卯赦前所犯而後捕繫者悉免其刑又邊人遭亂為內郡人妻在己卯赦前一切遣還邊恣其所樂中二千石下至黃綬貶秩贖論者悉皆復秩還贖方今上無天子下無方伯若涉淵水而無舟楫夫萬乘至重而壯者慮輕實賴有德左右小子高密侯禹元功之首東平王蒼寬博有謀並可以受六尺之托臨大節而不橈其以禹為太傅蒼為驃騎將軍太尉喜告諡南郊司徒欣奉安梓宫司空魴將校復土其封喜為節鄉侯欣為安鄉侯魴為楊邑侯後漢紀云懼有廢失以墮先業禹為太傅下云進見東向以昭殊禮戒春節詔二年十二月方春戒節人以耕桑其敇有司務順時氣使無煩擾天下亡命殊死以下聽得贖論死罪入縑二十匹右趾至髠鉗城旦舂十匹完城旦舂至司冦作三匹其未發覺詔書到先自告者半入贖今選舉不實邪佞未去權門請託殘吏放手百姓愁怨情無告訴有司明奏罪名並正舉者又郡縣每因徴發輕為姦利詭責羸弱先急下貧其務在均平無令枉刻宗祀光武皇帝詔永平二年正月宗祀光武皇帝於明堂使尚書令持節詔驃騎將軍三公今令月吉日宗祀光武皇帝於明堂以配五帝禮備法物樂和八音詠祉福舞功德其班時令敇羣后事畢升靈臺望元氣吹時律觀物變羣僚藩輔宗室子孫衆郡奉計百蠻貢職烏桓濊貊咸來助祭單于侍子骨都侯亦皆陪位斯固聖祖功德之所致也朕以暗陋奉承大業親執圭璧恭祀天地仰惟先帝受命中興撥亂反正以寧天下封泰山建明堂立辟雍起靈臺恢𢎞大道被之八極而胤子無成康之質羣臣無吕旦之謀盥洗進爵踧踖惟慙素性頑鄙臨事益懼故君子坦蕩蕩小人長戚戚其令天下自殊死己下謀反大逆皆赦除之百僚師尹其勉修厥職順行時令敬若昊天以綏兆人幸辟雍行養老禮詔二年冬十月光武皇帝建三朝之禮而未及臨饗眇眇小子屬當聖業間暮春吉辰初行大射令月元日復踐辟雍尊事三老兄事五更安車軟輪供綏執授侯王設醬公卿饌珍朕親袒割執爵而酳祝哽在前祝噎在後升歌鹿鳴下管新宫八佾具修萬舞於庭朕固薄德何以克當易陳負乘詩刺彼己永念慙疚無忘厥心三老李躬年耆學明五更桓榮授朕尚書詩曰無德不報無言不酬其賜榮爵關內侯食邑五千户三老五更皆以二千石祿養終厥身其賜天下三老酒人一石肉四十斤有司其存耆耋恤幼孤惠鰥寡稱朕意焉督農詳刑詔三年正月朕奉郊祀登靈臺見史官正儀度夫春者嵗之始也始得其正則三時有成比者水旱不節邊人食寡政失於上人受其咎有司其勉順時氣勸督農桑去其螟蜮以及蝥賊詳刑慎罰明察單辭夙夜匪懈以稱朕意日食詔三年八月壬申晦日有食之朕奉承祖業無有善政日月薄蝕彗孛見天水旱不節稼穡不成人無宿儲下生愁墊雖夙夜勤思而智能不逮昔楚莊無災以致戒懼魯哀禍大天不降譴今之動變儻尚可救有司勉思厥職以匡無德古者卿士獻詩百工針諫其言事者靡有所諱並後漢書元旦罷朝賀詔永平四年比來水旱飢饉加有軍旅正旦無陳朝賀之儀續漢書籍田詔四年二月朕親耕籍田以祈農事京師冬無宿雪春不燠沐煩勞羣司積精禱求而比再得時雨宿麥潤澤其賜公卿半奉有司勉遵時政務平刑罰優復元氏詔五年十月帝生於元氏及幸鄴父老請加優詔豐沛濟陽受命所由加恩報德適其宜也今永平之政百姓怨結而吏人求復令人愧笑重逆此縣之拳拳其復元氏縣田租更賦六嵗勞賜縣掾史及門闌走卒寶鼎詔六年二月王雒山出寶鼎獻之朝夏四月下詔昔禹收九牧之金鑄鼎以象物使人知神姦不逢惡氣遭德則興遷于商周周德既衰鼎乃淪亡祥瑞之降以應有德方今政化多僻何以致兹易曰鼎象三公豈公卿奉職得其理耶太常其以礿祭之日陳鼎於廟以備器用賜三公帛五十匹九卿二千石半之先帝詔書禁人上事言聖而間者章奏頗多浮詞自今若有過稱虛譽尚書皆宜抑而不省示不為諂子蚩也日食詔八年十月壬寅晦日有食之於是各上封事帝乃以所上班示百官朕以無德奉承大業而下貽人怨上動三光日食之變其災尤大春秋圖讖所謂至譴永思厥咎在豫一人羣司勉修職事極言無諱示百官詔羣僚所言皆朕之過人寃不能理吏黠不能禁而輕用人力繕修宫宇出入無節喜怒過差昔應門失守關雎刺世飛蓬隨風微子所歎永覽前戒竦然兢懼徒恐薄德久而致怠耳大赦詔十年四月昔嵗五榖登衍今茲蠶麥善收其大赦天下方盛夏長養之時蕩滌宿惡以報農功百姓勉務桑稼以備災害吏敬厥職無令愆墮科禁厚葬詔十二年五月昔曾閔奉親竭歡致養仲尼葬子有棺無槨喪貴致哀禮存寧儉今百姓送終之制競為奢靡生者無擔石之儲而財力盡於墳土伏臘無糟粳而牲牢兼於一奠糜破積世之業以供終朝之費子孫飢寒絶命於此豈祖考之意哉又車服制度恣極耳目田荒不耕遊食者衆有司其申科禁宜於今者宣下郡國巡行河渠詔十三年四月汴渠成行幸滎陽自汴渠決敗六十餘嵗加頃年以來雨水不時汴流東侵日月益甚水門故處皆在河中漭漾廣溢莫測圻岸蕩蕩極望不知綱紀今兖豫之人多被水患乃云縣官不先人急好興它役又或以為河流入汴幽冀蒙利故曰左隄強則右隄傷左右俱強則下方傷宜任水藝所之使人隨髙而處公家息壅塞之費百姓無陷溺之患議者不同南北異論朕不知所從久而不決今既築隄理渠絶水立門河汴分流復其舊迹陶邱之北漸就壤墳故薦嘉玉潔牲以禮河神東過洛汭歎禹之績今五土之宜反其正色濵渠下田賦與貧人無豪右得固其利庶繼世宗瓠子之作日食報三公制十三年十月壬辰晦日有食之三公免冠自劾制曰冠履勿劾災異屢見咎在朕躬憂懼遑遑未知其方將有司陳事多所隱諱使君上壅蔽下有不暢乎昔衛有忠臣靈公得守其位今何以和穆陰陽消伏災譴刺史太守詳刑理寃存恤鰥孤勉思職焉報上夀制十七年五月是嵗有甘露芝草神雀翔集之瑞諸夷遣質入貢公卿百官並集朝堂奉觴上夀制曰天生神物以應王者逺人慕化實由有德朕以虛薄何以享斯唯髙祖光武聖德所被不敢有辭其敬舉觴太常擇吉日䇿告宗廟其賜天下男子爵人二級三老孝悌力田人三級流人無名數欲占者人一級鰥寡孤獨篤癃貧不能自存者粟人三斛郎從官視事十嵗以上者帛十匹中二千石二千石下至黃綬貶秩奉贖在去年以來皆還贖贖罪詔十八年三月其令天下亡命自殊死已下贖死罪縑三十匹右趾至髠鉗城旦舂十匹完城旦至司冦作五匹吏人犯罪未發覺詔書到自告者半入贖禱雨詔十八年四月自春以來時雨不降宿麥傷旱秋種未下政失厥中憂懼而已其賜天下男子爵人二級及流民無名數欲占者人一級鰥寡孤獨篤癃貧不能自存者粟人三斛理寃獄録輕繫二千石分禱五嶽四瀆郡界有名山大川能興雲致雨者長吏各潔齊禱請冀蒙嘉澍並後漢書尚書詔應劭漢官儀尚書蓋古之納言出納朕命機事不密則害成可不慎歟謁者詔荀綽晉百官表注漢用孝亷年五十威儀端恪為謁者明帝詔謁者乃堯之尊官所以試舜賔于四門四門穆穆者也昔燕太子使荆軻劫始皇變起兩楹之間其後謁者持匕首刺腋髙祖偃武行文故易之以板復道詔東觀漢記明帝行幸諸國敕執金吾馮魴將緹騎宿玄武門復道上疏詔復道多風寒左右老人且病痱多取帷帳東西完塞窗皆令緻密東海王強喪事詔永平元年強病上疏謝及薨明帝追惟強謙儉不欲厚葬以違其意於是特詔中常侍杜岑及東海傳相王恭謙好禮以德自終遣送之物務從約省衣足斂形茅車瓦器物減於制以彰王卓爾獨行之志將作大匠留起陵廟東平王蒼為驃騎將軍詔東觀漢記明帝詔東平王蒼寬博有謀可以託六尺之孤臨大節而不可奪其以蒼為驃騎將軍東平王蒼歸藩詔蒼自以至親輔政心不自安因請歸藩不許永平五年二月詔許之東平王比上書願歸藩上將軍印綬謙讓日聞至誠懇惻蓋君子成人之美今其聽焉以驃騎長史為東平王太傅掾吏為中大夫令史為王家郎勿上將軍印綬後漢紀手詔東平憲王蒼蒼光武子為驃騎大將軍在朝數載多所隆益蒼與諸王朝京師月餘還國帝臨送歸宫悽然懷思乃遣使手詔國中傳辭别之後獨坐不樂因就車歸伏軾而吟瞻望永懷實勞我心誦及采菽以增歎息日者問東平王處家何等最樂王言為善最樂其言甚大副是要腹矣今送列侯印十九枚諸王子年五嵗己上能趨拜者皆令帶之蒼美鬚􅐖要帶十圍故云副是要腹報中山王焉書焉光武子諸王來會辟雍事畢歸藩詔焉與俱就國從以虎賁官騎焉上書辭讓顯宗報曰凡諸侯出境必備左右故夾谷之會司馬以從今五國各官騎百人稱娖前行皆北軍胡騎便兵善射弓不空發中必決眥夫有文事必有武備所以重藩職也王其勿辭稱娖猶言齊整制詔楚王英母許太后英光武子英與漁陽王平等造作圖書有逆謀徙丹陽自殺帝遣使弔祠以諸侯禮葬遣中黃門占護其妻子悉出官屬無辭語者制詔許太后國家始聞楚事幸其不然既知審實懷用悼灼庶欲宥全王身令保卒天年而王不念顧太后竟不自免此天命也無可奈何太后其保養幼弱勉強飲食諸許願王富貴人情也已詔有司出其有謀者令安田宅並後漢書鄧禹進太傅䇿書漢官儀顯宗即位拜禹太傅進見東面甚蒙尊寵髙密侯鄧禹元功之首其以禹為太傅封陰興諸子詔興為光烈皇后同母弟纍辭封爵建武末卒永平元年詔封其子故侍中衛尉關內侯興典領禁兵從平天下當以軍功顯受封爵又諸舅比例應蒙恩澤興固讓安平里巷輔導朕躬有周昌之直在家行孝有曾閔之行不幸早卒朕甚傷之賢者子孫宜加優異其以汝南之鮦陽封興子慶為鮦陽侯慶弟博為濦強侯博弟員丹並為郎後漢書賜桓榮爵詔永平二年五更桓榮以尚書教朕十有餘年周頌曰日就月將視我顯德又曰無德不報其賜榮爵關內侯食邑五千户後漢紀舉薑詩大孝詔廣漢薑詩事母以大孝稱永平三年察孝廉明帝詔拜郎中大孝入朝凡諸舉者一聽平之封馮魴為楊邑侯詔永平十四年執金吾魴侍衛歷年數進忠言其還爵土封為楊邑侯後漢紀玉海引東觀漢記詔曰馮魴以忠孝出入八年數進忠言正諫賜以玉玦案驗鄹令詔會稽典録鄭𢎞為鄹令永平十五年蝗發泰山郡國被害過鄹不集郡以狀上詔書以為不然按驗如言朕自治京師尚不能禳蝗鄹令何人而令消弭遣按驗之詔竇固永平十六年奉車都尉竇固出擊胸奴以班超為假司馬攻破北虜納質鄯善固具上超功效并求更選使使西域帝壯超節詔固超因受使吏如班超何故不遣而更選乎今以超為軍司馬令遂前功詔班固固見後永平十七年明帝召固與賈逵傅毅等詣雲龍門持奏始皇本紀問太史遷下贊語中寧有非耶固具對素聞知狀帝復與詔固因撰典引引堯事以述漢德司馬遷著書成一家言揚名後世至以身陷刑之故反微文刺譏貶損當世非誼士也司馬相如汙行無節但有浮華之詞不周於用至於疾病而遺忠主上求取其書竟得頌述功德言封禪事忠臣效也至是賢遷逺矣班固典引恤比銅鉗詔燒何羌豪有婦人比銅鉗者年百餘嵗多智算為種人所信向時為盧水胡所擊乃將其衆來依郡縣種人有犯法者臨羌長收繫誅殺之明帝初即位憐而下詔昔桓公伐戎而無仁惠故春秋貶曰齊人今國家無德恩不及逺羸弱何辜而當并命夫長平之暴非帝者之功咎由太守長吏妄加殘戮比銅鉗尚生者所在致醫藥養視令招其種人若欲歸故地者厚遣送之其小種若束手自詣欲效功者皆除其罪若有逆謀為吏所􅽭而獄狀未斷悉以賜有功者後漢書書板東觀漢記永平十三年上耕籍田畢賜觀者食有一諸生前舉手曰善哉文王之遇太公也上書板曰生非太公豫亦非文王也有司上明帝廟號樂舞奏制曰可孝明皇帝聖德淳茂劬勞日昃身御浣衣食無兼珍澤臻四表逺人慕化僬僥儋耳欵塞自至克伐鬼方開道西域威靈廣被無思不服以蒸庶為憂不以天下為樂備三雍之教躬養老之禮作登歌正雅樂博貫六藝不舍晝夜聰明淵塞著在圖讖至德所感通於神明功烈光於四海仁風行於千載而深執謙謙自稱不德無起寢廟掃地而祭除日祀之法省送終之禮遂藏主於光烈皇后更衣别室天下聞之莫不悽愴陛下至孝蒸蒸奉順聖德臣愚以為更衣在中門之外處所殊别宜尊廟曰顯宗其四時禘祫於光武之堂間祀悉還更衣共進武德之舞如孝文皇帝祫祭髙廟故事後漢書東漢文紀卷一
