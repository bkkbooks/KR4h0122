body:
  text: 東漢文紀巻四明梅鼎祚編明德馬皇后伏波将軍援少女明帝后無子賈貴人生章帝命后養之尊為皇太后報請封外戚詔建初元年章帝欲封爵諸舅太后不聽明年夏大旱言事者以為不封外戚之故有司因此上奏宜依舊典太后詔報帝省詔悲歎復重請太后又報帝後二年封廖為順陽侯防為潁陽侯光為許陽侯皆援子后兄凡言事者皆欲媚朕以要福耳昔王氏五侯同日俱封其時黄霧四塞不聞澍雨之應又田蚡竇嬰寵貴横恣傾覆之禍為世所傳故先帝防慎舅氏不令在樞機之位諸子之封裁令半楚淮陽諸國常謂我子不當與先帝子等今有司柰何欲以馬氏比隂氏乎吾為天下母而身服大練食不求甘左右但著帛布無香薰之飾者欲身率下也以為外親見之當傷心自勅但笑言太后素好儉前過濯龍門上見外家問起居者車如流水馬如游龍蒼頭衣緑袡領袖正白顧視御者不及遠矣故不加譴怒但絶歲用而巳冀以黙愧其心而猶懈怠無憂國忘家之慮知臣莫若君况親屬乎吾豈可上負先帝之㫖下虧先人之德重襲西京敗亡之禍哉後漢書同前漢紀有舊典舅氏一人封也吾非謙而不為誠昧所可耳今水旱連年民流滿道至有餓􅥌者而欲施封爵上行之為失政臣受之為䘮軀不可明矣先帝嘗言諸王財令半楚淮陽吾子不當與光武帝子等今何以馬氏比隂氏乎且隂衛尉天下稱之省中御者出不及履而至門此蘧伯玉之敬也又有好賢下士吐握之名新陽侯雖剛强微失理然有方畧據地談論一朝無䨇原鹿貞侯勇猛誠信此三人者天下選臣豈可及哉馬氏不及隂氏遠矣吾不才夙夜累息常恐虧先后之法有毛髪之罪吾不釋也言之不舍晝夜而親屬犯之不止治䘮起墳又不時覺是吾言之不立耳目之塞也吾萬乘主身服大練食不求甘左右旁人無香薰之飾衣但布帛如是者欲以身率服衆也以為外親見之當傷心自刻但發笑言太后素好儉前過濯龍門上見外家車如流水馬如龍吾亦不譴怒之但絶其歲用冀以黙愧其心而猶駑怠無憂國忘家者知臣莫若君况親屬乎隂識封原鹿侯諡曰貞弟興拜衛尉興弟就封新陽侯同前劉向列女傳向西漢人傳乃有東漢馬后崇文總目以陳嬰母十六傳後人所附外戚横恣為世所傳永平中嘗自簡練知舅氏不可恣不令在樞機之位今水旱連年民流滿道至有饑餓而施封拜失宜不可且先帝言諸王財令半楚淮陽王吾子不當與先帝子等今柰何欲以馬氏比隂氏乎吾自束脩冀欲上不負先帝下不虧先人之德身服大練縑裙食不求所甘左右旁人皆無香薰之飾但布帛耳如是者欲身帥衆也以為外親見之當傷心自克但反共言太后素自喜儉前過濯龍門上見外家問起居車如流水馬如游龍蒼頭衣緑褠領袖正白顧視旁御者遠不及也亦不譴怒但絶其歲用冀以黙止讙耳知臣莫若君况親屬乎人之所以欲封侯者欲以禄食養其親奉修祭祀身温飽祭祀則受大官之牲郡國既珍司農黍稷身則衣御府之餘繒尚未足耶必當得一縣上令長樂宫有負言之責内亦不愧於世俗乎赤牘裁前過濯龍門至止讙耳作與諸王子書誤章帝重請漢興舅氏之封侯猶皇子之為王也太后誠存謙虛柰何令臣獨不加恩三舅乎且衛尉年尊兩校尉有大病如今不諱使臣長抱刻骨之悢宜及吉時不可稽留又報章帝吾反覆念之思令兩善豈徒欲獲謙謙之名而使帝受不外施之嫌哉昔竇太后欲封王皇后之兄丞相條侯言受髙祖約無軍功非劉氏不侯今馬氏無功於國豈得與隂郭中興之后等邪嘗觀富貴之家禄位重疊猶再實之木其根必傷且人所以願封侯者欲上奉祭祀下求温飽耳今祭祀則受四方之珍衣食則䝉御府餘資斯豈不足而必當得一縣乎吾計之熟矣勿有疑也夫至孝之行安親為上今數遭變異榖價數倍憂惶晝夜不安坐卧而欲先營外封違慈母之拳拳乎吾素剛急有胸中氣不可不順也若隂陽調和邊境清静然後行子之志吾但當含飴弄孫不能復關政矣後漢書同前漢紀吾反復念之欲令兩善豈欲獲謙虛之名而令帝受不外施之恩哉竇太后欲封皇父曲周侯言髙祖要無軍功非劉氏不封今馬氏無功於漢不得與隂郭中興之后等也今輦轂下民食不造歳湯火之憂也柰何欲以此時封爵舅氏令吾無面目於園陵而令帝不知稼穡之艱難不可明矣吾懼富貴重叠若再實木根必傷也且人所以欲封侯者欲以禄養親奉祭祀身温飽也祭祀則受大官之賜其身則御府之餘尚未足邪而必當一縣封乎吾計之熟矣勿有疑至孝之行安親為上今遭變異榖價數倍憂惶晝夜坐起不安而欲違慈母之拳拳吾素剛急有胸中氣不可不慎子之未冠由於父母巳冠成人則子之志念帝人君也吾以未逾三年之故自吾家族故得專之穰歲之後行子之志吾但當含飴弄孫不能復知政章德竇皇后扶風平陵人大司徒融曾孫選立為后和帝立尊為皇太后鄧彪為太傅輔政詔和帝初即位十歲太后臨朝章和二年三月詔先帝以明聖奉承祖宗至德要道天下清静庶事咸寧今皇帝以㓜年㷀㷀在疚朕且佐助聽政外有大國賢王並為藩屏内有公卿大夫統理本朝恭巳受成夫何憂哉然守文之際必有内輔以參聽斷侍中憲朕之元兄行能兼備忠孝尤篤先帝所噐親受遺詔當以舊典輔斯職焉憲固執謙讓節不可奪今供養兩宫宿衛左右厥事巳重亦不可復勞以政事故太尉鄧彪元功之族三讓彌髙海内歸仁為羣賢首先帝褒表欲以崇化今彪聰明康彊可謂老成黄耉矣其以彪為太傅賜爵關内侯録尚書事百官總巳以聽朕庶幾得專心内位於戲羣公其勉率百僚各修厥職愛養元元綏以中和稱朕意焉和熹鄧皇后諱綏太傅禹孫選入為貴人隂后廢進位皇后撫殤立安臨朝稱制賜周馮貴人䇿元興元年和帝崩乃迎皇子隆立之是為殤帝太后臨朝和帝𦵏後宫人並歸園太后賜周馮貴人䇿朕與貴人託配後庭共歡等列十有餘年不獲福祐先帝早棄天下孤心㷀㷀靡所瞻仰夙夜永懐感愴發中今當以舊典分歸外園慘結增歎燕燕之詩曷能喻焉其賜貴人王青蓋車采飾輅驂馬各一駟黄金三十斤雜帛三十匹白越四千端後漢書同前漢紀朕與貴人託配後庭十有餘年上天不弔先帝早棄天下孤心㷀㷀無所瞻仰貴人當以舊典歸分園外相戀之情感增悲歎燕燕之詩曷能喻焉其賜貴人青蓋車驂馬各一黄金四十斤雜綵三千匹臨朝大赦詔殤帝延平元年五月時帝誕育百餘日太后臨朝皇帝㓜冲承統鴻業朕且權佐助聽政兢兢寅畏不知所濟深惟至治之本道化在前刑罰在後将稽中和廣施慶惠與吏民更始其大赦天下自建武以來諸犯禁錮詔書雖解有司持重多不奉行其皆復為平民詔司徒大司農長樂少府元年六月朕以無德佐助統政夙夜經營懼失厥衷思惟治道由近及遠先内後外自建武之初以至於今八十餘年宫人歲增房御彌廣又宗室坐事没入者猶託名公族甚可愍焉今悉免遣及掖庭宫人皆為庶民以抒幽隔鬱滯之情諸官府郡國侯王家奴婢姓劉及疲癃羸老皆上其名務令實悉立長安侯祜詔殤帝崩太后與兄車騎将軍鄧騭定䇿禁中立章帝孫清先帝聖德淑茂早棄天下朕奉皇帝夙夜瞻仰日月冀望成就豈意卒然顛沛天年不遂悲痛斷心朕惟平原王素被痼疾念宗廟之重思繼嗣之統唯長安侯祜質性忠孝小心翼翼能通詩論篤學樂古仁惠愛下年巳十三有成人之志親德係後莫宜於祐禮昆弟之子猶巳子春秋之義為人後者為之子不以父命辭王父命其以祜為孝和皇帝嗣奉承祖宗案禮儀奏䇿命惟延平元年秋八月癸丑皇太后曰咨長安侯祜孝和皇帝懿德巍巍光於四海大行皇帝不永天年朕惟侯孝章帝世嫡皇孫謙恭慈順在孺而勤宜奉郊廟承統大業今以侯嗣孝和皇帝後其審君漢國允執其中一人有慶萬民賴之皇帝其勉之哉約敕親屬詔告司𨽻校尉河南尹南陽太守每覽前代外戚賔客假借威權輕薄􅢽詷至有濁亂奉公為人患苦咎在執法怠懈不輙行其罰故也今車騎将軍騭等雖懐敬順之志而宗門廣大姻戚不少賔客姦猾多干禁憲其明加檢勑勿相容護省供薦新味詔凡省二十三種凡供薦新味多非其節或鬱養强孰或穿掘萌牙味無所至而夭折生長豈所以順時育物乎傳曰非其時不食自今當奉祠陵廟及給御者皆湏時乃上詔從兄鄧豹鄧康豹為禹孫厯河南尹坐事自殺康夷安侯珍子禹孫襲父封厯侍中太僕太后詔徴和帝弟濟北河間王子男女年五歲以上四十餘人又鄧氏近親子孫三十餘人並為開邸第教學經書躬自監試尚㓜者使置師保朝夕入宫撫存詔導乃詔從兄河南尹豹越騎校尉康等吾所以引納羣子置之學官者實以方今承百王之弊時俗淺薄巧偽滋生五經衰缺不有化導将遂陵遲故欲褒崇聖道以匡失俗傳不云乎飽食終日無所用心難矣哉今末世貴戚食禄之家温衣美飯乘堅驅良而面牆術學不識臧否斯故禍敗所從來也永平中四姓小侯皆令入學所以矯俗厲薄反之忠孝先公既以武功書之竹帛兼以文德教化子孫故能束脩不觸羅綱誠令兒曹上述祖考休烈下念詔書本意則足矣其勉之哉復漢書先公謂鄧禹也報鄧閶閶字季昭張掖太守訓子禹孫官侍中封西華侯長歸𡨕𡨕往而不反東觀漢記封洛陽令王渙子石為郎詔安帝永初二年鄧太后詔夫忠良之吏國家所以為理也求之甚勤得之至寡故孔子曰才難不其然乎昔大司農朱邑右扶風尹翁歸政迹茂異令名顯聞孝宣皇帝嘉歎愍惜而以黄金百斤䇿賜其子故洛陽令王渙秉清脩之節蹈羔羊之義盡心奉公務在惠民功業未遂不幸早世百姓追思為之立祠自非忠愛之至孰能若斯者乎今以渙子石為郎中以勸勞勤勉馬融制融為郎東觀因兄子䘮自劾歸太后聞之怒謂融薄詔除下制禁錮者六年融典校祕書不推忠盡節而羞薄詔除希望欲仕州郡免官勿罪遺詔安帝永寧二年二月崩在位二十年朕以無德託母天下而薄祐不夭早離大憂延平之際海内無主元元戹運危于累卵勤勤苦心不敢以萬乘為樂上欲不欺天愧先帝下不違人負宿心誠在濟度百姓以安劉氏自謂感徹天地當䝉福祚而喪禍内外傷痛不絶頃以廢病沉滯久不侍祠自力上原陵加欬逆唾血遂至不解存亡大分無可柰何公卿百官其勉盡忠恪以輔朝廷後漢書順烈梁皇后諱妠大将軍商女初為貴人陽嘉元年立為后沖質崩立桓帝皆以皇太后臨朝秉政詔詰欒巴巴徴拜尚書順帝崩營起憲陵主者欲侵毁左右墳塜巴上書苦諫時梁太后臨朝詔詰巴巴坐抵罪禁錮還家大行皇帝晏駕有日卜擇陵園務崇省約塋域所極裁二十頃而巴虛言主者壊人塜墓事既非實寝不報下巴猶固遂其愚復上誹謗苟肆狂瞽益不可長立建平侯續詔後漢紀沖帝崩大将軍梁冀欲立幼主而専其權與太后定䇿禁中立章帝之後建平侯續是為質帝先帝早棄天下𦙍嗣幼冲何悟倉卒仍遭不造惟太后定之考人神之誠惟建平侯續幼而岐嶷師傅不煩年巳八歲克昌化之形於體貎春秋之義為人後者為之子其以續為孝順皇帝嗣永嘉元年五月大旱詔沖帝永嘉元年正月崩質帝是月即位朕以不德託母天下布政不明每失厥中自春渉夏大旱炎赫憂心京京故得禱祈明祀冀䝉潤澤前雖得雨而宿麥頗傷比日隂雲還復開霽寤寐永歎重懐慘結将二千石令長不崇寛和暴刻之為乎其令中都官繫囚罪非殊死考未竟者一切任出以湏立秋郡國有名山大澤能興雲雨者二千石長吏各潔齋請禱竭誠盡禮又兵役連年死亡流離或支骸不歛或停棺莫収朕甚愍焉昔文王𦵏枯骨人賴其德今遣使者案行若無家屬及貧無資者隨宜賜䘏以慰孤魂太學詔順帝感翟輔之言更修黌宇增甲乙科太初元年梁太后詔自是遊學漸盛監本後漢書作太初誤大将軍下至六百石悉遣子就學每歲輙於鄉射月一饗㑹之以此為常立蠡吾侯志詔質帝崩太尉李固欲立清河王蒜梁冀畏其嚴明與太后建䇿禁中立章帝曾孫蠡吾侯志是為桓帝孝質皇帝𦙍嗣不遂奄忽夭昏以社稷之重考宗室之賢莫若蠡吾侯志年巳十五嘉姿卓茂又近為孝順皇帝嗣後漢紀增濟北王次封戸詔次嗣立九歲䘮父至孝桓帝建和元年梁太后下詔濟北王次以幼年守藩躬履孝道父没哀慟焦毁過禮草廬土席衰杖在身頭不枇沐體生瘡腫諒闇巳來二十八月自諸國有憂未之聞也朝廷甚嘉焉書不云乎用德章厥善詩云孝子不匱永錫爾類今增次封五千户廣其土宇以慰孝子惻隱之勞費亭侯曹騰之國詔𨽻釋曹騰碑隂此詔在桓帝贈曹騰制前惟建和元年七月廿二日巳巳皇太后曰其遣費亭侯之國為漢藩輔臨君境内母有出闕六字變卒闕七字百姓不可不愛不愛則不附大臣不親百姓不附不附可不慎下闕䘏災詔建和三年冬是歲日食地震星孛大水雨肉災異屢見朕攝政失中災𤯝連仍三光不明隂陽錯序監寐寤歎疢如疾首今京師厮舍死者相枕郡縣阡陌處處有之甚違周文掩胔之義其有家屬而貧無以𦵏者給直人三千䘮主布三匹若無親屬可於官壖地𦵏之表識姓名為設祠祭又徒在作部疾病致醫藥死亡厚埋藏民有不能自振及流移者稟榖如科州郡檢察務崇恩施以康我民歸政詔桓帝和平元年太后詔二月太后崩曩者遭家不造先帝早世永惟大宗之重深思嗣續之福詢謀台輔稽之兆占既建明哲克定統業天人協和萬邦咸寧元服巳加将即委付而四方盗竊頗有未静故假延臨政以湏安謐幸賴股肱禦侮之助殘醜消蕩民和年稔普天率土遐邇洽同遠覽復子明辟之義近慕先姑歸授之法及今令辰皇帝稱制羣公卿士䖍恭爾位戮力一意勉同斷金展也大成則所望矣後漢紀詔云曩者遭家不造大禍薦臻欽惟宗廟之重社稷之大爰立明哲将即委授而東南西北醜類未賔故且總攝助理萬機今悉討除遠慕復子明辟之義其及今辰皇帝稱制遺詔和平元年春太后病篤乃御輦幸宣德殿見官省官屬及諸梁兄弟詔曰此似口語非詔書也朕素有心下結氣從間以來加以浮腫逆害飲食寖以沈困比使内外勞心請禱私自忖度日夜虛劣不能復與羣公卿士共相終竟援立聖嗣恨不久育養見其終始今以皇帝将軍兄弟委付股肱其各自勉焉有司請立長秋宫順烈皇后初為貴人特被引御陽嘉元年有司奏立為皇后桓帝立尊為皇太后乘氏侯商先帝外戚春秋之義娶先大國梁小貴人宜配天祚正位坤極並後漢書漢雜事秘辛建和元年四月丁亥保林吳姁以丙戌詔書下中常侍超曰朕聞河洲窈窕明辟思服擇賢作儷隆代所先故大将軍乘氏忠侯商所遺少女有貞静之德流聞禁掖其與姁並詣商第周視動止審悉幽隱其毋諱匿朕将採焉姁即與超以詔書趨詣商第第内讙譟食時商女女瑩從中閣細歩到寢姁與超如詔書周視動止俱合法相超留外舍姁以詔書如瑩燕處屏斥接偫閉中閣子時日晷薄辰穿照蜃忩光送著瑩面上如朝霞和雪艷射不能正視目波澄鮮眉嫵連巻朱口皓齒修耳懸鼻輔靨頥頷位置均適姁尋脱瑩歩揺伸髻度髪如黝髹可鑒圍手八盤墜地加半握巳乞緩私小結束瑩面發頳抵攔姁告瑩曰官家重禮借見朽落緩此結束當加鞠翟耳瑩泣數行下閉目轉面内向姁為手緩捧著日光芳氣噴襲肌理膩潔拊不留手規前方後築脂刻玉胸乳菽發臍容半寸許珠私處墳起為展兩股隂溝渥丹火齊欲吐此守禮謹嚴處女也約畧瑩體血足榮膚膚足飾肉肉足冐骨長短合度自顛至底長七尺一寸肩廣一尺六寸臀視肩廣減三寸自肩至指長各二尺七寸指去掌四寸肖十竹萌削也髀至足長三尺二寸足長八寸踁附豐妍底平指歛約縑迫袜収束微如禁中乆之不得音響姁令催謝皇帝萬年瑩乃徐拜稱皇帝萬年若微風振簫幽鳴可聽不痔不瘍無黑子創陷及口鼻腋私足諸過臣妾姁女賤愚憨言不宣心書不符見謹秘緘昧死以聞時夜漏三下太后猶御壽安殿發緘歡喜顧語帝曰吾入宫後知有幼妹然中外隔濶目所未見不謂爭達如爾明日詔下有司議禮有司奏曰謹按春秋迎王后于紀在途則稱后故大将軍乘氏忠侯商女今大将軍參録尚書事乘氏侯冀女弟膺紹聖善舊協潜邸結婚之際有命既集宜備禮章時進徵幣請下三公太常案禮儀奏可一凖孝惠皇帝納后故事於六月癸未皇帝制詔大将軍參録尚書事乘氏侯冀乾施坤受實始人經不有配儷曷奉天地宗廟爰謀公卿咸謂宜率前典令使使持節太常𢎞宗正千秋以禮納采主人曰皇帝嘉命訪婚陋族備數采擇臣父故大将軍乘氏忠侯商之遺女未閒訓誡衣履若而人欽承前典肅奉儀制大将軍參録尚書事乘氏糞土臣冀頓首再拜承制乙酉皇帝制詔大将軍參録尚書事乘氏侯冀兩儀配儷承天統物正位於内必竢令族重申舊典令使使持節太常𢎞宗正千秋以禮問名主人曰皇帝嘉命使者𢎞到重宣中詔問臣名族臣女弟女瑩父母所生先臣故九江太守定陵鄉侯統之遺𤣥孫先臣故褒親愍侯竦之曾孫先臣故少府特進乘氏侯雍之孫先臣故大将軍乘氏忠侯商之遺女外出自先臣故侍中鮦陽侯萬全之外曾孫先臣故大鴻臚鮦陽侯桂之外孫年十六欽承前典肅奉儀制戊子皇帝制詔大将軍參録尚書事乘氏侯冀人謀龜從僉曰貞吉敬從典禮令使使持節太常𢎞宗正千秋以禮納吉主人曰皇帝嘉命使者𢎞重宣中詔大卜元吉臣陋族卑鄙憂懼不勝欽承前典肅奉儀制辛卯皇帝制詔大将軍參録尚書事乘氏侯冀之女弟有母儀之德窈窕之姿如山如河宜奉宗廟永承天祚以黄金二萬斤馬十二匹𤣥纁榖璧以章典禮今使使持節司徒戒太常𢎞以禮納徵主人曰皇帝嘉命降婚卑陋崇以上公寵以典禮備物典䇿欽承前典肅奉儀制甲午皇帝制詔大将軍參録尚書事乘氏侯冀謀於公卿大筮元龜罔有不臧率遵典禮今使使持節太常𢎞宗正千秋以禮請期主人曰皇帝嘉命使𢎞重宣中詔吉日惟今月庚子可迎臣欽承前典肅奉儀制庚子皇帝制詔大将軍參録尚書事乘氏侯冀歲吉月令吉日惟庚子率禮以迎今使使持節太尉喬司徒戒以迎主人曰皇帝嘉命使者喬重宣中詔令月吉辰備禮以迎上公宗卿兼至副介近臣百兩蝝蟻之族猥承大禮憂悚惶悸欽承前典肅奉儀制后服紺上𤣥下假髻歩搖八雀九華十二䥖加以翡翠朱舄袜乘法駕重翟羽蓋金根車駕青交路青幃裳􅀈畫輈黄金塗五末蓋蚤施金華駕駟馬龍旗九斿大将軍妻參乘太僕妻御車府令設鹵簿屬車四十六乘前鸞旗車皮軒鳯皇闟㦸九斿雲䍐金鉦黄鉞洛陽令奉引公卿五官校尉司𨽻校尉河南尹妻皆乘其官車帶夫本官綬以從置虎賁羽林騎戎頭黄門鼓吹五時副車女騎夾轂執法御史在前五将導騎千乘萬騎引至闕下自皇漢迎后未有若斯之盛也至八月乙未詔曰維建和元年八月乙未制詔故大將軍乘氏忠侯商女女瑩朕聞任姒佐周綿運八百良以德重黄裳足奉宗廟也朕以寡昧承嗣厯服爰求英淑共臨海内惟爾夙閑内戒德冠後庭有夭桃之宜協和鳴之祥宜升尊位母儀天下今使太尉喬使持節奉璽綬宗正千秋為副立爾為皇后其敬慎中饋以踐乃位無替朕命永奠坤維后即位於章德殿太尉使持節奉璽綬天子臨軒陛設虎賁旄頭五牛旗百官陪臣皇后北面太尉往葢下東向宗正大長秋西向宗正讀䇿文畢皇后稱臣妾皇帝萬年畢住位太尉喬授璽綬中常侍超長跪受璽綬奏於殿前女史授媫妤婕妤長跪受以授昭儀昭儀長跪受以帶皇后皇后伏起拜稱臣妾皇帝萬年訖黄門鼓吹三通鳴鼔畢羣臣以次出后即位大赦天下楊慎題云漢雜事一卷得於安寧州土知州董氏前有義烏王子充印葢子充使雲南時篋中書也然御覽諸書亦有漢雜事而畧不見収此特載漢桓帝懿獻梁皇后被選及六禮冊立事而吳姁入后燕處審視一段最為竒艷但大穢䙝耳不謂冀威赫震人猶得瀆選如此巻首有秘辛二字不可解要是卷帙甲乙名目余嘗搜考弓足原始不得及見約縑迫袜収束微如禁中語則纒足後漢巳有之言脱於口追駟不及聊志於此用塞疎漏之誚胡震亨䟦云按桓帝初為蠡吾侯梁太后欲以女弟女瑩妻之徵至京師㑹質帝崩因立之其明年立女瑩為后袁宏後漢紀范曄書帝后兩紀李固傳並詳之后紀有司請徵引春秋在途稱后正謂前曾結婚也不應復下詔審視即其故事詔中亦應畧及之今苐云貞静之德流聞集掖故也又劉昭禮儀志注云漢立皇后國禮之大而志無其儀取蔡質所記靈帝立宋后儀以備闕此書較多審視及六禮節次又在宋后前宣卿注志舊稱博悉不應舍此引彼即位儀亦與注多同雖用修復生不能判此疑案也姚士粦云余始讀漢雜事目駴情搖謂非漢人不能作及見孝轅跋語該引詳駁牴牾灼然乃更發書檢較復得可疑者數則按雜事所載立后儀並同宋后固無論即后所服稱紺上𤣥下八雀九華皆廟見所著若十二䥖是親蠶飾不宜於大婚之時合併而服也且鹵薄大駕與劉昭親蠶注不爽眉髪而六禮版辭亦見沈約宋書宋書云晉穆帝将納何后太常王彪之謂六禮宜依漢舊今考雜事及晉版辭一則曰欽承舊章肅奉典制一則曰欽承前典肅奉儀制此豈彪之所云華嶠改定而有異同邪禮使有太常𢎞不知為誰其曰中常侍超單超也曰司徒戒趙戒也注曰蜀郡人曰太尉喬杜喬也但梁冀初欲厚禮納徵喬執不從冀遂於是年十一月殺喬朝廷此時寧敢拂冀遣喬為使至於宗正千秋惟安帝時有劉千秋為宗正去此幾四十年不應尚居此官末復有大赦天下語則建和元年八月乙未立后之下曾無此文雖此年十一月有減天下死罪一等語然與立后絶不相䝉當是仍襲宋后舊文耳惟以后生年推之用合商妻隂夫人所卒之年則后生於永建五年隂卒於陽嘉四年是生六歳而母始䘮也於理稍不背戾又后紀注曰乘馬四匹馬也雜事乃云馬十二匹更檢晉志云漢髙后制聘后黄金二百斤馬十二匹此則雜事較有所據足補悉依孝惠皇帝納后故事注余因念作偽者必非不讀漢書何至自開釁竇如此且審識一段描寫精瑩若有生氣似非假托可到恐秘記史官各有依據未可指為膺作也有司上梁太后奏後漢書桓帝初為蠡吾侯太后徵女弟欲與為婚未及嘉禮㑹質帝崩因立帝有司奏太后建和元年立為后恃寵見疎怨恚薨春秋迎王后于紀在塗則稱后今大將軍冀女弟膺紹聖善結婚之際有命既集宜備禮章時進徴幣三公太常案禮儀桓思竇皇后諱妙章大將軍武女初為貴人梁后薨進為皇后靈帝立尊為皇太后武為宦官所害遷太后南宫雲臺立解瀆亭侯宏詔後漢紀桓帝崩無嗣大將軍竇武與太后定䇿禁中立解瀆亭侯萇之子宏是為靈帝太后詔大行皇帝德配天地光照上下不獲𦙍嗣之祚早棄萬國朕憂心摧傷追覽前代法王后無適即擇賢立親考德叙才莫若解瀆亭侯宏年十有二嶷然有周成之質春秋之義為人後者為之子其以宏為大行皇帝嗣賜段熲詔東羌先零等自覆没馬賢後數為㓂逆靈帝建寧元年春熲為䕶羌校尉将萬餘人從彭陽直指髙平大破之竇太后臨朝下詔拜熲破羌将軍先零東羌歴載為患熲前陳状欲必掃滅渉履霜雪兼行晨夜身當矢石感厲吏士曾未浹日凶醜奔破連尸積俘掠獲無算洗雪百年之逋負以慰忠将之亡魂功用顯著朕甚嘉之湏東羌盡定當并録功勤今且賜熲錢二十萬以家一人為郎中敕中藏府調金錢綵物增助軍費靈帝何皇后南陽宛人生少帝即位尊為皇太后廢少帝策靈帝崩立何后子辯董卓統兵入自為司空脅太后廢帝立陳留王協是為獻帝遷太后以弑崩復鴆殺少帝皇帝在䘮無人子之心威儀不類人君今廢為𢎞農王後漢書廢少帝立陳留王䇿獻帝起居注鼎按此即曄書前䇿也曄書及後漢紀並稱董卓逼何太后為廢帝䇿是借命太后也起居注所載乃併斥太后則更出何人命䇿耶卓雖凶僣尚在臣列無以臣䇿君之理疑不可曉孝靈皇帝不究髙宗眉壽之祚早棄臣子皇帝承紹海内側望而帝天姿輕佻威儀不恪在䘮慢惰衰如故焉凶德既彰淫穢發聞損辱神噐忝汚宗朝皇太后教無母儀統政荒亂永樂太后暴崩衆論惑焉三綱之道天地之紀而乃有闕罪之大者陳留王協聖德偉茂規矩邈然豐下兑上有堯圖之表居䘮哀戚言不及邪岐嶷之性有周成之懿休聲美稱天下所聞宜承洪業為萬世統可以承宗廟廢皇帝為𢎞農王皇太后還政永樂太后本解犢侯萇董夫人生靈帝尊為孝仁皇后宫稱永樂與何太后不協暴崩獻帝伏皇后名夀不期侯完之女瑯琊東武人與父完書曹操為司空時董承等謀操被誅后與父完以書示其妻弟樊普普封呈操遂逼帝廢后勒兵収后下暴室幽殺之司空殺董承帝方為報怨獻帝春秋東海王彊光武長子郭皇后生立為皇太子十七年而廢郭后封東海兼食魯郡因都魯謝明帝疏永平元年彊病臨命疏謝上覽悲慟䘮亊贈以殊禮臣䝉恩得備蕃輔特受二國宫室禮樂事事殊異巍巍無量訖無報稱而自修不謹連年被疾為朝廷憂念皇太后陛下哀憐臣彊感動發中數遣使者太醫令丞方伎道術絡繹不絶臣伏惟厚恩不知所言臣内自省視氣力羸劣日夜浸困終不復望見闕廷奉承幃幄孤負重恩銜恨黄泉身既夭命孤弱復為皇太后陛下憂慮誠悲誠慙息政小人也猥當襲臣後必非所以全利之也誠願還東海郡天恩愍哀以臣無男之故處臣三女小國侯此臣宿昔常計今天下新罹大憂惟陛下加供養皇太后數進御餐臣彊困劣言不能盡意願並謝諸王不意永不復相見也東平王蒼光武子明帝同母弟建初八年薨詔上章奏書記賦頌七言别字歌詩為記諫明帝校獵書蒼拜驃騎将軍留輔政永平四年春車駕近出城第當遂校獵河内蒼上書諫帝即還宫臣聞時令盛春農事不聚衆興功傳曰田獵不宿食飲不享出入不節則木不曲直此失春令者也臣知車駕今出事從約省所過吏人諷誦甘棠之德雖然動不以禮非所以示四方也惟陛下因行田野循視稼穡消揺仿佯弭節而旋至秋冬乃振威靈整法駕備周衛設羽旄詩云抑抑威儀惟德之隅臣不勝憤懣伏自手書乞詣行在所極陳至誠請歸職疏蒼在朝數載多所匡益自以至親輔政聲望日重上疏歸職優詔不聽五年乃許還國臣蒼疲駑特為陛下慈恩覆䕶在家被教導之仁升朝䝉爵命之首制書褒美班之四海舉負薪之才升君子之噐凡匹夫一介尚不忘簞食之惠况臣居宰相之位同氣之親哉宜當暴骸膏野為百僚先而愚頑之質加以固病誠羞負乘辱汙輔将之位将被詩人三百赤紱之刺今方域晏然要荒無儆将遵上德無為之時也文官猶可併省武職尤不宜建昔象封有鼻不任以政誠由愛深不忍揚其過惡前事之不忘來事之師也自漢興以來宗室子弟無得在公卿位者惟陛下審覽虞帝優養母弟遵承舊典終卒厚恩乞上驃騎将軍印綬退就蕃國願䝉哀憐薦吳良疏良初為郡吏有名蒼為驃騎将軍聞而辟之署西曹因上疏薦上以章示尚書拜議郎臣聞為國所重必在得人報恩之義莫大薦士竊見臣府西曹掾齊國吳良資質敦固公方亷恪躬儉安貧白首一節又治尚書學通師法經任博士行中表儀宜備宿衛以輔聖政臣蒼榮寵絶矣憂責深大私慕公叔同升之義懼於臧文竊位之罪敢秉愚瞽犯冒嚴禁明帝詔報前以事見良鬚髪皓然衣冠甚偉夫薦賢助國宰相之職蕭何舉韓信設壇而拜不復考試今以良為議郎諫章帝起陵邑疏帝欲為原陵顯節陵起縣邑蒼聞疏諫帝從而止伏聞當為二陵起立郭邑臣前頗謂道路之言疑不審實近令從官古霸問湼陽主疾使還乃知詔書巳下竊見光武皇帝躬履儉約之行深覩始終之分勤勤懇懇以葬制為言故營建陵地具稱古典詔曰無為山陵陂池裁令流水而巳孝明皇帝大孝無違奉承貫行至於自所營創尤為儉省謙德之美於斯為盛臣愚以園邑之興始自强秦古者丘隴且不欲其著明豈况築郭邑建都郛哉上違先帝聖心下造無益之功虛費國用動揺百姓非所以致和氣祈豐年也又以吉凶俗數言之亦不欲無故繕修丘墓有所興起考之古法則不合稽之時宜則違人求之吉凶復未見其福陛下履有虞之至性追封禰之深思然懼左右過議以累聖心臣蒼誠傷二帝純德之美不暢於無窮也惟䝉哀覽辭恩禮疏蒼入見讃勿稱名升殿乃拜章帝親答之蒼以受恩過禮疏辭帝省歎息愈褒貴焉臣聞貴有常尊賤有等威卑髙列序上下以理陛下至德廣施慈愛骨肉既賜奉朝請咫尺天儀而親屈至尊降禮下臣每賜讌見輙興席改容中官親拜事過典故臣惶怖戰慄誠不自安每㑹見踧踖無所措置此非所以示羣下安臣子也南北郊冠服議東觀書曰永平二月正月公卿議春南北郊東平王蒼議孔子曰行夏之時乘殷之輅服周之冕為漢制法髙皇帝始受命創業制長冠以入宗廟光武受命中興建明堂立辟雍陛下以聖明奉遵以禮服龍衮祭五帝禮缺樂崩乆無祭天地冕服之制按尊事神祗潔齋盛服敬之至也日月星辰山龍華藻天王衮冕十有二旒以則天數旂有龍章日月以備其文今祭明堂宗廟圓以法天方以則地服以華文象其物宜以降神明肅雍備思博其類也天地之禮冕冠裳衣宜如明堂之制世祖廟樂舞議東觀書曰永平三年八月公卿奏議世祖廟登歌八佾舞名東平王蒼議詔可進武德之舞如故漢制舊典宗廟各奏其樂皆不相襲以明功德秦為無道殘賊百姓髙皇帝受命誅暴元元各得其所萬國咸熈作武德之舞孝文皇帝躬行節儉除誹謗去肉刑澤施四海孝景皇帝制昭德之舞孝武皇帝功德茂盛威震海外開地置郡傳之無窮孝宣皇帝制盛德之舞光武皇帝受命中興撥亂反正武暢方外震服百蠻戎狄奉貢宇内治平登封告成修建三雍肅修典祀功德巍巍比隆前代以兵平亂武功盛大歌所以詠德武所以象功世祖廟樂舞名宜曰大武之舞謹採百官頌可登歌者一章四句以為曲上言明德皇后配享議謝承後漢書建初四年章帝以公卿所奏明德皇后在世祖廟坐位駁議示蒼蒼上言文武宣元袷食髙廟皆以后配先帝所制典法設張大雅曰昭兹來許䋲其祖武又曰不愆不忘率由舊章明德皇后宜配孝明皇帝於世祖廟同席而供饌沛王輔光武子郭皇后生初封中山王改封沛號為賢王上明帝論雨書東觀漢記輔善京氏易永平五年京師少雨上御雲臺自卦以周易林占之其繇曰蟻封穴户大雨時至上以問輔輔上書蹇艮下為山坎上為水山雲為蟻穴居知雨将至故以蟻為興廣陵王荆明帝同母弟後坐祝詛自殺詐郭況與東海王彊書彊立為太子母郭后廢彊願備蕃國封東海王荆封山陽王及光武崩大行在前殿荆哭不哀而作飛書封以方底令蒼頭詐稱東海王彊舅大鴻臚郭況書與彊彊封書上之明帝秘其事令荆出止河南宫徙封廣陵君王無罪猥被斥廢而兄弟至有束縛入牢獄者太后失職别守北宫及至年老遠斥居邊海内深痛觀者酸鼻及太后尸柩在堂洛陽吏以次捕斬賔客至有一家三尸伏堂者痛甚矣今天下有䘮弓弩張設甚備間梁松敕虎賁史曰吏以便宜見非勿有所拘封侯再難得也郎官竊悲之為王寒心累息今天下爭欲思刻賊王以求功寧有量邪若歸併二國之衆可聚百萬君王為之主鼓行無前功易於太山破雞子輕於四馬載鴻毛此湯武兵也今年軒轅星有白氣星家及喜事者皆云白氣者䘮軒轅女主之位又太白前出西方至午兵當起又太子星色黑至辰日輙變赤夫黒為病赤為兵王努力卒事髙祖起亭長陛下興白水何况於王陛下長子故副主哉上以求天下事必舉下以雪除沉没之恥報死母之讐精誠所加金石為開當為秋霜無為檻羊雖欲為檻羊又可得乎竊見諸相工言王貴天子法也人主崩亡閭閻之伍尚為盗賊欲有所望何况王邪夫受命之君天子所立不可謀也今新帝人之所置彊者為右願君為髙祖陛下所志無為扶蘇将閭呌呼天也後漢書梁王暢明帝子母隂貴人有寵初封汝南王章帝時徙封辭謝和帝書永元五年豫州刺史梁相舉奏暢不道削成武單父二縣暢慙懼上疏帝報臣天性狂愚生在深宫長養傅母之手信惑左右之言及至歸國不知防禁從官侍史利臣財物熒惑臣暢臣暢無所昭見與相然諾不自知陷死罪以至考案肌慄心悸自悔無所復及自謂當即時伏顯誅魂魄去身分歸黄泉不意陛下聖德枉法曲平不聽有司横貸赦臣戰慄連月未敢自安上念以負先帝而令陛下為臣収汙天下誠無氣以息筋骨不相連臣暢知大貸不可再得自誓束身約妻子不敢復出入失繩墨不敢復有所横費租入有餘乞裁食睢陽榖孰虞䝉寧陵五縣還餘所食四縣臣暢小妻三十七人其無子者願還本家自選擇謹敕奴婢二百人其餘所受虎賁官騎及諸工技鼓吹蒼頭奴婢兵弩廐馬皆上還本署臣暢以骨肉近親亂聖化汙清流既得生活誠無心面目以凶惡復居大宫食大國張官屬藏什物願陛下加大恩開臣自悔之門假臣遷善之路令天下知臣䝉恩得去死就生頗能自悔臣以公卿所奏臣罪惡詔書常置於前晝夜誦讀巨小人貪見明時不能即時自引惟陛下哀臣令得喘息漏刻若不聽許臣實無顔以乆生下入黄泉無以見先帝此誠臣至心臣欲多還所受恐天恩不聽許節量所留於臣暢饒足和帝詔報梁王暢朕惟王至親之屬淳淑之美傅相不良不能防邪至令有司紛紛有言今王深思悔過端自克責朕惻然傷之志匪由於咎在彼小子一日克巳復禮天下歸仁王其安心静息茂率休德易不云乎一謙而四益小有言終吉强食自愛後漢書漢紀有言作彰於内外末云其何讓哉清河王慶章帝子母宋貴人初立為太子竇皇后寵盛譛廢慶為清河王而殺貴人子祜入繼是為安帝追尊父為孝徳皇帝清河下令寡人生於深宫長於朝廷仰恃明主垂拱受成既以薄祐早離顧復屬遭大憂悲懐感傷䝉恩大國職惟藩輔新去京師憂心煢煢夙夜屏營未知所立葢聞智不獨理必須明賢今官屬並居爵任失得是均庶望上遵䇿戒下免悔咎其糾督非枉明察典禁無令孤獲怠慢之罪焉病篤上鄧太后書臣國土下濕願乞骸骨下從貴人於樊濯雖殁且不朽矣及今口目尚能言視冐昧干請命在呼吸願䝉哀憐有司上言追尊清河王清河孝王至德淳懿載育明聖承天奉祚為郊廟主漢興髙皇帝尊父為太上皇宣帝號父為皇考序昭穆置園邑太宗之義舊章不忘宜上尊號曰孝德皇帝皇妣左氏曰孝德后孝德皇母宋貴人追謚曰敬隱后東漢文紀巻四
