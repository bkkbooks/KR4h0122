body:
  text: 東漢文紀巻二十六明梅鼎祚編董卓字仲穎隴西臨洮人自進位太師謀篡司徒王允計誅之辭徴書卓立功西陲拜右將軍中平末徵為少府不肯就上書及靈帝寢疾璽書拜卓為并州牧令以兵屬皇甫嵩卓復上書駐兵河東以觀時變所將湟中義從及秦胡兵皆詣臣曰牢直不畢廩賜㫁絶妻子饑凍牽挽臣車使不得行羌胡敝腸狗熊臣不能禁止輒將順安慰增異復上後漢書董卓傳同前涼州擾亂鯨鯢未滅此臣奮發効命之秋吏士踊躍戀恩念報各遮臣車辭聲懇惻未得即路也輒且行前將軍事盡心慰䘏効力行陣又上書臣既無老謀又無壯士天恩誤加掌戎十年士卒大小相狎彌乆戀臣畜養之恩為臣奮一旦之命乞將之北州効力邊垂靈帝紀為國家奮一旦之命請誅宦官表大將軍何進司𨽻校尉袁紹謀誅宦官太后不許私召卓將兵入朝宻令上表以脅太后未至而進敗典略臣伏惟天下所以有逆不止者各由黄門常侍張讓等侮慢天常操擅王命竊幸乗寵濁亂海内父子兄弟並據州郡一書出門便獲千金京畿諸郡數百萬膏腴美田皆屬讓等致使怨氣上蒸妖賊蠭起臣前奉詔討於扶羅將士饑乏不肯渡河皆言欲詣京師先誅閹𥪡以除民害従臺閣求乞資直臣隨慰撫以至新安臣聞揚湯止沸不如滅火去薪潰癰雖痛勝於養肉及溺呼船悔之無及昔趙鞅興晉陽之甲以逐君側之惡今臣輒鳴鐘鼔如洛陽即討讓等以清姦穢養肉曄書作肉食即討作請收署士壹教吳書云司徒黄琬與卓相害而壹盡心於琬甚有聲稱卓惡之乃署教曰司徒掾士壹不得除用王允字子師太原祁人厯位司徒誅董卓為其黨李傕等所害行孝經奏允為尚書令奏獻帝下詔允固奏請乃從之太史王立說孝經六隠事令朝廷行之消却災邪有益聖躬獻帝詔聞王者當脩徳爾不聞孔子制孝經有此而却邪者也固奏立學深厚此聖人秘奥行之無損黄琬字子琰瓊孫厯光禄大夫轉司𨽻校尉預誅董卓為李傕等所害論樊稜許相奏中平末涼州叛軍調不足富殖之徒多以財為官起家為州郡琬為尚書奏論稜相等太尉樊稜司徒許相皆竊位懐祿茍進無恥終無匡救之益必有覆公折足之患宜皆罷遣以清政路軍費雖急禮義㢘恥國之大本也茍非其選飛隼在墉為國生事此猶負石救溺不可不察駮遷都議董卓秉政徵琬為司徒遷太尉卓議遷都長安琬與司徒楊彪諫不從琬退而駮議坐免官昔周公營洛邑以寧姬光武卜東都以隆漢天之所啓神之所安大業既定豈宜妄有遷動以虧四海之望蓋勲字元固敦煌廣至人與董卓書卓拜并州牧將兵入朝誅宦官自為司空因廢少帝殺何太后立陳留王是為獻帝勲爲京兆尹與卓書卓意甚憚之遷越騎校尉勲雖彊直不屈而内厭于卓疽發背卒昔伊尹霍光權以立功猶可寒心足下小醜何以終此賀者在門弔者在廬可不慎哉後漢書終此漢紀作堪之胡母班字季友泰山人與王匡書匡為河内太守従袁紹起兵討董卓卓使執金吾胡母班奉詔到河内解釋義兵匡受袁紹㫖收班繫獄欲殺之以狥軍班乃匡妹夫與匡書匡得書抱班二子號泣班遂死於獄親屬與曺操共殺匡自古以来未有下土諸侯舉兵向京師者劉向傳曰擲鼠忌器器猶忌之況卓今處宫闕之内以天子為藩屏幼主在宫如何可討僕與太傅馬公太僕趙岐少府陰脩俱受詔命關東諸郡雖實嫉卓猶以銜奉王命不敢玷辱而足下獨囚僕於獄欲以釁鼔此悖暴無道之甚者也僕與董卓有何親戚義豈同惡而足下張狼虎之口吐長虵之毒恚卓遷怒何甚酷哉死人之所難然恥為狂夫所害若亡者有靈當訴足下於皇天夫婚姻者禍福之機今日著矣曩為一體今為血讐亡人子二人則君之甥身沒之後慎勿令臨僕屍骸也謝承後漢書囚一作拘亡人子二人一作亡人二女資治通鑑考異云按范書此年六月遣韓融等安集闗東袁術王匡各執而殺之三年八月遣馬日磾及趙岐慰撫天下袁紹遣馬趙亦在三年八月時董卓已死而此書云與馬趙俱受詔又云恚董遷怒自相乖迕疑非班書今不取劉岱字公山東莱牟平人厯位侍中兖州刺史與劉子恵書子恵中山人後漢書作劉恵袁紹之討董卓也劉馥為冀州牧忌紹得衆恐將圖已治中劉子恵勸為發兵兗州刺史劉岱與其書封書與馥馥得此大懼歸咎子恵欲斬之因諫得不死令作徒被赭衣掃除宫門外馥意猶深疑紹每貶節軍糧紹用客逢紀謀以書要公孫瓉引兵南下將襲馥使人說馥以冀州讓紹紹遂領冀州牧馥字文節潁川人董卓無道天下所共攻死在旦暮不足為憂但卓死之後當復回師討文節擁彊兵何凶逆寧可得置英雄傳劉攽云何當作阿楊琦上獻帝封事傕復移乗輿幸北塢門侍臣皆飢帝求米傕乃與腐牛骨帝大怒欲詰責之侍中楊琦上封事傕邊鄙之人習於夷風今又自知所犯悖逆當有怏怏之色欲轉車駕幸黄白城以舒其憤臣願陛下宜恕忍之未可顯其罪也趙温字子柔戒之孫厯司空進司徒與李傕書傕北地人董卓校尉卓死進兵攻長安為車騎將軍後誅死傕與郭汜相攻刼獻帝幸北塢門初屯黄白城謀徙帝以司徒趙温不與已同乃内温塢中温聞傕欲移乗輿乃與傕書傕怒欲遣人害温其従弟應温故掾也諫之乃止帝聞温與傕書問侍中常洽曰傕不知臧否溫言太切可為寒心對曰李應已解之矣帝乃恱張濟自陕和解之帝始得出公前託為董公報讐然實屠陷王城殺戮大臣天下不可家見而户釋也今事睚眥之隙以成千鈞之讐民生塗炭各不聊生曾不改悟遂成禍亂朝廷仍下眀詔欲令和解詔命不行恩澤日損而復欲轉乗輿於黄白城此誠老夫所不解也於易一過為過再為涉三而弗改滅其頂凶不如早共和解引兵還屯上安萬乗下全生民豈不幸甚獻帝起居注户釋後漢書作户説今事睚眥之隙作今與郭汜爭睚眦之隙民生作人在詔命三句作上命不行威澤日損而復欲移轉乗輿更幸非所不解作不達引兵作引軍生民作人民漢紀戸釋作户喻民生作民在士孫瑞字君策扶風人位僕射光祿大夫從駕為亂兵所殺劒銘天生五材金徳惟剛從革作辛含景吐商辨物利用勲伐彌彰暨彼良工歐冶干將爰造寳劒巨闕墨陽精通皓靈於兹休祥剖山竭川虹蜺消亡昭威燿武震動遐荒楚以定霸越以取彊陶謙字恭祖丹陽人為徐州牧加安東將軍奏記太僕朱儁儁字公偉㑹稽上虞人厯太尉錄尚書事儁初為河南尹棄官奔荆州已復進兵屯中牟移書討卓卓被誅其將李傕郭汜作亂謙以儁名臣數有戰功乃與諸豪傑共推儁為太師因移檄牧伯同討傕等奉迎天子奏記於儁傕徵儁入朝為太僕謙等遂罷徐州刺史陶謙前揚州刺史周乾瑯琊相陰徳東海相劉馗彭城相汲廉北海相孔融沛相袁忠太山太守應劭汝南太守徐璆前九江太守服䖍博士鄭𤣥等敢言之行車騎將軍河南尹莫府國家既遭董卓重以李催郭汜之禍幼主劫執忠良殘敝長安隔絶不知吉凶是以臨官尹人搢紳有識莫不憂懼以為自非明哲雄霸之士曷能尅濟禍亂自起兵以來于兹三年州郡轉相顧望未有奮擊之功而互爭私變更相疑惑謙等並共諮諏議消國難僉曰將軍君侯既文且武應運而出凡百君子靡不顒顒故相率厲簡選精悍堪能深入直指咸陽多持資糧足支半嵗謹同心腹委之元帥後漢書上獻帝論罷兵書謙為徐州牧别將士卒襲殺曹操父操將伐謙先表帝罷州郡兵謙上書臣聞懐逺柔服非徳不集克難平亂非兵不濟是以涿鹿版泉三苖之野有五帝之師有扈鬼方商奄四國有王者之伐自古在昔未有不揚威以弭亂震武以止暴者也臣前初以黄巾亂治受策長驅匪遑啓處雖憲章敕戒奉宣威靈敬行天誅每伐輒克然妖寇類衆殊不畏死父兄殲殪子弟羣起治屯運兵至今為患若承命解甲弱國自虚釋武備以資亂損官威以益寇今日兵罷明日難必至上忝朝廷寵授之本下令羣凶日月滋蔓非所以彊幹弱枝遏亂止暴之務也臣雖愚蔽忠恕不昭抱恩念報所不忍行輒勒部曲申令警備出芟彊寇惟力是視入宣徳澤躬奉職事冀効微勞以贖罪負又華夏沸擾于今未弭包茅不入職貢多闕寤寐憂數無日敢寧誠思貢獻必至薦羞獲通然後銷鋒解甲臣之願也臣前調穀百萬斛已在水次輒敕兵衞送吳書公孫瓚字伯珪遼西令支人拜奮武將軍封薊侯上袁紹罪狀表瓚以從弟越攻袁紹所使周昻見害遂舉兵報紹表紹罪狀戰敗還守京竟為紹滅表見典畧臣聞皇羲以來始有君臣上下之事張化以導民刑罰以禁暴今行車騎將軍袁紹托其先軌寇竊人爵既性暴亂厥行淫穢昔為司𨽻校尉㑹值國家喪亂之際太后承攝何氏輔政紹專為邪媚不能舉直至令丁原焚燒孟津招來董卓造為亂根紹罪一也卓既入雒而主見質紹不能權譎以濟君父而棄置節傳迸竄逃亡忝辱爵命背上不忠紹罪二也紹為渤海太守默選戎馬當攻董卓不告父兄至使太傅門户太僕母子一旦而斃不仁不孝紹罪三也紹既興兵涉厯二年不䘏國難廣自封殖乃多以資糧專為不急割剝宫室收考責錢百姓吁嗟莫不痛怨紹罪四也韓馥之迫竊其虚位矯命詔恩刻金印玉璽每下文書皁囊施檢文曰詔書一封邟鄉侯印昔新室之亂漸以即真今紹所施擬而方之紹罪五也紹令崔巨業候視星日財貨賂遺與共飲食克期㑹合攻鈔郡縣此豈大臣所當宜為紹罪六也紹與故虎牙都尉劉勲首共造兵勲仍有効又降伏張楊而以小忿枉害于勲信用讒慝殺害有功紹罪七也紹又上故上谷太守髙焉故甘陵相姚貢横責其錢錢不備畢二人并命紹罪八也春秋之義子以母貴紹母親為婢使紹實微賤不可以為人後以義不宜乃據豐隆之重任忝汙王爵損辱袁宗紹罪九也又長沙太守孫堅前領豫州刺史驅走董卓掃除陵廟其功莫大紹令周昻盜居其位斷絶堅糧令不得入使卓不被誅紹罪十也臣又每得後將軍袁術書云紹非術類也紹之罪戾雖南山之竹不能載昔姬周政弱王道陵遲天子遷都諸侯背叛於是齊桓立柯亭之盟晉文為踐土之㑹伐荆楚以致菁茅誅曹衞以彰無禮臣雖闒茸名非先賢䝉被朝恩當此重任職在鈇鉞奉辭伐罪輒與諸將州郡兵討紹等若事克捷罪人斯得庶續桓文忠誠之效攻戰形狀前後續上同前范曄後漢書臣聞皇羲已來君臣道著張禮以導人設刑以禁暴今車騎將軍袁紹託承先軌爵任崇厚而性本淫亂情行浮薄昔為司𨽻值國多難太后承攝何氏輔朝紹不能舉直措枉而專為邪媚招來不軌疑誤社稷至令丁原焚燒孟津董卓造為亂始紹罪一也卓既無禮帝主見質紹不能開設權謀以濟君父而棄置節傳迸竄逃亡忝辱爵命背違人主紹罪二也紹為渤海當攻董卓而默選戎馬不告父兄至使太傅一門纍然同斃不仁不孝紹罪三也紹既興兵涉厯二載不恤國難廣自封殖乃多引資糧專為不急割刻無方考責百姓其為痛怨莫不咨嗟紹罪四也逼迫韓馥竊奪其州矯刻金玉以為印璽每有所下輒皁囊施檢文稱詔書昔亡新僭侈漸擬即真觀紹所擬將必階亂紹罪五也紹令星工伺望祥妖賂遺財貨與共飲食剋㑹期日攻鈔郡縣此豈大臣所當施為紹罪六也紹與故虎牙都尉劉勲首共造兵勲降服張楊累有功効而以小忿枉加酷害信用讒慝濟其無道紹罪七也故上谷太守髙焉故甘陵相姚貢紹以貪惏横責其錢錢不備畢二人并命紹罪八也春秋之義子以母貴紹母親為傅婢地實微賤據職髙重享福豐隆有苟進之志無虚退之心紹罪九也又長沙太守孫堅前領豫州刺史遂能驅走董卓掃除陵廟忠勤王室其功莫大紹遣小將盜居其位斷絶堅糧不得深入使董卓久不服誅紹罪十也昔姬周政弱王道陵遲天子遷徙諸侯背畔故齊桓立柯㑹之盟晉文為踐土之㑹伐荆楚以致菁茅誅曹衞以章無禮臣雖闒茸名非先賢䝉被朝恩負荷重任職在鈇鉞奉辭伐罪輒與諸將州郡共討紹等若大事克捷罪人斯得庶續桓文忠誠之效與袁紹書瓚既破劉虞盡有幽州之地紹屢破瓚軍瓚遂還幽州不敢復出天子遣太僕趙岐和解關東使各罷兵瓚因此以書譬紹紹引軍南還趙太僕以周召之徳銜命來征宣揚朝恩示以和睦曠若開雲見日何喜如之昔賈復冦恂亦爭士卒欲相危害遇光武之寛親俱陛見同輿共出時人以為榮自省邊鄙得與將軍共同此福此誠將軍之眷而瓚之幸也英雄記同前後漢書趙太僕以周邵之徳銜命來征宣揚朝恩示以和睦曠若開雲見日何喜如之昔賈復寇恂爭相危害遇世祖解紛遂同輿並出釁難既釋時人美之自惟邊鄙得與將軍共同斯好此誠將軍之羞而瓚之願也與子續書續徙鎮易京為紹攻困遣行人文則齎書告子續刻期兵至舉火為應紹偵者得之使陳琳更其書如期舉火瓚以為救兵至遂出欲戰紹破滅之袁氏之攻似若神鬼鼓角鳴于地中梯衝舞吾樓上日窮月踧無所聊賴汝當碎首於張燕速致輕騎到者當起烽火於北吾當從内出不然吾亡之後天下雖廣汝欲求安足之地其可得乎典略同前陳琳更書昔周末喪亂僵屍蔽野以意而推猶為否也不圖今日親當其鋒袁氏之攻狀若鬼神梯衝舞吾樓上鼓角鳴于地中日窮月急不遑啓處鳥戹歸人滀水陵髙汝當碎首於張燕馳驟以告急父子天性不言而動且屬五千鐵騎於北隰之中起火為號吾當自内出奮揚威武决命于斯不然吾亡之後天下雖廣不容汝足矣後漢書魏氏春秋載陳琳更書曰蓋聞在昔衰周之世僵屍流血以為不然豈意今日身當其衝韓馥字文節冀州牧以州讓袁紹自殺與袁術書術見後是時有四星合於箕尾馥稱䜟云神人將在燕分又言濟陰男子王定得玉印曰虞為天子又見兩日出于代郡謂劉虞當代立與術書云帝非孝靈子欲依絳灌誅廢少主迎立代王故事稱虞功徳治行華夏少二當今公室枝屬皆莫能及又云昔光武去定王五世以大司馬領河北耿弇馮異勸即尊號卒代更始今劉公自恭王枝別其數亦五以大司馬領幽州牧此其與光武同吳書袁山松漢紀初平三年十月日有重兩倍馥與術書曰凶出於代郡袁紹字本初汝南汝陽人領冀州牧拜大將軍兼督冀青幽并四州袁山松後漢書云紹司空逢之孽子袁術與公孫瓚書紹非袁氏子討董卓盟文獻帝春秋曰紹合冀州十郡守相衆數十萬登壇歃血盟曰賊臣董卓承漢室之微負甲兵之衆陵越帝城跨蹈王朝幽鴆太后戮殺𢎞農提挈幼主越遷秦地殘虐朝臣斬刈忠良焚燒宫室蒸亂宫人發掘陵墓虐及鬼神過惡蒸皇天濁穢薰后土神祇怨恫無所馮持兆人泣血無所控告仁賢之士痛心疾首義士奮發雲興霧合咸欲奉辭伐罪躬行天誅凡我同盟之後畢力致命以伐凶醜同奬王室翼戴天子有渝此盟神明是殛俾墜其師無克祚國與曹操書紹與韓馥謀立幽州牧劉虞為帝與操書操拒答之可都甄城當有所立獻帝起居注甄一作鄄曹操答袁紹操見魏董卓之罪暴於四海吾等合大衆興義兵而逺近莫不響應此以義動故也今幼主微弱制於奸臣未有昌邑亡國之釁而一旦改易天下其孰安之諸君北面我自西向魏志與從弟術書時議者以少帝幼弱為賊臣所立又不識母氏所出幽州牧劉虞宿有徳望紹等欲立之使人報術術觀漢室衰陵陰懐異志故外托公義以拒紹紹復與術書前與韓文節共建永世之道欲海内見再興之主今西名有幼君無血脉之屬公卿以下皆媚事卓安可復信但當使兵往屯關要皆自蹙死於西東立聖君太平可冀如何有疑又室家見戮不念子胥可復北面乎違天不祥願詳思之袁術答從兄紹書聖主聰睿有周成之質賊卓因危亂之際威服百寮此乃漢家小厄之㑹亂尚未厭復欲興之乃云今主無血脈之屬豈不誣乎先人以來奕世相承忠義為先大傅公仁慈惻隠雖知賊卓必為禍害以信徇義不忍去也門户滅絶死亡流漫幸䝉逺近來相赴助不因此時上討國賊下刷家恥而圖於此非所聞也又曰室家見戮可復北面此卓所為豈國家哉君命天也天不可讎况非君命乎慺慺赤心志在滅卓不識其他並吳書太傅公袁隗為董卓所誅紹術叔父與公孫瓚書瓚初為中郎將從幽州牧劉虞與虞有隙遣從弟越詣袁術自結是時術遣越隨其將孫堅屯陽城拒董卓袁紹使周昻奪其處越攻昻為流矢所中死瓚怒遂進軍攻紹㑹天子遣段訓增虞邑督六州瓚封易侯因脅訓斬虞紹遣麴義虞子和將擊瓚瓚數敗乃走還易京固守紹與瓚書瓚不答而增修戎備卒為紹所破自殺孤與足下既有前盟舊要申之以討亂之誓愛過夷叔分著丹青謂為旅力同仇足踵齊晉故解印釋紱以北帶南分割膏腴以奉執事此非孤赤情之明驗邪豈寤足下棄烈士之髙義尋禍亡之險蹤輟而改慮以好易怨盜遣士馬犯暴豫州始聞甲卒在南親臨戰陣懼以飛矢迸流狂刃横集以重足下之禍徒增孤子之咎釁也故為薦書懇惻冀可改悔而足下超然自逸矜其威詐謂天罔可吞豪傑可滅果令貴弟殞於鋒刃之端斯言猶在於耳而足下曾不尋討禍源克心罪已茍欲逞其無疆之怒不顧逆順之津匿怨害民騁於余躬遂躍馬控弦處我泜上毒徧生民辜延白骨孤辭不獲已以登界橋之役是時足下兵氣霆震駿馬電發僕師徒肇合機械不嚴彊弱殊科衆寡異倫假天之助小戰大克遂陵躡奔北因壘館穀此非天威棐諶福豐有禮之符表乎足下志猶未厭乃復糾合餘燼率我蛑賊以焚爇渤海孤又不獲寧用及龍河之師羸兵前誘大軍未濟而足下膽破衆散不鼓而敗兵衆擾亂君臣並奔此又足下之為非孤之咎也自此以後禍隙彌深孤之師旅不勝其忿遂至積屍為京頭顱滿野愍彼無辜未必不慨然失涕也後比得足下書辭義婉約有改往修來之言僕既欣於舊好克復且愍兆民之不寧每輒引師南駕以順簡書弗盈一時而北邊羽檄之文未嘗不至孤是用痛心疾首靡所錯情夫處三軍之師當列將之任宜令怒如嚴霜喜如時雨臧否好惡坦然可觀而足下二三其徳彊弱異謀急則曲躬緩則放逸行無定端言無質要為壯士者固如此乎既乃殘殺老弱幽土憤怨衆叛親離恝然無黨又烏桓濊貊皆足下同州僕與之殊俗各奮迅激怒爭為鋒鋭又東西鮮卑舉踵來附此非孤徳所能招廼足下驅而致之也夫當荒危之世處干戈之險内違同盟之誓外失戎狄之心兵興州壤禍發蕭牆將以定霸不亦難乎前以西山陸梁出兵平討㑹麴義餘殘畏誅逃命故遂住大軍分兵撲蕩此兵孤之前行乃界橋搴旗拔壘先登制敵者也始聞足下鐫金紆紫命以元帥謂當因兹奮發以報孟明之恥是故戰夫引領竦望旌斾怪遂含光匿影寂爾無聞卒臻屠滅相為惜之夫有平天下之志希長世之功權御師徒帶養戎馬叛者無討服者不收威懐並喪何以立名今舊京克復天罔云補罪人斯亡忠幹翼化華夏儼然望於穆之作將戢干戈放散牛馬足下獨何守區區之土保軍内之廣甘汚名以速朽亡令徳之久長壯而籌之非良策也宜釋憾除嫌敦我舊好若斯言之玷皇天是聞漢晉春秋輟一作輒泜上一作疆上奔北一作奔背皆足下同州一作皆與足下同州上獻帝自理書紹領冀州牧拜右將軍建安元年曹操迎天子都許乃下詔責紹以地廣兵多専自樹黨擅相討伐紹上書於是以紹為太尉封鄴侯臣聞昔有哀歎而霜隕悲哭而崩城者每讀其書謂為信然於今况之乃知妄作何者臣出身為國破家立事至於懐忠獲釁抱信見疑晝夜長吟剖肝泣血曾無崩城隕霜之應故鄒衍杞婦何能感徹臣以負薪之資拔於陪𨽻之中奉職憲臺擢授戎校常侍張讓等滔亂天常侵奪朝威賊害忠徳扇動姦黨故大將軍何進忠國疾亂義心赫怒以臣頗有一介之節可責以鷹犬之功故授臣以督司諮臣以方略臣不敢畏憚彊禦避禍求福與進合圖事無違異忠策未盡而元帥受敗太后被質宫室焚燒陛下聖徳㓜冲親遭戹困時進既被害師徒喪沮臣獨將家兵百餘人抽戈承明竦劒翼室虎叱羣司奮擊凶醜曾不浹辰罪人斯殄此誠愚臣效命之一驗也㑹董卓乗虚所圖不軌臣父兄親從並當大位不憚一室之禍苟惟寧國之義故遂解節出奔創謀河外時卓方貪結外援招悦英豪故即臣渤海申以軍號則臣之與卓未有纎介之嫌若使苟欲滑泥揚波偷榮求利則進可以享竊祿位退無門户之患然臣愚所守志無傾奪故遂引㑹英雄興師百萬飲馬孟津歃血漳河㑹故冀州牧韓馥懐挾逆謀欲專權埶絶臣軍糧不得踵係致使猾虜肆毒害及一門尊卑大小同日并戮鳥獸之情猶知哀號臣所以蕩然忘哀貌無隠戚者誠以忠臣之節道不兩立顧私懐已不能全功斯亦愚臣破家狥國之二驗也又黄巾十萬焚燒青兖黑山張楊蹈藉冀域臣聞乃旋師奉辭伐畔金鼓未震狡敵知亡故韓馥懐懼謝咎歸土張楊黑山同時乞降臣時輒承制竊比竇融以議郎曹操權領冀州牧㑹公孫瓚師旅南馳陸掠北境臣即星駕席捲與瓚交鋒假天之威每戰輒克臣備公族子弟生長京輦頗聞俎豆不習干戈加自乃祖先臣以來世作輔弼咸以文徳盡忠得免罪戾臣非與瓚角戎馬之埶爭戰陳之功者也誠以賊臣不誅春秋所貶苟云利國專之不疑故冒踐霜雪不憚劬勤實庶一捷之福以立終身之功社稷未定臣誠恥之太僕趙岐銜命來征宣明陛下含𢎞之施蠲除細故與下更新奉詔之日引師南轅是臣畏怖天威不敢怠慢之三驗也又臣所上將校率皆清英宿徳令名顯達登鋒履刃死者過半勤恪之功不見書列而州郡牧守競盜聲名懐持二端優游顧望皆列土錫圭跨州連郡是以逺近狐疑議論紛錯者也臣聞守文之世徳髙者位尊倉卒之時功多者賞厚陛下播越非所洛邑之祀海内傷心志士憤惋是以忠臣肝腦塗地肌膚横分而無悔心者義之所感故也今賞加無勞以攜有徳杜黜忠臣以疑衆望斯豈腹心之逺圖將廼讒慝之邪説使之然也臣爵為通侯位二千石殊恩厚徳臣既叨之豈敢闚覬重禮以希彤弓玈矢之命哉誠傷偏裨列校勤不見紀盡忠為國翻成重愆斯䝉恬所以悲號於邊獄白起欷歔於杜郵也太傅日磾位為師保任配東征而耗亂王命寵任非所凡所舉用皆衆所捐棄而容納其策以為謀主令臣骨肉兄弟還為讎敵交鋒接刃搆難滋甚臣雖欲釋甲投戈事不得已誠恐陛下日月之明有所不照四聰之聽有所不聞乞下臣章咨之羣賢使三槐九棘議臣罪戾若以臣今行權為釁則桓文當有誅絶之刑若以衆不討賊為賢則趙盾可無書弑之貶矣臣雖小人志守一介若使得申明本心不愧先帝則伏首歐刀褰衣就鑊臣之願也惟陛下垂鳲鳩之平絶邪諂之論無令愚臣結恨三泉後漢書賜蹋頓難峭王汗魯王為單于版文英雄記云袁紹與公孫瓚連戰不決蹋頓遣使詣紹求和親助紹擊瓚破之紹矯制拜烏丸三王使持節大將軍督幽青并領冀州牧阮鄉侯紹承制詔遼東屬國率衆王頒下烏丸遼西率衆王蹋頓右北平率衆王汗盧維乃祖慕義遷善欵塞内附北捍玁狁東拒濊貊世守北陲為百姓保障雖時侵犯王略命將徂征厥罪率不旋時悔愆變改方之外夷最又聰惠者也始有千夫長百夫長以相統領用能悉廼心克有勲力於國家稍受王侯之命自我王室多故公孫瓚作難殘夷厥土之君以侮天慢主是以四海之内並執干戈以衛社稷三王奮氣裔土忿姦憂國控弦與漢兵為表裏誠甚忠孝朝所嘉焉然而虎兕長虵相隨塞路王官爵命否而無聞夫有勲不賞俾勤者怠今遣行謁者楊林齎單于璽綬車服以對爾勞其各綏靜部落教以謹慎無使作凶作慝世復爾祀位長為百蠻長厥有咎有不臧者冺於爾祿而喪於乃庸可不勉乎烏丸單于都䕶部衆左右單于受其節度他如故事三國志注袁術字公路紹弟厯河南尹虎賁中郎將為後將軍僭號兵敗憤死與呂布書劉備領徐州居下邳與袁術相拒於淮上術欲引布擊備與布書布勒兵襲備獲其妻子昔董卓作亂破壊王室禍害術門户術舉兵關東未能屠裂卓將軍誅卓送其頭首為術掃滅讎恥使術明目於當世死生不媿其功一也昔將金元休向兗州甫詣封部為曹操逆所拒破流離迸走㡬至滅亡將軍破兗州術復明目於遐邇其功二也術生平已來不聞天下有劉備備乃舉兵與術對戰術憑將軍威靈得以破備其功三也將軍有三大功在術術雖不敏奉以生死將軍連年攻戰軍糧苦少今送米二十萬斛迎逢道路非直此止當駱驛復致若兵器戰具佗所乏少大小惟命英雄記記云布初入徐州書與術術報書董卓殺袁隗及術兄基等男女二十餘人金尚字元休京兆人為兗州刺史東之任曹操已臨兗州尚依袁術後為袁術所害見典略同前後漢書術舉兵詣闕未能屠裂董卓將軍誅卓為術報恥功一也昔金元休南至封丘為曹操所敗將軍伐之今術復明目於遐邇功二也術生年以來不聞天下有劉備備乃舉兵與術對戰憑將軍威靈得以破備功三也將軍有三大功在術術雖不敏奉以死生將軍連年攻戰軍糧苦少今送米二十萬斛非惟止此當駱驛復致凡所短長亦惟命與沛相陳珪書紹與珪俱公族子孫少共交游術為曹操袁紹所破與珪書時珪子應在下邳術脅質應圖必致珪昔秦失其政天下羣雄爭而取之兼智勇者卒受其歸今世事紛擾復有瓦解之埶矣誠英乂有為之時也與足下舊交豈肯左右之乎若集大事子實為吾心膂歸漢紀作福陳珪答袁術書珪下邳人太尉球弟子為沛相增秩中二千石昔秦末世肆暴恣情虐流天下毒被生民下不堪命故遂土崩今雖季世未有亡秦苛暴之亂也曹將軍神武應期興復典刑將撥平凶慝清定海内信有徵矣以為足下當戮力同心匡翼漢室而陰謀不軌以身試禍豈不痛哉若迷而知反尚可以免吾備舊知故陳至情雖逆于耳骨肉之惠也欲吾營私阿附有犯死不能也並後漢書撥漢紀作掃惠作恩與兄紹歸帝號術自以依據江淮帶甲數萬加累世公侯袁氏出陳舜之後以黄乗赤得運之次遂造符命置百官自號仲家及為曹操所攻兵弱將死衆情離叛遂歸帝號於紹紹深然其計祿去漢室久矣天下提挈政在家門豪雄角逐分割疆宇此與周末七國無異惟彊者兼之耳袁氏受命當王符瑞炳然今君擁有四州人户百萬以彊則莫與爭大以位則無所比髙曹操雖欲扶衰奬微安能續絶運起已滅乎謹歸大命君其興之後漢書魏書漢之失天下久矣天下作天子此與周末無異作此與周之末年七國分埶無異惟作卒以位作比徳奬微作拯弱袁敘與從兄紹書曹操與袁紹相拒官渡破其將淳于瓊等上表白紹罪狀言紹從弟濟陰太守敘與紹書今海内喪敗天意實在我家神應有徵當在尊兄南兄臣下欲使即位南兄言以年則北兄長以位則北兄重便欲送璽㑹曹操斷道獻帝起居注紹居鄴術居夀春故云南北陳登字元龍珪子廣陵太守加伏波將軍遺袁紹徐州刺史陶謙死州人迎先主先主以袁氏四世三公欲讓與術北海相孔融曰袁公路豈憂國忘家者邪冢中枯骨何足介意先主遂領徐州登等遣使詣紹紹答之天降灾沴福臻鄙州州將殂殞生民無主恐懼姦雄一旦承隙以貽盟主日昃之憂輒共奉故平原相劉備府君以為宗主永使百姓知有依歸方今寇難縱横不遑釋甲謹遣下吏奔告于執事袁紹答陳登等劉𤣥徳𢎞雅有信義今徐州樂戴之誠副所望也並獻帝春秋耿包後漢書作苞白事袁紹紹自破公孫瓚貢御希慢私使主簿耿包密白紹以包白事咨軍府議者咸以包為妖妄宜誅紹殺包以悦衆然遂有逆謀赤徳衰盡袁為黄𦙍宜順天意以從民心袁舜後黄應代赤故包有此言獻帝春秋漢紀云赤徳運衰厯數將改宜順天意以應民望臧洪字子源廣陵射陽人討董卓盟文洪中平末為即丘長棄官太守張超請為功曹説超約諸牧守共討董卓洪乃攝衣升壇歃血而盟辭氣慷慨無不激揚諸軍遲疑食盡衆散漢室不幸皇綱失統賊臣董卓乗釁縱害禍加至尊虐流百姓大懼淪喪社稷剪覆四海兗州刺史岱豫州刺史伷陳留太守邈東郡太守瑁廣陵太守超等糾合義兵並赴國難凡我同盟齊心戮力以致臣節殞首喪元必無二志有渝此盟俾墜其命無克遺育皇天后土祖宗明靈實皆鑒之劉岱孔佃張邈橋瑁張超虐後漢書作毒戮作一報陳琳書琳見魏尺牘載隔闊相思至可為心哉作陳琳與臧洪書誤洪初為廣陵太守張超功曹甚見愛信説超與諸州糾合義兵誅董卓未遂超遣洪詣大司馬劉虞行至河間而值幽薊交兵因寓于袁紹紹見洪重之以洪領青州刺史徙東郡太守曹操圍超於雍丘洪聞之勒兵請紹救超紹不許超遂破滅洪怨紹絶不與通紹興兵圍之不下使洪邑人陳琳與洪書喻以禍福責以恩義洪答書城陷見執不屈紹殺之隔闊相思發於夢寐幸相去步武之間耳而以取舍異規不得相見其為愴恨可為心哉前日不遺比辱雅貺述敘禍福公私切至所以不即奉答者既學薄才鈍不足塞詰亦以吾子攜負側室息肩主人家在東州僕為仇敵以是事人雖披中情墮肝膽猶身疏有罪言甘見怪方首尾不救何能恤人且以子之才窮該典籍豈將闇於大道不達余趣哉然猶復云云者僕以是知足下之言信不由衷將以救禍也必欲筭計長短辯諮是非是非之論言滿天下陳之更不明不言無所損又言傷告絶之義非吾所忍行也是以捐棄紙筆一無所答亦冀遥忖其心知其計定不復渝變也重獲來命援引古今紛紜六紙雖欲不言焉得已哉僕小人也本因行役冠竊大州恩深分厚寧樂今日自還接刃每登城勒兵望主人之旗鼓感故友之周旋撫弦搦矢不覺流涕之覆面也何者自以輔佐主人無以為悔主人相接過絶等倫當授任之初自謂究竟大事共尊王室豈悟天子不悦本州見侵郡將遘牖里之厄陳留克創兵之謀謀計棲遲喪忠孝之名杖策攜背虧交友之分揆此二者與其不得已喪忠孝之名與虧交友之道輕重殊塗親疏異畫故便收淚告絶若使主人少垂故人住者側席去者克己不汲汲於離友信刑戮以自輔則僕抗季札之志不為昔日之戰矣何以效之昔張景明親登壇喢血奉辭奔走卒使韓牧讓印主人得地然後但以拜章朝主賜爵獲傳之故旋時之間不䝉觀過之貸而受夷滅之禍呂奉先討卓來奔請兵不獲告去何罪復見斫刺濵於死亡劉子璜奉使踰時辭不獲命畏威懐親以詐求歸可謂有志忠孝無損霸道者也然輒僵斃麾下不䝉虧除僕雖不敏又素不能原始見終覩微知著竊度主人之心豈謂三子宜死罰當刑中哉實且欲一統山東增兵討讎懼戰士狐疑無以沮勸故抑廢王命以崇承制慕義者䝉榮待放者被戮此乃主人之利非游士之願也故僕鑒戒前人困窮死戰僕雖下愚亦嘗聞君子之言矣此實非吾心也廼主人招焉凡吾所以背棄國民用命此城者正以君子之違不適敵國故也是以獲罪主人見攻踰時而足下更引此義以為吾規無乃辭同趨異非吾子所為休戚者哉吾聞之也義不背親忠不違君故東宗本州以為親援中扶郡將以安社稷一舉二得以徼忠孝何以為非而足下欲使吾輕本破家均君主人主人之於我也年為吾兄分為篤友道乖告去以安君親可謂順矣若子之言則包胥宜致命於伍員不當號哭於秦庭矣苟區區於攘患不知言乖乎道理矣足下或者見城圍不解救兵未至感婚姻之義惟平生之好以屈節而苟生勝守義而傾覆也昔晏嬰不降志於白刃南史不屈筆以求生故身著圖像名垂後世况僕據金城之固驅士民之力散三年之畜以為一年之資匡困補乏以悦天下何圖築室反耕哉但懼秋風揚塵伯珪馬首南向張揚飛燕膂力作難北鄙將告倒懸之急股肱奏乞歸之誠耳主人當鑒我曹輩反旌退師治兵鄴垣何宜久辱盛怒暴威於吾城下哉足下譏吾恃黑山以為救獨不念黄巾之合從邪加飛燕之屬悉以受王命矣昔髙祖取彭城於鉅野光武創基兆於綠林卒能龍飛中興以成帝業苟可輔主興化夫何嫌哉况僕親奉璽書與之從事行矣孔璋足下徼利於境外臧洪授命於君親吾子託身於盟主臧洪策名於長安子謂余身死而名滅僕亦笑子生死而無聞焉悲哉本同而末離努力努力夫復何言魏志英雄記袁紹使張景明等説韓馥使讓冀州與紹呂布從紹請益兵還洛紹外言當遣内欲殺之布偽使人於帳中鼓琴夜半兵起亂斫布牀被裴松之注按公孫瓚表列紹罪過云紹與故虎牙將軍劉勲首共造兵勲仍有效而以小忿枉害于勲疑此是子璜公孫瓚字伯珪張揚雲中人張燕常山人本黒山賊後助瓚與紹爭主人即指紹也同前後漢書隔闊相思發於寤寐相去步武而趨舍異規其為愴恨胡可勝言前日不遺比辱雅貺述敘禍福公私切至以子之才窮該典籍豈將闇於大道不達余趣哉是以損棄翰墨一無所酬亦冀遙忖褊心粗識鄙性重獲來命援引紛紜雖欲無對而義篤其言僕小人也本乏志用中因行役特䝉傾蓋恩深分厚遂竊大州寧樂今日自還接刃乎每登城臨兵觀主人之旗鼓瞻望帳幄感故友之周旋撫弦搦矢不覺涕流之覆面也何者自以輔佐主人無以為悔主人相接過絶等倫受任之初志同大事埽清㓂逆共尊王室不悟本州被侵郡將遘戹請師見拒辭行被拘使洪故君遂至淪滅區區微節無所獲申豈得復全交友之道重虧忠孝之名乎所以忍悲揮戈收淚告絶若使主人少垂古人忠恕之情來者側席去者克已則僕抗季札之志不為今日之戰矣昔張景明登壇喢血奉辭奔走卒使韓牧讓印主人得地後但以拜章朝主賜爵獲傳之故不䝉觀過之貸而受夷滅之禍呂奉先討卓來奔請兵不獲告去何罪復見斫刺劉子璜奉使踰時辭不獲命畏君懐親以詐求歸可謂有志忠孝無損霸道亦復僵屍麾下不䝉虧除慕進者䝉榮違意者被戮此乃主人之利非游士之願也是以鑒戒前人守死窮城亦以君子之違不適敵國故也足下當見久圍不解救兵未至感婚姻之義推平生之好以為屈節而苟生勝守義而傾覆也昔晏嬰不降志於白刃南史不曲筆以求存故身傳圖象名垂後世况僕據金城之固驅士人之力散三年之畜以為一年之資匡困補乏以悦天下何圖築室反耕哉但懼秋風揚塵伯珪馬首南向張揚飛燕旅力作難北鄙將告倒懸之急股肱奏乞歸之記耳主人當鑒戒曹輩反旌退師何宜久辱盛怒暴威於吾城之下哉足下譏吾恃黑山以為救獨不念黄巾之合從邪昔髙祖取彭城於鉅野光武創基兆於綠林卒能龍飛受命中興帝業苟可輔主興化夫何嫌哉况僕親奉璽書與之從事行矣孔璋足下徼利於境外臧洪投命於君親吾子託身於盟主臧洪策名於長安子謂余身死而名滅僕亦笑子生死而無聞焉本同末離努力努力夫復何言漢紀僕亦笑子生而無聞焉末離作末異審配字正南魏郡人為袁紹治中獻袁譚書譚尚相攻尚軍于館陶譚進攻之尚大破譚軍尚使配守鄴復攻譚于平原配獻書于譚譚得書悵然既劫于郭圖遂戰不解曹操進攻鄴生獲配配意氣壯烈終無撓辭乃殺之配聞良藥苦口而利於病忠言逆耳而便於行願將軍袚心抑怒終省愚辭蓋春秋之義國君死社稷忠臣死王命茍有圖危宗廟敗亂國家王綱典律親疎一也是以周公垂泣而蔽管蔡之獄季友歔欷而行鍼叔之鴆何則義重人輕事不得已也昔衞靈公廢蒯聵而立輒蒯聵為不道入戚以簒衞師伐之春秋傳曰以石曼姑之義為可以拒之是以蒯聵終獲叛逆之罪而曼姑永享忠臣之名父子猶然豈况兄弟乎昔先公廢絀將軍以續賢兄立我將軍以為適嗣上告祖靈下書譜牒先公謂將軍為兄子將軍謂先公為叔父海内逺近誰不備聞且先公即世之日我將軍斬衰居廬而將軍齋於堊室出入之分於斯益明是時凶臣逢紀妄畫虵足曲辭諂媚交亂懿親將軍奮赫然之怒誅不旋時將軍亦奉命承㫖加以淫刑自是之後癰疽破潰骨肉無絲髮之嫌自疑之臣皆保生全之福故悉簡彊胡簡命名將料整器械選擇戰士殫府庫之財竭食土之實其所以供奉將軍何求而不備君臣相率共衞旌麾戰為鴈行賦為幣主雖傾倉覆庫剪剝民物上下欣戴莫敢告勞何則推戀戀忠赤之情盡家家肝腦之計唇齒輔車不相為賜謂為將軍心合意同混齊一體必當并威偶勢禦冦寧家何圖㓙險讒慝之人造飾無端誘導奸利至令將軍翻然改圖忘孝友之仁聽豺狼之謀誣先公廢立之言違近者在喪之位悖紀綱之理不顧逆順之節横易冀州之主欲當先公之繼遂放兵鈔發屠城殺吏交尸盈原裸民滿野或有髠􅚎髮膚割截支體寃魂痛於幽㝠創夷號於草棘又乃圖獲鄴城許賜秦胡財物婦女豫有分界或聞告令吏士云孤雖有老母輒使身體完具而已聞此言者莫不驚愕失氣悼心揮涕使太夫人憂哀憤懣於堂室我州君臣士友假寐悲歎無所措其手足念欲靜師拱黙以聽執事之圖則懼違春秋死命之節貽太夫人不測之患隕先公髙世之業且三軍憤慨人懐私怒我將軍辭不獲已以及館陶之役是時外為禦難内實乞罪既不見赦而屠辱各二三其心臨陣叛戾我將軍進退無功首尾受敵引軍奔避不敢告辭亦謂將軍當少垂親親之仁貺以緩追之惠而廼尋踪躡軌無所逃命困獸必鬬以干嚴行而將軍師旅土崩瓦解此非人力廼天意也是後必望將軍改往脩來克已復禮追還孔懐如初之愛而縱情肆怒趣破家門跂踵鶴立連結外讐散鋒放火播增毒螫烽煙相望涉血千里遺城危民引領悲怨雖欲弗救惡得已哉故遂引兵東轅保正疆場雖近郊壘未侵境域然望旌麾能不永歎配等備先公家臣奉廢立之命而圖等干國亂家禮有常刑故奮弊州之賦以除將軍之疾若乃天啓于心早行其誅則我將軍匍匐悲號於將軍股掌之上配等亦敷躬布體以待斧鉞之刑若必不悛有以國斃圖頭不懸軍不旋踵願將軍詳以事宜錫以環玦漢晉春秋鈔發一作鈔撥必望一作又望危民一作厄民敷躬一作袒躬同前後漢書配聞良藥苦口而利於病忠言逆耳而便於行願將軍緩心抑怒終省愚辭蓋春秋之義國君死社稷忠臣死君命苟圖危宗廟剝亂國家親疎一也是以周公垂涕以斃管蔡之獄季友歔欷而行叔牙之誅何則義重人輕事不獲已故也昔先公廢黜將軍以續賢兄立我將軍以為嫡嗣上告祖靈下書譜牒海内逺近誰不備聞何意凶臣郭圖妄畫蛇足曲辭諂媚交亂懿親至令將軍忘孝友之仁襲閼沉之迹放兵鈔突屠城殺吏寃魂痛於幽㝠創夷被於草棘又廼圖獲鄴城許賞賜秦胡其財物婦女豫有分數又云孤雖有老母趣使身體完具而已聞此言者莫不悼心揮涕使太夫人憂哀憤隔我州君臣寤寐悲歎誠拱黙以聽執事之圖則懼違春秋死命之節詒太夫人不測之患損先公不世之業我將軍辭不獲命以及館陶之役伏惟將軍至孝烝烝發于岐嶷友于之性生於自然章之以聰明行之以敏達覽古今之舉措覩興敗之徵符輕榮財于糞土貴名位干丘岳何意奄然迷沉墮賢哲之操積怨肆忿取破家之禍翹企延頸待望讐敵委慈親於虎狼之牙以逞一朝之志豈不痛哉若乃天啓尊心革圖易慮則我將軍匍匐悲號於將軍股掌之上配等亦敷躬布體以聽斧鑕之刑如又不悛禍將及之願熟詳吉凶以賜環玦呂布字奉先五原九原人厯奮威將軍封溫侯後自號徐州牧曹操劉備攻殺之上獻帝書布屯山陽獻帝有手書召布布遣使上書以布為平東將軍封平陶侯操手書厚加慰勞布説啓迎天子當平定天下意并詔書購捕公孫瓚袁術等布復遣使上書以書答操臣本當迎大駕知曹操忠孝奉迎都許臣前與操交兵今操保傅陛下臣為外將欲以兵自隨恐有嫌疑是以待罪徐州進退未敢自寧答曹操書布獲罪之人分為誅首手命慰勞厚見褒奬重見購捕袁術等詔書布當以命為効曹操答呂布書初布上書拜封使人於山陽界亡失文字操更遣奉車都尉王則為使者齎詔書又封平東將軍印綬來拜布布乃遣登奉章謝恩并以一好綬答操山陽屯送將軍所失大封國家無好金孤自取家好金更相為作印國家無紫綬自取所帶紫綬以藉心將軍所使不良袁術稱天子將軍止之而使不通章朝廷信將軍使復重上以相明忠誠並英雄記與韓暹楊奉書暹奉並白波賊帥奉為李催將仕車騎將軍暹領司𨽻校尉還并州為張宣所殺布為徐州牧初以女許婚袁術子及術僭號使韓𦙍告布沛相陳珪勸布北通曹操而絶婚袁氏布女已在途遂追還斬𦙍送操術怒遣大將張勲橋㽔與韓暹楊奉連勢攻布布復用珪計致書説奉暹使與已并力共擊術軍暹奉得書即廻計從布大破勲等於下邳生擒㽔所殺傷殆盡二將軍拔大駕來東有元功於國當書勲竹帛萬世不朽今袁術造逆當共誅討柰何與賊臣還共伐布布有殺董卓之功與二將軍俱為功臣可因今共撃破術建功於天下此時不可失也九州春秋同前後漢書二將軍親扶大駕而布手殺董卓俱立功名當垂竹帛今袁術造逆宜共誅討柰何與賊還來伐布可因今者同力破術為國除害建功天下此時不可失也與袁術書布後又與暹奉二軍向夀春水陸並進所遇虜畧到鍾離大獲而還既渡淮北留書與術布渡畢術自將兵五千揚兵淮上布騎皆於水北大咍笑之而還足下恃軍彊盛常言猛將武士欲相吞滅每抑止之耳布雖無勇虎步淮南一時之間足下鼠竄夀春無出頭者猛將武士為悉何在足下喜為大言以誣天下天下之人安可盡誣古者兵交使在其間造䇿者非布先唱也相去不逺可復相聞英雄記與蕭建書布攻述時東海蕭建為瑯琊相治莒保城自守不與布通布與建書建即遣齎牋貢良馬天下舉兵本以誅董卓爾布殺董卓來詣關東故求兵西迎大駕光復洛京諸將自還相攻莫肯念國布五原人也去徐州五千餘里廼在天西北角今不來共爭天東南之地莒與下邳相去不逺宜當共通君如自遂以為郡郡作帝縣縣自王也昔樂毅攻齊呼吸下齊七十餘城惟莒即墨二城不下所以然者中有田單故也布雖非樂毅君亦非田單可取布書與智者詳共議之英雄記劉焉字君郎江夏竟陵人魯恭王之後領益州牧璋父薦任安表益部耆舊傳云安字定祖廣漢人辟除不就同郡秦宓薦之州牧劉焉焉表上王塗隔塞遂無聘命安味清道度厲節髙邈揆其器量國之元寳宜處弼疑之輔以消非常之咎𤣥纁之禮所宜招命許貢請召還孫策表策自領㑹稽太守詔拜討逆將軍威震江東時貢為吳郡太守上表䇿候吏得以示䇿遂殺貢貢客襲擊䇿傷卒孫策驍勇與項籍相似宜加貴寵召還京邑若被詔不得不還若放於外必作世患丁沖沛郡人為司𨽻醉死與曹操書沖宿與操親善時隨乗輿見國家未定廼與操書遂謀迎天子東遷許以沖為司𨽻校尉及操建魏國沖已卒辟其子儀為掾足下平生常喟然有匡佐之志今其時矣魏畧張諛字彦承上虞人難丁孝正書諛與同鄉丁孝正相親孝正葬送過制諛書難之吾聞班固善楊孫之省葬惡始皇之飾終夫倮以矯世君子弗為若乃據周公之定品依延州而成事取中庸以建基獲美稱於當世不亦優哉㑹稽典錄桓儼字文林沛國人有清節見謝承後漢書遺陳業書業字文理㑹稽人見㑹稽先賢傳陳業少持操沛國桓儼當世英俊避地㑹稽聞業高節欲與相見終不獲後儼浮海南入交州臨去遺書水經注稽山上有白樓亭儼臨去遺書不因行李繫白樓亭柱而去㑹稽典錄云㑹稽太守濮陽興問郡士於門下書佐朱育育曰近者太守上虞陳業潔身清行志懐霜雪貞亮之信同操栁下遭漢中微委官棄祿遁迹黟歙以求其志髙邈妙蹤天下所聞故桓文遺之尺牘之書比竟三髙從容養髙動靜履直季世多艱爰適樂土側聞髙風饑渴話言知廼深隠邈然終時求仁斯得勤而無憾齊蹤古賢何其優哉藝文類聚今本訛舛司馬徽字徳操潁川陽翟人隠居荆州及荆州平為曹操所得欲大用之病卒誡子書聞汝充役室如懸磬何以自辨論徳則吾薄説居則吾貧勿以薄而志不壯貧而行不髙也藝文類聚與劉恭嗣書劉廙字恭嗣董正則别傳云劉恭嗣少有異名聞司馬徳操故往見焉遇其方耕於是釋耒下袵相就而言黄旗紫蓋恒見東南終成天下者揚州之君子選注江表傳云司馬徽論運命厯數云黄旗紫蓋見於東南終有天下者荆揚之君袁徽陳郡扶樂人以儒術稱遭天下亂避難交州司徒辟不至兄渙及霸皆仕魏與荀彧論士燮書燮字士威蒼梧廣信人在交趾四十餘嵗加左將軍燮為交州太守謙虚下士時中土士人多往依避難耽玩春秋為之注解徽亦在彼中與尚書令荀彧書其見稱如此交阯士府君既學問優博又達於從政處大亂之中保全一郡二十餘年疆場無事民不失業羇旅之徒皆䝉其慶雖竇融保河西曷以加之官事小闋輒玩習書傳春秋左氏傳尤簡練精微吾數以咨問傳中諸疑皆有師説意思甚密又尚書兼通古今大義詳備聞京師古今之學是非忿爭今欲條左氏尚書長義上之吳志與荀彧論許靖書靖初依吳郡都尉許貢㑹稽太守王朗收恤親理經紀振贍出于仁厚孫策東渡江皆走交州避難靖身坐岸邊先載附從疎親悉發乃從後去當時見者莫不歎息既至交阯太守士燮厚加敬待陳國袁徽以寄寓交州乃書與尚書令荀彧許文休英才偉士智略足以計事自流宕已來與羣士相隨每有患急常先人後已與九族中外同其飢寒其紀綱同類仁恕惻怛皆有效事不能復一二陳之耳蜀志潘勗字元茂陳留中牟人少有逸才為尚書郎厯尚書左丞册魏公九錫文建安十八年五月獻帝使御史大夫郗慮持節策命曹操為魏公加九錫制詔使持節丞相領冀州牧武平侯朕以不徳少遭愍凶越在西土遷於唐衛當此之時若綴旒然宗廟乏祀社稷無位羣凶覬覦連城帶邑一人尺土朕無獲焉即我髙祖之命將墜于地朕用夙興夜寐震悼於厥心曰惟祖惟父股肱先正其孰恤朕躬廼誘天衷誕育丞相保乂我皇家𢎞濟於艱難朕實賴之今將授君典禮其敬聽朕命昔者董卓初興國難羣后釋位以謀王室君則攝進首啓戎行此君之忠於本朝也後廼黄巾反易天常侵我三州延於平民君又討之翦除其跡以寧東夏此又君之功也韓暹楊奉專用威命又賴君勛剋黜其難遂遷許都造我京畿設官兆祀不失舊物天地鬼神於是獲乂此又君之功也袁術僭逆肆於淮南懾憚君靈用丕顯謀蘄陽之役橋蕤授首稜威南邁術以殞潰此又君之功也廻戈東指呂布就戮乗轅將返張揚殂斃眭固伏罪張繡稽伏此又君之功也袁紹逆亂天常謀危社稷憑恃其衆稱兵内侮當此之時王師寡弱天下寒心莫有固志君執大節精貫白日奮其武怒運諸神策致届官渡大殱醜類俾我國家拯於危墜此又君之功也濟師洪河拓定四州袁譚高幹咸梟其首海盜奔迸黑山順軌此又君之功也烏柦三種崇亂二世袁尚因之逼據塞北束馬懸車一征而滅此又君之功也劉表背誕不供貢職王師首路威風先逝百城八郡交臂屈膝此又君之功也馬超成宜同惡相濟濵據河潼求逞所欲殄之渭南獻馘萬計遂定邊城撫和戎狄此又君之功也鮮卑丁令重譯而至單于白屋請吏率職此又君之功也君有定天下之功重以明徳班敘海内宣美風俗旁施勤教恤慎刑獄吏無苛政民無懐慝敦崇帝族援繼絶世舊徳前功罔不咸秩雖伊尹格于皇天周公光于四海方之蔑如也朕聞先王並建明徳胙之以土分之以民崇其寵章備其禮物所以蕃衞王室左右厥世也其在成周管蔡不靜懲難念功廼使召康公錫齊太公履東至于海西至于河南至于穆陵北至于無棣五侯九伯實得征之世祚太師以表東海爰及襄王亦有楚人不供王職又命晉文登為侯伯錫以二輅虎賁鈇鉞秬鬯弓矢大啓南陽世作盟主故周室之不壞繫二國之是賴今君稱丕顯徳明保朕躬奉荅天命導揚𢎞烈綏爰九域罔不率俾功髙干伊周而賞卑于齊晉朕甚恧焉朕以眇眇之身託於兆民之上永思厥艱若涉淵冰非君攸濟朕無任焉今以冀州之河東河内魏郡趙國中山鉅鹿常山安平甘陵平原凡十郡封君為魏公使使持節御史大夫慮授君印綬册書金虎符第一至第五竹使符第一至第十錫君𤣥土苴以白茅爰契以龜用建冢社昔在周室畢公毛公入為卿佐周邵師保出為二伯内外之任君實宜之其以丞相領冀州牧如故今更下傳璽肅將朕命以允華夏其上故傳武平侯印綬今又加君九錫其敬聽朕命以君經緯禮律為民軌儀使安職業無或遷志是用錫君大輅戎輅各一𤣥牡二駟君勸分務本嗇民昬作粟帛滯積大業惟興是用錫君衮冕之服赤舄副焉君敦尚謙讓俾民興行少長有禮上下咸和是用錫君軒懸之樂六佾之舞君翼宣風化爰發四方逺人革面華夏充實是用錫君朱户以居君研其明哲思帝所難官才任賢羣善必舉是用錫君納陛以登君秉國之鈞正色處中纎毫之惡靡不抑退是用錫君虎賁之士三百人君糾䖍天刑章厥有罪犯關干紀莫不誅殛是用錫君鈇鉞各一君龍驤虎視旁眺八維掩討逆節折衝四海是用錫君彤弓一彤矢百玈弓十玈矢千君以溫恭為基孝友為徳明允篤誠感于朕思是用錫君秬鬯一卣珪瓚副焉魏國置丞相以下羣卿百寮皆如漢初諸侯王之制君往欽哉敬服朕命恤爾衆時亮庶功用終爾顯徳對揚我髙祖之休命尚書令荀彧碑夫其為徳也則主忠履信孝友温惠髙亮以固其中柔嘉以宣其外廉慎以為已任仁恕以察人物踐行則無轍跡出言則無辭費納規無敬辱之心機情有密靜之性若廼奉身蹈道勤禮貴徳動咨事問匪云子克然後教以黄中之叡守以貞固之直注焉若洪河之源不可竭也確焉若華嶽之停不可拔也故能言之斯立行之斯成身匪隆汚直哉惟清紊綱用亂廢禮復經於是百揆時序王猷允塞告厥成功用俟萬嵗藝文類聚擬連珠臣聞昧止以希利者臣之常情主之所患忘身以憂國者臣之所難主之所願是以忠臣背利而修所難明主排患而獲所願藝文類聚周幹等張叔紀頌華陽國志云叔紀霸女孫適廣漢王尊生子商有賢訓廣漢周幹古朴彭勰漢中祝龜為作頌少則為家之孝女長則為家之賢婦老則為子之慈親終溫且惠秉心塞淵宜諡曰化明惠母東漢文紀巻二十六
