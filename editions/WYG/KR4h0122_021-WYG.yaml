body:
  text: 東漢文紀卷二十一明梅鼎祚編蔡邕三光武濟陽宮碑惟漢再受命曰世祖光武皇帝考南頓君初為濟陽令濟陽有武帝行過宮常封閉帝將生考以令舎下濕開宮後殿居之建平元年十二月甲子夜帝生時有赤光室中皆明使卜者王長卜之長曰此善事不可言嵗有嘉禾一莖生九穗長於凡禾因為尊諱王室中微哀平短祚姦臣王莽偷有神器十有八年罪盈惡熟天人致誅帝乃龍見白水淵躍昆滍破前隊之衆殄二公之師収兵畧地經營河朔戮力戎功翼戴更始義不即命帝位闕焉於是羣公諸將㨿河洛之文叶符瑞之珍僉曰歴數在帝踐祚允宜乃以建武元年六月乙未即位鄗縣之陽五成之陌祀漢配天不失舊物享國三十六年方内乂安蠻夷率服廵狩泰山禪梁父皇代之遐迹王者之上儀㒺不畢舉道德餘慶延于無窮先民有言樂樂其所自生而禮不忘其本是以虞稱嬀汭姬美周原皇天乃眷神宫實始于此厥跡邈哉所謂神麗顯融越不可尚小臣河南尹鞏瑋先祖銀艾封侯歴世卿尹受漢厚恩瑋以商箕餘烈郡舉孝亷為大官丞来在濟陽願見神宫追惟桑梓褒述之義用敢作頌頌曰赫矣炎光爰耀其輝篤生聖皇二漢之微稽度乾則誕育靈姿黄孽作慝簒握天機帝赫斯怒爰整其師應期潜見扶陽而飛禍亂克定羣凶殄夷匡復帝載萬國以綏廵于四嶽展義省方登封降禪升於中皇爰兹初基天命孔彰子子孫孫保之無疆陳太丘碑先生諱寔字仲弓潁川許昌人也含元精之和應期運之數兼資九德總修百行於鄉黨則恂恂焉斌斌焉善誘善𨗳仁而愛人使夫少長咸安懐之其為道也用行舎藏進退可度不徼訐以干時不遷怒以臨下四為郡功曺五辟豫州六辟三府再辟大將軍宰聞喜半嵗太丘一年德務中庸教敦不肅政以禮成化行有謐㑹遭黨事禁錮二十年樂天知命澹然自逸交不謟上愛不黷下見幾而作不俟終日及文書赦宥時年已七十遂隠丘山懸車告老四門偹禮閑心靜居大將軍何公司徒袁公前後招辟使人曉諭云欲特表便可入踐常伯超補三事佩紆金紫光國垂勲先生曰絶望已乆飾巾待期而已皆遂不至宏農楊公東海陳公每在衮職羣僚賀之皆舉手曰潁川陳君命世絶倫大位未躋慙於文仲竊位之負故時人髙其德重於公相之位也年八十有三中平三年八月丙子遭疾而終臨没顧命留𦵏所卒時服素棺槨財周襯喪事唯約用過乎儉羣公百僚莫不咨嗟巖藪知名失聲揮涕大將軍弔祠錫以嘉諡曰徴士陳君稟嶽凟之精苞靈曜之純天不憖遺一老俾屏我王梁崩哲萎于時靡憲縉紳儒林論德謀績諡曰文範先生傳曰郁郁乎文哉書曰洪範九疇彛倫攸敘文為徳表範為士則存誨没號不亦宜乎三公遣令史祭以中牢刺史敬弔太守南陽曺府君命官作誄曰赫矣陳君命世是生含光醇德為士作程資始既正守終有令奉禮終没休矣清聲遣官屬掾吏前後赴㑹刊石作銘府丞與比縣㑹𦵏荀慈明韓元長䓁五百餘人緦麻設位哀以送之逺近㑹𦵏千人以上河南尹种府君臨郡追歎功德述録髙行以為逺近鮮能及之重部大掾以成斯銘可謂存榮沒哀死而不朽者也乃作銘曰峩峩崇嶽吐符降神於皇先生抱寳懐珍如何昊穹既喪斯文㣲言圯絶来者曷聞交交黄鳥爰集于棘命不可贖哀何有極陳太丘廟碑銘維中平五年春三月癸未豫州刺史典以褒功述徳政之大經是以作諡封墓興於周禮衛鼎晉銘其昭有實故太丘長潁川許昌陳寔字仲弓含聖哲之清和盡人才之上美光明配於日月廣大資乎天地辟四府宰三城神化著於民物形表圖於丹青巍巍乎其不可尚也洋洋乎其不可測也儉約違時懸車致仕徴辟交至遂不屑就春秋八十有三寢疾而終大將軍賜諡羣后建碑國人立廟先生有二子季方元方皆命世希有繼期特立季方盛年早亡亦圖容加諡元方在喪毁瘁消形嘔血純孝過哀率禮不越於時嘉異畫像郡國欽盛徳之休明懿鍾鼎之碩義乃樹碑鐫石垂世寵光詞曰於皇先生冠耀八荒闡德之宇探道之綱繼期立表以訓四方惟亮天工羣生之望髙明允實有馥其芳載德奕世休有烈光欽摹在人舊有憲章過牧斯州庶奉清塵棄予而邁靡瞻靡聞嗟我懐矣曷所咨詢告哀金石式昭其勤文範先生陳仲弓銘君諱寔字仲弓潁川許人也其先出自有虞氏中葉當周之盛徳有媯滿者武王配以太姬而封諸太昊之墟是為陳胡公春秋之末失其爵土遂以國氏焉世篤懿德令聞不顯君膺皇靈之清和受明哲之上姿憑先民之遐迹秉元妙之淑行投足而襲其軌施舎而合其量夫其仁愛温柔足以孕育羣生廣大寛裕足以包覆無方剛毅强固足以威暴矯邪正身體化足以陶冶世心先生有此四德者故言斯可法行斯可樂動斯可象靜斯可效是以邦之子弟遐方後生莫不同情瞻仰由其模範從其趣尚戾狠斯和争訟化譲雖嚴威猛政廹以刑戮未若先生潜𨗳之速也其立朝事上也恭順貞厲含章直方無顯諌以彰直不割髙而引長常幹州郡腹心之任義則進之以達道否則退之以光操然後德立名宣盖于當世辟司徒府納規陳謀匡弼三事人用昭明台階允寜遷聞喜長清風暢于所漸儉節溢於監司郡政有錯爭之不從即觧綬去復辟太尉府遷太丘長民之治情歛慾反於端懿者猶草木之偃於翔風百卉之挺於春陽也以所執不協所屬色斯舉矣不俟終日辟大將軍府道之行廢有分於命乃罹密網以就禁錮潜伏不試十有八年大忌蠲除舉賢良方正大將軍司徒並辟君曰七十有懸車之禮况我過諸遂不應其命容止法度老而彌壯凡所履行事類博審不可勝數略舉首目具實録記在乎其傳春秋八十有三中平三年八月丙子卒大將軍三公使御屬往弔祠㑹葬作誄諡曰文範先生刺史太守樹碑頌德許令以下至於國人立廟舊邑四時烝嘗歡哀承祀其如祖禰先生存獲重稱亡歆血食行修於巳得斯於人固上世之所罕有前哲之所不過也孤嗣紀銜恤在疚敢録言行終始所守乃有二三友生咨度禮則咸曰君化道神速行於有國法施于民祀典所宗鄉人之祠非此遺孤所得專也昔者先生甚樂兹土築室講誨精靈所寜紀順奉雅意遂定兆域宜有銘勒表墳墓俾後生之歌詠德音者如丘封之存斯也乃作銘曰於熙文考天授宏造淵元其深巍峩其髙剛而無虐柔而不撓誕鋪模憲示世作教君之誨矣民胥傚矣道行斯進廢乃斯止鮮我顯泰既多幽否含榮取辱涅而不緇徳之休明賤不為恥超邈其猷莫與方軌郭有道林宗碑邕謂盧植馬日磾曰吾作天下碑銘多矣惟郭有道無愧色先生名泰字林宗太原界休人也其先出自有周王季之穆有虢叔者實有懿德文王咨焉建國命氏或謂之郭即其後也先生誕膺天衷聰叡明哲孝友温㳟仁篤柔惠夫其器量宏深姿度廣大浩浩焉汪汪焉奥乎不可測已若乃砥節勵行直道正辭貞固足以幹事隠括足以矯時遂考覽六籍探綜圖緯周流華夏㳺集帝學収文武之將墜拯㣲言之未絶于時纓緌之徒紳佩之士望形表而景附聆嘉聲而響和者猶百川之歸巨海鱗介之宗龜龍也時乃潜隱衡門収朋勤誨童䝉頼焉用祛其蔽州郡聞徳虗巳偹禮莫之能致羣公休之遂辟司徒掾又舉有道皆以疾辭將蹈洪崖之遐跡紹巢由之絶軌翔區外以舒翼超天衢以髙峙稟命不融享年四十有三以建寜二年正月乙亥卒凡我四方同好之人永懐哀悼靡所置念乃相與推先生之徳以圖不朽之事僉以為先民既沒而徳音猶存者亦賴之於紀述也今其如何而闕斯禮於是建碑表墓昭銘景行俾芳烈奮乎百世令聞顯於無窮其詞曰於休先生明徳通元純懿淑靈受之自天崇壯幽濬如山如淵禮樂是悦詩書是敦匪惟摭華乃尋厥根宫墻重仞允得其門懿乎其純確乎其操洋洋縉紳言觀其髙棲遲泌邱善誘能教赫赫三事幾行其招委辭召貢保此清妙降年不永民斯悲悼爰勒兹銘摛其光耀嗟爾来世是則是效太尉橋公廟碑橋氏之先出自黄帝帝𦵏於橋山子孫之紹基立姓者咸以為氏漢興世以禮樂為業髙祖諱仁位至大鴻臚列名於儒林祖侍中廣川相考東莱太守公稟性貞純幼有宏姿剛而不虐威而不猛聞仁必行睹義斯居文以典術守以純固弱冠從政當官而行刺史周公辟舉從事所部二千石受取有驗公糾發贓罪致之於理時有椒房桂戚之託周公累息公不為之動史魚之勁直山甫之不阿於是始形舉孝㢘除郎中洛陽左尉特進潁王梁不疑為河南尹當事以對是時畏其權寵而為屈辱者多矣公不折節解印綬去辟司徒舉髙第補侍御史以詔書考司𨽻校尉趙祁事廷尉郭貞私與公書非接使銜命之宜公封書以聞貞以文章得用鬼薪公離司冦辟大將軍梁公幕府屢以救正于其隆指將軍嘉之無言不讐又以髙第補侍御史在職旬月羌戎匪茹震驚隴漢西府舉公拜涼州刺史威名克宣凶虜革心清風席巻至則無事車師後部阿羅多卑君相與争國興兵作亂公遣從事牛稱何傳舉輕騎奉辭責罪収阿羅多卑君繫燉煌正處以聞阿羅多為王卑君侯稱以奉使副指除侯部不動干戈揮鞭而定西域之事人以為美談又值饉荒諸郡饑餒公開倉廪以貸救其命主者以舊典宜先請公曰若先請民已死廪訖乃上之詔報曰邉穀不得妄出元擅出於是元有汲黯憂民之心後不以為常公達於事情剖斷不疑皆此類也遷齊相視民如保赤子討惡若赴水火刑明賞遂民知勸懼臨淄令賂財贓多罪正受鞠就刑沒齒無怨竟以不先請免官徴拜上谷太守民有父子俱行凶人人惡言當道曉之不止其子殺人而捕得公以其見悔辨直不舉文書以遇赦令蕃縣有帝舜廟以故事齊祠户曺史張機有懲罰貨祠巫自託以舜命約公云不得譴公覺其奸態収考首伏即日伏辜遷漢陽太守上邽令皇甫禎贓罪明審収考髠鉗死于冀市後以病去徴拜議郎司徒長史循王悝桓帝同産以懐逆謀黜封癭陶王以公長於襟帶拜鉅鹿太守悝畏怖明憲檢于靜息自將作大匠徴未到而謗章先入故轉拜議郎遂用免官徴度遼將軍遷河南尹少府大鴻臚司徒司空託病而去悉引衆灾雖非已負公皆以自劾遜位嵗餘拜尚書令時河間相盖升以朝廷在藩國時隣近舊恩歴河南太守大中大夫在郡受取數億以上創毒深刻公表升貪放狼籍不顧天綱損辱國家為上招怨當肆市朝以謝兆民幸遇贖令罪除惡在可免升官禁錮終身没入財賂非法之物以充帑藏懲戒羣下連表上不納而升遷為侍中公稱病辭徙拜光禄大夫復拜太尉如前遜位復拜少府病不就職拜太中大夫凡所獲禄皆公府所特表選臨難受位自九列之後乃以丕貤公紀綱張弛勇决不囘見是非明作速於察機燕居從容申申夭夭和樂寛裕愛士親仁凡見公容貌聞公聲音莫不熙怡悦懌思樂模則来者忘歸去者願還雅性謙克不吝於利欲雖衆子羣孫並在仕次曽無順媚一言之求身没之日無獲大位在百里者莫得好縣比方公孫未有若兹者也初公為舎於舊里弟卒推與其孤至於即世柩殯無所清儉仁與之效於斯為著巍巍乎若徳允世之表儀也巳公諱元字公祖少辟孝亷辟司徒大將軍府為侍御史牧一州典五郡出將邉營入掌機密歴三卿同三司享年七十五光和七年夏五月甲寅以太中大夫薨于京師朝廷所以弔贈如前傳之儀九月乙酉𦵏於某所三孤故臣門人相與述公言行咨度禮制文徳銘于三鼎武功勒於鉦鉞官簿次第事之實録書于碑隂以昭光懿俾爾昆裔永有仰於碑隂云光光烈考伊漢元公克明克哲實叡實聰如淵之浚如嶽之嵩威壯虓虎文繁雕龍撫柔疆垂戎狄率從敷教中夏五典攸通帝謂我后朕嘉君功命君三事時亮天工公拜稽首翼翼惟恭左右天子祗厥勲庸庶績既煕黎民時雍上下謐寜八方和同丕顯伊徳作憲萬邦水經注引故臣至光懿作銘鼎文亦不言邕作太尉橋公碑頌公諱元字公祖梁國睢陽人也大鴻臚之曽孫廣州相之孫東莱太守之元子也膺受純性誕有特表岐嶷而超等總角而逸羣至於初紳髙明卓異為衆傑雄其性疾華尚朴有百折不撓臨大節而不可奪之風經藝傳記周覽博渉瑰竒在前靡所不識當世是以服重器歸髙名州郡交請待以訪斷歴端首則義可行處爪牙而威以布察孝亷除郎中洛陽左尉以公事去辟司徒舉髙第侍御史直道而往用光其任辟大將軍西府表拜凉州刺史遷齊相以公事去詔書印綬即家拜上谷太守遷漢陽太守徴拜議郎司徒長史鉅鹿太守被詔書為將作大匠為受罰者所章拜議郎即徴拜度遼將軍遷河南尹少府大鴻臚遂陟司空司徒託痾遜位起家拜尚書令以疾篤請拜光禄大夫後拜太尉乆病自替復為少府太中大夫春秋七十五光和七年五月甲寅薨公性質直不憚强禦在憲臺則有盡規之忠領州郡則有虎胗之威其拔賢如旋流討惡如霆擊毎所臨向清風先翔逺近豫震兹可謂超越衆庶彰於逺邇者已於是故吏司徒博陵崔烈廷尉河南吴整等以為至德在已揚之由人苟不皦述夫何考焉乃共勒嘉石永昭芳烈遂作頌曰赫矣橋公秉文握武内為宗榦出為藩輔在憲彈枉竟由厥矩允牧于凉刈彼裔土爰將度遼亦用齊斧敷教四畿旋統京宇敦兹五服衆庶是與膺踐七命翼我哲聖登空補衮陟徒訓敬尹尉清宸熙帝之政終始為貞典章以定遺愛在民皇哀其命立石刋銘莫遁斯聽魂而有靈萬億其盛漢太尉楊公碑公諱賜字伯猷𢎞農華隂人姬姓之國有楊侯者公其後也其在漢室赤泉侯佐髙丞相翼宣咸以盛德光於前朝祖司徒考太尉繼跡宰司咸有勛烈公承家崇軌受天醇素欽承奉構閑於伐柯烈風維變不易其趣文藝典籍尋道入奥操清行朗潜晦幽閒不荅州郡之命辟大將軍府不得巳而應之遷陳倉令公乃因是行退居廬公車特徴以病辭司空舉髙第拜侍中越騎校尉帝篤先業將問故訓公以羣公之舉進授尚書于禁中遷少府光禄勲敬揆百事莫不時序庶尹知恤閶闔推清列作司空地平天成隂陽不忒公遂身避託疾告退又以光禄大夫受命司徒敬敷五品宣洽人倫爕和化理股肱耳目之任靡不克明及至太尉四時順動三光耀潤羣生豐遂太和交薄三作六卿五蹈三階受爵開國應位特進非盛德休功假于天人孰能該偹寵榮兼包令錫如公之至者乎公體資明哲長於知見凡所辟選升諸帝朝者莫非瑰才逸秀并叅儲佐惟我下流二三小臣穢損清風愧于前人乃糾合同寮各述所審紀公勲績刋石勒銘以慰永懐銘曰天降純嘏篤生柔嘉俾𦙍祖考光輔國家三業在服帝載用和粤暨我公尤執丕貞在棟伊隆于鼎斯寜德被宇宙華夏以清受兹介福履祚孔成為邑河渭衮冕紱珽以佐天子祗事三靈丕顯伊德萬邦作程爰銘爰賛式昭懿聲文烈侯楊公碑公諱賜字伯猷兼通五典周覽篇籍以為尚書帝王之要政有國之大夲也是以三葉相承研其精義五代之㣲言王政之約綱罔不尋其端源究其條貫凛乎其見聖人之精㫖也盖以蹈騰餘縱思髙游夏初潜山澤受誨童冠後生賴以發袪䝉蔽文其材素者盖不可勝數乃由宰府遂作帝臣于時聖㓜將入學羣公以公温故知新徳宜師保乃以越騎校尉援侍華光之内帝坐已北面以納大誨其教人善誘則恂恂焉㒺不伸也引情致喻則誾誾焉罔不釋也迄用有成緝煕光明惟帝念功六在九卿三事勛假皇天澤充區域疆土建封申増户邑人臣之極位兼而有之然處豐益約九命滋恭可謂髙朗令終有始有卒者已於是門生大將軍何進等瞻仰洙泗公喪之禮糾合朋徒稽諸典制僉以為匡弼之功政事之實詔䇿之文則史臣志其詳若夫道術之美授之方䇿則是門人二三小子所特貫綜敢竭不才譔録所審言于碑乃申頌曰巍巍聖猷匪師不昭士子困䝉匪師不教於皇文父邈哉伊超如玉之固如嶽之喬鑚之斯堅仰之彌髙示我顯徳授我無隠正席傳道承帝之問誨兹一人萬邦作順微㣲我徒實賴遺訓文武作式元勛既奮光啟爵土垂統末𦙍存榮亡哀沒而不冺司空文烈侯楊公碑曰漢有國師司空文烈侯楊公公惟司徒之孫太尉公之𦙍子皇祖考以懿徳胥及肄勤式建休勲啟洪範公祗服宏業克丕堂構小乃不敢不慎大亦不敢不戒用㒺有擇言失行在於其躬洎在辟舉先志載言㒺不攸該乃自宰臣以從王事立功不有用辭其禄逮作御史允執國憲納於侍中在帝左右爰董武事王師孔閑羣公以舊徳碩儒道通術明宜建師保延入華光侍宴露寢敷典誥之精㫖達聖王之聰叡帝以機密齊栗常伯劇任鮮克知臧以釐其采命公再作少府俾率其屬以熙庶績天地作險國家丕承軍門祛禁式遏宼虐命公再作光禄勲總其熊羆之士不貳心之臣保乂帝家巖巖大理惟制民命命公作廷尉惟刑之恤旁施四方惟明折獄蔽罪于憲之中亦惟三禮六樂國之元幹命公作大常明徳惟馨八音克諧神人以和永世豐年漙天率土而衆莫外命公作司空公唯戢之翊明其政時惟休哉惟天隂隲下民彛倫所由順序命公作司徒而敬敷五教以親百姓父義母慈兄友弟㳟子孝時惟休哉昭教於辟雍命公作三老帝躬以祗敬遵有虞于上庠茫茫大運垂光烈曜命公作太尉璇璣運周七精循軌時惟休哉帝欲宣力于四方公則翼之辟道或違公則弼之䖍㳟夙夜不敢荒寜用對揚天子丕顯休命天子大簡其勲用授爵賜封侯于臨晉功成化洽景命有傾帝乃震慟執書以泣命于左中郎將郭儀作䇿賜公驃騎將軍臨晉侯印綬兼號特進謚以文烈寵命畢偹而後即世肆其孤彪敢儀古式昭銘景烈銘曰天鑒有漢誕生元輔世作三事勛在王府乃及伊公克光前矩悉心畢力𦙍其祖武化洽羣生澤霑區宇帝曰文烈朕嘉君功為邑河渭建兹土封申偹九錫以祚其庸位此特進于異羣公昔在申呂匡佐周宣崧髙作頌大雅揚言今我文烈帝載用熙參光日月比功四時身殁名存永世慕思太傅文恭侯胡公碑公諱廣字伯始交趾都尉之元子也公應天淑靈履性貞固九徳咸修百行畢偹遭家不造童而夙孤上奉繼親下慈弱弟﨑嶇儉約之中以盡孝友之道及至入學從訓歴觀古今生而知之聞一覩十兼以周覽六經博總羣議旁貫憲法通識國典年二十七察孝廉除郎中尚書侍郎尚書左丞尚書僕射幹練機事綢繆樞極忠亮唯允簡于帝心智畧周密冠于庶事遷濟隂太守其為政也寛裕足以容衆和柔足以安物剛毅足以威暴體仁足以勸俗故禁不用刑勸不用賞其下望之如日月從之如影響思不可忘度不可革遺愛結于人心超無窮而垂則徴拜大司農遂作司農遷太尉以援立之功封安樂鄉侯録尚書事稱疾屢辭䇿賜就第復拜司空功成身退俾位特進又拜太尉復以特進致命休神乂拜太尉遜位歸爵旋于舊土徴拜太中大夫尚書令太僕太常司徒永康之初以定䇿元功復封前邑録尚書事疾病就第又授太傅入参機衡五蹈九列七統三事諒闇之際三據冡宰和神人於宗伯理水土於下台訓五品於司徒耀三辰于上階光弼六世歴載三十自漢興以来鼎臣元輔耋袠老成勲被萬方與國終始未有若公者焉春秋八十二建寜五年三月壬戌薨于位天子悼惜羣后傷懐詔五官中郎將任崇奉冊贈以太傳安樂鄉侯印綬拜室家子一人郎中賜東園秘器賜絲帛含歛之偹中謁者董詡弔祠䕶喪錢布賻賜率禮有加賜諡曰文㳟昭顯行迹四月丁酉𦵏于洛陽塋故吏濟隂池喜感公之義率慕黄鳥之哀推尋雅意彷徨舊土休績丕烈宜宣于此乃樹石作頌用揚徳音詞曰於皇上徳懿鑠孔純大孝昭偹思順履信膺期命世保兹舊門淵泉休茂彪炳其文爰賛天機翼翼唯㳟夙夜出納紹跡虞龍賦政于外神化元通普被汝南越用熙雍帝曰休哉命公三事乃耀柔嘉式是百司股肱元首庶績咸治二氣爕雍五徴来偹勲格皇天澤洽后土封建南藩受兹介祜玉藻在冕毳服艾輔輅車雕驂四牡修扈賛事上帝祗祀宗祖陟降盈虧與時消息既明且哲保身遺則同軌旦奭光充區域生榮死哀流兹㒺極太傅胡公碑維漢二十有一世建寜五年春三月既生魄八日壬戌太傅安樂鄉侯胡公薨越若来四月辛酉𦵏我君文㳟侯於是掾太原王允雁門畢整屬扶風曽宙潁川殷歴等僉謂公之徳也柔而不犯威而不猛文而不華實而不朴靜而不滯動而不躁總天地之中和覽生民之上操聰明膚敏兼質先覺渉觀憲法契濶文學覩臯陶之闈閫探孔子之房奥然而約之以禮守之以㳟寛之以納衆汎愛多容其誘人也恂恂焉怡怡焉能使䝉惑開析偽戾優順逸惰勤信及其創基發跡機密聖朝其知其能夙夜惟寅以允帝命是以頻繁機極三升而不出焉乃還譚其舊章彌綸古訓貫萬品研精微用補前臣之所闕十年而無愆强記同乎富平周慎過於博士偶山甫乎喉舌疋虞龍而納言唯帝命公以二郡其為政也𨗳人以徳帥物以已敦以忠肅勵以知恥人悦其化天樂其和士相勉於公朝民勸行於私家徽纒縈而靡係鞭朴棄而無加洋洋乎若徳宣治嚴以為威寛以為福而已哉五作卿士七蹈相位太僕司農太傅司空各一司徒特進各二太常太尉各三光輔六世歴載三十有餘其致治也通水泉於潤下蕃后土於稼穡訓五品於羣黎叅人物於區域耀三辰於渾元協大中於皇極傳聖德於㓜冲率旦奭於舊職譬彼四時功成則退在盈思冲升隆以順建封域于南土踐殊號于特進榮祚統業垂乎来𦙍公自二部及登相位凡所辟用遂至大位者故司徒中山祝括其餘登堂閣據賦政䇿勲樹功流化者盖不可勝載唯我末臣頑蔽無聞仰慕羣賢惡乎可及自公寢疾至于薨斃叅與嘗禱列在喪位雖庶物戮力不愆于禮進覩墳塋几筵空設退顧堂廡音儀永闕感悼傷懐心肝若割相與累次德行撰舉功勲刋之于碑用慰哀思其詞曰煥文德伊朝后應期運作漢輔喜中興膏民庶澤洪渟亶攸序亘地區充天宇轔髙逵踵遐武揚景烈垂不朽仰邃古耀昆後胡公碑銘公諱廣字伯始南郡華容人也其先自嬀姓建國南土曰胡子春秋書焉列于諸侯公其後也考以德行純懿官至交趾都尉公寛裕仁愛覆載博大研道知幾窮理盡性凡聖哲之遺教文武之未墜㒺有不綜年二十七察孝亷除郎中尚書侍郎左丞尚書僕射内正機衡允釐其職文敏暢乎庶事密靜周乎樞機帝用嘉之遷濟隂太守公乃布愷悌宣柔嘉通神化𨗳靈和揚恵風以養真激清流以盪邪取忠肅于不言消奸宄于爪牙是以君子勤禮小人知恥鞠推息于官曺刑戮廢于朝市餘貨委于路衢餘種棲于􅅵畝遷汝南太守増修前業考績既明入作司農實掌金穀之淵藪和鈞關石王府以充遂作司徒昭敷五教進作太尉宣暢渾元人倫輯睦日月重光遭國不造帝祚無主援立孝桓以紹宗緒用首謀定䇿封安樂鄉侯户邑之數加于羣公入錄機事聽納總巳致位就第復拜司空敷土𨗳川俾順其性功遂身退告疾固辭乃為特進爰以休息又拜太常典司三禮敬恭禋祀神明嘉歆永世豐年聿懐多福復拜太尉尋申前業又以特進逍遥致位又拜太常遘疾不夷遜位歸爵遷於舊都徴拜太中大夫延和末年聖主革正幸臣誅斃引公為尚書令以二千石居官委以閫外之事釐改度量以新國家宏綱既整衮闕以補乃拜太僕車正馬閑六騶習馴遷太常司徒成宗晏駕推建聖嗣復封故邑與参機密寢疾告退復拜太傅録尚書事于時春秋髙矣繼親在堂朝夕定省不違子道旁無几杖言不稱老居喪致哀率禮不越其接下荅賔雖㓜賤降等禮從謙厚尊而彌㳟勞思萬機身勤心苦雖老莱子嬰兒其服方叔克壯其猷公旦納于台屋正考父俯而循禮曷以尚兹夫烝烝至孝德夲也體和履忠行極也博聞周覽上通也勤勞王家茂功也用能十登三事篤受介祉亮皇業于六王嘉丕績於九有窮生人之光寵享黄耉之遐紀蹈明德以保身與福禄乎終始年八十有三建寜五年春壬戌薨於位天子悼痛贈䇿賜誄諡曰文恭如前傅之儀而有加焉禮也故吏司徒許詡等相與欽慕崧髙蒸民之作取言時計功之則論集行跡銘諸琬琰其詞曰伊漢元輔時惟文㳟聰明叡哲思心瘁容畢力天機帝休其庸賦政于外有邈其蹤進作卿士粤登上公百揆時序五典克從萬邦黎獻共唯時雍勲烈既建爵土乃封七被三事再作特進宏唯幼冲作傳以訓赫赫猗公邦家之鎮澤被華夏遺愛不倫日與月與齊光並運存榮亡顯没而不冺胡太傅祠前銘天鑒有漢山嶽降靈於肅文㳟應期誕生好是懿德柔惠且貞爰在初服皇嘉其聲納于機密機密惟清守于三邦三邦事寜越尹三卿百揆時序七受帝命作此元輔左右六世靖綏土宇蠢彼羣生保賴亶叙紹跡龍夷繼軌山甫遭國不造仍世短祚援立聖嗣得公之謨帝曰文㳟朕嘉君功為邑安樂以佑其庸登位特進于異羣公休命丕顯光寵克章公拜稽首是對是揚藹藹惟公民斯攸望春秋既暮倐爾乃喪不憖是遺俾屏於皇新廟奕奕于以烝嘗子子孫孫承嗣無疆司空楊公碑君諱秉字叔節宏農華隂人其先盖周武王之穆晉唐叔之後也末葉以支子食邑于楊因氏焉周室既㣲裔胄無緒暨漢興烈祖楊喜佐命征伐封赤泉侯嗣子業紱冕相繼公之丕考以忠蹇亮弼輔孝安登司徒太尉公承夙緒世篤儒教以歐陽尚書京氏易誨授四方學者自逺而至盖踰三千初辟司徒舉髙第拜侍御史遷豫州兖州刺史任城相徴入勸講拜太中大夫左中郎將尚書出補右扶風留拜光禄大夫遭權嬖貴盛六年守靜外戚火燔乃遷太僕太卿公事絀位浹辰之間俾位河南憤疾豪强見遘姦黨用嬰疾廢起家復拜太常遂陟三司沙汰虗冗料簡貞實抽援表達與之同蘭芳任鼎重從駕南廵為朝碩德然知權過於寵私富侔國大臣苛察望變復還條表以聞啟𨗳上怒其時所免州牧郡守五十餘人饕戾是黜英才是列善否有章京夏清肅在位七載年七十有四延熹八年五月丙戍薨朝廷惜焉寵賜有加公自奉嚴敕動遵禮度量材授任當官而行不為義絀疾是苛政益固其守厨無宿肉器不鏤雕夙喪嬪儷妾不嬖御可謂立身無過之地正直清儉該偹者矣昔仲尼嘗垂三戒而公免焉故能匡朝盡直獻可去奸忠侔前後聲塞宇宙非黄中純白窮達一致其惡能立功立事敷聞于下昭升于上若兹巍巍者乎於是門人學徒相與刋石樹碑表勒鴻勲讃懿德傳億年於􅃧公唯嶽靈天挺德翼至神氣絪緼仁哲生應台任作邦楨帝欽亮訪典刑道不惑迄有成光遐邇穆其清司空臨晉侯楊公碑皇帝遣中謁者陳遂侍御史馬助持節送柩陳遵桓典蘭臺令史十人將羽林騎鉦車介士前後鼓吹以驃騎將軍官屬及司空法駕與公卿尚書三臺以下𦵏我文烈侯三年九月甲申小祥㑹如初四年九月戊申大祥公卿尚書三臺以下㑹如小祥之禮公之祖納忠于前朝以罹艱禍父隠約蟄瘁治家師𨗳唯儉之尚公生值歉褊資賄屢空手執勤役逺渉道里以修經術險阻艱難曷所不嘗特以其靜則貞一審固動則不違則度含容覆載無競伊人謀無不忠言無不信自在弱冠布衣之中固已流芳名著茂實公孫同倫莫能齊焉者矣州郡禮招莫之能屈委百里位辟公車令自侍御史侍中已往道為帝師德為世表體尊名重階級彌崇而公處以㳟遜行以固慎德大而心小居髙而志降夫驕吝之釁周公其猶病諸而公脱然以為行首不亦泰乎及其所以匡輔夲朝忠言嘉謀造膝危辭當事而行言從計納亦不敢宣密誡潜功貽于帝躬家無遺草論者不見嗟乎誠為達事君之體得人臣之上儀者巳公素不貴歸非不樂引美故雖彷彿猶不敢載以順公之雅初受封自以功不副賞前後固辭章凡十上憂愠悄悄形于容色雖不克從情㫖昭顯晚節為廷尉公曰昔在三后成功惟殷于民而臯陶不與焉盖吝之也及為特進又曰唯漢重臣中興以來克稱斯位者其唯髙密元侯乎吾何德以堪諸寢疾固命無辭要言約戒忠儉而已孤彪銜恤永思輟輯所履以賛銘之銘曰赫赫烈侯卓爾超倫於唯楊公乃華降神故能明哲德亞聖人受兹介福位極人臣包羅五典夲道根真為國之師誨上經文頻歴鄉校五登鼎鉉建名著忠確越前賢攘灾興化蟊蠈不臻風雨以時屢獲有年三葉宰相應祚于天臨晉是侯子子孫孫億兆不窮如山之堅四時潔祀以承所尊祀事孔明奉亡如存馥馥芬芬用慰顯魂漢故太尉陳公之碑𨽻釋篆額鄭樵通志金石畧蔡邕文并書在徐州歐陽棐集古録目不著書撰人名氏君諱球字伯真有虞氏之􅒨也當周盛德有虞遏父為陶下闕公生公子完適齊為桓公公正其後强大遂有齊上楚漢之下闕官生有令名廣漢太守公既繤世業不隊前軌孝友秪穆下闕典誥言睢頌情指憲發綱紌莫不守其􅀈貫綜其倫理采下闕換東城門候䖍恭職司夙夜匪解遷繁陽令寛以闕二字温而下闕不闕遺跡邈而不闕䘮母去官服除辟司徒府拜侍御史下闕陸梁荆揚州郡闕弱莫能禁御大尉楊秉舉公下闕帥徯闕二字弱闕三字難一闕而平詔書闕五字十萬州下闕公發遣家屬辟闕二字難公赫下闕有言者斬乃悉闕人民老弱闕共闕三字材為大弧下闕攻前闕遇之􅀈衆而遁全郡保闕六字拜子男下闕作大匠孝桓晏駕闕四字躬親功下闕司空􅀢元表公為河南闕惟明克闕公下闕遂作司空通導水泉稼嗇繁阜隂陽下闕致仕賜荣而退復拜永樂少府光和下闕而不撓雖有周之申甫漢优之匡翟下闕知公之明德其辭曰於顯明德峻喆闕二字亶闕度伊下闕𨽻釋云大凡碑碣率與史傳牴牾球之二碑獨繁陽事迹不同所書零陵平賊事雖石破文缺其存者皆與傳合至廷尉永樂時則一辭不措故熹平之議光和之謀咸無焉殆有所畏而然也左傳虞閼父為周陶正而此作遏父陳敬仲至齊為工正掌百工之官也而此作公正太尉橋公而此作喬皆借用也碑以隊為墜嗇為穡􅀈為引字陳球碑隂故吏闕九字息闕故吏闕二字平恩闕三字祖早終息櫂下闕故吏闕二字嚴闕三字五百故吏闕六字五百故吏闕四字允明千故民繁闕嚴闕子夏二百故闕三字嚴追季祖三百故民闕二字嚴闕李安二百故民闕二字許闕顯德二百故民闕五字遷二百故吏闕二字呉憲元將千故吏闕二字毛闕君闕五百故吏闕二字王闕子闕五百故吏闕四字元起五百故闕三字侯髙君舉五百故吏闕二字周清文德五百故吏闕二字趙闕子興五百故吏闕二字岐周子然五百故吏闕二字李忠世持二百故闕三字王茂季盛十上闕公乗儀元表二千上闕趙下闕故吏繁下闕故吏繁陽下闕故吏繁陽下闕故吏繁陽李下闕故吏繁陽李下闕故民繁陽下闕故吏繁陽劉下闕故吏繁陽張下闕故吏繁陽闕三字公五百故吏繁陽劉闕三字三百故吏繁陽闕三字嚴五百故吏犁陽郭闕二字選五百故吏内貫馮闕三字三百故吏内黄焦松闕三字二百故民􅚌企李闕三字千故吏􅚌企王闕三字二百故吏隂安審配闕二字二百故吏隂安闕訓闕三字千故吏列人孟條闕二字二百𨽻釋云故吏其中皆有息字次行息之上又有早終字盖謂二人者已卒所出緡錢則其子也水經云下邳陳球墓前有三碑是弟子管寜華歆等造此碑所見皆故吏故民而無管華姓名其一則弟子所立乎又姓苑載炅氏兄弟各分一姓曰炅昋桂炔字皆九畫一音引漢太尉陳球碑隂有城陽炅横此碑亦不見之趙氏但有一碑隂犁陽為黎陽漢故小黄門譙君之碑𨽻釋篆額金石略云蔡邕文在冀州集古録目不載書撰人名氏黄長睿東觀餘論云信安何籕以𨽻書名目是碑為蔡中郎書未知何㨿君諱敏字漢達鄴君之中子章君之弟郎中君之昆也其先故國師譙贛深明􅥯隩識録圖緯能精徹天意傳道與京君明君承厥後不忝其美㓜而好學才略聰叡詩書是綜言合雅謨慮中聖權既體在公忠允篤誠㠯直佐主帥下惟約肅將􅀢命振之亐外羣寮有司各敬爾儀君商時度世引已倍權守静微穴韜光韞玉㠯逺悔咎耻與鄰人並拾驅識眞之本謂君為喆在甯武當亨南凶難老之檮昊天不惠降兹殉􅏵五十有七㠯中平二年三月九日戊寅卒嗚嘑哀哉國䘮良佐家隕棟梁遐邇咨悼本女哀懐寮朋親慼莫不失聲泣涕雙流於是立表寫憤斯銘傳亏网極其辭曰於穆使君盛徳炤朙爰惟業帥由舊章文武彬彧柔而能屈道從政令名顯揚臣多醜直是用遜讓且㠯毓姿優遊闕二字亰曷遘罹景命不長屋棟廎覆君闕一字喪亾如何如何􅀈昊蒼身􅂒名存永世遺芳中平四年七月廿八日癸卯造𨽻釋云耻與鄰人羼竝拾驅説文羼音剗羊相厠也一云傍入曰羼拾音洽劒押也此句盖是不與羣閹
