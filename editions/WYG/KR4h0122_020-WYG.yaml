body:
  text: 東漢文紀巻二十明梅鼎祚編蔡邕二歴元議喜平四年五官郎中馮光沛相上計掾陳晃言歴元不正故妖民叛寇益州盗賊相續為歴用甲寅為元而用庚申圖緯無以庚為元者近秦所用代周之元太史治歴郎中郭香劉固意造妄説乞與夲庚申元經緯有明受虚欺重誅詔下三府與儒林明道者詳議務得道真以羣臣㑹司徒府議議郎臣蔡邕議上公卿以邕議劾光晃不敬正鬼薪法詔勿治後漢書志復據太平御覽補入邕集不載歴數精微去聖乆逺得失更迭術術無常是以漢承秦正歴用顓頊元用乙卯百有二嵗孝武皇帝始改正朔歴用太初元用丁丑行之百八十九嵗孝章皇帝用清河李梵之言改從四分元用庚申今光晃各以庚申為非甲寅為是案歴法黄帝顓頊夏殷周魯凡六家各自有元光晃所據則殷歴元也他元雖不明於圖䜟各自一家之術皆當有效於其當時黄帝始用太初丁丑之元有六家紛錯争訟是非太史令張夀王挟甲寅元以非漢歴雜候清臺課在下第卒以䟽闊連見劾奏太初效驗無所漏失是則雖非圖䜟之元而有效於前者也及用四分以来考之行度密於太初是又新元效於今者也延光元年中謁者亶誦亦非四分庚申上言當用命歴序甲寅元公卿百寮叅議正處竟不施行且三光之行遲速進退不必若一術家以算追而求之取合於當時而已故有古今之術今之不能上通於古亦猶古術之不能下通於今也由此言之有文於䜟無驗於今未必為是有驗於今無文於䜟未必為非元命苞乾鑿度皆以為開闢至獲麟二百七十六萬嵗及命歴序積獲麟至漢起庚子蔀之二十三嵗竟巳酉戊子及丁卯蔀六十九嵗合為二百七十五嵗漢元年嵗在乙未上至獲麟則嵗在庚申推此以上上極開闢則不在庚申纎雖無文其數見存而光晃以為開闢至獲麟二百七十五萬九千八百八十六嵗獲麟至漢百六十二嵗轉差少一百十四嵗云當滿足則上違乾鑿度元命苞中使獲麟不得在哀公十四年下不及命歴序獲麟漢相去四蔀年數與奏記譜注不相應當今歴正月癸亥朔光晃以為乙丑朔乙丑之與癸亥無題勒欵識可與衆共别者須以弦望晦朔光魄虧滿可得而見者考其符驗而光晃歴以考靈曜二十八宿度數及冬至日所在與今史官甘石舊文錯異不可考校以今渾天圖儀檢天文亦不合於考靈曜光晃誠能自依其術更造望儀以追天度逺有驗於圖書近有效於三光可以易奪甘石窮服諸術者實宜用之難問光晃但言圖䜟所言不服元和二年二月甲寅制書曰朕聞古先聖王先天而天不違後天而奉天時史官用太初鄧平術冬至之日日在斗二十二度而歴以為牽牛中星先立春一日則四分數之立春也而以折獄斷大刑於氣巳迕用望平和盖亦逺矣今改行四分以遵於堯以順孔聖奉天之文是始用四分歴庚申元之詔也深引河洛圖䜟以為符驗非史官私意獨所興構而光晃以為固意造妄説違反經文謬之甚者昔堯命羲和歴象日月星辰舜叶時月正日湯武革命治歴明時可謂正矣且猶遇水遭旱戒以蠻夷猾夏冦賊姦宄而光晃以為隂陽不和姦臣盗賊皆元之咎誠非其理元和二年乃用庚申至今九十二嵗而光晃言秦所用代周之元不知從秦来漢三易元不常庚申光晃區區信用所學亦妄虗無造欺語之愆至於改朔易元往者夀王之術已課不效亶誦之義不用元和詔書文偹義著非羣臣議者所能變易蔡邕集載三月九日百官㑹府公殿下東南校尉南面侍中郎將大夫千石六百石重行北面議郎博士西面戸曺令史當坐而讀詔書公議蔡邕前坐侍中西北近公卿與光晃相難問是非焉難夏育擊鮮卑議熹平六年䕶烏桓校尉肓上言鮮卑仍犯諸郡自春以耒三十餘發請徴幽州諸郡兵出塞擊之一冬春足以掃滅時故䕶羗校尉田晏為破鮮卑中郎將三道竝出朝廷多以為不便詔百官㑹議中郎蔡邕議止書戒猾夏易伐鬼方周宣王命南仲吉甫攘獫狁威蠻荆漢有衛霍闐顔瀚海竇憲燕然之事征討之作所由尚矣然而時有同異勢有可否故謀有得失事有成敗不可齊也自漢興巳来匈奴常為邊害而未聞鮮卑之事昔謀臣竭精武夫戮力而所見常異其設不戰之計守禦之因者皆社稷之臣永乆之策也孝武皇帝因文景之畜用度饒衍南伐越北伐胡西征大宛東并朝鮮兵出數十年帑藏空竭官民俱匱乃興鹽鐡酤𣙜之利設告緡重税之令民不堪命及盗賊羣起關東紛然道路不通繡衣直指之使奮鈇鉞而並出然後僅得寜息既而覺悟乃封丞相為富民侯故主父偃曰夫務戰勝窮武事未有不悔者也夫世宗神武將卒良猛財賦充實所拓廣逺而猶有悔况無彼時地利人財之偹而欲輕動此其不可一也鮮卑種衆新盛自匈奴北遁以来據其故地稱兵十萬彌地千里意智益生財力勁健加以禁網漏洩善金良鐵出者莫察漢人逋逃為其謀主兵利馬疾過於匈奴昔段熲良將習兵善戰經營西羗猶十餘年今育晏欲以三年之期專勝必克育晏策慮未能遇熲鮮卑種衆又不弱於西羌也乃欲張設近期誘戲朝廷三年不成必廹於害禍結兵連不得中休轉運糧饟不可勝給天無豐嵗官見殫財民人流移於四方不能還其骸骨以此時興議横發一發不巳必至再三諸夏之内弱者伏尸彊者作寇邊郵之患手足之疥瘙也中國之困胷背之瘭疽也其不可二也育云自春以来三十餘發方今郡縣盗賊劫剽人財攻犯官民日月有之冠帶之圻吏調政密猶不能絶况此醜虜羣類抵冒心不受仁膽不畏威而可使斷無盗竊昔者髙祖乃忍平城之恥呂后甘棄嫚書之詬方之於今何者為甚是其不可三也天設山河秦築長城漢起塞垣所以别内外異殊俗也其外則介之夷狄其内則任之良吏後嗣遵業慎奉所遺苟無蹙國内侮之患豈與䖝螘之虜校往来之數哉乃欲越幕踰域度塞出攻得地不可耕農得民不可冠帶破之不可殄盡而夲朝必為之旰食四海必為之焦枯其不可四也夫煎盡府帑之蓄以恣輕事之人專勝者未必克挟疑者未必敗衆所謂危聖人不任朝議有嫌明主不行是其不可五也按育一戰所獲不如所失昔淮南王安諫伐越曰天子之兵有征無戰言其莫敢校也使越人䝉死徼幸以逆執事厮輿之卒有不偹而歸者雖得越王之首猶為大漢之羞威化不行則欲伐之狐疑避難則守為長宜通乎時變且憂萬人饑餓與蠻夷之不討何者為大宗廟之祭凶年不偹况避不遜之辱哉今關東大困無以相贍又議動兵非但勞人凶年隨之其罷敝有不可勝言者此先帝所以發德音也夫䘏民救患雖成郡列縣尚猶棄之况以鄣塞之外未嘗為人居者乎臣愚以為宜止征伐之討令諸營甲士循行塞垣屯守衝要以堅牢不動為務若乃守邊之術李牧開其原嚴尤申其要遺業猶在文章具存循二子之策守先帝之規臣曰可矣臣邕愚戇議不足采臣邕頓首頓首宗廟迭毁議獻帝即位初平中相國董卓左中郎將蔡邕䓁以和帝以下功德無殊而有過差不應為宗及餘非宗者追尊三后皆奏毁之袁山松後漢書載邕議劉昭志引注左中郎將臣邕議以為漢承亡秦滅學之後宗廟之制不用周禮毎帝即位世輙立一廟不止於七不列昭穆不定迭毁孝元皇帝時丞相匡衡御史大夫貢禹始建大議請依典禮孝文孝武孝宣皆以功德茂盛為宗不毁孝宣尊崇孝武歴稱世宗時忠正大臣夏侯勝猶執異議欲出世宗至孝成帝議猶不定太僕王舜中壘校尉劉歆據經傳義謂不可毁上從其議古人考據慎重不敢私其君父若此其至也後遭王莽之亂光武皇帝受命中興廟稱世祖孝明皇帝聖德聰明政参文宣廟稱顯宗孝章皇帝至孝烝烝仁恩溥大海内頼祉廟稱肅宗比方前事得禮之宜自此以下政事多釁權移臣下嗣帝殷勤各欲褒崇至親而巳臣懦弱莫能執夏侯之直故遂衍溢無有方限今聖朝遵古復禮以求厥中誠合事宜禮傳封儀自依家法今不知國家舊有宗儀聖主賢臣所共創定欲就六廟黜損所宗違先帝舊章未可施行臣謹按禮制七廟三昭三穆與太祖七孝元皇帝在世第八光武皇帝世在第九故以元帝為考廟尊而奉之孝明遵制亦不敢毁元帝於今朝九世以七廟言之則非所宗八月報酬可出元帝主比惠景昭成哀平帝五年一致祭孝章皇帝孝桓皇帝親在三昭孝和皇帝孝順皇帝孝靈皇帝親在三穆廟親未盡四時常陳孝明以下穆宗敬宗恭宗之號皆宜省去以遵先典殊異祖宗不可叅並之義今又總就一堂崇約尚省不復改作惟主及几筵應改而巳正數世之所闕為無窮之常典稽禮制之舊則合神明之歡心臣愚戇議不足採臣邕頓首頓首答齋議日月詔召尚書問立春當齋迎氣東郊尚書左丞馮方毆殺指揮使於尚書西祠可齋否得無不宜具對議郎臣蔡邕博士任敏死罪對按禮上帝之祠無所為廢齋者所以致齊不敢渙散其意宫室至大指使至㣲不在齋潔之處元和詔禮無免齋宜以自潔淨交神明夲無嫌間祠室又寛可齋無疑詩云唯此文王小心翼翼昭事上帝聿懐多福夫齋以恭奉明祀文王所以懐福無有不宜臣邕敏愚戇死罪和熹鄧后諡議初平中蔡邕始追正和熹之號孝和鄧皇后崩羣臣謀諡於是尚書陳忠上言以為鄉黨叙孔子威儀俯仰無所遺彤管記君王纎微大小無不舉是以德著圖籍名垂於後伏惟大行皇后規乾則坤兼包日月厥初作合允有休烈貫魚之次加於小媵中饋之叙昭於帷幄遭家不造三元之厄孝殤㓜冲國祚中絶海内紛然羣臣累息加以洪流為災扎荒為害西戎蠢動武威侵侮并凉猾夏作冦振驚渤碣家有採薇之思人懐殿屎之聲皇太后叅圖考表求人之瘼度越平原建立聖主垂疇咨之問遵六事之求勞謙克躬菲薄為務是以尚官損服衣不粲英饔人徹羞膳不過擇黄門闕樂魚龍不作織室絶伎纂組不經尚方抑巧雕鏤不為離宫罕幸儲峙不施遐方斷篚侏離不貢罷出宫妾免遣宗室沒入者六百餘人以紓鬱滯奉率舊禮交饗祖廟以展孝子承歡之敬蠲正憲法六千餘事以順漢氏三百之期經藝乖舛恐史闕文命衆儒考校東觀閣學博士一缺廣選十人何有伐檀茅茹不拔屢舉方直顯擢孝子遵忠孝之紀啟大臣喪親之哀疾貪吏受取為姦糾増舊科之罰惡長吏虚偽錮之十年追崇世祖功臣國土㦯有斷絶封植遺苗以奉其祀爵髙蘭諸國𦙍子以紹三王之後事不稽古不以為政政不惠和不圖於策猶不自專傳謀逺暨允求厥中刑之所加不阿近戚賞之所及不遺側陋終朝反側明發不寢徒以百姓為憂不以天下為樂聖誠著於禁闥而德教被於萬國故自昬墊迄於康乂叛虜蜂集賊害邊陲永元之世以為遺誅今畏服威靈稽顙即斃徼外絶國慕義重譯来獻其琛史官咸賀請作主頌却而不聽郡國咸上瑞應寖而不宣允㳟抑損密勿在勤遭疾不豫垂念臣子御輦在殿顧命羣司流恩布澤大赦天下有始有卒同符先聖昔書契所載虞帝二妃夏后塗山髙陽有辛姬氏任母徒以正身率内思媚周京為髙未有如大行皇后勤精勞思篤繼國之祚正三元之衡康百六之㑹消旡妄之運者也功德巍巍誠不可及漢世后氏無諡至於明帝始建光烈之稱是後轉因帝號加之以諡髙下優劣混而為一違禮大行受大名小行受小名之制諡法有功安居曰熹帝后謚禮亦宜同大行皇太后宜諡為和熹皇后上稽典訓之正下協先帝之稱朱公叔諡議漢益州刺史南陽朱公叔卒門人陳季珪等議所諡云宜曰忠文子陳留蔡邕議曰昔在聖人之制諡也將以勸善彰惡俾民興行賢愚臧否依事從實雖文武之美幽厲之穢㒺不具存自王公以降至於列國大夫皆用配號傳於無窮秦以世言謚而黜其事漢興以来惟天子與五等之爵然後有之公卿大臣其禮闕焉歴世彌乆莫之或修益州府君貫綜典術率由舊章始與諸儒考禮定議加陳留府君以益州之諡是後覽之者亦無間焉今子亶纂襲前業不忘遺則孝既至矣禮實宜之謹覽陳生之議思忠文之意参之羣典稽之諡法夫萬類莫貴乎人百行莫美乎忠故夏后氏正以人統教以忠德然則忠也者人德之至也而猶有三焉孔子曰進思盡忠又曰臣事君以忠奉上之忠也曰為人謀而不忠乎又曰忠焉能勿誨乎謀誨之忠也春秋左傳曰小大之獄必以情情忠之屬也又曰上思利人曰忠撫下之忠也三者人之則而忠行乎其中益州府君自始事至没身忠言不輟乎口忠謀不巳乎心其在帝室正身危行言如砥矢策合神明蹇蹇之諌文章具存奉上忠矣其在部臣匡救善𨗳出自一心疑不我聽者果有躓覆不測之禍謀誨忠矣爰牧冀州時值凶荒勞心苦思勤恤度事誅斃貪暴糾戢貴黨雖則强禦當官能行夫豈淫刑將有利也發墓盗柩議而不罪夫豈漏姦察以情也撫下忠矣位在牧伯職據納言秉權食禄實有年數而居無蓄好財貨不益舊糲食布衾㮣謂之精麗者昔魯季孫行父卒宰庀家器無衣帛之妾無食粟之馬君子曰相三君矣而無私積可不謂忠乎而諡曰文子春秋外傳曰忠文之實也然則文忠之彰也忠以為實文以彰之事通議合兩名一致是貞儉之稱文也邾子籧篨卜遷於繹史曰利於民不利於君公曰民苟利矣孤亦與焉於是遷而遂卒諡曰文公是危身利民之稱文也衛大夫孔圉諡曰文子子貢疑焉惟敏而好學不恥下問仲尼與之是勤學好問之稱文也府君所在屢以忤違阽以深患苟除民害死生以之前後三黜一罹疾廢於身危矣兼包六典命世作師猶復宗事趙叟示有攸尊能下問矣有一於此猶可以稱况乃忠兼三義文偹三德於古志不悖而諡法亦曰宜矣夲議曰忠文子按古之以子配諡者魯之季文子孟懿子衛之孫文子公叔文子皆諸侯之臣也至於王室之卿大夫其尊與諸侯並故以公配春秋曰劉巻卒葬劉文公公羊傳曰劉巻者何天子大夫也經又曰王子虎卒左傳曰王叔文公卒而如同盟禮也此皆天子大夫得稱公禮與同盟諸侯敵體故也乂禮縁臣子咸欲尊其君父故雖侯伯子男之臣自稱其君咸得曰公及其卒也異國之人稱之皆然是以邾子許男稱公以𦵏春秋之正義也以例言之則府君王室亞卿也有王叔劉氏之比以臣子之辭言之則有邾許稱公之文雖無土而其位是也今曰公猶可若稱子則降等多矣懼禮廢日乆將詭時聽周有仲山甫伯陽嘉父優老之稱也宋有正考父魯有尼父配諡之稱也春秋曰孔父子曰伯某父亡之稱也父雖非爵號與天子諸侯咸用優賢禮同順乎門人臣子所稱之宜可於公父之中擇一處焉使不得稱子而巳明堂月令論明堂者天子太廟所以崇禮其祖以配上帝者也夏后氏曰世室殷人曰重屋周人曰明堂東曰青陽南曰明堂西曰總章北曰元堂中央曰太室易曰離也者明也南方之卦也聖人南面而聽天下嚮明而治人君之位莫正於此焉故雖有五名而主以明堂也其正中皆曰太廟謹承天順時之令昭令德宗祀之禮明前功百辟之勞起養老敬長之義顯教幼誨穉之學朝諸侯選造士於其中以明制度生者乗其能而至死者論其功而祭故為大教之宫而四學具焉官司偹焉譬如北辰居其所而衆星拱之萬象翼之政教之所由生變化之所由来明一統也故言明堂事之大義之深也取其宗祀之貌則曰清廟取其正室之貌則曰太廟取其尊崇則曰太室取其向明則曰明堂取其四門之學則曰太學取其四面周水圎如璧則曰辟廱異名而同事其實一也春秋因魯取宋之奸賂則顯之太廟以明聖王建清廟明堂之義經曰取郜大鼎於宋戊申納於太廟傳曰非禮也君人者將昭德塞違故昭令德以示子孫是以清廟茅屋昭其儉也夫德儉而有度升降有數文物以紀之聲明以發之以臨照百官百官於是乎戒懼而不敢易紀律所以明大教也以周清廟論之魯太廟皆明堂也魯禘祀周公於太廟明堂猶周宗祀文王於清廟明堂也禮記檀弓曰王齋禘於清廟明堂也孝經曰宗祀文王於明堂禮記明堂位曰太廟天子曰明堂又曰成王幼弱周公踐天子位以治天下朝諸侯於明堂制禮作樂頒度量而天下大服成王以周公有大勲勞於天下命魯公世世禘祀周公於太廟以天子之禮升歌清廟下管象舞所以異魯於天下也取周清廟之歌歌於魯太廟明魯之太廟猶周之清廟也皆所以昭文王周公之德以示子孫也易傳太初篇曰天子旦入東學晝入南學暮入西學太學在中央天子之所自學也禮記保傳篇曰帝入東學上親而貴仁入西學上賢而貴德入南學上齒而貴信入北學上貴而尊爵入太學承師而問道與易傳同魏文侯孝經傳曰太學者中學明堂之位也禮記古大明堂之禮曰膳夫是相禮日中出南闈見九侯反問於相日側出西闈視五國之事日入出北闈視帝節猷爾雅曰宫中之門謂之闈王居明堂之禮又别隂陽門東南稱門西北稱闈故周官有門闈之學師氏教以三德守王門保氏教以六藝守王闈然則師氏居東門南門保氏居西門北門也知掌教國子與易傳保傅王居明堂之禮叅相發明為學四焉文王世子篇曰凡大合樂則遂養老天子至乃命有司行事興秩節祭先師先聖焉始之養也適東序釋奠於先老遂設三老五更之席位言教學始之於養老由東方嵗始也又春夏學干戈秋冬學羽籥皆習於東序凡祭與養老乞言合語之禮皆小樂正詔之於東序又曰大司成論説在東序然則詔學皆在東序東序東之堂也學者聚焉故稱詔太學仲夏之月令祀百辟卿士之有德於民者禮記太學志曰禮士大夫學於聖人善人祭於明堂其無位者祭於太學禮記昭穆篇曰祀先賢於西學所以教諸侯之德也即所以顯行國禮之處也太學明堂之東序也皆在明堂辟廱之内月令記曰明堂者所以明天氣統萬物明堂上通於天象日辰故下十二宫象日辰也水環四周言王者動作法天地德廣及四海方此水也禮記盛德篇曰明堂九室以茅盖屋上圓下方此水名曰辟廱王制曰天子出征執有罪反釋奠於學以訊馘告樂記曰武王伐殷薦俘馘於京太室詩魯頌云矯矯虎臣在泮獻馘京鎬京也太室辟廱之中明堂太室也與諸侯泮宫俱獻馘焉即王制所謂以訊馘告者也禮記曰祀乎明堂所以教諸侯之孝也孝經曰孝悌之至通於神明光於四海無所不通詩云自西自東自南自北無思不服言行孝者則曰明堂行悌者則曰太學故孝經合以為一義而稱鎬京之詩以明之凡此皆明堂太室辟廱太學事通文合之義也其制度數各有所法堂方百四十四尺坤之策也屋圜屋徑二百一十六尺乾之策也太廟明堂方三十六丈通天屋徑九丈隂陽九六之變也圜盖方載六九之道也八闥以象八卦九室以象九州十二宫以應辰三十六户七十二牖以四户九牖乗九室之數户外皆外設而不閉示天下不藏也通天屋髙八十一尺黄鍾九九之實也二十八柱列於四方亦七宿之象也堂髙三丈以應三統四鄉五色者象其行外廣二十四丈應一嵗二十四氣四周以水象四海王者之大禮也月令篇名曰因天時制人事天子發號施令祀神受職毎月異禮故謂之月令所以順隂陽奉四時效氣物行王政也成法具偹各從時月藏之明堂所以示承祖考神明明不敢泄凟之義故以明堂冠月令自天地定位有其象聖帝明君世有紹襲盖以裁成大業非一代之事也易正月之卦曰泰其經曰王用享於帝吉孟春令曰擇元日祈穀於上帝顓頊歴衡曰天元正月巳巳朔日立春日月俱起於泰建宫室制度月令孟春之月日在營室堯典曰乃命羲和欽若昊天歴象日月星辰敬授人時令曰乃命太史守典奉法司天日月星辰之行易曰不利為宼利用禦寇令曰兵戎不起不可從我始書曰嵗二月同律度量衡中春令曰日夜分則同度量鈞衡石凡此皆合於大歴唐政其類不可盡稱戴禮夏小正傳曰隂陽生物之後王事之次則夏之月令也殷人無文及周而偹文義所説傳衍深逺宜周公之所著也官號職司與周官合周書七十二篇而月令第五十三古者諸侯朝正於天子受月令以歸而藏諸廟中天子藏之於明堂每月告􅃋朝廟出而行之周室既衰諸侯怠於禮魯文公廢告朔而朝仲尼譏之經曰閏月不告朔猶朝於廟刺舎大禮而狥小儀也自是告朔遂闕而徒用其羊子貢非廢其令而請去之仲尼曰賜也爾愛其羊我愛其禮庶明王復興君人者昭而明之稽而用之耳無逆聽令無逆政所以臻乎大順隂陽和年穀豐太平洽符瑞由此而至矣秦相呂不韋著書取月令為紀號淮南王安亦以取為第四篇改名曰時則故偏見之徒或云月令呂不韋作或云淮南皆非也月令問答問者曰子何為著月令説也予幼讀記以為月令體大經同不宜與記書雜録並行而記家記之又畧及前儒特為章句者皆用其意傳非其夲㫖乂不知月令徴驗布在諸經周官左傳實與禮記通他議横生紛紛乆矣光和元年余被謗章罹重罪徙朔方上有獫狁敵衝之釁外有冦虜鋒鏑之艱危險凜凛死亡無日遇被學者聞家就而考之亦自有所覺悟庶幾頗得事情而訖未有注記著於文字也懼顛蹶隕墜無以示後同於朽腐竊誠思之書有隂陽升降天文歴數事物制度可假以為本敦辭托説審求歴象其要者莫大於月令故遂於憂怖之中晝夜密勿昧死成之旁貫五注参互羣書至及國家律令制度遂定歴數盡天地三光之情辭繁多而蔓衍非所謂理約而達也道長日短危殆兢惕取其心盡而已故不能復加刪省盖所以探賾辨物庶幾多識前言徃行之流苟便學者以為可覽則余死而不朽也問者曰子説月令多類周官左傳假無周官左傳月令為無説乎曰夫根柢植則枝葉必相從也月令與周官竝為時王政令之記異文而同體官名百職皆周官觧月令甲子沈子所謂似春秋也若夫太昊蓐収勾芒祝融之屬左傳造義立説生名者同是以用之問者曰既用古文於歴數乃不用三統用四分何也曰月令所用参諸歴象非一家之事傳之於世不曉學者宜以當時所施行夫密近者三統已踈闊廢弛故不用也問者曰旣不用三統以驚蟄為孟春春中雨水為二月節皆三統法也獨用之何曰孟春月令曰蟄蟲始震在正月也中春始雨水則雨水二月也以其合故用之問者曰歴云小暑季夏節也而今文見於五月何也曰今不以歴節言據時始暑而記也歴於大雪小雪大寒小寒皆去十五日然則小暑當去大暑十五日不得及四十五日不以節言據時暑也問者曰中春令不用犧牲以珪璧更皮幣不犧牲何也曰是月獻羔以太牢祀髙禖宗廟之祭以中月安得用犧牲祈者求之祭也著令者豫設水旱疫癘當禱祈用犧牲者是用之助生養傳祈以幣代牲章因於髙禖之事乃造説曰更者刻木代牲如廟有祧更此説自欺極矣經典傳記無刻木代牲之説盖書有轉誤三豕渡河之類也問者曰中冬令曰奄尹申宫令謹門閭今曰門闈何也曰閹尹者内官也主宫室出入宫中宫中之門曰闈閹尹之職也閭里門非閹尹所主知當作闈也問者曰令曰七騶咸駕今曰六騶何也曰夲官職者莫正於周官天子馬六種種别有騶故知六騶左氏傳晉程鄭為乗馬御六騶屬焉無言七者知當為六也問者曰令以中秋築城郭於經傳為非其時詩曰定之方中作於楚宫定營室也九月十月之交西南方中故傳曰小昏正而裁築即營室也昏正者昏中也裁築者裁木而始築也今文在前一月不合於經傳也問者曰子説三難皆以日行為夲古論周官禮記説以為但逐惡而已獨安所取之曰取之於月令而巳四時通等而夏無難文由日行也春行少隂秋行少陽冬行太隂隂陽背使不於其類故冬春難以助陽秋難以達隂至夏節太陽行太隂自得其類無所扶助獨不難取之於是也問者曰反令毎行一時轉三旬以應行三月政也春行夏令則雨水不時謂孟夏也草木蚤枯中夏也國乃有恐季夏也今總合為一事不分别施之於三月何也曰説者見其三旬不得傳注而為之説有所滯礙不得通矣孟秋反令行冬令則草木枮後乃大水敗其城郭即分為三事後乃大水在誰後也城郭為獨自壊非水所為也季冬令曰行春令則胎夭多傷民多蠱疾命之曰逆即分為三事行季冬令為不感灾異但命之曰逆也知不得斷絶分應一月也其類皆如此令之所述略舉其尤者也問春食麥羊夏食菽雞秋食麻犬冬食黍豕之屬但以為時味之宜不合於五行月令服食器械之制皆順五行者也説所食獨不以五行不已略乎曰盖亦思之矣凡十二辰之禽五時所食者必家人所蓄丑牛未羊戌犬酉雞亥豕而已其餘龍虎以下非食也春木王木勝土土王四季四季之禽牛屬季夏犬屬季秋故未羊可以為春食也夏火王火勝金故酉雞可以為夏食也季夏土王土勝水當食豕而食牛土五行之尊者牛五畜之大者四行之牲無足以配土德者故以牛為季夏食也秋金王金勝木寅虎非可食者犬豕而無角虎屬也故以犬為秋食也冬水王水勝火當食馬而禮不以馬為牲故以其類而食豕也然則麥為木菽為金麻為火黍為水各配其牲為食也雖有此説而米鹽精粹不合於易卦所為之禽及洪範傳五事之畜近似卜筮之術故予畧之不以為章句聊以應問見有説而已問記曰三老五更子獨曰五叟周禮曰八十一御妻今曰御妾何也曰字誤也叟長老之稱其字與更相似書者轉誤遂以為更嫂字女旁瘦字從叟今皆以為更矣立字法者不以形聲何得以為字以嫂瘦推之知是更為叟也妻者齊也惟一適人稱妻其餘皆妾位最在下是以不得言妻云也正交論聞之前訓曰君子以朋友講習而正人無有淫朋是以古之交者其義敦以正其誓信以固逮夫周德始衰頌聲既寢伐木有鳥鳴之刺谷風有棄予之怨其所由来政之闕也自此以降彌以陵遲或闕其始終或彊其比周是以縉紳患其然而論者諄諄如也疾淺薄而懐攜貳者有之惡朋黨而絶交游者有之其論交也曰富貴則人爭趨之貧賤則人爭去之是以君子慎人所以交已審己所以交人富貴則無暴集之客貧賤則無棄舊之賔矣原其所以来則知其所以去見其所以始則觀其所以終彼貞士者貧賤不待夫富貴富貴不驕乎貧賤故可貴也盖朋友之道有義則合無義則離善則乆要不忘平生之言惡則忠告善誨之否則止無自辱焉故君子不為可棄之行不患人之遺已也信有可歸之德不病人之逺已也不幸或然則躬自厚而薄責於人怨其逺矣求諸己而不求諸人咎其稀矣夫逺怨稀咎之機咸在乎躬莫之致也子夏之門人問交於子張而二子各有聞乎夫子然則以交誨也商也寛故告之以拒人師也褊故訓之以容衆各從其行而矯之至於仲尼之正教則泛愛衆而親仁故非善不喜非仁不親交游以方㑹友以文可無貶也穀梁赤曰心志既通名譽不聞友之罪也今將患其流而塞其源病其末而刈其夲無乃未若擇其正而黜其邪與與其彼農皆黍而獨稷焉夫黍亦神農之嘉穀與稷並為粢盛也使交可廢則黍其愆矣括二論而言之則刺薄者博而洽斷交者貞而孤孤有羔羊之節與其不獲巳而矯時也走將從夫孤焉桓彬論彬麟之子少與蔡邕齊名仕尚書郎厲志操以忤宦黨免官卒邕等共論序其志乃樹碑而頌焉彬有過人者四夙智早成岐嶷也學優文麗至通也仕不苟禄絶髙也辭隆從窳絜操也後漢書銘論太平御覽集不載春秋之論銘也曰天子令德諸侯言時計功大夫稱伐昔肅慎納貢銘之楛矢所謂天子令德者也黄帝有巾几之法孔甲有槃杅之誡殷湯有甘誓之勒讒鼎有丕顯之銘武王踐阼咨太師作席几楹杖器械之銘十有八章周廟金人緘口書背銘之以慎言亦所以勸進人主朂乎令德者也呂尚作周太師封於齊其功銘於昆吾之冶獲寳鼎於美陽仲甫有補衮闕誡百辟之功周禮司勲凡有大功銘之太常所謂諸侯言時計功者也宋大夫正考父三命兹益㳟而莫侮其國衛孔悝之祖莊叔隨漢陽左右獻公衛國頌之皆銘乎鼎晉魏顆獲秦杜回於輔氏銘功于景鐘所謂大夫稱伐者也鐘鼎禮樂之器昭德紀功以示子孫物不朽者莫不朽於金石故近世以来咸銘之於碑德非此族不在銘典文選注鉊論昔召公作誥先王賜朕鼎出於武當曽水上始加元服與羣臣上夀伏惟陛下應天淑靈丁期中興誕在幼齡聖姿碩義威儀孔偹俯仰龍光顔如日星言稽典謨動蹈規矩緝熙光明思齊周成早智夙就叅美顯宗令月吉日始加元服進御幘結以章天休臣妾萬國遐邇大小同喜逸豫式歌且舞臣等不勝踊躍鳬藻謹奉生頭酒九鍾稽首再拜上千萬夀陛下享兹吉福永守皇極通遵太和靖綏六合宜民宜人受禄于天書曰一人有慶兆民頼之其寜惟永詩曰顒顒卬卬如珪如璋令聞不忘萬夀無疆宗廟祝嘏辭嗣曽孫皇帝某敢昭告於皇祖髙皇帝各以后配昔受命京師都於長安享國十有一世歴年二百一十載遭王莽之亂宗廟隳壊世祖復帝祚遷都洛陽以服土中享國一十一世歴年一百六十五載予末小子遭家不造早統洪業奉嗣無疆闗東吏民敢行稱亂總連州縣擁兵聚衆以圖叛逆震驚王師命將征服股肱大臣推皇天之命以已行之事遷都舊京昔周德缺而斯干作應運變通自古有之於是乃以三月丁亥来自雒越三月丁已至於長安飭躬不慎寢疾旬日賴祖宗之靈以獲有瘳言旦齋宿敢用潔牲一元大武柔毛剛鬛商祭明祀薌合嘉蔬香萁醎鹺豐夲明粢醴酒用告遷来尚饗九祀辭髙皇帝使工祝承致多福無疆於爾嗣曽孫皇帝使爾受禄于天宜此舊都萬國和同兆民康又眉夀萬年子子孫孫永守民庶勿替引之祝社文白帖下三條集並不載元正令午時惟嘉良乾坤交泰太簇運陽乃祀社靈以祈福祥祓褉祝文北堂書鈔洋洋暮春厥自祓除有求百福在洛水涘祖餞祝太平御覽今嵗淑月日吉時良爽應孔嘉君當遷行神龜吉兆休氣煌煌蓍卦利貞天見三光鸞鳴噰噰四牡彭彭君既升與道路開張風伯雨師洒道中央陽燧求福蚩尤辟兵倉龍夾轂白虎扶行朱雀道引元武作侶勾陳居中厭伏四方徃臨邦國長樂無疆東漢文紀卷二十
