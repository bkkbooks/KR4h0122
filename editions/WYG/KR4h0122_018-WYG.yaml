body:
  text: 東漢文紀巻十八明梅鼎祚編劉囂字重寧長沙人厯太僕司空上靈帝立宋皇后奏尚書令臣囂僕射臣鼎尚書臣旭臣乘臣謨臣詣稽首言伏惟陛下履乾則坤動合隂陽羣臣大小咸以長秋宫未定遵舊依典章表仍聞厯時乃聽今月吉日以宋貴人為皇后應期正位羣生兆庶莫不式舞易稱受兹介祉詩云干禄百福子孫千億萬方幸甚今吉日以定臣請太傅太常條列禮儀正處上羣臣妾無得上壽如故事臣囂臣鼎臣旭臣乘臣滂臣謨臣詣愚闇不達大義誠惶誠恐頓首死罪稽首再拜以聞楊賜字伯獻𢎞農華隂人太尉震孫秉子厯位司空上靈帝論青蛇災異疏賜侍講靈帝於華光殿遷少府光禄勲熹平元年青蛇見御座帝以問賜賜上封事臣聞和氣致祥乖氣致災休徵則五福應咎徵則六極至夫善不妄來災不空發王者心有所惟意有所想雖未形顔色而五星以之推移隂陽為其變度以此而觀天之與人豈不符哉尚書曰天齊乎人假我一日是其明徵也夫皇極不建則有蛇龍之孽詩云惟虺惟蛇女子之祥故春秋兩蛇鬬於鄭門昭公殆以女敗康王一朝晏起關雎見㡬而作夫女謁行則讒夫昌讒夫昌則苞苴通故殷湯以之自戒終濟亢旱之災惟陛下思乾剛之道别内外之宜崇帝乙之制受元吉之祉抑皇甫之權割艷妻之愛則蛇變可消禎祥立應殷戊宋景其事甚明手書密諫靈帝疏賜熹平五年為司徒是時朝廷爵授多不以次帝好微行游幸外苑賜復上疏臣聞天生蒸民不能自理故立君長使司牧之是以唐虞兢兢業業周文日昃不暇明慎庶官俊乂在職三載考績以觀厥成而今所序用無他德有形埶者旬日累遷守真之徒厯載不轉勞逸無别善惡同流北山之詩所為訓作又聞數微行出幸苑囿觀鷹犬之埶極槃遊之荒政事日墮大化陵遲陛下不顧二祖之勤止追慕五宗之美蹤而欲以望太平是由曲表而欲直景郤行而求及前人也宜絶慢慠之戱念官人之重割用板之恩慎貫魚之次無令醜女有四殆之歎遐邇有憤怨之聲臣受恩偏特忝任師傅不敢自同凡臣括囊避咎謹自手書密上蜺妖對奏賜復拜光禄大夫光和五年有虹蜺晝降嘉德殿前帝引賜及議郎蔡邕等入金商門崇德署使中常侍曹節王甫問以祥異禍福所在賜仰天而歎乃書對甚忤節等邕坐直對抵罪賜以師傅恩得免臣聞之經傳或得神以昌或得神以亡國家休明則鑒其德邪辟昏亂則視其禍今殿前之氣應為虹蜺皆妖邪所生不正之象詩人所謂蝃蝀者也於中孚經曰蜺之比無德以色親方今内多嬖倖外任小臣上下並怨諠譁盈路是以災異屢見前後丁寧今復投蜺可謂孰矣按春秋纎曰天投蜺天下怨海内亂加四百之期亦復垂及昔虹貫牛山管仲諫桓公無近妃宫易曰天垂象見吉凶聖人則之今妾媵嬖人閹尹之徒共專國朝欺罔目月又鴻都門下招㑹羣小造作賦說以蟲篆小技見寵於時如驩兠共工更相薦說旬月之間並各拔擢樂松處常伯任芝居納言郄儉梁鵠俱以便辟之性佞辯之心各受豐爵不次之寵而令縉紳之徒委伏畎畝口誦堯舜之言身蹈絶俗之行棄捐溝壑不見逮及冠履倒易陵谷代處從小人之邪意順無知之私欲不念板蕩之作虺蜴之誡殆哉之危莫過於今幸賴皇天垂象譴告周書曰天子見怪則修德諸侯見怪則修政卿大夫見怪則修職士庶人見怪則修身唯陛下慎經典之誡圖變復之道斥逺佞巧之臣速徵鶴鳴之士内親張仲外任山甫斷絶尺一抑止槃遊留思庶政無敢怠遑冀上天還威衆變可弭老臣過受師傅之任數蒙寵異之恩豈敢愛惜垂沒之年而不盡其慺慺之心哉諫造畢圭靈琨苑疏五年冬賜拜少府光禄勲復上疏奏帝欲止以侍中任芝等諂言遂令築苑竊聞使者並出規度城南人田欲以為苑昔先王造囿裁足以修三驅之禮薪萊芻牧皆悉往焉先帝之制左開鴻池右作上林不奢不約以合禮中今猥規郊城之地以為苑囿壞沃衍廢田園驅居人畜禽獸殆非所謂若保赤子之義今城外之苑巳有五六可以逞情意順四節也宜推夏禹卑宫太宗露臺之意以慰下民之勞與王允書允字子師太原祁人厯司徒誅董卓為其黨李傕所殺允為豫州刺史破黄巾别黨於賊中得中常侍張讓書允具以聞靈帝深切責讓讓由是怨允譖之於帝詔徵允治罪遇赦還官後百餘日復徵賜為太尉與允書何進請得減死若以張讓事百日再徵宜深思之漢紀范曄後漢書賜不欲允更楚辱遣客謝之曰君以張讓之事故一月再徵凶慝難量幸為深計袁隗字次陽汝南汝陽人厯位太傅為董卓所誅與人書趙瑤在緱氏猛虎歛跡百里均耳叔平何難華陽國志按華陽志趙瑤字元珪琰字稚珪南鄭人凡七兄弟皆以令德著聞瑤少有公望始為緱氏袁趙二公相與書亦不言袁趙為何尺牘作袁隗與人聊從之歛跡一作歸跡謝弼字輔宣東郡武陽人仕府丞去官忤中常侍曹節從子東郡太守紹收考死上靈帝陳得失疏建寧二年詔舉有道之士弼對䇿除郎中時青蛇見前殿大風拔木弼應詔上封事左右惡之出為廣陵府丞志作熹平元年臣聞和氣應於有德妖異生乎失政上天告譴則王者思其愆政道或虧則姦臣當其罰夫蛇者隂氣所生鱗者甲兵之符也鴻範傳曰厥極弱時則有蛇龍之孽又熒惑守亢裴囬不去法有近臣謀亂發於左右不知陛下所與從容帷幄之内親信者為誰宜急斥黜以消天戒臣又聞惟虺惟蛇女子之祥伏惟皇太后定策宫闥援立聖明書云父子兄弟罪不相及竇氏之誅豈宜咎延太后幽隔空宫愁感天心如有霧露之疾陛下當何面目以見天下昔周襄王不能敬事其母戎狄遂至交侵孝和皇帝不絶竇氏之恩前世以為美談禮為人後者為之子今以桓帝為父豈得不以太后為母哉援神契曰天子行孝四夷和平方今邉境日蹙兵革蜂起自非孝道何以濟之願陛下仰慕有虞蒸蒸之化俯思凱風慰母之念臣又聞爵賞之設必酬庸勲開國承家小人勿用今功臣久外未蒙爵秩阿母寵私乃享大封大風雨雹亦由於兹又故太傅陳蕃輔相陛下勤身王室夙夜匪懈而見䧟羣邪一旦誅滅其為酷濫駭動天下門生故吏並離徙錮蕃身巳往人百何贖宜還其家屬解除禁網夫台宰重器國命所繼今之四公唯司空劉寵斷斷首善餘皆素餐致寇之人必有折足覆餗之凶可因災異並皆罷黜徵故司空王暢長樂少府李膺並居政事庶災變可消國祚惟永臣山藪頑闇未逹國典策曰無有所隱敢不盡愚用忘諱忌伏惟陛下裁其誅罰張奐字然明敦煌酒泉人厯遷少府大司農以忤宦官禁錮歸田里上靈帝言災應疏建寧二年夏青蛇見御坐軒前又大風雨雹霹靂拔樹詔言災應奐時拜大司農上疏上深納之臣聞風為號令動物通氣木生於火相須乃明蛇能屈伸配龍騰蟄順至為休徵逆來為殃咎隂氣專用則凝精為雹故大將軍竇武太傅陳蕃或志寧社稷或方直不囘前以讒勝並伏誅戮海内黙黙人懷震憤昔周公葬不如禮天乃動威今武蕃忠貞未被明宥妖𤯝之來皆為此也宜急為改葬徙還家屬其從坐禁錮一切蠲除又皇太后雖居南宫而恩禮不接朝臣莫言逺近失望宜思大義顧復之報奏記司𨽻校尉段熲奐前為度遼將軍與熲爭撃羌不平及熲為司𨽻欲逐熲歸敦煌將害之奐憂懼奏記謝熲熲雖剛猛省書哀之卒不忍也小人不明得過州將千里委命以情相歸足下仁篤照其辛苦使人未反復獲郵書恩詔分明前以寫白而州期切促郡縣惶懼屏營延企側待歸命父母朽骨孤魂相託若蒙矜憐壹惠咳唾則澤流黄泉施及㝠寞非奐生死所能報塞夫無毛髮之勞而欲求人邱山之用此淳于髠所以拊髀仰天而笑者也誠知言必見譏然猶未能無望何者朽骨無益於人而文王葬之死馬無所復用而燕昭寳之儻同文昭之德豈不大哉凡人之情寃則呼天窮則叩心今呼天不聞叩心無益誠自傷痛俱生聖世獨為匪人孤微之人無所告訴如不哀憐便為魚肉企心東望無所復言後漢書漢官儀司𨽻州部河南雒陽管三輔三河𢎞農七郡故熲稱曰州將焉與延篤書奐為使匈奴中郎將坐梁冀故吏免官禁錮四歲復拜武威太守按書京師有禁急之語疑是時與篤書惟别三年無一日之忘京師禁急不敢相聞豈不懷歸畏此簡書年老氣衰智盡謀索每有所處違宜失便北為兒車所讐中為馬循所困真欲入三泉之下復鎮之以大石厄乎此時也且太隂之地氷厚三尺木皮三寸風寒慘洌剝肌傷骨但此自非老憊者所堪而復加之以師旅因之以饑饉衆難聚集不可一二言也聾盲日甚氣力寖衰神耶當復相見者從此辭矣藝文類聚延篤荅張奐書離别三年夢想言念何日有違伯英來惠書盈四紙讀之三復喜不可言並藝文類聚離書鈔作惟言作憶惠書盈四紙作惠紙四張三復作反復選注引與奐書云烈士殉名立功立事也又與延篤書吾與叔堅剖心相知豈以流言相猜邪初學記誡兄子書汝曹薄祜早失賢父財單藝盡今適喘息聞仲祉輕傲耆老侮狎同年極口恣意當崇長幼以禮自持燉煌有人來同聲相道皆稱叔時寛仁聞之喜而且悲喜叔時得美稱悲汝得惡論經言孔子於鄉黨恂恂如也恂怐者恭謙之貌也經難知且自以汝資父為師汝父寧輕鄉里耶年少多失改之為貴蘧伯玉年五十見四十九年非但能改之不可不思吾言不自克責反云張甲謗我李乙怨我我無是過爾亦巳矣與宋季文書覽手迹知遂遵南山之志繼四賢之蹤時止則止時行則行其道光明奐以鄙固少復道訓于今五十載矣與隂氏書篤念既密文章燦爛名實相副奉讀周旋紙弊墨渝不離于手報崔子玉書永夀元年奐為安定屬國都尉撃南匈奴瑗以順帝時卒此疑與寔今月三日舉家來此本非所規貪突賊陣並藝文類聚與崔子真書寔字子真一名台台字元始瑗子僕以元年到任有見兵二百馬如羖羊矛如錐錟楯如榆葉羖羊一作牾錐錟一作鐵錐選注引奐與崔元始書云匈奴若非其罪何肯吞聲又與崔子書人生實難所務非此與孟季尉書尉一作衛素苦悸逆頃者益甚百病所歸月衰日損並太平御覽與許季師書不面之濶悠悠曠久饑渇之念豈當有忘選注選注與屯留君書氣厲流行傷賢害善與公超書下筆愴恨泣先言流張楷字公超遺命光和四年卒諸子從之吾前後仕進十要銀艾不能和光同塵為讒邪所忌通塞命也始終常也但地底㝠㝠長無曉期而復纒以纊緜牢以釘密為不喜耳幸有前窀朝殞夕下措屍靈牀幅巾而巳奢非晉文儉非王孫推情從意庶無咎吝窀續漢書作穿張芝字伯英奐之子太尉辟公車有道徵皆不至號張有道與太僕朱賜書賜杜陵人時稱上書趙襲燉煌太守先是杜伯度崔子玉以工草書稱於前世襲與羅暉亦以能草頗自矜誇故芝嘗與襲同郡太僕朱賜書王愔文字志度字伯度京兆杜陵人三輔決錄注襲字元嗣先是杜伯度崔子玉以工草書稱于前代襲與羅暉拙書見蚩於張伯英英頗自矜高與朱賜書王僧䖍名書錄羅暉趙恭與芝同時見稱西州衆頗惑之芝與朱寛書自白上比崔杜不足下方羅趙有餘藝文類聚與朱使君書正氣可以銷邪人無其釁妖不自作後漢趙一非草書云竊覽有道張君所與朱使君書稱云云誠可謂信道抱真知命樂天者也若夫褒杜崔沮羅趙忻忻有自臧之意者無乃近於矜伎賤彼貴我哉與李幼才書弭生字仲叔其父賤故伯英與李幼才書弭仲叔高德美名命世之才非弭氏小族所當有新豐瘠土所當出也三輔決錄注張昶字文舒芝弟並善草書西嶽華山堂闕碑銘文并書易曰天地定位山澤通氣然山莫尊於嶽澤莫盛於瀆山嶽有五而華處其一瀆有四而河在其數其靈也至矣聖人廢興必有其應故岱山石立中宗繼統太華受璧秦胡絶緒白魚入舟姬武建業寳珪出水子朝喪位布五方則處其西列三條則居其中若廣袤竒蟲山經有紀矣是以帝王巡狩親五嶽而告至覲方后而考禮故經有望秩之禋典有生殖之祀葢所以崇山川而報功也四海一統天子秉其禮諸侯力政疆國攝其祭奉其邑曰華隂也久矣乃紀於禹貢而分秦晉之境奉鄙晉之西則曰隂晉邊秦之東則曰寧秦邑既遷徙禮亦如之二國力爭以奉以祭其城險固基趾猶存故老之言未殞於民也逮至大漢受命克亂不愆不忘舊名是復率禮不越故祀是尊厯葉增修䖍恭又備一禱三祀終歲而四以迄于今而世宗又經集靈之宫於其下想喬松之疇是遊是憇郡國方士自逺而至者充巖塞崖鄉邑巫覡宗祀乎其中者盈谷溢谿咸有浮飄之志愉悅之色必雲霄之路可升而越果繁昌之福可降而致也故殖財之寳黄玉自出令德之珍卿相是毓匪惟嵩高降生申甫此亦有焉天有所興必先廢之故殷宗周宣以衰致盛是時也王業中缺大化陵遲郡縣既毁財匱禮乏庭廟傾壞壇塲蕪穢祭祀之禮有缺焉於是鎮逺將軍領北地太守􅂒鄉亭侯段君諱煨字忠明自武威占此土慿託河華二靈是與故能以昭烈之德享上將之尊御命持重屯斯寄國討叛柔服威懷是示羣兇既除郡縣集寧家給人足戸有樂生之歡朝釋西顧之慮而懷關中之恃雖昔蕭相輔佐之功功冠羣后弗以加也遂解甲休士陣而不戰以逸其力修飾享廟壇塲之位荒而復辟禮廢而復興又造祠堂表以參闕建神路之端首觀壯麗乎孔徹然后旅祀祈請既有常處雖雨霑衣而禮不廢於是邑之士女咸曰宜之乃建碑刻石垂示後裔其辭曰於穆堂闕堂闕昭明經之營之不日而成匪奢匪儉惟德是程匪豐匪約惟禮是榮䖍恭禋祀黍稷芬馨神具醉止降福穰穰盧植字子幹涿郡涿人厯北中郎將遷尚書獻大將軍竇武書武字游平扶風平陵人桓皇后父拜大將軍封聞喜侯武援立靈帝初秉朝政朝議欲加封爵植布衣以武素有名譽獻書規之武不能用植聞嫠有不恤緯之事漆室有倚楹之戚憂深思逺君子之情夫士立爭友義貴切磋書陳謀及庶人詩詠詢于芻蕘植誦先王之書久矣敢愛其瞽言哉今足下之於漢朝猶旦奭之在周室建立聖主四海有繫論者以為吾子之功於斯為重天下聚目而視攢耳而聽謂凖之前事將有景風之祚尋春秋之義王后無嗣擇立親長年均以德德均則決之卜筮今同宗相後披圖案牒以次建之何勲之有豈横叨天功以為巳力乎宜辭大賞以全身名又比世祚不競仍外求嗣可謂危矣而四方未寧盜賊伺隙恒岳渤碣特多姦盜將有楚人脅比尹氏立朝之變宜依古禮置諸子之官徵王侯愛子宗室賢才外崇訓導之義内息貪利之心簡其良能隨用爵之彊幹弱枝之道也後漢書初學記引盧植奏事云王后無子擇立長親年均以德德均決之以卜筮所以承先祖也論五經文字書熹平四年植以疾去九江太守作尚書章句三禮解詁時始立太學石經以正五經文字植上書後拜議郎校經東觀臣少從通儒故南郡太守馬融受古學頗知今之禮記特多回冗臣前以周禮諸經發起粃謬敢率愚淺為之解詁而家之無力供繕寫上願得將能書生二人共詣東觀就官財糧專心研精合尚書章句考禮記失得庶裁定聖典刋正碑文古文科斗近於為寳而厭抑流俗降在小學中興以來通儒逹士班固賈逵鄭興父子並敦悅之今毛詩左氏周禮各有傳記其與春秋共相表裏宜置博士為立學官以助後來以廣聖意光和元年日食上封事帝不省臣聞五行傳日晦而月見謂之朓王侯其舒此謂君政舒緩故日食晦也春秋傳曰天子避位移時言其相掩不過移時而間者日食自巳過午既食之後雲霧晻曖比年地震慧孛互見臣聞漢以火德化當寛明近色信讒忌之甚者如火畏水故也按今年之變皆陽失隂侵消禦災凶宜有其道謹畧陳八事一曰用良二曰原禁三曰禦癘四曰備寇五曰修禮六曰遵堯七曰御下八曰散利用良者宜使州郡覈舉賢良隨方委用責求選舉原禁者凡諸黨錮多非其罪可加赦恕申宥回枉禦癘者宋后家屬並以無辜委骸横尸不得收葬疫癘之來皆由於此宜勅收拾以安遊魂備寇者侯王之家賦稅減削愁窮思亂必致非常宜使給足以防未然修禮者應徵有道之人若鄭𤣥之徒陳明洪範禳服災咎遵堯者今郡守刺史一月數遷宜依黜陟以章能否縱不九載可滿三歲御下者請謁希爵一宜禁塞遷舉之事責成主者散利者天子之體理無私積宜𢎞大務蠲畧細微酈文勝誄北堂書鈔自齓未成童著書十餘箱文體思奥爛有文章箴縷百家奏事初學記后妃者所以郊天祀地祗奉祖宗外以肅恭明神内以率正九嬪理隂陽者猶天之有地陽之有隂奏事北堂書鈔邱明傳囊括古今表裏人事趙祜畢整請追尊虞大家陳夫人奏續漢書孝順虞大家孝冲皇帝母也遭冲質俱夭政在梁氏故與質帝母俱抑而無號熹平四年小黄門趙祜議郎畢整上言上即日拜大家為貴人陳夫人為孝王妃使中常侍持節就園授印綬春秋之義母以子貴孝冲皇帝母虞大家質皇帝母渤海陳夫人皆誕生聖帝未有稱號今遭盛明當以母氏載序外戚朝廷之恩臣子雖賤尚有追贈況二母見字而徒曰大家夫人非所以示後進母以子貴之義後漢紀載畢整疏云孝冲皇帝母虞大家質帝母陳夫人皆誕肓聖明而未有諡號今當以母氏序列于外戚雖在薨歿猶宜爵贈況二母見存而無寵榮者乎即違母以子貴之義又不可以示後世曹鸞訟黨人書後漢紀靈帝熹平四年鸞為永昌太守上書訟黨人有司奏檻車徵棄市夫黨人者或耆年淵德或衣冠英賢皆宜股肱王室左右大猷者也而久被禁錮辱在泥塗謀反大逆尚蒙赦宥黨人何罪獨不開恕乎所以災異屢見水旱薦臻皆由於斯宜加沛然以副天心和海論黨禁奏光和二年上禄長和海上言靈帝覽悟黨錮自從祖以下皆解釋禮從祖兄弟别居異財恩義巳輕服屬疎未而今黨人錮及五族既乖典訓之文有謬經常之法李咸字元貞汝南人厯位太尉在朝忠清竇太后宜祔塟宣陵書後漢紀太后父大將軍武謀誅宦官亊泄被害遷太后南宫及崩中常侍曹節王甫欲用貴人禮靈帝以為太后所親立發喪成服而節等又欲别葬太后馮貴人袝桓帝公卿更議皆從廷尉陳球議奏御乃定曄書小異祔臣聞禹湯聞惡是用無過桀紂聞善以亡其國中常侍曹節張讓王甫等因寵乘勢賊害忠良讒譖故大將軍竇武太傅陳蕃虚遭無形之舋被以滔天之罪陛下不復省覽猥發雷霆之怒海内賢愚莫不痛心武以歿矣無可奈何皇太后親與孝桓皇帝共奉宗廟母養蒸庶繫于天心仁風豐霈四海所宗禮為人後者為人之子陛下仰繼元帝豈得不以太后為母存既未蒙顧復之報歿又不聞諒闇之衰太后未崩武先坐誅存亡各異事不相逮而恚武不已欲貶太后非崇有虞之孝昭蒸蒸之仁八方聞之莫不泣血昔秦始皇后不謹陷幸郎吏始皇暴怒幽閉母后感茅焦之言立駕迎母置酒作樂供養如初夫以秦后之惡始皇之悖尚納茅焦之語不失母子之恩豈先太后不以罪沒陛下之過有重始皇臣謹冐昧陳誠左手賫章右手執藥詣闕自聞唯陛下揆茅焦之諫𢎞始皇之悟復母子之恩崇皇太后園陵之禮上釋皇乾震動之怒下解黎庶酸楚之情也如遂不省臣當飲鴆自裁下覲先帝具陳得失終不為刀鋸所裁同前後漢書陳球傳云詔公卿㑹議太尉李咸時病乃起擣椒自隨坐者數百人各瞻望球操筆下議咸始不敢先發見球辭正然後大言與臣意合曹等以梁后别葬懿陵武帝黜廢衛后為比持不可咸詣闕上疏帝省奏乃定按此疏在議後紀則書在議煎此為球先發紀為咸先發而河南尹太尉官亦不同臣伏惟章德竇后虐害恭懐安思閻后家犯惡逆而和帝無異葬之議順朝無貶降之文至於衛后孝武皇帝身所廢弃不可以為比今長樂太后尊號在身親嘗稱制坤育天下且援立聖明光隆皇祚太后以陛下為子陛下豈得不以太后為母子無黜母臣無貶君宜合塟宣陵一如舊制陳球字伯真下邳淮浦人厯永樂少府為宦官所害竇太后配袝議皇太后自在椒房有聰明母儀之德遭時不造援立聖明承繼宗廟功烈至重先帝晏駕因遇大獄遷居空宫不幸早世家雖獲罪事非太后今若别葬誠失天下之望且馮貴人冡墓被發骸骨暴露與賊併尸魂靈汙染且無功於國何宜上配至尊勸劉郃書球為永樂少府乃潛與司徒河間劉郃謀誅宦官初郃兄侍中儵與大將軍竇武同謀俱死故郃與球相結事未及發球復以書勸郃陽球小妻程璜女宫中用事節等頗聞知因白靈帝郃等嘗與藩國交通又受取狼藉皆下獄死公出自宗室位登台鼎天下瞻望社稷鎮衛豈得雷同容容無違而巳今曹節等放縱為害而久在左右又公兄侍中受害節等永樂太后所親知也今可表徙衛尉陽球為司𨽻校尉以次收節等誅之政出聖主天下太平可翹足而待也後漢書桓帝母孝崇皇后宫曰永樂陽球字方正漁陽泉州人厯司𨽻校尉徙衛尉忤宦官曹節等誅死傳在酷吏平原相教球初為高唐令以嚴苛郡守收舉㑹赦見原後厯遷平原相出教郡中咸畏服焉相前􅊩高唐志掃姦鄙遂為貴郡所見枉舉昔桓公釋管仲射鉤之讐高祖赦季布逃亡之罪雖以不德敢忘前義況君臣分定而可懷宿昔哉今一蠲往愆期諸來效若受教之後而不改姦狀者不得復有所容矣奏罷鴻都文學疏靈帝光和元年置鴻都門學其諸生皆用州郡三公舉用辟召士君子皆耻與爲列焉球拜尚書令奏伏承有詔勅中尚方為鴻都文學樂松江覽等三十二人圖象立贊以勸學者臣聞傳曰君舉必書書而不法後嗣何觀案松覽等皆出於微蔑斗筲小人依慿世戚附託權豪俛眉承睫徼進明時或獻賦一篇或鳥篆盈簡而位升郎中形圖丹青亦有筆不㸃牘辭不辯心假手請字妖偽百品莫不被蒙殊恩蟬蛻滓濁是以有識掩口天下嗟嘆臣聞圖象之設以昭勸戒欲令人君動鑒得失未聞豎子小人詐作文頌而可妄竊天官垂象圖素者也今太學東觀足以宣明聖化願罷鴻都之選以消天下之謗劾中常侍王甫太尉段熲奏球光和二年拜司𨽻校尉詣闕謝恩㑹甫沐下舍球奏甫及熲收下獄甫父子併死杖下中常侍冠軍將軍王甫奉職多姦邪以事上其所彈糾皆由睚眦渤海之誅宋后之廢甫之罪也太尉段熲以征伐微功位極人臣不能竭忠報國而謟佞幸宜並誅戮以示海内審忠字公誠梁人仕郎中宦官誅後辟公府上靈帝論朱瑀等書瑀初為長樂五官史與中常侍曹節等害竇武陳蕃並封侯瑀更封華容侯光和初連災異忠以為瑀等罪惡所感乃上書不報臣聞理國得賢則安失賢則危故舜有臣五人而天下理湯舉伊尹不仁者逺陛下即位之初未能萬機皇太后念在撫育權時攝政故中常侍蘇康管霸應時誅殄太傅陳蕃大將軍竇武考其黨與志清朝政華容喉朱瑀知事覺露禍及其身遂興造業謀作亂王室撞蹋省闥執奪璽綬迫脅陛下聚㑹羣臣離間骨肉母子之恩遂誅蕃武及尹勲等因其割裂城社自相封賞父子兄弟被蒙尊榮素所親厚布在州郡或登九列或據三司不惟禄重位尊之責而茍營私門多蓄財貨繕修第舍連里竟巷盜取御水以作魚釣車馬服玩擬於天家羣公卿士杜口吞聲莫敢有言州郡牧守承順風㫖辟召選舉釋賢取愚故蟲蝗為之生夷寇為之起天意憤盈積十餘年故頻歲月食於上地震於下所以譴戒人主欲令覺悟誅鉏無狀昔高宗以雉雊之變故獲中興之功近者神祗啓悟陛下發赫斯之怒故王甫父子應時馘􅎒路人士女莫不稱善若除父母之讐誠怪陛下復忍孽臣之類不悉殄滅昔秦信趙高以危其國呉使刑人身遘其禍虞公抱寳牽馬魯昭見逐乾侯以不用宫之竒子家駒以至滅辱今以不忍之恩赦夷族之罪姦謀一成悔亦何及臣為郎十五年皆耳目聞見瑀之所為誠皇天所不復赦願陛下留漏刻之聽裁省臣表埽滅醜類以荅天怒與瑀考驗有不如言願受湯鑊之誅妻子并徙以絶妄言之路張鈞虎見奏光和三年夏虎見平樂觀又見憲陵鈞為中郎將上言虎見憲陵又見平樂觀下𨽻皆訛言也洪範之論言之不從則毛蟲之孽虎者西方之獸為禽剛猛强梁之物也居而穴處不可覩見今於先帝園陵為害又言見於城下皆在位者仁恩不著有苛尅殺戮之意乎此乃大兵劇賊之徵不可不防也後漢紀論十常侍疏是時張讓趙忠及夏惲等十人皆為中常侍封侯貴寵黄巾既作盜賊糜沸郎中中山張鈞上書靈帝以示讓等皆乞自致洛陽獄詔視事如故遂誣奏鈞學黄巾道收掠死獄中竊惟張角所以能興兵作亂萬人所以樂附之者其源皆由十常侍多放父兄子弟婚親賔客典據州郡酤榷財利侵掠百姓百姓之寃無所告訴故謀議不軌聚為盜賊宜斬十常侍懸頭南郊以謝百姓又遣使者布告天下可不須師旅而大寇自消後漢書陳雅字伯臺成固人終巴郡太守諫用閹宦用事疏雅靈帝時為諫大夫上疏不納出為巴郡太守昔孝和帝與中常侍鄭衆謀誅大將軍竇憲由是宦官秉權安帝幼冲和熹太后兄大將軍鄧騭輔政大后適崩中常侍江京等殺騭安帝登遐黄門孫程又殺車騎將軍閻顯孝桓帝又與中常侍單超等共誅大將軍梁冀陛下即祚太傅陳蕃大將軍竇武尚書令尹勲等欲誅宦官絶其奸擅盡忠王室建萬世策機事不密為中常侍朱瑀等所殺此即陛下所見今宦官强盛威傾人主天下鉗口莫敢言者海内怨望妖孽並作四方兵起萬姓辛苦陛下尚可以安奈後嗣何華陽國志傳爕字南容北地靈州人厯漢陽太守與賊戰歿上靈帝論宦官疏爕為䕶軍司馬與左中郎將皇甫嵩討賊張角爕素疾中官既行上疏宦者惡之及賊破功多以譖不得封臣聞天下之禍不由於外皆興於内是故虞舜升朝先除四凶然後用十六相明惡人不去則善人無由進也今張角起於趙魏黄巾亂於六州此皆釁發蕭牆而禍延四海者也臣受戎任奉辭伐罪始到潁川戰無不尅黄巾雖盛不足為廟堂憂也臣之所懼在於治水不自其源末流彌增其廣耳陛下仁德寛容多所不忍故閹豎弄權忠臣不進誠使張角梟夷黄巾變服臣之所憂甫益深耳何者夫邪正之人不宜共國亦猶冰炭不可同器彼知正人之功顯而危亡之兆見皆將巧辭飾說共長虛偽夫孝子疑於屢至市虎成於三夫若不詳察真偽忠臣將復有杜郵之戮矣陛下宜思虞舜四罪之舉速行讒佞放殛之誅則善人思進姦凶自息臣聞忠臣之事君猶孝子之事父也子之事父焉得不盡其情使臣身備鈇鉞之戮陛下少用其言國之福也涼州不宜棄對爕拜議郎西羌反邊章韓遂作亂司徒崔烈以為宜棄涼州爕廷叱烈可斬尚書郎奏劾爕靈帝以問爕爕對由是朝廷重其方畧昔冒頓至逆也樊噲為上將願得十萬衆横行匈奴中憤激思奮未失人臣之節顧計當從與不耳季布猶曰噲可斬也今涼州天下要衝國家藩衛高祖初興使酈商别定隴右世宗拓境列置四郡議者以為斷匈奴右臂今牧御失和使一州叛逆海内為之騷動陛下卧不安寢烈為宰相不念為國思所以弭之之策乃欲割棄一方萬里之土臣竊惑之若使左袵之虜得居此地士勁甲堅因以為亂此天下之至慮社稷之深憂也若烈不知之是極蔽也知而故言是不忠也傅幹字彦林小字别成爕子知名位至扶風太守王命敘昔在唐虞之禪列于帝典殷周之代敘于詩書天之厯數昭焉著明周篤后稷公劉積德行仁至乎文武遂成王業雖五德殊運或禪或征其變化應天與時消息其道一也故雖有威力非天命不授雖有運命非功烈不章自我高祖襲唐之統受命龍興討秦滅項光有萬國世祖攘亂奄復帝宇人鬼協謀徵祥煥然皆順乎天而應乎人也然則帝王之起必有天命瑞應自然之符明統顯祚豐懿之業加以茂德成功賢智之助而後君臨兆民為神明所保祐永世所尊崇未見運敘無紀次勲澤不加於民而可力爭覬覦神器者也豪桀見二祖無尺地之階為專智力乘釁而起不知天祚聖哲帝王自有真也哀哉非徒闇於將來又不考之於既往矣自開闢以來姦雄妄動不識天命勇如蚩尤强如共工威如夷羿然皆從分横裂為天下戒況淺智小才勇不足畏强不足憚未有成資而敢失順視不軌之事也哉夫行潦之流不致江海之深邱垤之資不成太山之高魚鼈之類不希雲龍之軌一官之守不經天人之變當王莽之末英雄四起而鄧禹耿弇識世祖之福祚贏糧間行進其策謀遂荷疏附之任享佐命之寵張𤣥慕蘇秦蒯通之業周旋囂述西說竇融言未及終而梁統巳誅之矣禹弇見命祚之兆其福如彼張𤣥蔽逆順之理其禍如此審斯二事趣舍之分明矣且世祖之興有四一曰帝皇之正統二曰形相多異表三曰體文而知武四曰履信而好士加之以聰明獨斷逹於事機發策如神應視逺如見近偏旅首進摧莽軍百萬之衆單師獨征平河北萬里之功識鄧隆之將敗知劉興之必死然猶乾乾日昃博采訓咨援呉漢於小尹擢馬武於行伍寵功臣以兼國之爵顯卓茂以非次之位言語政事文學之士咸盡其材致之宰相權勇畢力於征伐縉紳悉心於左右此其所以成大業也高祖方娠有雲龍之表其始入秦五星同軌以旅于東并在天之符也世祖之徵符其詳可聞也其初育則靈光鑒于室隩嘉禾滋于邑壤其望舊廬有火光之異其渡滹沲有河合之應西門君惠先識其諱彊華獻符千里同驗劉歆改名而隕其身王長錯卦而見吉兆故王遵謂之天授非人力也覽興廢之運㑹觀徵瑞之攸祚審天應之萌兆察人物之所附念功成而道退無非次而妄據後之人誠能昭然逺覽曠然深悟收莽述之闇惑思鄧耿之𢎞慮好謀而要成臨事而知懼距張𤣥之邪說思在三之明數則福祿衍於無窮亦世不失其通路矣藝文類聚皇后箴煌煌四星著天垂曜赫赫后妃是則是效舜納二女對揚茂教正位于内頑嚚輟暴辛亂妲己共則情悅牝雞亂晨殷祀用絶孝成寛柔縱㢮紀綱王擅朝權趙專椒房巨猾是緣竊弄神器故禍不出所憎常出所愛是以在昔明后日新其化匪唯訓外亦訓于内肉刑議葢禮樂所以導民刑罰所以威之是故君子忌禮而小人畏刑雖湯武之隆成康之盛不專用禮樂亦陳肉刑之法而康哉之歌興清廟之頌作由此推之肉刑之法不當除也經有墨劓剕割之制至於鑿顛抽脅烹煑之刑衛鞅所述為非咎陶所造吕侯所述據經按傳肉刑不當除有五驗請言其理荀卿論之備矣太古質簡制事樸畧故耒耜未用於牛而弧矢不加筋鐵智非闇也不識事宜以為聖人純一之教不如賢者支離之術鄭衛可以易咸池激楚可以陵韶武耶斯不足復難矣藝文類聚與張叔威書張猛字叔威奐子厯武威太守吾與足下義結素執恩比同生太平御覽素執初學記作紈素北堂書鈔幹與蘇文師書六經為庖厨百家為異饌與延篤書語大同陸康字李寧呉郡呉人厯廬江太守諫鑄銅人斂錢書康光和初累遷桂陽樂安太守時靈帝欲鑄銅人乃詔調民田畝十錢比水旱傷稼康疏諫内豎譖康援引亡國大不敬徵詣廷尉侍御史劉岱表解免歸臣聞先王治世貴在愛民省刑輕賦以寧天下除煩就約以崇簡易故萬姓從化靈物應德末世衰窮奢極侈造作無端興制非一勞割自下以從茍欲故黎民吁嗟陰陽感動陛下聖徳承天當隆盛化而卒被詔書畝斂田錢鑄作銅人伏讀惆悵悼心失圖夫什一而稅周謂之徹徹者通也言其法度可通萬世而行也故魯宣稅畝而蝝災自生哀公增賦而孔子非之豈有聚奪民物以營無用之銅人捐捨聖戒自蹈亡主之法哉傳曰君舉必書書而不法後世何述焉陛下宜留神省察改敝從善以塞兆民怨恨之望程包征板楯蠻對光和二年板楯復叛攻害三蜀漢中州郡連年苦之天子欲大出軍時征役疲弊聞益州計曹考以計畧益州計曹椽程包對靈帝從之板楯七姓以射白虎為業立功先漢本為異名復除徭役但出賨錢口歲四十其人勇敢能戰昔羌數入漢中郡縣破壞不絶若線後得板楯來虜死敗彌盡號為神兵羌人畏忌傳語種輩勿復南行至建和二年羌復入漢牧守遑遑復賴板楯破之若微板楯則蜀漢之民為左袵矣前車騎將軍馮緄南征雖授丹陽精兵亦以板楯近益州之亂朱龜以并凉勁卒討之無功太守李顒以板楯平之忠功如此本無惡心長吏鄉亭更賦至重僕役過於奴婢箠楚隆於囚虜至乃嫁妻賣子或自勁割陳寃州郡牧守不理去闕庭遙逺不能自聞含怨呼天叩心窮谷愁於賦役困乎刑酷邑域相能聚以致叛戾非有深謀至計僭號不軌但選明能牧守益其資穀安便賞募從其利隟自然安集不煩征伐也昔中郎將尹就伐羌擾動益部百姓諺曰虜來尚可尹將殺我就徵還後羌自破退如陳愚見權之遣軍不如任之州郡華陽國志昔羌入漢中􅁮書云昔永初中羌入漢川韓說蔡較劉洪陳調推驗月食議太初厯推月食多失四分永元中用蒙公乗宗紺法至熹平三年率先厯食常山長史劉洪上七曜術詔屬舍人馮恂等課效而紺孫誠上言受紺法術當復改今年十二月當食官厯以後年正月到期如言拜誠為舍人光和初誠兄整上書言史官廢誠正術用怐術不正詔下太常詳案注記效驗虛實太常就耽上選侍中韓說博士蔡較右郎中陳調及洪時為穀城門候平議難問怐誠各對耽以說等議奏聞詔可遂用洪等施行誠術恂術以五千六百四十日有九百六十一食為法而除成分空加縣法推建武以來俱得三百二十七食其十五食錯辟其官素注天見食九十八與兩術相應其錯辟二千一百誠術以百三十五月二十三食為法乘除成月從建康以上減四十一建康以來減三十五以其俱不食恂術改易舊法誠術中復減損論其長短無以相踰各引書緯自證文無異要取追天而巳夫日月之術日循黄道月從九道以赤道儀曰冬至去極俱一百一十五度其入宿也赤道在斗二十一而黄道在斗十九兩儀相參日月之行曲直有差以生進退故月行井牛十四度以上其在角婁十二度以上皆不應率不行以是言之則術不差不改不驗不用天道精微度數難定術法多端厯紀非一未驗無以知其是未差無以知其失失然後改之是然後用之此謂允執其中今誠術未有差錯之謬恂術未有獨中之異以無驗改未失是以檢將來為是者也誠術百三十五月月二十三食其文在書籍學者所修施行日久官守其業經緯日月厚而未愆信於天文述而不作恂久在候部詳心善意能揆儀度定立術數推前校往亦與見食相應然協厯正紀欽若昊天宜率舊章如甲辰丙申詔書以見食為比今宜施用誠術棄放恂術史官課之後有效驗乃行其法以審術數以順改易劉洪字元卓泰山蒙隂人魯王宗室專精天文數術應太史徵拜郎中與蔡邕共述律厯記為曲城侯相對月食注奏光和二年萬年公乘王漢上月食注自章和元年到今年凡九十三歲合百九十六食與官厯河平元年月錯以己巳為元事下太史令脩上言漢所作注不與見食相應者二事以同為異者二十九事尚書召穀城門候劉洪勅曰前郎中馮光司徙掾陳晃各訟厯故議郎蔡邕共補續其志今洪其詣脩與漢相參推元謂分考校月食審己巳元密近有師法洪便從漢受不能對洪上言推元漢巳巳元則考靈曜旃蒙之歲乙卯元也與光晃甲寅元相經緯於以追天作厯校三光之步今為疏闊孔子緯一事見二端者明厯興廢隨天為節甲寅厯於孔子時效巳巳顓頊秦所施用漢興草創固而不易至元封中迂闊不審更用太初應期二百改憲之節甲寅己巳䜟雖有文畧其年數是以學人各傳所聞至於課校罔得厥正夫甲寅元天正正月甲子朔旦冬至七曜之起始於牛初乙卯之元人正己巳朔旦立春三光聚天廟五度課兩元端閏餘差自五十分二之三朔三百四中節之餘二十九以效信難聚漢不解說但言先人有書而巳以漢成注參官施行術不同二十九事不中見食二事按漢習書見巳巳元謂朝不聞不知聖人獨有興廢之義史官有附天密術甲寅巳巳前巳施行效後格而巳不用河平疏闊史官巳廢之而漢以去事分爭殆非其意雖有師法與無同課又不近密其說蔀數術家所共知無所采取遣漢歸鄉里許氷上靈帝書光和中武庫屋自壞司𨽻許氷上書武庫禁兵所在焚國之禁為災深矣初學記黄翻上言翻靈帝時為遼西太守海邊有流屍露冠絳服感翻夢曰我伯夷弟孤竹君也求見掩藏吏民有嗤者皆死博物志張温字伯慎穰人累登公卿為董卓所殺諫徵朱儁疏儁初為右中郎將討黄巾諸賊破平之遷鎮賊帥趙奏徵儁司空張温上疏靈帝乃止儁撃斬𢎞昔秦用白起燕任樂毅皆以曠年厯載乃能克敵儁討潁川巳有功效引師南指方畧巳設臨軍易將兵家所忌宜假日月責其成功何進字遂髙南陽宛人何后兄初拜郎中厯大將軍謀誅宦官敗殺請王允書允字子師太原祁人厯豫州刺史擊降黄巾數十萬於賊中發張讓賔客書疏忤讓一月再徵詣廷尉進為大將軍與太尉袁隗司徒楊賜共上疏請請得減死論夫内視反聽則忠臣竭誠寛賢務能則義士厲節是以孝文納馮唐之說晉悼宥魏絳之罪允以特選受命誅逆撫順曾未期月州境澄清方欲列其庸勲請加爵賞而以奉事不當當肆大戮責輕罰重有虧衆望臣等備位宰相不敢寢黙誠以允宜蒙三槐之聽以昭忠貞之心薦董扶表益部耆舊傳云扶字茂安學數經䆒極圖䜟累辟不就進表薦靈帝㣲拜侍中資游夏之德述孔氏之風内懷焦董消復之術方今并涼騷擾西戎蠢叛宜勅公車特詔待以異禮諮謀竒策請永樂太后遷宫奏靈帝何后生子辦王美人生子協帝母仁孝董太后自養子協勸帝立為太子何后恨之未及定而帝崩及辦即位何后弟進為大將軍與董太后兄子驃騎將軍重權勢相害進及弟車騎將軍苖等上秦遂收重免官自殺董太后憂怖暴崩孝仁皇后使故中常侍夏惲永樂太僕封諝等交通州郡辜較在所珍寳貨賂悉入西省蕃后故事不得留京師輿服有章膳羞有品請永樂后遷宫本國諒輔字漢儒廣漢新都人禱山川辭捜神記輔為廣漢郡從事大小畢舉郡縣斂手夏枮旱時以五官椽出禱山川乃積薪搆火將自焚焉至禺中雷雨大作世稱誠輔為郡股肱不進諫納忠薦賢退惡和調隂陽至令天下否隔萬物燋枯百姓喁喁無所告訴咎盡在輔太守内省責巳自曝中庭使輔謝罪為民祈福曰無效令敢自誓至日中雨不降請以身塞無狀張文上言災異疏漢名臣奏春秋義曰蝗者貪擾之氣所生天意若曰貪擾之闕蠶食百姓若蝗食禾稼而擾萬民獸齧人者象暴政若獸而齧人京房易傳曰小人不義而反尊尊榮則虎食人辟厯殺人亦象暴政妄有喜怒政以賄成刑放於寵推類聚意探指求源皆象羣下貪狼威敎妄施或若蝗蟲宜勅正衆意清審選舉退屏貪暴魯僖公小國諸侯勅政修已斥退邪臣尚獲其報六月甚雨之應豈況萬乘之主修善求賢宜舉敦朴以輔善政陛下參堯舜之聖秉獨見之明恢太平之業敦經好學流布逺近可留須㬰神慮則可致太平招休徵矣髙賜論劉嘉趙世奏蔡質漢儀正旦百官朝賀嘉及世各辭不能朝高賜舉奏光祿勲劉嘉廷尉趙世皆以被病篤困空文武之位闕上卿之贊既無忠信斷金之用而有敗禮傷化之尤不謹不敬請廷尉治嘉罪河南尹治世罪吕强字漢盛河南成臯人初為小黄門再遷中常侍為宦官趙忠等構殺上靈帝陳事疏强清忠奉公靈帝時例封宦者以强為都鄉侯固讓聽之上疏陳事帝知其忠而不能用臣聞諸侯上象四七下裂王土高祖重約非功臣不侯所以重天爵明勸戒也伏聞中常侍曹節王甫張讓等及侍中許相並為列侯節等宦官祐薄品卑人賤讒謟媚主佞邪徼寵放毒人物疾妬忠良有趙高之禍未被轘裂之誅掩朝廷之明成私樹之黨而陛下不悟妄授茅土開國承家小人是用又并及家人重金兼紫相繼為蕃輔受國重恩不念爾祖述修厥德而交結邪黨下比羣佞陛下惑其𤨏才特蒙恩澤又授位乖越賢才不升素餐私倖必加榮擢隂陽乖剌稼穡荒蔬人用不康罔不由兹臣誠知封事巳行言之無逮所以冐死干觸陳愚忠者實願陛下損改既謬從此一止臣又聞後宫綵女數千餘人衣食之費日數百金比穀雖賤而戸有饑色按法當貴而今更賤者由賦發繁數以解縣官寒不敢衣饑不敢食民有斯戹而莫之䘏宫女無用填積後庭天下雖復盡力耕桑猶不能供昔楚女悲愁則西宫致災況終年積聚豈無憂怨乎夫天生蒸民立君以牧之君道得則民戴之如父母仰之猶日月雖時有征稅猶望其仁恩之惠易曰悅以使民民忘其勞悅以犯難民忘其死儲君副主宜諷誦斯言南面當國宜履行其事又承詔書當於河間故國起解瀆之館陛下龍飛即位雖從藩國然處九天之高豈宜有顧戀之意且河間疏逺解瀆邈絶而當勞民單力未見其便又今外戚四姓貴倖之家及中宫公族無功德者造起館舍凡有萬數樓閣相接丹青素堊雕刻之飾不可單言喪塟踰制奢麗過禮競相放效莫肯矯拂穀梁傳曰財盡則怨力盡則懟尸子曰君如杅民如水杅方則水方杅圓則水圓上之化下猶風之靡草今上無去奢之儉下有縱欲之敝至使禽獸食民之甘土木衣民之帛昔師曠諫晉平公曰梁柱衣繡民無褐衣池有棄酒士有渇死廐馬秣粟民有饑色近臣不敢諫逺臣不得暢此之謂也又聞前召議郎蔡邕對問於金商門而令中常侍曹節王甫等以詔書喻㫖邕不敢懷道迷國而切言極對毁刺貴臣譏呵豎宦陛下不密其言至今宣露羣邪項領膏唇拭舌競欲咀嚼造作飛條陛下回受誹謗致邕刑罪室家徙放老幼流離豈不負忠臣哉今羣臣皆以邕為戒上畏不測之難下懼劒客之害臣知朝廷不復得聞忠言矣故太尉殷熲武勇冠世習於邊事垂髮服戎功成皓首厯事二主勲烈獨昭陛下既巳式序位登台司而為司𨽻校尉陽球所見誣脅一身既斃而妻子逺播天下惆悵功臣失望宜徵邕更授任反熲家屬則忠貞路開衆怨以弭矣諫貢獻疏靈帝多稸私藏郡國貢獻先輸中署名為導行費强疏諌不少天下之財莫不生之隂陽歸之陛下歸之陛下豈有公私而今中尚方斂諸郡之寳中御府積天下之繒西園引司農之藏中廐聚太僕之馬而所輸之府輒有導行之財調廣民困費多獻少姦吏因其利百姓受其敝又阿媚之臣好獻其私容謟姑息自此而進舊典選舉委任三府三府有選參議掾屬咨其行狀度其器能受試任用責以成功若無可察然後付之尚書尚書舉劾請下廷尉覆案虛實行其誅罰今但任尚書或復勅用如是三公得免選舉之負尚書亦復不坐責賞無歸豈肯空自勞苦乎夫立言無顯過之咎明鏡無見玼之尤如惡立言以記過則不當學也不欲明鏡之見玼則不當照也願陛下詳思臣言不以記過見玼為責蹇碩中常侍遺中常侍趙忠等書靈帝何皇后有寵兄進為大將軍弟苖為車騎將軍久居重權蹇碩欲誅之謀不行及帝崩太后臨朝何進輔政乃以袁紹素善養士能得豪傑用從弟術亦尚氣俠並厚待之碩時為上軍校尉疑不自安與忠等書中常侍郭勝進同郡人親信何氏以其書示進進收碩誅之大將軍兄弟秉國專朝今與天下黨人謀誅先帝左右掃滅我曹但以碩典禁兵故且沈吟今宜共閉上閣急捕誅之後漢書與中常侍趙忠宋典書漢紀靈帝崩何皇后子辦即帝位封弟協為渤海王初帝將崩屬協於上軍校尉蹇碩碩以辯輕佻不德二舅好修虚名懼不能安社稷欲誅進等立協與忠典書忠典以碩書告進下獄死大將軍兄弟秉國威權欲與天下黨人共誅内官以碩有兵尚且沈吟觀其㫖趣必先誅碩次及諸君今欲除私讐以輔公家是時上新崩大行在前殿左右悲哀念在送終碩雖用有謀策其事未可知也東漢文紀巻十八
