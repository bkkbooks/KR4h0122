body:
  text: 東漢文紀巻十九明梅鼎祚編蔡邕字伯喈陳留圉人為郎中校書東觀遷議郎坐上書徙朔方後董卓召拜侍御史歴尚書卓誅王允収邕下獄死與何進薦邊讓書譲字文禮陳留浚儀人累官九江太守為曽操所殺進聞譲才名徴署令史邕深敬之以為宜處髙任乃薦於進明將軍以申甫之德當中興之隆建上將之任膺秉國之權妖冦作孽震驚京師運籌帷幄定策届勝先擒馬元歸近之變天兵致誅兖豫以清冀荆用次雲消席巻克厭衆心王室巳寜萬國兆民莫不頼祉伏惟幕府初開博選清英華髪舊德並為元龜成功立事莫不畢舉雖振鷺之集西廱濟濟之在周庭無以或加伏見陳留邊讓字文禮天授逸才聰明賢知纂成伐柯不逺之則齠齔夙孤不墜家訓始任學問便就大業閒不游嬉初覽諸經見夲知義尋端極緒受者不能答其問章句不能遂其意詩書易禮先通大義業以次舉衆傳篇章無術不綜心通性達剖􅊏入㝠口辯辭長而節之以禮度安詳審固守持内定非禮勿動非法不言據狐疑之論定嫌審之分經典交至檢括並合衆夫嘉焉莫之能奪使讓生於先代在唐虞則元凱之比當仲尼則顔冉之亞豈徒世俗之凡偶兼混是非講論而巳哉才藝言行卓逸不羣階級名位亦宜超然不以常制為限長㓜為拘若復輩從此郡選舉例似非所以彰瓌瑋之髙價昭大知之絶明也傳曰函牛之鼎一旦立之以烹雞多汁則澹而不可食少汁則焦而不可熟大器之於小用固有所不宜也邕誠竊悁悒怪此寳鼎未受犧牛大羮之和乆佐煎熬臠胾之間願明將軍囘謀守慮思垂采納就讓疾病所親察之更以屬缺招延表貢行狀列於王府躋之宗伯納之機密展其力用副其器量夫若以年齒為嫌則顔淵不得冠德行之首子奇不得紀治阿之功茍能其事古今一也密䟽特表及期而行邦國其昌邕寢羸匍匐拜寄不敢須通蔡中郎集同前後漢書伏惟幕府初開博選清英華髪舊德竝為元龜雖振鷺之集西雍濟濟之在周庭無以或加竊見令史陳留邊讓天授逸才聰明賢智髫齔夙孤不替家訓及就學廬便受大典初渉諸經見夲知義授者不能對其問章句不能逮其意心通性達口辯辭長非禮不動非法不言若處狐疑之論定嫌審之分經典交至檢括参合衆夫寂焉莫之能奪使譲生在唐虞則元凱之次運值仲尼則顔冉之亞豈徒俗之凡偶近器而已者哉階級名位亦宜超然若復隨輩而進非所以章瓌瑋之髙價昭知人之絶明也傳曰函牛之鼎以烹雞多汁則澹而不可食少汁則熬而不可熟此言大器之於小用固有所不宜也邕竊悁邑怪此寳鼎末受犧牛大羮之和乆在煎熬臠割之間願明將軍回謀垂慮裁加少納貢之機密展之力用若以年齒為嫌則顔囬不得冠德行之首子竒終無阿宰之功苟堪其事古今一也世説邊文禮才辨俊􅇣孔北海嘗薦於曽公曰邊讓為九州之被則不足為單衣襜褕則有餘辭郡辟讓申屠蟠蟠家貧傭為漆工邕深重蟠及被州辟乃辭譲之申屠蟠禀氣元妙性敏心通喪親盡禮幾於毁滅至行美誼人所鮮能安貧樂潜味道守真不為燥濕輕重方之於邕以齒則長以德則賢後漢書徙朔方報楊復書邕靈帝時坐上書下獄減死與家屬髠鉗徙朔方昔此徙者故城門校尉梁伯喜南郡太守馬季長㦯至三嵗近者嵗餘多得旋返自甘罪戾不敢慕此徙朔方報羊月書幸得無恙遂至徙所自城以西惟青紫鹽也段公路北户録引載楊尺牘載蔡邕徙朔方上書云既到徙所乗塞守烽職在望候憂怖焦灼無心復能操筆成草致章闕庭按蔡邕别傳邕昔作漢記十意遭事流離因上書自陳此特剛前數語夲上靈帝書載入非與故郡將子橋伯尉書知郡將枉屈麟鸞奉計王室計一作法與袁公書朝夕游談從學宴飲酌麥醴燔乾魚欣欣焉樂在其中矣並北堂書鈔焉一作然中一作間與人書侍中執事相見無期惟是筆跡可以當面初學記跡一作䟽書大官令職役煩碎非文雅所使也北堂書鈔又家祖居常言客有三當死夜半蠶時至人室家也今者一行而犯其兩又邕薄祜早喪二親年踰三十鬢髪二色叔父親之猶若㓜童陸則對坐食則比豆並太平御覽右二條未否是書幽冀刺史乆闕䟽初朝議以州郡相黨乃制昏姻之家及兩州人士不得對相監臨復有三互法禁制轉密熹平中幽冀二州乆缺不補邕為議郎上䟽不省臣聞國家置官以職建名臣愚淺小才竊假階級官以議為名職以郎為貴智淺謀漏無所獻替夙夜寤歎憂悸怛惕臣邕頓首死罪伏見幽州奕騎冀州强弩為天下精兵國家瞻仗四方有事軍師奮攻未嘗不辦於二州也頃者以来連年饉荒穀價一斛至六七百錢故䕶烏桓校尉夏育出征鮮卑無功而還士馬死傷者萬數弓兵散亡幾盡生民之夲守禦之偹無一可恃百姓元元流離溝壑㓂賊輩起莫能禁討長吏寒心朝不守夕卒有他方之急則役之不可驅使自為㓂虜則誅之不可擒制豈非可憂之難三府選幽冀二州刺史踰月不定臣怪問其故云避三互十一州有禁當取二州而巳二州之中少素有威名之士㦯拘限嵗年不應選用狐疑遲淹兩州空懸萬里蕭條無所管繫每冀州長吏初除詔書治嚴不過五日今者刺史數旬不選誠非其理愚以為三互之禁禁之薄者以陛下威靈申明禁令在任之人豈不戒懼而當坐設三互自生留閡邪昔孝景時梁人韓安國坐事被刑起徒中為内史武帝患東越數反拜故待詔㑹稽朱買臣宣帝時患冀州有盗賊故京兆尹張敞有罪逃命上使使就家召為冀州刺史安國徒𨽻買臣郡民皆還治其國張敞亡命擢授劇州豈顧三互拘官薄得救時之便也卒獲其用遺芳不滅此先帝不誤已然之事三公明知二州之要尤宜揀選當越禁取能以救時弊而不顧爭臣之義苟避輕㣲之科竊見日月拘忌選既稽滯又未必審得其人則二部蠢蠢將為憂念願陛下上則先帝用三臣之法蠲除近禁其諸州刺史器用可換者無拘日月三互以差厥中臣慺慺瞽言惟陛下留神再省三省陳政要七事封事靈帝好學引召諸生能為尺牘及工書鳥篆者待制鴻都門下多無行趣埶之徒待以不次之位又市賈小民為宣陵孝子皆除郎中太子舎人時頻有風霆灾異鮮卑犯境役賦及民制誥羣臣各陳政要邕上封事帝乃親迎氣北郊行辟雍禮宣陵孝子悉改丞尉焉臣伏讀聖㫖雖周成遇風訊諸執事宣王遭旱密勿袛畏無以或加臣聞天降灾異縁象而至辟歴數發殆刑誅繁多之所生也風者天之號令所以教人也夫昭事上帝則自懐多福宗廟致敬則鬼神以著國之大事實先祀典天子聖躬所當恭事臣自在宰府及偹朱衣迎氣五郊而車駕稀出四時致敬屢委有司雖有觧除猶為踈廢故皇天不悦顯此諸異洪範傳曰政悖德隱厥風發屋折木坤為地道易稱安貞隂氣僨盛則當靜反動法為下叛夫權不在上則雹傷物政有苛暴則虎狼食人貪利傷民則蝗蟲損稼去六月二十八日太白與月相廹兵事惡之鮮卑犯塞所從来逺今之出師未見其利上違天文下逆人事誠當博覽衆議從其安者臣不勝憤懣謹條宜所施行七事表左一事明堂月令天子以四立及季夏之節迎五帝於郊所以𨗳致神氣祈福豐年清廟祭祀追往孝敬養老辟廱示人禮化皆帝者之大業祖宗所祗奉也而有司數以蕃國踈喪宫内産生及吏卒小汙屢生忌故竊見南郊齋戒未嘗有廢至於他祀輙興異議豈南郊卑而他祀尊哉孝元皇帝策書曰禮之至敬莫重於祭所以竭心親奉以致肅祗者也又元和故事復申先典前後制書推心懇惻而近者以来更任太史忘禮敬之大任禁忌之書拘信小故以虧大典禮妻妾産者齊則不入側室之門無廢祭之文也所謂宫中有卒三月不祭者謂士庶人數堵之室共處其中耳豈謂皇居之曠臣妾之衆哉自今齊制宜如故典庶荅風霆灾妖之異二事臣聞國之將興至言數聞内知己政外見民情是故先帝雖有聖明之資而猶廣求得失又因灾異援引幽隱重賢良方正敦樸有道之選危言極諫不絶於朝陛下親政以来頻年灾異而未聞特舉博選之㫖誠當思省述修舊事使抱忠之臣展其狂直以解易傳政悖德隱之言三事夫求賢之道未必一塗㦯以德顯㦯以言揚頃者立朝之士曽不以忠信見賞恒被謗訕之誅遂使羣下結口莫圖正辭郎中張文前獨盡狂言聖聽納受以責三司臣子懭然衆庶解悦臣愚以為宜擢文右職以勸忠謇宣聲海内博開政路四事夫司𨽻校尉諸州刺史所以督察姦枉分别白黒者也伏見幽州刺史楊憙益州刺史龎芝凉州刺史劉䖍各有奉公疾姦之心憙等所糾其效尤多餘皆枉撓不能稱職或有抱罪懐瑕與下同疾綱網弛縱莫相舉察公府臺閣亦復黙然五年制書議遣八使又令三公謡言奏事是時奉公者欣然得志邪枉者憂悸失色未詳斯議所因寖息昔劉向奏曰夫執狐疑之計者開羣枉之門養不斷之慮者来䜛邪之口今始聞善政旋復變易足令海内測度朝政宜追定八使糾舉非法更選忠清平章賞罰三公嵗盡差其殿最使吏知奉公之福營私之禍則衆灾之原庶可塞矣五事臣聞古者取士必使諸侯嵗貢孝武之世郡舉孝廉又有賢良文學之選於是名臣輩出文武竝興漢之得人數路而巳夫書畫辭賦才之小者匡國理政未有其能陛下即位之初先渉經術聽政餘日觀省篇章聊以游意當代博奕非以為教化取士之夲而諸生競利作者鼎沸其髙者頗引經訓風喻之言下則連偶俗語有類俳優㦯竊咸文虗冐名氏臣每受詔於盛化門差次録第其未及者亦復随輩皆見拜擢既加之㤙難復収改但守奉禄於義巳宏不可復使理人及仕州郡昔孝宣㑹諸儒於石渠章帝集學士於白虎通經釋義其事優大文武之道所宜從之若乃小能小善雖有可觀孔子以為致逺則泥君子固當志其大者六事墨綬長吏職典理人皆當以恵利為績日月為勞褒責之科所宜分明而今在任無復能省及其還者多召拜議郎郎中若器用優美不宜處之冗散如有釁故自當極其刑誅豈有伏罪懼考反求遷轉更相倣效臧否無章先帝舊典未嘗有此可皆斷絶以覈真偽七事伏見前一切以宣陵孝子為太子舎人臣聞孝文皇帝制喪服三十六日雖繼體之君父子至親公卿列臣受恩之重皆屈情從制不敢踰越今虗偽小人夲非骨肉既無幸私之恩又無禄仕之實惻隱思慕情何縁生而羣聚山陵假名稱孝行不掩心義無所依至有姦軌之人通容其中桓思皇后祖載之時東郡有盗人妻者亡在孝中夲縣追捕乃伏其辜虗偽雜穢難以勝言又前至得拜後輩被遺或經年陵次以暫歸見漏或以人自代亦䝉寵榮争訟怨恨洶洶道路太子官屬宜捜選令德豈有但取丘墓凶醜之人其為不祥莫與大焉宜遣歸田里以明詐偽答詔問災異八事光和元年妖異數見詔召邕等引入崇德殿使中常侍曺節王甫就問消改變故所宜施行邕悉心以對帝覽嘆息節竊視之宣語左右皆為側目光和元年七月十日詔書尺一召光禄大夫楊賜諫議大夫馬日磾議郎張華蔡邕太史令單颺詣金商門引入崇德殿署門内南辟帷中為都座漏未盡三刻中常侍育陽侯曺節冠軍侯王甫從東省出就都座東面十門劉寵龎訓北面賜南面日磾華邕颺西面受詔書各一通尺一木板草書兩常侍又諭㫖朝廷以灾異憂懼特㫖密問政事所變改施行務令分明賜等稱臣再拜受詔書起就坐五人各一處給財用筆硯為對臣學識淺薄心慮愚暗不足以荅聖問情衷變易怔營怖悸謹列狀上臣邕頓首頓首詔問曰去月二十九日有黑氣堕温徳殿東庭中黑如車盖降氣奮勢五色有頭體長十餘丈形狀似龍似虹蜺邕對虹著於天而降施於庭以臣所聞則所謂天投虹者也不見尾足者不得稱龍易傳曰蜺之比無德以色親也潛潭巴曰虹出后妃隂脅主又曰五色蜺迭至昭於宫殿有兵革之事演孔圖曰蜺者斗之精氣也失度投蜺見主惑於毁譽合䜟圖曰天子外苦兵威内奮臣無忠政變不虗生古不虗言意者陛下闗機之内袵席之上獨有以色見進陵尊踰制以招衆變若羣臣有所毁譽聖意低囘未知誰是兵戎不息威權浸移忠言不聞則虹蜺所生也抑内寵任忠賢决毁譽分直邪各得其所嚴守衞整武偹威權之機不以假人則其所救也易傳曰陽感天不旋日書曰惟辟作威惟辟作福臣㦯為之謂之凶害是以明主尤務焉詔問曰正月三日有白衣入德陽殿門辭稱伯夏教我上殿與中黄門桓賢晤言相往来不得入遂亡去不知姓名臣聞凡人為怪皆皇極道失下㦯謀上故其傳曰皇之不極是謂不建則有下謀上之病孝成綏和二年八月男子王褒衣小冠帶劍入北司馬殿東門上殿入室解帷組佩之招前殿署王業等曰天帝命我居此業収縛考問褒故公車卒病狂不自知入宫乃下獄死是時王莽為司馬遂為簒亂亦卒誅臣竊思之與綏和時相似而有異被服既不同来入雲龍門而稱伯夏教入殿裏與桓賢言伯夏即故大將軍梁商商子冀冀子不疑等皆以罪受戮殘餘非天所佑以往况今將狂狡之人為王氏之禍未至殿省而覺亡不乆伏誅夫誠仰見上帝之厚德也潛潭巴曰有人走入宮不知其名大水為戒天子驚羣隂太隆羣下竝凑强盛也建大中之道舉賢良而寵䘵之則其救也經曰皇建其有極歛時五福用敷錫厥庶民惟時厥庶民於汝極錫汝保極詔問曰南宮侍中寺聞雌雞欲化為雄尾身毛已似雄頭尚未變臣聞凡雞為怪皆貌之失也傳曰貌之不㳟是謂不肅時即有雞禍孝宣黄龍元年未央宫輅軫中雌雞化為雄不鳴無距是時元帝初即位將立妃王氏為后至初元元年丞相史家雌雞化為雄距而鳴是嵗封后父禁為平陽侯而后正位王氏之寵始盛哀帝晏駕后攝政王莽以后兄子為大司馬由是為亂昔武王伐紂曰牝雞之晨惟家之索易傳曰婦人専政國不靜牝雞雄鳴主不榮夫牝雞但雄鳴尚有索家不榮之名况乃隂陽易體名實變改此誠大異臣竊以意推之頭為元首人君之象今雞身巳變未至於頭而聖主知之訪問其故是將有其事而不遂成之象也若應之不精誠無所及頭冠㦯成即為患灾敬慎威儀動作之容斷娶御改興政之原則其救也夫以匹夫顔氏之子有過未嘗不知知之未嘗復行易曰不逺復無祗悔元吉詔問曰即祚以来灾眚屢見頻嵗日蝕地動風雨不時疾癘流行迅風折樹河洛盛溢臣聞陽勝則震隂勝則食思亂則風貌失則雨視闇則疾癘流行水不潤下則河流滿溢明君臣正上下抑隂尊陽修五事於聖躬致畿甸於供御則其救也志注陽微則日蝕隂勝則地震簡宗廟水不潤下川流滿溢詔問星辰錯謬臣竊見熒惑變色入太微西門太白當晝而見臣聞熒惑示變主當精明其德則有休慶之色太白當晝而見是隂陽争明强國弱弱國强皆有失政又失道而見是為嬴長侯王不榮熒惑主禮太白主兵謹禮事治兵政審察中外之言申明守禦之令以杜漸防萌則其救也昔宋景公小國諸侯三有德言而熒惑為之退舎詔問蝗蟲冬出臣聞易傳曰大作不時天降灾厥咎蝗蟲来河圖秘徴篇曰帝貪則政暴吏酷則誅深而蝗蟲出息不急之作省賦役之費進清仁黜貪虗介損求安鈎省别藏以贍國用則其救也易曰得臣無家言有天下者何私家之有後漢書詔問連年蝗蟲至冬蛹其咎焉在詔問平城門及武庫屋各損壊臣愚以為平城門向陽之門郊祀法駕所從出門之最尊者也武庫禁兵所藏國家之夲兵也變此二處異於凡屋易傳曰小人在位上下咸悖其妖城門内崩潛潭巴曰出宫瓦自隳諸侯强凌主易傳曰一柱泥故法棄其咎宫室傾圯小人在顯位者黜之以尊上整下去暴悖之愆抑諸侯強凌主之漸率由舊章以變柱泥棄法之咎則其救也洪範傳曰六沴作見若時共禦帝用不羞神則不怒五福乃降用彰於下詔問曰朝廷焦心聞灾恐懼每訪羣公卿士皆各括囊迷國莫肯建忠規闕以邕博學深奥退食在公故特密問宜披演所懐指陳政要所先後勿有依違顧忌以經術分别皂囊封上勿漏所聞臣邕伏惟陛下聖德允明深悼變異德音懇誠褒臣博學深奥退食在公非臣螻蟻愚怯所能堪副亦臣輸寫肝膽出命之秋豈可顧患避害復使陛下不聞至戒哉臣邕頓首死罪伏思諸異各應皆亡國之怪也天於大漢殷勤不巳赤帝之精輔㦯未衰故屢出妖變以當責讓因以感覺則危可為安凶可作吉假使大運巳移豈有譴告哉春秋魯定哀公之時周德巳絶故數十年無有日蝕此人為天所棄故也至於今者災眚之發不於他所逺則門垣近在署寺紛降目前欲使陛下豁然大悟可謂至切矣幸陛下深問臣敢不盡情以對蜺堕雞化皆婦人干政之所致也即祚以来宫中無地逸竄而乳母趙嬈貴重赫赫生則貲富侔於帑藏死則丘墓踰越園陵兩子受封兄弟典郡續以永樂門史霍玉依阻城社大為奸禍盗寵竊權藏晦惑之罪事必積浸然後成形虹蜺集庭雌雞變化豈不謂是今者道路紛紛復云有程大人者察其風聲將為國患宜髙其隄防明其禁限深惟趙霍以為至戒論者疑太尉張顥為玉所進暗昧已成非外臣所能審處如誠有之近者不治無以正逺傾邪在官當有所懲光禄勲偉璋所在尤貪濁九列之中豈宜有此牧守數十選代既不盡由夲朝反有異輩無以示四方聖意勤勤欲清流蕩濁扶正黜邪不特但以州郡無課而巳長水校尉趙玹屯騎校尉盖升其貴巳足其富巳優當以灾之故為陛下先羣臣引退以解易傳所載小人在位之咎伏見廷尉郭禧敦重純厚國之老成光禄大夫橋𤣥聰達方直有山甫之姿故太尉劉寵忠實守固悃愊剛正並宜為謀主數見訪問夫宰相大臣君之四體委任責成優劣巳分春秋之義以貴治賤逺間親小加大引在六逆陛階増則堂髙輔位重則上尊不宜聽納小吏雕琢大臣也又尚方工技之作洪都篇賦之文宜且消息以示憂懼詩云畏天之怒不敢戲豫天戒誠不可戲也宰府孝廉士之髙選但當察其真偽以加黜陟近者毎以辟召不慎切責三公乃並以書䟽小文一介之技超取選舉開請託之門違明王之典衆心不厭莫之敢言臣願陛下聽納忠言忍而絶之側身踴躍思惟萬幾以荅天望以𨗳嘉應聖朝既自約厲以身率人左右近臣亦宜戮力從化人自抑損天道虧滿鬼神福謙乆髙不危常滿不溢羣公之福諸侯凌王之戒不可不察也臣邕愚戇感激忘身敢觸忌諱手書具對夫君臣不密上有漏言之戒下有失身之禍臣安敢漏所問願寢臣表無使盡忠之吏受怨姦仇封事二條集不載臣聞天降灾異縁象而至霹靂數發殆刑誅繁多之所生上日微傷書熹平四年四年正月􅃋日體微傷羣臣服赤幘赴宮門之中無救乃各罷歸天有大異隱而不宣求御過是巳事之甚者後漢書注被収時表初邕與司徒劉郃及叔父衛尉質與將作大匠楊球並有隙球即中常侍程璜女夫璜飛章言邕質數以私事欲中傷郃詔下尚書詰狀邕上書自陳収邕質下洛陽獄减死一等與家屬髠鉗徒􅃋方議郎糞土臣邕頓首再拜上書皇帝陛下今月十三日臣被尚書召問臣以大鴻臚郃前為濟隂太守臣屬吏張宛長休百日郃為司𨽻又託河内郡吏李竒為州書佐及營䕶故河南尹羊陟侍御史胡母班郃不為用致怨之狀臣怔營怖悸肝膽塗地不知死命所在竊自尋按實屬宛竒不及陟班凡休暇小吏皆非結恨之夲與陟姻家豈敢申助私黨如臣父子欲相傷䧟當明言臺閣具陳恨狀所縁内無寸事而謗書外發宜以臣對與郃叅驗臣得以學問特䝉褒異執事秘館操管御前姓名貌狀㣲簡聖心今年七月召詣金商門問以灾異齎詔申㫖誘臣使言臣實愚戇出命忘軀不顧後患遂譏切公卿内及寵近區區欲荅上問救怪異為陛下圖康寜之計而已預知所言者當必怨臣陛下不念忠臣直言宜加掩蔽誹謗卒至便用疑怪豈不負盡忠之吏哉每有灾異輙令百官各上封事欲以改政息譴除凶致吉而言者不䝉延納之福旋被䧟破之禍羣臣杜口以臣為戒誰敢復為陛下盡忠者乎臣季父質連見拔擢位在上列臣被䝉恩渥數見訪問言事者因此欲䧟臣父子破臣門户非復發糾姦伏補益國家者也臣年四十有六孤特一身前無立男得盡節王室託名忠臣死有餘榮然恐陛下不復聞至言矣臣愚以凡冗招致禍患自臣職耳臣對問時質為下邳相不聞臣謀今日横見逮及使質恨以衰老白首隨臣摧沒并内坑䧟以快言事厭副其心誠寃誠痛陛下仁篤之心必不忍此思之未至耳臣一入牢檻當為箠楚所廹趣以飲章辭情何縁復達臣死期垂至冒昧自陳乞身當辜戮免質并坐臣死之日則生之年也唯陛下加飡為百姓自愛臣邕死罪上後漢十志書邕前在東觀與盧植韓説等撰補後漢記遭事未成及徙􅃋方上書自陳因奏所著十志帝嘉其才髙赦還夲郡朔方髠鉗徙臣邕稽首再拜上書皇帝陛下臣邕被受陛下寵異大恩初由宰府偹數典城以親父故依叔父衛尉質時以尚書召拜中郎受詔詣東觀著作遂與羣儒並拜議郎沭浴恩澤承荅聖問前後六年質奉機密趨走陛下遂由端右出相外藩還尹輦轂旬日之中登躡上列父子一門兼受恩寵不能輸寫心力以効絲髪之功一旦被章䧟没辜戮陛下天地之德不忍刀鋸截首領得就平罪父子家屬徙充邊方完全軀命喘息相隨非臣無狀所敢復望非臣罪惡所當復䝉非臣辭筆所能復陳臣初决罪洛陽詔獄生出牢户顧念元初中故尚書郎張俊坐漏泄事當服重刑已出轂門復聽續鞠詔書馳救一等輸作左校俊上書謝恩遂以轉徙邕為郡縣促遣廹於吏手不得頃息含辭抱悲無由上達既到徙所乗塞守烽職在候望憂怖焦灼無心復能操筆成草致章闕庭誠知聖朝不責臣過但懐愚心有所不竟臣自在布衣常以為漢書十志下盡王莽而止世祖以来唯有紀傳無續志者臣所師事故太傅胡廣知臣頗識其門户略以所有舊事與臣雖未備悉粗見首尾積累思惟二十餘年不在其位非外吏庶人所得擅述天誘其衷得偹著作郎建言十志皆當撰録遂與議郎張華等分受之其難者皆以付臣先治律歴以籌算為夲天文為驗請太師田注考校連年往往頗有差舛當有増損乃可施行為無窮法道至深微不敢獨議郎中劉洪密於用筭故臣表上洪與共参思圖牒尋繹度數適有頭緒㑹臣被罪逐放邊野臣竊自痛一為不善使史籍所闕胡廣所校二十年之思中道廢絶不得究竟慺慺之情猶以結心不能自達臣初欲須刑竟乃因縣道具以狀聞今年七月九日匈奴攻鹽池縣其時鮮卑連犯雲中五原一月之中烽火不絶不意西夷相與合謀所圖廣逺恐遂為變不知所濟郡縣咸悄悄不知所守且臣所在孤危懸命鋒鏑湮滅土灰呼吸無期誠恐所懐隨軀腐朽抱恨黄泉遂不設施輙先顛踣謹條諸志臣欲刪定者一所當接續者四前志所無臣欲著者五及經典羣書所宜捃摭夲奏詔書所當依據分别首目并書章左臣初考逮妻子迸竄亡失文書無所按請加以惶怖愁恐思念荒散十分不得識一所識者又恐謬誤觸冒死罪披瀝愚情願下東觀推求諸奏参以璽書補綴遺闕昭明國體章聞之後雖肝腦流離白骨剖破無所復恨惟陛下留神省察謹因臨戎長霍圉封上臣頓首死罪稽首再拜以聞朔方上論渾天書時閹官用事邕議不行論天體者三家宣夜之學絶無師法周髀術數具存考驗天狀多所違失惟渾天僅得其情今史官所用候臺銅儀則其法也立八尺圎體而具天地之形以正黄道占察發歛以行日月以步五緯精微深妙百世不易之道也官有器而無本書前志亦闕而不論夲欲寢伏儀下思帷㣲意按度成數以著篇章辠惡無狀投畀有北灰滅雨絶勢路無由宣問羣臣下及巖穴知渾天之意者使述其意宋書集不載為陳留太守上孝子表臣前到官博問掾史孝行卓異者臣門下掾申屠敻稱孝子平邱程末年十四嵗時祖父叔病歿末抱伏叔尸號泣悲哀口乾氣少喘息纔屬舅偃哀其羸劣嚼棗肉以哺之末見食嘘唏不能吞咽麥飯寒水間用之舅偃誘勸哽咽益甚是後精美異味遂不過口常在柩旁耳聞叔名目應以淚前太守文穆召署孝義童云以叔未𦵏不能至府舎臣輙核問掾史邑子殷盛宿彥等辭驗皆合臣即召来見末年十四嵗顔色痩小應對甚詳臣問樂為吏否垂泣求去白歸喪所臣為設食但用麥飯寒水不食肥膩舅夲以田作為事家無典學者其至行發於自然非耳目聞見所倣效也雖成人之年知禮識義之士恐不能及伏惟陛下體因心之德當中興之運躬秉萬幾建用皇極神紀騁於無方淑暢洽於羣生故醇行感時而生美義因政以出清風奮揚休徴誕漫太平之萌昭驗已著臣誠伏見幸甚臣聞魯侯能孝命於夷宫張仲孝友侯在左右周宣之興實始於此且烏以反哺託體太陽羔以跪乳為贄國卿禽鳥之微猶以孝寵况末禀純粹之精爽立百行之根源其人殄瘁而德曜彌光其族益章臣不勝願㑹使末美昭顯夲朝謹陳狀臣邕頓首薦皇甫規表臣聞唐虞以師師成熙周文以濟濟為寜區區之楚猶用賢臣為寳衞多君子季札知其不危由此言之忠臣賢士國家之元龜社稷之楨固也昔孝文慍匈奴之生事思李牧於前代孝宣忿奸邪之不散舉張敞於亡命况在於當時謙虗為罪而可遺棄臣伏見䕶羌校尉皇甫規少明經術道為儒宗修身力行忠亮闡著出處抱義皦然不汚藏器林藪之中以辭徴召之寵先帝嘉之羣公歸德盗發東岳莫能攖討即起家拜為太山太守屠斬桀黠綏撫㷀弱青兗之郊迄用靡又自是以来方外有事戎狄猾夏進簡前勲連見委任仗節舉麾威靈盛行演化凶悍使為慤愿愛財省穡毎有餘資養士御衆悦以亡死論其武勞則漢室之干城課其文德則皇家之腹心誠宜試用以廣振鷺西廱之美臣以頑愚忝汚顯列輙流汗墨不堪之責不勝區區執心所見越職瞽言罪當殊死唯陛下留神省察臣邕頓首頓首薦太尉董卓表臣某等聞周有流彘之亂而宣王以興漢有昌邑之難而中宗以昭由此觀之天生神聖特以靖亂整殘丕誕洪業輔佐重臣國之楹棟生應期運禀氣山岳是故申伯山甫列於大雅蕭曺丙魏載於史籍國遭奸臣孽妾制弄主權累葉相繼六十餘載火熾流沸浸以不振威移羣下權在㺯臣海内嗷嗷被其傷毒故大將軍慎侯何進盡忠出身圖議盪滌以清季朝羣凶遘難兵起亂作元舅上卿先宼受害禍至執辱社稷傾危太尉郿侯卓起自東土封畿之外義勇憤發旋赴京師先陳便宜列表奸猾羣慝情狀辭意激切感物悟靈精兵虎臣承持卓勢奮擊醜類漏刻之間靡有孑遺卓聞乗輿已趨河津身率輕騎長驅邙阜上觧國家播越之危下救兆民塗炭之禍然後黜廢頑凶爰立聖哲天心聿得萬國賴祉及至差功行賞辭多受少近臣幸臣一人之封户至萬數今者受爵十有一人總合户數千不當一封今月七日卓又上書辭疾譲位乞就國土上違聖主嘉寵之至下乖羣生瞻仰之望非所以褒功賞勲也惟陛下益隆委任數加訪問厚其爵賞責以相業之成臣等不勝大願謹陳狀臣邕等頓首頓首死罪死罪譲尚書奏董卓為司空辟邕補侍御史轉侍書御史遷尚書三日之間周歴三台臣謹按漢書髙祖受命流離藏竄十有二年陛下應期中興龍飛踐阼奸臣嬖孽一時殄盡憎疾臣者随流埋沒太尉郿侯卓収拾洗濯上臣髙第補侍御史轉治書御史陛下天地之大德聽納大臣扶飾文舉遂用臣邕充偹機密三月之中充歴三臺光榮顯著非臣愚蔽不才所當盗竊非臣碎首糜軀所能補報臣邕頓首頓首死罪死罪臣聞世宗之時田千秋有神明感動一言以悟聖聽昭發上心故有一日九遷臣邕草莱小臣思謀愚淺生非千秋識不狎練加以新来入朝不更郎署攝省文書其猶面墻陛下統繼大業委政冢宰太傳隗以舊典入録機密事尚書令日磾先輩舊齒德更上公僕射允故司𨽻校尉河南尹尚書張熹已歴九列侍中魯旭牧守宣藩剖符數郡唯臣官位㣲賤特單輕匹此六臣臣當自知况於論者將謂臣何是以夙夜寤歎寐息屏營無顔以居無心以寜明時階級人所勸慕乞在他署抱闗執籥以守漏刻則臣之心厭飫足矣降榮於悴退顯於進臣不勝區區疑戒不敢肅飾譲髙陽侯奏初平元年拜左中郎將從獻帝遷都長安封髙陽郷侯詔制左中郎將蔡邕今封邕陳留雍丘髙陽鄉侯下印綬符策假限食五百户嵗五十萬穀臣稽首受詔怔營喜懼精魄播超恍惚如夢不敢自信臣伏惟糠粃小生學術虗淺少竊方正長歴宰府偹數典城著作東觀無狀取罪捐棄朔野䝉恩徙還退伏畎畆復階朝謁進察憲臺遂充機密令守巴郡還偹侍中車駕西還執鞭跨馬及看輪轂升輿下軫扶接聖躬既至舊京出偹郎將中外所疑對越省闥羣臣之中特見褒異訖無雞犬鳴吠之用常以汗墨愧負恩寵誠不意悟猥與公卿以下録功受賞命服金紫爵至通侯非臣草莱功勞微薄所當被䝉臣十四世祖肥如侯佐命髙祖以受爵賞統嗣曠絶除在匹庶臣孑遺苗裔復䝉顯封前功輕重不侔慙惶累息無心怡寜唐虞之朝猶美三譲臣者何人受而不譲臣不勝戰悼怵惕詣闕拜章上所假髙陽侯印綬符策伏受罪誅臣得微勞被受爵邑光寵榮華耀熠祖禰非臣小族陋宗器量褊狭所能堪勝非臣力用勤勞有所當受誠無安寜甘悦之情國憲上行下不敢逆苟順恩㫖退省金龜紫紱之飾非臣容體所當服佩中讀符策誥戒之詔非臣才量所能祗奉歴日彌乆震懼益甚臣聞髙祖受命元功翊德者與共天下爵土故曰使黄河如帶太山若礪國以水存爰及苗裔夫山河至大猶謂之小重功輕賞如此其至也是以戰攻之事大有䧟堅破敵斬将搴旗之功小有馘截首級履傷渉血之難勤苦軍旅連年累嵗首如蓬葆體如漆幹勞瘁辛苦如此其重也以受爵土誰曰不宜今者聖朝遷都應順天人奔走之役臣僕職分宜然臣事輕葭莩功薄蟬翼恐史官録書臣等在功臣之列䧟恩澤之科垂名後葉作戒末嗣非夲朝之德政遇臣之長䇿臣是以宵寢晨興叩膺増歎心煩慮亂喘呼息吸且鷦鷯巢林不過一枝鼯鼠飲河不過滿腹小人之情求足而巳臣不勝大願再譲髙陽侯印綬符策臣忝自叅省資非哲人藩屏之用器非殿邦佐君之才憂心灼烜耳目昏冒忪䝉蔽㒺累息屏氣臣聞稷契之儔以德受命功德靡堪譲所不如昔之范正不忘禮譲其下化之春秋采焉臣雖小醜不足朂厲以躡髙蹤以詩人斯亡之戒觀見符策君國之誨兩印雙紱並在鞶帶至德元功器量宏大猶且踧踖無心寜止况臣螻蟻無功德而散怠茸闒何以居之且晏嬰辭邶殿之邑張良辭三萬之户書籍紀之以為異美夫人君無㺯戯之言憲法有誣㒺之劾臣不敢違戾飭虗以距上㫖疑确之誠與神明通謹奉章詣闕頓首敢固以請息伏惟留省巴郡太守謝版邕由尚書遷巴郡太守復留侍中臣尚書邕免冠頓首死罪臣猥以頑闇連值盛時超自羣吏入登機密未及輸力盡心日下五府舉臣任巴郡太守陛下不復叅論府舉入奏驚惶失守非臣敢安怔營累息不知所措臣邕頓首死罪知納言任重非臣所得乆忝今月丁丑一章自聞乞在閒冗抱関執籥不意録符銀青授任千里求退得進後上先遷為衆所怪不合事宜願乞還詔命盡力他役死而後已臣猥以愚闇盗竊明時周旋三臺充列機衡出入省闥登踏丹墀承隨同位與在行列以受酒禮嘉幣之賜詔書前後賜石鏡奩禮經素字尚書章句白虎議奏合成二百一十二巻及唾壺彈棋石枰蓮香瓠子黎􅄳汁器圍盧諸物誠念及下錫惠周至每敕勿謝前後重疊雖父母之於子孫無以加此未得因縁有事荅稱萬一不意卒遷荷受非任臨時自陳未䝉省許􅆭結屏營踧踖受拜命服銀青光寵休顯上耀祖先下榮昆裔誠非所望且巴土長逺江山修隔頃来未悉輯睦劉焉撫寜有方柔逺功著臣以頑䝉不閑職政宣暢聖化道遵和風非臣才力所能供給必以忝辱煩汚聖朝幸循舊職當竭肝膽從事肋絶骨破以命繼之臣邕頓首死罪表賀録換誤上章謝罪今月十八日臣以相國兵討逆賊故河内太守王臣等屯陳破壊斬獲首級詣朝堂上賀臣邕奉賀録故羽林郎將李叅遷城門校尉而署名羽林左監右衞尉杜衍在朝堂而稱不在録咎在臣不詳省按使叅以亡為存衍以存為亡錯奏謬録不可行侍御史劾臣不敬當賜刑書懲戒不恪陛下天地之德不辱収戮丙辰詔書以一月俸贖罪臣邕怔營慙怖屏氣累息不知所自投處臣邕頓首死罪臣不惟石慶數馬之誤簡忽校讐不謹之愆雖見原宥仰愧先臣傷肌入骨不勝忪䝉流汗臣邕頓首死罪辭金龜紫紱表詔賜陳留蔡邕金龜紫紱謝表邕退省金龜紫紱之飾非臣庸體之所能當也漢末雜事東漢文紀巻十九
