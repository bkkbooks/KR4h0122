body:
  text: 東漢文紀巻二十四明梅鼎祚編鄭𤣥字康成北海髙密人隱居著述稱為純儒獻帝在許都徵為大司農道卒伏后敬父完禮議獻帝皇后父屯騎校尉不其亭侯伏完朝賀公庭完拜如衆臣及皇后在離宫后拜如子禮三公八座議或以為皇后天下之母也完雖后父不可令后獨拜于朝或以為當交拜令后存人子之道完不廢人臣之義又子尊不加于父母雖曰天王后猶曰吾季姜欲令完猶行父法后専奉子禮公私之朝后當獨拜或以為皇后至尊父亦至親交拜則父子無别完拜則傷子道后拜則損至尊欲令公朝者完拜如衆臣于公宫后拜如子不知四者何是正禮鄭𤣥議邴原駁四者不同抑有由焉天子所不臣者三其一后之父母也天子尚不臣况于后乎春秋魯隐公二年紀裂繻来逆女冬伯姬歸于紀又桓八年祭公来遂逆王后于紀九年紀季姜歸于京師或言逆女或言逆王后蓋義有所見也女雖嫁為鄰國夫人其尊無以加于父母嫁于天子者此雖巳女仍言曰王后明當時之尊得加父母也紀季姜歸于京師更稱其字者得行禮而戒之其尊安可加父母耳今不其亭侯在京師禮事出入宜從臣禮若后息離宫及歸寜父母從子禮丞相徴事邴原駁孝經云父子之道天性也明王之章先陳事父之孝女子子出降其父母婦人外成不能二統耳春秋左氏傳曰紀裂繻来逆女列國噂同逆者謙不敢自成故以在父母之辭言之禮敵必三讓之義也祭公逆王后于紀者至尊以無外辭無所屈成言曰王后紀季姜歸于京師尊已成稱季姜從紀子尊不加扵父母之明文也如皇后扵公庭官僚之中令父獨拜違古之道斯義何施漢髙五日一朝太上皇家令譏子道不盡欲㣲感之令太上皇擁篲却行稱臣雖去聖久逺禮文闕然父子之義五品之常不易之道寧為公私易節公庭則為臣在家則為父是違禮而無常也通典藝論太平御覽詩者弦歌諷喻之聲也禮者序尊卑之制崇讓合敬春秋者古史所記之制動作之事也左史所記為春秋右史所記為尚書又通鑑外紀遂皇之後歴六紀九十一代至伏羲始作十二言之教又玉海湯登堯臺見黒烏至武皇渡河白魚躍文皇赤雀止户秦穆公白雀集於車詩譜序𤣥以其列諸侯世及詩之次故名譜詩之興也諒不於上皇之世大庭軒轅逮于高辛其詩有亡載籍亦蔑云焉虞書曰詩言志歌永言聲依永律和聲然則詩之道放於此乎有夏承之篇章泯棄靡有孑遺邇及商王不風不雅何者論功頌徳所以將順其美刺過譏失所以匡救其惡各于其黨則為法者彰顯為戒者著明周自后稷播種百榖黎民阻饑兹時乃粒自傳於此名也陶唐之末中葉公劉亦世修其業以明民共財至於太王王季克堪顧天文武之徳光煕前緒以集大命於厥身遂為天下父母使民有政有居其時詩風有周南召南雅有鹿鳴文王之屬及成王周公致太平制禮作樂而有頌聲興焉盛之至也本之由此風雅而來故皆録之謂之詩之正經後王稍更陵遲懿王始受譛亨齊哀公夷身失禮之後邶不尊賢自是而下厲也幽也政教尤衰周室大壞十月之交民勞板蕩勃爾俱作衆國紛然刺怨相尋五覇之末上無天子下無方伯善者誰賞惡者誰罰紀綱絶矣故孔子録夷王懿王時詩訖于陳靈公滛亂之事謂之變風變雅以為勤民恤功昭事上帝則受頌聲𢎞福如彼若違而弗用則被劫殺大禍如此吉凶之所由憂娛之萌漸昭昭在斯足作後王之鑒於是止矣夷厲已上歳數不明太史年表自共和始歴宣幽平王而得春秋次第以立斯譜欲知源流清濁之所處則循其上下而省之欲知風化芳臭氣澤之所及則傍行而觀之此詩之大綱也舉一綱而萬目張解一巻而衆篇明于力則鮮于思則寡其諸君子亦有樂扵是與戒子益恩書鄭𤣥别傳𤣥子益字益恩孔融舉為孝亷融為黄巾所圍赴難殞身𤣥疾篤自慮以書戒子益恩吾家舊貧不為父母羣弟所容去厮役之吏游學周秦之都徃來幽并兖豫之域獲觀乎在位通人處逸大儒得意者咸從奉手有所授焉遂博稽六蓺麤覽傳記時覩秘書緯述之奥年過四十乃歸供養假田播殖以娛朝夕遇閹尹擅執坐黨禁錮十有四年而䝉赦令舉賢良方正有道辟大將軍三司府公車再召比牒併名早為宰相惟彼數公懿徳大雅克堪王臣故宜式序吾自忖度無任扵此但念述先聖之元意思整百家之不齊庶幾以竭吾才故聞命罔從而黄巾為害萍浮南北復歸邦郷入此歳來已七十矣宿素衰落仍有失誤案之禮典便合傳家今吾告爾以老歸爾以事將閒居以安性覃思以終業自非拜國君之命問族親之憂展覲墳墓觀省野物胡嘗扶杖出門乎家事大小汝一承之咨爾㷀㷀一夫曾無同生相依其朂求君子之道研鑚勿替敬慎威儀以近有徳顯譽成于僚友徳行立于已志若致聲稱亦有榮於所生耳可不深念耶吾雖無紱冕之緒頗有讓爵之髙自樂以論贊之功庻不遺後人之羞末所憤憤者徒以亡親墳壠未成所好羣書率皆腐敝不得於禮堂寫定傳與其人日西方暮其可圖乎家今差多於昔勤力務時無恤饑寒菲飲食薄衣服節夫二者尚令吾寡恨若忽忘不識亦已焉哉後漢書麤别傳作究覲作孝胡作曷咨爾作吾鄭氏婚禮謁文贊九子之墨藏於松煙本姓長生子孫圖邊又嘉禾為榖班禄是宜吐秀五七乃名為嘉並初學記又秔米馥芬婚禮之珍又女貞女貞之樹柯葉冬生寒涼守節險不能傾又鴈候隂陽待時乃舉冬南夏北貴其有所又鴛鴦鳥雄雌相對飛止相匹並藝文類聚又金錢為質所歴長久金取和明錢用不止又長命之縷女工所為太平御覽又舍利為獸獸而能謙禮義乃食口無譏諐太平御覽又巻栢藥草附生山顚屈巻成性終無自神太平御覽趙商子河内人字子聲晉李宓傳宓釋河内趙子聲譏詩賦之屬二十餘篇詣鄭康成學書夫學之于人猶土地之有山川也珍寶扵是乎出猶樹木之有枝葉本根於是乎庇也遺文書北海鄭𤣥字康成學之淵府今與業共徃就之故皆不暇領命並北堂書鈔髙誘淮南鴻烈解敘淮南王名安厲王長子也長髙皇帝之子也其母趙氏女為趙王張敖美人髙皇帝七年討韓信扵銅鞮信亡走匈奴上遂北至樓煩還過趙不禮趙王趙王獻美女趙氏女得幸有身趙王不敢内之扵宫為築舍于外及貫髙等謀反發覺并逮治王盡收王家及美人趙氏女亦與焉吏以其得幸有身聞上上方怒趙王未理也趙美人弟兼因辟陽侯審食其言之吕后吕后不肯白辟陽侯亦不强争及趙美人生男恚而自殺吏奉男詣上上命吕后母之封為淮南王暨孝文皇帝即位長弟上書願相見詔至長安日從遊宴驕蹇如家人兄弟怨辟陽侯不争其母於吕后因椎殺之上非之肉袒北闕謝罪奪四縣還歸國為黄屋左纛稱東帝坐徙蜀嚴道死於雍上閔之封其四子為列侯時民歌之曰一尺繒好童童一升粟飽蓬蓬兄弟二人不相容上聞之曰以我貪其地耶乃詔四侯而封之其一人病薨長子安襲封淮南王次為衡山王次為廬江王太傅賈誼諌曰怨讐之人不可貴也後淮南衡山卒反如賈誼言初安為辯逹善屬文皇帝為從父數上書召見孝文皇帝甚重之詔使為離騷賦目旦受詔日早食已上愛而秘之天下方術之士多徃歸焉於是遂與蘓飛李尚左吳田由雷被毛枝伍被晉昌等八人及諸儒大山小山之徒共講論道徳統總仁義而著此書其㫖近老子淡泊無為蹈虗守静出入經道言其大也則燾天載地說其細也則淪扵無垠及古今治亂存亡禍福世間詭異瓌竒之事其義著其文富物事之類無所不載然其大較歸之于道號曰鴻烈鴻大也烈明也以為大明道之言也故夫學者不論淮南則不知大道之深也是以先賢通儒述作之士莫不援采以驗經傳以父諱長故其所著諸長字皆曰脩光禄大夫劉向較定撰具名之淮南又有十九篇者謂之淮南外篇自誘之少從故侍中同縣盧君受其句讀誦舉大義會遭兵災天下棊峙亡失書傳廢不尋修二十餘載建安十年辟司空掾除東郡濮陽令覩時人少為淮南者􅘨遂陵遲於是朝餔事畢之間乃深思先師之訓參以經傳道家之言比方其事為之注解悉載本文并舉音讀典農中郎將弁揖借八巻刺之㑹揖身喪遂亡不得至十七年遷監河東復更補足淺學寡見未能悉其所不逹注以未聞唯博物君子覽而詳之以勸後學者云爾趙咨字文楚東郡燕人為東海相徴拜議郎勑子𦙍書咨疾將終告其故吏朱祗蕭建等使薄歛素棺藉以黄壤不聽子孫改之乃遺書勑子於是奉行時稱明逹夫含氣之倫有生必終盖天地之常期自然之至數是以通人逹士鑒兹性命以存亡為晦明死生為朝夕故其生也不為娛亡也不為戚夫亡者元氣去體真魂遊散反素復始歸于無端既已消仆還合糞土土為棄物豈有性情而欲制其厚薄調其燥溼邪但以生者之情不忍見形之毁乃有掩骼埋窆之制易曰古之葬者衣以薪藏之中野後世聖人易之以棺槨棺槨之造自黄帝始爰自陶唐逮扵虞夏猶尚簡樸或瓦或木及至殷人而有加焉周室因之制兼二代復重以牆翣之飾表以旌銘之儀招復含歛之禮殯葬宅兆之期棺槨周重之制衣衾稱襲之數其事煩而害實品物碎而難備然而秩爵異級貴賤殊等自成康以下其典稍乖至于戰國漸至穨陵法度衰毁上下僣雜終使晉侯請隧秦伯殉葬陳大夫設參門之木宋司馬造石槨之奢爰暨暴秦違道廢徳滅三代之制興滛邪之法國貲迷于三泉人力單於酈墓玩好窮于糞土伎巧費扵窀穸自生民以来厚終之敝未有若此者雖有仲尼重明周禮墨子勉以古道猶不能禦也是以華夏之士爭相陵尚違禮之本事禮之末務禮之華棄禮之實單家竭財以相營赴廢事生而營終亡替所養而為厚葬豈云聖人制禮之意乎記曰䘮雖有禮哀為主矣又曰喪與其易也寧戚今則不然并棺合槨以為孝愷豐貲重襚以昭惻隱吾所不取也昔舜葬蒼梧二妃不從豈有匹配之㑹守常之所乎聖主明王其猶若斯况扵品庶禮所不及古人時同即㑹時乖則别動静應禮臨事合宜王孫裸葬墨夷露骸皆逹於性理貴于速變梁伯鸞父沒巻席而葬身亡不反其屍彼數子豈薄至親之恩亡忠孝之道邪况我鄙闇不徳不敏薄意内昭志有所慕上同古人下不為咎果必行之勿生疑異恐爾等目厭所見耳諱所議必欲改殯以乖吾志故逺采古聖近揆行事以悟爾心但欲制坎令容棺槨棺歸即葬平地無坟勿卜時日葬無設奠勿留墓側無起封樹於戲小子其勉之㦲吾蔑復有言矣後漢書酈炎字文勝范陽人對事客問酈炎曰吳王昌不傳子而傳兄弟四人傳者將以致國乎季札季札不受雖有僚立闔閭之弑春秋猶以不受為義不殺為仁而桓譚以吳之簒弑滅亡釁由季札札不思上放周公之攝位而下慕曹臧之謙讓名已細矣春秋之趨豈謂公乎炎曰夫四王之輕命致國乎季子謂其能流慶百世也季子不受内有簒弑之亂外致滅亡之禍雖知潔已之可為不惟宗廟之絶祀其痛矣問曰周制諸侯父死子繼若札從先私志受非所繼是浮行豈節義之謂與闔閭之欲國盖縁札之雅意故曰季子雖至不吾廢也今如吾子之云則君子何稱乎炎曰光知季子仁而無權故肆意焉季子不能討是則春秋所譏仁而不武無能達也子之云公羊也公羊不以父命辭王父命以王父命辭父命不以家事辭國政以國政辭家事衛輒拒父猶謂之可況以國治簒弑之子乎祭仲行權公羊嘉之云君可以死易生國可以存易亡季子不然猶可善乎此盖公羊之失非義之通者也周公誅二叔不為不仁宋穆受兄國不為不義君子急病而讓夷故踐明堂朝諸侯非榮其位為時之急也以季子之才君國子民行化四方與夫勾踐相去幾何若令向時見國危亂慕周公急時之義思先君致國之意攝政持統邁其威徳奚翅遷都瑯琊尚征上國朝齊宋鄭魯衛執玉之君哉孔子稱可與立道未可與權權反經而善聖之達節者也季子守節之士故非其量度乎問者因又謂炎曰古者聖人封建諸侯皆云百里取象於雷雷者何取也炎曰易震為雷亦為諸侯雷震驚百里曰何以知之炎曰以其數知之夫陽動為九其數卅六隂静為八其數卅二震一陽動二隂静故曰百里問者稱善古文苑遺令書四首炎有文才州郡辟命皆不就後病風慌忽性至孝遭母憂病甚發動妻始産驚死妻家訟之收繫獄因病不能理遂死獄中白嚴考之神坐炎荷天之罪以致於死名歿身弊神而有知炎之歸覲在旦夕之間耳若其無知將何面目少見靈魂哉其自即安其自愛臣去矣亂矣永滅亡矣又白老母無懐憂懐憂何為無増悲増悲何施寒必厚衣無炎誰為毋厚衣暑必輕服無炎誰為母輕服棄炎無念此常厚衣不尤不怨此常輕服聖人達於死生賢者力而慕之炎之中心私有所慕每讀漢書楊王孫裸葬班固以為賢於秦始皇意常壯之然裸以見先人若炎不為也其布巾取覆頭布衣用蔽形具棺取容身鑿地取容棺若獲罪於衆耶石槨速朽蠲其罪哉堅固不加喪葬無瀆先君之兆域必於瘠确之處而已呼甘陵夫人共居也章樵云炎病不省母已死念之至此可謂孝根于性矣華佗傳甘陵相夫人胎死腹中甞從佗治炎妻新乳而死故云又白興讓考喪早葬𤣥讓之等元昆勉之以老母相累不可使老母無曹也加供養謝嫂以老母相托若死者復知必使其言不愧章樵云興讓當是兄之子又酈篇州書皆字學之書七平蓋效枚乗七發體嗟㦲邈之遺孤其名曰止戈汝長自為之寧咨爾止戈汝未有所識吾謂汝有所識其先見汝耳汝未有所聞吾猶謂汝耳有所聞而告汝人之䘮也非父則母非昆則弟非姊則妺人之孤也齓齒其少矣汝之孤也曾未滿兩旬汝無自以為㣲弱物有㣲弱於汝者乃其長而繁焉后稷棄之寒氷隘巷矣汝比之猶逸焉於菟之在虎乳極矣汝比之猶易焉乃終不在乃始在在懼惟生無懼管蔡之逸厥終乃不逸之易厥終不易言咨嗟止戈汝能言則讚之顧言汝能行則履我之所訓剛焉柔焉弱焉强焉學焉愚焉仕焉隐焉懼汝身之柔可不厲汝以剛乎懼汝之剛可不厲汝以柔乎懼汝之弱可不訓汝以强懼汝之愚可不朂汝以學懼汝之隱可不勅汝以仕乎消息汝躬調和汝體思乃考言念乃考訓必博學以著書以續受父母久業我十七而作酈篇二十四而州書矣二十七而作七平矣其賦誦誄自少為之苟我戒汝尅從祭為甘茍示戒汝克違梁奠為苦汝無逸于丘無湎于酒無安于忍事君莫如忠事親莫如孝朋友莫如信修身莫如禮汝哉其勉之下邳衛府君我之諸曹掾督郵濟北寗府君我由之成就陳留韓府君察我孝亷陳留楊使君辟我右北平從事祭酒今我溺于地下思恩則孤而靡報汝有可以倒㦸背戈無孤之矣陳留蔡伯喈與我初不相見吾仰之猶父不敢以為兄彼必愛以為弟九江盧府君吾父事之張公裒張子傳幼業王延夀王子衍我之朋友也鮮於中優吾先姑之所出也若不足焉汝茍足徃而朝覲之汝不敏徃從之學焉汝苟徃取任焉咨爾止戈吾蔑復有言焉其永覽於此維熹平六年冬十二月乃裂裳書古文苑范冉一作丹字史雲陳留外黄人為萊蕪長未上辟三府遺令冉違時絶俗為激詭之行惟與漢中李固河内王奐善中平二年卒臨命遺令勑子吾生於昏闇之世值乎淫侈之俗生不得匡世濟時死何忍自同于世氣絶便歛歛以時服衣足蔽形棺足周身歛畢便穿穿畢便埋其明堂之奠干飯寒水飲食之物勿有所下墳封髙下令足自隠知我心者李子堅王子炳也今皆不在制之在爾勿令郷人宗親有所知也趙岐字邠卿京兆長陵人初名嘉生扵御史臺字臺卿歴位太常與友書岐取馬融兄敦女宗姜融外戚豪家岐常鄙之不與相見嘗與其友書馬季長雖有名當世而不持士節三輔髙士未曽以衣裾撇其門也三輔決録注别傳云岐娶融從妹融嘗至其家宴飲作樂日夕乃出岐與友書曽讀周官二義不通不徃賤融如此衣一作華遺令岐仕州郡以亷直疾惡見憚年三十餘有重疾自慮奄忽乃為遺令敕兄子其後疾瘳永興二年辟司空掾大丈夫生世遯無箕山之操仕無伊呂之勲天不我與復何言哉可立一圓石于吾墓前刻之曰漢有逸人姓趙名嘉有志無時命也奈何三輔決録序三輔者本雍州之地世世從公卿吏二千石及高貲皆以陪諸陵五方之俗雜㑹非一國之風不但繫於詩秦豳也其為士好髙尚義貴於名行其俗失則趣埶進權唯利是視余以不才生於西土耳能聽而聞故老之言目能視見衣冠之儔心能識而觀其賢愚常以𤣥冬修夜夢黄髪之士姓𤣥名明字子真與余寤言言必有中善否之間無所依違命操筆者書之近從建武以來暨扵斯今其人既亡行乃可書玉石朱紫由此定矣故謂之决録矣孟子題辭孟子題辭者所以題號孟子之書本末指義文辭之表也孟姓也子者男子之通稱也此書孟子之所作也故總謂之孟子其篇目則各自有名孟子鄒人也名軻字則未聞也鄒本春秋邾子之國至孟子時改曰鄒矣國近魯後為魯所并又言邾為楚所并非魯也今鄒縣是也或曰孟子魯公族孟孫之後故孟子仕扵齊䘮母而歸葬于魯也三桓子孫既以衰㣲分適他國孟子生有淑質夙䘮其父㓜被慈母三遷之教長師孔子之孫子思治儒術之道通五經尤長扵詩書周衰之末戰國縱横争兵争强以相侵奪當世取士務先權謀以為上賢先王大道陵遲隳廢異端並起楊朱墨翟放蕩之言以干時惑衆者非一孟子閔悼堯舜湯文周孔之業將遂湮微正塗壅底仁義荒怠佞偽馳騁紅紫亂朱于是則慕仲尼周流憂世遂以儒道逰於諸侯思濟斯民然由不肯枉尺直尋時君咸謂之迂濶於事終莫能聼納其說孟子亦自知遭蒼姬之訖錄值炎劉之未奮進不得佐興唐虞雍熈之和退不能信三代之餘風耻沒世而無聞焉是故垂憲言以貽後人仲尼有云我欲託之空言不如載之行事之深切著明也於是退而論集所與髙弟弟子公孫丑萬章之徒難疑答問又自撰其法度之言著書七篇二百六十一章三萬四千六百八十五字包羅天地揆序萬類仁義道徳性命禍福粲然靡所不載帝王公侯遵之則可以致隆平頌清廟卿大夫士蹈之則可以尊君父立忠信守志厲操者儀之則可以崇髙節抗浮雲有風人之託物二雅之正言可謂直而不倨曲而不屈命世亞聖之大才者也孔子自衛反魯然後樂正雅頌各得其所乃刪詩定書繫周易作春秋孟子退自齊梁述堯舜之道而著作焉此大賢擬聖而作者也七十子之疇㑹集夫子所言以為論語論語者五經之錧鎋六藝之喉襟也孟子之書則而象之衛靈公問陳于孔子孔子答以爼豆梁惠王問利國孟子對以仁義宋桓魋欲害孔子孔子稱天生徳于予魯臧倉毁鬲孟子孟子曰臧氏之子焉能使予不遇哉㫖意合同若此者衆又有外書四篇性善辨文說孝經為正其文不能𢎞深不與内篇相似似非孟子本真後世依放而託之者也孟子既沒之後大道遂絀逮至亡秦焚滅經術坑戮儒生孟子徒黨盡矣其書號為諸子故篇籍得不泯滅漢興除秦虐禁開延道徳孝文皇帝欲廣遊學之路論語孝經孟子爾雅皆置博士後罷傳記博士獨立五經而已訖今諸經通義得引孟子以明事謂之博文孟子長扵譬喻辭不廹切而意已獨至其言曰說詩者不以文害辭不以辭害志以意逆志為得之矣斯言殆欲使後人深求其意以解其文不但施於說詩也今諸解者徃徃摭取而說之其說又多乖異不同孟子以來五百餘載傳之者亦已衆多余生西京世尋丕祚有自來矣少䝉義方訓渉典文知命之際嬰戚于天遘屯離騫詭性遁身經營八紘之内十有餘年心勦形瘵何勤如焉嘗息肩弛擔于濟岱之間或有温故知新雅徳君子矜我劬瘁睠我皓首訪論稽古慰以大道余困吝之中精神遐漂靡所濟集聊欲係思于翰墨得以亂思遺老也惟六籍之學先覺之士釋而辨之者既已詳矣儒家惟有孟子閎逺㣲妙藴奥難見宜在條理之科於是乃述已所聞証以經傳為章句具載本文章别其指分為上下凡十四巻究而言之不敢以當逹者施於新學可以寤疑辨惑愚亦未能審於是非後之明者見其違闕倘改而正諸不亦宜乎陳紀字元方潁川許人太丘長寔子以至徳稱歴官大鴻臚論復肉刑書紀初為此論太中大夫孔融駁難之以衆議不同乃止惟敬五刑以成三徳易著劓刖滅趾之法所以輔政助教懲惡息殺也且殺人償死合于古制至於傷人或殘毁其體而纔剪毛髪非其理也若用古刑使淫者下蠶室盗者刖其足永無淫放穿窬之姦矣後漢紀孔融字文舉魯國人孔子二十世孫為北海太守歴少府為曹操所害著詩頌碑文論議六言䇿文表檄敎令書記二十五篇肉刑議時論者多欲復肉刑融建議乃卒不改古者敦龎善否不别吏端刑清政無過失百姓有罪皆自取之末世陵遲風化壞亂政撓其俗法害其人故曰上失其道民散久矣而欲繩之以古刑投之以殘棄非所謂與時消息者也紂斮朝渉之脛天下謂為無道夫九牧之地千八百君若各刖一人是下常有千八百紂也求俗休和弗可得己且被刑之人慮不念生志在思死類多趨惡莫復歸正夙沙亂齊伊戾禍宋趙髙英布爲世大患不能止人遂為非也適足絶人還為善耳雖忠如鬻權信如卞和智如孫臏寃如巷伯才如史遷逹如子政一離刀鋸沒世不齒是太甲之思庸穆公之霸秦南睢之骨立衛武之初筵陳湯之都賴魏尚之守邉無所復施也漢開改惡之路凡為此也故明徳之君逺度深惟棄短就長不茍革其政者也不别藝文作區别化作俗人作民肉刑論太平御覽今之洛陽道橋作囚徒於厮役十死一生故國家嘗遣三府請詔月一案行又置南甄官使者主養病徒僅能存之語所謂洛陽豪徒韓伯宻加笞三百不中一髠頭至耳髪詣勝此自為刑非國法之意又太平御覽賢者所制或踰聖人水碓之巧勝於斷木掘地馬日磾加禮議獻帝都許融遷少府每朝㑹訪對引正定議初太傅馬日殫使山東至淮南數有意袁術術奪取其節欲逼為軍師日磾遂飲恨而斃及䘮還朝廷議欲加禮融獨議上從之日磾以上公之尊秉髦節之使銜命直指寧輯東夏而曲媚姦臣為所牽率章表署用輒使首名附下罔上姦以事君昔國佐當晋軍而不撓宜僚臨白刃而正色王室大臣豈得以見脅為辭又袁術僣逆非一朝一夕日磾隨從周旋歴嵗漢律與罪人交關三日己上皆應知情春秋魯叔孫得臣卒以不發揚襄仲之罪貶不書日鄭人討幽公之亂斵子家之棺聖上哀矜舊臣未忍追案不宜加禮論荆州牧劉表疏表不供職貢僣行郊祀擬斥乗輿詔下其事融上疏竊聞領荆州牧劉表桀逆放恣所為不軌至乃郊祭天地擬儀社稷雖昏僣惡極罪不容誅至于國體宜且諱之何者萬乗至重天王至尊身為聖躬國為神器陛級縣遠禄位限絶猶天之不可階日月之不可踰也每有一豎臣輒云圖之若形之四方非所以杜塞邪萌愚謂雖有重戾必宜隱忍賈誼所謂擲䑕忌器盖謂此也是以齊兵次楚唯責包茅王師敗績不書晋人前以露袁術之罪今復下劉表之事是使跛牂欲闚髙岸天險可得而登也案表跋扈擅誅列侯遏絶詔命斷盜貢篚招呼元惡以自營衛専為羣逆主萃淵藪郜鼎在廟章孰甚焉桑落瓦解其埶可見臣愚以為宜隠郊祀之事以崇國防奏宜准古王畿制書融奏宜准古王畿之制千里寰内不以封建諸侯獻帝從之曹操潜忌具論封建漸廣風郗慮以㣲法奏免融臣聞先分九圻以逺及近春秋内諸夏而外夷狄詩云邦畿千里惟民所止故曰天子之居必以衆大言之周室既衰六國力征授賂割裂諸夏鎬京之制商邑之度歴載彌乆遂以闇昧秦兼天下政不遵舊革剗五等掃滅侯甸築城萬里濵海立門欲以六合為一區五服為家闗衛不要遂使陳項作難家庭臨海擊柝不救聖漢因循未之匡改猶依古法潁川南陽陳留上黨三河近郡不封爵諸侯臣愚以為千里國内可畧從周官六郷六遂之文分取北郡皆令屬司隸校尉正以王賦以崇帝室投自近以寛逺繇華貢獻外薄四海揆文奮武各有典書後漢紀薦謝該書該字文儀南陽章陵人善明春秋左氏為世大儒仕公車司馬令以親老去官荆州道斷不得歸郷里融上書薦之詔徴還拜議郎臣聞髙祖創業韓彭之將征討暴亂陸賈叔孫通進說詩書光武中興吳耿佐命范升衛宏修述舊業故能文武並用成長乆之計陛下聖徳欽明同符二祖勞謙戹運三年乃讙今尚父鷹揚方叔翰飛王師電鷙羣凶破殄始有櫜弓卧鼔之次宜得名儒典綜禮紀竊見故公車司馬令謝該體曾史之淑性兼商偃之文學博通羣藝周覽古今物來有應事至不惑清白異行敦悅道訓求之逺近少有疇匹若乃巨骨出吳隼集陳庭黄能入寢亥有二首非夫洽聞者莫識其端也雋不疑定北闕之前夏侯勝辨常陰之驗然後朝士益重儒術今該實卓然比跡前列間以父母老疾棄官欲歸道路險塞無由自致猥使良才抱璞而逃踰越上河沉淪荆楚所謂往而不反者也後日當更瞶樂以釣由余剋像以求傳説豈不煩哉臣愚以為可推録所在召該令還楚人止孫卿之去國漢朝追匡衡於平原尊儒貴學惜失賢也薦禰衡表衡建安初來游許下唯善融與揚修常稱曰大兒孔文舉小兒揚徳祖融亦深愛其才為忘年交上疏薦之臣聞洪水横流帝思俾乂旁求四方以招賢俊昔世宗繼統將𢎞祖業疇咨熙載羣士響臻陛下叡聖纂承基緒遭遇厄運勞謙日仄惟嶽降神異人並出竊見處士平原禰衡年二十四字文正淑質貞亮英才卓躒初涉藝文升堂覩奥目所一見輒誦於口耳所暫聞不忘於心性與道合思若有神𢎞羊潛計安世黙識以衡凖之誠不足怪忠果正直志懐霜雪見善若驚疾惡如讐任座抗行史魚厲莭殆無以過也鷙鳥累百不如一鶚使衡立朝必有可觀飛辯騁辭溢氣坌涌解疑釋結臨敵有餘昔賈誼求試屬國詭係單于終軍欲以長纓牽致勁越弱冠慷慨前世美之近日路粹嚴象亦用異才擢拜臺郎衡宜與為比如得龍躍天衢振翼雲漢揚聲紫㣲垂光虹蜺足以昭近署之多士増四門之穆穆鈞天廣樂必有竒麗之觀帝室皇居必蓄非常之寶若衡等輩不可多得激楚揚阿至妙之容臺牧者之所貪飛兔騕䮍絶足奔放良樂之所急臣等區區敢不以聞陛下篤慎取士必須効試乞令衡以褐衣召見必無可觀采臣等受面欺之罪振翼續漢作鳳奮臺牧融集作堂牧南陽東海王時祭對獻帝子南陽王馮束海王衹薨傷其早歿欲修四時之祭以訪融融對聖恩敦睦感時增思悼二王之靈發哀愍之詔稽度前典以正禮制竊觀故事前梁懐王臨江愍王齊哀王臨淮懐王並薨無後同産昆弟即景武昭明四帝是也未聞前朝修立祭祀若臨時所施則不列傳紀臣愚以為諸在沖齔聖慈哀悼禮同成人加以號諡者宜稱上恩祭祀禮畢而後絶之至扵一歲之限不合禮意又違先帝已然之法所未敢處上三府所辟稱故吏事三府所辟州郡所辟其不謁署不得稱故吏臣惟古典春秋女在其國稱女在塗稱婦然則在塗之臣應與為比榖梁傳曰天子之宰通於四海三公之吏不得以未至為差狐突曰䇿名委質貳乃辟也奉命承教䇿名也昔公孫嬰齊卒於狸蜃時未入國魯君以大夫之禮加焉傳曰吾固許之反為大夫延陵季子解劒帯徐君之墓以明心許之信况受三軍之招修拜辱之辭有資父事君之志耶臣愚以為禮宜從重三公所辟雖未執職便為故吏通典奏馬賢事楚相吳起或遺之一榼酒注之上流使士卒迎流飲其下明不獨也馬賢於軍中帳内施毾㲪士卒飄於風雪與曹操論盛憲書憲字孝章㑹稽人初為臺郎路逢融時十餘歲載歸與言知其竒尋舉孝亷補尚書郎稍遷吳郡太守以疾去官歸郷里孫䇿平吳忌憲名囚之融與操書由是徴為騎都尉徴命未至為孫權所害歲月不居時節如流五十之年忽焉已至公為始滿融又過二海内知識零落殆盡惟㑹稽盛孝章尚存其人困於孫氏妻孥湮沒單孑獨立孤危愁苦若使憂能傷人此子不得復永年矣春秋傳曰諸侯有相滅亡者桓公不能救則桓公耻之今孝章實丈夫之雄也天下談士依以揚聲而身不免扵幽執命不期扵旦夕是吾祖不當復論損益之友而朱穆所以絕交也公誠能馳一介之使加咫尺之書則孝章可致友道可𢎞矣今之少年喜謗前輩或能譏平孝章孝章要為有天下大名九牧之人所共稱歎燕君市駿馬之骨非欲以騁道里乃當以招絶足也惟公匡復漢室宗社將絶又能正之正之之術實須得賢珠玉無踁而自至者以人好之也况賢者之有足乎昭王築臺以尊郭隗隗雖小才而逢大遇竟能發明主之至心故樂毅自魏徃劇辛自趙徃鄒衍自齊徃嚮使郭隗倒懸而王不觧臨溺而王不拯則士亦將髙翔逺引莫有北首燕路者矣凡所稱引自公所知而復有云者欲公崇篤斯義也因表不悉㑹稽典録與曹操論酒禁書時年饑兵興操表制酒禁融頻書爭之多侮慢之辭融見操雄詐漸著數不能堪故發辭偏宕多致乖忤魏畧操為司空威徳日盛融以舊意書疏倨傲京兆脂習常責融不從公初當來邦人咸抃舞踊躍以望我后亦既至止酒禁施行夫酒之為徳久矣古先哲王類帝禋宗和神定人以齊萬國非酒莫以也故天垂酒星之燿地列酒泉之郡人著㫖酒之徳堯不千鍾無以建太平孔非百觚無以堪上聖樊噲觧戹鴻門非豕肩鍾酒無以奮其怒趙之厮養東迎其主非引巵酒無以激其氣髙祖非醉斬白蛇無以暢其靈景帝非醉幸唐姬無以開中興袁盎非醇醪之力無以脫其命定國不酣飲一斛無以决其法故酈生以髙陽酒徒著功於漢屈原不餔醩醊醨取困于楚由是觀之酒何負于政哉張璠漢記九州春秋亦載酒星之燿作酒旗之星暢其靈作揚其靈決其法作決法令末句作酒何負于治哉脫尺牘作服誤又書此操答融書融復與之昨承訓答陳二代之禍及衆人之敗以酒亡者實如來誨雖然徐偃王行仁義而亡今令不絶仁義燕噲以讓失社稷今令不禁讓退魯因儒而損今令不棄文學夏商亦以婦人失天下今令不斷婚姻而將酒獨急者疑但惜穀耳非以亡王為戒也孔融集王尺牘作主報曹操書操以融論建太廣潜忌正議御史大夫郗慮承望風㫖以㣲法奏免融官因顯明讐怨操故書激厲融融答之嵗餘復拜太中大夫操既積嫌忌而慮復搆成其罪遂令丞相軍謀祭酒路粹枉狀奏融下獄棄市妻子皆被誅詳魏曹操書下猥惠書教告所不逮融與鴻豫州里比鄰知之最早雖嘗陳其功美欲以厚於見私信于為國不求其覆過掩惡有罪望不坐也前者黜退歡欣受之昔趙宣子朝登韓厥夕被其誅戮喜而求賀况無彼人之功而敢枉當官之平㦲忠非三閭智非鼂錯竊位為過免罪為幸乃使餘論逺聞所以慙懼也朱彭冦賈為世壯士愛惡相攻能為國憂至扵輕弱薄劣猶昆蟲之相嚼適足還害其身誠無所至也晋侯嘉其臣所爭者大而師曠以為不如心競性既遲緩與人無傷雖出胯下之負榆次之辱不知貶毁之於已猶蚊䖟之過也子産謂人心不相似或矜埶者欲以取勝為榮不念宋人待四海之客大鑪不欲令酒酸也至於屈榖巨瓠堅而無竅當以無用罪之耳他者奉遵嚴教不敢失墜郗為故吏融所推進趙衰之㧞郤縠不輕公叔之升臣也知同其愛訓誨發中雖懿伯之忌猶不得念况恃舊交而欲自外于賢吏哉輒布腹心脩好如初苦言至意終身誦之並後漢書太平御覽融與路粹書朱彭冦賈之徒當世壯士愛惡相攻能為國患輕薄劣弱者如兩虺相嚼適足還災其身誠無所致按本此書中語與曹操書操攻屠鄴城袁氏婦子多見侵畧而操子丕私納袁熈妻甄氏融與操書操不悟後問出何經典融曰以今度之想當然耳武王伐紂以妲己賜周公啁曹操討烏桓書建安十三年大將軍逺征蕭條海外昔肅愼氏不貢楛矢丁零盜蘇武牛羊可并案也魏氏春秋與韋甫休書陶淵明聖賢羣輔録韋端字甫休杜林人位涼州牧太尉尺牘作林甫誤使君足下懐逺垂勲西戎即敘前别意恨甚多不悉卒從事至承獲所訊喜而起居不恙而到也云便結駟徑至舊治西土之人宗服令徳解仇崇好以順風化萬里雍穆如樂之和雖為國家威靈感應亦實士縠堪事之效也昔伯安由幽都而登上司子琰以豫州而取宰相近事未逺當勉功業以豐此慶耳間僻疾動不得復與足下岸幘廣坐舉杯相於以為邑邑又韋康字元將誕字仲將並端子融與端書康任涼州刺史為馬超所殺誕仕魏中書監前日元將來淵才亮茂雅度𢎞毅偉世之器也昨日仲將又来懿性貞實文敏篤誠保家之主也不意雙珠近出老蚌甚珍貴之三輔決録注昨日仲將又来一作昨日又見弟仲將文敏篤誠作開敏志篤藝文合前一篇尺牘仍之並誤決録本二篇與張紘書紘見吳絃建安四年為孫䇿奉章至許宫留為侍御史融等皆與親善後曹操聞䇿薨令紘輔權内附出紘為㑹稽東部都尉及權討江夏以東部少事命紘居守遥領所職融遺紘書聞大軍西征足下留鎮不有居者誰守社稷深固折衝亦大勲也無乃李廣之氣循髪益怒樂一當單于以盡餘憤乎南北並定世將無事孫叔投戈綘灌爼豆亦在今日但用離析無縁㑹面為愁歎耳道直途清相見豈復難哉循髪本見李陵傳非廣也吳書作倉髪似誤尺牘乃改作倉卒甚失其義又紘既好文學又善楷篆與融書自書融遺紘書美之前勞手筆多篆書每舉篇見字欣然獨笑如復覩其人也並呉書張懐瓘書斷云前勞筆跡乃多為篆荅虞翻書翻見吳翻與融書示以易註融荅之示所著易傳自商瞿以来舛錯多矣去聖彌逺衆說騁辭曩聞延陵之理樂今覩吾君之治易知東南之美者非但㑹稽之竹箭焉又觀象雲物察應寒温推本禍福與神合契可謂探􅄨旁通者已方世清聖上求賢者梁丘以卦筮寧世劉向以洪範昭名想當来翔追蹤前烈相見乃盡不復多陳虞翻別傳非但吳志作非徒吾君作吳子推本作原其合契作㑹契探牘一作探索喻邴原書原字根矩見魏原初署北海功曹融為太守以原為計佐是時漢朝陵遲政以賄成原乃將家人入鬱洲山中郡舉有道融以書喻原原遂到遼東修性保真清虗守髙危邦不入久潜樂土王室多難西遷鎬京聖朝勞謙疇咨雋乂我徂求定䇿命懇惻國之將隕􅊔不恤緯家之將亡緹縈䟦渉彼匹婦也猶執此義實望根矩仁為己任授手援溺振民于難乃或晏晏居息莫我肯顧謂之君子固如此乎根矩根矩可以來矣懇惻一作懇切與邴原書原自遼東欲歸郷里止於三山融移書與之原于是復返積十餘年後乃遁還隨㑹在秦賈季在翟諮仰靡所歎息增懷頃知來至近在三山詩不云乎来歸自鎬我行永久今遣五官掾奉問榜人舟楫之勞禍福動静告慰亂階未已阻兵之雄若棊奕爭梟並邴原别傳未已尺牘作而已與阻兵之雄意義不貫別傳所載自明與王朗書朗見魏朗漢未為㑹稽太守孫䇿渡江畧地與䇿戰敗績乃詣䇿令使詰讓朗對謝服曹操為司空表徴之未至融與之書朗自曲阿展轉江海積年乃至拜諫議大夫叅司空軍事世路隔塞情問斷絶感懐増思前見章表知尋湯武罪已之迹自投東裔同鯀之罰覽省未周涕隕潸然主上寛仁貴徳宥過曹公輔政思齊並立䇿書屢下殷勤欵至知櫂舟浮海息駕廣陵不意黄能突出羽淵也談笑有期勉行自愛獻帝春秋與許博士書許博士為漢樂器融與書今足下逺以彛器金石並志為國家來儀之瑞亦丈夫之大勲北堂書抄與宗從弟書知晚節豫學既美大弟困而能寤又合先君加我之義豈惟仁弟實專承之凡我宗族猶或頼焉藝文類聚與諸卿書鄭康成多臆說人見其名學謂有所出也證案大較要在五經四部書如非此文近為妄矣若子所執以為郊天鼓必當麒麟之皮也寫孝經本當曽子家䇿乎太平御覽又先日多惠胡桃深知篤意藝文類聚答王修教融為北海太守舉王修孝亷修讓邴原不聽答修教修重辭融答原之賢也吾已知之矣昔髙陽氏有才子八人堯不能用舜實舉之原可謂不患無位之徳以遺後賢不亦可乎重答王修教掾清身潔已歴試諸艱謀而鮮過惠訓不倦余嘉乃勲應乃懿德用升爾于王庭其可辭乎與髙密令教志士鄧子然告困焉得愛釡庾之間以傷烈士之心與豆三斛後乏復言太平御覽繕治鄭𤣥居室教𤣥在徐州孔文舉時為北海相欲其返郡敦請懇惻使人繼踵又下教及歸復告僚屬鄭公乆遊南夏今艱難稍平倘有歸來之思無寓人於室毁傷其藩垣林木必繕治墻宇以俟還告僚屬昔周人尊師謂之尚父今可咸曰鄭君不得稱名也並商芸小說立鄭公鄉告國相孔融深敬鄭𤣥屣履造門告髙密縣為鄭𤣥特立一碑昔齊置士郷越有君子軍皆異賢之意也鄭君好學實懐明徳昔太史公廷尉吳公謁者僕射鄧公皆漢之名臣又南山四皓有園公夏黃公潜光隱耀世加其髙皆悉稱公然則公者仁德之正號不必三事大夫也今鄭君郷宜曰鄭公郷昔東海于公僅有一節猶或戒郷人侈其門閭矧乃鄭公之徳而無駟牡之路可廣開門衢令容髙車號為通徳門後漢書與髙密令教太平御覽高密侯國牋言鄭公増門之崇令容髙車結駟之路出麥五斛以酬執事者之勞衛尉張儉碑銘其先張仲實以孝友左右周室晋主夏盟而張老延君譽于四方君禀乾綱之正性蹈髙世之殊軌氷潔淵清介然特立雖史魚之勵操叔向之正色未足比焉中常侍同郡侯覽専權王命豺虎肆虐威震天下君以西部督郵上覽禍亂凶國之罪鞠沒贓姦以巨萬計俄而制書案驗部黨君為覽所䧟亦章名捕逐當世英雄受命殞身以籍濟君厄者盖數十人故克免斯艱旋宅舊宇衆庻懐其徳王公慕其聲州宰争命辟大將軍幕府公車特就家拜少府皆不就也復以衛尉徴明詔嚴切勅州郡乃不得已而就之銘曰􅁊􅁊我君應天淑靈皓素其質允廸忠貞肆志直道進不為榮赴㦸驕臣發如震霆凌剛摧堅視危如寧周武王漢髙祖論武王從后稷以来至其身相承積五十世俱有魚烏之瑞至髙祖一身修徳瑞有四呂公望形而薦女吕后見雲知其處白蛇分神嫗哭西入闗五星聚又武王伐紂斬而刺之髙祖入秦赦子嬰而遺之是寛裕又不如髙祖也聖人優劣論荀愔等以為聖人俱受乾坤之醇靈禀造化之和氣該百行之髙善備九徳之淑懿極鴻源之深閭窮品物之情類曠蕩出于無外沉㣲淪于無内器不是周不充聖極荀以為孔子稱大哉堯之為君也惟天為大唯堯則之是為覆葢衆聖最優之明文也孔以堯作天子九十餘年政化洽于民心雅頌流于衆聽是以聲徳發聞遂為稱首則易所謂聖人久於其道而天下化成百年然後勝殘去殺必世而後仁者也故曰大哉堯之為君也堯之為聖也明其聖與諸聖同但以人見稱為君爾汝潁優劣論融以為汝南士勝潁川士陳長文難融荅之汝南戴子髙親止千乗萬騎與光武皇帝共于道中潁川士雖抗節未有頡頏天子者也汝南許子伯與其友人共說世俗將壞因夜舉聲號哭潁川雖憂時未有能哭世者也汝南府許掾教太守鄧晨圖開稻陂數萬頃累世獲其功夜有火光之瑞韓元長雖好地理未有成功見効如許掾者也汝南張元伯身死之後見夢范巨卿潁川士雖有竒異未有能神而靈者也汝南應世叔讀書五行俱下潁川士雖多聰明未有能離婁並照者也汝南李洪為太尉掾弟殺人當死洪自劾詣閣乞代弟命便飲酖而死弟用得全潁川雖尚節義未有能殺身成仁如洪者也汝南翟子威為東郡太守始舉義兵以討王莽潁川士雖疾惡未有能破家為國者也汝南袁公著為科甲郎上書欲治梁兾潁川士雖慕忠讜未有能投命直言者也並藝文類聚論太平御覽馬之駿者名曰騏驥犬之駿者名曰韓盧犬之有韓盧馬之有騏驥人之聖也名號異等設使騏驥與韓盧並走寧能頭尾相當八脚如一無有先後之覺矣路粹字文蔚陳留人以髙第拜尚書郎為丞相軍謀祭酒典記室奏孔融狀曹操既積忌融郗慮復搆成其罪令軍謀祭酒路粹枉狀奏融下獄棄市人覩粹所作無不嘉其才而忌其筆少府孔融昔在北海見王室不静而招合徒衆欲規不軌云我大聖之後而見滅于宋有天下者何必卯金刀及與孫權使語謗訕朝廷又融為九列不遵朝議秃巾㣲行唐突宫掖又前與白衣襧衡跌蕩放言云父之于子當有何親論其本意實為情欲發耳子之于母亦復奚為譬如寄物瓶中出則離矣既而與衡更相贊揚衡謂融曰仲尼不死融答曰顔回復生大逆不道宜極重誅後漢書東漢文紀巻二十四
