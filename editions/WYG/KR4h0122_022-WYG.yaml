body:
  text: 東漢文紀巻二十二明梅鼎祚編蔡邕四太尉汝南李公碑公諱咸字元卓汝南西平人蓋秦將李信之後孝武大將軍廣之冑也枝流葉布家于兹土文武繼踵世為著姓曽祖父江夏太守伯父東郡太守公受純懿之資萃忠清之節夙夜嚴慄孝配大舜敦詩書而說禮樂觀天文而察地理動與神合契抗流行操邁伯夷徳追孔父舉孝亷除郎中光禄茂才遷衛國公相受髙宻令勤恤民隱政成公簡遷徐州刺史百司震肅饕餮風靡惡直醜正恭事法宮帝念其勤屢被榮命漁陽太守還遷度遼將軍協徳魏綘和戎綏邊徴河南尹母憂乞行服闋奔命孝和皇帝時機宻乆缺百僚僉允詔拜尚書歴僕射令納言危行不絀以公事去民神憤怒羣公薦之帝曰俞哉徴拜將作大匠大司農大鴻臚大僕射公所蒞任憲天心以教育激垢濁以揚清懿鑠之美昭登于上丕顯之化宣聞于下及遷台司位太尉補衮闕叙彛倫天人交格終始無疵雖元凱翼虞周召輔姬未之或踰功遂身退以疾自遜求歸田里告老致仕七十有六嘉平四年薨海内咨嗟莫不惻焉故吏穎川大守張温等相與嘆曰名莫隆于不朽徳莫盛于萬世銘勒顯于鐘鼎清烈光于來裔刻石立碑徳載不冺詞曰天垂三台地建五岳降生我哲應鼎之足奕世載徳名昭圖録既文且武桓桓紹續外則折衝内則大麓惟清惟敏品物以熙告老懸車天人靡欺曽不百齡圯我國基人之云亡八極悼思申徳作頌光寵宣流鐫紀斯石鴻烈顯休朱公叔墳前石碑維漢二十一世延熹六年粤四月丁已忠文公益州太守朱君名穆字公叔卒于京師其五月内申葬于宛邑北萬嵗亭之陽舊兆域之南其孤野受顧命曰古者不崇墳不封墓祭服雖三年無不于寢今則易之吾不取也爾其無拘于俗無廢予誡野欽率遺意不敢有違封墳三板不起棟宇乃作祠堂于邑中南舊陽里備器鑄鼎銘功載德懼墳封彌久夷于平壤于是依徳像縁雅則設兹方石鎮表靈域用慰其孤罔極之懐乃申詞曰歆惟忠文時惟朱父實天生徳丕承洪緒彌綸典術允廸聖矩好是貞厲疾彼强禦斷剛若仇柔亦不茹仍用明夷遘難受侮帝曰休哉朕嘉乃功命汝納言𦙍汝祖蹤父拜稽首翼翼惟恭篤棐不忘夙夜在公昊天不弔降兹殘殃不遺一父俾屏我皇我皇悼心錫詔孔傷位以益州贈之服章用刋彛器宣昭遺光子子孫孫永載寶藏陳留太守胡公碑君諱碩字季叡交趾都尉之孫太傅安郷侯少子也其先與楚同姓别封于胡以國為氏臻乎漢奕世載德不替舊勲君㓜有嘉表克岐克嶷不見異物習與性成孝於二親養色寜意蒸蒸雍雍雖曾閔顔莱無以尚也總角入學治孟氏易歐陽尚書韓氏詩博綜古文周覽篇籍言語造次必以經綸加之行己忠儉事施順恕公體所安與衆共之驕吝不萌于内喜愠不形於外可謂無競伊人温㳟淑慎者也初以公在司徒除郎中宿衛十年遭叔父憂以疾自免州郡交辟皆不就後以大將軍髙第拜侍御史遷諌議大夫以將軍事免官舉賢良方正不詣公車建寧元年召拜議郎納忠盡規匪懈于位遷侍中虎賁中郎將是年遭疾屢上印綬詔書聽許以侍中養疾其年七月被尚書召不任應命詔使謁者劉悝齎印綬即拜陳留太守君聞使者至加朝服拖紳使者致詔君以手自繫陳辭謝恩其明二十一日遣吏奉章報謝意氣精朗是日疾大漸刻漏未分奄忽而卒時年四十一天子憫悼詔使者王謙送葬以中牢具祠賜錢五萬布百疋贈榖三千斛同位畢至赴弔雲集生榮未艾没有餘哀于是遐邇搢紳爰暨門人相與嘆述君徳追痛不寘恒切情憭無不永懐行由已作名自人成先民既邁賴兹頌聲嗟我明哲如何勿銘乃作辭曰猗歟懿徳令聞有彰祗服其訓克搆克堂孝思惟則文藝丕光敦厚忠恕衆悅其良綏弱以仁不云我强爰自登朝進退以方見幾而作如鴻之翔乃位常伯恪處左右兼掌虎賁禁戎允理遘兹虐疴帝用悼止俾守陳留庶篤其祉王人既詔景命不俟嗚呼昊天殱我英士如何贖也命不自已哀哉永傷萬年是紀太守胡公碑銘君諱碩字季叡交趾都尉之孫太傅安樂侯之子也順帝時為郎中桓帝時遭叔父憂以疾自免荆州將軍毎辟輙辭疾後以髙等拜侍御史遷諫議大夫舉賢良方正病不詣公車建寧元年七月拜陳留太守病加不任應召詔使謁者劉悝即授印綬二十一日卒詔遣使者王謙以中牢具祠特賜錢五萬布一百疋贈榖三千斛儔類赴送逺近鱗集于時陳留主簿髙吉蔡軫等咸以郡選充備官屬來迎者三十四人奔驚䟦渉願承清化逢天之戚不獲延祚痛心絶望切怛永慕乃相與衰絰庭位號咷靈柩將窆申敕修儀疚在輿服寮御部引各執其職路人感愴觀者嘆息遂樹碑作銘以表令德於藐下國瞻仰俊乂欽見我君爰綏我恵式昭績恩有勞其瘁昊天不弔景命顚墜悠悠蒸黎惆悵喪氣政雖未宣古之遺愛祁祁我君習習冠盖修誠以迓曽不東邁靈魂徘徊靡所瞻逮惟其傷矣胸肝摧碎勒銘告哀傳千萬代琅琊王傅蔡公碑君諱朗字仲明蓋倉頡之精𦙍姬稷之末胄也昔叔度文王之昭建侯于蔡以國氏焉迄于平襄周祚㣲缺王室遂卑齊晉交争强楚侵陵昭侯徙于州来公族分遷氏家于圉奕葉載徳常歴官尹以逮于兹君雅操明允威厲不猛履孝悌之性懐文藝之才包洞典籍刋摘沉秘知幾逹要通含神契既討三五之術又采二南之業以魯詩教授生徒雲集莫不自逺並至栖遲不易其志簞食曲肱不改其樂心棲清虗之域行在玊石之間是以徳行儒林智周當代四岳稱名帝曰予聞元和元年徴拜博士舒演奥秘贊理闕文所立卓爾度躡雲蹤其選士也抑頑錯枉進聖擢偉極遺逸于九臯揚明徳于側陋㧞茅以彚幽滯用濟加以清敏廣平好是正直規誨之䇿日諫王庭忠讜著烈令聞流行聖朝以藩國貴胄先帝遺體或以繼絕襲位正于阿保未洽雅訓驕盈僣差或蹈憲理非𢎞直碩儒莫能匡弼蔡君審行修徳進退可度遷河間中尉琅琊王傅乃從經術之方示以裴諶之威率禮莫違其國用靖雖安國之輔梁孝仲舒之相江都靡以加焉勲績既盛帝簡其功將授上位遷于紫宫賦夀不永遘此疾凶年五十八永興六年夏卒嗚呼哀哉凡百君子咨痛罔極殷懐傷悼含涕流惻如何昊天䘮我師則爰勒斯銘式昭其徳天敏明哲於赫我君含𢎞光大𤣥覽孔真濳樂教思韞玊衡門雲龍感應養徒三千珠藏外耀鶴鳴聞天若時徴庸登祚王臣綜彼前疑定此典文叅佐七徳俾相大藩身沒稱顯永遺令勲表行揚名垂示後昆汝南周巨勝碑君諱勰字巨勝陳留太守之孫光禄勲之子也君應坤乾之淳靈繼命世之期運𤣥懿清朗貞厲精粹體仁足以長人嘉徳足以合禮總六經之要括河洛之機援天心以立鈞贊幽明以揆時沉静㣲宻淪于無内寛裕𢎞博含乎無外巨細洪纎罔不總也是以實繁于華徳盈乎譽初以父任拜郎中疾去官察孝亷是時郡守梁氏外戚貴寵非其好也遂以病辭太守復察孝亷乃俯而就之以明可否然猶私存衡門講誨之樂不屑已也又委之而旋故大將軍梁冀専國作威海内從風世之雄材優逸之徒莫不委質從命而顚覆者盖亦多矣聞君洪名前後三辟卒不降身由是搢紳歸髙羣公事徳太尉司徒再辟三辟察賢良方正州舉孝亷皆病不就擾攘之際災𤯝仍發聖上詢諮師錫䇿命公車特徴君仰瞻天象俯察人事世路多險進非其時乃托疾杜門静居里巷無人跡外庭生蓬蒿如此者十餘年强禦不能奪其守王爵不能滑其慮至延熹二年乃更闢門延賔享宴娛樂及秋而梁氏誅滅十二月君卒然則識幾知命可觀于斯矣洋洋乎若徳雖崇山千仞重淵百尺未足以喻其髙究其深也夫三精垂耀處者有表爰在上世作者七人焉有該百行備九徳齊光日月洞靈神明如君之至者與亶所謂天明之秀也享年五十不登期考遐邇歎悼痛心矢圖乃相與建碑勒銘以旌休美其辭曰厥初生民天賜之性有龎有醇有否有聖伊惟周君允卜其政誕兹明徳自貽哲命煥乎其文如星之布確乎不㧞如山之固追踪先緒應期作度潜心大猷覃思徳謨遁世無悶屢辭王寮洋洋泌丘于以逍遙蔑爾童䝉是訓是教瞻彼榮寵譬諸雲霄優哉游哉侔此𢎞髙名振華夏光耀昆苖清風丕揚徳音孔昭彭城姜伯淮碑宋歐静識之序蔡中郎集云姜伯淮碑稱建安二年而邕前死初平三年為可疑鼎案史姜肱靈帝熹平二年卒此建安二字傳訛耳邕後肱死十數年尚是邕文先生諱肱字伯淮彭城廣人也其先出自帝𦙍在皇唐蓋與四岳共葉能禮于神舜命秩宗爰封于吕其裔吕望佐周克殷俾侯齊國姓有姜氏即其後也髙祖祖父皆豫章太守穎隂令先生既蹈先世之純徳體英妙之髙姿立性純固百行修備故其平生所能事親惟孝如大舜五十而慕友于兄弟有棠棣之華蕚韡之度體惠理和有上徳之素安静守約恩及嬰兒至操動信邑中化之外户不閉治藏無隱及其學而知之者三墳五典八索九丘俯仰占候推歩隂陽有名物定事之能獨見先覩之效然猶學而不厭誨人不倦童冠自逺方而集者盖千餘人夫水盈而流徳交而形是故徳行外著洪聲逺布華夏同稱名振當世凡十辟公府九舉賢良方正公車特徴𤣥纁禮聘又家拜犍為太守大中大夫先生盤桓育徳莫之肯就不隕穫于貧賤不充詘于富貴㧞乎其萃出乎其類生民之傑也年七十有七熹平二年四月辛巳卒于是從游弟子陳留申屠蟠等悲悼傷懐懼㣲言之欲絶感絶倫之盛事乃建碑於墓甄述景行邈矣先生應天淑靈孝友是備上徳是經𢎞此文藝耽怡是寧恂恂善誘童冠来誠有􅂱其譽有煥其聲顯顯羣公並加辟命赫赫聖皇仍獲其聘委䇿避國守此𤣥静綽乎其裕確乎其操疇昔洪崖雙名並髙嗟乎殞没搢紳永悼依依我徒靡則靡效勒銘金石彌逺益曜貞節先生范史雲碑先生諱丹字史雲陳留外黄人陶唐氏之後也其在周室有士㑹者為晋大夫以受范邑遂以為氏漢文景之際爰自南陽来家于成安生惠延熹二年官至司農廷尉君則其後也君受天正性志髙行潔在乎㓜弱固巳藐然有烈節矣時人未之或知屈為縣吏亟從仕進非其好也退不可得乃託死遁去親戚莫知其謀遂隠竄山中渉五經覽書傳尤篤易與尚書學立道通久而後歸遊集太學知人審友苟非其類無所容納介操所在不顧貴賤其在郷黨也事長惟敬養稚惟愛言行舉動斯為楷式郡縣請召未嘗屈節其有備禮招延虗已迓止亦為謀奏盡其忠直以處士舉孝亷除郎中莱蕪長未出京師䘮母行服故事服闋後還郎中君遂不從州郡之政凡其事君過則弼之闕則補之通清夷之路塞邪枉之門舉善不拘階次黜惡不畏强禦其事繁多不可詳載雅性謙儉體勤能苦不樂假借與從事荷負徒行人不堪勞君不勝其逸辟太尉府俄而冠帶或以羣黨見嫉時政用受禁錮君罹其罪閉門静居九族中表莫見其面晩節禁寛困于屢空而性多檢括不治産業以為卜筮之術得因吉凶道治民情以受薄償且無咎累乃鬻卦于梁宋之域好事者覺之應時輙去禁既蠲除太尉張公司徒崔公前後四辟皆不就仕不為禄故不牽于位謀不茍合故特立于時是則君之所以立節明行亦其所以後時失途也年七十有四中平二年四月卒太尉張公兖州劉君陳留太守淳于君外黄令劉君僉有休命使諸儒叅按典禮作誄著諡曰貞節先生昭其功行録記所履謀于耆舊刋石樹銘先示來世於顯貞節天授懿度誕兹明哲允廸徳譽如淵之清如玉之素溷之不濁湼之不汙用行思忠舍藏思固伯夷是師史鰌是慕榮貧安賤不恡窮迕甘死善道遺名之故身沒譽存休聲載路王子喬碑王孫子喬者盖上世之真人也聞其僊舊矣不知興于何代博問道家或言頴川或言彦䝉初建斯域則具斯丘傳承先人曰王氏墓紹𦙍不繼荒而不祠歴載彌年莫之能紀暨于永和元年十有二月當臘之夜上有哭聲其音甚哀附居者徃聞而怪之明則登其墓察焉洪雪下無人踪見一大鳥跡在祭祀之處左右咸以為神其後有人著綘冠綘大衣杖竹䇿立冡前呼采樵孺子尹秃謂曰我王子喬也爾勿復取吾先人墓前樹也須㬰忽然不見時令太山萬熈稽故老之言感精瑞之應咨訪其驗信而有徴乃造靈廟以休厥神于是好道之儔自逺来集或絃歌以詠太一或談思以歴丹田其疾病尫瘵者静躬祈福即獲祚若不䖍恪輙顚踣故知至徳之宅兆真人之先祖也延熹八年秋八月皇帝遣使者奉犧牲以致祀祗懼之敬肅如也相國東萊王章字伯義以為神聖所興必有銘表昭示後世是以賴郷仰伯陽之踪關民慕尹喜之風乃㑹長史邊乾訪及士𨽻遂樹𤣥石紀頌遺烈俾志道者有所覽焉詞曰伊王君徳通靈含光耀秉純貞應大道羡久榮棄世俗飛神形翔雲霄浮太清乘螭龍載鶴軿戴華笠奮金齡揮羽旗曵霓旌懽罔極夀億齡昭篤孝念所生歲終闕發丹情存墓冡舒哀聲遺鳥跡覺舊城被綘衣垂紫纓呼孺子告姓名由此悟感怖驚修祠宇反几筵饋饎進甘香陳時傾顧馨明禋匡流祉熈帝庭祐邦國相黔民光景福耀無垠𤣥文先生李子材銘𤣥文先生名休字子材南陽宛人也其祖李伯陽周柱下史覿衰世而遁焉其後雄俊豪傑徃徃崛出自戰國及漢名臣繼踵支胄散逸其遷于宛尚矣王莽竊位漢祚中移考翼佐世祖匡復郊廟錫封茅土卿相牧守于時相逐休少以好學㳺心典謨既綜七經又精羣緯約深極奥窮覽妙㫖居則玩其辭動則察其變雲物不顯必考其占故能獨見前識以先神意若古今常難疑義錯繆前人所希論後學所不覽休盡剖判剥散幽暗靡不昭爛猶發憤于目所不覩體所不閑遂登東岳觀百王遺風習容闕里以協禮衷退而講誨童冠仰焉僔僔如也郡署五官掾功曹司空胡公顯以儒譽特進大鴻臚仍優禮固請秉讓執虗辭此三命不為利回不為義疚臨寵審已不動其守可謂純潔皓素綽有餘裕者已其于郷黨細行敦睦九族篤信交友不可得而詳也初娶配出後配未字年既五十苖𦙍不字以永夀二年夏五月乙未卒凡其親昭朋徒相與大會而葬之鼎爼之禮節文曲備時令戴君臨䘮命諡郡遣丞掾冠蓋咸届既定而後罷焉于是故好朋舊僉以仲尼既沒文不在兹韞櫝美玉䘮莫賈之求而無繼慺爾永思乃刋斯石懿徳是丕吁兹先生秉徳㳟勤天啓哲心其學孔純經緯是綜雅麗是分行已守道匪禮不遵處約不戚聞寵不欣榮不能華威不能震天淑厥命以讓以仁有惠云載惟邦之珍按典考諡諡以𤣥文身没名彰配黔作隣遺譽罔極丕昭億年嗚呼哀哉處士圂叔則銘鼎按董逌廣川書䟦辨四皓名曰固公自是秦博士周庚以常居圈中故謂圏公蔡邕集載有圈典此則云圂音混鼠所居也不同伊漢二十有一世處士有圂典字叔則者夫其生也天眞淑性清理條暢精㣲周宻包括道要致思無形深總歴部纎入藝文藻分葩列如春之榮守根據窮不虗其聲偉徳若兹惟世之英乃遂隐身髙藪稼穡孔勤童䝉來求彪之用文不義富貴譬諸浮雲州郡禮招休命交集徒加名位而已莫之能起也博士徴舉至孝耻已䖏而復出若有初而無終潔耿介于丘園慕七人之遺風年七十有五建寧二年六月卒臨沒顧命曰知我者其蔡邕乃為銘載書休美俾来世昆裔永有諷誦于先生之徳其辭曰民之齊敏卓時挺生思心精叡綜物通靈術有𤣥妙于時游情聞道睹異惕然若驚守死善操與世無營渾其若濁徐然後清綽其若煥終其益貞有恒實難獨秉其經嗟爾來世是瞻是聽陳留索昏庫上里社銘曰社祀之建尚矣昔在聖帝有五行之官而共工子勾龍為后土及其沒也遂為社祀故曰社者土地之主也周禮建為社位左宗廟右社稷戎醜攸行于是受脤土膏恒動于是祈農又頒之于兆民春秋之中命之供祠故自有國至于黎庻莫不祀焉惟斯庫里古陽武之户牖郷春秋時有子華為秦相漢興陳平由此社宰遂佐髙帝克定天下為右丞相封曲逆侯永平之世虞延為太尉司空封公至嘉平延弟曾孫放字子卿為尚書外戚梁冀乗寵作亂首䇿誅之王室以績封召都亭侯太僕太常司徒毗天子而維四方克措其功徃烈有常于是司監爰暨邦人僉以為宰相繼踵咸出斯里秦一漢三而虞氏世焉雖有積善餘慶修身之致亦斯社之所相也乃與樹碑作頌以示後昆惟王建祀明事百神乃顧斯社于我兆民明徳惟馨其慶聿彰自嬴及漢四輔代昌爰我虞宗乃世重光元勲既立錫兹土疆乃公乃侯帝載用康神人協祚且巨且長凡我里人盡受嘉祥刋銘金石永世不忘郡掾史張𤣥祠堂碑銘掾諱𤣥字伯雅河南偃師人也其先張仲者實以孝友為名左右周室大漢初興張蒼為丞相封北平侯其後自河南遷于兹土世為顯姓掾天姿恭恪宣慈惠和允恭博敏惻隐仁恕正身履道以協閨庭損用節財以贍疏族動中規矩言合典式不知名彰不飾行著可謂仁粹淑貞自然之素者已論者嘉之州郡禮招署致掾史沉静寡欲不求榮禄是以豐于天爵薄于人位某月日遭疾而卒掾孫翻以貞固之質受過庭之訓獲執㦸出宰相邑遷太守得大夫之禄奉烝嘗之祀尋原祚之所由而至於此先考積善之餘慶隂徳之陽報乃于是立祠堂假碑勒銘式明令徳以示乎後辭曰於惟我考允廸懿徳治信斯順其儀不忒仁惠周洽行惟模則篤垂餘慶貽此燕翼邈矣遺孫用懐多福刋名金石流于罔極袁滿來碑銘茂徳休行曰袁滿來太尉公之孫司徒公之子逸才淑姿實天所授聰逺通敏越齔在闕明習易學從誨如流百家衆氏遇目能識事不再舉問一及三具始知終情性周備夙有竒節孝智所生順而不驕篤友兄弟和而無忿氣決泉逹無所凝滯雖冠帶之中士校材考行無以加焉允公族之殊異國家之輔佐衆律其器士嘉其良雖則童稚令聞芬芳降生不永年十有五四月壬寅遭疾而卒既苖而不穗凋殞華英嗚呼悲夫乃假碑旌于墓表嗟其傷矣惟以告哀童㓜胡根碑銘故陳留太守胡君子曰根字仲原生有嘉表㓜而克才角犀豐盈光潤玉顔聰明敏惠好問早識言語所及智思所生雖成人之徳無以加焉禀命不長夙罹凶災年七歲建寧二年遭疾夭逝慈母悼痛昆娣孔懐感襁褓之親愛憐國城之乖離乃權宜就封二祖墓側親屬李陶等相與追慕先君悲悼遺嗣樹碑刋辭以慰哀思辭曰於惟仲原應氣淑靈實有令儀而氣如瑩明之之性與體俱生聞言斯識覩物知名傳者太勤受誨則成柔和順美與人靡争忿不怨懟喜不驕盈當受福永為光為榮如何昊天降此短齡惜繁華之方曄兮望嚴霜而凋零嗟童孺之夭逝兮傷慈母之肝情從皇祖乎靈兆兮庶神魄之斯寧哀慘戚以流涕兮念汚軫之不呈顧永懐于不朽兮乃託辭于斯銘司空袁逢碑此下至夷齊碑集並不載凡所臨君明而先覺故能教不肅而化成政不嚴而事治其惠和也晏晏然其博大也洋洋焉信可謂兼三才而該剛柔無射于人斯矣銘曰天鑒有漢賜兹世輔顯允厥徳昭𦙍休序峩峩雍宫禮樂備舉穆穆天子孝敬允敘降拜屏著奉饋西序威儀聿修化溢區宇乃尹京邑惣齊禁旅司空房楨碑銘公言非法度不出于口行非至公不萌于心治身則伯夷之潔也儉嗇則季文之約也盡忠則史魚之直也剛平則山甫之勵也惣兹四徳式是百辟夙夜匪懈以事一人枉絲髪樹私恩不為也討無禮當彊禦弗避也是以功隆名顯在世孤特不獲愷悌寛厚之譽享年垂老至于積世門無立車堂無宴客衣不變裁食不兼味雖易之貞厲詩之羔羊無以加也明明在公實惟房后誕應正徳式作漢輔邪慝是仇直亮是與剛則不吐柔則不茹媚兹天子以靖土宇荆州刺史庾侯碑君資天地之正氣含太極之純精明絜鮮于白珪貞操厲乎寒松視鑒出于自然英風發乎天骨事親以孝則行侔于曽閔結交以信則契明于黄石温温然𢎞裕虚引落落然髙風起世信荆山之良寶靈川之明珠也爰在弱冠英風固以揚于四海矣拜為荆州刺史杖冲静以臨民施仁義以接物恩惠著于萬里誠信暢于殊俗由是撫亂以治綏擾以静也帝嘉其功錫以車服方將掃除寇逆清一宇宙廓天步之艱難寧陵夷之屯否翟先生碑世以仁義為質學問為業爰暨先生固天縱徳應運立言繼期五百實行形于州里明哲與聖合契該通五經洗洞墳籍為萬里之塲圃九隩之林澤挹之若江湖仰之若華光𤣥𤣥焉測之則無源汪汪焉酌之則不竭可謂生民之英者已國失元博學失表式凡百搢紳哀矣泣血人百身匪云云來復于是郷黨乃相與登光山伐石而勒銘曰邈矣先生厥徳孔真腹心𢎞道深髙入神王錫三命觀國之賔其樹富貴忽若浮雲既不降志亦不辱身並藝文類聚楊復卑北堂書抄文學之徒擁書抱籍自逺而至禀采豐華斟酌洪流者雍雍焉誾誾焉貞定直父碑其接友也審辨真偽明于知人度終始而後交情不疎而貌親蔡攜碑後漢書注攜字叔業有周之胄昔蔡叔没成王命其子仲使踐諸矦之位以國氏姓君其後也君曽祖父勲哀帝時以孝亷為長安郡長及君之身增修厥徳順帝時以司空髙弟遷新蔡長年七十九卒長子稜字伯直處俗孤黨不協于時垂翼華髪人爵不升年五十三卒謚法曰清白守節曰貞純行不差曰定伯夷叔齊碑此載後漢書五行志後載藝文蓋前為序後為銘或頌總一碑也熹平五年天下大旱禱請名山求獲荅應時處士平陽蘇騰字𤣥成夢陟首陽有神馬之使在道明覺而思之以其夢陟狀上聞天子開三府請雨使者與郡縣户曹掾吏登山升祠手書要曰君況我聖主以洪澤之福天尋興雲即降甘雨也惟君之質體清良兮昔在殷姬忠孝彰兮委國捐爵諌國闕兮譏武伐紂欲喻匡兮時不可救歴運蒼兮追念先侯受命皇兮闕四字憂懐感兮雖沒不朽名字芳兮京兆尹樊徳雲碑銘於顯哲尹誕徳孔彰膺帝休命謂篤不忘爰納忠式規悟聖皇欽崇園邑大孝允光九命車服昭示采章軒軺四牡承祀蒸嘗多士時貢徭役永息道路孔夷民清險棘同體諸舊兆氓䝉福惠垂無疆守以罔極漢交趾都尉胡夫人黄氏神誥夫人江陵黄氏之季女字曰列嬴其先出自伯翳别封于黄以國氏焉髙祖父汝南太守曽祖父延城大尹祖父番禺令父以主簿常證太守事奉明君以立臣節漢南之士以為美談初都尉君娶于故豫州刺史即黄君之姊生太傅安樂侯廣及巻令康而卒繼室以夫人生童紀未齔而夭夫人懐聖善之姿韜慈母之仁撫育二孤導以義方思齊先姑神罔時恫故能迄用有成誕膺繁祉廣歴五卿七公再封之禄康亦由孝亷宰牧二城九鼎之義夫人是享爰暨稚孫更仕三宫或典百里或作虎臣銀艾貂蟬近侍顯尊受兹介福于我夫人自郡尉仕于京師及廣兄弟式敘漢朝夫人居京師六十有餘載其乗輅執贄朝皇后採柔桑于蠶宫手三盆于繭館者盖三十年上有帝室寵光之休下有堂宇斤斤之祚心耽其榮體安其𤣥逺圖長慮慮用遺舊居欲留此焉康寜之時亟以為言太夫人年九十一建寧二年薨于太傅府是月辛酉公之季子陳留太守碩卒于洛陽左池里舍公銜哀悼祗慎其屬遵奉遺意不敢失墜乃俾元孫顯咨度羣儒以考其衷僉曰昔帝舜没于蒼梧殯于虞郊二妃薨于江湘不即兆于九疑延陵季子實惟吳人長子道終卜葬嬴博夫遭時而制不逺遷徙魂氣所之不繫丘壠帝舜以之神罔時怨季札以之仲尼嘉焉鍳帝籍之髙論綜精靈之幽情稽先人之遐迹順母氏之所寜兹事體通而義同允不可替于是公乃為辭昭告先考然後卜定宅兆龜筮悉從遂營窀穸之事舉封樹之禮十月既望粤翌日已酉葬我夫人黄氏及陳留太守碩于此髙原雒陽東界闗亭之阿天子使中常侍謁者李納弔且送葬持賻錢二十萬布二百疋再以中牢祠羣后畢㑹榮哀孔備于時濟陽故吏舊民中常侍勾陽于肅等二十三人思應慕化推本議銘著斯碑石俾諸昆裔瞻仰以知禮之用是為神語乃申頌曰於穆夫人家邦之媛昔在嬴代黄國氏建至于近祖亦降于漢天祚明徳福禄流衍既作母儀履信思順登夀耄耋用永蕃孌子孫以仁追稽先典厝兹洛濵齊跡湘靈配名古人休矣耀光千億斯年太傅安樂侯胡公夫人靈表夫人編縣舊族章氏之長女也字曰顯章令儀小心秉操塞淵仁孝婉順率禮無遺體季蘭之姿蹈思齊之跡永初二年年十有五爰初來嫁誕成家道仰奉慈姑竭歡致敬俯誨膝下化導周悉至徳修于幾微徽音暢于神明故能叅姙姒之功兼生人之榮朝春路寢贊桑蠶宫光寵有祭祭服有珫前後奉斯禮者三十餘載夫人生五男長曰整伯齊次曰千億叔韡次曰寧穉威次曰碩季叡伯仲各未加冠遭厲氣同時夭折叔上郡孝亷季更歴州寧舉茂才葉令京令為議郎季以髙第為侍御史諌議大夫侍中虎賁中郎將陳留太守皆早即世夫人哀悼劬悴由是被疾遭太夫人憂篤年七十七建寧三年薨夫人之存也契濶中饋婉戀供養依生奉仁紹述雅意其閏月附于太夫人窀穸于兹地魂而有靈欽明定省神心欣焉其實寧之元女金盈追慕永思㦧怛罔極遂及斯表䥴著堅珉頌曰悲母氏之不永懐殷恤以摧傷惟子道之無窮惜聞誨之未央庶黄耉以期頥胡委我以夙䘮恒思心以激切亦割肝以絶膓昔先聖之遺辭言仁者其夀長嗟母氏之憂患體愷悌以慈良失延年之報祐獨何棄于穹蒼日月忽以將暮抱長結以含愁尋修念于在昔原疾病之所由遭元子之弱夭心傷悴以自憂暨叔季之殞終哀情結以彌綢皇姑没而中感遂大漸兮速流疾燄燄而日遘氣㣲㣲以長浮銷精魂以遐翔曾不可乎援留爾乃順㫖于𡨕𡨕繼存意于不違爰袝靈于皇姑尚魂魄之有依潜幽室之黯漠惜昭明之景輝一徃超以末及傾徂邈其彌遲顧新廟以累欷伏几筵而増悲嗟既逝之益逺𦕈悠悠而莫追司徒袁公夫人馬氏碑銘維光和七年司徒袁公夫人馬氏薨其十一月葬哀子懿逹仁逹銜恤哀痛靡所寫懷乃撰録母氏之徳履示公之門人覩丈感義采石于南山諮之羣儒假貞石以書焉夫人右扶風平陵人也曽祖中水侯祖將作大匠考南郡太守中水侯弟伏波將軍女在淑媛作合孝明誕生孝章婚姻帝室世為名族夫人生應靈和徳精性妙角犀豐盈實有偉表温慈惠愛愼而寡言㓜從師氏四禮之教早逹窈窕徳象之儀及笄求匹明哲供治婦業孝敬婉孌畢力中饋後生仰則以為謀憲自公歷據王官至宰相夫人營克家道扶翼政事聰明達乎中外隠括及乎無方不出其機化導宣暢童子無驕逸之尤婦妾無捨力之愆故能窮生人之光寵獲福禄之豐報朝春政于王室窮桑繭於蠶宮春秋六十有三寢疾不永懿等追想定省尋思髣髴哀窮念極不知所裁乃申辭曰於穆母氏其徳孔休思齊先始百行聿修宣慈惠和恩澤並周義方之訓如川之流俾我小子䝉昩以滮不享遐年以永春秋徃而不返潜淪大幽嗚呼哀哉几筵虚設幃帳空陳品物猶在不見其人魂氣飄颻焉所安神兄弟何依姊妺何親號咷忉怛曽不我聞吁嗟上天何辜而然傷逝不續徃者不旋議郎胡公夫人哀讚議郎夫人趙氏字曰永姜允有令徳秉心塞淵舒詳閑雅儀節孔備女師四典窈窕徳象罔不習熟以供婦道議郎早世檢誨㓜孤義方以導其性中禁以閑其情孤顥儉節用免咎悔少辟侍中襲先公之爵以議郎出為濟隂太守是時夫人寢疾未薨而國家方有榮陽冦賊震驚帝師簡選州辟授任進衛不得辭王命親醫藥夫人乃自矜精禀氣力俛起若愈以勸遣顥到官月餘所疾暴盛春秋五十八中平四年薨于京師顥有剖符之寄偪于國典疾篤不得顧親増感氣絶不能自宥慎終之事闕焉永廢雖不毁以隨沒亦困悴而傷懐知我如此不如勿生號咷告哀以乞骸骨踰年然後獲聽追惟考君存時之命迎棺舊土同穴此城孤心摧割靡所底念仰瞻二親或有神誥靈表之文敢曰亮闇叙我憂痛作哀讚書之于碑愍予小子夙罹孔艱嚴考殞沒我在齠年母氏鞠育載矜載憐殷斯勤斯慈愛備存匪惟驕之範我軌度教誨嚴肅昭示好惡俾我克類畏威忌怒用免咎悔踐繼先祖即爵其土二將是臨與帝剖符守於濟隂夫人寢疾榮此寵休疾用歡痊翊日斯瘳將征將邁從養陶丘景命徂逝不愍少留疾大漸以危亟兮精㣲㣲而浸衰逼王職于憲典兮子孫忽以替違目不臨此氣絶兮手不親夫含飯陳衣衾而不省兮合綆棺而不見昔予考之即世兮安宅兆于舊邦依存意以奉亡兮遷靈柩而同来考妣痛以慘兮離乖神柩集而移兮増哀黄壚宻而無間兮出入閴其無門舁柩在兹兮不知魂景之所存悼孤衷之不遂兮思情憭以傷肝幽情淪于后坤兮情哀逹乎昊乾劉鎮南碑歐静序云劉鎮南碑建安十三年薨太和二年葬按邕本傳董卓被誅邕為王允所害獻帝初平三年也後改年興平復改建安而太和乃魏明帝時計邕死已三十餘年矣安得紀述耶序又示宗廟頌賛述武皇平亂之功又有昊天眷祐我魏之句盖以宗廟指魏也又有魏武帝祀喬太尉文稱丞相冀州牧魏主操謹遣掾再拜今集未載君諱表字景升山陽髙平人也君應期挺生瑰偉大度黄中通理博物多識為郡功曹千里稱平上計吏辟大將軍府遷北軍中侯在位十旬以賢能特選拜刺史荆州永平元年十一月到官清風先驅莫不震肅姦宄改節不仁引頸君乃頒愷悌流惠和慕唐叔之野棠思王遵之驅卬賦政造次徳化宣行俄而漢室大亂禍起蕭牆賊臣專政豪雄虎争縣邑閭里姦宄烟發州縣殘破天下土崩四海大壊當是時也雖有孔翟之聖賢育賁之勇勢無所措其智力君遇險而建略遭難而發權招命英俊爰得驍雄謀臣武將合䇿明計出次北境遷屯漢隂因滄浪以為隍即春葉以為牖南撫衡陽東綏淄沂西靖巫山保乂四疆選才任良式序賢能簡將命卒棊布星陳備要塞之處戍八方之邉勸穡務農以田以漁稌粟紅腐年榖豐夥江湖之中無刼掠之冦沅湘之間無攘竊之民郡守令長冠帯章服府寺亭郷崇棟髙門皆如其舊當世知名輻輳而至四方襁負自逺若歸窮山幽谷于是為邦百工集趣機巧萬端器械變通民利無窮隣邦懐慕交揚益州盡遣驛使冠蓋相望下民有康哉之歌羣后有歸功之緒莫匪嘉績克厭帝心即遷州牧又遷安南將軍領州如故于時諸州或失土流播或水潦沒害人民死喪百遺二三而君保完萬里至于滄海聖朝欽亮析圭授土遣御史中丞鍾繇即拜鎮南將軍錫鼓吹大車策命褒崇謂之伯父置長史司馬從事中郎開府辟召儀如三公上復遣左中郎將祝耽授節以増威重並督交揚二州委以東南惟君所裁雖周召授分陜之任不逺過也交州殊逺王塗未夷夷民歸附大小受命其郡縣長吏有缺皆來請之君權為選置以安荒裔輙别上聞齊桓遷邢封衛之義也武功既亢廣開廱泮設爼豆陳罍彛親行郷射躋彼公堂篤志好學吏民子弟受學之徒蓋以千計洪生巨儒朝夕講論誾誾如也雖洙泗之間學者所集方之無異也深愍末學逺本離實乃令諸儒改定五經章句刪剗浮辭芟除煩重又求遺書寫還新者留其故本于是古典畢集充于州閭及延見武將文吏教令温雅禮接優隆言不及軍旅之事辭不逮官曹之文上論三墳八索之典下陳世教忠義之方内剛如秋霜外柔如春陽不伐其善不有其庸如彼川流每徃兹通可謂道理丕才命世希有者已仁者夀宜享期耉昊天不弔年六十有七建安十三年八月遘疾殞薨耕夫罷耜織女投杼老幼哀號若䘮父母時道路艱險留墳州土轉移歸葬父勉其子妻勉其夫欲共扶送至于郷里南陽太守樂郷亭侯旻思等言及志在州里者各發卒具送靈柩之資子授徴拜五官中郎將乃疏上請歸本縣葬見聽許太和二年葬于先塋于是故臣忻洽咸以為申伯韓侯之翼周室受輅車乗馬𤣥裘赤舄之賜詩人詠功列于大雅至今不朽况乎將軍牧二州歴二紀功載王府賜命優備賴而生者毓子孕孫能不歌嘆乃作頌曰猗歟將軍膺期挺生桓桓其武温温其仁初幹千里允顯使臣幕府禮命集于北軍督齊禁旅如羆如熊眷然南顧綏我荆衡將軍之来民安物豐江湖交壤刑清國興蔽芾甘棠召伯聽訟周人勿剗我賴其楨欲報之德胡不億年如何殂逝孤棄萬民鐫勒墓石以紀洪勲昭示來世垂芳後昆東漢文紀巻二十二
