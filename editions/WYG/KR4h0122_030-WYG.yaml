body:
  text: 東漢文紀卷三十明梅鼎祚編無名氏樊毅脩華嶽碑無額光和二年十月山經曰泰華之山削成四方其髙五千仭廣十里周禮識方氏華謂之西嶽祭視三公者以能興雲雨產物通精氣有益􅋋人則祀之故帝䑞受堯厯數親自省設五鼎之奠􅂵燎埋致敬神祗艾用昭明百穀繁殖犂民時鳥獸率儛鳯皇來儀曁夏殷周未之有改也其德休明則有禎祥荒淫臊濊䔍災必降秦違其典璧遺鄗池二㕥亡漢祖應運禮遵陶唐祭則獲福亦卋克昌亡新滔逆鬼神􅄇亨違武之初彗掃頑凶更率舊章用𤣥牡牲牷必充天惟醇祐萬國以康光和二年有漢元舅五侯之胄謝陽之孫白樊府君諱毅字仲德承考讓國家于河南䆒職州郡辟公府除防東長中都令誅强撫瘠民二鄙㕥清命守斯邦威隆秋霜恩踰冬日景化旣宣由復夕愓惟寵祿之報順民之則孟冬十月齋祀西嶽㕥傳􅘩狭􅄇足䖏尊卑廟舎􅃇乆屋傾亞卋室􅄇􅁱春秋作譏特部行事荀斑與縣令先讜以漸補冶設中外舘圖珍琦畵嶽瀆之精所出禎秀役􅄇干時而功已著暫勞乆逸神永有慿自古泰山邴色由存五嶽尊同哀此勤民獨不賴福乃上復十里内上商農賦充厭帝心嘉瑞仍風雨應時瀸潤品物君舉必書兄乃盛徳惠及神人可無述焉􅋋是功曹郭敏主簿􅠔襲户曹史許禮等遂刋𤣥石銘勒鴻勛曜軨永有昭識其辭曰兩儀剖判清濁始分陽凝成山隂積為川泰氣㢕洪波臻堯命伯禹決江開汶靈旣闕二字民乃列祀典辬于羣神因瀆祭地嶽以配天主遵􅁱永亨厯年赤銳煌煌受茲福亰夏宻清殊俗賓服令問􅄇違可謂至德徳音孔昭實惟我后出自中興大漢之舅本枝繁昌延慶長乆俾守西嶽逹奉神禮改傅飾廟靈則有濟降瑞祚景風凱惟風及雨成我稷􅎟民用章康艾室宇刋銘紀誦充配梁甫隸釋云華嶽有樊毅碑二華亭華柤及此碑五侯之胄謝陽之孫按范書樊氏矦者五國樊丹封射陽矦毅即丹後也水經泚水西南流謝水注之樊丹封謝陽矦即其國射陽在廣陵髙祖封頃纒為射陽矦据此則傳以丹為射陽誤也碑以識方為職方為禋犂為黎濊為穢瀐為漸兄為况啻軨為億齡即舜字畣即荅字即介字集古錄云其文彬彬可喜此碑即時立而太守乃生稱諱金石錄云周人以諱事神名終將諱之而禮卒哭乃諱漢宣帝詔曰古天子之名難知易諱今上書觸諱者赦之則西漢生死皆稱諱矣生而稱諱見石刻者不獨此碑也漢故太尉陳公之碑篆額後碑君諱球字伯真廣漢太守之元子也葢周􅔅六代媯滿繼建國于陳遝完徂齊實為陳氏公下闕父自營州來宅海淮世躭典籍兼通勤誨振裘褐即徵􅀈荅宰司荷顯貢者繼世而傳焉至公下闕剛寡欲闕惠和髙明柔克甘味道㙯強學博物凡墳素遺訓聖賢立言掬精極㣲無闕不究下闕除郎中尚書苻莭郎恒陵園令換中東城門候遷繁陽令養老長孤救災匡困化􅁖以善擾逆以下闕牟厥澤鴻醇則百姓敬之如神祗愛之如慈親矣曁于􅊲績遭繼母憂祀紀向闋羣公爭招遂下闕拜侍御史爾時蠻闕賊胡蘭李硑等蜂蛾動剥落荆揚出􅘄命將輙有奔北之困太尉楊下闕公嚴闕曲陳為鵞為闕兵揚霆激朞月献㨗有詔厚賜榮書歎述續遇畔兵朱葢等建下闕三牧二守零􅁜之宐初闕阻闕土地平夷編木為城有過未甞䏸亢盖等望下闕以為闕二字入便就館榖公慨然抑􅕂妻子以鎮民心擐甲登埤親䦿吏士身當鋒下闕圍城至乎旬有六日傷熖稍逸仍隨馘截威震南夷功光王室詔拜子為郎下闕優闕二字榮事列闕二字遷魏郡太守徴拜將作大匠㑹孝桓皇帝實掌梓宫闕事身安荼下闕南陽太守父病去官居家半􅏵引授廷尉八議寔闕二字無羍民乃遷衛尉遂作司空闕土闕二字濟可黜否不闕盈仕復拜廷尉進登太常三祀咸闕二字時西戎􅐍王選能闕二字朝下闕舉荒傷干戈斯戢闕三字黜又拜永樂少府六十有二光和下闕執法三應苻守八作卿闕二字任相闕愼在宰割闕二字茂樹闕為志下闕特立闕二字顧秉心茲隆天命弗闕嗚呼哀哉闕是凡我困懞洒掃之下闕廓闕虛愍將闕稚泣涕漣如惟闕􅐍朽左傳紀乃相闕三字勲績銘闕𤣥石下闕六字臨萬國降茲闕爰作民牧逺鎮南闕近撫闕服芟闕五字凶虐字播恩下闕升大鹿沛乎如川􅀈闕猶嶽下闕休休之志天闕為之墮我梁下闕忽思是用鑚勒永闕萬基隸釋云漢人隸法有所謂省文者如爵之為鶴之為寉是也經傳多書蟻作蛾似亦是省文左傳蛾析戴記蛾子時術列子未聚禽獸䖝蛾黄帝紀淳化鳥獸蟲蛾元帝紀白蛾羣飛蔽日長楊賦扶服蛾伏皆讀蛾為蟻隸釋仲秋下旬碑有蛾附之句此云蜂聚蛾動赤蟻省也􅀈即引字􅀈阬君神祠之碑銘篆額并隂光和四年天地位山闕七字嶽瀆諸侯闕事其細闕祭法白林川谷有益􅋋民闕二字在祀典夫中之山者盖華嶽之軆也石隄樹谷南通啇雒㕥屬熊耳百川鍾充崖滿谷時有盛雨彭濞涌溢棄髙趨下揚波跳沬􅋋是􅀈阬㕥爲之夤承寫其流北注諸渭蠲渫滀暴使不為害前通利吏民興貴有御史大夫将軍牧伯故為立祠以報其功自亾新已來其祀癈稍堙塞隄防沮潰漂田疇敗亭市神怒民怨縣遂以賤仕宦失官踣弊不震迄光和四年作詻之嵗令河東聞憙闕君諱闕字君闕爲政以徳五敎時序肅恭明神敬奉禋祀勤䘏民隱而除其害愍一縣之陵遲懼闕至之無備追惟伯禹遏治之利乃復治通利其水紹􅁱舊祀𢎞袥其祠使民報祈視􅋋社稷其有徴拜州郡辟召皆當耒辭大小有差君尚饗後之人是遵是奉神必據焉闕九字光和四年六月辛未造闕六字丞陳􅕂陳􅕂夏龔叔淵左尉金城令居張德元闕有秩長安賈福仲鮫田亮伯南蘇憙仲夏髙紺子彊蘇璋元興路陽子慎闕二字仲義蘇立仲節李卲伯􅊲李政安王勝元超趙榮宣昌侯榮闕方趙殷仲理王􅒮漢侯楊習元永萇防季万冲景升趙濟子成但邵仲雲田芝子張珪子珪栢梁子順來臨選髙許傾闕二字楊平長方李珍伯闕丁封漢侯李和元永范建子順吕泉文淵田表文飾王范􅢃方李紀徳和靳苗長南賈熙子寧任觀闕二字呉楞子方張巽􅏊謙李衡升擢王琦威賢張􅁱元載元明王衍元升田謙敬讓趙季都劉翔進方王頌子睢王咸􅏊寧梁和子陽馬闕選髙􅀢闕仲公􅀢􅈙升髙郭義君思蘇禎元升閔漢國寧郭歆賢明郭􅀈仲楗趙嵩瑋髙劔翊子翊田􅔸􅏊和髙盛排揚服國先賈靚子上慈仁安國張信信隸釋云縣令裴畢字君先立碑無縣令姓名据水經得之􅀈有二陵古稱地險盖水阜髙深雨盛水集有阬以儲之則可以疏泄溉注而無湓溢之患自晉魏以來謂之五部神廟廟有石隄西戍樹谷五樓先生東䑓御史王剪將軍之像考其文意盖謂前世阬不堙塞水泉通利地産人物有至御史将軍牧伯之貴者後人不考亦以名其神爾光和之四年龍集辛酉此碑以作噩爲作詻者出西漢天文志碑之末有題名六十六人云有秩長安知其皆長安人也李翕碑云衡官有秩李瑾倉頡碑云蓮勺左卿有秩衛彈碑云有秩定陵杜則漢志有秩郡所署百石掌一鄉人户五千則置言其官裁有秩也碑以彭為澎即阬字袥即拓字殽阬碑隂上闕五人樷散字鵠伯鸞闕龍子恩梁􅔸伯然張敘敬升鍾乾元遜王裴仲輔王典􅏊讓呉中文和王肅伯雄徐相子柜闕茂宣德張鴻子恩杜賾元載姚堂元政樷闕􅏊舉孔􅁱仲闕二字衛伯闕十一人趙翔徳鸞李暠子師尹擢升先李闕二字禮史暠君義史訇德和張棐彦輔王賢􅀈善靳訓彦德田珠􅀈王史柜􅏊升王鳳德鸞解訓元襲馬彤仲選董衡奉德王興升侯徐稱升舉闕七人又闕二字景傳分覽孔紀闕二字文德張闕延明季覽景豪程闕孔臺壽翼彦瑛呉闕文平王蘭元臺李義孝鸞鄭續􅏊嗣楊㳅􅏊羅闕十八字右郡吏名王祺孔鸞吳楚􅐋林呉頌仲升王衡相如樷常德淵灌珠升明張㑺廣漢郭永子長分演仲費常伯臨藥授博文蕫闕德和闕三字信闕相闕二字又闕一人張訓闕二字李操􅏊卿王巽仲田昌世昌姚恪文珪萇闕元和闕舊􅏊夏廣政方戴玘文直閔芳瑋瑛張祺叔盖王晧景然張奉文鸞田俱伯俱李玹永齊趙超文材陳異子都髙廣廣寧方珪叔珪薛胡威甫救舉遂興韓髙元寳尹廣元佐王方叔叚袁渡廣世闕二人又闕二字升闕二字蒋仲謀田翕伯佑郭曙元良王闕叔海田楞威甫趙撫葢闕來仁伯仁馬𢎞阿買田式文嗣王亰子亰李龍升和陽常子騫趙授保受龎龍子贛李闕二字義王酺雲甫救昘文曜田寧叔威姚豐富闕楊暉進闕張宗宣平范甫次君闕二字子雲闕四人又闕二字􅢃明胡放子封王葢葢徳李康季邑蘇排排蘇香伯志藉昌仲昌田嵐仁卿馬碭碭萇冬冬生王雲文謙緱群伯羣徐位建明趙逹文逹李柫漢威趙昌尹􅈵升和張炅子師略陽亰師張寵孟升李汎長珠徐衡仲緒杜淵季淵闕忠子信王忠長和趙春孟春王覽文進闕二字阿闕一字又闕一人王尊長珪楊子闕上官季弟楊道道寋亮君謙闕滿􅢃成楊石北宫世平楊寧長寧呉累元累許和元德劉興劉盛子上劉奉阿奉劉興阿興劉緒長升鄭文文平袁帶平朱長桂所房字張輔伯輔闕二字孟堅王遠興苹選孟方陳友友潘亰阿亰北宫子禄朱汜伯闕李延延方靳政方政車春阿春田􅐋􅏊􅐋孫慎子慎王賀元賀長阿長張選安田髙長髙魚升升明趙始始昌楊明阿明楊陽阿陽張丙阿丙李靚孔和趙墨阿黒李賢阿賢張長阿長李南阿南巍騫伯信李誨元稱藥􅈙子長楊覽文博侯文都張僉元行王進闕楷田暜元臺蘇闕伯臺楊祺伯昌孫恪文敬桓􅀈公平范叙文彊劉文文載呉鴻子超趙懿子潘建文徳虞協選和陳歩才朱子史容子容楊吉文行闕遠子遠北宫阿猛王剛季􅘉布字張侯孟都張蕃市生駱紹承先蘇都丈馬金阿金趙覽文博車詡季詡靳􅐋􅐋平巍憙闕憙闕汜文丈田黒阿黑闕一人吴闕三字田闕阿羣髙悰子珪陳傾阿傾杜寔阿寔韓廣廣寧任員阿員趙㣲阿越田擢子闕王臺臺田闕孝闕夏侯阿升吴道文建王尊阿尊龍曜文曜于綱升髙馮羣阿羣松龍文獻吴鳳阿鵠趙衆文徳李超元徳闕􅁱文和侯畼文義田寄阿寄詹觀阿闕田闕二字􅐋賈闕仲闕一字义闕一人田闕三字李崇阿崇來暠升髙楊才逹升趙長阿長龍寧阿寧帶官阿宫蘇永德長王忠阿忠張湘元闕李曜􅏊才張蘭蘭卿史式阿式鄭儉莭董逯升髙任羣阿羣潘升阿升楊敞阿敞田通升逹嚴别阿保趙客阿生田讜阿讜龍就􅏊德任遷阿遷張金阿金陳奉文和髙揚宣舉闕三字逹闕一人壽葢阿葢張飛􅏊龍賈鳳阿奉王脱萬歳略陽孝弟趙尊元敬闕玉闕瑛戴闕文持趙闕元崇夏統子治田受子道髙眞子愼楊通子通張睢子升張寧子安吳丙子升闕豪文賀隗益阿盛張漢子闕甄謀子謀侯選子選張睢睢闕孫龍子闕趙堅子堅巍生長生金闕三字杜闕三字又闕一人略陽子闕季偃子闕秦盧孔盧楊闕子闕樂朝朝卿王炅阿炅三公山碑隸額四年光和封龍君靈山君上闕二字分氣建立乾乾為物父為物母運生六子闕二字為闕土為山闕二字風雨天有九部地有八極天地通闕神明別序州有九山闕成土北闕之山闕升闕阻上為祈首闕隂寳南號三公厥體嵩厚峻極于天􅁕帝闕二郡宗祀闕奉闕三字公嘉佑闕為形觸石闕雲不崇而雨隂闕氛廓莫不闕一字徳配五王公所緒四時珪璧月醮酒脯闕公降闕六字志列闕羣后或在王庭輔翼聖主颺雨時降和其寒暑年豐嵗稔分稷倉府旣盈以榖士女闕二字得進陳其俎黄龍白伏在山所闕二字億兩為耦草木畼茂巨仭不下民知禁順時而取皆受徳化非性能者明公垂㤙􅘰極保我國君羣犂百姓闕受元恩光和四嵗在辛酉四月闕朔二日甲子元氏左尉上郡白土樊瑋字子義瑋闕要闕二字陵側陋出従幽谷遷于喬木在中州尸素食禄闕以弱闕歸于闕族闕眀闕讙闕以闕足觀聽闕二字道無拾遺消扞闕難路無怨讟應亷選貢名王室靈祗福祚施闕册於是感恩闕二字立銘勒石乃作頌曰儼儼明公民所瞻兮凶闕窈窕石巖巖兮髙倉闕二字候羣神兮興雲致雨除民患兮長吏肅闕二字心兮四時奉祀􅎟稷闕兮用闕五字兮百姓家給國富殷兮仁愛下下民附親兮遐邇携負来若雲兮或有薪采投輻檀兮或有闕鬼阻出闕兮或有闕四字耘兮或有隠遁辟語言兮或有恬淡飬晧然兮或有呼吸求長存兮跂行喙息皆闕恩兮闕佑樊瑋出谷遷兮封矦食邑傳子孫兮刻石紀徳示後昆兮永永不闕億載年兮舉将南陽冠軍君姓馮諱廵字季祖闕􅁱六經之要柝闕三字㞢厯受命北征為民父母攘去冠闕用无闕姦闕越竟民移俗改恭肅神祗敬而不怠皇靈闕佑風雨時節農闕埶耜或耘或耔童妾饁敬而賓之稼穰穰榖至闕錢􅅩粟如火咸褢仁心君姿前喆喬季文䔍闕稂秀不為苛煩愍俗陵迡闕二字咨闕山無隱士藪無逸民褢道以徳慕此闕二字百姓歐歌我惠君功叅周邵受禄􅃓天長履景福子子孫孫闕長史甘陵丼陵夏方字伯陽令亰兆新豐王翊字元輔丞河闕二字武李闕字公興石劉元􅔅隸釋云三公之碑隸額兩旁又有封龍君靈山君六隸字頗大郡國志常山國元氏注云有石塞三公塞所謂三公塞即此山也石塞即白石山也白石碑云縣界有六名山三公封龍靈山先得法食無極山碑載光和詔書出元氏縣錢給三公山四時祠具又云三公山與龍靈山無極山共興雲雨蓋封龍與靈山是兩山之名揭其神於額之旁者即是配食三公之祠故碑中有鼎足之文也頌云儼儼明公民所瞻兮碑云願名公垂恩㒺極保我國君盖以明公稱山之神而謂國相為國君也碑以仭為牣犂為黎叔為菽秀為莠迡為遅歐為謳鼎為鼎字即黍字即凶字芓即耔字即壺字褢即懷字無極山碑篆額四年光和光和四年闕月辛邜朔廿二日壬子大常丞敏頓首上尚書謹案文書男子常山蓋髙上黨范遷詣闕三字為元氏三公神闕二字本初元􅏵二月癸酉光和二年二月戊子詔書出其縣錢給四峕祠具去年五月常山相廵遣吏王勲三闕𢎞詣三公山請雨山神即使髙傅言令勲裦歸闕雨可三公山即與龍靈山無極山共興雲交雨國相廵元氏令王翊各白􅇗塞神山復使髙與遷及縣吏和卞令俱詣大常為無極山神索灋食比三公山臣疑高遷言􅄇實輒移本國闕覈今常山相書言部督郵書掾成熹訊實問熹縣令翊各言無極山與俱生肳上至軆可三里所立石為軆二丈五尺所政南闕上闕青下黄白色前政平可布兩大席山周帀廿餘在西南丗里縣界有名山其三公龍靈山皆灋食每長吏祈福吏民禱告如言有騐乞合無極山比三公龍靈山祠闕七牲出用王家錢小費蒙大福尊神㠯珪璧為信臣愚㠯為如廵言為民来福㠯祠祀爲本請少府給珪璧本市祠具如癸酉戊子詔書故事報臣愚頓首頓首上尚書制白可大尚承書事上闕月十七日丁丑尚書令忠奏雒陽宫光和四年八月辛酉十七日丁丑尚書令忠下光和四年八月辛酉十七日丁丑大常丞敏下常山相闕事下承闕用者如詺書書到言昔在禮䓦國有名山能材用興雲出雨為民來福除央則祀元氏縣有先峕三公龍靈山已法食而獨未光和四年二月所子大男盖髙上黨范遷奏記大常大常下郡國相南陽馮府君咨之前志闕問耆傁僉㠯為寔神且明每國縣水旱及民疾病禱祈輒應旹有報又有終南之敦物與岱崇之柗及楊之闕滌蕩為材用􅋋是乎出官民􅋋是乎給在禮秩祀有功必報今旹無極山應灋食誠其宜耳􅋋是言大常奏可其年八月丁丑詔書其九月更造神廟祏祠宫置吏犧牲制月醮旹祠禮與三山同乃立碑銘德頌山之神為其曰巗􅀈無極厥軆魏魏嵩闕萬常闕二字梯谷千刄窈窕隈楙林倉氣蔚伊闕􅀈􅀈礙闕遙望儼然即就有威觸石膚寸興雲祁祁雨我公田遂及我私百糓用成家有其資禱􅓙請祈應速不迡鳥獸艸木畨茂隆闕四字猥神為之哀欽案禮䓦咨古遺則功加􅃓民官報其徳今七牲珪璧法食改舘興廟恢祏宇室增益吏役㳟君下職月醮旹祀肅植齊闕必博碩酒必嘉粢盛馨香如禮􅄇失君歆享降福孔闕官名禱祈僉闕宻勿有㠯禳解報應可必闕二字灋食将祐我君我君高闕泉多子孫君其遺慶副稱􅀈云常山相南陽軍馮廵字季祖長史頴川闕申屠闕字闕二字元氏令亰兆新豐王翊字元輔丞河内闕二字左尉上郡白土闕二字字闕二字祠祀掾闕賢㢘香闕椽和闕五字祠仁徳椽樊㳤史吳宜小吏呉黑光和四年十月十三日闕三字石􅘄闕二字造隸釋云蔡質漢宫典儀曰司隸城門校尉上尚書言頓首上下言誠皇恐頓首上謁者上尚書頓首死罪上下言誠皇恐頓首死罪上今所有者史晨樊毅兩碑皆用謁者式與蔡説合惟此碑其後但再稱頓首又太常稱臣而丞不稱莫詳其制碑云有終南之敦物岱宗之松楊越之篠蕩盖以敦物為終南所産與松篠同科今經史多作惇物注云山之名也顔之推謂詩之有渰萋萋興雲祁祁當是興雨趙氏据此碑云漢以前本皆作興雲因顔氏改之予按左雄傳已作興雨祁祁則漢代言詩者自不同由唐以來定本始以興雨為正非因顔氏也碑以塞為賽央為殃條為篠刄為仭畨茂為蕃茂灋即灋字覈即覈字即天地字即從字即戇字袥即拓字即杶字傁即叟字左傳趙傁傳傁是也漢故稾長蔡君之頌隸額四年光和君諱湛字子德河􅁱武人也其先闕周封􅅩闕二字葉文王采食蔡闕五字􅋿其氏麻世卿尹有功王室迄于大漢踐繁隆任台翼外作股肱元初之闕三字擾攘君􅊲銜詔東掃其宰化闕苻守吴郡􅄪闕二字復牧青州聲所加闕三字愛樹之美湛􅋿其子也少耽七典闕二字碩材闕二字州郡名寳鄉黨辟州從事上闕三字舉孝㢘以疾辭讓應司􅑫府除廣川長公事去官復辟太尉以熹平四年六月乙卯詺書除闕四字政也躬清潔以革穢班五禮以齊衆官􅋿不勞民亦事於斯闕二字孝翕習而帥闕三字蕭滌而雲消爾乃來幽秀於巖列嘯闕二字於閭閻欽耆賢以闕命闕齊以殊禮闕三字良闕足而思莭為惡迎化而移心闕清和而琬琰時雨應氣而投間嘉祥臻闕四字生年糓豐儲嵗有其成逺鄰附就户口増前視事三年遷髙邑令吏民追思如闕三字朝夕思焉夫播禮以正少律以擿姦為而穪治盪盪有功闕飛陶唐氏其孰能闕三字乎鄭産宻豹之徒殆不及矣葢良君興遺愛闕民栞銘樹古今之通義也於是吏闕三字栗尹䓁相與合㑹立碑起頌􅀈斯石焉其辭曰穆穆蔡君國之俊應禮闕二字不降其光乃就台鼎厲足髙闕協羙公門職是望闕賦廣川不挫其芳乃色厲更迹惟良舒羽来臨我國是煌靡闕不闕不通民用寧闕以康三載勲㝡功蹬王府命作髙邑臨拜州闕吏民追思乃銘其叙昭示闕裔亦孔之表君徳含洪有君子道四焉聖朝明哲以爵寵賢光和四年十二月甲闕詔書拜并州刺史光和四年七月七日丁闕二字隸釋云頌後又志其并州之除盖續書也碑以盪為湯飛為非麻即㦄字􅘉即布字􅋿即則字􅝏即厲字即禱字校官之碑隸額四年光和蓋漢三百八十有七載闕于闕銘功著斯金石畀誄曰溧陽長潘君諱乾字元卓陳國長平人蓋䠂大傳潘崇之末緒也君禀資南闕之闕德之絶摻髫髦克敏闕學典謨祖講詩易剖演奥藝外覽百家衆儁挈聖抱􅄇測之謀秉髙世之分屈私公卽仕佐上郡位既重孔武箸疾惡義形風征㬥執訊獲首除曲阿尉姦戔息譱歡履菰竹之㢘蹈公儀之絜察㢘除茲初清肅賦仁義之風闕三之迹化放虖岐周流愛䨇虖闕親臤寳進直退慝􅘉政優優令儀令色獄呼嗟之寃叩匈之結孤頥老表孝貞莭重義輕利制户六百有正繇􅄇自畢百姓心歡官􅄇失實於是逺人聆聲景附樂受一㕓旣來安之復役三年惟泮宫之敎反失之禮構􅁱學宫宗㦤招徳旣安且寧于侯用張豆用發彼有的闕閑鐘磬縣矣亐樂焉乃叙曰翼翼聖慈惠我蔾蒸貽我潘君平茲溧陽彬尨﨣武扶弱抑彊闕刈骾䧺流惡􅂋忠咨疑元老師臤朋􅁱學童琢質繡章寔天生德有漢将興尚旦在㫺我君􅔅今闕􅀈龜艾遂尹三梁永支百民人所彰子子孫孫卑尒熾昌丞沛國銍趙勲字伯左尉河内汲蕫竝字公右尉章南昌程陽字孝遂時将吏名户􅔟掾楊淮議􅔟掾李就議􅔟掾􅁊檜戸􅔟史賀闕掾位侯祖主記史吳超門下史吳訓門下史呉翔門下史時球闕七字光和四年十月已丑朔廿一日已酉造隸釋云此碑紹興十三年溧水尉喻仲逺之固城湖中其間用字剗省其刀賢去其貝干侯用張者周禮士以三耦射豻侯大射禮用千字尚旦在昔者似謂太公周公也碑以蔾為犂卑為俾即從字即厲字即垂字即智字􅅲即退字即野字即責字即蔓字即房字元至順四年文學掾單禧復為此碑釋文補正洪氏其不同者二十七字載金薤琳琅今亦采入且寧單釋作以寧逢童之碑篆額并隂光和四年童子諱盛字伯彌薄令之𤣥孫遂成君之曾孫安平君之孫五官掾之長子也胎懷氣生克自然捬育孩嚶弱而能言至於垂髦惠㧨過庭受退誦詩禮心開意審聞一知十書晝􅒑柜制中园􅭠日就月将學有絹熈才亞后橐當為師楷自天生授罔不在初謂當令儀令􅊶齊珪角列朝進仕究竟人爵克啓厥後以彰明德􅏷嗣昭達何寤季世顥天不惠伯彊涇行降此大戾年十有二嵗在恊給五月乙巳噏不反犮隕精晃苗而不命有􅠊無可奈何慈父悼傷割哀回鯉其十二月丁酉而安措諸永潜黄􅹘没而不􅔅於是門生東武孫理下宻王升感憿三成一列同義故共刋石叙述才美以銘不朽其辭曰嘉慈伯彌天授其姿克岐㠜聰敏逹當蓫􅂒迆立號連基時非三代苻命無恒人生在世夀無金石身潜名彰􅂋於後葉光和四年四月五日丁卯立𨽻釋云才亞后橐當為師楷甘羅曰項橐七嵗為孔子師趙廣漢傳銗筩之銗字項缿有項音故借后為銗又借缿為項也嵗在未曰協洽史記亦作叶洽又作汁洽此作協給亦借也制中园􅭠者又借􅭠為范而用园為模也碑以柜為矩奈河為柰何憿為激􅂒迆為委虵即智字啓即啓字即蚤字逄盛碑隂五官掾崔孟祖五官掾吕仲謙􅇂􅗯􅝳敬賔􅇂􅗯周便祖􅇂􅗯梁懷則􅇂􅟷司文􅅩盛􅇂郵􅝳后升右縣中士大夫髙宻徐承興祖平夀孫嘉世賓下宻王升髙闕琅邪東武孫理子義右家門生刁眞解子逄信伯臺隸釋云􅝳后升已右曰縣中士大夫者其父黨也故不名刁眞逄信在家門生之左又其微者漢故安平相孫府君之碑隸額并隂光和四年府君諱根字元石司空公之伯子樂安太守之兄子漢陽太守侍御史之兄氏令之考厥先出自有殷𤣥商之系子湯之苗至于東吅大仁聖宐周封干之墓𦙍裔分柝避地匿軌姓曰孫為闕四字各以文憲将相諸國君其胄也於君權輿發基有嶷受性明叡聞一知十誦詩習藉硑綜其真講闕二字童冠􅎧營發憤臨川教誨􅄇倦莭撡忼慨􅀈毅仲行束立朝政事敏通心小志大日宵在公闕四字琦其分闕式叙在位極驥之路察孝抱疚中司乃就匡以忠三事歸稱遷鄲長興吏所好去闕四字奐有成雍奴令先施􅀶受威而􅄇猛換元氏考城令以塞延竚後我之望圻甫考績埾朝蕳闕四字議大夫升降闛闥天子是禆讜言未列遭公夫人憂憔悴消形齒􅄇見口服闋徴拜議郎謁者闕四字濟濟衎謇􅄇撓荆州刾史蠢爾獫狁闕二字手稽徳澤㳅征速於置􅟷聖上貪暱徴拜議郎闕四字坐無䨇輔弼唐虞上稽闕古功紀宗無善􅄇章安平相遵脩前列五闕訪之譽闕四字温之仁以寕土彊求已􅄇媚以􅍚去官闔門守家􅄇競時榮飬育孤穉以保夀上乾弗祐獲疾固闕二字闕七十有一以光和四􅏵十二月乙已卒嗚呼有哀孝嗣夙夜􅄇舎嚴父孝孫臨殯禮服承後怛有感闕惟古聖孔尼喪鯉贏縮有命􅄇可増損於是握粟卜葬中坰冠闕奔赴充衢塞庭同胞惻愴涕淚交零吥吥豎子號咷失聲故吏門生邦人咸曰令問弗銘闕勒孰覩孰聞乃立石碑昭名􅄇㱙其辭曰皇矣府君含德厚純恢廓術藝以道莅民行行義勇無猾􅄇儐抑抑珪質光有暉綏強以闕二字弱以仁罰惡以威賞善刋闕恩仲伯撥亂蔡謫㩲闕巖恪􅊶正􅄇犯子飬闕珉化與産闕配㦲九䧕闕相彼大國東菅儉􅄇損晏宣慈惠和􅄇可詘桓桓烈烈剛􅄇可折闕三字城闕四字其闕四字父闕三字袉子孫闕一字􅄇闕隸釋云司空者名郎永夀中自太常為三公姓氏書未嘗以孫氏為比干之後碑云至于東吅大虐仁聖武定周封干之墓説文音吅為喧按班孟堅幽通賦云東厸虐而殱仁注云厸古鄰字謂紂也仁即三仁也碑中之語盖出于此則是以吅為厸以為殱即為戕也闛讀為閶儐讀為賔􅀈斆䧕即虐耽鞶鼎彛教赫域字孫根碑隂中軍督孫𤣥象孫彦龍大中孫孝考舎人孫延叔愽昌領校孫叔淵孫九原大中孫始中大中孫長國舎人孫長聲舎人孫長陵中郎孫休聲大中孫子固五官掾孫真伯五官掾孫稱仁舎人孫元㑹中郎孫長宰舎人孫𤣥固大中孫倫伯大中孫遺緒陽豐長孫長升郎中孫長恂大中孫𤣥秋舎人孫登文舎人孫方聲舎人孫孟初中郎孫紹世計史孫穆旡孫孟昭駙馬都尉孫孟陵計史孫元俊孫元威大中孫叔元孫仲俊孫士應舎人孫巨先計掾孫朝鳯督郵孫長威孫彦威大末尉孫仲春孫士威孫威􅊼孫令輿孫𤣥虎孫應陽孫仲有孫休仁孫伯譽孫世治孫宗嗣孫延熈孫来舒孫義伯孫子雲益闕領校孫夷叔孫延嗣中郎孫穉承孫元中孫稚始孫時祖孫道安孫林夏孫祖房孫世羣孫𤣥通孫林舒孫方晃孫休明闕二字領校終利士楊孫望之大中王延祖孫宣瑜孫令機中郎孫長同孫承初闕世龍孫長應終利延世孫俊延終利茂真孫長春終利道機駙馬都尉王應明閔世𤣥孫震光孫士侈孫世祖孫𤣥祚舎人王仲基孫長元王延夏孫叔元劉俊文孫士基劉孟真孫林衡閭丘長龍孫𤣥嶷萬君翁孫初基孔季闕孫上英孔世俊孫闕􅁊徐士英孫闕二字浩景同督郵孫徴時孫班梁王春劉彦闕孫武龍大中王闕二字孫慶髙郎中闕二字臺孫長芝闕洪度祭酒孫士中舎人閭丘長世孫公儀孫闕周孫景秋孫世尼孫林祖孫祖林孫孟袒孫林季孫叔祖孫列秋孫武秋孫延基孫世治孫景安孫道文孫休英孫萬春孫祖倫舎人孫稚龍孫泰斌孫道開孫士昭孫斌初孫道寧孫長里孫元春孫雄真孫元安孫龍舒孫伯康孫仲豐孫闕二字孫􅀈孫乾泰孫宣明孫黄伯孫祖𤣥孫公威孫泰夏孫休祖孫平叙孫林夏孫君沖孫威明孫泰遠孫君雅孫君治孫絃藐孫泰雲孫道倫孫泰真孫子長孫泰冲孫威平孫奉孫次昌孫元齊大中孫長明孫刊闕發大中孫延宗孫欽伯大中孫延武孫万應孫將孫令元孫偉範孫宣祖舎人孫偉明孫道林孫龍威孫長平孫武祚闕二字領校盧闕二字五官掾孫彛仲大中王彦康孫平舒舎人王彦祖孫羲叔王延林孫承舒王􅢃祖孫伯智孫祖仲孫士􅁊孫𤣥寳計史孫孟本孫大石孫士和孫洪基孫延威孫陽治孫祖初孫陽季舎人孫𤣥發孫列闕孫世固孫稚權孫暉中孫泰權孫𤣥治孫道徴孫元祖孫惠儒孫武胄孫泰真孫初平孫顧期孫𤣥寵孫尚忠舎人孫徳林孫威御孫惠明孫闕公孫令明孫闕元孫穆恭孫景威孫定表孫景雲孫方倫孫闕孫彦伯孫景闕孫長舒舎人孫闕應孫闕元隸釋云碑隂有嘗仕縣邑者則陽豐長太末尉是也其稱駙馬都尉祭酒舎人中郎五官掾督郵計史計掾則漢官也有博昌領校等數人張納碑亦有領校安漢長樊敏稱領校巴郡太守盖是未命于朝者其中軍督則非漢官甚明又有大中十四人陳勝傳以朱房為中正兩漢無之魏陳羣始擇州之有鑒裁者為中正晉宣帝加置大中正故有大小中正乃是晉官似是孫根後裔衆多譜其名於上世之碑隂也漢故凉州刺史魏君之碑篆額四年光和君諱闕字元京兆闕都尉下闕有畢萬者去仕㬜逄勛封􅠔秦下闕良爰曁于君禀乾氣純履輶奚下闕聖喆闕五字苞容允執䖍恭其仕州郡也躬素忠謇犯而勿欺兼綜憲法通識百典下闕孝亷除郎中尚書侍郎右丞遭泰夫人憂服闋還䑓拜尚書侍郎秉總下闕廷􅀈績特拜左丞每在選舉遜讓匪石鑚前忽後遂耽思舊章尋㣲貫闕能下闕樞衡匡九年而冈西羌放動餘類末詶咨羣惟徳是與拜涼州刾史下闕流㠯盪耶志樂季文粟帛公儀徹織庖園莭崇文徳㠯来逺班下闕下戎􅀢服干戈戢臧施舎弗劵求善􅄇猒舉不失選官不易方百工惟時下闕有優洋洋奐乎若徳光燿􅃣乎諸牧蓋四時序功成則􅂒君屢辭以疾三下闕無而式度􅄇可革幣芾其縱而耇􅄇徃来升春秋闕十光和四闕民失慈父四海内莫匪摧傷於是故吏茂丈雲中大守漢陽闕胄從事下闕威較琰􅄇逺萬里斷制裳感恩奔哀乃與門生平原曹䓁闕山闕石下闕於􅃧使君旣膺渘德貢躡帝宇入叅文昌出化西土仁義充衍澤洽下闕徳世記其軌辭疾輕居棄榮潜處􅄇卒苻宿究是台輔三方失闕三字黯下闕沮落不􅕂舜禹二書闕應臻于已丑辰五盈猶有代序闕茲后土光燿下闕尚書令𢎞農宜陽周嘉彦英故并州刾史伯栁􅐋髙故州刾史朱虗炅公遷故東萊太守梁國碭陳闕二字樂浪太守􅀈述元議郎河南鞏王暹元𦙍海陽令逄牧左伯闕二字令沛國闕周龍􅏊興齊下闕簿令􅀈皇􅁱恭義膠東令東萊黄闕仲眞尚書郎畨尋闕上闕故廣宗長淳于孫典禮闕故孝亷􅀈嚴闕景闕故闕二字部司闕河南張循闕二字隸釋云碑有京兆牙都尉五字而缺其一盖安帝所置虎牙都尉也漢人書碑廟號如太宗官名如太尉太常太守太中地名如太原太陽之類皆作大泰山亦作大此碑載魏君之母却作泰夫人其用字故相反如此其間弗倦作弗卷夷戎作彛戎它碑所未嘗用者又以詶咨羣尞為疇咨羣寮􅀢芾其縱為蔽芾其蹤即彛字漢故行梁相事碭孔君之神祠隸額四年光和君諱耽兄弟三人君長􅍏先出自殷烈家者質故君字伯本初魯遭亡新之苗冑㭊始定茲者􅅩陽来君少治礼􅀴元二輱軻人民相舞土苐茨躬蔆澫消瘦㠯飬其親慈仁質桷精静信天授之性飛其學也治産小有追念祖母故舞魂構􅋋是君乎竭㠯惆憀惟蓼儀㠯愴悢恃郭蔵造佔堂穻增土種柏孝心達寞平石上見虵有頃復亡放籠羅之􅀈救窮禽㞢戹小弟升髙遊畜積道富􅀈貧君引共居􅕊餘秊雖賕舛如義合故天應厥證木生連理一焉下則人上則洪茂馨卓流布縣請署主簿功曹府招稽議郡将烏程沈府君表病委職署君行事孰長印蔽㧠領文書秊皓旹縣車家巷黄老背有胎表孫息敖姚樂夀考觀金石之消知萬物有終始圖千載㞢洪慮定吉兆於天府目覩工匠所營心欣悦􅋋所其内洞房四通外則長廡功賦合出世萬㠯光和五秊壬戌夏六月訖􅋋此行夫君子欽羙謌如頌曰君之德兮性自然蹈仁義􅀆履㺪純􅀢隠至兮虵􅔅皇象兮木理連􅀈獸兮放舎旃享榮兮景號宣逹情性兮覩未然永億兮傳功勲刋石祠兮示喆子述父臣録君故紀焉時君七十二自所立作君子颯内至時已更􅀈諸曹史􅀢承詔紀行手自注石治師同縣朱朱祖并畜􅀈隸釋云漢故行梁相事碭孔君之神祠梁國古碭郡其祠在碭也碑中輱作轗刑作形飛作非作紱胎作台卦作朴􅀢作惻從字有作者此碑㕥從為蓋省文也􅀢即最字菜即采字罕即字字䆬即𡨕字廿音入世音悉盍切􅕊音息入切漢碑俱用此數字白石神君碑篆額六年光和盖聞經國序民莫急于禮禮有五經莫重于祭祭有二義或祈或報報以章德祈以弭古先哲王類帝禋宗望于山川徧于羣神建立􅏾􅁱設壇屏所以昭孝息民輯寕上下也白石神君居九山之數叅三條之壹兼将軍之號秉斧鉞之威體連封龍氣通北嶽幽讃天地長育萬物觸石而出膚寸而合不終朝日而㴻雨沾洽前後國縣屢有祈請指日刻期應時有驗猶自抱損不求禮秩縣界有六名山三公封龍靈山先法食去光和四年三公守民盖高䓁始爲無極山詣大常求法食相縣以白石神君道徳灼然乃具載本末上尚書求依無極為比即見聽許於是遂開袥􅃇改立殿堂營宇旣禮秩有常縣出經用備其犧牲奉其珪璧絜其粢盛􅈲酒欣欣燔炙芬芬敬叅明祀降福孔殷故天無伏隂地無鱻陽水無沉氣火無災燀時無􅊇􅁆物無害生用能光逺宣朗􅂋融昭明年穀嵗熟百姓豐盈衆升五錢國界安寧尒乃陟景山登峥巆采𤣥石勒功名其辭曰巖巖白石峻極大清晧晧素質因體為名惟山降神髦士挺生濟濟俊乂朝野充盈災害不起五糓熟成乃依無極聖朝見聽遂興靈宫于山之陽營宇之制是度是量卜云其吉終然允臧匪奢匪儉率由􅃇章華殿清閑肅雍􅂋相𤣥圖靈像穆穆皇皇四時禋祀不愆不忘擇其令辰進其馨香犧牲玉帛黍稷稻粮神降嘉祉萬夀無畺子子孫孫永永畨昌光和六年常山相南陽馮字季祖長史潁川申屠熊闕三字元氏令亰兆新豐王翊字元輔丞河南李邵左尉上郡白土樊瑋祠祀掾吳宜史解㣲石師王明隸釋云其文有云居九山之數參三條之一趙氏莫曉三條為何語按尚書正義曰從導㟁至敷淺原舊説以為三條地里志云禹貢北條之荆山則在馮翊懐徳縣南條之荆山則在南郡臨沮縣是舊有三條之説也故馬融王肅皆以導岍為北條西傾為中條嶓冡為南條自岷山之南至敷淺原别以岷山為首不與大別相接則岷非三條也殽阬碑云中條之山者盖華嶽之體南通商雒以属熊耳其文與正義合碑以畨昌為蕃昌袥即拓字漢故成陽令唐君頌篆額六年光和君諱扶字正南頴川郾人也其先出自慶都􅀢赤生堯王有天下大號為唐治熹尊天重民禪位虞闕光爰苐土通天三統苗胄分相土􅀈居囙氏唐爲累合柞天之𦙍嗣彌光為漢台輔君父孝㢘郎中早卒季父蜀郡從弟㑹稽㑹稽從弟南陽君從兄東莱太守南陽弟司空公在朝逶隨正色竭忠為國討㬥六侯俱封土襲爵金縉十三君繼厥緒少有岐㠜耽道好古敦書咏詩綜緯河雒底究羣典戔紐士進守舞陽丞弱冠守昆陽尉頴陽令隠練州郡所臨有迹字帝嘉其德特拜郎中察能治􅂒除豫章鄡陽長夷粤㨭怶強難化君􅃇威颺武視㠯好惡蠻貉振疊稽􅘄服闕上前逋千有餘萬盗賊衰息境界晏然三載有成州郡諍遷成陽令承先聖之􅊼軌見讃像之高蹤遂興無為之治優賢颺厯表譱絀惡遵九德以綏民崇晏晏之惠康風移俗易莫􅄇革心朝有公卓家有叅騫分郏之治侵隆􅋋君追惟堯德廣被之恩依陵亳廟造立投堂四􅂒童冠摳衣著錄千人朝益莫習衎衎誾誾尼父投魯曷㠯加瑞應木連理生白莬鳩遊君園庭蕩蕩之治莫能名焉三司察功朝廷審真㠯君威恩竝流文武兼興東莱海濵湏君㠯寧詔書換君昌陽令吏民慕戀士女惟艱捺君車輪􅄇得行君臣流涕路琅玕迫有詺命靡由還􅋋是故從事仲字仲張躬萬􅇂郵仲􅒑郡掾閭葵闕仲瑝處士王闕蕫􅋕閭葵班䓁乃共刋石樹頌歌君之羙其辭曰赫赫唐君帝堯之苗氏族􅄇一各任所安本同末異盖謂斯焉君體煥炳有芬有馨如山如嵩如􅄇傾如闕如海澹如􅄇盈惟直如矢字秉銓㨿衡在朝肅肅閨門㢕㢕亷踰伯􅅩絜如珪璋賦政亐外爰及鬼方匯夷永降寇賊迸亡黎庶攸寧黔首康㠯德綏撫宣恩六陽㠯仁恤弱㠯義抑彊恩由春夏威加秋霜賞罰分審白黑著明憂耆閔稚􅄇侮矜耽樂道述咀嚼七經五六六七訓導若神接下施與投財如捐吏服其徳民歸其恩父父子子君君臣臣􅄇􅘄自舉􅄇拘􅄇煩囹圄空虗國無民徳及草䖝澤流無蜎飛蠕動咸頼我君􅂋􅂋令稱德音常􅔅光和六年二月壬午朔廿五日丙午處士閭葵班戀念唐君爲立碑闕斑字宣髙􅁱春秋嚴氏大子讓公謙􅊞斑次􅅩謙治尚書歐陽次亷仲絜小夏侯耽經史兮履仁義内和陸兮外㠯家財兮讃君號諸學闕兮相埤垂後兮􅄇之譽隸釋云授堂者講授之堂五六六七者用曾㸃冠者童子之文也司空者名珍熹平二年自太常拜中常侍唐衡之弟也延熹中衡與宦官共誅梁冀受封世謂之五矦即討暴俱封事也匯夷者匯澤之盗也朝有公卓即孟公綽也家有叅騫以叅為參即曽閔也亷踰伯叔即夷齊也分郏則反夾爲郏此用字之異者又有題名云成陽令潁川潁隂髙諱某成陽丞廣陽史珍瑋寳盖是刻于碑首之㫄者抪㨭音如布戸不順理也碑以諍為爭棃為黎述為術陸為睦埤為裨為受郃陽令曺全碑光和七年三月隸釋不載君諱全字景完敦煌效穀人也其先盖周之胄􅐥王秉乾之機翦伐殷商旣爾勲福祿攸同封弟叔振鐸于􅔟國因氏焉秦漢之際􅔟叅夹輔王室世宗廓土􅚌竟子孫遷于雍州之郊分止右扶風􅂉在安􅂉處􅐥都或居隴西或家敦煌枝分葉布所在爲雄君髙祖父敏舉孝亷􅐥威長史巴郡胊忍令張掖居延都尉祖父鳳孝亷張掖屬國都尉丞右扶風麋侯相金城西部都尉北地太守父琫少貫名州郡不羍早世是以位不副德君童齔好學甄極毖緯無文不綜賢孝之性根生􅋋心收飬季祖母供事繼母先意承志存亾之敬禮無遺闕是以鄉人為之諺曰重親致歡􅔟景完易世載徳不隕其名及其從政清擬夷齊直慕史魚厯郡右職上計掾史仍辟凉州常為治中别駕紀綱萬里朱紫不謬出典諸郡彈枉糾邪貪暴洗心同僚服徳逺近憚威建寧二􅏵舉孝亷除郎中拜西域戊部司馬時疏勒國王和徳父簒位不供職貢君興􅘄征討有之仁分醪之惠攻城戰謀若涌泉威牟諸賁和徳面縛歸死還􅀈振旅諸國禮遺且二百萬悉以簿官遷右扶風槐里令遭同産弟憂棄官續遇禁冈潜隠家巷七􅏵光和六􅏵復舉孝㢘七􅏵三月除郎中酒祿福長詙張角兵幽兾楊同時並動而縣民郭家䓁復造􅊇亂燔燒城寺萬民擾人褢不安三郡告急羽檄仍至于時聖主諮諏羣僚咸曰君哉轉拜郃陽令收合餘燼芟夷殘迸絶其本根遂訪故商􅀢㑺艾王敞王畢䓁恤民之要存慰高􅏵撫育以家錢糴米賜􅻏盲大女桃婓䓁合七首藥神明膏親􅄐亭部吏王辠程横䓁􅑝與有疾者咸蒙瘳㥗惠政之流甚􅋋置郵百姓繈負反者如雲戢治屋市肆列陳風雨時莭嵗獲豐􅏵農夫織婦百工戴恩縣前以河平元􅏵遭白茅水災害於戊􅕀之間興造城郭是後􅃇姓及脩身之士官位不登君乃閔縉紳之徒不濟開南寺門承望􅛬郷眀而治庶使學者李儒欒􅒑程寅䓁各獲人爵之報廓廣聽事官舎廷曹廊閤升降揖讓朝覲之階費􅄇岀民役不干時門下掾王敞録事掾王畢主簿王厯戸曹掾秦尚功曺史王顓䓁嘉奚斯􅊲甫之美乃共刋石紀功其辭曰懿明后徳義章貢王庭征鬼方威布烈安殊㐬還􅘄旅臨槐里感孔懁赴喪紀嗟逆賊燔城市特受命理殘圯芟不臣寧黔首繕官寺開南門闕嵯峨望山郷明治惠沾渥吏樂政民給􅁕君髙升極鼎􅁕東漢文紀巻三十
