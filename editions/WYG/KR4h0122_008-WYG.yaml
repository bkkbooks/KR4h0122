body:
  text: 東漢文紀卷八明梅鼎祚編鍾離意字子阿會稽山隂人厯尚書僕射出為魯相上明帝諫超北宫疏永平三年夏旱大起北宫意為尚書僕射詣闕免冠上疏帝䇿詔報因謝公郷百僚應時澍雨伏見陛下以天時小旱憂念元元降避正殿躬自克責而比日密雲遂無大潤豈政有未得應天心者耶昔成湯遭旱以六事自責曰政不節邪使人疾邪宫室榮邪女謁盛邪苞苴行邪讒夫昌邪竊見北宫大作人失農時此所謂宫室榮也自古非苦宫室小狭但患人不安寧宜且罷止以應天心臣意以匹夫之才無有行能久食重祿擢備近臣比受厚賜喜懼相半不勝愚戇征營罪當萬死明帝詔報湯引六事咎在一人其冠履勿謝比上天降旱密雲數會朕戚然慙懼思獲嘉應故分布禱請闚候風雲北祈明堂南設雩場今又敕大匠止作諸宫減省不急庶消災譴連有變異疏伏惟陛下躬行孝道脩明經術郊祀天地畏敬鬼神憂恤黎元勞心不怠而天氣未和日月不明水泉湧溢寒暑違節者咎在羣臣不能宣化理職而以苛刻為俗吏殺良人繼踵不絶百官無相親之心吏人無雍雍之志至於骨肉相殘毒害彌深感逆和氣以致天災百姓可以徳勝難以力服先王要道民用和睦故能致天下和平災害不生禍亂不作鹿鳴之詩必言宴樂者以人神之心洽然後天氣和也願陛下垂聖徳揆萬機詔有司慎人命緩刑罰順時氣以調隂陽垂之無極薦王望劉曠王扶書望字徳卿終青州刺史曠字公子初為全椒長有恵政後改名平終宗正扶字子元意書奏詔皆徴拜議郎臣竊見琅琊王望楚國劉曠東莱王扶皆年七十執性恬淡所居之處邑里化之修身行義應在朝次臣誠不足知人竊慕推士進賢之義王望振灾議望自議郎遷青州刺史時州旱荒因便宜出所在布粟給其廩糧事畢表言議者皆以望為専命法有常條意獨議上明帝赦而不罪昔華元子反楚宋之良臣不稟君命擅平二國春秋之義以為美談今望懐義忘罪當仁不讓若繩之以法忽其本情將乖聖朝愛育之㫖答府記意少為督郵亭長有受民酒禮者府下記案治意答太守賢之任以屬縣事詩曰刑于寡妻至于兄弟以御于家邦明正化之本由近及逺今宜明府内以及諸外且闊略逺縣細微事後漢紀范曄書意封記入言於太守曰春秋先内後外詩云刑于寡妻以御于家邦明政化之本由近及逺今宜先清府内且闊略逺縣細微之愆按此則面語也舉周樹牒鍾離意别傳云意為功曹常非周樹白事誕欺朝中皆知中部平丞缺意牒曰賊曹史周樹結髮佐吏服勤守法果於從政行如玉石折而不撓請宜部職劉般字伯興宣帝𤣥孫封居巢侯行執金吾事兼屯騎校尉上明帝論禁二業増區種奏帝悉從之郡國以官禁二業至有田者不得漁捕今濵江湖郡率多蠶桑民資漁採以助口實且以冬春閒月不妨農事夫漁獵之利為田除害有助榖食無闗二業也又郡國以牛疫水旱墾田多減故詔敕區種増進頃畝以為民也而吏舉度田欲令多前至於不種之處亦通為租可申敕刺史二千石務令實覈其有増加皆使與奪田同罪後漢書觀恂薦劉般奏般徙封居巢侯就國揚州刺史觀恂薦般永平十年徴般行執金吾事般在國口無擇言行無怨惡宜蒙旌顯以勸天下後漢紀樊鯈字長魚南陽湖陽人嗣父宏侯爵徙封燕為長水校尉鯈後漢書作儵誤正經義奏永平元年鯈為長水校尉奏言于是諸儒㑹白虎觀論五經同異先帝大業當以時施行欲使諸儒共正經義頗令學者得以自助太平御覽理朱浮奏浮為大司馬免光武以浮陵轢同列每銜之惜其功能不忍加罪永平中有人單辭告浮事者顯宗大怒賜浮死長水校尉樊鯈言於帝帝亦悔之唐堯大聖兆人獲所尚優游四㓙之獄厭服海内之心使天下咸知然後殛罰浮事雖昭明而未達人聽宜下廷尉章著其事後漢書舉孝㢘奏又議刑辟宜須秋月以順時氣郡國舉孝㢘率取年少能報恩者耆宿大賢多見廢棄宜敕郡國簡用良俊朱輔東觀記作酺梁國寧陵人章帝初坐事免上白狼王歌詩疏輔永平中為益州刺史好立功名在州數嵗威懐逺夷白狼槃木唐菆等百餘國舉種奉貢輔上疏明帝嘉之事下史官臣聞詩云彼徂矣岐有夷之行傳曰岐道雖僻而人不逺詩人誦詠以為符驗今白狼王唐菆等慕化歸義作詩三章路經卭来大山零髙坂峭危峻險百倍岐道繦負老㓜若歸慈母逺夷之語辭意難正草木異種鳥獸殊類有犍為郡掾田恭與之習狎頗曉其言臣輒令訊其風俗譯其辭語今遣從事史李陵與恭護送詣闕并上其樂詩昔在聖帝舞四裔之樂今之所上庶備其一吳良字大儀齊國臨淄人厯司徒左長史復拜議郎救徐匡奏永平中車駕近出信陽侯隂就于突禁衛車府令徐匡鉤就車收御者送獄詔書譴匡匡乃自繫良上言明帝左轉良為即丘長信陽侯就倚恃外戚干犯乗輿無人臣禮為大不敬匡執法守正反下于理臣恐聖化由是而弛曹充魯國薛人持慶氏禮為博士上明帝言禮樂疏充建武中為博士議定封禪郊雍大射養老禮儀明帝即位充上言帝問制禮樂云何充又對帝善之下詔漢再受命仍有封禪之事而禮樂崩闕不可為後嗣法五帝不相沿樂三王不相襲禮大漢當自制禮以示百世又對河圖括地象曰有漢世禮樂文雅出尚書璇璣鈐曰有帝漢出徳洽作樂名太予明帝下詔續漢書今改太樂官曰太予丞以應圖讖樂歌詩曲操以俟君子曹褒字叔通充之子初舉孝㢘拜博士厯侍中上章帝請定漢禮疏元和二年下詔制定禮樂褒為博士知帝指乃上疏章下太常以為一世大典非褒所定不可許後竟敕褒次序禮事為百五十篇昔者聖人受命而王莫不制禮作樂以著功徳功成作樂化定制禮所以救世俗致禎祥為萬姓獲福於皇天者也今皇天降祉嘉瑞並臻制作之符甚於言語宜定文制著成漢禮丕顯祖宗盛徳之美禮論初學記漢初朝制無文叔孫通頗採禮經參酌秦法雖適物觀時有救崩弊先王之宏典盖多闕文桓郁字仲思榮之子仕至太常上皇太子疏太子為章帝郁永平中入授皇太子經遷越騎校尉詔敇太子諸王各奉賀致禮郁數進忠言多見納錄太子賜郁鞍馬刀劒郁上疏伏見太子體性自然包含今古謙謙允恭天下共見郁父子受恩無以明益夙夜慙懼誠思自竭愚以為太子上當合聖心下當卓絶於衆宜思逺慮以光朝廷東觀漢紀董鈞駁拜三老議譙周五經然否曰漢初或云三老答天子拜及漢中興定禮儀羣臣欲令三老答拜城門校尉董鈞駁詔從鈞議養三老所以教事父之道也若答拜是使天下答子拜也馬嚴字威卿援兄揚州牧余之子厯陳留太守將作大匠上光武進女掖庭書伏波將軍馬援征五谿蠻卒于師虎賁中郎將梁松黄門侍郎竇固等因讚之由是家益失埶又數為權貴所侵侮后從兄嚴不勝憂憤白太夫人絶竇氏婚求進女掖庭乃上書由是選入太子宫時年十三明帝即位為貴人永平三年立為后臣叔父援孤恩不報而妻子特獲恩全戴仰陛下為天為父人情既得不死便欲求福竊聞太子諸王妃匹未備援有三女大者十五次者十四小者十三儀狀髮膚上中以上皆孝順小心婉靜有禮願下相工簡其可否如有萬一援不朽於黄泉矣又援姑姊妹並為成帝婕妤𦵏於延陵臣嚴幸得蒙恩更生冀因緣先姑當充後官日食上章帝封事章帝即位嚴徴拜侍御史中丞其冬有日食之灾嚴上封事帝納其言而免酺等官臣聞日者衆陽之長食者隂侵之徴書曰無曠庶官天工人其代之言王者代天官人也故考績黜陟以眀褒貶無功不黜明隂盛陵陽臣伏見方今刺史太守専州典郡不務奉事盡心為國而司察偏阿取與自已同則舉為尤異異則中以刑法不即垂頭塞耳採取財賂今益州刺史朱酺揚州刺史倪説涼州刺史尹業等每行考事輒有物故又選舉不實曽無貶坐是使臣下得作威福也故事州郡所舉上奏司直察能否以懲虚實今宜加防檢式遵前制舊丞相御史親治職事唯丙吉以年老優游不案吏罪於是宰府習為常俗更共罔養以崇虚名或未曉其職便復遷徙誠非建官賦祿之意宜敕正百司各責以事州郡所舉必得其人若不如言裁以法令傳曰上徳以寛服民其次莫如猛故火烈則人望而畏之水懦則人狎而翫之為政者寛以濟猛猛以濟寛如此綏御有體灾眚消矣馬廖字敬平援長子任為郎厯衛尉以帝舅封順陽侯朝廷大議輒以諮訪後坐子豫免就國上長樂宫勸成徳政疏廖為衛尉章帝甚敬重之時明徳皇太后躬履節儉事從簡約廖慮美業難終上疏以勸成徳政太后深納之臣案前世詔令以百姓不足起於世尚奢靡故元帝罷服官成帝御浣衣哀帝去樂府然而侈費不息至于衰亂者百姓從行不從言也夫改政移風必有其本傳曰吳王好劒客百姓多創瘢楚王好細腰宫中多餓死長安語曰城中好髙髻四方髙一尺城中好廣眉四方且半額城中好大袖四方全匹帛斯言如戲有切事實前下制度未㡬後稍不行雖或吏不奉法良由慢起京師今陛下躬服厚繒斥去華飾素簡所安發自聖性此誠上合天心下順民望浩大之福莫尚於此陛下既已得之自然猶宜加以勉勗法太宗之隆徳戒成哀之不終易曰不恒其徳或承之羞誠今斯事一竟則四海誦徳聲薰天地神明可通金石可勒而况於行仁心乎况於行令乎願置章坐側以當瞽人夜誦之音馬防字江平援次子初與弟光為黄門郎行車騎將軍討定西羌以帝舅封潁陽侯坐事免樂事奏薛瑩後漢書章帝以太常樂丞鮑鄴等上樂事下車騎將軍馬防防奏言政事多見采用是冬始施行十二月迎氣樂防所上也建初二年七月鄴上言王者飲食必道須四時五味故有食舉之樂所以順天地養神明求福應也移風易俗莫善於樂樂者天地之和不可久廢今官樂但有太簇皆不應月律可作十二月均各應其月氣乃能感天地和氣宜應明帝始令靈臺六律候而未設其門樂經曰十二月行之所以宣氣豐物也月開斗建之門而奏歌其律誠宜施行願與待詔嚴崇及能作樂器者共作治考工給所當詔下太常太常上言作樂器直錢百四十六萬請太僕作成上奏寢今明詔下臣防臣輒問鄴及待詔知音律者皆言聖人作樂所以宣氣致和順隂陽也臣愚以為可順上天之眀待因嵗首令正發太簇之律奏雅頌之音以立太平以迎和氣第五倫字伯魚京兆長陵人厯蜀郡太守拜司空䇿免上章帝抑損后族疏倫為司空章帝舅馬廖兄弟並居職任倫以后族過盛疏欲令抑損其權及馬防為車騎將軍出征西羌倫又疏諫並不見省臣聞忠不隠諱直不避害不勝愚狷昧死自表書曰臣無作威作福其害于而家㓙于而國傳曰大夫無境外之交束脩之餽近代光烈皇后雖友愛天至而卒使隂就歸國徙廢隂興賔客其後梁竇之家互有非法明帝即位竟多誅之自是洛中無復權戚書記請託一皆斷絶又譬諸外戚曰苦身待士不如為國戴盆望天事不兩施臣常刻著五蔵書諸紳帶而今之議者復以馬氏為言竊聞衛尉廖以布三千匹城門校尉防以錢二百萬私贍三輔衣冠知與不知莫不畢給又聞臘日亦遺其在洛中者錢各五千越騎校尉光臘用羊三百頭米四百斛肉五千斤臣愚以為不應經義惶恐不敢以不聞陛下情欲厚之亦宜所以安之臣今言此誠欲上忠陛下下全后家裁蒙省察諫馬防西征疏臣愚以為貴戚可封侯以富之不當職事以任之何者繩以法則傷恩私以親則違憲伏聞馬防今當西征臣以太后恩仁陛下至孝恐卒有纖介難為意愛聞防請杜篤為從事中郎多賜財帛篤為鄉里所廢客居美陽女弟為馬氏妻恃此交通在所縣令苦其不法收繫論之今来防所議者咸致疑怪况乃以為從事將恐議及朝廷今宜為選賢能以輔助之不可復令防自請人有損事望茍有所懐敢不自聞勸成風徳疏倫常疾俗吏苛刻及為三公值章帝長者乃上疏褒稱盛美因以勸成風徳陛下即位躬天然之徳體晏然之姿以寛𢎞臨下出入四年前嵗誅刺史二千石貪殘者六人斯皆明聖所鑒非羣下所及然詔書每下寛和而政急不解務存節儉而奢侈不止者咎在俗敝羣下不稱故也光武承王莽之餘頗以嚴猛為政後代因之遂成風化郡國所舉類多辦職俗吏殊未有寛博之選以應上求者也陳留令劉豫冠軍令駟協並以刻薄之姿臨人宰邑専念掠殺務為嚴苦吏民愁怨莫不疾之而今之議者反以為能違天心失經義誠不可不慎也非徒應坐豫協亦當宜譴舉者務進二賢以任時政不過數人則風俗自化矣臣嘗讀書記知秦以酷急亡國又目見王莽亦以苛法自滅故懃懃懇懇實在於此又聞諸王主貴戚驕奢踰制京師尚然何以示逺故曰其身不正雖令不從以身教者從以言教者訟夫隂陽和嵗乃豐君臣同心化乃成也其刺史太守以下拜除京師及道出洛陽者宜皆召見可因博問四方兼以觀察其人諸上書言事有不合者可但報歸田里不宜過加喜怒以明在寛臣愚不足採論外戚竇氏疏諸馬得罪歸國而竇氏始貴倫復上疏奉公盡節無所依違臣得以虚空之質當輔弼之任素性駑怯位尊爵重拘迫大義思自䇿厲雖遭百死不敢擇地又况親遇危言之世哉今承百王之敝人尚文巧咸趨邪路莫能守正伏見虎賁中郎將竇憲椒房之親典司禁兵出入省闈年盛志美卑謙樂善此誠其好士交結之方然諸出入貴戚者類多瑕釁禁錮之人尤少守約安貧之節士大夫無志之徒更相販賣雲集其門衆喣飄山聚蚊成雷盖驕佚所從生也三輔論議者至云以貴戚廢錮當復以貴戚浣濯之猶解酲當以酒也詖險趣勢之徒誠不可親近臣愚願陛下中宫嚴敕憲等閉門自守無妄交通士大夫防其未萌慮於無形令憲永保福祿君臣交歡無纖介之隙此臣之所至願也並後漢書楊終字子山蜀郡成都人仕校書郎坐事徙北地永元中徴拜郎中著春秋外傳大旱上章帝書終明帝時徴拜校書郎建初元年大旱榖貴終以為廣陵楚淮陽濟南之獄徙者萬數又逺屯絶域吏民怨曠乃上疏帝下其章司空第五倫同終議太尉牟融等難以孝子無改父之道先帝所建不宜囘異終復上書帝聽從徙者悉罷邉屯臣聞善善及子孫惡惡止其身百王常典不易之道也秦政酷烈違牿天心一人有罪延及三族髙祖平亂約法三章太宗至仁除去收孥萬姓廓然蒙被更生澤及昆蟲功垂萬世陛下聖明徳被四表今以比年久旱灾疫未息躬自菲薄廣訪失得三代之隆無以加焉臣竊按春秋水旱之變皆應暴急恵不下流自永平以来仍連大獄有司窮考轉相牽引掠拷寃濫家屬徙邉加以北征匈奴西開三十六國頻年服役轉輸煩費又逺屯伊吾樓蘭車師戊巳民懐土思怨結邉域傳曰安土重居謂之衆庶昔殷人近遷洛邑且猶怨望何况去中土之肥饒寄不毛之荒極乎且南方暑濕障毒互生愁困之民足以感動天地移變隂陽矣陛下留念省察以濟元元復上書秦築長城功役繁興胡亥不革卒亡四海故孝元棄珠崖之郡光武絶西域之國不以介鱗易我衣裳魯文公毁泉臺春秋譏之曰先祖為之而己毁之不如勿居而已以其無妨害于民也襄公作三軍昭公舍之君子大其復古以為不舍則有害于民也今伊吾之役樓蘭之屯久而未還非天意也請論定五經奏詔諸儒於白虎觀論考同異終以學多異聞亦得與焉宣帝博徴羣儒論定五經於石渠閣方今天下少事學者得成其業而章句之徒破壊大體宜如石渠故事永為後世則戒馬廖書廖為衛尉弟防及光俱為黄門郎廖性寛緩不能教訓子孫終與廖交善以書戒之廖不納于豫後坐懸書誹謗廖就國終聞堯舜之民可比屋而封桀紂之民可比屋而誅何者堯舜為之隄防桀紂示之驕奢故也詩曰皎皎練絲在所染之上智下愚謂之不移中庸之流要在教化春秋殺太子母弟直稱君甚惡之者坐失教也禮制人君之子年八歳為置少傅教之書計以開其明十五置太傅教之經典以道其志漢興諸侯王不力教誨多觸禁忌故有亡國之禍而乏嘉善之稱今君位地尊重海内所望豈可不臨深履薄以為至戒黄門郎年㓜血氣方盛既無長君退讓之風而要結輕狡無行之客縱而莫誨視成任性鑒念前世可為寒心君侯誠宜以臨深履薄為戒後漢書練絲尺牘作素絲宋意字伯志鈞從子厯司徒校尉諫章帝宜令諸王歸國疏意建初中徴為尚書章帝性寛仁叔父濟南中山二王每人朝及諸昆弟並留京師意以為人臣有節不宜踰禮過恩上疏諫帝納之陛下至孝烝烝恩愛隆深以濟南王康中山王焉先帝昆弟特蒙禮寵聖情戀戀不忍逺離比年朝見久留京師崇以叔父之尊同之家人之禮車入殿門即席不拜分甘損膳賞賜優渥昔周公懐聖人之徳有致太平之功然後王曰叔父加以賜幣今康焉幸以支庶享食大國陛下即位蠲除前過還所削黜衍食它縣男女少長並受爵邑恩寵踰制禮敬過度春秋之義諸父昆弟無所不臣所以尊尊卑卑强榦弱枝者也陛下徳業隆盛當為萬世典法不宜以私恩損上下之序失君臣之正又西平王羨等六王皆妻子成家官屬備具當早就藩國為子孫基阯而室第相望久磐京邑婚姻之盛過於本朝僕馬之衆充塞城郭驕奢僭擬寵祿隆過今諸國之封並皆膏腴風氣平調道路夷近朝聘有期行来不難宜割情不忍以義斷恩發遣康焉各歸藩國令羨等速就便時以塞衆望論南單于請兵書章和二年鮮卑擊破北匈奴而南單于乗此請兵北伐因欲還歸舊庭時竇太后臨朝議欲從之意上疏會南單于竟不北徙夫戎狄之隔逺中國幽處北極界以沙漠簡賤禮義無有上下强者為雄弱即屈服自漢興以来征伐數矣其所尅獲曽不補害光武皇帝躬服金革之難深昭天地之眀故因其来降羈縻蓄養邊人得生勞役休息於兹四十餘年矣今鮮卑奉順斬獲萬數中國坐享大功而百姓不知其勞漢興功烈于斯為盛所以然者夷虜相攻無損漢兵者也臣察鮮卑侵伐匈奴止是利其抄掠及歸功聖朝實由貪得重賞今若聽南虜還都北庭則不得不禁制鮮卑鮮卑外失暴掠之願内無功勞之賞豺狼貪婪必為邊患今北虜西遁請求和親宜因其歸附以為外扞巍巍之業無以過此若引兵費賦以順南虜則坐失上略去安即危矣誠不可許韋彪字孟達扶風平陵人建武末除郎中厯章帝為大鴻臚上章帝貢舉議彪為大鴻臚是時陳事者多以郡國貢舉率非功次故守職益懈吏事寢疏詔下公卿朝臣議彪上議帝深納之伏惟眀詔憂勞百姓垂恩選舉務得其人夫國以簡賢為務賢以孝行為首孔子曰事親孝故忠可移於君是以求忠臣必於孝子之門夫人才行少能相兼是以孟公綽優於趙魏老不可以為滕薛大夫忠孝人持心近厚鍛鍊之吏持心近薄三代之所以直道而行者在其所以磨之故也士宜以才行為先不可純以閥閲然其要歸在于選二千石二千石賢則貢舉皆得其人盛夏多寒疏彪以世承二帝多以苛刻為能又置官選職不必以材因盛夏多寒疏諫納之臣聞政化之本必順隂陽伏見立夏以来當暑而寒殆以刑罰刻急郡國不奉時令之所致也農人急于務而苛吏奪其時賦發充常調而貪吏割其財此其巨患也夫欲急人所務先當除其所患天下樞要在於尚書尚書之選豈可不重而間者多從郎官超升此位唯曉習文法長於應對然察察小慧類無大能宜簡嘗厯州宰素有名者雖進退舒遲時有不逮然端心向公奉職周密宜鑒嗇夫捷急之對深思絳侯木訥之功也往時楚獄大起故置令史以助郎職而類多小人好為姦利今者務簡皆可停省又諫議之職應用公直之士通才謇正有補益於朝者今或從徴試輩為大夫又御史外遷動據州郡並宜清選其任責以言績其二千石視事雖久而為吏民所便安者宜増秩重賞勿妄遷徙惟留聖心耿恭字伯宗弇弟國之子終長水校尉薦竇固奏建初二年秋恭遷長水校尉副車騎將軍馬防討西羌恭上言薦固由是忤防被奏徴下獄免官故安豐侯竇融昔在西州甚得羌胡腹心今大鴻臚固即其子孫前擊白山功冠三軍宜奉大使鎮撫涼部令車騎將軍防屯軍漢陽以為威重鮑昱字文泉永子歴司徒太尉救耿恭議恭被虜圍疎勒城上書求救章帝新即位詔公卿會議司空第五倫以為不宜救昱時為司徒議上帝從乃遣耿秉屯酒泉發兵救之今使人於危難之地急而棄之外則縱蠻夷之暴内則傷死難之臣誠令權時後無邊事可也匈奴如復犯塞為寇陛下將何以使將又二部兵人裁各數千匈奴圍之厯旬不下是其寡弱盡力之效也可令燉煌酒泉太守各將精騎二千多其旛幟倍道兼行以赴其急匈奴疲極之兵必不敢當四十日間足還入塞鄭衆字仲師興子厯遷左馮翊為大司農諫報使北匈奴疏永平初北匈奴求和親衆以越騎校尉使虜不為虜拜虜乃遣使隨衆還京師朝議報之衆疏諫不從復遣衆衆因上言固爭詔切責衆繫廷尉赦歸臣聞北單于所以要致漢使者欲以離南單于之衆堅三十六國之心也又當揚漢和親誇示鄰敵令西域欲歸化者局促狐疑懐土之人絶望中國耳漢使既到便偃蹇自信若復遣之虜必自謂得謀其羣臣駮議者不敢復言如是南庭動揺烏桓有離心矣南單于久居漢地具知形埶萬分離析旋為邉害今幸有度遼之衆揚威北垂雖勿報答不敢為患復上書臣前奉使不為匈奴拜單于恚恨故遣兵圍臣今復銜命必見陵折臣恐不忍持大漢節對羶裘獨拜如令匈奴遂能服臣將有損大漢之强上章帝薦耿恭疏恭為西域都護戊巳校尉北單于遣左鹿蠡王攻車師恭救之為所圍困疏勒城唯十三人得歸漢中郎將鄭衆上疏拜恭騎都尉耿恭以單兵固守孤城當匈奴之衝對數萬之衆連月踰年心力困盡鑿山為井煮弩為糧出于萬死無一生之望前後殺傷醜虜數千百計卒全忠勇不為大漢恥恭之節義古今未有宜蒙顯爵以厲將帥孔豐魯國魯人侍御史轉拜黄門郎典東觀事上章帝疏建初元年夏旱豐上疏上從之三日雨降臣聞為不善而灾報得其應也為善而灾至遭時變也陛下即位日淺視民如傷而不幸耗旱時運之㑹耳非政教所致也昔成湯遭旱因自責省畋散積減御損食而大有年意者陛下未為成湯之事焉孔僖字仲和魯國魯人為郎中校書東觀終臨晉令上章帝自訟書僖與崔駰友善同遊太學因讀吳王夫差事歎曰是所謂畫虎不成反為狗者也駰言武帝初年崇信聖道號勝文景及後恣已遂忘前善隣房生告以誹謗先帝事下有司駰詣吏受訊僖恐誅乃上書自訟詔勿問拜蘭臺令史臣之愚意以為凡言誹謗者謂實無此事而虚加誣之也至如孝武皇帝政之美惡顯在漢史坦如日月是為直説書傳實事非虚謗也夫帝者為善則天下之善咸歸焉其不善則天下之惡亦萃焉斯皆有以致之故不可以誅於人也且陛下即位以来政教未過而徳澤有加天下所具知也臣等獨何譏刺哉假使所非實是則固應悛改儻其不當亦宜含容又何罪焉陛下不推原大數深自為計徒肆私忿以快其意臣等受戮死即死耳顧天下之人必囘心易慮以此事闚陛下心自今以後茍見不可之事終莫復言者矣臣之所以不愛其死猶敢極言者誠為陛下深惜此大業陛下若不自惜則臣何賴焉齊桓公親揚其先君之惡以唱管仲然後羣臣得盡其心今陛下乃欲以十世之武帝逺諱實事豈不與桓公異哉誠恐有司卒然見構銜恨蒙枉不得自敘使後世論者擅以陛下有所方此寧可復使子孫追掩之乎謹詣闕伏待重誅左氏傳義詁序附先生名竒字子異其先魯人即褒成君次孺第二子之後也家於茂陵以世學之門未嘗就逺方師也唯兄君魚少從劉子駿受春秋左氏傳其於講業最明精究其義子駿自以才學不若也其或訪經傳於子駿輒曰幸問孔君魚吾已還從之諮道矣由是大以春秋見稱當世王莽之末君魚避地至大河之西依大將軍竇融為家常為上賔從容以論道為事是時先生年二十一矣母與其兄議學其兄謝服焉及世祖即祚君魚乃仕官至武都太守闗内侯以清儉聞海内先生雅好儒術淡忽榮祿不願從政遂删撮左氏傳之難者集為義詁發伏闡幽讃明聖祖之道以祛後學著書未畢而早世不永宗人子通痛其不遂惜兹大訓不行於世乃校其篇目各如本第并序答問凡三十一巻將来君子倘肯游意幸詳録之焉張林上言均輸是時穀貴縣官經用不足尚書張林上言詔諸尚書通議尚書僕射朱暉奏議不可後有詔施行暉獨奏章帝切責諸尚書暉等皆自繫獄詔敕出之穀所以貴由錢賤故也可盡封錢一取布帛為租以通天下之用又鹽食之急者雖貴人不得不須官可自鬻又宜因交阯益州上計吏往来市珍寳收采其利武帝時所謂均輸者也朱暉字文季南陽宛人厯遷尚書令駁張林奏王制天子不言有無諸侯不言多少食祿之家不與百姓爭利今均輸之法與賈販無異鹽利歸官則下人窮怨布帛為租則吏多姦盜誠非明主所當宜行章帝詔國家樂聞駮議黄髮無愆詔書過耳何故自繫殷肜上言嚴宣元和元年待詔候鍾律殷肜上言詔下太史令丞𢎞試十二律其二中其四不中其六不知何律宣遂罷官無曉六十律以準調音者故待詔嚴崇具以準法教子男宣宣通習願召宣補學官主調樂器章帝詔崇子學審曉律别其族協其聲者審試不得依託父學以聾為聰聲微妙獨非莫知獨是莫曉以律錯吹能知命十二律不失一方為能傳崇學耳謝夷吾字堯卿㑹稽山隂人少為郡學風角占候厯遷鉅鹿太守薦王充充字仲任㑹稽上虞人郡辟從事轉治中免夷吾薦充章帝公車特徴不行充之天才非學所加雖前世孟軻孫卿近漢揚雄劉向司馬遷不能過也謝承後漢書王充論衡自紀篇云充以元和三年徙家辟詣揚州部丹陽九江廬江後入為治中材小任大職在刺割筆札之思厯年寢廢章和二年罷州家居年漸七十時可懸輿仕路隔絶志窮無如事有否然身有利害髪白齒落日月逾邁儔倫彌索鮮所恃賴貧無供養志不娯快厯數冉冉庚辛域際雖懼終徂愚猶沛沛乃作養性之書凡十六篇養氣自守適食則酒閉明塞聰受精自保適輔服藥引導庶冀性命可延斯須不老既晩無還垂書示後惟人性命長短有期人亦蟲物生死一時年厯但記孰使留之猶入黄泉消為土灰上自黄唐下臻秦漢而来折𠂻以聖道析理於通材如衡之平如鑑之開㓜老生死古今罔不詳該命以不延吁嗟悲哉文皆協韻楊用脩丹鉛摠錄裁章和二年至愚猶沛沛作王符自敘贊謬誤附正此後用脩有古文韻語若此類失收乃多裁文之韻者强名箴贊銘頌如師春物産之屬大抵好臆斷而習欺人如此鄭𢎞字巨君㑹稽山隂人厯位太尉尚書郎奏𢎞建初中為尚書令舊制尚書郎限滿補縣長令史丞尉𢎞奏從之臺職雖尊而酬賞甚薄至於開選多無樂者請使郎補千石令史為長後漢書疾篤上論竇憲書𢎞元和初為太尉劾竇憲客洛陽令楊光在官貪殘書奏吏以告光憲奏𢎞大臣漏泄密事章帝詰讓𢎞收印綬𢎞乞骸未許病篤上書臣東野頑闇本無尺寸之功横蒙大恩仍登上司中夜怵惕懼有折足之戒自揆愚薄無益國家之事雖有殺身焉可謝責是以不敢雷同指陳竇憲姦闕不謂漏露言出患入竇憲之姦惡貫天達地毒流八荒虐聞四極海内疑惑賢愚疾惡憲何術以迷主上流言噂􅊱深可歎息昔田氏簒齊六卿分晉漢事不逺炳然可見陛下處天子之尊自謂保萬世之祚無復累卵之危信讒佞之臣不計存亡之機臣雖弱疾命在移晷身没之日死不忘忠願陛下為堯舜之君誅四㓙之罪以素厭人鬼憤結之望後漢紀郭躬字仲孫潁川陽翟人厯拜廷尉論赦亡命封事躬元和初為廷尉家世掌法務在寛平章和元年赦天下繫囚減死罪一等勿笞詣金城而文不及亡命未發覺者躬上封事章帝即詔赦焉聖恩所以減死罪使戍邉者重人命也今死罪亡命無慮萬人又自赦以来捕得甚衆而詔令不及皆當重論伏惟天恩莫不蕩宥死罪己下並蒙更生而亡命捕得獨不沾澤臣以為赦前犯死罪而繫在赦後者可皆勿笞詣金城以全人命有益於邊袁安字邵公汝南汝陽人厯位司徒勞中牟令魯恭檄續漢書恭建初時為中牟令蝗不犯境有三異政安為河南尹以檄勞之因上書言狀君以名徳久屈中牟物産之化流行天降休瑞應行而生尹甚嘉之還北虜生口議元和二年武威太守孟雲上書謂北虜既已和親而南部復往鈔掠宜還其生口以安慰之安時為太僕議宜許還公卿皆言夷狄譎詐不可開許司徒桓虞從安議廷叱太尉鄭𢎞等至作色變容司𨽻校尉舉奏安等上印綬謝章帝詔報北虜遣使奉獻和親有得邊生口者輒以歸漢此明其畏威而非先違約也雲以大臣典邉不宜負信於戎狄還之足示中國優貸而使邉人得安誠便章帝詔報久議沈滯各有所志盖事以議從䇿由衆定誾誾衎衎得禮之容寢嘿抑心更非朝廷之福君何尤而深謝其各冠履諫立北單于奏安為司徒及和帝初北單于為耿夔所破塞北地空時帝舅竇憲出屯武威欲矜已功乃上立降者左鹿蠡王阿佟為北單于如南單于故事下公卿議安與司空仕隗議奏未以時定安懼憲計遂行乃獨上奏事憲竟立降者右鹿蠡王於除鞬為單于後遂叛光武招懐南虜非謂可永安内地正以權時之算可得扞禦北狄故也今朔漠既定宜令南單于反其北庭并領降衆無緣復更立阿佟以増國費封事臣聞功有難圖不可豫見事有易斷較然不疑伏惟光武皇帝本所以立南單于者欲安南定北之䇿也恩徳甚備故匈奴遂分邊境無患孝明皇帝奉承先意不敢失墜赫然命將爰伐塞北至於章和之初降者十萬餘人議者欲置之濵塞東至遼東太尉宋由光祿勲耿秉皆以為失南單于心不可先帝從之陛下奉承鴻業大開疆宇大將軍逺師討伐席巻北庭此誠宣明祖宗崇立𢎞勲者也宜審其終以成厥初伏念南單于屯先父舉衆歸徳自蒙恩以来四十餘年三帝積累以遺陛下陛下深宜遵述先志成就其業况屯首唱大謀空盡北虜輟而弗圖更立新降以一朝之計違三世之規失信於所養建立於無功由秉實知舊議而欲背棄先恩夫言行君子之樞機賞罰理國之綱紀論語曰言忠信行篤敬雖蠻貊行焉今若失信於一屯則百蠻不敢復保誓矣又烏桓鮮卑新殺北單于凡人之情咸畏仇讎今立其弟則二虜懐怨兵食可廢信不可去且漢故事攻給南單于費直嵗一億九十餘萬西域嵗七千四百八十餘萬今北庭彌逺其費過倍是乃空盡天下而非建䇿之要也陳寵字昭公沛國洨人厯位司空上章帝請改苛俗疏寵章帝初為尚書是時承永平故事吏政尚嚴寵以宜改前世苛俗乃上疏帝納其言事務寛厚臣聞先王之政賞不僭刑不濫與其不得己寧僭不濫故唐堯著典眚灾肆赦周公作戒勿誤庶獄伯夷之典雅敬五刑以成三徳由此言之聖賢之政以刑罰為首往者斷獄嚴明所以威懲姦慝姦慝既平必宜濟之以寛陛下即位率由此義數詔羣僚𢎞崇晏晏而有司執事未悉奉承典刑用法猶尚深刻斷獄者急于篣格酷烈之痛執憲者煩於詆欺放濫之文或因公行私逞縱威福夫為政猶張琴瑟大絃急者小絃絶故子貢非臧孫之猛法而美鄭僑之仁政詩云不剛不柔布政優優方今聖徳充塞假於上下宜隆先王之道蕩滌煩苛之法輕薄箠楚以濟羣生全廣至徳以奉天心論斷獄盡冬疏漢舊事斷獄報重常盡三冬之月章帝始改用冬初十月元和二年旱長水校尉賈宗上言斷獄不盡三冬故隂氣微弱陽氣發泄招致旱灾寵奏帝納之夫冬至之節陽氣始萌故十一月有蘭射干芸荔之應時令曰諸生蕩安形體天以為正周以為春十二月陽氣上通雉雊雞乳地以為正殷以為春十三月陽氣已至天地已交萬物皆出蟄蟲始振人以為正夏以為春三微成著以通三統周以天元殷以地元夏以人元若以此時行刑則殷周歳首皆當流血不合人心不稽天意月令曰孟冬之月趣獄刑無留罪明大刑畢在立冬也又仲冬之月身欲寧事欲靜若以降威怒不可謂寧若以行大刑不可謂靜議者咸曰旱之所由咎在改律臣以為殷周斷獄不以三微而化致康平無有灾害自元和以前皆用三冬而水旱之異往往為患由此言之災害自為它應不以改律秦為虐政四時行刑聖漢初興改從簡易蕭何草律季秋論囚俱避立春之月而不計天地之正二王之春實頗有違陛下探幽析微允執其中革百載之失建永年之功上有迎承之敬下有奉微之恵稽春秋之文當月令之意聖功美業不宜中疑上和帝律令奏永元六年寵代郭躬為廷尉鉤校律令條法溢於甫刑者除之未及施行臣聞禮經三百威儀三千故甫刑大辟二百五刑之屬三千禮之所去刑之所取失禮則入刑相為表裏者也今律令死刑六百一十耐罪千六百九十八贖罪以下二千六百八十一溢于甫刑者千九百八十九其四百一十大辟千五百耐罪七十九贖罪春秋保乾圖曰王者三百年一蠲法漢興以来三百二年憲令稍増科條無限又律有三家其説各異宜令三公廷尉平定律令應經合義者可使大辟二百而耐罪贖罪二千八百并為三千悉刪除其餘令與禮相應以易萬人視聽以致刑措之美傳之無窮張酺字孟侯汝南細陽人初為郎厯太尉司徒論薦太子師傅疏漢紀云酺永平初為郎中與桓郁授太子經太子頗為奢侈酺每正諫會太子同生平陽公主薨哀戚過禮酺以為太子舉措宜合禮度因上疏臣伏見皇太子仁厚髙明發言髙逺卓然絶異非人所能及也今平陽公主薨悲哀發中形體骨立恩愛惻隠世希是見臣愚淺不識大體以為宜選名儒髙行以充師傅問訊起居之日太傅特賜讌所以宣徳音以成聖徳也侍中丁鴻仁而有讓達於從政謁者費惲資性敦篤遵令法度如並侍左右必能發起微意増廣徽猷者也辭東郡疏章帝即位酺為虎賁中郎將出為東邵太守自以嘗經親近未悟見出因疏辭帝詔報之臣愚以經術給事左右少不更職不曉文法猥當剖符典郡班政千里必有負恩辱位之咎臣竊私自分殊不慮出城闕冀蒙留恩託備冗官羣僚所不安耳目所聞見不敢避好醜章帝詔報經云身雖在外乃心不離王室典城臨民益所以報効也好醜必上不在遠近今賜裝三十萬其亟之官理竇氏疏和帝初酺徴為河南尹㑹竇氏敗上疏帝感酺言徙瓌封就國臣實愚憃不及大體以為竇氏雖伏厥辜而罪刑未著後世不見其事但聞其誅非所以垂示國典貽之將来宜下理官與天下平之方憲等寵貴羣臣阿附唯恐不及皆言憲受顧命之託懐伊吕之忠至乃復比鄧夫人於文母今嚴威既行皆言當死不復顧其前後考折厥衷臣伏見夏陽侯瓌每存忠善前與臣言常有盡節之心檢敕賔客未嘗犯法臣聞王政骨肉之刑有三宥之義過厚不過薄今議者為瓌選嚴能相恐其迫切必不完免宜裁加貸宥以崇厚徳上言諸州詣京都奏事初諸州常以八月巡行所部郡國嵗盡詣京都奏事中興但因計吏酺和帝初上言東觀記臣聞王者法天熒惑奏事太微故州牧刺史入奏事所以通下問知外事也數十年以来重其道歸煩擾故時止勿奏事今因以為故事臣愚以為刺史視事滿嵗可令奏事如舊典問州中風俗恐好惡過所道事所聞見考課衆職下章所告及所自舉有意者賞異之其尤無狀逆詔者行罪法冀敕戒其餘令各敬慎所職於以衰滅貪邪便佞吕盖字君上宛陵人厯位太尉劾太尉張酺奏酺私語司𨽻校尉晏稱三輔辟吏多非其人稱即奏之遂廷叱稱稱劾酺有怨言詔㑹議司徒吕盖奏䇿免酺酺位居三司知公門有儀不屏氣鞠躬以須詔命反作色大言怨讓使臣不可以示四逺和帝免張酺䇿後漢紀詩云節彼南山惟石巖巖赫赫師尹民具爾瞻今君在位八年於兹康哉之歌既無聞焉而於兩觀之下有醜慢之音傷南山之體虧穆穆之風將何以宣示四方儀刑百寮履霜知氷朕甚懼焉君其上太尉印綬君自取之靡有後言丁鴻字孝公潁川定陵人厯太常為司徒徙封馬亭鄉侯與弟盛書盛字仲公鴻事太常桓榮篤志精鋭布衣荷擔不逺千里父琳封陵陽侯及卒鴻當襲封上書讓弟盛不報乃挂縗絰于冢廬逃去留書與盛友人鮑駿遇於東海陽狂不識駿駿廼止而誚讓之鴻感悟乃還就國鴻貪經書不顧恩義弱而隨師生不供養死不飯唅皇天先祖並不祐助身被大病不任茅土前上疾狀願辭爵仲公章寢不報迫且當襲封謹自放棄逐求良醫如遂不瘳永歸溝壑後漢書漢紀云皇天先祖並所不祐身被大病上不任為蕃輔下不任守土先上病狀願辭爵封于仲公先祖東觀記作祖禰上章帝奏元和二年車駕東巡狩鴻以少府從上奏上善焉臣聞古之帝王統治天下五載巡狩至於岱宗柴祭於天望秩山川協時月正日同斗斛權衡使人不爭陛下尊履蒸蒸奉承𢎞業祀五帝於明堂配以光武二祖四宗咸有告祀瞻望太山嘉祥降澍柴祭之日白氣上升與燎烟合黄鵠羣翔所謂神人以和答響之休符也東觀記日食上和帝封事鴻永元四年為司徒是時竇太后臨政憲兄弟各擅威權鴻因日食上封事帝以鴻行太尉兼衛尉屯南北宫于是收憲大將軍印綬兄弟皆自殺臣聞日者陽精守實不虧君之象也月者隂精盈毁有常臣之表也故日食者臣乗君隂陵陽月滿不虧下驕盈也昔周室衰季皇甫之屬専權于外黨類强盛侵奪主埶則日月薄食故詩曰十月之交朔日辛夘日有食之亦孔之醜春秋日食三十六弑君三十二變不空生各以類應夫威柄不以放下利器不以假人覽觀往古近察漢興傾危之禍靡不由之是以三桓専魯田氏檀齊六卿分晉諸吕握權統嗣㡬移哀平之末廟不血食故雖有周公之親而無其徳不得行其埶也今大將軍雖欲敕身自約不敢僭差然而天下逺近皆惶怖承㫖刺史二千石初除謁辭求通待報雖奉符璽受臺敕不敢便去久者至數十日背王室向私門此乃上威損下權盛也人道悖於下效驗見于天雖有隱謀神照其情垂象見戒以告人君間者月滿先節過望不虧此臣驕溢背君専功獨行也陛下未深覺悟故天重見戒誠宜畏懼以防其禍詩云敬天之怒不敢戲豫若敕政責躬杜漸防萌則㓙妖銷滅害除福湊矣夫壊崖破巖之水源自涓涓干雲蔽日之木起於蔥菁禁微則易救末者難人皆不忽於微細以致其大恩不忍誨義不忍割去事之後未然之明鏡也臣愚以為左官外附之臣依託權門傾覆諂諛以求容媚者宜行一切之誅間者大將軍再出威振州郡莫不賦斂吏人遣使貢獻大將軍雖不受而物不還主部署之吏無所畏憚縱行非法不伏罪辜故海内貪猾競為姦吏小民吁嗟怨氣滿腹臣聞天不可以不剛不剛則三光不明主不可以不彊不彊則宰牧縱横宜因天變改政匡失以塞天意舉孝亷奏時大郡口五六十萬舉孝亷二人小郡口二十萬并有蠻夷者亦舉二人下公卿㑹議鴻與司空劉方上言和帝從之凡口率之科宜有階品蠻夷錯雜不得為數自今郡國率二十萬口歳舉孝㢘一人四十萬二人六十萬三人八十萬四人百萬五人百二十萬六人不滿二十萬二歳一人不滿十萬三歳一人鮑駿薦丁鴻書續漢書云鴻初興九江人鮑駿同事桓榮及鴻亡封駿止而讓之乃還就國駿上書薦鴻經學至行明帝賢之召見拜侍中臣聞武王克殷封比干之墓表商容之閭二人無功下車先封之表善顯仁為國之砥礪也伏見丁鴻經明行脩志節清妙班超字仲升彪少子以平西域功封定逺侯拜射聲校尉上章帝請兵疏超永平中為假司馬使西域章帝建初三年率疏勒康居于寘拘彌兵攻姑墨石城破之超欲因此叵平諸國上疏請兵帝知其功可成給兵就超臣竊見先帝欲開西域故北擊匈奴西使外國鄯善于寘即時向化今拘彌莎車疏勒月氏烏孫康居復願歸附欲共并力破滅龜兹平通漢道若得龜兹則西域未服者百分之一耳臣伏自惟念卒伍小吏實願從谷吉效命絶域庶㡬張騫棄身曠野昔魏絳列國大夫尚能和輯諸戎况臣奉大漢之威而無鉛刀一割之用乎前世議者皆曰取三十六國號為斷匈奴右臂今西域諸國自日之所入莫不向化大小欣欣貢奉不絶唯焉耆龜兹獨未服從臣前與官屬三十六人奉使絶域備遭艱戹自孤守疏勒於今五載胡夷情數臣頗識之問其城郭小大皆言倚漢與依天等以是效之則蔥嶺可通蔥嶺通則龜兹可伐今宜拜龜兹侍子白霸為其國王以步騎數百送之與諸國連兵歳月之間龜兹可禽以夷狄攻夷狄計之善者也臣見莎車疏勒田地肥廣草牧饒衍不比敦煌鄯善間也兵可不費中國而糧食自足且姑墨温宿二王特為龜兹所置既非其種更相厭苦其埶必有降反若二國来降則龜兹自破願下臣章參考行事誠有萬分死復何恨臣超區區特蒙神靈竊冀未便僵仆目見西域平定陛下舉萬年之觴薦勲祖廟布大喜于天下上言烏孫先是莎車以為漢兵不出遂降龜兹疏勒都護畨辰亦叛超擊破畨辰欲進攻龜兹以烏孫兵强宜因其力上言遣使招慰章帝從之烏孫大國控弦十萬故武帝妻以公主至孝宣皇帝卒得其用今可遣使招慰與共合力上和帝請歸疏超在西域三十一年西域五十餘國皆納質内屬自以久在絶域年老思土永元十四年上疏而超妹昭亦疏請超乃徴超還臣聞太公封齊五世葬周狐死首丘代馬依風夫周齊同在中土千里之間况於逺處絶域小臣能無依風首丘之思哉蠻夷之俗畏壯侮老臣超犬馬齒殲常恐年衰奄忽僵仆孤魂棄捐昔蘇武留匈奴中尚十九年今臣幸得奉節帶金銀護西域如自以夀終屯部誠無所恨然恐後世或名臣為没西域臣不敢望到酒泉郡但願生入玉門闗臣老病衰困冒死瞽言謹遣子勇隨獻物入塞及臣生在令勇目見中土任尚與班超書超為西域都護徴還以戊巳校尉任尚代尚與超書超曰云云尚私謂所親曰我以班君當贈以竒䇿今所云平平耳尚後竟遭邉禍如超言漢紀超曰雖不言答書然尚既為與書則此為答明矣君侯在外國三十餘年而小人猥承君後任重慮淺宜有以誨之班超荅塞外吏士本非孝子順孫皆以過補屯部蠻夷獸心難養易動今君性嚴急水清無大魚將軍宜寛小過總大綱而已並漢紀後漢書尚謂超曰云云超曰年老失智任君數當大位豈班超所能及哉必不得巳願進愚言塞外吏士本非孝子順孫皆以罪過徙補邉屯而蠻夷懐鳥獸之心難養易敗今君性嚴急水清無大魚察政不得不和宜蕩佚簡易寛小過總大綱而已按此似是面語荆州刺史上言茨充東觀記元和中荆州刺史上言臣行部入長沙界觀者皆徒跣臣問御佐曰人無履亦苦之否御佐對曰十二月盛寒時並多剖裂血出燃火燎之春温或膿潰建武中桂陽太守茨充教人種桑蠶人得其利至今江南頗知桑蠶織屨皆充之化也東漢文紀巻八
