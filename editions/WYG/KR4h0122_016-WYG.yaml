body:
  text: 東漢文紀巻十六明梅鼎祚編楊秉字叔節震中子厯拜太尉諫桓帝微行書秉遷侍中尚書帝時微行私過幸河南尹梁𦙍府舍是日大風晝昏秉疏諫不納臣聞瑞由德至災應事生傳曰禍福無門唯人自召天不言語以災異譴告是以孔子迅雷風烈必有變動詩云敬天之威不敢驅馳王者至尊出入有常警蹕而行靜室而止自非郊廟之事則鑾旗不駕故詩稱自郊徂宫易曰王假有廟致孝享也諸侯如臣之家春秋尚列其誡況以先王法服而私出槃游降亂尊卑等威無序侍衛守空宫紱璽委女妾設有非常之變任章之謀上負先帝下悔靡及臣奕世受恩得備納言又以薄學充在講勸特蒙哀識見照日月恩重命輕義使士死敢憚摧折畧陳其愚論吏職奏延熹五年秉為太尉時宦官方熾任人及子弟為官競為貪淫秉與司空周景上言於是秉條劾牧守以下五十餘人天下肅然内外吏職多非其人自頃所徵皆特拜不試致盜竊縱恣怨訟紛錯舊典中臣子弟不得居位秉執而今枝葉賔客布列職署或年少庸人典據守宰上下忿患四方愁毒可遵用舊章退貪殘塞災謗請下司𨽻校尉中二千石城門五營校尉北軍中候各實竅所部應當斥罷自以狀言三府廉察有遺漏續上計吏留拜奏時郡國計吏多留拜為郎秉上言從之三署見郎七百餘人帑臧空虛浮食者衆而不良守相欲因國為池澆濯釁穢宜絶横拜以塞覬覦之端杜氏通典載秉疏云先王建國順天制官太微積星名為郎位入奉宿衛出牧百姓按此必前奏首語也附此諫南巡除拜疏臣聞先王建國順天制官太微積星名為郎位入奉宿衛出牧百姓臯陶誡虞在於官人頃者道路拜除恩加豎𨽻爵以貨成化由此敗所以俗夫巷議白駒逺逝穆穆清朝逺近莫觀宜割不忍之恩以斷求欲之路劾益州刺史侯參奏秉劾中常侍侯覽弟參取受罪臧累億徵詣廷尉道自殺因奏覽及中常侍具瑗帝免覽官削瑗國牂牁男子張攸居為富室參横加非罪云造訛言殺攸家八人沒入廬宅又與同郡諸生李元之官共飲酒醉飽之後戱故相犯誣言有淫慝之罪應時捶殺以人臣之勢行桀紂之態傷和逆理痛感天地宜當糺持以謝一州劾中常侍侯覽及具瑗奏臣按國舊典宦豎之官本在給使省闥司昏守夜而今猥受過寵執政操權其阿䛕取容者則因公褒舉以報私惠有忤逆於心者必求事中傷肆其凶忿居法王公富擬國家飲食極肴饍僕妾盈紈素雖季氏專魯穰侯擅秦何以尚兹按中常侍侯覽弟參貪殘元惡自取禍滅覽固知釁重必有自疑之意臣愚以為不宜復見親近昔懿公刑邴歜之父奪閻職之妻而使二人參乘卒有竹中之難春秋書之以為至戒葢鄭詹來而國亂四佞放而衆服以此觀之容可近乎覽宜急屏斥投畀有虎若斯之人非恩所宥請免官送歸本郡尚書詰責對延熹三年秉徵拜河南尹初中常侍單超弟匡為濟隂太守坐臧罪論賂客任方刺兖州從事衛羽及捕得方囚繫洛陽匡密令方等突獄亡走尚書召詰責秉對竟輸作左校春秋不誅黎比而魯多盜方等無狀釁由單匡刺執法之吏害奉公之臣復命令得逃竄寛縱罪身元惡大憝終為國害乞檻車徵匡考覈其事則姦慝蹤緒必可立得周景汝南人厯司空太尉議徵楊秉韋著疏秉為河南尹坐事輸作左校赦歸㑹徵秉及處士韋著稱疾不至有司劾大不敬請正罪尚書令周景與尚書邊韶議奏於是重徵乃到拜太常秉儒學侍講常在謙虛著隱居行義以退讓為節俱徵不至誠違側席之望然逶迤退食足抑茍進之風夫明王之世必有不召之臣聖朝𢎞養宜用優游之禮可告在所屬喻以朝廷恩意如遂不至詳議其罰朱穆字公叔尚書令暉之孫梁冀薦為侍御史為冀州刺史奏記大將軍梁冀冀辟穆典兵甚親任及桓帝即位順烈太后臨朝穆以冀埶地親重望有以扶持王室因推災異奏記以勸戒之明年劉鮪等謀立清河王又黄龍二見沛國冀無術學遂以穆龍戰之言為應穆伏念明年丁亥之歲刑德合於乾位易經龍戰之㑹其文曰龍戰于野其道窮也謂陽道將勝而隂道負也今年九月天氣鬱冒五位四候連失正氣此互相明也夫善道屬陽惡道屬隂若脩正守陽摧折惡類則福從之矣穆每事不逮所好惟學傳受於師時有可試願將軍少察愚言申納諸儒而親其忠正絶其姑息專心公朝割除私欲廣求賢能斥逺佞惡夫人君不可不學當以天地順道漸漬其心宜為皇帝選置師傅及侍講者得小心忠篤敦禮之士將軍與之俱入參勸講授師賢法古此猶倚南山坐平原也誰能傾之密奏記梁冀范書接前篇漢紀附記穆意欲言宦官恐冀漏泄復附以密記乃請种暠為從事中郎薦欒巴議郎舉穆侍御史今年夏月暈房星明年當有小戹宜急誅姦臣為天下所怨毒者以塞災咎議郎大夫之位本以式序儒術高行之士今多非其人九卿之中亦有乖其任者惟將軍察焉後漢書又奏記冀驕暴不悛朝野嗟毒穆時舉高第為侍御史以故吏懼其釁積招禍復奏記諫之古之明君必有輔德之臣規諫之官下至器物銘書成敗以防遺失故君有正道臣有正路從之如升堂違之如赴壑今明將軍地有申伯之尊位為羣公之首一日行善天下歸仁終朝為惡四海傾覆頃者官人俱匱加以水蟲為害京師諸官費用增多詔書發調或至十倍各言官無見財皆當出民㮄掠割剝疆令充足公賦既重私歛又深牧守長吏多非德選貪聚無厭遇人如虜或絶命於箠楚之下或自賊於迫切之求又掠奪百姓皆託之尊府遂令將軍結怨天下吏人酸毒道路歎嗟昔秦政煩苛百姓土崩陳勝奮臂一呼天下鼎沸而面䛕之臣猶言安耳諱惡不悛卒至亡滅永和之末綱紀少㢮頗失人望四五歲耳而財空戸下有離心馬免之徒乘敝而起荆揚之間㡬成大患幸賴順烈皇后初政清静内外同力僅乃討定今百姓戚戚困于永和内非仁愛之心可得容忍外非守國之計所宜久安也夫將相大臣均體元首共輿而馳同舟而濟輿傾舟覆患實共之豈可以去明即昧履危自安主孤時困而莫之䘏乎宜時易宰守非其人者減省第宅園池之費拒絶郡國諸所奉送内以自明外解人惑使挾姦之吏無所依託司察之臣得盡耳目憲度既張逺邇清一則將軍身尊事顯德燿無窮天道明察無言不信惟垂省覽後漢書人通鑑作民馬免作馬勉同前漢紀今宦官俱用螽水為害而京師之費十倍於前河内一郡嘗調縑素綺縠纔八萬餘匹今乃十五萬匹官無見錢皆出於民民多流亡皆虛張戸口戸口既少而無貲者多當復割剝公賦重斂二千石長吏遇民如虜或賣用田宅或絶命捶楚大小無聊朝不保暮又有浮游之人稱矯賈販不良長吏望為驅使令家人詐乘其勢此類交錯不可分别輒以託名尊府結怨取譏昔秦之末不恤四方近親市人數如此故以為安穩一旦瓦解陳項並起至於土崩近永和之末人有離心興徒發使不復應命懷糧廩兵云當向離幸賴順烈皇后初政清静乃獲安寧今民心事勢復更戚戚困於永和撫安之急誠在大將軍先易二千石長吏非其人者廬第園池之作距絶州郡貢獻内以明巳外以解人之厄今日行之則今日從矣又奏記冀既貪放復納賂遺承事國家左右宦者通為姦利任其賔客子弟為刺史二千石穆又奏記冀報書其言雖切然不甚罪也大將軍内有貴親之固外有功業之重誠不可復枉道散財以事左右近臣宦者選舉刑賞有干典制輒率公卿詣朝堂按其罪咎則改節從訓猶影響也今反越津逾序以大事小以明事闇從其過言隨其失行天下之事受其枉戾傷損財物壞亂綱紀左右近宦並以私情干擾天下雖大而民無所容足也餘尚可忍官位之事尤不可私毒害流布日夜廣逺願大將軍省廢他事十刻之間考案古今官民之極度數作趣較然可見之如不早悟舟中之人皆敵國也若以穆輕愚不信其言可呼所親識古今者請徵核其實不可一日忘誡懼有後恨梁冀報書漢紀如此僕亦無一可邪後漢書與劉伯宗絶交書及時穆因此著絶交論至梁劉孝標復為廣之以刺到溉昔我為豐令足下不遭母憂乎親解縗絰來入豐寺及我為侍書御史足下親來入臺足下今為二千石我下為郎乃反因計吏以謁相與足下豈丞尉之徒我豈足下部民欲以此謁為榮寵乎咄劉伯宗於仁義道何其薄哉其詩曰北山有鴟不潔其翼飛不正向寢不定息饑則木攬飽則泥伏饕餮貪汚臭腐是食填腸滿嗉嗜欲無極長嗚呼鳯謂鳳無德鳳之所趣與子異域永從此訣各自努力文士傳選注廣絶交論俱未引及留板書穆為冀州刺史舉劾權貴忤宦者趙忠徵詣廷尉臨當就道冀州從事欲為盡像穆留板書謝承後漢書勿畫吾形以為重負忠義之未顯何形像之足紀也上桓帝論宦官疏穆徵拜尚書深疾宦官及在臺閣旦夕共事志欲除之乃上疏中官數因事稱詔詆毁之穆憤懣卒公卿共表追贈益州太守按漢故事中常侍參選士人建武以後乃悉用宦者自延平以來浸益貴盛假貂璫之飾處常伯之任天朝政事一更其手權傾海内寵貴無極子弟親戚並荷榮任故放濫驕溢莫能禁禦凶狡無行之徒媚以求官恃埶怙寵之輩漁食百姓窮破天下空竭小人愚臣以為可悉罷省遵復往初率由舊章更選海内清淳之士明達國體者以輔其處即陛下可為堯舜之君衆僚皆為稷契之臣兆庶黎民蒙被聖化矣崇厚論穆感時澆薄慕尚敦篤乃作崇厚論夫俗之薄也有自來矣故仲尼歎曰大道之行也而邱不與焉葢傷之也夫道者以天下為一在彼猶在己也故行違於道則愧生於心非畏義也事違於理則負結於意非憚禮也故率性而行謂之道得其天性謂之德德性失然後貴仁義是以仁義起而道德遷禮法興而淳樸散故道德以仁義為薄淳樸以禮法為賊也夫中世之所敦已為上世之所薄況又薄于此乎故夫天不崇大則覆幬不廣地不深厚則載物不博人不敦龎則道數不逺昔在仲尼不失舊於原壤楚嚴不忍章於絶纓由此觀之聖賢之德敦矣老氏之經曰大丈夫處其厚不處其薄居其實不居其華故去彼取此夫時有薄而厚施行有失而惠用故覆人之過者敦之道也救人之失者厚之行也往者馬援深昭此道可以為德誡其兄子曰吾欲汝曹聞人之過如聞父母之名耳可得聞口不得言斯言要矣逺則聖賢履之上世近則邴吉張子孺行之漢廷故能振英聲於百世播不滅之遺風不亦美哉然而時俗或異風化不敦而尚相誹謗謂之臧否記短則兼折其長貶惡則并伐其善悠悠者皆是其可稱乎凡此之類豈徒乖為君子之道哉將有危身累家之禍焉悲夫行之者不知憂其然故害興而莫之及也斯既然矣又有異焉人皆見之而不能自遷何則務進者趨前而不能顧後榮貴者矜巳而不待人智不接愚富不賑貧貞士孤而不恤賢者戹而不存故田蚡以尊顯致安國之金淳于以貴埶引方進之言夫以韓翟之操為漢之名宰然猶不能賑一貧賢薦一孤士又況其下者乎此禽息史魚所以專名於前而莫繼於後者也故時敦俗美則小人守正利不能誘也時否俗薄雖君子為邪義不能止也何則先進者既往而不及後來者復習俗而追之是以虛華盛而忠信微刻薄稠而純篤稀斯葢谷風有棄予之歎伐木有鳥鳴之悲矣嗟乎世士誠躬師孔聖之崇則嘉楚嚴之美行希李老之雅誨思馬援之所尚鄙二宰之失度美韓稜之抗正貴丙張之𢎞裕賤時俗之誹謗則道豐績盛名顯身榮載不刋之德播不滅之聲然後知薄者之不足厚者之有餘也彼與草木俱朽此與金石相傾豈得同年而語並日而談哉絶交論或曰子絶存問不見客亦不荅也何故曰古者進退趨業無私游之交相見以公朝享㑹以禮紀否則朋徒受習而巳曰人將疾子如何曰寧受疾曰受疾可乎曰世之務交游也久矣敦千乘不忌於君犯禮以追之背公以從之其愈者則孺子之愛也其甚者則求蔽過竊譽以贍其私事替義退公輕私重居勞於聽也或於道而求其私贍矣是故遂往不反而莫敢止焉是川瀆並決而莫敢之塞游豶蹂稼而莫之禁也詩云威儀棣棣不可選也後生將復何述而吾不才焉能規此實悼無行子道多闕臣事多尤思復白圭重考古言以補徃過時無孔堂思兼則滯匪有廢也則亦焉興是以敢受疾也不亦可乎公卿表旌朱穆後漢書穆延熹六年卒公卿共奏追贈益州太守穆立節忠清䖍恭機密守死善道宜蒙旌寵策詔襃述桓帝贈朱穆益州刺史詔詔即用前表中語惟刺史與太守不同見蔡邕朱公叔鼎銘尚書朱穆立節忠亮世篤爾行䖍恪機任守死善道不幸而卒朝廷憫焉今使權謁者中郎楊賁贈穆益州刺史印綬魂而有靈嘉其寵榮袁著劾梁冀書冀凶縱日甚郎中汝南袁著年十九不勝其憤詣闕上書冀密捕笞殺之臣聞仲尼歎鳳鳥不至河不出圖自傷卑賤不能致也今陛下居得致之位又有能致之資而和氣未應賢愚失序者埶分權臣上下壅隔之故也夫四時之運功成則退髙爵厚寵鮮不致災今大將軍位極功成可為至戒宜遵懸車之禮高枕頥神傳曰木實繁者披枝害心若不抑損權盛將無以全其身矣左右聞臣言將側目切齒臣特以童蒙見拔故敢忘忌諱昔舜禹相戒無若丹朱周公戒成王無如殷王紂願除誹謗之罪以開天下之口延篤字叔堅南陽犨人以博士徵拜議郎著作東觀遷侍中仁孝論篤為京兆尹忤梁冀以病免歸教授家巷時人或疑仁孝前後之証篤乃論之觀夫仁孝之辯紛然異端互引典文代取事據可謂篤論矣夫人二致同源總率百行非復銖兩輕重必定前後之數也而如欲分其大較體而名之則孝在事親仁施品物施物則功濟於時事親則德歸於巳於己則事寡濟時則功多推此以言仁則逺矣然物有由微而著事有由隱而章近取諸身則耳有聽受之用目有察見之明足有致逺之勞手有飾衛之功功雖顯外本之者心也逺取諸物則草木之二始於萌芽終於彌蔓枝葉扶疏榮華紛縟末雖繁蔚致之者根也夫仁人之有孝猶四體之有心腹枝葉之有本根也聖人知之故曰夫孝天之經也地之義也人之行也君子務本本立而道生孝悌也者其為仁之本與然體大難備物性好偏故所施不同事少兩兼者也如必對其優劣則仁以枝葉扶疏為大孝以心體本根為先可無訟也或謂先孝後仁非仲尼序回參之意葢以為仁孝同質而生純體之者則互以為稱虞舜顔回是也若偏而體之則各有其目公劉曾參是也夫曾閔以孝悌為至德管仲以九合為仁功未有論德不先回參考功不大夷吾以此而言各從其稱者也本根御覽作充實與前越嶲太守李文德書篤忤大將軍梁冀以病免歸教授鄉里文德素善于篤時在京師以篤有王佐之才欲令公卿引進之篤乃為書止文德後遭黨錮卒于家夫道之將廢所謂命也流聞乃欲相為求還東觀來命雖篤所未敢當吾昧爽櫛梳坐於客堂朝則誦羲文之易虞夏之書厯公旦之典禮覽仲尼之春秋夕則消搖内階詠詩南軒百家衆氏投間而作洋洋乎其盈耳也渙瀾兮其溢目也紛紛欣欣兮其獨樂也當此之時不知天之為葢地之為輿不知世之有人己之有軀也雖漸離擊筑傍若無人髙鳳讀書不知暴雨方之於吾未足況也且吾自束脩已來為人臣不陷於不忠為人子不陷於不孝上交不諂下交不黷從此而歿下見先君逺祖可不慙赧如此而不以善止者恐如教羿射者也慎勿迷其本棄其生也後漢書又與李文德書吾食赤烏之䴸麥飲化益之𤣥醴折張騫大宛之䔉歃晉國郇瑕之鹽太平御覽郇瑕下一有氏字宋𠂻云化益即伯益也世本曰化益作井貽劉佑書佑字伯祖中山安國人佑三轉大司農厯三卿輒以疾辭乞骸骨歸田里遂杜門絶迹每三公缺朝廷皆屬意於佑以讚毁不用篤貽之書後佑復為河南尹昔太伯三讓人無德而稱焉延陵髙揖華夏仰風吾子懷蘧氏之可巻體寗子之如愚㣲妙𤣥通冲而不盈蔑三光之明未暇以天下為事何其邵與後漢書與髙義方書高彪今兹以五經為鼎簠書傳為俎邊祖述堯舜憲章文武未暇蜯也宜勿以為念太平御覽高彪集五經為府藏雜藝為庖厨與段紀明書段熲字紀明武威姑臧人厯拜太尉㑹日食自劾飲酖死熲厯遷䕶羌校尉擊燒當八種羌破之遂至河首積石山出塞二千餘里篤書謂此也得知窮名極逺大捷而反雖齊桓之制闕令文之服流沙霍將軍之闕到祁連辛武賢之義絶醜虜蔑以加焉莫不魚爛雲除震懼稽顙矣北堂書鈔陳龜字叔珍上黨泫氏人厯尚書忤梁冀不食死論并涼邊事疏龜為京兆尹㑹羌胡寇邊桓帝以龜世諳邊俗拜度遼將軍龜臨行上疏帝乃更選幽并刺史除并涼一年租賦臣龜蒙恩累世馳騁邊垂雖展鷹犬之用頓斃胡虜之庭魂骸不返薦享狐狸猶無以塞厚責荅萬分也至臣頑駑器無鈆刀一割之用過受國恩榮秩兼優生年死日永懼不報臣聞三辰不軌擢士為相蠻夷不恭拔卒為將臣無文武之才而忝鷹揚之任上慙聖朝下懼素餐雖歿軀體無所云補今西州邊鄙土地塉埆鞍馬為居射獵為業男寡耕稼之利女乏機杼之饒守塞候望懸命鋒鏑聞急長驅去不圖反自頃年以來匈奴數攻營郡殘殺長吏侮畧良細戰夫身膏沙漠居人首係馬鞍或舉國掩戸盡種灰滅孤兒寡婦號哭空城野無青草室如懸罄雖含生氣實同枯朽往歲并州水雨災螟互生稼穡荒耗租更空闕老者慮不終年少壯懼於困戹陛下以百姓為子品庶以陛下為父焉可不日昃勞神垂撫循之恩哉唐堯親捨其子以禪虞舜者是欲民遭聖君不令遇惡主也故古公杖策其民五倍文王西伯天下歸之豈復輿金輦寳以為民惠乎近孝文皇帝感一女子之言除肉刑之法體德行仁為漢賢主陛下繼中興之統承光武之業臨朝聽政而未留聖意且牧守不良或出中官懼逆上㫖取過目前呼嗟之聲招致災害胡虜凶悍因衰緣隙而令倉庫單於豺狼之口功業無銖兩之効皆由將帥不忠聚姦所致前涼州刺史祝良初除到州多所糾罰太守令長貶黜將半政未踰時功効卓然實應賞異以勸功能改任牧守去斥姦殘又宜更選匈奴烏桓䕶羌中郎將校尉簡練文武授之法令除并涼二州今年租更寛赦罪𨽻埽除更始則善吏知奉公之祐惡者覺營私之禍胡馬可不窺長城塞下無候望之患矣趙典字仲經蜀郡成都人太尉戒子厯遷長樂少府衛尉諫開鴻池奏典建和初四府表薦厯遷侍中時帝欲廣開鴻池典諫帝納其言而止鴻池汎溉巳且百頃猶復增而深之非所以崇唐虞之約巳遵孝文之愛人也論封爵奏典建和中為大鴻臚時恩澤諸侯以無勞受封典奏不從夫無功而賞勞者不勸上忝下辱亂象千度且髙祖之誓非功臣不封宜一切削免爵土以存舊典趙芬等詣巴郡刺史但望自訟桓帝以并州刺史但望為巴郡太守勤䘏民隱郡文學掾宕渠趙芬掾𢎞農馮尤墊江龔榮王祈李温臨江嚴就胡良文愷安漢陳禧閬中黄閶江州母成陽譽喬就張紹牟存平直等詣望自訟望深納之郡戸曹史枳白望郡境廣逺千里給吏兼將人從冬往夏還夏單冬複惟踰時之役懷怨曠之思其憂喪吉凶不得相見解緩補綻下至薪菜之物無不躬買於市富者財得自供貧者無以自支是以清儉夭枉不聞加以水陸艱難山有猛禽思迫期㑹隕身江河投死虎口咨嗟之歎厯世所苦天之應感乃遭明府欲為更新童兒匹婦懽喜相賀將去逺就近釋危蒙安縣無數十民無逺邇恩加未生澤及來世巍巍之功勒於金石乞以文書付計掾史人鬼同符必獲嘉報芬等幸甚華陽國志史枳白但望芬等前後百餘人厯政訟訴未蒙感悟明府運機布政稽當皇極為民庶請命救患德合天地澤潤河海開闢以來今遇慈父經曰奕奕梁山惟禹甸之有倬其道韓侯受命比隆等盛於斯為美但望字伯闔泰山人厯并州刺史巴郡太守請分巴郡疏永興二年三月上疏朝議未許至獻帝初平巴郡分為永寧固陵謹按巴郡圖經境界南北四千東西五千周萬餘里屬縣十四鹽鐵五官各有丞史戸四十六萬四千七百八十口百八十七萬五千五百三十五逺縣去郡千二百至千五百里鄉亭去縣或三四百或及千里土界遐逺令尉不能窮詰姦凶時有賊發督郵追案十日乃到賊巳逺逃蹤跡絶滅罪錄逮捕證驗文書詰訊即從春至冬不能䆒訖繩憲未加或遇德令是以賊盜公行姦宄不絶榮等及隴西太守馮含上谷太守陳𢎞說往者至有刼閬中令楊殷終津侯姜昊傷尉蘇鴻彭亭侯孫魯雍亭侯陳巳殷侯樂普又有女服賊千有餘人布散千里不即發覺謀成乃誅其水陸覆害殺郡掾枳謝盛塞威張御魚復令尹尋主簿胡直若此非一給吏休謁往還數千閉囚須報或有彈劾動便厯年吏坐喻科恐失冬節侵疑先死如當移傳不能待報輒自刑戮或長吏忿怒寃枉弱民欲赴訴郡官每憚還往太守行桑農不到四縣刺史行部不到十縣郡治江州時有温風遙縣客吏多有疾病地勢剛嶮皆重屋累居數有火害又不相容結舫水居五百餘家三江之㑹夏水漲盛壞散顛溺死者無數而江州以東濵江山險其人半楚姿態敦重墊江以西土地平敞精敏輕疾上下殊俗情性不同敢欲分為二郡一治臨江一治安漢各有桑麻丹漆布帛漁池鹽鐵足相供給兩近京師榮等自欲義出財帛造立府寺不費縣官得百姓懽心孝武以來亦分呉蜀諸郡聖德廣被民物滋繁增置郡土釋民之勞誠聖主之盛業也臣雖貪大郡以自優暇不忍小民顒顒蔽隔謹具以聞並華陽國志臧旻訟第五種書永壽中種為兖州刺史忤中常侍單超遂以太山賊事陷種徙朔方超外孫為朔方守稸怒以待之種舊掾孫斌追脫種以匿其友閭甄氏數年徐州從事臧旻上書訟之㑹赦出卒于家臣聞士有忍死之辱必有就事之計故季布屈節於朱家管仲錯行於召忽此二臣以可死而不死者非愛身於須㬰貪命於茍活隱其智力顧其權畧庶幸逢時有所為耳卒遭高帝之成業齊桓之興伯遺其亡逃之行赦其射鉤之讐拔於囚虜之中信其佐國之謀勲效傳於百世君臣載於篇籍假令二主紀過於纎介則此二臣同死於大馬沈名於溝壑當何由得申其補過之功建其竒奥之術乎伏見故兖州刺史第五種傑然自建在鄉曲無苞苴之嫌步朝堂無擇言之闕天性疾惡公方不曲故論者說清高以種為上序直士以種為首春秋之義選人所長棄其所短錄其小善除其大過種所坐以盜賊公負筋力未就罪至徵徙非有大惡昔虞舜事親大杖則走故種逃亡苟全性命冀有朱家之路以顯季布之㑹願陛下無遺須㬰之恩令種有持忠入地之恨寇榮恂曽孫上桓帝自訟書榮少知名桓帝時為侍中性矜絜自貴見忤權寵從兄子尚帝妹從孫女入後宫左右益惡之延熹初陷以罪辟與宗族免歸故郡榮奔闕自訟詔以榮擅去邊捕之逃竄數年乃自亡命中上書帝愈怒遂誅榮臣聞天地之於萬物也好生帝王之於萬人也慈愛陛下統天理物為萬國覆作人父母先慈愛後威武先寛容後刑辟自生齒以上咸蒙德澤而臣兄弟獨以無辜為專權之臣所見批抵青蠅之人所共搆㑹以臣婚姻王室謂臣將撫其背奪其位退其生受其埶於是遂作飛章以被於臣欲使墜萬仞之阬踐必死之地令陛下忽慈母之仁發投杼之怒尚書背繩墨案空劾不復質确其過寘於嚴棘之下便奏正臣罪司隸校尉馮羨佞邪承㫖廢於王命驅逐臣等不得旋踵臣奔走還郡沒齒無怨臣誠恐卒為豺狼横見噬食故冐死欲詣闕披肝膽布腹心刺史張敬好為諂䛕張設機網復令陛下興雷電之怒司隸校尉應奉河南尹何豹洛陽令袁騰並驅爭先若赴讐敵罰及死沒髠剔墳墓但未掘壙出尸剖棺露胔耳昔文王葬枯骨公劉敦行葦世稱其仁今殘酷容媚之吏無折中處平之心不顧無辜之害而興虛誣之誹欲使嚴朝必加濫罰是以不敢觸突天威而自竄山林以俟陛下發神聖之聽啓獨覩之明拒讒慝之謗絶邪巧之言救可濟之人援投溺之命不意滯怒不為春夏息淹恚不為順時怠遂馳使郵驛布告逺近嚴文剋剝痛於霜雪張羅海内設罝萬里逐臣者窮人迹追臣者極車軌雖楚購伍員漢求季布無以過也臣遇罰以來三赦再贖無驗之罪足以蠲除而陛下疾臣愈深有司咎臣甫力止則見埽滅行則為亡虜茍生則為窮人極死則為寃鬼天廣而無以自覆地厚而無以自載蹈陸土而有沈淪之憂逺巖墻而有鎮壓之患精誠足以感於陛下而哲王未肯悟如臣犯元惡大憝足以陳於原野備刀鋸陛下當班布臣之所坐以解衆論之疑臣思入國門坐於胏石之上使三槐九棘平臣之罪而閶闔九重陷穽歩設舉趾觸罘罝動行絓羅網無緣至萬乘之前永無見信之期矣國君不可讐匹夫讐之則一國盡懼臣奔走以來三離寒暑隂陽易位當煖反寒春常凄風夏降霜雹又連年大風折拔樹木風為號令春夏布德議獄緩死之時願陛下思帝堯五教在寛之德企成湯避逺讒夫之誡以寧風旱以弭灾兵臣聞勇者不逃死智者不重困因不為明朝借垂盡之命願赴湘沅之波從屈原之悲沈江湖之流弔子胥之哀臣功臣苖緒生長王國懼獨含恨以葬江魚之腹無以自别於世不勝狐死首邱之情營魂識路之懷犯冐王怒觸突帝禁伏於兩觀陳訴毒痛然後登金鑊入沸湯麋爛於熾㸑之下九死未悔悲夫久生亦復何聊葢忠臣殺身以解君怒孝子殞命以寧親怨故大舜不避塗廪浚井之難申生不辭姬氏讒邪之謗臣敢忘斯議不自斃以解明朝之忿哉乞以身塞重責願陛下匄兄弟死命使臣一門頗有遺類以崇陛下寛饒之惠先死陳情臨章涕泣泣血漣如徐璜白言日蝕梁冀别傳云延熹元年五月甲戌晦日蝕在栁七度常侍徐璜召太史陳援詰問乃以實對冀怨援收殺獄中臣切見道術家常言漢死在戌亥今太歲在丙戌五月甲戌日蝕柳宿朱雀漢家之貴國宿分周地今京師是也史官上占去重見輕李雲字行祖甘陵人露布上桓帝書雲好學善隂陽舉孝廉遷白馬令延熹二年中常侍單超等以誅梁冀功封列侯又立掖庭民家女亳氏為皇后后家封者四人是時地數震裂衆災頻降雲憂國將危乃露布上書移副三府上怒逮黄門北寺獄大鴻臚陳蕃等救雲不納雲死獄中臣聞皇后天下母德配坤靈得其人則五祇來備不得其人則地動搖宫比年災異可謂多矣皇天之戒可謂至矣髙祖受命至今三百六十四歲君期一周當有黄精代見姓陳項虞田許氏不可令此人居太尉太傅典兵之官舉厝至重不可不慎班功行賞宜應其實梁冀雖持權專擅虐流天下今以罪行誅猶召家臣搤殺之耳而猥封謀臣萬戸以上髙祖聞之得無見非西北列將得無解體孔子曰帝者諦也今官位錯亂小人諂進財貨公行政化日損尺一拜用不經御省是帝欲不諦乎馮緄字鴻卿巴郡宕渠人厯屯騎校尉復為廷尉上桓帝疏緄為車騎將軍擊長沙蠻前後將帥宦官輒陷以折耗軍資緄上疏尚書朱穆奏緄以財自嫌失大臣之節詔勿劾埶得容姦伯夷可疑茍曰無猜盜跖可信故樂羊陳功文侯示以謗書願請中常侍一人監軍財費後漢書尚書朱穆駮奏後漢紀臣聞出郊之事將軍制之所以崇威信合事宜也即緄有嫌不當荷任即緄無嫌義不見疑樂羊戰國陪臣猶賴見信之主以全其功況唐虞之朝而有猜嫌之事哉緄設虛端以自阻衛為臣不忠張磐字子石丹陽人以清白稱終廬江太守列狀廷尉磐延熹中為交阯刺史時度尚為荆州刺史前破賊餘黨走蒼梧偽上言蒼梧賊入荆州界徵磐下廷尉辭狀未正㑹赦磐不肯出獄因自列狀詔徵尚以功見原前長沙賊胡蘭作難荆州餘黨散入交阯磐身膺甲胄渉危履險討擊凶患斬殄渠帥餘燼鳥竄冐遁還奔荆州刺史度尚懼磐先言怖畏罪戾伏奏見誣磐備位方伯為國爪牙而為尚所枉受罪牢獄夫事有虛實法有是非磐實不辜赦無所除如忍以茍免永受侵辱之恥生為惡吏死為敝鬼乞傳尚詣廷尉面對曲直足明真偽尚不徵者磐埋骨牢檻終不虛出望塵受枉應奉字世叔汝南南頓人厯司隸校尉著漢事及感騷三十篇諫桓帝立田貴人疏鄧皇后敗田貴人方幸欲建立奉為司隸校尉以微賤不宜超登后位疏諫帝竟立竇皇后臣聞周納狄女襄王出居于鄭漢立飛燕成帝𦙍嗣泯絶母后之重興廢所因宜思關雎之所求逺五禁之所忌理李膺等疏膺延熹二年再遷河南尹表按宛陵大姓羊元羣臧罪行賂宦官反坐膺輸作左校時廷尉馮緄大司農劉祐亦得罪司隸校尉應奉上疏理膺等乃悉免刑昔秦人觀寳於楚昭奚恤莅以羣賢梁惠王瑋其照乘之珠齊威王荅以四臣夫忠賢武將國之心膂竊見左校弛刑徒前廷尉馮緄大司農劉祐河南尹李膺等執法不撓誅舉邪臣肆之以法衆庶稱宜昔季孫行父親逆君命逐出莒僕於舜之功二十之一今膺等投身彊禦畢力致罪陛下既不聽察而猥受譖訴遂令忠臣同愆元惡自春迄冬不蒙降恕遐邇觀聽為之歎息夫立政之要記功忘失是以武帝捨安國於徒中宣帝徵張敞於亡命緄前討蠻荆均吉甫之功祐數臨督司有不吐茹之節膺著威幽并遺愛度遼今三垂蠢動王旅未振易稱雷雨作解君子以赦過宥罪乞原膺等以備不虞爰延字季平陳留外黄人拜大鴻臚上桓帝論客星經帝坐封事延自魏郡太守徵拜大鴻臚時太史令上言星異常密以問延因上封事臣聞天子尊無為上故天以為子位臨臣庶威重四海動静以理則星辰順序意有邪僻則晷度錯違陛下以河南尹鄧萬有龍潛之舊封為通侯恩重公卿惠豐宗室加頃引見與之對博上下媟黷有虧尊嚴臣聞之帝左右者所以咨政德也故周公戒成王曰其朋其朋言慎所與也昔宋閔公與彊臣共博列婦人於側積此無禮以致大災武帝與幸臣李延年韓嫣同臥起尊爵重賜情欲無厭遂生驕淫之心行不義之事卒延年被戮嫣伏其辜夫愛之則不覺其過惡之則不知其善所以事多放濫物情生怨故王者賞人必酬其功爵人必甄其德善人同處則日聞嘉訓惡人從游則日生邪情孔子曰益者三友損者三友邪臣惑君亂妾危主以非所言則悅於耳以非所行則玩於目故令人君不能遠之仲尼曰唯女子與小人為難養近之則不遜逺之則怨葢聖人之明戒也昔光武皇帝與嚴光俱寢上天之異其夕即見夫以光武之聖德嚴光之高賢君臣合道尚降此變豈況陛下今所親幸以賤為貴以卑為尊哉惟陛下逺讒䛕之人納謇謇之士除左右之權寤宦官之敝使積善日熈佞惡消殄則乾災可除史弼字公謙陳留考成人厯河東太守終彭城相論渤海王悝封事悝桓帝弟僭傲多不法弼為北軍中候上封事帝不忍下其事後悝竟坐逆謀貶臣聞帝王之於親戚愛雖隆必示之以威體雖貴必禁之以度如是和睦之道興骨肉之恩遂昔周襄王恣甘昭公孝景皇帝驕梁孝王而二弟階寵終用㝅慢卒周有播蕩之禍漢有爰盎之變竊聞渤海王悝慿至親之屬恃偏私之愛失奉上之節有僭慢之心外聚剽輕不逞之徒内荒酒樂出入無常所與羣居皆有口無行或家之弃子或朝之斥臣必有羊勝伍被之變州司不敢彈糾傅相不能匡輔陛下隆於友于不忍遏絶恐遂滋蔓為害彌大乞露臣奏宣示百僚使臣得於清朝明言其失然後詔公卿平處其法法決罪定乃下不忍之詔臣下固執然後少有所許如是則聖朝無傷親之譏渤海有享國之慶不然懼大獄將興使者相望於路矣臣職典禁兵備禦非常而妄知藩國干犯至戚罪不容誅不勝憤懣謹冐死以聞劉淑字仲承河間樂成人舉賢良方正拜議郎厯侍中虎賁中郎將與竇武等為宦官所害日食對䇿後漢紀延熹八年正月丙申晦日有食之詔公卿校尉舉賢良方正各一人河間劉淑對范書云永興二年淑對䇿為天下第一臣聞立天之道曰隂與陽立人之道曰仁與義故夫婦正則父子親父子親則君臣通君臣通則仁義立仁義立則隂陽和而風雨時矣夫吉凶在人水旱由政故勢在臣下則地震坤裂下情不通則日月失明百姓怨恨則水旱暴興主上驕盈則澤不下流由此觀之君其綱也臣其紀也綱紀整則萬目張君臣正則萬國理故能父慈子孝夫信婦貞兄愛弟順如此則隂陽和風雨時萬物得所矣襄楷字公矩平原隰隂人舉方正徵博士並不就上桓帝論災異疏桓帝時宦官専朝政刑暴濫又比失皇子災異尤數楷善天文隂陽之術延熹九年自家詣闕上疏不省十數日復上疏即召詣尚書問狀尚書上其對詔下有司處正尚書承詔奏劾楷論刑臣聞皇天不言以文象設教堯舜雖聖必厯象日月星辰察五緯所在故能享百年之壽為萬世之法臣竊見去歲五月熒惑入太微犯帝坐出端門不軌常道其閏月庚辰太白入房犯心小星震動中耀中耀天王也傍小星者天王子也夫太微天廷五帝之坐而金火罰星揚光其中於占天子凶又俱入房心法無繼嗣今年歲星久守太微逆行西至掖門還竊執法歲為木精好生惡殺而淹留不去者咎在仁德不修誅罰大酷前七年十二月熒惑與歲星俱入軒轅逆行四十餘日而鄧皇后誅其冬大寒殺鳥獸害魚鼈城傍竹栢之葉有傷枯者臣聞於師曰栢傷竹枯不出三年天子當之今洛陽城中人夜無故呌呼云有火光人聲正諠於占亦與竹栢枯同自春夏以來連有霜雹及大雨雷而臣作威作福刑罰急刻之所感也太原太守劉瓆南陽太守成瑨志除姦邪其所誅剪皆合人望而陛下受閹豎之譖乃逺加考逮三公上書乞哀瓆等不見採察而嚴被譴讓憂國之臣將遂杜口矣臣聞殺無罪誅賢者禍及三世自陛下即位以來頻行誅伐梁寇孫鄧並見族滅其從坐者又非其數李雲上書明主所不當諱杜衆乞死諒以感悟聖朝曾無赦宥而并被殘戮天下之人咸知其寃漢興以來未有拒諫誅賢用刑太深如今者也永平舊典諸當重論皆須冬獄先請後刑所以重人命也頃數十歲以來州郡玩習又欲避請讞之煩輒託疾病多死牢獄長吏殺生自已死者多非其罪魂神寃結無所歸訴淫厲疾疫自此而起昔文王一妻誕致十子今宫女數千未聞慶育宜修德省刑以廣螽斯之祚又七年六月十三日河内野王山上有龍死長可數十丈扶風有星隕為石聲聞三郡夫龍形狀不一小大無常故周易況之大人帝王以為符瑞或聞河内龍死諱以為蛇夫龍能變化蛇亦有神皆不當死昔秦之將衰華山神操璧以授鄭客曰今年祖龍死始皇逃之死於沙邱王莽天鳳二年訛言黄山宫有死龍之異後漢誅莽光武復興虛言猶然況於實邪夫星辰麗天猶萬國之附王者也下將畔上故星亦畔天石者安類墜者失埶春秋五石隕宋其後襄公為楚所執秦之亡也石隕東郡今隕扶風與先帝園陵相近不有大喪必有畔逆按春秋以來及古帝王未有河清及學門自壞者也臣以為河者諸侯位也清者屬陽濁者屬隂河當濁而反清者隂欲為陽諸侯欲為帝也太學天子敎化之宫其門無故自壞者言文德將喪教化廢也京房易傳曰河水清天下平今天垂異地吐妖人厲疫三者並時而有河清猶春秋麟不當見而見孔子書之以為異也臣前上琅邪宫崇受于吉神書不合明聽臣聞布穀鳴於孟夏蟋蟀吟於始秋物有微而志信人有賤而言忠臣雖至賤誠願賜清閒極盡所言濟河清上疏水經注引續漢書延熹九年濟隂東郡濟北平原河水清襄楷上疏明年宫車晏駕徵解瀆侯為漢嗣是為靈帝按此前書及之然此似自為一疏范曄書襄楷傳絶不及濟河若諸候徵應事春秋注記未有河清而今有之易乾鑿度曰上天將降嘉應河水先清京房易傳曰河水清天下平天垂異地吐妖民厲疾三者並作而有河清春秋麟不當見而見孔子書以為異河者諸侯之相清者陽明之徵豈獨諸侯有窺京師也復上書臣伏見太白北入數日復出東方其占當有大兵中國弱四夷强臣又推步熒惑今當出而潛必有隂謀皆由獄多寃結忠臣被戮德星所以久守執法亦為此也陛下宜承天意理察寃獄為劉瓆成瑨虧除罪辟追錄李雲杜衆等子孫夫天子事天不孝則日食星鬬比年日食於正朔三光不明五緯錯戾前者宫禁所獻神書專以奉天地順五行為本亦有興國廣嗣之術其文易曉參同經典而順帝不行故國𦙍不興孝冲孝質頻世短祚臣又聞之得主所好自非正道神為生虐故周衰諸侯以力征相尚於是夏育申休宋萬彭生任鄙之徒生於其時殷紂好色妲己是出葉公好龍真龍游廷今黄門常侍天刑之人陛下愛待兼倍常寵繼嗣未兆豈不為此天官宦者星不在紫宫而在天市明當給使主市里也今乃反處常伯之位實非天意又聞宫中立黄老浮屠之祠此道清虚貴尚無為好生惡殺省慾去奢今陛下嗜慾不去殺罰過理既乖其道豈獲其祚哉或言老子入夷狄為浮屠浮屠不三宿桑下不欲久生恩愛精之至也天神遺以好女浮屠曰此但革囊盛血遂不盻之其守一如此乃能成道今陛下婬女豔婦極天下之麗甘肥飲美單天下之味奈何欲如黄老乎對尚書狀臣聞古者本無宦官武帝末春秋髙數游後宫始置之耳後稍見任至於順帝遂益繁熾今陛下爵之十倍於前至今無繼嗣者豈獨好之而使之然乎尚書奏劾襄楷宦者之官非近世所置漢初張澤為大謁者佐絳侯誅諸吕孝文使趙談參乘而子孫昌盛楷不正辭理指陳要務而析言破律違背經藝假借星宿偽託神靈造合私意誣上罔事請下司隸正楷罪法收送洛陽獄荀爽字慈明一名諝潁川潁隂人拜郎中厯光禄勲進司空對策桓帝延熹九年太常趙典舉爽至孝拜郎中對策陳便宜奏聞即棄官去臣聞之於師曰漢為火德火生於木木盛於火故其德為孝其象在周易之離夫在地為火在天為日在天者用其精在地者用其形夏則火王其精在天温煖之氣養生百木是其孝也冬時則廢其形在地酷烈之氣焚燒山林是其不孝也故漢制使天下誦孝經選吏舉孝廉夫喪親自盡孝之終也今之公卿及二千石三年之喪不得即去殆非所以增崇孝道而克稱火德者也往者孝文勞謙行過乎儉故有遺詔以日易月此當時之宜不可貫之萬世古今之制雖有損益而諒闇之禮未嘗改移以示天下莫遺其親今公卿羣寮皆政教所瞻而父母之喪不得奔赴夫仁義之行自上而始敦厚之俗以應乎下傳曰喪祭之禮闕則人臣之恩薄背死忘生者衆矣曾子曰人未有自致者必也親喪乎春秋傳曰上之所為民之歸也夫上所不為而民或為之故加刑罰若上之所為民亦為之又何誅焉昔翟方進以自備宰相而不敢踰制至遭母憂三十六日而除夫失禮之源自上而始古者大喪三年不呼其門所以崇國厚俗篤化之道也事失宜正過勿憚改天下通喪可如舊禮臣聞有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後有禮義禮義備則人知所厝矣夫婦人倫之始王化之端故文王作易上經首乾坤下經首咸恒孔子曰天尊地卑乾坤定矣夫婦之道所謂順也堯典曰釐降二女於媯汭嬪于虞降者下也嬪者婦也言雖帝堯之女下嫁於虞猶屈體降下勤修婦道易曰帝乙歸妹以祉元吉婦人謂嫁曰歸言湯以娶禮婦其妹於諸侯也春秋之義王姬嫁齊使魯主之不以天子之尊加於諸侯也今漢承秦法設尚主之儀以妻制夫以卑臨尊違乾坤之道失陽唱之義孔子曰昔聖人之作易也仰則觀象於天俯則察法於地覩鳥獸之文與地之宜近取諸身逺取諸物以通神明之德以類萬物之情今觀法於天則北極至尊四星妃后察法於地則崐山象夫卑澤象妻覩鳥獸之文鳥則雄者鳴雊雌能順服獸則牡為唱導牝乃相從近取諸身則乾為人首坤為人腹逺取諸物則木實屬天根荄屬地陽尊隂卑葢乃天性且詩初篇實首關雎禮始冠婚先正夫婦天地六經其㫖一揆宜改尚主之制以稱乾坤之性遵法堯湯式是周孔合之天地而不謬質之鬼神而不疑人事如此則嘉瑞降天吉符出地五韙咸備各以其敘矣昔者聖人建天地之中而謂之禮禮者所以興福祥之本而止禍亂之源也人能枉欲從禮者則福歸之順情廢禮者則禍歸之推禍福之所應知興廢之所由來也衆禮之中婚禮為首故天子娶十二天之數也諸侯以下各有等差事之降也陽性純而能施隂體順而能化以禮濟樂節宣其氣故能豐子孫之祥致老壽之福及三代之季淫而無節瑤臺傾宫陳妾數百陽竭於上隂隔於下故周公之戒曰不知稼穡之艱難不聞小人之勞惟耽樂之從時亦罔或克壽是其明戒後世之人好福不務其本惡禍不易其軌傳曰截趾適屨孰云其愚何與斯人追欲喪軀誠可痛也臣竊聞後宫采女五六千人從官侍使復在其外冬夏衣服朝夕稟糧耗費縑帛空竭府藏徵調增培十而稅一空賦不辜之民以供無用之女百姓窮困于外隂陽隔塞于内故感動和氣災異屢臻臣愚以為諸非禮聘未曾幸御者一皆遣出使成妃合一曰通怨曠和隂陽二曰省財用實府庫三曰修禮制綏眉壽四曰配陽施祈螽斯五曰寛役賦安黎民此誠國家之𢎞利天人之大福也夫寒熱晦明所以為歲尊卑奢儉所以為禮故以晦明寒暑之氣尊卑侈約之禮為其節也易曰天地節而四時成春秋傳曰唯器與名不可以假人孝經曰安上治民莫善於禮禮者尊卑之差上下之制也昔季氏八佾舞於庭非有傷害困於人物而孔子猶曰是可忍也孰不可忍洪範曰惟辟作威惟辟作福惟辟玉食凡此三者君所獨行而臣不得同也今臣僭君服下食上珍所謂害于而家凶于而國者也宜畧依古禮尊卑之差及董仲舒制度之别嚴篤有司必行其命此則禁亂善俗足用之要荀氏家傳載爽對䇿曰臣聞火生於木故其德孝漢之諡帝稱孝其義取此也故漢制天下皆誦孝經選吏則舉孝廉以孝務自盡夫喪親自盡孝之終也今二千石不得行三年喪非所以崇孝道而稱火德也頃者漢嗣數乏枝葉不繁其咎未必不由此往者文帝勞謙自約行過乎儉故有遺詔以日易月此所謂夷惠激俗當身而巳非貫萬世為後嗣法者也貽李膺書膺字元禮潁川襄城人厯長樂少府及陳竇之敗收捕鉤黨詣詔獄考死膺為司隸校尉遭黨事下獄赦免歸鄉里居陽城山中天下士大夫皆高尚其道及陳蕃免太尉朝野屬意於膺爽恐其名高致禍欲令屈節以全亂世為書以貽之久廢過庭不聞善誘陟岵瞻望惟日為歲知以直道不容於時悅山樂水家于陽城道近路夷當即聘問無狀嬰疾闕於所仰頃聞上帝震怒貶出鼎臣人鬼同謀以為天子當貞觀二五利見大人不謂夷之初旦明而未融虹蜺揚輝弃和取同方今天地氣閉大人休否智者見險投以逺害雖匱人望内合私願想甚欣然不為恨也願怡神無事偃息衡門任其飛沈與時抑揚後漢書與郭叔都書陳季方才德秀出超世逸羣金相五質文章虎變終軍賈誼誠無以加宜遂貢之宰朝盛其龍光鹽車之驥自非伯樂無以顯名採光剖璞以獨見寳實為足下利之陳諶字季方穎川許人與父寔兄紀並著高名讓孝廉記伏惟孝廉古之貢士賢則光君愚則虧政爽以迂暗荷當大選並北堂書鈔女誡詩云泉源在左淇水在右女子有行逺父母兄弟明當許嫁配適君子竭節從理昏定晨省夜臥早起和顔悅色事如依恃正身潔行稱為順婦以崇螽斯百葉之祉婚姻九族云胡不喜聖人制禮以隔隂陽七歲之男王母不抱七歲之女王父不恃親非父母不與同車親非兄弟不與同筵非禮不動非義不行是故宋伯姬遭火不下堂知必為災傅母不來遂成於灰春秋書之以為髙也胡騰字子升桂陽人官至尚書上言桓帝帝廵南陽騰為䕶駕從事公卿貴戚徴求役費騰上言從之自是肅然天子無外乘輿所幸即為京師臣請以荆州刺史比司隸校尉臣自同都官從事楊喬字聖逹烏傷人前後數上書言政事見謝承書薦孟嘗書嘗為合浦太守有惠政以病自上桓帝時尚書同郡楊喬上書薦嘗竟不用臣前後七表言故合浦太守孟嘗而身輕言微終不蒙察區區破心徒然而巳嘗安仁𢎞義耽樂道德清行出俗能幹絶羣前更守宰移風改政去珠復還饑民蒙活且南海多珍財産易積掌握之内價盈兼金而嘗單身謝病躬耕壟次匿景藏采不揚華藻實羽翮之美用非徒腹背之毛也而沈淪草莽好爵莫及廊廟之寳棄於溝渠且年歲有訖桑榆行盡而忠貞之節永謝聖時臣誠傷心私用流涕夫物以逺至為珍士以稀見為貴槃木朽株為萬乘用者左右為之容耳王者取士宜拔衆之所貴臣以斗筲之姿趨日月之側思立微節不敢茍私鄉曲竊感禽息亡身進賢上諫㑹稽典録臣聞之曾子扣舷易水魚聞入淵鳥驚參天朱㝢劾單安徐盛奏河東太守單安河内太守徐盛中常侍單超徐璜之弟也慿寵瀆貨㝢為司隸校尉奏詔安盛廷尉治罪此等皆宦豎昆叔刀鋸之餘横蒙恩私剖符三河不能思展命力以荅天地敢張豺狼之口吞噬百姓之命罪深釁重人鬼同疾臣銜命操斤翦其兇醜輒考核贓罪事皆伏上漢紀牢順奏李膺等黨人書後漢紀延熹時河内張成有道術知當大赦使女殺人李膺為司隸收成殺之中常侍侯覽等教成弟子牢順上書詔收膺等三百餘人懸金搆逋而黨人之議始于此至靈帝復皆禁錮司隸李膺御史中丞陳蕃汝南范滂潁川杜密南陽岑晊等相與結為黨誹謗朝廷迫脅公卿自相薦舉三桓專魯六卿分晉政在大夫春秋所譏同前赦者天子所以布大德於天下枯蘇解難者也而膺等公於赦後論殺無忌方命為虐行其私威且膺等養太學游士結列郡生徒更驅馳為部黨誹訕朝政疑亂風俗不可長東漢文紀巻十六
