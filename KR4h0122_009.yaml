body:
  text: 東漢文紀卷九明梅鼎祚編竇憲字伯度融曽孫女弟為章帝后厯車騎將軍木塞擊胸奴有功拜大將軍封武陽侯坐事遣就國自殺上皇太后薦桓郁疏和帝即位竇太后臨朝憲以外戚之重欲令少主頗涉經學上疏薦屯騎校尉桓郁及劉方由是郁遷長樂少府復入侍講郁纍世帝師而性和退自守故薦令授經禁中內外協附禮記云天下之命懸於天子天子之善成乎所習習與智長則切而不動化與心成則中道若性昔成王幼小越在襁褓周公在前史佚在後太公在左召公在右中立聽朝四聖維之是以慮無遺計舉無過事孝昭皇帝八歲即位大臣輔政亦選名儒韋賢蔡義夏侯勝等入授於前平成聖德近建初元年張酺魏應召訓亦講禁中臣伏惟皇帝陛下躬天然之資宜漸教學而獨對左右小臣未聞典義昔五更桓榮親為帝師子郁結髮敦讓繼傳父業故再以校尉入授先帝父子給事禁省更厯四世今白首好禮經行篤備又宗正劉方宗室之表善為詩經先帝所褒宜令郁方並入教授以崇本朝光示大化何敞字文髙扶風平陵人厯五官中郎將言於宋由袁安元和中辟太尉宋由府由待以殊禮司徒袁安亦深重之是時京師及四方纍有竒異鳥獸草木言事者以為祥瑞敞通經傳能為天官意甚惡之乃言於二公由安不敢答俄章帝崩夫瑞應依德而至灾異緣政而生故鸜鵒來巢昭公有乾侯之厄西狩獲麟孔子有兩楹之殯海鳥避風臧文祀之君子譏焉今異鳥翔於殿屋怪草生於庭際不可不察奏記太尉宋由敞元和中辟太尉宋由府常引大體多所匡正時竇氏専政外戚賞賜過制倉帑為虛敞因奏記與由由不能用敞聞事君之義進思盡忠退思補過厯觀世主時臣無不各欲為化垂之無窮然而平和之政萬無一者蓋以聖主賢臣不能相遭故也今國家秉聰明之𢎞道明公履晏晏之純德君臣相合天下翕然治平之化有望於今孔子曰如有用我者三年有成今明公視事出入再朞宜當克已以酬四海之心禮一穀不升則損服徹膳天下不足若已使然而比年水旱人不收穫涼州緣邉家被凶害男子疲於戰陳妻女勞於轉運老幼孤寡歎息相依又中州內郡公私屈竭此實損膳節用之時國恩覆載賞賚過度但聞臘賜自郎官以上公卿王侯以下至於空竭帑藏損耗國資尋公家之用皆百姓之力明君賜賚宜有品制忠臣受賞亦應有度是以夏禹𤣥圭周公束帛今明公位尊任重責深負大上當匡正綱紀下當濟安元元豈但空空無違而已哉宜先正已以率羣下還所得賜因陳得失奏王侯就國除苑囿之禁節省浮費賑恤窮孤則恩澤下暢黎庶悅豫上天聰明必有立應使百姓歌誦史官紀德豈但子文逃祿公儀退食之比哉又章帝崩齊王子都鄉侯暢奔弔國憂上書未報得幸竇太后侍中竇憲懼暢分宫省之權令人刺殺暢於城門屯衛之中而主名不立敞說由由乃許焉二府聞敞行皆遣主者隨之於是推舉具得事實劉暢宗室肺腑茅土藩臣來弔大憂上書須報親在武衛致此殘酷奉憲之吏莫適討捕蹤跡不顯主名不立敞備數股肱職典賊曹故欲親至發所以糾其變而二府以為故事三公不與盜賊昔陳平生於征戰之世猶知宰相之分云外鎮四夷內撫諸侯使卿大夫各得其宜今二府執事不深惟大義惑於所聞公縱姦慝莫以為咎惟明公運獨見之明昭然勿疑敞不勝所見請獨奏案並後漢書敞本傳雖止言又說由然實書也尺牘亦載諫伐胸奴疏敞拜侍御史時竇憲為車騎將軍擊胸奴詔使者為憲弟篤景並起邸第興造勞役敞疏諫不省臣聞胸奴之為桀逆久矣平城之圍嫚書之恥此二辱者臣子所為捐軀而必死髙祖吕后忍怒還忿舍而不誅伏惟皇太后秉文母之操陛下履晏晏之姿胸奴無逆節之罪漢朝無可慙之恥而盛春東作興動大役元元怨恨咸懷不悅而猥復為衛尉篤奉車都尉景繕修館第彌街絶里臣雖斗筲之人誠竊懷怪以為篤景親近貴臣當為百僚表儀今衆軍在道朝廷焦脣百姓愁苦縣官無用而遽起大第崇飾玩好非所以垂令德示無窮也宜且罷工匠専憂北邉恤人之困理郅夀疏夀徴為尚書僕射是時竇憲征胸奴弟篤景並起第宅驕奢非法夀譏刺憲等憲陷夀以買公田誹謗下吏當誅侍御史何敞上疏理之得減死論徙合浦臣聞聖王闢四門開四聰延直言之路下不諱之詔立敢諫之旗聽歌謡於路爭臣七人以自鑒照考知政理違失人心輒更改之故天人並應傳福無窮臣伏見尚書僕射郅夀坐於臺上與諸尚書論擊胸奴言議過差及上書請買公田遂繫獄考劾大不敬臣愚以為夀機密近臣匡救為職若懷默不言其罪當誅今夀違衆正議以安宗廟豈其私耶又臺閣平事分爭可否雖唐虞之隆三代之盛猶謂諤諤以昌不以誹謗為罪請買公田人情細過可裁隱忍夀若被誅臣恐天下以為國家橫罪忠直賊傷和氣忤逆隂陽臣所以敢犯嚴威不避夷滅觸死瞽言非為夀也忠臣盡節以死為歸臣雖不知夀度其甘心安之誠不欲聖朝行誹謗之誅以傷塞晏之化杜塞忠直垂譏無窮臣敞謬豫機密言所不宜罪名明白當填牢獄先夀僵仆萬死有餘為尚書復論竇氏封事夫忠臣憂世犯主嚴顔譏刺貴臣至以殺身滅家而猶為之者何邪君臣義重有不得已也臣伏見往事國之危亂家之將凶皆有所由較然易知昔鄭武姜之幸叔段衛莊公之寵州吁愛而不教終至凶戾由是觀之愛子若此猶饑而食之以毒適所以害之也伏見大將軍竇憲始遭大憂公卿此奏欲令典幹國事憲深執謙退固辭盛位懇懇勤勤言之深至天下聞之莫不悅喜今踰年無幾大禮未終卒然中改兄弟専朝憲秉三軍之重篤景總宫衛之權而虐用百姓奢侈僭逼誅戮無罪肆心自快今者論議洶洶咸謂叔段州吁復生於漢臣視公卿懷持兩端不肻極言者以為憲等若有匪懈之志則已受吉甫褒申伯之功如憲等陷於罪辜則自取陳平周勃順吕后之權終不以憲等吉凶為憂也臣敞區區誠欲計䇿兩安絶其綿綿塞其涓涓上不欲令皇太后損文母之號陛下有誓泉之譏下使憲等得長保其福祐然臧獲之謀上安主父下存主母猶不免于嚴怒臣伏惟纍祖蒙恩至臣八世復以愚陋旬年之間厯顯位備機近每念厚德忽然忘生雖知言必夷滅而冒死自盡者誠不忍目見其禍而懷默茍全駙馬都尉瓌雖在弱冠有不隱之忠比請退身願抑家權可與參謀聽順其意誠宗廟至計竇氏之福諫濟南王康疏康光武子敞為尚書數切諫言諸竇罪過憲等深怨之出為濟南王康太傅康在國多殖財貨大修宫室奢侈恣欲游觀無節敞上疏諫康素重敞無所嫌忤然終不能改蓋聞諸侯之義制節謹度然後能保其社稷和其民人大王以骨肉之親享食茅土當施張政令明其典法出入進止宜有期度輿馬臺𨽻應為科品而令奴婢廄馬皆有千餘增無用之口以自蠶食宫婢閉隔失其天性感亂和氣又多起內第觸犯防禁費以巨萬而功猶未半夫文繁者質荒木勝者人亡皆非所以奉禮承上傳福無窮者也故楚作章華以凶吳興姑蘇而滅景公千駟民無稱焉令數遊諸第晨夜無節又非所以逺防未然臨深履薄之法也願大王修恭儉遵古制省奴婢之口減乘馬之數斥私田之富節遊觀之晏以禮起居則敞乃敢安心自保惟大王深慮愚言後漢書同前漢紀蓋聞諸侯之義以制節謹度為忠然後能保其社稷和其民人昔管仲相齊九合之功而孔子譏其器小以奢侈逼上不知禮也今大王以骨肉之親享藩國之尊當率先天下以為化首今國家制度王侯車輿服章事有其科不可越也夫文繁者質枯木勝則人亡經傳所載也且君國者以道德仁義為營豈飾宫室充實廄馬為尊哉楚作章華吳興姑蘇卒亡景公千駟民無所稱其效也如大王數游諸第出入無節或涉晨夜非所以逺防未然臨深履薄垂示後嗣之法也願大王修恭儉遵古制以法自治以禮率下省奴婢之數減乘馬之費以禮起居則敞之願藥酒苦于口而利于病至言逆于耳而便于行惟大王深察愚言族龔夀奏搜神記敞為交址刺史行部宿蒼梧鵠奔亭有女鬼自稱蘇娥前年以財色為亭長龔夀所枉殺及其婢並埋夀樓下敞捕夀考實并父母兄弟繫獄上表夀常律殺人不至族然夀為惡隱密經年王法自所不免令鬼神訴者千載無一請皆斬之以明鬼靈以助隂教樂恢字伯竒京兆長陵人厯尚書僕射為竇憲所脅死諫征胸奴書春秋之義王者不理夷狄得其地不可墾發得其人無益於政故明王之於夷狄羇縻而已孔子曰逺人不服則修文德以來之以漢之盛不務修舜禹周公之德而無故興干戈動兵革以求無用之物臣誠惑之論竇氏疏恢時為尚書僕射竇憲兄弟放縱而忿恢不附已恢疏諫不省臣聞百王之失皆由權移於下大臣持國常以藝盛為咎伏念先帝聖德未永早棄萬國陛下富於春秋纂承大業諸舅不宜幹正王室以示天下之私經曰天地乖互衆物大傷君臣失序萬人受殃政失不救其極不測方今之宜上以義自割下以謙自引四舅可長保爵土之榮皇太后永無慙負宗廟之憂誠䇿之上者也辭拜騎都尉疏恢以意不得行稱疾乞身薦任城郭均成陽髙鳯拜騎都尉上書辭謝仍受厚恩無以報效夫政在大夫孔子所疾世卿持權春秋所戒聖人懇惻不虛言也近嵗外戚富貴必有驕溢之敗今陛下思慕山陵未遑政事諸舅寵盛權行四方若不能自損誅罰必加臣夀命垂盡臨死竭愚惟蒙留神答杜安書恢為人廉潔亢厲善潁川杜安安先為宛令以疾免章帝行過潁川安上書召拜御史遷至巴郡太守遣使遺恢書恢不就答之後第五倫代牟融為司空恢薦安干主求祿非平生操也漢紀華嶠後漢書云恢告吏口謝且讓之曰為宛令不合志病去可也干人主以窺覦非也違平生操故不報按此則恢未嘗答書矣周䊸字文通下邳徐人厯司𨽻校尉終將作大匠論夏陽侯竇瓌疏永元五年䊸復徴為御史中丞諸竇雖誅而瓌猶在朝䊸素奉法疾姦乃上疏會瓌歸國臣聞臧文仲之事君也見有禮於君者事之如孝子之養父母見無禮於君者誅之如鷹鸇之逐鳥雀按夏陽侯瓌本出輕薄志在邪辟學無經術而妄搆講舍外招儒徒實會姦桀輕忽天威侮慢王室又造作巡狩封禪之書惑衆不道當伏誅戮而主者營私不為國計夫涓流雖寡浸成江河爝火雖微卒能燎野履霜有漸可不懲革宜尋吕産専竊之亂永惟王莽篡逆之禍上安社稷之計下解萬夫之惑張奮字稚通嗣父純侯厯位司空終太常上辭封書東觀漢記奮父司空純封武始侯臨薨敕家丞翕以無功於時子根奮勿議傳國中元二年詔奮襲封奮上書不聽根不病衰臣小稱疾令翕立後臣時在河南冢廬臣見純前告翕語自以兄弟不當蒙襲爵之恩願下有司上和帝論灾旱表永元六年奮為司空時嵗灾旱祈雨不應乃上表即時召見幸洛陽獄録囚徒收洛陽令陳歆大雨三日比年不登人用飢匱今復久旱秋稼未立陽氣垂盡嵗月迫促夫國以民為本民以穀為命政之急務憂之重者也臣蒙恩尤深受職過任夙夜憂懼章奏不能敘心願對中常侍疏奏請定禮樂疏奮以病罷司空在家上疏後召拜太常復上疏聖人所美政道至要本在禮樂五經同歸而禮樂之用尤急孔子曰安上治民莫善於禮移風易俗莫善於樂又曰揖讓而化天下者禮樂之謂也先王之道禮樂可謂盛矣孔子謂子夏曰禮以修外樂以制內丘已矣夫又曰禮樂不興則刑罰不中刑罰不中則民無所厝其手足臣以為漢當制作禮樂是以先帝聖德數下詔書愍傷崩缺而衆儒不達議多駁異臣纍世台輔而大典未定私竊惟憂不忘寢食臣犬馬齒盡誠冀先死見禮樂之定復上論禮樂疏漢當改作禮樂圖書著明王者化定制禮功成作樂謹條禮樂異議三事願下有司以時考定昔者孝武皇帝光武皇帝封禪告成而禮樂不定事不相副先帝已詔曹褒今陛下但奉而承之猶周公斟酌文武之道非自為制誠無所疑久執謙謙今大漢之業不以時成非所以章顯祖宗功德建太平之基為後世法後漢書黃香字文彊江夏安陸人厯尚書令遷魏郡太守著賦箋奏書令五篇辭東郡疏永元六年香纍遷尚書令後以為東郡太守香上疏辭帝亦惜香幹用復留為尚書令臣江淮孤賤愚矇小生經學行能無可算録遭值太平先人餘福得以弱冠特蒙徴用連階纍任遂極臺閣訖無纖介稱報恩效死誠不意悟卒被非望顯拜近郡尊位千里臣聞量能授官則職無廢事因勞施爵則賢愚得宜臣香小醜少為諸生典郡從政固非所堪誠恐矇頑孤忝聖恩又惟機密端首至為尊要復非臣香所當久奉承詔驚惶不知所裁臣香年在方剛適可驅使願乞餘恩留備冗官賜以督責小職任之宫臺煩事以畢臣香螻蟻小志誠瞑目至願土灰極樂樂成王萇罪議萇濟北惠王子嗣樂成驕淫不法刺史與國相舉奏香與尚書侍郎冷宏議詔貶爵為侯袁宏漢紀作冷宏後漢書注按黃香集與宏共奏此香之辭自非聖人不能無過故王太子生為立賢師傅以訓導之是以目不見惡耳不聞非能保其社稷髙明令終萇少長藩國內無過庭之訓外無師傅之道血氣方剛卒受榮爵幾微生過遂陷不義臣聞周官議親憃愚見赦萇不殺無辜以譴呵為非無赫赫大惡可裁削奪損其租賦令得改過自新革心向道屏風銘三輔決録注何敞為汝南太守章帝南巡過郡有刻鏤屏風為帝張設詔命侍中黃香銘之敞懼禮賢命士改修德化古典務農雕鏤傷民忠在竭節義在修身天子冠頌惟永元之盛代聖皇德之茂純躬蒸蒸之至孝崇敬順以奉天以三載之孟春建寅月之上旬皇帝將加𤣥冠簡甲子之元辰厥日王於太皥厥時叶於百神皇輿幸夫金根駕𤣥虯之連蜷建螭龍以為旗鳴節路之和鑾既臻廟而成禮乃回軫而反宫正朝服以享宴撞太簇之蕤鐘作蕃屏而鼎轉既夷裔之君王咸進酌于金罍獻萬年之玉觴責髯奴辭寓辭髯奴以譏世之飾容貌騰頰舌者我觀人鬚長而復黑冉弱而調離離若緣坡之竹鬱鬱若春田之苗因風披靡隨風飄颻爾乃附以豐頤表以蛾眉發以素顔呈以妍姿約之以紲線潤之以芳脂莘莘翼翼靡糜緌緌振之發嘐黝若𤣥圭之垂於是搖鬚奮髭則論說唐虞鼓鬐動鬛則研核否臧內育瓌形外闡宫商相如以之間都顓孫以之堂堂豈若子髯既亂且赭枯稿秃瘁劬勞辛苦汙垢流離汚穢泥土傖囁穰檽與塵為侣無素顔可依無豐頤可怙動則困於惣滅靜則窘於囚虜薄命為髭正著子頤為身不能庇其四體為智不能飾其形骸癩鬚瘦面常如死灰曽不如犬羊之毛尾狐狸之毫氂為子鬚不亦難乎應順字華仲汝南南頓人厯河南尹將作大匠創計吏館奏應劭漢官儀永元七年順為將作大匠上言帝嘉內之百郡計吏觀國之光而舍逆旅﨑嶇私館貢篚之物朽濕曝露朝會邈逺事不肅給昔晉國霸之盟主耳舍諸侯於𨽻人鄭子産以為大譏况今四海之大而可無乎貢篚之物一作貢裝衣服梁扈安定烏氏人定鄉侯統之孫松之子遣從兄䄠奏記三府梁竦女二貴人選入宫得幸章帝生和帝竇皇后養為已子欲専名太子外家心惡梁氏乃誣以惡逆考竦死獄中貴人與姊以憂死葬禮有闕竇太后崩扈遣䄠奏記三府永元九年改殯貴人于西陵尊為皇太后春秋之義母以子貴漢家舊典也今梁貴人親育聖躬而不蒙尊號漢紀徐防字謁卿沛國銍人厯遷太尉論五經章句疏防永元十四年拜司空以五經久逺聖意難明宜為章句以悟後學上疏詔下公卿皆從防言臣聞詩書禮樂定自孔子發明章句始於子夏其後諸家分析各有異說漢承亂秦經典廢絶本文略存或無章句收拾缺遺建立明經博徴儒術開置太學孔聖既逺微㫖將絶故立博士十有四家設甲乙之科以勉勸學者所以示人好惡改敝就善者也伏見太學試博士弟子皆以意說不修家法私相容隱開生姦路每有䇿試輒興諍訟論議紛錯互相是非孔子稱述而不作又曰吾猶及史之闕文疾史有所不知而不肯闕也今不依章句妄生穿鑿以遵師為非義意說為得理輕侮道術寖以成俗誠非詔書實選本意改薄從忠三代常道専精務本儒學所先臣以為博士及甲乙䇿試宜從其家章句開五十難以試之解釋多者為上第引文明者為髙說若不依先師義有相伐皆正以為非五經各取上第六人論語不宜射䇿雖所失或久差可矯革試論語奏試論語本文章句但通度勿以射䇿冀令學者務本有所一心専精師門思核經意事得其實道得其真於此𢎞廣經術尊重聖業有益於化雖從來久大經衰微學問寖淺誠宜反本改矯其失張敏字伯達河間鄚人厯拜司空駁輕侮法議建初中有人侮辱人父而其子殺之章帝貰其死刑自後因以為比是時遂定其議以為輕侮法敏為尚書駁議不省復上疏和帝從之夫輕侮之法先帝一切之恩不可成科班之律令也夫死生之決宜從上下猶天之四時有生有殺若開相容怒著為定法者則是故設姦萌生長罪隙孔子曰民可使由之不可使知之春秋之義子不報讎非子也而法令不為之減者以相殺之路不可開故也今託義者得減妄殺者有差使執憲之吏得設巧詐非所以導在醜不爭之義又輕侮之比寖以繁滋至有四五百科轉相顧望彌復增甚難以垂之萬載臣聞師言救文莫如質故髙帝去煩苛之法為三章之約建初詔書有改於古者可下三公廷尉復上疏臣敏蒙恩特見拔擢愚心所不曉迷意所不解誠不敢茍隨衆議臣伏見孔子垂經典臯陶造法律原其本意皆欲禁民為非也未曉輕侮之法將以何禁必不能使不相輕侮而更開相殺之路執憲之吏復容其姦枉議者或曰平法當先論生臣愚以為天地之性唯人為貴殺人者死三代通制今欲趣生反開殺路一人不死天下受敝記曰利一害百人去城郭夫春生秋殺天道之常春一物枯即為灾秋一物華即為異王者承天地順四時法聖人從輕律願陛下留意下民考尋利害廣令平議天下幸甚張霸字伯饒蜀郡成都人為㑹稽太守有惠政四遷至侍中遺敕諸子諸子承命葬於河南昔延州使齊子死嬴博因坎路側遂為葬焉今蜀道阻逺不宜歸塋可止此葬足藏髮齒而已務遵速朽副我本心人生一世但當畏敬於人若不善加已直為受之魯恭字仲康扶風平陵人厯位司徒諫和帝擊胸奴疏恭拜侍御史和帝初立議遣車騎將軍竇憲與征西將軍耿秉擊胸奴恭上疏諫不從陛下親勞聖思日昃不食憂在軍役誠欲以安定北垂為人除患定萬世之計也臣伏獨思之未見其便社稷之計萬人之命在於一舉數年以來秋稼不熟人食不足倉庫空虛國無儲積會新遭大憂人懷恐懼陛下躬大聖之德履至孝之行盡諒隂三年聽于冢宰百姓闕然三時不聞警蹕之音莫不懷思皇皇若有求而不得今乃以盛春之月興發軍役擾動天下以事戎狄誠非所以垂恩中國改元正時由內及外也萬民者天之所生天愛其所生猶父母愛其子一物有不得其所者則天氣為之舛錯况於人乎故愛人者必有天報昔太王重人命而去邠故獲上天之祐夫戎狄者四方之異氣也蹲夷踞肆與鳥獸無别若雜居中國則錯亂天氣汚辱善人是以聖王之制羈縻不絶而已今邉境無事宜當修仁行義尚於無為令家給人足安業樂産夫人道乂於下則隂陽和於上祥風時雨覆被逺方夷狄重譯而至矣易曰有孚盈缶終來有它吉言甘雨滿我之缶誠來有我而吉矣夫以德勝人者昌以力勝人者亡今胸奴為鮮卑所殺逺臧於史侯河西去塞數千里而欲乘其虛耗利其微弱是非義之所出也前太僕余肜逺出塞外卒不見一胡而兵已困矣白山之難不絶如綖都護陷沒士卒死者如積迄今被其辜毒孤寡哀思之心未弭仁者念之以為纍息奈何復欲襲其迹不顧患難乎今始徴發而大司農調度不足使者在道分部督趣上下相迫民間之急亦已甚矣三輔并涼少雨麥根枯焦牛死日甚此其不合天心之效也羣僚百姓咸曰不可陛下獨奈何以一人之計棄萬人之命不恤其言乎上觀天心下察人志足以知事之得失臣恐中國不為中國豈徒胸奴而已哉惟陛下留聖恩休罷士卒以順天心恩當作思東觀漢記載恭疏首謂云竊見竇憲耿秉銜奉使命暴師于外陛下親勞云云諫安帝盛夏斷獄疏永初元年恭為司徒初和帝末下令麥秋得案驗薄刑而州郡好苛察為政遂盛夏斷獄恭疏諫臣伏見詔書敬若天時憂念萬民為祟和氣罪非殊死且勿案驗進柔良退貪殘奉時令所以助仁德順昊天致和氣利黎民者也舊制至立秋乃行薄刑自永元十五年以來改用孟夏而刺史太守不深惟憂民息事之原進良退殘之化因以盛夏徴召農人拘對考驗連滯無己司𨽻典司京師四方是則而近於春月分行諸部託言勞來貧人而無隱惻之實煩擾郡縣廉考非急逮捕一人罪延十數上逆時氣下傷農業案易五月姤用事經曰后以施令誥四方言君以夏至之日施命令止四方行者所以助微隂也行者尚止之况於逮召考掠奪其時哉比年水旱傷稼人飢流冗今始夏百穀權輿陽氣胎養之時自三月以來隂寒不暖物當化變而不被和氣月令孟夏斷獄薄刑出輕繫行秋令則苦雨數來五穀不熟又曰仲夏挺重囚益其食行秋令則草木零落人傷於疫夫斷薄刑者謂其輕罪已正不欲令久繫故時斷之也臣愚以為今孟夏之制可從此令其決獄案考皆以立秋為斷以順時節育成萬物則天地以和刑罰以清矣冬至前斷獄議奏初肅宗時斷獄皆以冬至前自後論者互異鄧太后詔公卿㑹議恭議奏後卒施行夫隂陽之氣相扶而行發動用事各有時節若不當其時則物隨而傷王者雖質文不同而兹道無變四時之政行之若一月令周世所造而所據皆夏之時也其變者惟正朔服色犧牲徽號器械而已故曰殷因於夏禮周因於殷禮所損益可知也易曰潛龍勿用言十一月十二月陽氣潛藏未得用事雖煦噓萬物養其根荄而猶盛隂在上地凍水氷陽氣否隔閉而成冬故曰履霜堅氷隂始凝也馴致其道至堅氷也言五月微隂始起至十一月堅氷至也夫王者之作因時為法孝章皇帝深惟古人之道助三正之微定律著令冀承天心順物性命以致時雍然後變改以來年歲不熟穀價常貴人不寧安小吏不與國同心者率入十一月得死罪賊不問曲直便即格殺雖有疑罪不復讞正一夫吁嗟王道為虧况於衆乎易十二月君子以議獄緩死可令疑罪使詳其法大辟之科盡冬月乃斷其立春在十二月中者勿以報囚如故事魯丕字叔陵恭弟厯遷侍中左中郎將論趙王商移入學宫奏丕為趙相王上言避疾移住學宫章帝詔下丕丕奏不可從之臣聞禮諸侯薨於路寢大夫卒於嫡室死生有命未有逃避之典也學宫傳五帝之道修先王禮樂教化之處王欲廢塞以廣游宴事不可聽上和帝論經義疏永元中丕遷中散大夫和帝因朝㑹召見與侍中賈逵尚書令黃香等相難數事帝善丕說賜冠幘履襪衣一襲丕上疏臣以愚頑顯備大位犬馬氣衰猥得進見論難於前無所甄明衣服之賜誠為優過臣聞說經者傳先師之言非從己出不得相讓相讓則道不明若規矩權衡之不可枉也難者必明其據說者務立其義浮華無用之言不陳於前故精思不勞而道術愈章法異者各令自說師法博觀其義覽詩人之㫖意察雅頌之終始眀舜禹臯陶之相戒顯周公箕子之所陳觀乎人文化成天下陛下既廣納謇謇以開四聰無令芻蕘以言得罪既顯巖穴以求仁賢無使幽逺獨有遺失曹鳯字仲理敦煌效穀人為北地太守有異政加秩中二千石上言西戎永元時大小榆谷左右無復羌寇隃糜相曹鳯上言於是拜鳯為金城西部都尉西戎為害前世所患臣不能紀古且以近事言之自建武以來其犯法者常從燒當種起所以然者以其居大小榆谷土地肥美又近塞內諸種易以為非難以攻伐南得鍾存以廣其衆北阻大河因以為固又有西海魚鹽之利緣山濵水以廣田畜故能彊大常雄諸種恃其權勇招誘羌胡今者衰困黨援壞沮親屬離叛餘勝兵者不過數百逃亡棲竄逺依發羌臣愚以為宜及此時建復西海郡縣規固二榆廣設屯田隔塞羌胡交關之路遏絶狂狡窺欲之源又殖穀富邉省委輸之役國家可以無西方之憂杜崇朱徽並坐激叛單于下獄死言南單于安國奏單于屯屠何薨左賢王安國永元五年立安國初無稱譽左谷蠡王師子有勇智故國中盡敬師子而不附安國由是疾師子約諸新降胡欲殺師子時單于與漢中郎將杜崇不相平上書告崇崇斷單于章與行度遼將軍執金吾朱徽奏言和帝下公卿議從之徽等遣吏為曉解安國不聽為其舅所殺南單于安國疏逺故胡親近新降欲殺左賢王師子及左臺且渠劉利等又右部降者謀共迫脅安國起兵背畔請西河上郡安定為之警備公卿議蠻夷反覆雖難測知然大兵聚會必未敢動搖今宜遣有方略使者之單于庭與杜崇朱徽及西河太守并力觀其動靜如無它變可令崇等就安國會其左右大臣責其部衆橫暴為邉害者共平罪誅若不從命令為權時方略事畢之後裁行客賜亦足以威示百蠻唐羌字伯游汝南人自臨武棄官不應徴召詔獻龍眼荔支書羌補臨武長縣接交州舊生獻龍眼荔支驛馬傳送死者繼路羌上書諫和帝下詔從之臣聞上不以滋味為德下不以貢膳為功故天子食太牢為尊不以果實為珍伏見交址七郡獻生龍眼等鳥驚風發南州土地惡蟲猛獸不絶于路至于觸犯死亡之害死者不可復生來者猶可救也此二物升殿未必延年益夀謝承後漢書和帝詔報逺國珍羞本以薦奉宗廟茍有傷害豈愛民之本其敕令大官勿復受獻范曄後漢書養奮字叔髙欎林人舉方正對䇿廣州先賢傳云和帝時䇿問隂陽不和布衣養奮對天有隂陽隂陽有四時四時有政令春夏則子惠布施寬仁秋冬則剛猛盛威行刑賞罰殺生各應其時則隂陽和四時調風雨時五穀升今則不然長吏多不奉行時令為政舉事干逆天氣上不恤下下不忠上百姓困乏而不恤哀衆怨鬱積故隂陽不和風雨不時灾害緣類水者隂盛小人居位依公營私讒言誦上雨漫溢者五穀有不升而賦稅有不為減百姓虛竭家有愁心也鄭璩拜內史上疏東觀漢紀璩字平卿拜內史上疏賜素六十匹由是顯名臣斗筲之小吏擢在察視之官職任過分當刺斜矯枉詔書示官府璩盡節剛正亦何陵遲之有賜璩素六十匹東漢文紀卷九
