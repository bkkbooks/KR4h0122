body:
  text: 東漢文紀巻十四明梅鼎祚編史岑字孝山范曄後漢書王莽末沛國史岑子孝以文章顯莽以為謁者章懐注云一字孝山著出師頌李善注文選出師頌云文章志及集林今書七志皆載岑出師頌而流别集及集林又載岑和熹鄧后頌計莽末訖和熹百有餘年又東觀漢記東平王蒼光武中興頌以為前世史岑之比斯則莽末史岑不得為和熹頌明矣盖有二史岑字子孝者仕莽末字孝山者當和熹之際也鼎按此誤乃自章懐注作一人曄書明言莽末為子孝而善引又誤以曄書史岑字孝山則益混矣出師頌鄧騭禹之孫女弟為和熹皇后安帝立騭為虎賁中郎將以帝舅封上蔡侯將兵擊涼部叛羌西屯漢陽征西校尉任尚與羌戰大敗之拜騭為大將軍岑為出師頌伯舅謂騭也茫茫上天降祚有漢兆基開業人神攸贊五曜霄映素靈夜歎皇運來授萬寳增煥歴紀十二天命中易西零不順東夷遘逆乃命上將授以雄㦸桓桓上將實天所啓允文允武明詩悦禮憲章百揆為世作楷昔在孟津惟師尚父素旄一麾渾一區宇蒼生更始朔風變楚薄伐獫狁至于太原詩人歌之猶歎其艱況我將軍窮城極邊鼓無停響旗不蹔褰澤霑遐荒功銘鼎鉉我出我師于彼西疆天子餞我路車乘黄言念伯舅恩深渭陽介珪既削列壤酬勲今我將軍啓土上郡傳子傳孫顯顯令聞李尤字伯仁廣漢雒人賈逵薦尤有楊雄之才明帝詔為東觀辟雍徳陽諸觀銘拜諌議大夫著詩賦銘誄頌七欵哀典二十八篇孟津銘洋洋河水赴宗於海經自中州龍圖所在黄函白神赤符以信昔有周武集㑹孟津魚入王舟乃徃克殷赴水經注作朝河銘洋洋河水赴宗於海經自中州龍圖所在昔周武諸侯㑹于孟津魚入王舟乃徃尅殷大漢承緒懐附遐隣邦事來濟各貢厥珍赴一作朝洛銘洛出熊耳東流㑹集夏禹導疏經于洛邑𤣥龜赤字漢符是立帝都通路建國南鄉萬乗終濟造舟為梁三都五州貢篚萬方廣視逺聽審任賢良元首昭明庶類是康鴻池陂銘水經注鴻澤之陂聖王所規開水東注出自城池井銘井之所尚寒泉洌清法律取象不槩自平多取不損少汲不盈執憲若斯何有邪傾明堂銘布政之室上圓下方體則天地在國正陽牕闥四設流水洋洋順節行化各居其房春䘏㓜孤夏進賢良秋屬武人冬謹闗梁太學銘漢遵禮典崇興六藝修周之理埽秦之弊褒建儒宫廣置異記開延學者勸以爵位辟雍銘惟王所建方中圓外清流四匝蕩滌濁穢東觀銘周氏舊區皇漢實循房闥内布疏綺外陳升降三除貫啓七門是謂東觀書籍林林列侯𢎞雅治掌藝文永安宫銘合歡黄堂中和是遵舊廬懐本新果暢春後臺集道俾司星辰豐業廣徳以協天人萬福來眇嘉娱永欣徳陽殿銘皇穹垂象以示帝王紫微之則𢎞誕爾光大漢體天承以徳陽崇𢎞高麗苞受萬方内宗朝貢外示遐荒高安館銘巍巍高安明聖是修嶕嶢麗館牕闥列周長除臨起櫺檻相承聖朝明察同保休徵平樂館銘乃興平樂𢎞敞麗光層樓通閣禁闥洞房棼梁照曜朱華飾璫騁武舒秘以示幽荒如榮普覆然後來王雲臺銘周氏舊居惟漢襲因崇臺嶒峻上擬蒼雲垂示億載俾率舊章人修其行而國其昌武庫銘摶噬爪牙鋒距之先毒螫芒刺矛矢以存聖人垂象五兵已陳闕銘皇上尊嚴萬姓載依國都攸處建設端闈表樹兩觀雙闕巍巍門銘門之設張為宅表㑹納善閉邪擊柝防害平陽城門銘雒陽城十二門平門督司午位處中外臨僚侍内達帝宫正陽南面炎暑赫融後漢書注平城司午厥位處中上西門銘上西在季位月惟戍菊黄豹察號令嚴悉雍城門銘雍門處中位月惟酉盲風寒濁鷰歸山阜廣陽門銘廣陽惟孟厥月在申涼風從時白露已紛津城門銘津名自定位月在未温風欝暑鷹鳥習鷙開陽城門銘開陽在孟位月惟巳清明冠節太陽進起旄城門銘一作耗誤旄門値季位月在辰順陽布惠貧乏是振中東門銘中東處仲月值當卯倉庚有聲隼鷹匿爪除去桎梏獄訟勿考上東門銘上東少陽厥位在寅條風動物月直孟春穀城門銘穀門北中位當於丑太隂主刑殺伐為首為一作事丑後漢注作子夏城門銘夏門值孟位月在亥不周用事𤣥㝠幽晦隂陽不通蝃蝀匿彩迎冬北壇從隂所在室銘室以安寧寢息幽閒室塞空隟遮遏風寒無曰寂寞屋漏昭然太平御覧楹銘幹强體正雖重不移上下相安高而不危牖銘天設牕牖開光照隂施於明堂以象八風堂銘因邑制宅爰興殿堂夏屋渠渠高敞清涼家以師禮修奉蒸嘗延賔西階主近東廂宴樂嘉客吹笙鼓簧京師城門銘天險匪登地險邱陵帝王設險乾坤是承鞠城銘圓鞠方墻傲象隂陽法月衡對二六相當建長立平其例有常不以親疎不有阿私端心平意莫怨其非鞠政由然況乎執機函谷闗銘函谷險要襟帶喉咽尹從李老留作二篇孟嘗離秦奔鶩東征夜造稽疑譎以雞鳴范雎將入自盛以囊元鼎革移錯之新安舍彼西阻東即高原長墉重闗閑固不踰簡易易從與乾合符竈銘燧人造火竈龍以興五行接備隂陽相乗漏刻銘古文苑玉海摘昬明數句為晉李充銘注云藝文有後漢李尤銘又有李充銘今考藝文兩載並作尤昔在先聖配天垂則仰釐七曜俯順坤徳力建日官俾立漏刻昬明既序景曜不􅑯唐命羲和敬授人時懸象著明序以崇熙季末不䖍徳衰於兹挈壺失職刺流在詩聖哲稽古帝則是欽尺璧非寳重此寸隂昧旦丕顯敬聽漏音思我王度如玉如金琴銘琴之在音盪滌邪心雖有正性其感亦深存雅却鄭浮侈是禁條暢和正樂而不淫鍾簴銘周因殷禮損益可知漢因於周猶若重規人因秦器事有可施鴻鍾怒􅒶物得其宜聲揚逺聞文耀委迤笛銘出自西南流離浩蕩經橈銘瞻之在前忽焉在後進新習故不舍於口子在川上逝者如斯及年廣學無問不知讀書枕銘聽政理事怠則覽書傾倚偃息隨體興居寤心起意由愈宴娱筆銘筆之强志庶事分别七術雖衆猶可解說口無擇言駟不及舌筆之過誤愆尤不滅墨研銘書契既造研墨乃陳烟石附筆以流以申篇籍永垂紀志功勲寳劍銘五材並用誰能去兵龍淵耀竒太阿飛名陸斷犀兕水截鯢鯨縉紳咸服翼宣儀刑豈徒振武義合金聲錯佩刀銘佩之有錯抑武揚文豈為麗好將戒其身金馬書刀銘巧冶煉剛金馬託形貢文錯鏤兼勒工名弧矢銘弦木為弧剡木為矢弧矢協并八極同紀弩銘放自近古發意所覩前聖制弓後世建弩機牙發矢執破醜虜充獲雖屢猶不可常忘戰者危極武者傷彈銘昔之造彈起意弦木以丸為矢合竹為檏漆飾以霑不用筋角丸彈之利以弋鳬鶩晉靈驕悖羣臣是彈樂其如躍趨如避丸盾銘吴旗魯􅀈戎兵特須進則避刃爰以衛軀鉦銘申嚴號令誓飾師旅以肅紀律萬衆是聽鎧銘甲鎧之施扞禦鋒矢尚其堅剛或用犀兕内以存身外不傷害有似仁人厥道廣大好徳者寧好戰者危專智恃力君子不為鞍銘駈騖馳逐騰躍覆被雖其捷習亦有顛沛井羸其瓶罔不斯敗轡銘轡銜在手急緩必時賞罰在心中和是思馬知良銜進取道里人知善政令行禁止馬箠銘御者箠䇿示有威怒東野之敗督責過度印銘赤紱在服非印不明棨傳符節非印不行龜鈕犢鼻用爾作程文履銘乃製兹履文質武斌顯允名哲卑以牧身歩此堤道絶彼埃塵書案銘居則致樂承顔接賓承奉奏記通達詔刺尊上答下道合仁義冠幘銘冠為元服幘為首服君子敬慎自强不忒牀几銘尤几銘序云黄帝軒轅仁智恭恕恐事之有闕作輿几之法虚左致賢設坐來賔筵牀對几盛養巳陳殽仁飯義枕典席文道可醉飽何必清醇西伯善養二老來遊卧牀銘體之所安寢處和歡夕惕敬慎崇徳逺奸太平御覽屏風銘舍則潛避用則設張立必端直處必廉方雍閼風邪霧露是抗奉上蔽下不失其常席銘施席接賔士無賢愚值時所有何必羊肫靈夀杖銘亭亭竒幹實曰靈夀甘泉潤根清露流莖乃制為杖扶危定傾既憑其實亦貴其名鏡銘鑄銅為鑑整飾容顔修爾法服正爾衣冠舟楫銘舟楫之利譬猶輿馬載重歴逺以濟天下相風視波窮究川野安審懼慎終無不可小車銘圓盖象天方輿則地輪法隂陽動不相離合之嗛嘘疏達開通兩輜障邪尊卑是從輗軛之用信義所同天軿車銘御覽作軺車奚氏本造後裔飾雍輪以代歩屏以蔽容輪軿并合出入周通追仁赴義惟禮是恭鼎銘五鼎大和滋味集具雖快其口損之為務塵尾銘撝成徳柄言為訓辭鑒彼逸傲念兹在兹薰爐銘上似蓬萊吐氣委蛇芳烟布繞遥沖紫㣲安哉銘見高似孫緯略云雖是陶器未審其形製安哉令名甘㫖是盛埏埴之巧甄陶所成食彼美珍思此鹿鳴盤銘或以承觴或以受物既舉清觴又成口實樽銘樽設在堂以俟俊義三山共承雕琢錯帶杯銘小之為杯大之為聞杯聞之用無施不可以飲以享慎斯得正周公之美驕吝為病圍棋銘詩人幽憶感物則思志之空閒翫弄遊竟局為憲矩棋法隂陽道為經緯方錯列張金羊燈銘賢哲勉修惟日不足金羊載耀作明以續羮魁銘羊羮不徧駟馬長驅豐侯銘豐侯荒繆醉亂迷逸乃象其形為禮戒式後世傳之固無止説箕銘神農植穀以養蒸民箕主簸揚糠粃及陳權衡銘夫審輕重莫若權衡欲正是非其唯賢明匱匣銘國有都邑家有匣匱貨賄之用我之利器以上見李尤集後漢書注水經注藝文類聚初學記太平御覽高似孫緯畧七欵竒宫閒館迴庭洞門井幹廣望重閣相因夏屋渠渠嵯峩合連前臨都街後據流川梁王青黎盧橘是生白華緑葉扶疎冬榮與時代序孰不墮零黄景炫炫眩林曜封金衣素裏班白内充副以芋柘豐𢎞誕節纎液玉津㫖於飲蜜蘇順字孝山京兆霸陵人和安間以才學見稱仕郎中著賦論誄哀雜文十六篇和帝誄天王徂登率土奄傷如何蒼穹奪我聖皇恩深累代乃作銘章其辭曰恭惟大行配天建徳陶元二化風流萬國立我蒸民宜此儀則厥初生民三五作剛載籍之盛著於虞唐恭惟大行爰同其光自昔何為欽明允塞恭惟大行天覆地載無為而治冠斯徃代徃代﨑嶇諸夏嬗命爰兹發號民樂其政奄有萬國民臣咸袟大孝備矣閟宫有洫由昔姜嫄祖妣之室本枝百世神契惟一彌留不豫道揚末命勞謙有終實惟其性衣不制新羣玉逺屏履和而行威稜上古洪澤旁流茂化沾漙不憖少留民斯何怙歔欷成雲泣涕成雨昊天不弔䘮我慈父賈逵誄初學記惟天生君繼孔之迹光明克哲果論至頥崔瑗字子玉駰之子為汲令遷濟北相張平子碑河間相張君南陽西鄂人諱衡字平子其先出自張老為晉大夫納規趙武而反其侈書傳美之君天姿叡哲敏而好學如川之逝不舍晝夜是以道徳漫流文章雲浮數術窮天地制作侔造化瓌辭麗說竒技偉藝磊落煥炳與神合契然而體性温良聲氣芬芳仁愛篤宻與世無傷可謂淑人君子者矣初舉孝亷為尚書侍郎遷太史令實掌重黎歴紀之度亦能焞燿敦大天明地徳光照有漢遷公車司馬令侍中遂相河間政以禮成民是用息遭命不永闇忽遷徂朝失良臣民隕令君天泯斯道世䘮斯文凡百君子靡不傷焉乃銘斯表以旌厥門其辭曰於維張君資質懿豐徳茂材羨高明顯融焉所不學亦何不師盈科而逝成章乃達一物不知實以為恥聞一善言不勝其喜包羅品類禀授無形酌焉不竭沖而復盈廪廩其庶亹亹其幾膺數命世紹聖作師茍華必實令徳惟恭柔嘉伊則孝友祗容允出在兹維帝念功徃才女諧化洽民雝愍而不弔降此咎兇哲人其萎罔不時恫紀於銘勒永終譽兮死而不朽芳烈著兮敘箴昔揚子雲讀春秋傳虞人箴而善之於是作為九州及二十五官箴缺規匡救言君徳之所宜斯乃體國之宗也東觀箴洋洋東觀古史之官三墳五典靡義不貫左書君行右記其言辛尹顧訪文武明宣倚相見寳荆國以安何以季世咆哮不䖍在强奮矯而戮彼逄干衛巫監謗國莫敢言狐突見斥淖齒見殘焚文坑儒嬴反為漢巫蠱之毒殘者數萬嗟嗟後王曷不斯鑒是以明哲先識擇木而處夏終殷摰周聃晉黍或笑或泣抱籍遁走三葉靖公果䘮厥緒宗廟隨夷逺之荆楚麥季之歌億載不腐史臣司藝敢告待後闗都尉箴茫茫九州規為闗津唐堯積徳三代修仁越季不軌爰失厥人聖賢不用頑嚚是親漢潰武闗項破函谷秦王子嬰縊為禽僕尉臣司闗敢告並轂河隄謁者箴伊昔鴻泉浩浩滔天有夏作空爰奠山川導河積石鑿於龍門疏為砥柱率彼河滸大陸既礙播於北野濟漯咸順沂泗從流江淮湯湯而冀宅乃州澹菑濺濺東歸於海九野孔安四隩不殆爰及周衰夏績陵遲導非其導堙非其堙八野填淤水高民居湓溢滂汨屢決金隄瓠子潺湲宣房作歌使臣司水敢告執河尚書箴一作繁欽龍作納言帝命惟允山甫翼周實司喉吻赫赫禁臺萬邦所庭無曰我平而慢爾衡無曰我審而怠爾明四岳阿鯀績用不成虞登八元五教聿清舉以無私乃忝服榮正直是與伊道之經先民匪懈永世流聲君子下問敢告侍庭北軍中候箴赫赫將帥典總虎臣鷹揚旅武闞然奮震贅衣侍近常伯之人怒如熊力角焉任均操兵左右百夫衞賔昔在髙祖草創伊神鴻門之㑹職多末陳或有劔舞賴有傾身孔丘歴堦文武定申以人士拜齊無其人秦政東遊大盗輩羣期門不設施巧銳騎不在修員故圖逺秉機事有殷勤殷勤在親親無常人忽情懈怠禍慢及君憲臣司武敢告執軍司隸校尉箴煌煌古制分劃五服翼翼封畿四方之極牧監匡設是謂王國大漢通變崇𢎞簡易吞舟之網以濟難阨自時厥後或慢或遲繡衣四出禍起宫闈江充作亂辱於戾園率隸掘蠱以詰其姦既定既寧爰遂其官俾督京甸時惟鷹鸇必正必式國之司直乃囘乃邪寔為䜛慝毁於貞賢悔其何及昔唐虞晏晏庶績以熈蠃氏慘慘怨毒用滋是故履上位者無云我貴苟任激訐平陽𤣥黙以式百辟畫一之歌豈猶遐逖使臣司隸敢告執役座右銘無道人之短無說已之長施人慎勿念受施慎勿忘俗譽不足慕惟仁為紀綱隱身而後動謗議庸何傷無使名過實守愚聖所臧柔弱生之徒老氏誡剛强在湼貴不淄曖曖内含光硜硜鄙夫介悠悠故難量慎言節飲食知足勝不祥行之茍有恒乆乆自芬芳竇大將軍鼎銘大禹鑄鼎象物百神享帝養賢命錫宗臣三距金鉉公徳配焉雉膏之美咸在擇人惟王建國分之彛器鼎為元鼎君臣享位足勝其任鬻保寳器持盈若沖滿而不溢黄耳不革玉鉉終吉禹鏤其鼎湯刻其盤紀功申戒貽則後人柏枕銘元首云尊惟乾之精貽我良材𤣥冬再榮是用為枕爰勒之銘遺葛龔珮銘禹湯罪已仲尼多誨盤盂有銘几杖有誡天為剛徳猶不干時君子妄怒厥亦生災晉厲好虐欒書作亂荀瑶峻戾韓魏致難慷慨憤激動腸傷氣乆生百疾歴年不遂俯覽斯珮柔韋是貴三珠釵銘元正上日百福孔靈鬢髮如雲乃象衆星三珠璜釵攝髮鑚靈杖銘乗危履險非杖不行年老力竭非杖不强諸蔗雖美猶不可杖溺人悦已亦不可相南陽文學頌昔聖人制禮樂也將以統天理物經國序民立均出度因其利而利之俾不失其性也故觀禮則體敬聽樂則心和然後知反其性而正其身焉取律於天以和聲採言於聖以成謀以和邦國以諧萬民以序賔旅以悦逺人其觀威儀省禍福也出言視聽於是乎取之民生如何導以禮樂乃修禮官奮其羽籥我國既淳我俗既敦神樂民則嘉生乃繁無言不酬其徳宜光先民既沒頼兹舊章我禮既經我樂既馨三事不敘莫識其形和帝誄𤣥景寑曜雲物見徵馮相考妖遂當帝躬三載四海遏宻八音如䘮考妣擗踴號吟大隧既啓乃徂𤣥宫永背神器升遐皇穹長夜㝠㝠曷云其窮竇貴人誄若夫貴人天地之所留神造化之所殷懃華光曜乎日月才志出乎浮雲然猶退讓未嘗專寵樂慶雲之普覆悼時雨之不廣憂國念主不敢怠遑嗚呼哀哉惟以永傷重曰積善之家福慶長修身以壽道之常聖人之言義不虚修身獲報効莫疏令問不忘身猶存貴人雖沒遺徳尊著於金石垂後昆鮑徳誄乃司大事掌是六府三事允功乃修乃聚草書勢一作體瑗善章草詔瑗奏事皆作草上王子敬稱美以為功類張伯英杜度書契之興始自頡皇寫彼鳥跡以定文章爰暨末葉典籍彌繁時之多僻政之多權官事荒蕪剿其墨翰惟作佐隸舊字是刪草書之法盖又簡略應時諭指用於卒迫兼功并用愛日省力絶險之變豈必古式觀其法象俯仰有儀方不中矩圓不副規抑左揚右望之若﨑竦企鳥峙志在飛移狡獸暴駭將奔未馳或􅣺􅚍㸃􅚭狀似連珠絶而不離畜怒怫欝放逸生竒或凌邃而惴慓若據槁而臨危旁㸃邪附似蜩螗而挶枝絶筆收勢餘綖糾結若山蜂施毒看隙緣巇螣蛇赴穴頭沒尾垂是故逺而望之􅬜焉若沮岑崩崖就而察之即一畫不可移機㣲要妙臨時從宜略舉大較髣髴若斯機一作纎時一作事與葛元甫書葛龔字元甫在後漢書文苑傳尺牘作瑗與諸葛元甫誤今遣奉書錢千為勢并送許子十卷貧不及素但以紙耳藝文類聚又僕在河北少他負罰以盗賊少北堂書鈔上言孝㢘疏崔氏家傳臣聞孝亷皆限年三十乃得察舉恐失賢才之士也臨終顧命夫人稟天地之氣以生及其終也歸精於天還骨於地何地不可藏形骸勿歸鄉里其賵贈之物羊豕之奠一不得受崔琦字子瑋濟北相瑗之宗直忤梁冀外戚箴琦初舉孝㢘為郎河南尹梁冀聞其才請與交冀行多不軌琦作外戚箴戒之復作白鵠賦風冀忤遣歸後除臨濟長不就為冀所捕殺赫赫外戚華寵煌煌昔在帝舜徳隆英皇周興三母有莘崇湯宣王宴起姜后脱簮齊桓好樂衞姬不音皆輔王以禮扶君以仁達才進善以義濟身爰暨衰葉漸已頽虧貫魚不敘九御差池晉國之難禍起於麗惟家之索牝雞之晨專權擅愛顯已蔽人陵長間舊圯剝至親並后匹嫡淫女斃陳匪賢是上番為司徒荷爵負乗采食名都詩人是刺徳用不憮暴辛惑婦拒諫自孤蝮蛇其心縱毒不辜諸父是殺孕子是刳天怒地忿人謀鬼圖甲子昧爽身首分離初為天子後為人螭非但耽色母后尤然不相率以禮而競奬以權先笑後號卒以辱殘家國泯絶宗廟燒燔妹嬉䘮夏褒姒斃周妲己亡殷趙靈沙邱戚姬人豕吕宗以敗陳后作巫卒死於外霍欲鴆子身乃罹廢故曰無謂我貴天將爾摧無恃常好色有歇㣲無怙常幸愛有陵遲無曰我能天人爾違患生不徳福有慎機日不常中月盈有虧履道者固仗埶者危㣲臣司戚敢告在斯七蠲寒門邱子有疾𤣥野子謂之曰藍沼青池素波朱瀾金鉤芳餌纎繳華竿緍沉魚浮薦以香蘭幽室洞房絶檻垂軒紫閣青臺綺錯相連結實布葉與波邪傾從風離合澹淡交并紫蔕黄葩翳水吐榮紅顔溢坐美目盈堂姿踰春華操越秋霜從容㣲眄流曜吐芳巧笑在側顧眄傾城𤣥野子曰爰有梧桐産乎𤣥谿傳根朽壤託隂生危激水澡其下孤鳥集其枝罔雙偶而特立獨飄颻而單離匠石摧肩公輸折首目眩肌戰制以為琴子野調操鍾期聽音子能聽之乎藝文類聚四皓頌序北堂書鈔昔有南山四皓者盖甪里先生綺里季夏黄公東園公是也秦世道滅徳消坑黜儒術於是乃退而作歌曰漠漠商洛深谷逶迤煜煜紫芝可以療饑皇虞邈逺吾將安歸駟馬髙盖其憂甚大富貴而畏人不如貧賤而輕世王逸字叔師南郡宜城人為校書郎順帝時為侍中著楚辭章句及賦誄書論雜文二十一篇楚辭章句敘敘曰昔者孔子叡聖明喆天生不王俾定經術乃刪詩書正禮樂制作春秋以為後王之法門人三千罔不昭達臨終之日則大義乖而㣲言絶其後周室衰㣲戰國並争道徳陵遲譎詐萌生於是楊墨鄒孟孫韓之徒各以所知著造傳記或以述古或以明世而屈原履忠被譛憂悲愁思獨依詩人之義而作離騷上以諷諫下以自慰遭時暗亂不見省納不勝憤懣遂復作九歌以下凢二十五篇楚人髙其行義瑋其文采以相教傳至於孝武帝恢廓道訓使淮南王安作離騷經章句則大義粲然後世雄俊莫不瞻仰攄舒妙思纉述其詞逮至劉向典校經書分以為十六巻孝章即位深𢎞道藝而班固賈逵復以所見改易前疑各作離騷經章句其餘十五卷闕而不説又以壯為狀義多乖異事不要撮今臣復以所識所知稽之舊章合之經傳作十六巻章句雖未能究其㣲妙然大指之趣略可見矣且人臣之義以忠正為髙以仗節為賢故有危言以存國殺身以成仁是以伍子胥不恨於浮江比干不悔於剖心然後徳立而行成榮顯而名稱若夫懐道以迷國佯愚而不言顚則不能扶危則不能安婉婉以順上逡巡以避患雖保黄耉終夀百年盖志士之所恥愚夫之所賤也今若屈原膺忠貞之質體清潔之性直若砥矢言若丹青進不隱其謀退不顧其命此誠絶世之行俊彦之英也而班固謂之露才揚已競於羣小之中怨恨懐王譏刺椒蘭苟欲求進强非其人不見容納忿恚自沈是虧其髙明而損其清潔者也昔伯夷叔齊讓國守志不食周粟遂餓而死豈可復謂有求於世而恨怨哉且詩人怨王刺上曰嗚呼小子未知臧否匪面命之言提其耳風諫之語於斯為切然仲尼論之以為大雅引此比彼屈原之詞優游婉順寧以其君不知之故欲提携其耳乎而論者以為露才揚已怨刺其上强非其人殆失厥中矣夫離騷之文依託五經以立義焉帝高陽之苗裔則詩厥初生民時惟姜嫄也紉秋蘭以為佩則將翺將翔佩玉瓊琚也夕㩜洲之宿莽則易濳龍勿用也駟玉虬而乗鷖則易時乗六龍以御天也就重華而敶詞則尚書咎繇之謀謨也登崑崙而渉流沙則禹貢之敷土也故智彌盛者其言博才益劭者其識逺屈原之詞誠博逺矣自孔丘終後以來名儒博達之士著造詞賦莫不擬則其儀表祖式其模範取其要妙竊其華藻所謂金相玉質百歲無匹名垂罔極永不刋滅者也離騷經章句離騷經者屈原之所作也屈原與楚同姓仕於懐王為三閭大夫三閭之職掌王族三姓曰昭屈景屈原序其譜屬率其賢良以厲國士入則與王圖議政事決定嫌疑出則監察羣下應對諸侯謀行職修王甚珍之同列大夫上官靳尚妬害其能共譛毁之王乃疏屈原屈原執履忠貞而被䜛衰憂心煩亂不知所愬乃作離騷經離别也騷愁也經徑也言以放逐離别中心愁思猶陳直徑以風諌君也故上述唐虞三后之制下序桀紂羿澆之敗冀君覺悟及於正道而還巳也是時秦昭王使張儀譎詐懐王令絶齊交又使誘楚請與俱㑹武闗遂脇與俱歸拘留不遣卒客死於秦其子襄王復用䜛言遷屈原於江南而屈原放在山野復作九章援天引聖以自證明終不見省不忍以清白乆居濁世遂赴汨淵自沉而死離騷之文依詩取興引類譬諭故善鳥香草以配忠貞惡禽臭物以比䜛佞靈修美人以媲於君宓妃佚女以譬賢臣虬龍鸞鳳以託君子飄風雲霓以為小人其詞温而雅其義皎而朗凢百君子莫不慕其清髙嘉其文采哀其不遇而閔其志焉九歌章句九歌者屈原之所作也昔楚南郢之邑沅湘之間其俗信鬼而好祀其祠必作樂鼓舞以樂諸神屈原放逐竄伏其域懐憂苦毒愁思怫欝出見俗人祭祀之禮歌舞之樂其詞鄙陋因為作九歌之曲上陳事神之敬下以見已之寃結託之以風諌故其文意不同章句雜錯而廣異義焉天問章句天問者屈原之所作也何不言問天天尊不可問故曰天問也屈原放逐憂心愁悴彷徨山澤經歴陵陸嗟號旻昊仰天嘆息見楚有先王之廟及公郷祠堂圖畫天地山川神靈琦瑋僪佹及古賢聖怪物行事周流罷倦休息其下仰見圖畫因書其壁呵而問之以渫憤懣舒瀉愁思楚人哀惜屈原因共論述故其文義不次敘云敘曰昔屈原所作凢二十五篇世相教傳而莫能説天問以文義不次又多竒怪之事自太史公口論道之多所不逮至於劉向揚雄援引傳記以解說之亦不能詳悉所闕者衆多無聞焉既有解説乃復多連蹇其文濛澒其説故厥義不昭㣲指不晢自游覽者靡不苦之而不能照也今則稽之舊章合之經傳以相發明為之符驗章決句斷事事可曉俾後學者永無疑焉九章章句九章者屈原之所作也屈原於江南之壄思君念國憂思罔極故復作九章章者著明也言已所陳忠信之道甚著明也卒不見納委命自沉楚人惜而哀之世論其詞以相傳焉遠遊章句遠遊者屈原之所作也屈原履方直之行不容於世上為䜛佞所譛毁下為俗人所困極章皇山澤無所告訴乃深惟元一修執恬漠思欲濟世則意中憤然文采季發遂敘妙思託配仙人與俱遊戲周歴天地無所不到然猶懐念楚國思慕舊故忠信之篤仁義之厚也是以君子珍重其志而瑋其辭焉卜居章句卜居者屈原之所作也屈原履忠貞之性而見嫉妬念䜛佞之臣承君順非而䝉富貴已執忠直而身放棄心迷意惑不知所為乃往至太卜之家稽問神明決之蓍龜卜巳居世何所宜行冀聞異䇿以定嫌疑故曰卜居也漁父章句漁父者屈原之所作也屈原放逐在江湘之間憂愁嘆吟儀容變易而漁父避世隱身釣漁江濵欣然自樂時遇屈原川澤之域怪而問之遂相應答楚人思念屈原因敘其辭以相傳焉九辨章句九辨者楚大夫宋玉之所作也辨者變也謂敶道徳以變説君也九者陽之數道之綱紀也故天有九星以正機衡地有九州以成萬邦人有九竅以通精明屈原懐忠貞之性而被䜛邪傷君闇蔽國將危亡乃援天地之數列人形之要而作九歌九章之頌以諷諌懐王明已所言與天地合度可履而行也宋玉者屈原弟子也閔惜其師忠而放逐故作九辨以述其志至於漢興劉向王褒之徒咸悲其文依而作詞故號為楚辭亦承其九以立義焉招魂章句招魂者宋玉之所作也招者召也以手曰招以言曰召魂者身之精也宋玉憐哀屈原忠而斥棄愁懣山澤魂魄放佚厥命將落故作招魂欲以復其精神延其年夀外陳四方之惡内崇楚國之美以諷諫懐王冀其覺悟而還之也大招章句大招者屈原之所作也或曰景差疑不能明也屈原放流九年憂思煩亂精神越散與形離别恐命將終所行不遂故憤然大招其魂盛稱楚國之樂崇懐襄之徳以比三王能任用賢公卿明察能薦舉人宜輔佐之以興至治因以風諫達已之志也惜誓章句惜誓者不知誰所作也或曰賈誼疑不能明也惜者哀也誓者信也約也言哀惜懐王與已信約而復背之也古者君臣將共為治必以信誓相約然後言乃從而身以親也盖刺懐王有始無終也招隱士章句招隱士者淮南小山之所作也昔淮南王安博雅好古招懐天下俊偉之士自八公之徒咸慕其徳而歸其仁各竭才智著作篇章分造辭賦以類相從故或稱小山或稱大山其義猶詩有小雅大雅也小山之徒閔傷屈原又怪其文昇天乗雲役使百神似若仙者雖身沉沒名徳顯聞與隱處山澤無異故作招隱士之賦以章其志也七諫章句七諫者東方朔之所作也諫者正也謂陳法度以諫正君也古者人臣三諫不從退而待放屈原與楚同姓無相去之義故加為七諫慇勤之意忠厚之節也或曰七諫者法天子有争臣七人也東方朔追閔屈原故作此辭以述其志所以昭忠信矯曲朝也哀時命章句哀時命者嚴夫子之所作也夫子名忌與司馬相如俱好辭賦客遊於梁梁孝王甚竒重之忌哀屈原受性忠貞不遭明君而遇暗世斐然作辭嘆而述之故曰哀時命也九懐章句九懐者諫議大夫王褒之所作也懐者思也言屈原雖見放逐猶思念其君憂國傾危而不能忘也褒讀屈原之文嘉其温雅藻采敷衍執握金玉委之汚瀆遭世溷濁莫之能識追而愍之故作九懐以裨其詞史官録第遂列於篇九歎章句九歎者䕶左都水使者光禄大夫劉向之所作也向以博古敏達典校經書辨章舊文追思屈原忠信之節故作九歎歎者傷也息也言屈原放在山澤猶傷念君歎息無已所謂讃賢以輔志騁詞以曜徳者也九思章句九思者王逸之所作也自屈原終沒之後忠臣介士遊覽學者讀離騷九章之文莫不愴然心為悲感髙其節行妙其麗雅至劉向王褒之徒咸嘉其義作賦騁辭以讃其志則皆列於譜録世世相傳逸與屈原同土共國悼傷之情與凢有異竊慕向褒之風作頌一篇號曰九思以裨其辭未有解説故聊訓誼焉折武論北堂書鈔苞含六藝游覽百家用道徳為弓弩仁義為鎧甲北堂書鈔載王逸臨豫州教云舉遺逸於山藪黜奸邪於邦國王延夀字文考一字子山逸之子有儁才年二十餘溺漢水死桐柏廟碑延熹六年正月八日乙酉南陽太守中山盧奴張君處正好禮尊神敬祀以淮出平氏始􅋋大復潛行地中見於陽口立廟桐柏春秋宗奉災異告愬水旱請求位比諸侯聖漢所尊受珪上帝大常定甲郡守奉祀䄢絜沈祭從郭君以來卄餘年不復身至遣丞行事簡略不敬明神弗歆災害以生五嶽四瀆與天合徳仲尼慎祭常若神在君准則大聖親之桐柏奉見廟祠﨑嶇逼狹開柘神門立闕四達增廣壇場飭治華盖高大殿宇穹齊傳館石獸表道靈龜十四衢廷𢎞敞宫廟嵩峻祖慎慶祀一年再至躬進三牲執玉以沈為民祈福靈祗報祐天地清和異祥昭格禽獸碩茂草木芬芳黎庶賴祉民用作頌其辭曰泫泫淮源聖禹所導湯湯其逝惟海是造疏穢濟逺柔順其道弱而能强仁而能武聖賢立式明哲所取定為四瀆與河合矩烈烈明府好古之則雯恭禮祀不愆其徳惟前廢㢮匪躬匪力災眚以興隂陽以忒陟彼髙岡臻兹廟側肅肅其敬靈祗降福雍雍其和民用悦報穰穰其慶年穀豐殖望君輿駕扶老携集慕君塵軌犇走忘食君惠賜思君罔極於骨樂兮傳􅋋萬億春侍祠官屬五官掾章陵劉訢功曹史安衆劉瑗主簿蔡陽樂茂戸􅔟史宛任巽秋五官掾新野梁懿功曹史酈周謙主簿安衆鄭嶷主記史宛趙旻戸􅔟史宛謝綜洪适隸釋云桐柏淮源廟碑在唐州䄢絜字書無䄢字文意當為齋戒之齋此碑又有一正書者華盖誤作萃豐晝夜誤作立式凢十數字案此碑鼎家有之隸額桐柏廟碑頗完好惟闕穹字報祐二字而隸釋闕張字穹字又不同者異祥作嘉祥立式作晝夜上闕二字定為作實為悦報作悦服擕集作擕息犇作即奔字鄭嶷作鄧嶷然余本乃隸書非正書也惟報字似服為長考韻報字有轉注音赴者若劉之廣文選楊之金石録古文更多訛字矣惟穹字則見此二書祏即拓字魯靈光殿賦序魯靈光殿者盖景帝程姬之子恭王餘之所立也初恭王始都下國好治宫室遂因魯僖基兆而營焉遭漢中㣲盗賊奔突自􅒾京未央建章之殿皆見隳壊而靈光巋然獨存意者豈非神明依馮支持以保漢室者也然其規矩制度上應星宿亦所以永安也予客自南鄙觀藝於魯覩斯而眙曰嗟乎詩人之興感物而作故奚斯頌僖謌其路寢而功績存乎辭徳音昭乎聲物以賦顯事以頌宣匪賦匪頌將何述焉夢賦序臣弱冠嘗夜寢見鬼物與臣戰臣遂得東方朔與臣作罵鬼之書臣遂作賦一篇敘夢後人夢者讀誦數數有驗臣不敢蔽劉梁字曼山一名岑東平寧陽人為北新城長儒化大行入拜尚書郎辯和同論夫事有違而得道有順而失義有愛而為害有惡而為美其故何也盖明智之所得闇偽之所失也是以君子之於事也無適無莫必考之以義焉得由和興失由同起故以可濟否謂之和好惡不殊謂之同春秋傳曰和如羮焉酸苦以劑其味君子食之以平其心同如水焉若以水濟水誰能食之琴瑟之專一誰能聽之是以君子之行周而不比和而不同以救過為正以匡惡為忠經曰將順其美匡救其惡則上下和睦能相親也昔楚恭王有疾召其大夫曰不穀不徳少主社稷失先君之緒覆楚國之師不穀之罪也若以宗廟之靈得保首領以歿請為靈若厲大夫許諸及其卒也子囊曰不然夫事君者從其善不從其過赫赫楚國而君臨之撫正南海訓及諸夏其寵大矣有是寵也而知其過可不謂恭乎大夫從之此違而得道者也及靈王驕淫暴虐無度芊尹申亥從王之欲以殯於乾谿殉之二女此順而失義者也鄢陵之役晉楚對戰陽穀獻酒子反以斃此愛而害之者也臧武仲曰孟孫之惡我藥石也季孫之愛我美疢也疢毒滋厚石猶生我此惡而為美者也孔子曰智之難也有臧武仲之智而不容於魯國抑有由也作而不順施而不恕矣盖善其知義譏其違道也夫知而為之偽也不知而失之闇也闇與偽焉其患一也患之所在非徒在智之不及又在及而違之者矣故曰智及之仁不能守之雖得之必失之也夏書曰念兹在兹庶事恕施忠智之謂矣故君子之行動則思義不為利回不為威疚進退周旋唯道是務茍失其道則兄弟不阿茍得其義雖仇讐不廢故解狐䝉祁奚之薦二叔被周公之害勃鞮以逆文為成傳瑕以順厲為敗管蘇以憎忤取進申侯以愛從見退考之以義也故曰不在逆順以義為斷不在憎愛以道為貴禮記曰愛而知其惡憎而知其善考義之謂也告新北城縣人梁桓帝時舉孝㢘除新北城長乃大作講舍延聚生徒昔文翁在蜀道著巴漢庚桑𤨏隸風移碨磥吾雖小宰猶有社稷茍赴期㑹理文墨豈本志乎並後漢書七舉丹楹縹壁紫柱紅梁桷榱朱緑藻棁𤣥黄鏤以金碧雜以夜光鴻臺百層干雲參差仰觀八極遊目無涯玉樹青蔥鸞鸖並棲随珠明月照曜其陂藝文類聚黼黻之服紗縠之裳繁飾參差㣲鮮若霜北堂書鈔劉梁碑闕君遷桂陽太守班序以正以仁為首以惠為先北堂書鈔東漢文紀卷十四
